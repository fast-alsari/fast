<!DOCTYPE html>
<html lang="ar" dir="rtl">

<head>

<meta charset="UTF-8">

<meta
name="viewport"
content="width=device-width, initial-scale=1.0">

<title>
إعادة الطلب
</title>

<link
href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;500;600;700;800&display=swap"
rel="stylesheet">

<style>

*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:'Cairo',sans-serif;
}

body{
height:100vh;
display:flex;
align-items:center;
justify-content:center;
padding:20px;

background:
linear-gradient(
135deg,
#fff5ee,
#ffffff
);
}

.box{
width:100%;
max-width:420px;
background:white;
padding:35px 25px;
border-radius:30px;
text-align:center;

box-shadow:
0 10px 35px rgba(0,0,0,.08);
}

.icon{
width:120px;
height:120px;
border-radius:50%;

margin:auto auto 20px;

display:flex;
align-items:center;
justify-content:center;

font-size:55px;
color:white;

background:
linear-gradient(
135deg,
#ff8800,
#ff5500
);
}

.title{
font-size:30px;
font-weight:bold;
color:#ff5500;
margin-bottom:15px;
}

.text{
font-size:17px;
line-height:2;
color:#666;
margin-bottom:30px;
}

.btn{
width:100%;
height:58px;
border:none;
border-radius:18px;

background:
linear-gradient(
135deg,
#ff8800,
#ff5500
);

color:white;
font-size:17px;
font-weight:bold;
cursor:pointer;
}

.note{
margin-top:20px;
font-size:14px;
color:#999;
}

</style>

</head>

<body>

<div class="box">

<div class="icon">
⏰
</div>

<div class="title">
انتهى وقت الطلب
</div>

<div class="text">

لم يتم العثور على سائق خلال الوقت المحدد

يمكنك إعادة المحاولة الآن

</div>

<button
class="btn"
onclick="retryOrder()">

إعادة الطلب 🚀

</button>

<div class="note">

شكراً لاستخدامك تطبيق عالسريع

</div>

</div>

<script>

function retryOrder(){

localStorage.removeItem(
"currentOrderId"
);

window.location.replace(
"home.html"
);

}

</script>

</body>

</html>
