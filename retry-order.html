<!-- retry-order.html -->

<!DOCTYPE html>
<html lang="ar" dir="rtl">

<head>

<meta charset="UTF-8">

<meta name="viewport"
content="width=device-width, initial-scale=1.0">

<title>
إعادة الطلب
</title>

<link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;500;600;700&display=swap"
rel="stylesheet">

<style>

*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:'Cairo',sans-serif;
}

body{

height:100vh;

display:flex;
align-items:center;
justify-content:center;

padding:20px;

background:
linear-gradient(
135deg,
#fff5ee,
#ffffff
);

overflow:hidden;

}

.retry-box{

width:100%;
max-width:420px;

background:white;

padding:35px 25px;

border-radius:30px;

text-align:center;

box-shadow:
0 10px 30px rgba(0,0,0,.08);

animation:showBox .4s ease;

}

@keyframes showBox{

from{

opacity:0;
transform:translateY(20px);

}

to{

opacity:1;
transform:translateY(0);

}

}

.retry-icon{

width:110px;
height:110px;

margin:0 auto 20px;

border-radius:50%;

display:flex;
align-items:center;
justify-content:center;

font-size:50px;
color:white;

background:
linear-gradient(
135deg,
#ff8800,
#ff5500
);

box-shadow:
0 10px 25px rgba(255,136,0,.25);

}

.retry-title{

font-size:30px;
font-weight:bold;

color:#ff5500;

margin-bottom:15px;

}

.retry-text{

font-size:18px;
line-height:2;

color:#666;

margin-bottom:30px;

}

.retry-btn{

width:100%;

padding:18px;

border:none;

border-radius:20px;

background:
linear-gradient(
135deg,
#ff8800,
#ff5500
);

color:white;

font-size:18px;
font-weight:bold;

cursor:pointer;

transition:.3s;

box-shadow:
0 5px 20px rgba(255,136,0,.3);

}

.retry-btn:hover{

transform:translateY(-2px);

}

.small-text{

margin-top:20px;

font-size:14px;

color:#999;

}

</style>

</head>

<body>

<div class="retry-box">

<div class="retry-icon">
⏰
</div>

<div class="retry-title">
انتهى وقت الطلب
</div>

<div class="retry-text">

لم يتم العثور على سائق خلال الوقت المحدد

يمكنك إعادة المحاولة مرة أخرى

</div>

<button
class="retry-btn"
onclick="retryOrder()">

إعادة الطلب 🚀

</button>

<div class="small-text">

شكراً لاستخدامك تطبيق عالسريع

</div>

</div>

<script>

const currentUser =
JSON.parse(localStorage.getItem("user"));

if(!currentUser){

window.location.replace(
"index.html"
);

}

function retryOrder(){

// حذف الطلب الحالي
localStorage.removeItem(
"currentOrderId"
);

// العودة للرئيسية
window.location.replace(
"home.html"
);

}

// منع الرجوع
history.pushState(
null,
null,
location.href
);

window.onpopstate =
function(){

history.pushState(
null,
null,
location.href
);

};

</script>

</body>

</html>
