<!-- offers.html -->

<!DOCTYPE html>
<html lang="ar" dir="rtl">

<head>

<meta charset="UTF-8">

<meta
name="viewport"
content="width=device-width, initial-scale=1.0">

<title>
العروض
</title>

<link
href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;500;700;800&display=swap"
rel="stylesheet">

<link
rel="stylesheet"
href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css"/>

<style>

*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:'Cairo',sans-serif;
}

body{
background:#f5f6fa;
padding-bottom:110px;
overflow-x:hidden;
}

.header{
background:
linear-gradient(
135deg,
#ff8800,
#ff5500
);

padding:25px 20px;
color:white;

border-bottom-left-radius:30px;
border-bottom-right-radius:30px;

box-shadow:0 8px 25px rgba(0,0,0,.12);
}

.header h1{
font-size:28px;
margin-bottom:8px;
}

.header p{
font-size:14px;
opacity:.95;
}

.container{
padding:15px;
display:flex;
flex-direction:column;
gap:18px;
}

.offer-card{
background:white;
border-radius:30px;
overflow:hidden;
box-shadow:0 5px 18px rgba(0,0,0,.06);
}

.offer-image{
width:100%;
height:210px;
object-fit:cover;
background:#eee;
}

.offer-content{
padding:20px;
}

.offer-top{
display:flex;
justify-content:space-between;
align-items:center;
margin-bottom:12px;
gap:12px;
}

.offer-title{
font-size:22px;
font-weight:bold;
color:#222;
}

.offer-badge{
padding:8px 14px;
border-radius:14px;
background:#ff8800;
color:white;
font-size:13px;
font-weight:bold;
}

.offer-description{
font-size:15px;
line-height:2;
color:#666;
margin-bottom:18px;
}

.offer-info{
display:grid;
grid-template-columns:1fr 1fr;
gap:12px;
margin-bottom:18px;
}

.info-box{
background:#fff7ef;
padding:15px;
border-radius:18px;
text-align:center;
}

.info-box h4{
font-size:13px;
margin-bottom:8px;
color:#777;
}

.info-box p{
font-size:17px;
font-weight:bold;
color:#222;
}

.offer-btn{
width:100%;
height:56px;
border:none;
border-radius:18px;

background:
linear-gradient(
135deg,
#00b894,
#00a383
);

color:white;
font-size:16px;
font-weight:bold;
cursor:pointer;
}

.empty{
padding:70px 20px;
text-align:center;
font-size:16px;
color:#777;
}

.empty i{
font-size:70px;
margin-bottom:20px;
color:#ff8800;
}

.bottom-bar{
position:fixed;
bottom:0;
left:0;
right:0;
height:82px;
background:white;
display:flex;
justify-content:space-around;
align-items:center;
box-shadow:0 -5px 18px rgba(0,0,0,.08);
}

.nav-item{
display:flex;
flex-direction:column;
align-items:center;
gap:5px;
font-size:13px;
font-weight:bold;
cursor:pointer;
color:#888;
}

.nav-item.active{
color:#ff8800;
}

.nav-item i{
font-size:22px;
}

@media(max-width:700px){

.offer-info{
grid-template-columns:1fr;
}

}

</style>

</head>

<body>

<div class="header">

<h1>
العروض
</h1>

<p>
أفضل الخصومات والعروض اليومية
</p>

</div>

<div
id="offersContainer"
class="container"></div>

<div class="bottom-bar">

<div
class="nav-item"
onclick="window.location.href='home.html'">

<i class="fa-solid fa-house"></i>

<span>
الرئيسية
</span>

</div>

<div class="nav-item active">

<i class="fa-solid fa-tags"></i>

<span>
العروض
</span>

</div>

<div
class="nav-item"
onclick="window.location.href='asca.html'">

<i class="fa-solid fa-user"></i>

<span>
الحساب
</span>

</div>

</div>

<script type="module">

import { db }
from "./config.js";

import {

ref,
onValue

}

from
"https://www.gstatic.com/firebasejs/12.13.0/firebase-database.js";

const container =
document.getElementById(
"offersContainer"
);

onValue(
ref(db,"offers"),
(snapshot)=>{

container.innerHTML = "";

if(!snapshot.exists()){

container.innerHTML = `

<div class="empty">

<i class="fa-solid fa-tags"></i>

<div>
لا توجد عروض حالياً
</div>

</div>

`;

return;

}

const offers =
Object.values(snapshot.val())
.sort(
(a,b)=>
b.createdAt - a.createdAt
);

offers.forEach(offer=>{

container.innerHTML += `

<div class="offer-card">

<img
src="${offer.image || 'banner.png'}"
class="offer-image"
onerror="this.src='banner.png'">

<div class="offer-content">

<div class="offer-top">

<div class="offer-title">

${offer.title || ""}

</div>

<div class="offer-badge">

خصم ${offer.discount || 0}%

</div>

</div>

<div class="offer-description">

${offer.description || ""}

</div>

<div class="offer-info">

<div class="info-box">

<h4>
السعر القديم
</h4>

<p>

${Number(offer.oldPrice || 0)
.toLocaleString()} د.ع

</p>

</div>

<div class="info-box">

<h4>
السعر الجديد
</h4>

<p>

${Number(offer.newPrice || 0)
.toLocaleString()} د.ع

</p>

</div>

</div>

<button
class="offer-btn"
onclick="openStore('${offer.storeId || ""}')">

عرض المتجر

</button>

</div>

</div>

`;

});

}
);

window.openStore =
function(storeId){

if(!storeId){
return;
}

window.location.href =
`home.html?store=${storeId}`;

};

</script>

</body>

</html>
