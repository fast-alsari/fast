<!DOCTYPE html>
<html lang="ar" dir="rtl">

<head>

<meta charset="UTF-8">

<meta
name="viewport"
content="width=device-width, initial-scale=1.0">

<title>
لوحة المتجر
</title>

<link
rel="stylesheet"
href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css"/>

<link
href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;500;600;700;800&display=swap"
rel="stylesheet">

<style>

*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:'Cairo',sans-serif;
}

body{
background:#f5f6fa;
padding-bottom:120px;
overflow-x:hidden;
}

.header{
background:
linear-gradient(
135deg,
#ff8800,
#ff5500
);

padding:24px;
color:white;

border-bottom-left-radius:30px;
border-bottom-right-radius:30px;
}

.header h1{
font-size:28px;
margin-bottom:8px;
}

.header p{
font-size:14px;
opacity:.9;
}

.stats{
display:grid;
grid-template-columns:1fr 1fr;
gap:15px;
padding:15px;
}

.stat-box{
background:white;
padding:20px;
border-radius:24px;
text-align:center;

box-shadow:
0 5px 18px rgba(0,0,0,.06);
}

.stat-box h2{
font-size:30px;
color:#ff6600;
margin-bottom:6px;
}

.products{
padding:15px;
display:flex;
flex-direction:column;
gap:15px;
}

.product-card{
background:white;
padding:18px;
border-radius:24px;

display:flex;
gap:14px;

box-shadow:
0 5px 18px rgba(0,0,0,.06);
}

.product-image{
width:100px;
height:100px;
border-radius:18px;
object-fit:cover;
background:#eee;
}

.product-content{
flex:1;
}

.product-name{
font-size:18px;
font-weight:bold;
margin-bottom:8px;
}

.product-price{
font-size:18px;
font-weight:bold;
color:#00b894;
margin-bottom:8px;
}

.product-desc{
font-size:13px;
color:#666;
line-height:1.8;
}

.add-btn{
position:fixed;
bottom:100px;
left:20px;

width:65px;
height:65px;

border:none;
border-radius:50%;

background:
linear-gradient(
135deg,
#00b894,
#00a383
);

color:white;
font-size:28px;

cursor:pointer;

box-shadow:
0 8px 20px rgba(0,0,0,.15);
}

.bottom-bar{
position:fixed;
bottom:0;
left:0;
right:0;
height:82px;

background:white;

display:flex;
justify-content:space-around;
align-items:center;

box-shadow:
0 -5px 18px rgba(0,0,0,.08);
}

.nav-item{
display:flex;
flex-direction:column;
align-items:center;
gap:5px;

font-size:13px;
font-weight:bold;

color:#888;
}

.nav-item.active{
color:#ff8800;
}

.nav-item i{
font-size:22px;
}

</style>

</head>

<body>

<div class="header">

<h1 id="storeName">
المتجر
</h1>

<p>
إدارة الطلبات والمنتجات
</p>

</div>

<div class="stats">

<div class="stat-box">

<h2 id="productsCount">
0
</h2>

<p>
المنتجات
</p>

</div>

<div class="stat-box">

<h2 id="ordersCount">
0
</h2>

<p>
الطلبات
</p>

</div>

</div>

<div
class="products"
id="productsContainer"></div>

<button
class="add-btn"
onclick="window.location.href='add-product.html'">

+

</button>

<div class="bottom-bar">

<div class="nav-item active">

<i class="fa-solid fa-store"></i>

<span>
المتجر
</span>

</div>

<div
class="nav-item"
onclick="logout()">

<i class="fa-solid fa-right-from-bracket"></i>

<span>
خروج
</span>

</div>

</div>

<script type="module">

import { db }
from "./firebase.js";

import {

ref,
onValue

}

from "https://www.gstatic.com/firebasejs/12.13.0/firebase-database.js";

const currentUser =
JSON.parse(
localStorage.getItem("user")
);

if(
!currentUser ||
currentUser.type !== "store"
){

window.location.replace(
"index.html"
);

}

document.getElementById(
"storeName"
).innerHTML =

currentUser.store_name ||
"المتجر";

const productsContainer =
document.getElementById(
"productsContainer"
);

onValue(
ref(
db,
"store_products/" + currentUser.id
),
(snapshot)=>{

productsContainer.innerHTML = "";

let total = 0;

if(snapshot.exists()){

const products =
snapshot.val();

for(let key in products){

const product =
products[key];

total++;

productsContainer.innerHTML += `

<div class="product-card">

<img
src="${product.image || 'product.png'}"
class="product-image">

<div class="product-content">

<div class="product-name">
${product.name || ""}
</div>

<div class="product-price">

${Number(product.price || 0)
.toLocaleString()} د.ع

</div>

<div class="product-desc">

${product.description || ""}

</div>

</div>

</div>

`;

}

}

document.getElementById(
"productsCount"
).innerHTML = total;

}
);

onValue(
ref(db,"orders"),
(snapshot)=>{

let total = 0;

if(snapshot.exists()){

const orders =
snapshot.val();

Object.values(orders)
.forEach(order=>{

if(
order.storesData &&
order.storesData.find(
s => s.storeId === currentUser.id
)
){

total++;

}

});

}

document.getElementById(
"ordersCount"
).innerHTML = total;

}
);

window.logout =
function(){

localStorage.clear();

window.location.replace(
"index.html"
);

};

</script>

</body>

</html>
