<!DOCTYPE html>
<html lang="ar" dir="rtl">

<head>

<meta charset="UTF-8">

<meta
name="viewport"
content="width=device-width, initial-scale=1.0">

<title>
الحساب الشخصي
</title>

<link
rel="stylesheet"
href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css"/>

<link
href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;500;600;700;800&display=swap"
rel="stylesheet">

<style>

*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:'Cairo',sans-serif;
}

body{
background:#f5f6fa;
padding-bottom:120px;
overflow-x:hidden;
}

.header{
background:
linear-gradient(
135deg,
#ff8800,
#ff5500
);

padding:30px 20px;
color:white;

border-bottom-left-radius:32px;
border-bottom-right-radius:32px;

text-align:center;
}

.user-image{
width:110px;
height:110px;
border-radius:50%;
object-fit:cover;
background:white;
padding:5px;
margin:auto auto 15px;
}

.user-name{
font-size:28px;
font-weight:bold;
margin-bottom:8px;
}

.user-phone{
font-size:15px;
opacity:.95;
}

.content{
padding:15px;
display:flex;
flex-direction:column;
gap:15px;
}

.card{
background:white;
padding:20px;
border-radius:28px;

box-shadow:
0 5px 18px rgba(0,0,0,.06);
}

.card-title{
font-size:18px;
font-weight:bold;
margin-bottom:18px;
color:#ff6600;

display:flex;
align-items:center;
gap:10px;
}

.info-line{
background:#f8f8f8;
padding:15px;
border-radius:18px;
margin-bottom:12px;
}

.info-label{
font-size:13px;
color:#777;
margin-bottom:5px;
}

.info-value{
font-size:16px;
font-weight:bold;
word-break:break-word;
}

.stats{
display:grid;
grid-template-columns:1fr 1fr;
gap:12px;
}

.stat-box{
background:#fff5ee;
padding:18px;
border-radius:20px;
text-align:center;
}

.stat-number{
font-size:28px;
font-weight:bold;
color:#ff6600;
margin-bottom:6px;
}

.stat-text{
font-size:13px;
color:#666;
}

.map-box{
width:100%;
height:260px;
border-radius:24px;
overflow:hidden;
margin-top:15px;
}

.map-box iframe{
width:100%;
height:100%;
border:none;
}

.logout-btn{
width:100%;
height:58px;
border:none;
border-radius:18px;

background:#e53935;

color:white;
font-size:16px;
font-weight:bold;
cursor:pointer;
}

.bottom-bar{
position:fixed;
bottom:0;
left:0;
right:0;
height:82px;
background:white;

display:flex;
justify-content:space-around;
align-items:center;

box-shadow:
0 -5px 18px rgba(0,0,0,.08);

z-index:9999;
}

.nav-item{
display:flex;
flex-direction:column;
align-items:center;
gap:5px;

font-size:13px;
font-weight:bold;

color:#888;
cursor:pointer;
}

.nav-item.active{
color:#ff8800;
}

.nav-item i{
font-size:22px;
}

</style>

</head>

<body>

<div class="header">

<img
src="user.png"
id="userImage"
class="user-image">

<div
class="user-name"
id="userName">

مستخدم

</div>

<div
class="user-phone"
id="userPhone">

0000000000

</div>

</div>

<div class="content">

<div class="card">

<div class="card-title">

<i class="fa-solid fa-user"></i>

معلومات الحساب

</div>

<div class="info-line">

<div class="info-label">
الاسم الكامل
</div>

<div
class="info-value"
id="fullName">

-

</div>

</div>

<div class="info-line">

<div class="info-label">
رقم الهاتف
</div>

<div
class="info-value"
id="phoneNumber">

-

</div>

</div>

<div class="info-line">

<div class="info-label">
العنوان
</div>

<div
class="info-value"
id="userAddress">

-

</div>

</div>

</div>

<div class="card">

<div class="card-title">

<i class="fa-solid fa-chart-column"></i>

الإحصائيات

</div>

<div class="stats">

<div class="stat-box">

<div
class="stat-number"
id="ordersCount">

0

</div>

<div class="stat-text">
كل الطلبات
</div>

</div>

<div class="stat-box">

<div
class="stat-number"
id="completedOrders">

0

</div>

<div class="stat-text">
طلبات مكتملة
</div>

</div>

<div class="stat-box">

<div
class="stat-number"
id="cancelledOrders">

0

</div>

<div class="stat-text">
طلبات ملغية
</div>

</div>

<div class="stat-box">

<div
class="stat-number"
id="totalSpent">

0

</div>

<div class="stat-text">
إجمالي الصرف
</div>

</div>

</div>

</div>

<div class="card">

<div class="card-title">

<i class="fa-solid fa-location-dot"></i>

موقعك الحالي

</div>

<div class="map-box">

<iframe
id="mapFrame"
loading="lazy">
</iframe>

</div>

</div>

<button
class="logout-btn"
onclick="logout()">

تسجيل الخروج

</button>

</div>

<div class="bottom-bar">

<div
class="nav-item"
onclick="window.location.href='home.html'">

<i class="fa-solid fa-house"></i>

<span>
الرئيسية
</span>

</div>

<div
class="nav-item"
onclick="window.location.href='cart.html'">

<i class="fa-solid fa-cart-shopping"></i>

<span>
السلة
</span>

</div>

<div class="nav-item active">

<i class="fa-solid fa-user"></i>

<span>
الحساب
</span>

</div>

</div>

<script type="module">

import { db }
from "./firebase.js";

import {
ref,
get,
onValue
}
from "https://www.gstatic.com/firebasejs/12.13.0/firebase-database.js";

const currentUser =
JSON.parse(
localStorage.getItem("user")
);

if(
!currentUser ||
!currentUser.id
){

window.location.replace(
"index.html"
);

}

document.getElementById(
"userName"
).innerHTML =
currentUser.name || "مستخدم";

document.getElementById(
"userPhone"
).innerHTML =
currentUser.phone || "";

document.getElementById(
"fullName"
).innerHTML =
currentUser.name || "";

document.getElementById(
"phoneNumber"
).innerHTML =
currentUser.phone || "";

document.getElementById(
"userAddress"
).innerHTML =
currentUser.address || "لا يوجد";

document.getElementById(
"userImage"
).src =
currentUser.image || "user.png";

const lat =
currentUser.userLat ||
localStorage.getItem("userLat");

const lng =
currentUser.userLng ||
localStorage.getItem("userLng");

if(lat && lng){

document.getElementById(
"mapFrame"
).src =

`https://maps.google.com/maps?q=${lat},${lng}&z=15&output=embed`;

}

onValue(
ref(db,"orders"),
(snapshot)=>{

let orders = 0;
let completed = 0;
let cancelled = 0;
let spent = 0;

if(snapshot.exists()){

const data =
snapshot.val();

Object.values(data)
.forEach(order=>{

if(
order.customerId === currentUser.id
){

orders++;

spent +=
Number(
order.totalPrice || 0
);

if(
order.status === "completed"
){
completed++;
}

if(
order.status === "cancelled"
){
cancelled++;
}

}

});

}

document.getElementById(
"ordersCount"
).innerHTML =
orders;

document.getElementById(
"completedOrders"
).innerHTML =
completed;

document.getElementById(
"cancelledOrders"
).innerHTML =
cancelled;

document.getElementById(
"totalSpent"
).innerHTML =

Number(spent)
.toLocaleString();

}
);

window.logout =
function(){

localStorage.clear();

sessionStorage.clear();

window.location.replace(
"index.html"
);

};

</script>

</body>

</html>
