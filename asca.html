<!-- asca.html -->

<!DOCTYPE html>
<html lang="ar" dir="rtl">

<head>

<meta charset="UTF-8">

<meta name="viewport"
content="width=device-width, initial-scale=1.0">

<title>
الحساب الشخصي
</title>

<link rel="stylesheet"
href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css"/>

<link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;500;600;700&display=swap"
rel="stylesheet">

<style>

*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:'Cairo',sans-serif;
}

body{
background:#f7f7f7;
padding-bottom:120px;
overflow-x:hidden;
}

.header{
background:linear-gradient(135deg,#ff8800,#ff5500);
padding:25px 20px;
border-bottom-left-radius:30px;
border-bottom-right-radius:30px;
color:white;
text-align:center;
}

.logo-box{
width:90px;
height:90px;
background:white;
border-radius:50%;
margin:auto;
display:flex;
align-items:center;
justify-content:center;
}

.logo-box img{
width:60px;
height:60px;
object-fit:contain;
}

.app-name{
font-size:28px;
font-weight:bold;
margin-top:15px;
}

.app-desc{
font-size:15px;
margin-top:8px;
opacity:.95;
}

.page-content{
padding:15px;
display:flex;
flex-direction:column;
gap:15px;
}

.card{
background:white;
padding:18px;
border-radius:24px;
box-shadow:0 5px 18px rgba(0,0,0,.06);
}

.card-title{
font-size:18px;
font-weight:bold;
margin-bottom:18px;
color:#ff6600;
display:flex;
align-items:center;
gap:8px;
}

.info-line{
background:#f7f7f7;
padding:14px;
border-radius:16px;
margin-bottom:12px;
}

.info-label{
font-size:13px;
color:#777;
margin-bottom:5px;
}

.info-value{
font-size:16px;
font-weight:bold;
word-break:break-word;
}

.stats-grid{
display:grid;
grid-template-columns:1fr 1fr;
gap:12px;
}

.stat-box{
background:#fff7ef;
padding:18px;
border-radius:18px;
text-align:center;
}

.stat-number{
font-size:24px;
font-weight:bold;
color:#ff6600;
margin-bottom:6px;
}

.stat-text{
font-size:13px;
color:#666;
}

.location-box{
overflow:hidden;
border-radius:20px;
margin-top:12px;
border:2px solid #eee;
}

.location-box iframe{
width:100%;
height:220px;
border:none;
}

.location-note{
margin-top:12px;
background:#fff7ef;
padding:14px;
border-radius:16px;
font-size:13px;
line-height:1.9;
color:#555;
}

.code-box{
display:flex;
gap:10px;
margin-top:15px;
}

.code-input{
flex:1;
height:55px;
border:none;
background:#f5f5f5;
border-radius:16px;
padding:0 15px;
font-size:18px;
font-weight:bold;
outline:none;
direction:ltr;
}

.copy-btn{
width:60px;
border:none;
border-radius:16px;
background:#ff8800;
color:white;
font-size:20px;
cursor:pointer;
}

.use-btn{
width:100%;
height:55px;
border:none;
border-radius:18px;
background:#00b894;
color:white;
font-size:16px;
font-weight:bold;
cursor:pointer;
margin-top:14px;
}

.logout-btn{
width:100%;
height:58px;
border:none;
border-radius:20px;
background:red;
color:white;
font-size:17px;
font-weight:bold;
cursor:pointer;
margin-top:10px;
}

.bottom-bar{
position:fixed;
bottom:0;
left:0;
right:0;
height:82px;
background:white;
display:flex;
justify-content:space-around;
align-items:center;
box-shadow:0 -5px 18px rgba(0,0,0,.08);
z-index:1000;
}

.nav-item{
display:flex;
flex-direction:column;
align-items:center;
color:#888;
cursor:pointer;
}

.nav-item.active{
color:#ff8800;
}

.nav-item i{
font-size:21px;
margin-bottom:5px;
}

</style>

</head>

<body>

<div class="header">

<div class="logo-box">

<img src="Logo.png">

</div>

<div class="app-name">
عالسريع
</div>

<div class="app-desc">
نوصلك طلبك بأقل من ساعة 🚀
</div>

</div>

<div class="page-content">

<!-- بيانات الحساب -->

<div class="card">

<div class="card-title">

<i class="fa-solid fa-user"></i>

بيانات الحساب

</div>

<div class="info-line">

<div class="info-label">
الاسم
</div>

<div
class="info-value"
id="userName">

...

</div>

</div>

<div class="info-line">

<div class="info-label">
رقم الهاتف
</div>

<div
class="info-value"
id="userPhone">

...

</div>

</div>

<div class="info-line">

<div class="info-label">
نوع الحساب
</div>

<div
class="info-value"
id="userType">

...

</div>

</div>

</div>

<!-- الاحصائيات -->

<div class="card">

<div class="card-title">

<i class="fa-solid fa-chart-column"></i>

الإحصائيات

</div>

<div class="stats-grid">

<div class="stat-box">

<div
class="stat-number"
id="allOrders">

0

</div>

<div class="stat-text">
كل الطلبات
</div>

</div>

<div class="stat-box">

<div
class="stat-number"
id="activeOrders">

0

</div>

<div class="stat-text">
طلبات نشطة
</div>

</div>

<div class="stat-box">

<div
class="stat-number"
id="cancelledOrders">

0

</div>

<div class="stat-text">
طلبات ملغية
</div>

</div>

<div class="stat-box">

<div
class="stat-number"
id="completedOrders">

0

</div>

<div class="stat-text">
طلبات مكتملة
</div>

</div>

</div>

</div>

<!-- الموقع -->

<div class="card">

<div class="card-title">

<i class="fa-solid fa-location-dot"></i>

موقعك

</div>

<div class="location-box">

<iframe
id="mapFrame"
loading="lazy">
</iframe>

</div>

<div class="location-note">

هذا الموقع لا يظهر إلا أثناء الطلب فقط

</div>

</div>

<!-- الدعوات -->

<div class="card">

<div class="card-title">

<i class="fa-solid fa-gift"></i>

الدعوات

</div>

<div class="info-line">

<div class="info-label">
كود الدعوة الخاص بك
</div>

<div style="
display:flex;
gap:10px;
margin-top:10px;
">

<input
type="text"
readonly
id="inviteCode"
class="code-input">

<button
class="copy-btn"
onclick="copyInviteCode()">

<i class="fa-solid fa-copy"></i>

</button>

</div>

</div>

<div class="code-box">

<input
type="text"
id="giftCode"
class="code-input"
placeholder="ادخل كود الدعوة">

<button
class="copy-btn"
onclick="pasteCode()">

<i class="fa-solid fa-paste"></i>

</button>

</div>

<button
class="use-btn"
onclick="useInviteCode()">

استخدام الكود

</button>

</div>

<button
class="logout-btn"
onclick="logout()">

تسجيل الخروج

</button>

</div>

<!-- البار السفلي -->

<div class="bottom-bar">

<div
class="nav-item"
onclick="window.location.href='home.html'">

<i class="fa-solid fa-house"></i>

<span>
الرئيسية
</span>

</div>

<div
class="nav-item"
onclick="window.location.href='cart.html'">

<i class="fa-solid fa-cart-shopping"></i>

<span>
السلة
</span>

</div>

<div class="nav-item active">

<i class="fa-solid fa-user"></i>

<span>
الحساب
</span>

</div>

</div>

<script type="module">

import { initializeApp }
from "https://www.gstatic.com/firebasejs/12.13.0/firebase-app.js";

import {

getDatabase,
ref,
get,
update,
onValue

}

from "https://www.gstatic.com/firebasejs/12.13.0/firebase-database.js";

const firebaseConfig = {

apiKey:"AIzaSyC7QzQTYMSGRV_nraJBneBqDqYGhugF0Pw",

authDomain:"fast-937c9.firebaseapp.com",

projectId:"fast-937c9",

databaseURL:
"https://fast-937c9-default-rtdb.europe-west1.firebasedatabase.app"

};

const app =
initializeApp(firebaseConfig);

const database =
getDatabase(app);

const currentUser =
JSON.parse(localStorage.getItem("user"));

if(
!currentUser ||
!currentUser.id
){

localStorage.clear();
sessionStorage.clear();

window.location.href =
"index.html";

}

// تحميل المستخدم

async function loadUser(){

const snapshot =
await get(
ref(database,"users/" + currentUser.id)
);

if(!snapshot.exists()){

localStorage.clear();
sessionStorage.clear();

window.location.href =
"index.html";

return;

}

const user =
snapshot.val();

localStorage.setItem(
"user",
JSON.stringify(user)
);

document.getElementById("userName")
.innerHTML =
user.name || "";

document.getElementById("userPhone")
.innerHTML =
user.phone || "";

document.getElementById("userType")
.innerHTML =
user.type || "";

document.getElementById("inviteCode")
.value =
user.id || "";

// الموقع

if(
user.location &&
user.location.latitude &&
user.location.longitude
){

document.getElementById("mapFrame")
.src =

`https://maps.google.com/maps?q=${user.location.latitude},${user.location.longitude}&z=15&output=embed`;

}

}

loadUser();

// الاحصائيات

onValue(
ref(database,"orders"),
(snapshot)=>{

let all = 0;
let active = 0;
let cancelled = 0;
let completed = 0;

if(snapshot.exists()){

const orders =
snapshot.val();

Object.values(orders)
.forEach(order=>{

if(
order.customer &&
order.customer.id === currentUser.id
){

all++;

if(
[
"waiting_driver",
"accepted",
"preparing_order",
"on_the_way",
"arrived"
]
.includes(order.status)
){

active++;

}

if(
[
"cancelled",
"rejected",
"failed_no_driver"
]
.includes(order.status)
){

cancelled++;

}

if(
[
"completed",
"delivered"
]
.includes(order.status)
){

completed++;

}

}

});

}

document.getElementById("allOrders")
.innerHTML = all;

document.getElementById("activeOrders")
.innerHTML = active;

document.getElementById("cancelledOrders")
.innerHTML = cancelled;

document.getElementById("completedOrders")
.innerHTML = completed;

}
);

// نسخ الكود

window.copyInviteCode =
async function(){

try{

await navigator.clipboard.writeText(
document.getElementById("inviteCode").value
);

alert("تم النسخ");

}catch{

alert("فشل النسخ");

}

};

// لصق

window.pasteCode =
async function(){

try{

const text =
await navigator.clipboard.readText();

document.getElementById("giftCode")
.value = text;

}catch{

alert("فشل اللصق");

}

};

// استخدام الكود

window.useInviteCode =
async function(){

const code =
document.getElementById("giftCode")
.value
.trim();

if(!code){

alert("ادخل الكود");

return;

}

if(code === currentUser.id){

alert("لا يمكنك استخدام كودك");

return;

}

const myRef =
ref(database,"users/" + currentUser.id);

const mySnapshot =
await get(myRef);

if(!mySnapshot.exists()){
return;
}

const myUser =
mySnapshot.val();

if(myUser.usedInviteCode){

alert("لقد استخدمت كود مسبقاً");

return;

}

const inviterRef =
ref(database,"users/" + code);

const inviterSnapshot =
await get(inviterRef);

if(!inviterSnapshot.exists()){

alert("الكود غير صحيح");

return;

}

await update(myRef,{

freeDelivery:true,

usedInviteCode:true,

invitedBy:code

});

alert("تم تفعيل التوصيلة المجانية 🎉");

document.getElementById("giftCode")
.value = "";

};

// تسجيل خروج

window.logout =
function(){

localStorage.clear();

sessionStorage.clear();

window.location.href =
"index.html";

};

</script>

</body>

</html>
