<!-- search.html -->

<!DOCTYPE html>
<html lang="ar" dir="rtl">

<head>

<meta charset="UTF-8">

<meta
name="viewport"
content="width=device-width, initial-scale=1.0">

<title>
البحث
</title>

<link
href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;500;700;800&display=swap"
rel="stylesheet">

<link
rel="stylesheet"
href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css"/>

<style>

*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:'Cairo',sans-serif;
}

body{
background:#f5f6fa;
padding-bottom:110px;
overflow-x:hidden;
}

.header{
background:
linear-gradient(
135deg,
#ff8800,
#ff5500
);

padding:25px 20px;
color:white;

border-bottom-left-radius:30px;
border-bottom-right-radius:30px;

box-shadow:0 8px 25px rgba(0,0,0,.12);
}

.header h1{
font-size:28px;
margin-bottom:8px;
}

.header p{
font-size:14px;
opacity:.95;
}

.search-box{
margin-top:20px;
background:white;
padding:15px 18px;
border-radius:20px;
display:flex;
align-items:center;
gap:12px;
}

.search-box i{
font-size:20px;
color:#ff8800;
}

.search-box input{
flex:1;
border:none;
outline:none;
font-size:16px;
background:transparent;
}

.container{
padding:15px;
display:flex;
flex-direction:column;
gap:16px;
}

.result-card{
background:white;
padding:16px;
border-radius:28px;
display:flex;
align-items:center;
gap:15px;
box-shadow:0 5px 18px rgba(0,0,0,.06);
cursor:pointer;
transition:.2s;
}

.result-card:hover{
transform:translateY(-2px);
}

.result-image{
width:90px;
height:90px;
border-radius:22px;
object-fit:cover;
background:#eee;
}

.result-info{
flex:1;
}

.result-name{
font-size:18px;
font-weight:bold;
margin-bottom:8px;
color:#222;
}

.result-category{
font-size:14px;
color:#666;
margin-bottom:10px;
}

.result-price{
font-size:15px;
font-weight:bold;
color:#ff8800;
}

.result-type{
display:inline-block;
margin-top:10px;
padding:7px 12px;
border-radius:12px;
background:#fff3e0;
font-size:12px;
font-weight:bold;
color:#ff6600;
}

.empty{
padding:70px 20px;
text-align:center;
font-size:16px;
color:#777;
}

.empty i{
font-size:75px;
margin-bottom:20px;
color:#ff8800;
}

.bottom-bar{
position:fixed;
bottom:0;
left:0;
right:0;
height:82px;
background:white;
display:flex;
justify-content:space-around;
align-items:center;
box-shadow:0 -5px 18px rgba(0,0,0,.08);
}

.nav-item{
display:flex;
flex-direction:column;
align-items:center;
gap:5px;
font-size:13px;
font-weight:bold;
cursor:pointer;
color:#888;
}

.nav-item.active{
color:#ff8800;
}

.nav-item i{
font-size:22px;
}

</style>

</head>

<body>

<div class="header">

<h1>
البحث
</h1>

<p>
ابحث عن المنتجات والمتاجر
</p>

<div class="search-box">

<i class="fa-solid fa-magnifying-glass"></i>

<input
type="text"
id="searchInput"
placeholder="ابحث هنا...">

</div>

</div>

<div
id="resultsContainer"
class="container"></div>

<div class="bottom-bar">

<div
class="nav-item"
onclick="window.location.href='home.html'">

<i class="fa-solid fa-house"></i>

<span>
الرئيسية
</span>

</div>

<div class="nav-item active">

<i class="fa-solid fa-magnifying-glass"></i>

<span>
البحث
</span>

</div>

<div
class="nav-item"
onclick="window.location.href='asca.html'">

<i class="fa-solid fa-user"></i>

<span>
الحساب
</span>

</div>

</div>

<script type="module">

import { db }
from "./config.js";

import {

ref,
get

}

from
"https://www.gstatic.com/firebasejs/12.13.0/firebase-database.js";

const resultsContainer =
document.getElementById(
"resultsContainer"
);

const searchInput =
document.getElementById(
"searchInput"
);

let stores = [];
let products = [];

// =====================
// تحميل البيانات
// =====================

async function loadData(){

// المتاجر

const storesSnapshot =
await get(
ref(db,"stores")
);

if(storesSnapshot.exists()){

const storesData =
storesSnapshot.val();

for(let key in storesData){

stores.push({

id:key,

type:"store",

name:
storesData[key].store_name || "",

category:
storesData[key].category || "",

image:
storesData[key].store_image || "",

data:
storesData[key]

});

}

}

// المنتجات

const productsSnapshot =
await get(
ref(db,"store_products")
);

if(productsSnapshot.exists()){

const allProducts =
productsSnapshot.val();

for(let storeId in allProducts){

const storeProducts =
allProducts[storeId];

for(let productId in storeProducts){

const product =
storeProducts[productId];

products.push({

id:productId,

storeId:storeId,

type:"product",

name:
product.name || "",

category:
product.category || "",

price:
product.price || 0,

image:
product.image || "",

data:product

});

}

}

}

renderEmpty();

}

loadData();

// =====================
// البحث
// =====================

searchInput.addEventListener(
"input",
function(){

const value =
this.value
.toLowerCase()
.trim();

if(!value){

renderEmpty();
return;

}

const filteredStores =
stores.filter(item=>

item.name
.toLowerCase()
.includes(value)

||

item.category
.toLowerCase()
.includes(value)

);

const filteredProducts =
products.filter(item=>

item.name
.toLowerCase()
.includes(value)

||

item.category
.toLowerCase()
.includes(value)

);

renderResults([
...filteredStores,
...filteredProducts
]);

}
);

// =====================
// عرض النتائج
// =====================

function renderResults(results){

resultsContainer.innerHTML = "";

if(results.length === 0){

resultsContainer.innerHTML = `

<div class="empty">

<i class="fa-solid fa-magnifying-glass"></i>

<div>
لا توجد نتائج
</div>

</div>

`;

return;

}

results.forEach(item=>{

resultsContainer.innerHTML += `

<div
class="result-card"
onclick="openItem(
'${item.type}',
'${item.storeId || item.id}'
)">

<img
src="${item.image || 'product.png'}"
class="result-image"
onerror="this.src='product.png'">

<div class="result-info">

<div class="result-name">

${item.name || ""}

</div>

<div class="result-category">

${item.category || ""}

</div>

${item.type === "product"

?

`

<div class="result-price">

${Number(item.price || 0)
.toLocaleString()} د.ع

</div>

`

:

``

}

<div class="result-type">

${item.type === "store"
?
"متجر"
:
"منتج"}

</div>

</div>

</div>

`;

});

}

// =====================
// بدون نتائج
// =====================

function renderEmpty(){

resultsContainer.innerHTML = `

<div class="empty">

<i class="fa-solid fa-magnifying-glass"></i>

<div>
ابدأ بالبحث عن متجر أو منتج
</div>

</div>

`;

}

// =====================
// فتح العنصر
// =====================

window.openItem =
function(type,id){

if(type === "store"){

window.location.href =
`home.html?store=${id}`;

return;

}

window.location.href =
`home.html?store=${id}`;

};

</script>

</body>

</html>
