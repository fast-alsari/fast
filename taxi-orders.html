<!-- taxi-orders.html -->

<!DOCTYPE html>
<html lang="ar" dir="rtl">

<head>

<meta charset="UTF-8">

<meta
name="viewport"
content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">

<title>
طلبات التكسي
</title>

<link
rel="stylesheet"
href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css"/>

<link
rel="stylesheet"
href="https://unpkg.com/leaflet/dist/leaflet.css"/>

<link
rel="stylesheet"
href="https://unpkg.com/leaflet-routing-machine/dist/leaflet-routing-machine.css"/>

<link
href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;500;700;800&display=swap"
rel="stylesheet">

<script src="https://unpkg.com/leaflet/dist/leaflet.js"></script>

<script src="https://unpkg.com/leaflet-routing-machine/dist/leaflet-routing-machine.js"></script>

<style>

*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:'Cairo',sans-serif;
-webkit-tap-highlight-color:transparent;
}

body{
background:#f5f6fa;
padding-bottom:110px;
overflow-x:hidden;
}

.header{
background:linear-gradient(135deg,#ff8800,#ff5500);
padding:24px 20px;
color:white;
border-bottom-left-radius:30px;
border-bottom-right-radius:30px;
box-shadow:0 8px 25px rgba(0,0,0,.12);
}

.header-top{
display:flex;
justify-content:space-between;
align-items:center;
}

.driver-box{
display:flex;
align-items:center;
gap:12px;
}

.driver-image{
width:72px;
height:72px;
border-radius:50%;
object-fit:cover;
border:3px solid white;
background:white;
}

.driver-name{
font-size:22px;
font-weight:bold;
margin-bottom:5px;
}

.driver-phone{
font-size:14px;
opacity:.9;
}

.online-btn{
margin-top:18px;
width:100%;
padding:15px;
border:none;
border-radius:18px;
background:white;
color:#00b894;
font-size:15px;
font-weight:bold;
cursor:pointer;
}

.orders-container{
padding:15px;
display:flex;
flex-direction:column;
gap:18px;
}

.order-card{
background:white;
padding:18px;
border-radius:28px;
box-shadow:0 5px 18px rgba(0,0,0,.06);
}

.order-top{
display:flex;
justify-content:space-between;
align-items:center;
margin-bottom:15px;
}

.order-price{
font-size:28px;
font-weight:bold;
color:#00b894;
}

.order-status{
padding:8px 14px;
border-radius:14px;
font-size:13px;
font-weight:bold;
background:#fff4e8;
color:#ff6600;
}

.customer-box{
background:#f8f8f8;
padding:15px;
border-radius:18px;
margin-bottom:15px;
}

.customer-box h3{
margin-bottom:6px;
}

.customer-box p{
font-size:14px;
color:#666;
margin-bottom:5px;
}

.map-box{
width:100%;
height:300px;
border-radius:22px;
overflow:hidden;
margin-bottom:15px;
}

.actions{
display:flex;
flex-wrap:wrap;
gap:10px;
}

.actions button,
.actions a{
flex:1;
padding:15px;
border:none;
border-radius:18px;
font-size:14px;
font-weight:bold;
cursor:pointer;
text-align:center;
text-decoration:none;
color:white;
}

.accept-btn{
background:#00b894;
}

.finish-btn{
background:#ff8800;
}

.reject-btn{
background:#e53935;
}

.whatsapp-btn{
background:#25D366;
}

.empty{
padding:60px 20px;
text-align:center;
font-size:16px;
color:#777;
}

.bottom-bar{
position:fixed;
bottom:0;
left:0;
right:0;
height:82px;
background:white;
display:flex;
justify-content:space-around;
align-items:center;
box-shadow:0 -5px 18px rgba(0,0,0,.08);
z-index:9999;
}

.nav-item{
display:flex;
flex-direction:column;
align-items:center;
gap:5px;
font-size:13px;
font-weight:bold;
color:#888;
cursor:pointer;
}

.nav-item.active{
color:#ff8800;
}

.nav-item i{
font-size:22px;
}

</style>

</head>

<body>

<div class="header">

<div class="header-top">

<div class="driver-box">

<img
src="user.png"
id="driverImage"
class="driver-image">

<div>

<div
class="driver-name"
id="driverName">

سائق التكسي

</div>

<div
class="driver-phone"
id="driverPhone">

000000000

</div>

</div>

</div>

</div>

<button
class="online-btn"
id="onlineBtn">

متصل الآن

</button>

</div>

<div
class="orders-container"
id="ordersContainer"></div>

<div class="bottom-bar">

<div class="nav-item active">

<i class="fa-solid fa-taxi"></i>

<span>
الطلبات
</span>

</div>

<div
class="nav-item"
onclick="window.location.href='taxi-history.html'">

<i class="fa-solid fa-clock-rotate-left"></i>

<span>
السجل
</span>

</div>

<div
class="nav-item"
onclick="window.location.href='taxi-account.html'">

<i class="fa-solid fa-user"></i>

<span>
الحساب
</span>

</div>

</div>

<script type="module">

import { db }
from "./firebase.js";

import {

ref,
onValue,
update

}

from
"https://www.gstatic.com/firebasejs/12.13.0/firebase-database.js";

const currentUser =
JSON.parse(
localStorage.getItem("user")
);

if(
!currentUser ||
currentUser.type !== "taxi"
){

window.location.replace(
"index.html"
);

}

document.getElementById(
"driverName"
).innerHTML =
currentUser.name || "";

document.getElementById(
"driverPhone"
).innerHTML =
currentUser.phone || "";

document.getElementById(
"driverImage"
).src =
currentUser.image || "user.png";

let driverLat = null;
let driverLng = null;

navigator.geolocation.watchPosition(

(position)=>{

driverLat =
position.coords.latitude;

driverLng =
position.coords.longitude;

update(
ref(db,"taxis/" + currentUser.id),
{

latitude:driverLat,
longitude:driverLng,
isOnline:true,
lastSeen:Date.now()

}
);

}

);

const ordersContainer =
document.getElementById(
"ordersContainer"
);

onValue(
ref(db,"taxi_orders"),
(snapshot)=>{

ordersContainer.innerHTML = "";

if(!snapshot.exists()){

ordersContainer.innerHTML = `
<div class="empty">
لا توجد طلبات
</div>
`;

return;

}

const orders =
snapshot.val();

const filtered =
Object.values(orders)
.filter(order =>

order.status === "waiting"

||

order.driverId === currentUser.id

)

.sort((a,b)=>

b.createdAt - a.createdAt

);

if(filtered.length === 0){

ordersContainer.innerHTML = `
<div class="empty">
لا توجد طلبات حالياً
</div>
`;

return;

}

filtered.forEach(order=>{

ordersContainer.innerHTML += `

<div class="order-card">

<div class="order-top">

<div class="order-status">

${getStatusText(order.status)}

</div>

<div class="order-price">

${Number(order.finalPrice || 0)
.toLocaleString()} د.ع

</div>

</div>

<div class="customer-box">

<h3>
${order.customerName || ""}
</h3>

<p>
📞 ${order.customerPhone || ""}
</p>

<p>
👥 ${order.personsCount || 1} أشخاص
</p>

<p>
🎁 ${Number(order.tip || 0)
.toLocaleString()} د.ع
</p>

</div>

<div
class="map-box"
id="map_${order.id}"></div>

<div class="actions">

${order.status === "waiting"

?

`

<button
class="accept-btn"
onclick="acceptOrder('${order.id}')">

قبول الطلب

</button>

`

:

`

<a
href="https://wa.me/${order.customerPhone}"
target="_blank"
class="whatsapp-btn">

واتساب

</a>

<button
class="finish-btn"
onclick="finishOrder('${order.id}')">

تم التوصيل

</button>

<button
class="reject-btn"
onclick="cancelOrder('${order.id}')">

رفض الزبون

</button>

`

}

</div>

</div>

`;

setTimeout(()=>{

createMap(order);

},100);

});

});

function createMap(order){

const map =
L.map(
`map_${order.id}`
).setView(
[
order.pickupLat,
order.pickupLng
],
13
);

L.tileLayer(
'https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png',
{
maxZoom:19
}
).addTo(map);

const routing =
L.Routing.control({

waypoints:[

L.latLng(
order.pickupLat,
order.pickupLng
),

L.latLng(
order.destinationLat,
order.destinationLng
)

],

routeWhileDragging:false,
addWaypoints:false,
draggableWaypoints:false,
fitSelectedRoutes:true,
show:false,

lineOptions:{
styles:[
{
color:"#2563eb",
weight:6
}
]
},

createMarker:function(i,waypoint){

if(i === 0){

return L.marker(
waypoint.latLng
).bindPopup(
"موقع الزبون"
);

}

return L.marker(
waypoint.latLng
).bindPopup(
"مكان التوصيل"
);

}

}).addTo(map);

}

window.acceptOrder =
async function(orderId){

await update(
ref(db,"taxi_orders/" + orderId),
{

status:"accepted",

driverId:
currentUser.id,

driverName:
currentUser.name,

driverPhone:
currentUser.phone,

driverImage:
currentUser.image || "",

acceptedAt:
Date.now()

}
);

};

window.finishOrder =
async function(orderId){

await update(
ref(db,"taxi_orders/" + orderId),
{

status:"completed",

completedAt:
Date.now()

}
);

};

window.cancelOrder =
async function(orderId){

await update(
ref(db,"taxi_orders/" + orderId),
{

status:"cancelled_by_customer",

cancelledAt:
Date.now()

}
);

};

function getStatusText(status){

if(status === "waiting"){
return "بانتظار سائق";
}

if(status === "accepted"){
return "تم قبول الطلب";
}

if(status === "completed"){
return "تم التوصيل";
}

if(status === "cancelled_by_customer"){
return "رفض الزبون";
}

return status;

}

</script>

</body>

</html>
