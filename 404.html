<!DOCTYPE html>
<html lang="ar" dir="rtl">

<head>

<meta charset="UTF-8">

<meta name="viewport"
content="width=device-width, initial-scale=1.0">

<title>
404
</title>

<link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;500;700;800&display=swap"
rel="stylesheet">

<style>

*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:'Cairo',sans-serif;
}

body{

background:
linear-gradient(
135deg,
#fff5ee,
#ffffff
);

height:100vh;

display:flex;
align-items:center;
justify-content:center;

padding:20px;

overflow:hidden;

}

.box{

width:100%;
max-width:450px;

background:white;

padding:40px 25px;

border-radius:35px;

text-align:center;

box-shadow:
0 10px 35px rgba(0,0,0,.08);

animation:show .4s ease;

}

@keyframes show{

from{
opacity:0;
transform:translateY(30px);
}

to{
opacity:1;
transform:translateY(0);
}

}

.error-number{

font-size:100px;
font-weight:800;

background:
linear-gradient(
135deg,
#ff8800,
#ff5500
);

-webkit-background-clip:text;
-webkit-text-fill-color:transparent;

line-height:1;

margin-bottom:15px;

}

.title{

font-size:28px;
font-weight:bold;

color:#222;

margin-bottom:15px;

}

.text{

font-size:16px;

line-height:2;

color:#666;

margin-bottom:30px;

}

.home-btn{

width:100%;

height:58px;

border:none;

border-radius:20px;

background:
linear-gradient(
135deg,
#ff8800,
#ff5500
);

color:white;

font-size:18px;
font-weight:bold;

cursor:pointer;

transition:.3s;

box-shadow:
0 8px 20px rgba(255,136,0,.25);

}

.home-btn:hover{

transform:translateY(-2px);

}

</style>

</head>

<body>

<div class="box">

<div class="error-number">
404
</div>

<div class="title">
الصفحة غير موجودة
</div>

<div class="text">

عذراً، الصفحة التي تحاول الوصول إليها غير متوفرة حالياً أو تم حذفها.

</div>

<button
class="home-btn"
onclick="goHome()">

العودة للرئيسية

</button>

</div>

<script>

function goHome(){

window.location.href =
"index.html";

}

</script>

</body>

</html>
