<!-- admin-notifications.html -->

<!DOCTYPE html>
<html lang="ar" dir="rtl">

<head>

<meta charset="UTF-8">

<meta
name="viewport"
content="width=device-width, initial-scale=1.0">

<title>
الإشعارات
</title>

<link
href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;500;700;800&display=swap"
rel="stylesheet">

<link
rel="stylesheet"
href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css"/>

<style>

*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:'Cairo',sans-serif;
}

body{
background:#f5f6fa;
padding-bottom:110px;
overflow-x:hidden;
}

.header{
background:
linear-gradient(
135deg,
#ff8800,
#ff5500
);

padding:25px 20px;
color:white;

border-bottom-left-radius:30px;
border-bottom-right-radius:30px;

box-shadow:0 8px 25px rgba(0,0,0,.12);
}

.header h1{
font-size:28px;
margin-bottom:8px;
}

.header p{
font-size:14px;
opacity:.95;
}

.container{
padding:15px;
display:flex;
flex-direction:column;
gap:18px;
}

.card{
background:white;
padding:20px;
border-radius:28px;
box-shadow:0 5px 18px rgba(0,0,0,.06);
}

.card-title{
font-size:20px;
font-weight:bold;
margin-bottom:18px;
color:#333;
}

.input-group{
margin-bottom:16px;
}

.input-group label{
display:block;
margin-bottom:8px;
font-size:14px;
font-weight:bold;
color:#444;
}

.input-group input,
.input-group textarea,
.input-group select{

width:100%;
border:none;
outline:none;

background:#f7f7f7;

padding:16px;
border-radius:18px;

font-size:15px;
resize:none;

}

textarea{
height:140px;
}

.send-btn{
width:100%;
height:58px;
border:none;
border-radius:20px;

background:
linear-gradient(
135deg,
#00b894,
#00a383
);

color:white;
font-size:16px;
font-weight:bold;
cursor:pointer;
}

.notifications-list{
display:flex;
flex-direction:column;
gap:15px;
}

.notification-item{
background:#fff8f1;
padding:18px;
border-radius:22px;
border-right:5px solid #ff8800;
}

.notification-top{
display:flex;
justify-content:space-between;
align-items:center;
margin-bottom:10px;
gap:10px;
}

.notification-title{
font-size:18px;
font-weight:bold;
color:#222;
}

.notification-date{
font-size:12px;
color:#777;
}

.notification-message{
font-size:14px;
line-height:2;
color:#555;
margin-bottom:12px;
}

.notification-target{
display:inline-block;
padding:8px 14px;
border-radius:14px;
background:#ff8800;
color:white;
font-size:12px;
font-weight:bold;
}

.empty{
padding:50px 20px;
text-align:center;
font-size:16px;
color:#777;
}

.bottom-bar{
position:fixed;
bottom:0;
left:0;
right:0;
height:82px;
background:white;
display:flex;
justify-content:space-around;
align-items:center;
box-shadow:0 -5px 18px rgba(0,0,0,.08);
}

.nav-item{
display:flex;
flex-direction:column;
align-items:center;
gap:5px;
font-size:13px;
font-weight:bold;
cursor:pointer;
color:#888;
}

.nav-item.active{
color:#ff8800;
}

.nav-item i{
font-size:22px;
}

</style>

</head>

<body>

<div class="header">

<h1>
الإشعارات
</h1>

<p>
إرسال إشعارات وتنبيهات للمستخدمين
</p>

</div>

<div class="container">

<div class="card">

<div class="card-title">
إرسال إشعار جديد
</div>

<div class="input-group">

<label>
عنوان الإشعار
</label>

<input
type="text"
id="notificationTitle"
placeholder="مثال : عروض جديدة">

</div>

<div class="input-group">

<label>
نص الإشعار
</label>

<textarea
id="notificationMessage"
placeholder="اكتب نص الإشعار هنا..."></textarea>

</div>

<div class="input-group">

<label>
إرسال إلى
</label>

<select id="notificationTarget">

<option value="all">
كل المستخدمين
</option>

<option value="customers">
الزبائن
</option>

<option value="drivers">
السواق
</option>

<option value="stores">
المتاجر
</option>

<option value="taxis">
سواق التكسي
</option>

</select>

</div>

<button
class="send-btn"
onclick="sendNotification()">

إرسال الإشعار

</button>

</div>

<div class="card">

<div class="card-title">
آخر الإشعارات
</div>

<div
id="notificationsList"
class="notifications-list"></div>

</div>

</div>

<div class="bottom-bar">

<div
class="nav-item"
onclick="window.location.href='admin-orders.html'">

<i class="fa-solid fa-box"></i>

<span>
الطلبات
</span>

</div>

<div
class="nav-item"
onclick="window.location.href='admin-users.html'">

<i class="fa-solid fa-users"></i>

<span>
المستخدمين
</span>

</div>

<div class="nav-item active">

<i class="fa-solid fa-bell"></i>

<span>
الإشعارات
</span>

</div>

</div>

<script type="module">

import { db }
from "./config.js";

import {

ref,
push,
set,
onValue

}

from
"https://www.gstatic.com/firebasejs/12.13.0/firebase-database.js";

// =====================
// ارسال اشعار
// =====================

window.sendNotification =
async function(){

const title =
document.getElementById(
"notificationTitle"
).value.trim();

const message =
document.getElementById(
"notificationMessage"
).value.trim();

const target =
document.getElementById(
"notificationTarget"
).value;

if(!title || !message){

alert("املأ جميع الحقول");
return;

}

const notificationRef =
push(
ref(db,"notifications")
);

await set(notificationRef,{

id:notificationRef.key,

title:title,

message:message,

target:target,

createdAt:Date.now(),

createdDate:
new Date().toLocaleDateString("ar-EG"),

createdTime:
new Date().toLocaleTimeString("ar-EG")

});

document.getElementById(
"notificationTitle"
).value = "";

document.getElementById(
"notificationMessage"
).value = "";

alert("تم إرسال الإشعار");

};

// =====================
// عرض الاشعارات
// =====================

onValue(
ref(db,"notifications"),
(snapshot)=>{

const container =
document.getElementById(
"notificationsList"
);

container.innerHTML = "";

if(!snapshot.exists()){

container.innerHTML = `
<div class="empty">
لا توجد إشعارات
</div>
`;

return;

}

const notifications =
Object.values(snapshot.val())
.sort(
(a,b)=>
b.createdAt - a.createdAt
);

notifications.forEach(item=>{

container.innerHTML += `

<div class="notification-item">

<div class="notification-top">

<div class="notification-title">
${item.title || ""}
</div>

<div class="notification-date">

${item.createdDate || ""}
<br>
${item.createdTime || ""}

</div>

</div>

<div class="notification-message">

${item.message || ""}

</div>

<div class="notification-target">

${getTargetName(item.target)}

</div>

</div>

`;

});

}
);

// =====================
// اسم الفئة
// =====================

function getTargetName(target){

if(target === "all"){
return "كل المستخدمين";
}

if(target === "customers"){
return "الزبائن";
}

if(target === "drivers"){
return "السواق";
}

if(target === "stores"){
return "المتاجر";
}

if(target === "taxis"){
return "سواق التكسي";
}

return target;

}

</script>

</body>

</html>
