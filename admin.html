<!DOCTYPE html>
<html lang="ar" dir="rtl">

<head>

<meta charset="UTF-8">

<meta
name="viewport"
content="width=device-width, initial-scale=1.0">

<title>
لوحة الإدارة
</title>

<link
rel="stylesheet"
href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css"/>

<link
href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;500;600;700;800&display=swap"
rel="stylesheet">

<style>

*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:'Cairo',sans-serif;
}

body{
background:#f5f6fa;
padding-bottom:120px;
}

.header{
background:
linear-gradient(
135deg,
#111827,
#1f2937
);

padding:24px;
color:white;

border-bottom-left-radius:30px;
border-bottom-right-radius:30px;
}

.header h2{
font-size:28px;
margin-bottom:6px;
}

.header p{
opacity:.9;
}

.stats{
display:grid;
grid-template-columns:1fr 1fr;
gap:15px;
padding:15px;
}

.stat-card{
background:white;
padding:20px;
border-radius:24px;
box-shadow:
0 5px 18px rgba(0,0,0,.06);
text-align:center;
}

.stat-card h3{
font-size:32px;
margin-bottom:8px;
color:#ff8800;
}

.stat-card p{
font-size:14px;
font-weight:bold;
color:#666;
}

.section{
padding:15px;
}

.section-title{
font-size:22px;
font-weight:bold;
margin-bottom:15px;
}

.card{
background:white;
padding:18px;
border-radius:24px;
margin-bottom:15px;
box-shadow:
0 5px 18px rgba(0,0,0,.06);
}

.store-top{
display:flex;
align-items:center;
gap:12px;
margin-bottom:12px;
}

.store-image{
width:70px;
height:70px;
border-radius:18px;
object-fit:cover;
background:#eee;
}

.store-name{
font-size:19px;
font-weight:bold;
margin-bottom:4px;
}

.store-category{
font-size:13px;
color:#666;
}

.actions{
display:flex;
gap:10px;
margin-top:15px;
}

.actions button{
flex:1;
height:48px;
border:none;
border-radius:14px;
font-size:14px;
font-weight:bold;
cursor:pointer;
color:white;
}

.accept-btn{
background:#00b894;
}

.reject-btn{
background:#e53935;
}

.block-btn{
background:#ff8800;
}

.empty{
padding:50px 20px;
text-align:center;
color:#777;
}

.bottom-bar{
position:fixed;
bottom:0;
left:0;
right:0;
height:82px;
background:white;
display:flex;
justify-content:space-around;
align-items:center;
box-shadow:
0 -5px 18px rgba(0,0,0,.08);
}

.nav-item{
display:flex;
flex-direction:column;
align-items:center;
gap:5px;
font-size:13px;
font-weight:bold;
color:#888;
cursor:pointer;
}

.nav-item.active{
color:#ff8800;
}

.nav-item i{
font-size:22px;
}

</style>

</head>

<body>

<div class="header">

<h2>
لوحة الإدارة 👑
</h2>

<p>
إدارة التطبيق والمتاجر والطلبات
</p>

</div>

<div class="stats">

<div class="stat-card">

<h3 id="storesCount">
0
</h3>

<p>
المتاجر
</p>

</div>

<div class="stat-card">

<h3 id="ordersCount">
0
</h3>

<p>
الطلبات
</p>

</div>

<div class="stat-card">

<h3 id="driversCount">
0
</h3>

<p>
السائقين
</p>

</div>

<div class="stat-card">

<h3 id="usersCount">
0
</h3>

<p>
المستخدمين
</p>

</div>

</div>

<div class="section">

<div class="section-title">
طلبات المتاجر
</div>

<div id="storesContainer"></div>

</div>

<div class="bottom-bar">

<div class="nav-item active">

<i class="fa-solid fa-chart-line"></i>

<span>
الإدارة
</span>

</div>

<div
class="nav-item"
onclick="window.location.href='home.html'">

<i class="fa-solid fa-house"></i>

<span>
الرئيسية
</span>

</div>

</div>

<script type="module">

import { db }
from "./firebase.js";

import {
ref,
onValue,
update
}
from "https://www.gstatic.com/firebasejs/12.13.0/firebase-database.js";

const currentUser =
JSON.parse(
localStorage.getItem("user")
);

if(
!currentUser ||
currentUser.type !== "admin"
){

window.location.replace(
"index.html"
);

}

const storesContainer =
document.getElementById(
"storesContainer"
);

onValue(
ref(db,"stores"),
(snapshot)=>{

storesContainer.innerHTML = "";

if(!snapshot.exists()){

storesContainer.innerHTML = `
<div class="empty">
لا توجد متاجر
</div>
`;

return;

}

const stores =
snapshot.val();

let count = 0;

for(let key in stores){

const store =
stores[key];

count++;

storesContainer.innerHTML += `

<div class="card">

<div class="store-top">

<img
src="${store.store_image || "store.png"}"
class="store-image">

<div>

<div class="store-name">
${store.store_name || ""}
</div>

<div class="store-category">
${store.category || ""}
</div>

</div>

</div>

<div>

📞
${store.phone || ""}

</div>

<div style="
margin-top:10px;
">

الحالة:
<b>
${store.status || "pending"}
</b>

</div>

<div class="actions">

<button
class="accept-btn"
onclick="approveStore('${key}')">

قبول

</button>

<button
class="reject-btn"
onclick="rejectStore('${key}')">

رفض

</button>

<button
class="block-btn"
onclick="blockStore('${key}')">

حظر

</button>

</div>

</div>

`;

}

document.getElementById(
"storesCount"
).innerHTML = count;

}
);

onValue(
ref(db,"orders"),
(snapshot)=>{

let count = 0;

if(snapshot.exists()){

count =
Object.keys(
snapshot.val()
).length;

}

document.getElementById(
"ordersCount"
).innerHTML = count;

}
);

onValue(
ref(db,"drivers"),
(snapshot)=>{

let count = 0;

if(snapshot.exists()){

count =
Object.keys(
snapshot.val()
).length;

}

document.getElementById(
"driversCount"
).innerHTML = count;

}
);

onValue(
ref(db,"customers"),
(snapshot)=>{

let count = 0;

if(snapshot.exists()){

count =
Object.keys(
snapshot.val()
).length;

}

document.getElementById(
"usersCount"
).innerHTML = count;

}
);

window.approveStore =
async function(storeId){

await update(
ref(db,"stores/" + storeId),
{

status:"active"

}
);

alert("تم قبول المتجر");

};

window.rejectStore =
async function(storeId){

await update(
ref(db,"stores/" + storeId),
{

status:"rejected"

}
);

alert("تم رفض المتجر");

};

window.blockStore =
async function(storeId){

await update(
ref(db,"stores/" + storeId),
{

status:"blocked"

}
);

alert("تم حظر المتجر");

};

</script>

</body>

</html>
