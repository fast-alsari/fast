<!DOCTYPE html>
<html lang="ar" dir="rtl">

<head>

<meta charset="UTF-8">

<meta
name="viewport"
content="width=device-width, initial-scale=1.0">

<title>
لوحة الإدارة
</title>

<link
rel="stylesheet"
href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css"/>

<link
href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;500;600;700;800&display=swap"
rel="stylesheet">

<style>

*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:'Cairo',sans-serif;
}

body{
background:#f5f6fa;
padding-bottom:120px;
overflow-x:hidden;
}

.header{
background:
linear-gradient(
135deg,
#111827,
#1f2937
);

padding:25px;
color:white;

border-bottom-left-radius:30px;
border-bottom-right-radius:30px;
}

.header h1{
font-size:28px;
margin-bottom:8px;
}

.header p{
font-size:14px;
opacity:.9;
}

.stats{
display:grid;
grid-template-columns:1fr 1fr;
gap:15px;
padding:15px;
}

.stat-card{
background:white;
padding:20px;
border-radius:24px;
text-align:center;

box-shadow:
0 5px 18px rgba(0,0,0,.06);
}

.stat-card h2{
font-size:32px;
margin-bottom:8px;
color:#ff6600;
}

.stat-card p{
font-size:14px;
font-weight:bold;
color:#666;
}

.section{
padding:0 15px 15px;
}

.section-title{
font-size:20px;
font-weight:bold;
margin-bottom:15px;
color:#222;
}

.card{
background:white;
padding:18px;
border-radius:24px;
margin-bottom:15px;

box-shadow:
0 5px 18px rgba(0,0,0,.06);
}

.card-top{
display:flex;
justify-content:space-between;
align-items:center;
margin-bottom:15px;
}

.badge{
padding:7px 14px;
border-radius:14px;
font-size:12px;
font-weight:bold;
}

.active{
background:#dcfce7;
color:#15803d;
}

.pending{
background:#fff7ed;
color:#ea580c;
}

.blocked{
background:#fee2e2;
color:#dc2626;
}

.card h3{
font-size:18px;
margin-bottom:8px;
}

.card p{
font-size:14px;
color:#666;
margin-bottom:5px;
}

.actions{
display:flex;
gap:10px;
margin-top:15px;
}

.actions button{
flex:1;
height:48px;
border:none;
border-radius:16px;
font-size:14px;
font-weight:bold;
cursor:pointer;
color:white;
}

.accept-btn{
background:#00b894;
}

.reject-btn{
background:#e53935;
}

.delete-btn{
background:#111827;
}

.bottom-bar{
position:fixed;
bottom:0;
left:0;
right:0;
height:82px;

background:white;

display:flex;
justify-content:space-around;
align-items:center;

box-shadow:
0 -5px 18px rgba(0,0,0,.08);
}

.nav-item{
display:flex;
flex-direction:column;
align-items:center;
gap:5px;

font-size:13px;
font-weight:bold;

color:#888;
cursor:pointer;
}

.nav-item.active{
color:#ff8800;
}

.nav-item i{
font-size:22px;
}

.loading{
position:fixed;
inset:0;
background:white;

display:flex;
align-items:center;
justify-content:center;

z-index:9999;
}

.spinner{
width:70px;
height:70px;
border:5px solid #eee;
border-top:5px solid #ff8800;
border-radius:50%;

animation:spin .8s linear infinite;
}

@keyframes spin{
100%{
transform:rotate(360deg);
}
}

@media(max-width:700px){

.stats{
grid-template-columns:1fr;
}

}

</style>

</head>

<body>

<div
class="loading"
id="loading">

<div class="spinner"></div>

</div>

<div class="header">

<h1>
لوحة الإدارة ⚙️
</h1>

<p>
إدارة التطبيق والمتاجر والسائقين
</p>

</div>

<div class="stats">

<div class="stat-card">

<h2 id="storesCount">
0
</h2>

<p>
المتاجر
</p>

</div>

<div class="stat-card">

<h2 id="driversCount">
0
</h2>

<p>
السائقين
</p>

</div>

<div class="stat-card">

<h2 id="ordersCount">
0
</h2>

<p>
الطلبات
</p>

</div>

<div class="stat-card">

<h2 id="usersCount">
0
</h2>

<p>
المستخدمين
</p>

</div>

</div>

<div class="section">

<div class="section-title">
طلبات المتاجر
</div>

<div id="storesContainer"></div>

</div>

<div class="section">

<div class="section-title">
طلبات السائقين
</div>

<div id="driversContainer"></div>

</div>

<div class="bottom-bar">

<div class="nav-item active">

<i class="fa-solid fa-chart-line"></i>

<span>
الإدارة
</span>

</div>

<div
class="nav-item"
onclick="logout()">

<i class="fa-solid fa-right-from-bracket"></i>

<span>
خروج
</span>

</div>

</div>

<script type="module">

import { db }
from "./firebase.js";

import {

ref,
onValue,
update,
remove

}

from "https://www.gstatic.com/firebasejs/12.13.0/firebase-database.js";

const currentUser =
JSON.parse(
localStorage.getItem("user")
);

if(
!currentUser ||
currentUser.type !== "admin"
){

window.location.replace(
"index.html"
);

}

// ====================
// المتاجر
// ====================

onValue(
ref(db,"stores"),
(snapshot)=>{

const container =
document.getElementById(
"storesContainer"
);

container.innerHTML = "";

let total = 0;

if(snapshot.exists()){

const stores =
snapshot.val();

for(let key in stores){

const store =
stores[key];

total++;

container.innerHTML += `

<div class="card">

<div class="card-top">

<div class="
badge
${store.status === "active"
? "active"
: "pending"}
">

${store.status === "active"
? "نشط"
: "بانتظار"}

</div>

</div>

<h3>
${store.store_name || ""}
</h3>

<p>
📞 ${store.phone || ""}
</p>

<p>
🏪 ${store.category || ""}
</p>

<div class="actions">

<button
class="accept-btn"
onclick="approveStore('${key}')">

قبول

</button>

<button
class="reject-btn"
onclick="blockStore('${key}')">

حظر

</button>

<button
class="delete-btn"
onclick="deleteStore('${key}')">

حذف

</button>

</div>

</div>

`;

}

}

document.getElementById(
"storesCount"
).innerHTML = total;

hideLoading();

}
);

// ====================
// السائقين
// ====================

onValue(
ref(db,"drivers"),
(snapshot)=>{

const container =
document.getElementById(
"driversContainer"
);

container.innerHTML = "";

let total = 0;

if(snapshot.exists()){

const drivers =
snapshot.val();

for(let key in drivers){

const driver =
drivers[key];

total++;

container.innerHTML += `

<div class="card">

<div class="card-top">

<div class="
badge
${driver.status === "active"
? "active"
: "pending"}
">

${driver.status === "active"
? "نشط"
: "بانتظار"}

</div>

</div>

<h3>
${driver.name || ""}
</h3>

<p>
📞 ${driver.phone || ""}
</p>

<p>
🚗 ${driver.vehicleType || ""}
</p>

<div class="actions">

<button
class="accept-btn"
onclick="approveDriver('${key}')">

قبول

</button>

<button
class="reject-btn"
onclick="blockDriver('${key}')">

حظر

</button>

<button
class="delete-btn"
onclick="deleteDriver('${key}')">

حذف

</button>

</div>

</div>

`;

}

}

document.getElementById(
"driversCount"
).innerHTML = total;

}
);

// ====================
// الطلبات
// ====================

onValue(
ref(db,"orders"),
(snapshot)=>{

let total = 0;

if(snapshot.exists()){

total =
Object.keys(
snapshot.val()
).length;

}

document.getElementById(
"ordersCount"
).innerHTML = total;

}
);

// ====================
// المستخدمين
// ====================

onValue(
ref(db,"customers"),
(snapshot)=>{

let total = 0;

if(snapshot.exists()){

total =
Object.keys(
snapshot.val()
).length;

}

document.getElementById(
"usersCount"
).innerHTML = total;

}
);

// ====================
// قبول متجر
// ====================

window.approveStore =
async function(storeId){

await update(
ref(
db,
"stores/" + storeId
),
{

status:"active"

}
);

alert("تم قبول المتجر");

};

// ====================
// حظر متجر
// ====================

window.blockStore =
async function(storeId){

await update(
ref(
db,
"stores/" + storeId
),
{

status:"blocked"

}
);

alert("تم حظر المتجر");

};

// ====================
// حذف متجر
// ====================

window.deleteStore =
async function(storeId){

if(
!confirm("حذف المتجر ؟")
){
return;
}

await remove(
ref(
db,
"stores/" + storeId
)
);

};

// ====================
// قبول سائق
// ====================

window.approveDriver =
async function(driverId){

await update(
ref(
db,
"drivers/" + driverId
),
{

status:"active"

}
);

alert("تم قبول السائق");

};

// ====================
// حظر سائق
// ====================

window.blockDriver =
async function(driverId){

await update(
ref(
db,
"drivers/" + driverId
),
{

status:"blocked"

}
);

alert("تم حظر السائق");

};

// ====================
// حذف سائق
// ====================

window.deleteDriver =
async function(driverId){

if(
!confirm("حذف السائق ؟")
){
return;
}

await remove(
ref(
db,
"drivers/" + driverId
)
);

};

// ====================
// تسجيل خروج
// ====================

window.logout =
function(){

localStorage.clear();

window.location.replace(
"index.html"
);

};

// ====================
// loading
// ====================

function hideLoading(){

document.getElementById(
"loading"
).style.display = "none";

}

</script>

</body>

</html>
