<!-- driver-history.html -->

<!DOCTYPE html>
<html lang="ar" dir="rtl">

<head>

<meta charset="UTF-8">

<meta
name="viewport"
content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">

<title>
سجل الطلبات
</title>

<link
rel="stylesheet"
href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css"/>

<link
href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;500;700;800&display=swap"
rel="stylesheet">

<style>

*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:'Cairo',sans-serif;
-webkit-tap-highlight-color:transparent;
}

body{
background:#f5f6fa;
padding-bottom:110px;
overflow-x:hidden;
}

.header{
background:
linear-gradient(
135deg,
#ff8800,
#ff5500
);

padding:24px 20px;
color:white;

border-bottom-left-radius:30px;
border-bottom-right-radius:30px;

box-shadow:
0 8px 25px rgba(0,0,0,.12);
}

.header-top{
display:flex;
align-items:center;
gap:14px;
}

.back-btn{
width:46px;
height:46px;
border:none;
border-radius:50%;
background:white;
color:#ff6600;
font-size:18px;
cursor:pointer;
flex-shrink:0;
}

.header h2{
font-size:25px;
margin-bottom:5px;
}

.header p{
font-size:14px;
opacity:.92;
}

.stats-box{
padding:15px;
display:grid;
grid-template-columns:1fr 1fr;
gap:14px;
}

.stat-card{
background:white;
padding:18px;
border-radius:24px;
text-align:center;

box-shadow:
0 5px 18px rgba(0,0,0,.06);
}

.stat-number{
font-size:28px;
font-weight:bold;
color:#ff6600;
margin-bottom:6px;
}

.stat-text{
font-size:14px;
font-weight:bold;
color:#666;
}

.orders-container{
padding:15px;
display:flex;
flex-direction:column;
gap:18px;
}

.order-card{
background:white;
padding:18px;
border-radius:28px;

box-shadow:
0 5px 18px rgba(0,0,0,.06);
}

.order-top{
display:flex;
justify-content:space-between;
align-items:center;
margin-bottom:16px;
}

.order-id{
font-size:13px;
color:#777;
font-weight:bold;
}

.order-status{
padding:8px 14px;
border-radius:14px;
font-size:13px;
font-weight:bold;
color:white;
}

.completed{
background:#00b894;
}

.cancelled{
background:#e53935;
}

.order-user{
background:#f8f8f8;
padding:14px;
border-radius:18px;
margin-bottom:14px;
}

.order-user h3{
font-size:17px;
margin-bottom:6px;
}

.order-user p{
font-size:14px;
color:#666;
margin-bottom:5px;
}

.order-details{
display:grid;
grid-template-columns:1fr 1fr;
gap:12px;
margin-bottom:15px;
}

.detail-box{
background:#fff8f1;
padding:14px;
border-radius:18px;
text-align:center;
}

.detail-box h4{
font-size:13px;
margin-bottom:6px;
color:#777;
}

.detail-box p{
font-size:16px;
font-weight:bold;
color:#ff6600;
}

.order-time{
background:#f8f8f8;
padding:13px;
border-radius:16px;
font-size:13px;
color:#666;
line-height:1.9;
}

.empty{
padding:70px 20px;
text-align:center;
color:#777;
font-size:16px;
}

.loading{
position:fixed;
inset:0;
background:white;
display:flex;
align-items:center;
justify-content:center;
z-index:999999;
}

.spinner{
width:70px;
height:70px;
border-radius:50%;
border:5px solid #eee;
border-top:5px solid #ff8800;
animation:spin .8s linear infinite;
}

@keyframes spin{
100%{
transform:rotate(360deg);
}
}

.bottom-bar{
position:fixed;
bottom:0;
left:0;
right:0;
height:82px;
background:white;

display:flex;
justify-content:space-around;
align-items:center;

box-shadow:
0 -5px 18px rgba(0,0,0,.08);

z-index:9999;
}

.nav-item{
display:flex;
flex-direction:column;
align-items:center;
gap:5px;

cursor:pointer;

color:#888;
font-size:13px;
font-weight:bold;
}

.nav-item.active{
color:#ff8800;
}

.nav-item i{
font-size:22px;
}

@media(max-width:700px){

.stats-box{
grid-template-columns:1fr;
}

.order-details{
grid-template-columns:1fr;
}

}

</style>

</head>

<body>

<div
class="loading"
id="loading">

<div class="spinner"></div>

</div>

<div class="header">

<div class="header-top">

<button
class="back-btn"
onclick="window.location.href='drive.html'">

<i class="fa-solid fa-arrow-right"></i>

</button>

<div>

<h2>
سجل الطلبات
</h2>

<p>
جميع الرحلات السابقة الخاصة بك
</p>

</div>

</div>

</div>

<div class="stats-box">

<div class="stat-card">

<div
class="stat-number"
id="completedCount">

0

</div>

<div class="stat-text">
طلبات مكتملة
</div>

</div>

<div class="stat-card">

<div
class="stat-number"
id="totalProfit">

0

</div>

<div class="stat-text">
إجمالي الأرباح
</div>

</div>

</div>

<div
class="orders-container"
id="ordersContainer"></div>

<div class="bottom-bar">

<div
class="nav-item"
onclick="window.location.href='drive.html'">

<i class="fa-solid fa-motorcycle"></i>

<span>
الطلبات
</span>

</div>

<div class="nav-item active">

<i class="fa-solid fa-clock-rotate-left"></i>

<span>
السجل
</span>

</div>

<div
class="nav-item"
onclick="window.location.href='drive-account.html'">

<i class="fa-solid fa-user"></i>

<span>
الحساب
</span>

</div>

</div>

<script type="module">

import { db }
from "./firebase.js";

import {

ref,
onValue

}

from
"https://www.gstatic.com/firebasejs/12.13.0/firebase-database.js";

// ====================
// المستخدم
// ====================

const currentUser =
JSON.parse(
localStorage.getItem("user")
);

if(
!currentUser ||
currentUser.type !== "driver"
){

window.location.replace(
"index.html"
);

}

// ====================
// العناصر
// ====================

const ordersContainer =
document.getElementById(
"ordersContainer"
);

const completedCount =
document.getElementById(
"completedCount"
);

const totalProfit =
document.getElementById(
"totalProfit"
);

// ====================
// تحميل الطلبات
// ====================

onValue(
ref(db,"orders"),
(snapshot)=>{

ordersContainer.innerHTML = "";

let completed = 0;
let profits = 0;

if(!snapshot.exists()){

ordersContainer.innerHTML = `
<div class="empty">
لا توجد طلبات
</div>
`;

hideLoading();
return;

}

const orders =
snapshot.val();

const historyOrders =
Object.values(orders)
.filter(order =>

order.driverId === currentUser.id

&&

[
"delivered",
"completed_by_customer",
"rejected_by_customer",
"cancelled_by_customer"
]
.includes(order.status)

)

.sort((a,b)=>

b.createdAt - a.createdAt

);

if(historyOrders.length === 0){

ordersContainer.innerHTML = `
<div class="empty">
لا يوجد سجل طلبات
</div>
`;

hideLoading();
return;

}

historyOrders.forEach(order=>{

if(
[
"delivered",
"completed_by_customer"
]
.includes(order.status)
){

completed++;

profits +=
Number(order.deliveryPrice || 0);

}

ordersContainer.innerHTML += `

<div class="order-card">

<div class="order-top">

<div class="order-id">

# ${order.id || ""}

</div>

<div class="
order-status
${

[
"delivered",
"completed_by_customer"
]
.includes(order.status)

?

"completed"

:

"cancelled"

}
">

${getStatusText(order.status)}

</div>

</div>

<div class="order-user">

<h3>
${order.customerName || ""}
</h3>

<p>
📞 ${order.customerPhone || ""}
</p>

<p>
🛵 ${Number(order.deliveryPrice || 0)
.toLocaleString()} د.ع
</p>

</div>

<div class="order-details">

<div class="detail-box">

<h4>
عدد المنتجات
</h4>

<p>
${order.products?.length || 0}
</p>

</div>

<div class="detail-box">

<h4>
الإجمالي
</h4>

<p>
${Number(order.finalTotal || 0)
.toLocaleString()} د.ع
</p>

</div>

</div>

<div class="order-time">

📅
${formatDate(order.createdAt)}

<br>

🕓
${formatTime(order.createdAt)}

</div>

</div>

`;

});

completedCount.innerHTML =
completed;

totalProfit.innerHTML =
profits.toLocaleString();

hideLoading();

});

// ====================
// التاريخ
// ====================

function formatDate(time){

const date =
new Date(time);

return date.toLocaleDateString(
'ar-IQ'
);

}

function formatTime(time){

const date =
new Date(time);

return date.toLocaleTimeString(
'ar-IQ'
);

}

// ====================
// الحالة
// ====================

function getStatusText(status){

if(status === "delivered"){
return "تم التوصيل";
}

if(status === "completed_by_customer"){
return "مكتمل";
}

if(status === "rejected_by_customer"){
return "رفض الزبون";
}

if(status === "cancelled_by_customer"){
return "ملغي";
}

return status;

}

// ====================
// تحميل
// ====================

function hideLoading(){

document.getElementById(
"loading"
).style.display = "none";

}

</script>

</body>

</html>
