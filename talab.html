<!-- talab.html -->

<!DOCTYPE html>
<html lang="ar" dir="rtl">

<head>

<meta charset="UTF-8">

<meta name="viewport"
content="width=device-width, initial-scale=1.0">

<title>
الطلب
</title>

<link rel="stylesheet"
href="https://unpkg.com/leaflet/dist/leaflet.css"/>

<link rel="stylesheet"
href="https://unpkg.com/leaflet-routing-machine@latest/dist/leaflet-routing-machine.css"/>

<script src="https://unpkg.com/leaflet/dist/leaflet.js"></script>

<script src="https://unpkg.com/leaflet-routing-machine@latest/dist/leaflet-routing-machine.js"></script>

<link rel="stylesheet"
href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css"/>

<link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;500;600;700&display=swap"
rel="stylesheet">

<style>

*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:'Cairo',sans-serif;
}

body{
background:#f5f5f5;
overflow:hidden;
}

.page{
position:fixed;
top:0;
left:0;
right:0;
bottom:0;
overflow-y:auto;
background:#f5f5f5;
}

.top-header{
background:linear-gradient(135deg,#ff8800,#ff5500);
padding:25px 20px;
color:white;
border-bottom-left-radius:30px;
border-bottom-right-radius:30px;
}

.order-title{
font-size:26px;
font-weight:bold;
margin-bottom:10px;
}

.order-status{
font-size:17px;
line-height:1.8;
}

.timer-box{
margin-top:18px;
padding:15px;
border-radius:18px;
background:rgba(255,255,255,.15);
text-align:center;
font-size:22px;
font-weight:bold;
}

.searching-box{
padding:40px 20px;
display:flex;
flex-direction:column;
align-items:center;
justify-content:center;
}

.radar{
width:170px;
height:170px;
border-radius:50%;
border:5px solid #ff8800;
animation:radarPulse 2s infinite;
position:relative;
}

.radar::before{
content:"";
position:absolute;
top:50%;
left:50%;
width:22px;
height:22px;
background:#ff8800;
border-radius:50%;
transform:translate(-50%,-50%);
}

@keyframes radarPulse{

0%{
box-shadow:0 0 0 0 rgba(255,136,0,.5);
}

100%{
box-shadow:0 0 0 55px rgba(255,136,0,0);
}

}

.search-text{
margin-top:28px;
font-size:22px;
font-weight:bold;
color:#777;
text-align:center;
}

.driver-card{
background:white;
margin:15px;
padding:15px;
border-radius:25px;
display:none;
}

.driver-top{
display:flex;
align-items:center;
gap:12px;
}

.driver-image{
width:80px;
height:80px;
border-radius:20px;
object-fit:cover;
background:#eee;
}

.driver-info{
flex:1;
}

.driver-name{
font-size:22px;
font-weight:bold;
margin-bottom:8px;
}

.driver-phone{
font-size:15px;
color:#666;
}

.whatsapp-btn{
width:100%;
margin-top:15px;
padding:16px;
border:none;
border-radius:18px;
background:#25D366;
color:white;
font-size:17px;
font-weight:bold;
cursor:pointer;
}

#map{
width:100%;
height:45vh;
margin-top:10px;
display:none;
}

.bottom-box{
background:white;
margin:15px;
padding:20px;
border-radius:25px;
}

.bottom-box h3{
font-size:22px;
margin-bottom:18px;
}

.live-status{
font-size:17px;
line-height:2;
color:#555;
}

.complete-btn,
.reject-btn{
width:100%;
padding:18px;
border:none;
border-radius:18px;
color:white;
font-size:18px;
font-weight:bold;
cursor:pointer;
margin-top:15px;
display:none;
}

.complete-btn{
background:#00b894;
}

.reject-btn{
background:red;
}

</style>

</head>

<body>

<div class="page">

<div class="top-header">

<div class="order-title">
طلبك قيد التوصيل 🚀
</div>

<div
class="order-status"
id="orderStatus">

جاري البحث عن سائق

</div>

<div
class="timer-box"
id="timerBox">

00:00:00

</div>

</div>

<div
class="searching-box"
id="searchingBox">

<div class="radar"></div>

<div class="search-text">
جاري البحث عن سائق مناسب
</div>

</div>

<div
class="driver-card"
id="driverCard">

<div class="driver-top">

<img
src="driver.png"
class="driver-image"
id="driverImage">

<div class="driver-info">

<div
class="driver-name"
id="driverName">

السائق

</div>

<div
class="driver-phone"
id="driverPhone">

رقم الهاتف

</div>

</div>

</div>

<button
class="whatsapp-btn"
id="whatsappBtn">

مراسلة السائق

</button>

</div>

<div id="map"></div>

<div class="bottom-box">

<h3>
حالة الطلب
</h3>

<div
class="live-status"
id="liveStatus">

بانتظار قبول سائق...

</div>

<button
class="complete-btn"
id="completeBtn">

استلام الطلب

</button>

<button
class="reject-btn"
id="rejectBtn">

لم أستلم الطلب

</button>

</div>

</div>

<script type="module">

import { initializeApp }
from "https://www.gstatic.com/firebasejs/12.13.0/firebase-app.js";

import {

getDatabase,
ref,
update,
remove,
onValue

}

from "https://www.gstatic.com/firebasejs/12.13.0/firebase-database.js";

const firebaseConfig = {

apiKey:"AIzaSyC7QzQTYMSGRV_nraJBneBqDqYGhugF0Pw",

authDomain:"fast-937c9.firebaseapp.com",

projectId:"fast-937c9",

databaseURL:
"https://fast-937c9-default-rtdb.europe-west1.firebasedatabase.app"

};

const app =
initializeApp(firebaseConfig);

const database =
getDatabase(app);

const currentUser =
JSON.parse(localStorage.getItem("user"));

if(!currentUser){

window.location.href =
"index.html";

}

const params =
new URLSearchParams(location.search);

const orderId =
params.get("orderId");

if(!orderId){

window.location.href =
"home.html";

}

const orderRef =
ref(database,"orders/" + orderId);

const timerBox =
document.getElementById("timerBox");

const orderStatus =
document.getElementById("orderStatus");

const liveStatus =
document.getElementById("liveStatus");

const driverCard =
document.getElementById("driverCard");

const searchingBox =
document.getElementById("searchingBox");

const completeBtn =
document.getElementById("completeBtn");

const rejectBtn =
document.getElementById("rejectBtn");

const mapDiv =
document.getElementById("map");

let map;
let driverMarker;
let customerMarker;
let routeControl;

function startTimer(createdAt){

setInterval(async()=>{

const remain =
Math.max(
0,
(60 * 60 * 1000) -
(Date.now() - createdAt)
);

const hours =
String(
Math.floor(remain / 1000 / 60 / 60)
).padStart(2,"0");

const minutes =
String(
Math.floor((remain / 1000 / 60) % 60)
).padStart(2,"0");

const seconds =
String(
Math.floor((remain / 1000) % 60)
).padStart(2,"0");

timerBox.innerHTML =
`${hours}:${minutes}:${seconds}`;

if(remain <= 0){

await remove(orderRef);

localStorage.removeItem(
"currentOrderId"
);

window.location.href =
"home.html";

}

},1000);

}

function initMap(order){

mapDiv.style.display = "block";

if(!map){

map =
L.map("map").setView(

[
Number(order.customer.location.latitude),
Number(order.customer.location.longitude)
],

15

);

L.tileLayer(
'https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png',
{
maxZoom:19
}
).addTo(map);

customerMarker =
L.marker(

[
Number(order.customer.location.latitude),
Number(order.customer.location.longitude)
]

)

.addTo(map)

.bindPopup("موقع الزبون");

}

}

function updateDriver(order){

if(
!order.driver ||
!order.driver.location
){
return;
}

initMap(order);

const driverLat =
Number(order.driver.location.latitude);

const driverLng =
Number(order.driver.location.longitude);

if(!driverMarker){

driverMarker =
L.marker([driverLat,driverLng])

.addTo(map)

.bindPopup("السائق");

}else{

driverMarker.setLatLng(
[driverLat,driverLng]
);

}

let targetLat =
Number(order.customer.location.latitude);

let targetLng =
Number(order.customer.location.longitude);

if(routeControl){

map.removeControl(routeControl);

}

routeControl =
L.Routing.control({

waypoints:[

L.latLng(driverLat,driverLng),

L.latLng(targetLat,targetLng)

],

routeWhileDragging:false,

addWaypoints:false,

draggableWaypoints:false,

fitSelectedRoutes:true,

show:false,

createMarker:()=>null

}).addTo(map);

}

onValue(orderRef,(snapshot)=>{

if(!snapshot.exists()){

localStorage.removeItem(
"currentOrderId"
);

window.location.href =
"home.html";

return;

}

const order =
snapshot.val();

startTimer(order.createdAt);

if(order.status === "waiting_driver"){

orderStatus.innerHTML =
"جاري البحث عن سائق";

liveStatus.innerHTML =
"بانتظار قبول سائق";

}

if(order.status === "accepted"){

searchingBox.style.display =
"none";

driverCard.style.display =
"block";

document.getElementById("driverName")
.innerHTML =
order.driver.name || "السائق";

document.getElementById("driverPhone")
.innerHTML =
order.driver.phone || "";

document.getElementById("driverImage")
.src =
order.driver.image || "driver.png";

document.getElementById("whatsappBtn")
.onclick = ()=>{

window.open(
`https://wa.me/${order.driver.phone}`
);

};

orderStatus.innerHTML =
"تم قبول الطلب";

liveStatus.innerHTML =
"السائق متجه للمتجر";

updateDriver(order);

}

if(order.status === "preparing_order"){

orderStatus.innerHTML =
"جاري تجهيز الطلب";

liveStatus.innerHTML =
"المتجر يقوم بالتجهيز";

updateDriver(order);

}

if(order.status === "on_the_way"){

orderStatus.innerHTML =
"السائق بالطريق إليك";

liveStatus.innerHTML =
"السائق متجه إليك";

updateDriver(order);

}

if(order.status === "arrived"){

orderStatus.innerHTML =
"وصل السائق";

liveStatus.innerHTML =
"اضغط استلام الطلب";

completeBtn.style.display =
"block";

rejectBtn.style.display =
"block";

updateDriver(order);

}

if(order.status === "delivered"){

localStorage.removeItem(
"currentOrderId"
);

alert("تم تسليم الطلب");

window.location.href =
"home.html";

}

if(order.status === "cancelled"){

localStorage.removeItem(
"currentOrderId"
);

alert("تم إلغاء الطلب");

window.location.href =
"home.html";

}

});

completeBtn.onclick =
async function(){

await update(orderRef,{

status:"completed",

completedAt:Date.now()

});

localStorage.removeItem(
"currentOrderId"
);

window.location.href =
"home.html";

};

rejectBtn.onclick =
async function(){

await update(orderRef,{

status:"rejected",

rejectedAt:Date.now()

});

localStorage.removeItem(
"currentOrderId"
);

window.location.href =
"home.html";

};

history.pushState(
null,
null,
location.href
);

window.onpopstate =
function(){

history.pushState(
null,
null,
location.href
);

};

</script>

</body>

</html>
