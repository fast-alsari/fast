 
<!-- talab.html -->

<!DOCTYPE html>
<html lang="ar" dir="rtl">

<head>

<meta charset="UTF-8">

<meta name="viewport"
content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">

<title>
الطلب
</title>

<link rel="stylesheet"
href="https://unpkg.com/leaflet/dist/leaflet.css"/>

<script
src="https://unpkg.com/leaflet/dist/leaflet.js">
</script>

<link rel="stylesheet"
href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css"/>

<link rel="stylesheet"
href="https://unpkg.com/leaflet/dist/leaflet.css"/>

<script
src="https://unpkg.com/leaflet/dist/leaflet.js">
</script>

<link rel="stylesheet"
href="https://unpkg.com/leaflet-routing-machine@latest/dist/leaflet-routing-machine.css"/>

<script
src="https://unpkg.com/leaflet-routing-machine@latest/dist/leaflet-routing-machine.js">
</script>

<link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;500;600;700&display=swap"
rel="stylesheet">

<style>

*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:'Cairo',sans-serif;
}

body{
background:#f5f5f5;
overflow:hidden;
}

.page{
position:fixed;
top:0;
left:0;
right:0;
bottom:0;
overflow-y:auto;
background:#f5f5f5;
}

.top-header{
background:
linear-gradient(
135deg,
#ff8800,
#ff5500
);
padding:25px 20px;
color:white;
border-bottom-left-radius:30px;
border-bottom-right-radius:30px;
box-shadow:
0 8px 25px rgba(0,0,0,.12);
}

.order-title{
font-size:26px;
font-weight:bold;
margin-bottom:10px;
}

.order-status{
font-size:17px;
line-height:1.8;
opacity:.96;
}

.timer-box{
margin-top:18px;
padding:15px;
border-radius:18px;
background:rgba(255,255,255,.15);
backdrop-filter:blur(10px);
text-align:center;
font-size:22px;
font-weight:bold;
}

.searching-box{
padding:40px 20px;
display:flex;
flex-direction:column;
align-items:center;
justify-content:center;
}

.radar{
width:170px;
height:170px;
border-radius:50%;
border:5px solid #ff8800;
animation:radarPulse 2s infinite;
position:relative;
}

.radar::before{
content:"";
position:absolute;
top:50%;
left:50%;
width:22px;
height:22px;
background:#ff8800;
border-radius:50%;
transform:translate(-50%,-50%);
}

@keyframes radarPulse{

0%{
box-shadow:
0 0 0 0 rgba(255,136,0,.5);
}

100%{
box-shadow:
0 0 0 55px rgba(255,136,0,0);
}

}

.search-text{
margin-top:28px;
font-size:22px;
font-weight:bold;
color:#777;
text-align:center;
line-height:2;
}

.driver-card{
background:white;
margin:15px;
padding:15px;
border-radius:25px;
box-shadow:0 5px 20px rgba(0,0,0,.08);
display:none;
}

.driver-top{
display:flex;
align-items:center;
gap:12px;
}

.driver-image{
width:80px;
height:80px;
border-radius:20px;
object-fit:cover;
background:#eee;
}

.driver-info{
flex:1;
}

.driver-name{
font-size:22px;
font-weight:bold;
margin-bottom:8px;
}

.driver-phone{
font-size:15px;
color:#666;
}

.whatsapp-btn{
width:100%;
margin-top:15px;
padding:16px;
border:none;
border-radius:18px;
background:#25D366;
color:white;
font-size:17px;
font-weight:bold;
cursor:pointer;
}

#map{
width:100%;
height:45vh;
margin-top:10px;
display:none;
z-index:1;
}

.bottom-box{
background:white;
margin:15px;
padding:20px;
border-radius:25px;
box-shadow:0 5px 20px rgba(0,0,0,.08);
}

.bottom-box h3{
font-size:22px;
margin-bottom:18px;
}

.live-status{
font-size:17px;
line-height:2;
color:#555;
}

.complete-btn{
width:100%;
padding:18px;
border:none;
border-radius:18px;
background:#00b894;
color:white;
font-size:18px;
font-weight:bold;
cursor:pointer;
margin-top:20px;
display:none;
}

.reject-btn{
width:100%;
padding:18px;
border:none;
border-radius:18px;
background:red;
color:white;
font-size:18px;
font-weight:bold;
cursor:pointer;
margin-top:15px;
display:none;
}

</style>

</head>

<body>

<div class="page">

<div class="top-header">

<div class="order-title">
طلبك قيد التوصيل 🚀
</div>

<div
class="order-status"
id="orderStatus">

جاري البحث عن سائق توصيل لإيصال طلبك

</div>

<div
class="timer-box"
id="timerBox">

00:00:00

</div>

</div>

<div
class="searching-box"
id="searchingBox">

<div class="radar"></div>

<div class="search-text">
جاري البحث عن سائق توصيل مناسب
</div>

</div>

<div
class="driver-card"
id="driverCard">

<div class="driver-top">

<img
src="driver.png"
class="driver-image">

<div class="driver-info">

<div
class="driver-name"
id="driverName">

السائق

</div>

<div
class="driver-phone"
id="driverPhone">

رقم الهاتف

</div>

</div>

</div>

<button
class="whatsapp-btn"
id="whatsappBtn">

مراسلة السائق عبر واتساب

</button>

</div>

<div id="map"></div>

<div class="bottom-box">

<h3>
حالة الطلب
</h3>

<div
class="live-status"
id="liveStatus">

بانتظار قبول سائق...

</div>

<button
class="complete-btn"
id="completeBtn">

استلام الطلب

</button>

<button
class="reject-btn"
id="rejectBtn">

لم أستلم الطلب

</button>

</div>

</div>

<script type="module">

import { initializeApp }
from "https://www.gstatic.com/firebasejs/12.13.0/firebase-app.js";

import {

getDatabase,
ref,
update,
onValue,
remove

}

from "https://www.gstatic.com/firebasejs/12.13.0/firebase-database.js";

const firebaseConfig = {

apiKey:"AIzaSyC7QzQTYMSGRV_nraJBneBqDqYGhugF0Pw",

authDomain:"fast-937c9.firebaseapp.com",

projectId:"fast-937c9",

databaseURL:
"https://fast-937c9-default-rtdb.europe-west1.firebasedatabase.app"

};

const app =
initializeApp(firebaseConfig);

const db =
getDatabase(app);

const currentUser =
JSON.parse(localStorage.getItem("user"));

if(!currentUser){

window.location.replace("index.html");

}

const params =
new URLSearchParams(location.search);

const orderId =
params.get("orderId");

if(!orderId){

window.location.replace("home.html");

}

const orderRef =
ref(db,"orders/" + orderId);

const timerBox =
document.getElementById("timerBox");

const orderStatus =
document.getElementById("orderStatus");

const liveStatus =
document.getElementById("liveStatus");

const driverCard =
document.getElementById("driverCard");

const searchingBox =
document.getElementById("searchingBox");

const mapDiv =
document.getElementById("map");

const completeBtn =
document.getElementById("completeBtn");

const rejectBtn =
document.getElementById("rejectBtn");

let map;
let driverMarker;
let customerMarker;
let storeMarkers = [];
let routeControl;

let orderTimerInterval = null;

function startOrderMainTimer(createdAt){

clearInterval(orderTimerInterval);

orderTimerInterval = setInterval(async()=>{

const remaining = Math.max(
0,
(60 * 60 * 1000) -
(Date.now() - createdAt)
);

const hours =
String(
Math.floor(remaining / 1000 / 60 / 60)
).padStart(2,"0");

const minutes =
String(
Math.floor((remaining / 1000 / 60) % 60)
).padStart(2,"0");

const seconds =
String(
Math.floor((remaining / 1000) % 60)
).padStart(2,"0");

timerBox.innerHTML =
`${hours}:${minutes}:${seconds}`;

if(remaining <= 0){

clearInterval(orderTimerInterval);

await remove(orderRef);

localStorage.removeItem(
"currentOrderId"
);

alert("انتهى وقت الطلب");

window.location.replace(
"retry-order.html"
);

}

},1000);

}

const bikeIcon =
L.divIcon({

html:`
<div style="
font-size:38px;
transform:rotate(-15deg);
filter:drop-shadow(0 3px 6px rgba(0,0,0,.35));
">
🛵
</div>
`,

className:"",
iconSize:[40,40],
iconAnchor:[20,20]

});

const customerIcon =
L.divIcon({

html:`
<div style="
font-size:40px;
filter:drop-shadow(0 3px 6px rgba(0,0,0,.35));
">
🚩
</div>
`,

className:"",
iconSize:[40,40],
iconAnchor:[20,35]

});

function createStoreIcon(storeName){

return L.divIcon({

html:`

<div style="
display:flex;
flex-direction:column;
align-items:center;
">

<div style="
font-size:35px;
filter:drop-shadow(0 2px 5px rgba(0,0,0,.25));
">
🏪
</div>

<div style="
background:white;
padding:5px 12px;
border-radius:12px;
font-size:12px;
font-weight:bold;
margin-top:4px;
box-shadow:0 2px 10px rgba(0,0,0,.15);
white-space:nowrap;
">

${storeName || "متجر"}

</div>

</div>

`,

className:"",
iconSize:[40,40],
iconAnchor:[20,40]

});

}

function formatTime(ms){

if(ms <= 0){
return "00:00:00";
}

let totalSeconds =
Math.floor(ms / 1000);

let hours =
String(
Math.floor(totalSeconds / 3600)
).padStart(2,"0");

let minutes =
String(
Math.floor((totalSeconds % 3600)/60)
).padStart(2,"0");

let seconds =
String(totalSeconds % 60)
.padStart(2,"0");

return `${hours}:${minutes}:${seconds}`;

}

function initMap(order){

mapDiv.style.display = "block";

if(!map){

map =
L.map("map").setView(

[
Number(order.customerLat),
Number(order.customerLng)
],

15

);

L.tileLayer(

'https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png',

{
maxZoom:19
}

).addTo(map);

customerMarker =
L.marker(

[
Number(order.customerLat),
Number(order.customerLng)
],

{
icon:customerIcon
}

)

.addTo(map)

.bindPopup("موقع الزبون");

if(order.storesData){

order.storesData.forEach(store=>{

const marker =
L.marker(

[
Number(store.storeLat),
Number(store.storeLng)
],

{
icon:createStoreIcon(store.storeName)
}

)

.addTo(map)

.bindPopup(store.storeName);

storeMarkers.push(marker);

});

}

}

setTimeout(()=>{

map.invalidateSize();

},500);

}

function updateDriverLocation(order){

initMap(order);

if(
!order.driverLat ||
!order.driverLng
){
return;
}

const driverLat =
Number(order.driverLat);

const driverLng =
Number(order.driverLng);

if(!driverMarker){

driverMarker =
L.marker(

[driverLat,driverLng],

{
icon:bikeIcon
}

)

.addTo(map)

.bindPopup("سائق التوصيل");

}else{

driverMarker.setLatLng(
[driverLat,driverLng]
);

}

let targetLat;
let targetLng;

if(order.status === "accepted"){

if(order.storesData && order.storesData.length > 0){

targetLat =
Number(order.storesData[0].storeLat);

targetLng =
Number(order.storesData[0].storeLng);

}

}

if(
order.status === "on_the_way"
||
order.status === "arrived"
)

{

targetLat =
Number(order.customerLat);

targetLng =
Number(order.customerLng);

}

if(routeControl){

map.removeControl(routeControl);

}

routeControl =
L.Routing.control({

waypoints:[

L.latLng(driverLat,driverLng),

L.latLng(targetLat,targetLng)

],

routeWhileDragging:false,

router:
L.Routing.osrmv1({

serviceUrl:
'https://router.project-osrm.org/route/v1'

}),

addWaypoints:false,
draggableWaypoints:false,
fitSelectedRoutes:true,
show:false,

lineOptions:{
styles:[
{
color:"#ff8800",
weight:7,
opacity:.9
}
]
},

createMarker:()=>null

}).addTo(map);

map.flyTo(
[driverLat,driverLng],
map.getZoom(),
{
animate:true,
duration:1.5
}
);

}

onValue(orderRef,(snapshot)=>{

if(!snapshot.exists()){

localStorage.removeItem(
"currentOrderId"
);

window.location.replace(
"home.html"
);

return;

}

const order =
snapshot.val();

startOrderMainTimer(order.createdAt);

if(order.status === "waiting_driver"){

orderStatus.innerHTML =
"جاري البحث عن سائق توصيل";

liveStatus.innerHTML =
"بانتظار قبول سائق...";

}

if(order.status === "accepted"){

liveStatus.innerHTML =
order.statusText || "السائق متجه";

searchingBox.style.display =
"none";

driverCard.style.display =
"block";

document.getElementById("driverName")
.innerHTML =
order.acceptedDriver || "السائق";

document.getElementById("driverPhone")
.innerHTML =
order.driverPhone || "";

document.getElementById("whatsappBtn")
.onclick = function(){

window.open(
`https://wa.me/${order.driverPhone}`
);

};

orderStatus.innerHTML =
"تم قبول الطلب";

liveStatus.innerHTML =
"السائق متجه إلى المتجر";

updateDriverLocation(order);

}

if(order.status === "preparing_order"){

orderStatus.innerHTML =
"جاري تجهيز الطلب";

liveStatus.innerHTML =
"المتجر يقوم بتجهيز الطلب";

updateDriverLocation(order);

}

if(order.status === "on_the_way"){

orderStatus.innerHTML =
"السائق في الطريق إليك";

liveStatus.innerHTML =
order.statusText ||
"السائق متجه إليك";

updateDriverLocation(order);

}

if(order.status === "arrived"){

orderStatus.innerHTML =
"وصل السائق";

liveStatus.innerHTML =
"اضغط استلام الطلب";

completeBtn.style.display =
"block";

rejectBtn.style.display =
"block";

updateDriverLocation(order);

}

if(order.status === "driver_timeout"){

alert(
"تم إلغاء الطلب بسبب تجاوز السائق للوقت"
);

localStorage.removeItem(
"currentOrderId"
);

window.location.replace(
"home.html"
);

}

if(order.status === "delivered"){

localStorage.removeItem(
"currentOrderId"
);

alert("تم تسليم الطلب");

window.location.replace(
"home.html"
);

}

if(order.status === "failed_no_driver"){

localStorage.removeItem(
"currentOrderId"
);

window.location.replace(
"retry-order.html"
);

}
if(order.status === "cancelled_by_customer"){

localStorage.removeItem(
"currentOrderId"
);

alert("تم إلغاء الطلب");

window.location.replace(
"home.html"
);

}
});

completeBtn.onclick =
async function(){

await update(orderRef,{

status:"completed_by_customer",

completedAt:Date.now()

});

localStorage.removeItem(
"currentOrderId"
);

window.location.replace(
"home.html"
);

};

rejectBtn.onclick =
async function(){

await update(orderRef,{

status:"rejected_by_customer",

rejectedAt:Date.now()

});

localStorage.removeItem(
"currentOrderId"
);

window.location.replace(
"home.html"
);

};

history.pushState(
null,
null,
location.href
);

window.onpopstate =
function(){

history.pushState(
null,
null,
location.href
);

};

</script>

</body>

</html>
