<!-- talab.html -->

<!DOCTYPE html>

<html lang="ar" dir="rtl">

<head>

<meta charset="UTF-8">

<meta name="viewport"

content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">

<title>

الطلب

</title>

<link rel="stylesheet"

href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css"/>

<link rel="stylesheet"

href="https://unpkg.com/leaflet/dist/leaflet.css"/>

<script

src="https://unpkg.com/leaflet/dist/leaflet.js">

</script>

<link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;500;600;700&display=swap"

rel="stylesheet">

<style>

*{

margin:0;

padding:0;

box-sizing:border-box;

font-family:'Cairo',sans-serif;

}

body{

background:#f5f5f5;

overflow:hidden;

}

.page{

position:fixed;

top:0;

left:0;

right:0;

bottom:0;

overflow-y:auto;

background:#f5f5f5;

}

.top-header{

background:

linear-gradient(

135deg,

#ff8800,

#ff5500

);

padding:25px 20px;

color:white;

border-bottom-left-radius:30px;

border-bottom-right-radius:30px;

box-shadow:

0 8px 25px rgba(0,0,0,.12);

}

.order-title{

font-size:26px;

font-weight:bold;

margin-bottom:10px;

}

.order-status{

font-size:17px;

line-height:1.8;

opacity:.96;

}

.timer-box{

margin-top:18px;

padding:15px;

border-radius:18px;

background:rgba(255,255,255,.15);

backdrop-filter:blur(10px);

text-align:center;

font-size:22px;

font-weight:bold;

}

.searching-box{

padding:40px 20px;

display:flex;

flex-direction:column;

align-items:center;

justify-content:center;

}

.radar{

width:170px;

height:170px;

border-radius:50%;

border:5px solid #ff8800;

animation:radarPulse 2s infinite;

position:relative;

}

.radar::before{

content:"";

position:absolute;

top:50%;

left:50%;

width:22px;

height:22px;

background:#ff8800;

border-radius:50%;

transform:translate(-50%,-50%);

}

@keyframes radarPulse{

0%{

box-shadow:

0 0 0 0 rgba(255,136,0,.5);

}

100%{

box-shadow:

0 0 0 55px rgba(255,136,0,0);

}

}

.search-text{

margin-top:28px;

font-size:22px;

font-weight:bold;

color:#777;

text-align:center;

line-height:2;

}

.driver-card{

background:white;

margin:15px;

padding:15px;

border-radius:25px;

box-shadow:0 5px 20px rgba(0,0,0,.08);

display:none;

}

.driver-top{

display:flex;

align-items:center;

gap:12px;

}

.driver-image{

width:80px;

height:80px;

border-radius:20px;

object-fit:cover;

background:#eee;

}

.driver-info{

flex:1;

}

.driver-name{

font-size:22px;

font-weight:bold;

margin-bottom:8px;

}

.driver-phone{

font-size:15px;

color:#666;

}

.whatsapp-btn{

width:100%;

margin-top:15px;

padding:16px;

border:none;

border-radius:18px;

background:#25D366;

color:white;

font-size:17px;

font-weight:bold;

cursor:pointer;

}

#map{

width:100%;

height:45vh;

margin-top:10px;

display:none;

}

.bottom-box{

background:white;

margin:15px;

padding:20px;

border-radius:25px;

box-shadow:0 5px 20px rgba(0,0,0,.08);

}

.bottom-box h3{

font-size:22px;

margin-bottom:18px;

}

.live-status{

font-size:17px;

line-height:2;

color:#555;

}

.complete-btn{

width:100%;

padding:18px;

border:none;

border-radius:18px;

background:#00b894;

color:white;

font-size:18px;

font-weight:bold;

cursor:pointer;

margin-top:20px;

display:none;

}

.reject-btn{

width:100%;

padding:18px;

border:none;

border-radius:18px;

background:red;

color:white;

font-size:18px;

font-weight:bold;

cursor:pointer;

margin-top:15px;

display:none;

}

</style>

</head>

<body>

<div class="page">

<div class="top-header">

<div class="order-title">

طلبك قيد التوصيل 🚀

</div>

<div

class="order-status"

id="orderStatus">

جاري البحث عن سائق توصيل لإيصال طلبك

</div>

<div

class="timer-box"

id="timerBox">

00:00:00

</div>

</div>

<div

class="searching-box"

id="searchingBox">

<div class="radar"></div>

<div class="search-text">

جاري البحث عن سائق توصيل مناسب

</div>

</div>

<div

class="driver-card"

id="driverCard">

<div class="driver-top">

<img

src="driver.png"

class="driver-image"

id="driverImage">

<div class="driver-info">

<div

class="driver-name"

id="driverName">

السائق

</div>

<div

class="driver-phone"

id="driverPhone">

رقم الهاتف

</div>

</div>

</div>

<button

class="whatsapp-btn"

id="whatsappBtn">

مراسلة السائق عبر واتساب

</button>

</div>

<div id="map"></div>

<div class="bottom-box">

<h3>

حالة الطلب

</h3>

<div

class="live-status"

id="liveStatus">

بانتظار قبول سائق...

</div>

<button

class="complete-btn"

id="completeBtn">

استلام الطلب

</button>

<button

class="reject-btn"

id="rejectBtn">

لم أستلم الطلب

</button>

</div>

</div>

<script type="module">

import { initializeApp }

from "https://www.gstatic.com/firebasejs/12.13.0/firebase-app.js";

import {

getDatabase,

ref,

get,

update,

onValue

}

from "https://www.gstatic.com/firebasejs/12.13.0/firebase-database.js";

const firebaseConfig = {

apiKey:"AIzaSyC7QzQTYMSGRV_nraJBneBqDqYGhugF0Pw",

authDomain:"fast-937c9.firebaseapp.com",

projectId:"fast-937c9",

databaseURL:

"https://fast-937c9-default-rtdb.europe-west1.firebasedatabase.app"

};

const app =

initializeApp(firebaseConfig);

const db =

getDatabase(app);

const currentUser =

JSON.parse(localStorage.getItem("user"));

if(!currentUser){

window.location.replace("index.html");

}

const params =

new URLSearchParams(location.search);

const orderId =

params.get("orderId");

if(!orderId){

window.location.replace("home.html");

}

const orderRef =

ref(db,"orders/" + orderId);

const timerBox =

document.getElementById("timerBox");

const orderStatus =

document.getElementById("orderStatus");

const liveStatus =

document.getElementById("liveStatus");

const driverCard =

document.getElementById("driverCard");

const searchingBox =

document.getElementById("searchingBox");

const mapDiv =

document.getElementById("map");

const completeBtn =

document.getElementById("completeBtn");

const rejectBtn =

document.getElementById("rejectBtn");

let map;

let driverMarker;

let customerMarker;

let storeMarker;

let routeLine;

const bikeIcon =

L.icon({

iconUrl:

"https://cdn-icons-png.flaticon.com/512/2972/2972185.png",

iconSize:[45,45]

});

function formatTime(ms){

if(ms <= 0){

return "00:00:00";

}

let totalSeconds =

Math.floor(ms / 1000);

let hours =

String(

Math.floor(totalSeconds / 3600)

).padStart(2,"0");

let minutes =

String(

Math.floor((totalSeconds % 3600)/60)

).padStart(2,"0");

let seconds =

String(totalSeconds % 60)

.padStart(2,"0");

return `${hours}:${minutes}:${seconds}`;

}

function initMap(order){

if(map){

return;

}

mapDiv.style.display =

"block";

map =

L.map("map")

.setView(

[

order.customerLat,

order.customerLng

],

13

);

L.tileLayer(

'https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png'

).addTo(map);

customerMarker =

L.marker(

[

order.customerLat,

order.customerLng

]

)

.addTo(map)

.bindPopup("موقعك");

if(order.storeLat && order.storeLng){

storeMarker =

L.marker(

[

order.storeLat,

order.storeLng

]

)

.addTo(map)

.bindPopup("المتجر");

}

}

function updateDriverLocation(order){

if(

!order.driverLat ||

!order.driverLng

){

return;

}

if(!map){

initMap(order);

}

const driverLat =

Number(order.driverLat);

const driverLng =

Number(order.driverLng);

if(!driverMarker){

driverMarker =

L.marker(

[

driverLat,

driverLng

],

{

icon:bikeIcon

}

)

.addTo(map)

.bindPopup("سائق التوصيل");

}else{

driverMarker.setLatLng(

[

driverLat,

driverLng

]

);

}

if(routeLine){

map.removeLayer(routeLine);

}

routeLine =

L.polyline(

[

[

driverLat,

driverLng

],

[

order.storeLat,

order.storeLng

],

[

order.customerLat,

order.customerLng

]

],

{

color:"blue",

weight:6

}

).addTo(map);

map.fitBounds(

routeLine.getBounds(),

{

padding:[40,40]

}

);

}

onValue(orderRef,async(snapshot)=>{

if(!snapshot.exists()){

alert("تم حذف الطلب");

window.location.replace(

"home.html"

);

return;

}

const order =

snapshot.val();

// ======================
// عداد الوقت المباشر
// ======================

let timerStarted = false;

function startLiveTimer(createdAt){

if(timerStarted){
return;
}

timerStarted = true;

function updateTimer(){

const remaining =

(60 * 60 * 1000)

-

(Date.now() - createdAt);

timerBox.innerHTML =
formatTime(remaining);

// انتهى الوقت
if(remaining <= 0){

clearInterval(timerInterval);

timerBox.innerHTML =
"00:00:00";

}

}

updateTimer();

const timerInterval =
setInterval(updateTimer,1000);

}

if(order.status === "waiting_driver"){

orderStatus.innerHTML =

"جاري البحث عن سائق توصيل لإيصال طلبك";

liveStatus.innerHTML =

"بانتظار قبول سائق...";

}

if(order.status === "accepted"){

searchingBox.style.display =

"none";

driverCard.style.display =

"block";

document.getElementById("driverName")

.innerHTML =

order.acceptedDriver || "السائق";

document.getElementById("driverPhone")

.innerHTML =

order.driverPhone || "";

document.getElementById("whatsappBtn")

.onclick = function(){

window.open(

`https://wa.me/${order.driverPhone}`

);

};

orderStatus.innerHTML =

"تم قبول الطلب من قبل السائق";

liveStatus.innerHTML =

"السائق متجه إلى المتجر";

updateDriverLocation(order);

}

if(order.status === "picked_up"){

orderStatus.innerHTML =

"تم استلام الطلب من المتجر";

liveStatus.innerHTML =

"السائق في الطريق إليك";

updateDriverLocation(order);

}

if(order.status === "arrived"){

orderStatus.innerHTML =

"وصل السائق إلى موقعك";

liveStatus.innerHTML =

"السائق وصل إليك اضغط استلام الطلب";

completeBtn.style.display =

"block";

rejectBtn.style.display =

"block";

updateDriverLocation(order);

}

if(order.status === "delivered"){

alert("تم تسليم الطلب");

localStorage.removeItem(

"currentOrderId"

);

window.location.replace(

"home.html"

);

}

if(order.status === "failed_no_driver"){

alert(

"تم رفض الطلب بسبب عدم توفر سائق"

);

localStorage.removeItem(

"currentOrderId"

);

window.location.replace(

"home.html"

);

}

});

completeBtn.onclick =

async function(){

await update(orderRef,{

status:"completed_by_customer",

completedAt:Date.now()

});

localStorage.removeItem(

"currentOrderId"

);

alert("شكراً لك");

window.location.replace(

"home.html"

);

};

rejectBtn.onclick =

async function(){

await update(orderRef,{

status:"rejected_by_customer",

rejectedAt:Date.now()

});

localStorage.removeItem(

"currentOrderId"

);

alert("تم تسجيل المشكلة");

window.location.replace(

"home.html"

);

};

history.pushState(

null,

null,

location.href

);

window.onpopstate =

function(){

history.pushState(

null,

null,

location.href

);

};

window.addEventListener(

"beforeunload",

function(e){

e.preventDefault();

e.returnValue = "";

}

);

</script>

</body>

</html>
