<!-- talab.html -->

<!DOCTYPE html>
<html lang="ar" dir="rtl">

<head>

<meta charset="UTF-8">

<meta name="viewport"
content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">

<title>
الطلب
</title>

<link rel="stylesheet"
href="https://unpkg.com/leaflet/dist/leaflet.css"/>

<link rel="stylesheet"
href="https://unpkg.com/leaflet-routing-machine@latest/dist/leaflet-routing-machine.css"/>

<link rel="stylesheet"
href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css"/>

<link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;500;600;700;800&display=swap"
rel="stylesheet">

<script src="https://unpkg.com/leaflet/dist/leaflet.js"></script>

<script src="https://unpkg.com/leaflet-routing-machine@latest/dist/leaflet-routing-machine.js"></script>

<style>

*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:'Cairo',sans-serif;
-webkit-tap-highlight-color:transparent;
}

body{
background:#f5f6fa;
overflow-x:hidden;
}

.top-header{
background:
linear-gradient(
135deg,
#ff8800,
#ff5500
);

padding:25px 20px;
color:white;
border-bottom-left-radius:30px;
border-bottom-right-radius:30px;
box-shadow:0 8px 25px rgba(0,0,0,.12);
}

.order-title{
font-size:26px;
font-weight:bold;
margin-bottom:10px;
}

.order-status{
font-size:16px;
line-height:1.8;
opacity:.95;
}

.timer-box{
margin-top:18px;
background:rgba(255,255,255,.18);
padding:15px;
border-radius:18px;
font-size:24px;
font-weight:bold;
text-align:center;
backdrop-filter:blur(8px);
}

.searching-box{
padding:40px 20px;
display:flex;
flex-direction:column;
align-items:center;
justify-content:center;
}

.radar{
width:170px;
height:170px;
border-radius:50%;
border:5px solid #ff8800;
position:relative;
animation:radarPulse 2s infinite;
}

.radar::before{
content:"";
position:absolute;
top:50%;
left:50%;
width:22px;
height:22px;
border-radius:50%;
background:#ff8800;
transform:translate(-50%,-50%);
}

@keyframes radarPulse{

0%{
box-shadow:0 0 0 0 rgba(255,136,0,.5);
}

100%{
box-shadow:0 0 0 55px rgba(255,136,0,0);
}

}

.search-text{
margin-top:25px;
font-size:22px;
font-weight:bold;
color:#777;
text-align:center;
line-height:2;
}

.driver-card{
background:white;
margin:15px;
padding:18px;
border-radius:26px;
box-shadow:0 5px 20px rgba(0,0,0,.08);
display:none;
}

.driver-top{
display:flex;
align-items:center;
gap:15px;
}

.driver-image{
width:85px;
height:85px;
border-radius:22px;
object-fit:cover;
background:#eee;
}

.driver-info{
flex:1;
}

.driver-name{
font-size:22px;
font-weight:bold;
margin-bottom:8px;
}

.driver-phone{
font-size:15px;
color:#666;
}

.whatsapp-btn{
width:100%;
margin-top:18px;
padding:16px;
border:none;
border-radius:18px;
background:#25D366;
color:white;
font-size:17px;
font-weight:bold;
cursor:pointer;
}

#map{
width:100%;
height:45vh;
display:none;
margin-top:12px;
z-index:1;
}

.bottom-box{
background:white;
margin:15px;
padding:20px;
border-radius:26px;
box-shadow:0 5px 20px rgba(0,0,0,.08);
}

.bottom-box h3{
font-size:23px;
margin-bottom:20px;
}

.live-status{
font-size:17px;
line-height:2;
color:#555;
}

.store-box{
background:#fafafa;
padding:14px;
border-radius:22px;
margin-top:15px;
border:1px solid #eee;
}

.store-header{
display:flex;
align-items:center;
gap:12px;
margin-bottom:12px;
}

.store-image{
width:60px;
height:60px;
border-radius:16px;
object-fit:cover;
background:#eee;
}

.store-name{
font-size:17px;
font-weight:bold;
}

.product-box{
background:white;
padding:12px;
border-radius:18px;
margin-top:10px;
border:1px solid #eee;
}

.product-top{
display:flex;
align-items:center;
gap:12px;
}

.product-image{
width:58px;
height:58px;
border-radius:14px;
object-fit:cover;
background:#eee;
}

.product-info{
flex:1;
}

.product-name{
font-size:15px;
font-weight:bold;
margin-bottom:5px;
}

.product-details{
font-size:13px;
line-height:1.8;
color:#666;
}

.total-box{
background:#fff4e8;
padding:18px;
border-radius:20px;
margin-top:18px;
text-align:center;
font-size:18px;
font-weight:bold;
color:#ff6600;
line-height:2;
}

.complete-btn,
.reject-btn{
width:100%;
padding:18px;
border:none;
border-radius:18px;
color:white;
font-size:18px;
font-weight:bold;
cursor:pointer;
margin-top:18px;
display:none;
}

.complete-btn{
background:#00b894;
}

.reject-btn{
background:#e53935;
}

</style>

</head>

<body>

<div class="top-header">

<div class="order-title">
طلبك قيد التوصيل 🚀
</div>

<div
class="order-status"
id="orderStatus">

جاري البحث عن سائق

</div>

<div
class="timer-box"
id="timerBox">

00:00:00

</div>

</div>

<div
class="searching-box"
id="searchingBox">

<div class="radar"></div>

<div class="search-text">

جاري البحث عن سائق مناسب

</div>

</div>

<div
class="driver-card"
id="driverCard">

<div class="driver-top">

<img
src="driver.png"
class="driver-image"
id="driverImage">

<div class="driver-info">

<div
class="driver-name"
id="driverName">

السائق

</div>

<div
class="driver-phone"
id="driverPhone">

رقم الهاتف

</div>

</div>

</div>

<button
class="whatsapp-btn"
id="whatsappBtn">

مراسلة السائق عبر واتساب

</button>

</div>

<div id="map"></div>

<div class="bottom-box">

<h3>
تفاصيل الطلب
</h3>

<div
class="live-status"
id="liveStatus">

بانتظار قبول سائق

</div>

<div id="storesContainer"></div>

<div
class="total-box"
id="totalBox">

0 د.ع

</div>

<button
class="complete-btn"
id="completeBtn">

استلام الطلب

</button>

<button
class="reject-btn"
id="rejectBtn">

لم أستلم الطلب

</button>

</div>

<script type="module">

import { initializeApp }
from "https://www.gstatic.com/firebasejs/12.13.0/firebase-app.js";

import {

getDatabase,
ref,
onValue,
update,
remove

}

from "https://www.gstatic.com/firebasejs/12.13.0/firebase-database.js";

const firebaseConfig = {

apiKey:"AIzaSyC7QzQTYMSGRV_nraJBneBqDqYGhugF0Pw",

authDomain:"fast-937c9.firebaseapp.com",

projectId:"fast-937c9",

databaseURL:
"https://fast-937c9-default-rtdb.europe-west1.firebasedatabase.app"

};

const app =
initializeApp(firebaseConfig);

const db =
getDatabase(app);

const currentUser =
JSON.parse(localStorage.getItem("user"));

if(!currentUser){

window.location.href =
"index.html";

}

const params =
new URLSearchParams(location.search);

const orderId =
params.get("orderId");

if(!orderId){

window.location.href =
"home.html";

}

const orderRef =
ref(db,"orders/" + orderId);

const orderStatus =
document.getElementById("orderStatus");

const liveStatus =
document.getElementById("liveStatus");

const driverCard =
document.getElementById("driverCard");

const searchingBox =
document.getElementById("searchingBox");

const mapDiv =
document.getElementById("map");

const timerBox =
document.getElementById("timerBox");

let map;
let routeControl;
let driverMarker;

const bikeIcon =
L.divIcon({

html:`
<div style="
font-size:38px;
transform:rotate(-15deg);
">
🛵
</div>
`,

className:"",
iconSize:[40,40],
iconAnchor:[20,20]

});

const customerIcon =
L.divIcon({

html:`
<div style="
font-size:38px;
">
🚩
</div>
`,

className:"",
iconSize:[40,40],
iconAnchor:[20,35]

});

function createStoreIcon(name){

return L.divIcon({

html:`

<div style="
display:flex;
flex-direction:column;
align-items:center;
">

<div style="
font-size:34px;
">
🏪
</div>

<div style="
background:white;
padding:4px 10px;
border-radius:12px;
font-size:12px;
font-weight:bold;
margin-top:4px;
white-space:nowrap;
box-shadow:0 2px 10px rgba(0,0,0,.15);
">

${name}

</div>

</div>

`,

className:"",
iconSize:[40,40],
iconAnchor:[20,40]

});

}

function startTimer(createdAt){

setInterval(()=>{

const passed =
Date.now() - createdAt;

const remain =
Math.max(
0,
(60 * 60 * 1000) - passed
);

const h =
String(
Math.floor(remain / 1000 / 60 / 60)
).padStart(2,"0");

const m =
String(
Math.floor((remain / 1000 / 60) % 60)
).padStart(2,"0");

const s =
String(
Math.floor((remain / 1000) % 60)
).padStart(2,"0");

timerBox.innerHTML =
`${h}:${m}:${s}`;

},1000);

}

function renderStores(order){

const container =
document.getElementById(
"storesContainer"
);

container.innerHTML = "";

(order.storesData || [])
.forEach(store=>{

const storeItems =
(order.items || [])
.filter(
item =>
item.storeId === store.storeId
);

container.innerHTML += `

<div class="store-box">

<div class="store-header">

<img
src="${store.storeImage || 'store.png'}"
class="store-image">

<div class="store-name">
🏪 ${store.storeName}
</div>

</div>

${storeItems.map(item=>`

<div class="product-box">

<div class="product-top">

<img
src="${item.image || 'product.png'}"
class="product-image">

<div class="product-info">

<div class="product-name">

${item.name}

</div>

<div class="product-details">

📦 الكمية:
${item.qty}

<br>

💰 السعر:
${Number(item.price)
.toLocaleString()} د.ع

<br>

🧾 المجموع:
${Number(item.totalPrice)
.toLocaleString()} د.ع

</div>

</div>

</div>

</div>

`).join("")}

</div>

`;

});

document.getElementById(
"totalBox"
).innerHTML =

`
💰 المنتجات:
${Number(order.productsPrice || 0)
.toLocaleString()} د.ع

<br>

🚚 التوصيل:
${Number(order.deliveryPrice || 0)
.toLocaleString()} د.ع

<br>

🧾 الكلي:
${Number(order.totalPrice || 0)
.toLocaleString()} د.ع
`;

}

function initMap(order){

mapDiv.style.display = "block";

if(map){

map.remove();

}

map =
L.map("map").setView(
[
Number(order.customerLat),
Number(order.customerLng)
],
14
);

L.tileLayer(
'https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png',
{
maxZoom:19
}
).addTo(map);

L.marker(
[
Number(order.customerLat),
Number(order.customerLng)
],
{
icon:customerIcon
}
).addTo(map);

(order.storesData || [])
.forEach(store=>{

L.marker(
[
Number(store.storeLat),
Number(store.storeLng)
],
{
icon:createStoreIcon(store.storeName)
}
).addTo(map);

});

}

function updateDriver(order){

if(
!order.driverLat ||
!order.driverLng
){
return;
}

const driverLat =
Number(order.driverLat);

const driverLng =
Number(order.driverLng);

if(!driverMarker){

driverMarker =
L.marker(
[
driverLat,
driverLng
],
{
icon:bikeIcon
}
).addTo(map);

}else{

driverMarker.setLatLng(
[
driverLat,
driverLng
]
);

}

let targetLat;
let targetLng;

if(order.status === "accepted"){

targetLat =
Number(
order.storesData[0].storeLat
);

targetLng =
Number(
order.storesData[0].storeLng
);

}

if(
order.status === "on_the_way" ||
order.status === "arrived"
){

targetLat =
Number(order.customerLat);

targetLng =
Number(order.customerLng);

}

if(routeControl){

map.removeControl(
routeControl
);

}

routeControl =
L.Routing.control({

waypoints:[

L.latLng(
driverLat,
driverLng
),

L.latLng(
targetLat,
targetLng
)

],

routeWhileDragging:false,

addWaypoints:false,

draggableWaypoints:false,

fitSelectedRoutes:true,

show:false,

lineOptions:{
styles:[
{
color:"#ff6600",
weight:7
}
]
},

router:
L.Routing.osrmv1({
serviceUrl:
'https://router.project-osrm.org/route/v1'
}),

createMarker:()=>null

}).addTo(map);

}

onValue(orderRef,(snapshot)=>{

if(!snapshot.exists()){

window.location.href =
"home.html";

return;

}

const order =
snapshot.val();

renderStores(order);

if(order.createdAt){

startTimer(order.createdAt);

}

if(order.status === "waiting_driver"){

orderStatus.innerHTML =
"جاري البحث عن سائق";

liveStatus.innerHTML =
"بانتظار قبول سائق";

}

if(order.status === "accepted"){

searchingBox.style.display =
"none";

driverCard.style.display =
"block";

document.getElementById(
"driverName"
).innerHTML =

order.driverName || "السائق";

document.getElementById(
"driverPhone"
).innerHTML =

order.driverPhone || "";

document.getElementById(
"driverImage"
).src =

order.driverImage || "driver.png";

document.getElementById(
"whatsappBtn"
).onclick = function(){

window.open(
`https://wa.me/${order.driverPhone}`
);

};

orderStatus.innerHTML =
"تم قبول الطلب";

liveStatus.innerHTML =
"السائق متجه للمتجر";

initMap(order);

updateDriver(order);

}

if(order.status === "preparing_order"){

orderStatus.innerHTML =
"جاري تجهيز الطلب";

liveStatus.innerHTML =
"المتجر يقوم بتجهيز الطلب";

updateDriver(order);

}

if(order.status === "on_the_way"){

orderStatus.innerHTML =
"السائق بالطريق إليك";

liveStatus.innerHTML =
"السائق متجه إليك";

updateDriver(order);

}

if(order.status === "arrived"){

orderStatus.innerHTML =
"وصل السائق";

liveStatus.innerHTML =
"اضغط استلام الطلب";

document.getElementById(
"completeBtn"
).style.display = "block";

document.getElementById(
"rejectBtn"
).style.display = "block";

updateDriver(order);

}

if(order.status === "delivered"){

alert("تم توصيل الطلب");

localStorage.removeItem(
"currentOrderId"
);

window.location.href =
"home.html";

}

});

document.getElementById(
"completeBtn"
).onclick = async function(){

await update(orderRef,{

status:"completed_by_customer",

completedAt:Date.now()

});

window.location.href =
"home.html";

};

document.getElementById(
"rejectBtn"
).onclick = async function(){

await update(orderRef,{

status:"rejected_by_customer",

rejectedAt:Date.now()

});

window.location.href =
"home.html";

};

</script>

</body>

</html>
