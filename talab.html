<!DOCTYPE html>
<html lang="ar" dir="rtl">

<head>

<meta charset="UTF-8">

<meta
name="viewport"
content="width=device-width, initial-scale=1.0">

<title>
متابعة الطلب
</title>

<link
rel="stylesheet"
href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css"/>

<link
rel="stylesheet"
href="https://unpkg.com/leaflet/dist/leaflet.css"/>

<link
rel="stylesheet"
href="https://unpkg.com/leaflet-routing-machine/dist/leaflet-routing-machine.css"/>

<script src="https://unpkg.com/leaflet/dist/leaflet.js"></script>

<script src="https://unpkg.com/leaflet-routing-machine/dist/leaflet-routing-machine.js"></script>

<link
href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;500;600;700;800&display=swap"
rel="stylesheet">

<style>

*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:'Cairo',sans-serif;
}

body{
background:#f5f6fa;
padding-bottom:120px;
overflow-x:hidden;
}

.header{
background:
linear-gradient(
135deg,
#ff8800,
#ff5500
);

padding:24px;
color:white;

border-bottom-left-radius:30px;
border-bottom-right-radius:30px;
}

.status-title{
font-size:28px;
font-weight:bold;
margin-bottom:10px;
}

.status-text{
font-size:16px;
line-height:1.8;
opacity:.95;
}

.timer-box{
margin-top:20px;
padding:15px;
border-radius:18px;
background:rgba(255,255,255,.15);
backdrop-filter:blur(10px);
font-size:24px;
font-weight:bold;
text-align:center;
}

.card{
background:white;
margin:15px;
padding:18px;
border-radius:28px;
box-shadow:
0 5px 18px rgba(0,0,0,.06);
}

.driver-box{
display:flex;
align-items:center;
gap:15px;
margin-bottom:15px;
}

.driver-image{
width:85px;
height:85px;
border-radius:22px;
object-fit:cover;
background:#eee;
}

.driver-info h3{
font-size:22px;
margin-bottom:6px;
}

.driver-info p{
font-size:14px;
color:#666;
}

.whatsapp-btn{
width:100%;
height:55px;
border:none;
border-radius:18px;
background:#25D366;
color:white;
font-size:16px;
font-weight:bold;
cursor:pointer;
}

#map{
width:100%;
height:430px;
border-radius:24px;
overflow:hidden;
margin-top:15px;
}

.info-box{
background:#f8f8f8;
padding:16px;
border-radius:18px;
margin-bottom:14px;
line-height:2;
font-size:15px;
}

.action-btn{
width:100%;
height:58px;
border:none;
border-radius:18px;
font-size:16px;
font-weight:bold;
cursor:pointer;
margin-top:12px;
color:white;
}

.complete-btn{
background:#00b894;
}

.reject-btn{
background:#e53935;
}

.waiting-box{
padding:50px 20px;
text-align:center;
}

.radar{
width:160px;
height:160px;
border-radius:50%;
border:5px solid #ff8800;
margin:auto;
animation:pulse 2s infinite;
position:relative;
}

.radar::before{
content:"";
position:absolute;
top:50%;
left:50%;
width:22px;
height:22px;
background:#ff8800;
border-radius:50%;
transform:translate(-50%,-50%);
}

@keyframes pulse{

0%{
box-shadow:
0 0 0 0 rgba(255,136,0,.4);
}

100%{
box-shadow:
0 0 0 55px rgba(255,136,0,0);
}

}

.waiting-text{
margin-top:30px;
font-size:22px;
font-weight:bold;
color:#777;
}

</style>

</head>

<body>

<div class="header">

<div class="status-title">
طلبك قيد التوصيل 🚀
</div>

<div
class="status-text"
id="statusText">

جاري البحث عن سائق

</div>

<div
class="timer-box"
id="timerBox">

00:00:00

</div>

</div>

<div
class="waiting-box"
id="waitingBox">

<div class="radar"></div>

<div class="waiting-text">
جاري البحث عن سائق مناسب
</div>

</div>

<div
class="card"
id="driverCard"
style="display:none;">

<div class="driver-box">

<img
src="driver.png"
class="driver-image"
id="driverImage">

<div class="driver-info">

<h3 id="driverName">
السائق
</h3>

<p id="driverPhone">
0000000000
</p>

</div>

</div>

<button
class="whatsapp-btn"
id="whatsappBtn">

مراسلة السائق واتساب

</button>

<div id="map"></div>

</div>

<div class="card">

<div
class="info-box"
id="liveStatus">

بانتظار قبول السائق

</div>

<button
class="action-btn complete-btn"
id="completeBtn"
style="display:none;">

استلام الطلب

</button>

<button
class="action-btn reject-btn"
id="rejectBtn"
style="display:none;">

رفض الطلب

</button>

</div>

<script type="module">

import { db }
from "./firebase.js";

import {
ref,
onValue,
update,
remove
}
from "https://www.gstatic.com/firebasejs/12.13.0/firebase-database.js";

const currentUser =
JSON.parse(
localStorage.getItem("user")
);

if(!currentUser){

window.location.replace(
"index.html"
);

}

const params =
new URLSearchParams(
location.search
);

const orderId =
params.get("orderId");

if(!orderId){

window.location.replace(
"home.html"
);

}

const orderRef =
ref(
db,
"orders/" + orderId
);

const waitingBox =
document.getElementById(
"waitingBox"
);

const driverCard =
document.getElementById(
"driverCard"
);

const statusText =
document.getElementById(
"statusText"
);

const liveStatus =
document.getElementById(
"liveStatus"
);

const completeBtn =
document.getElementById(
"completeBtn"
);

const rejectBtn =
document.getElementById(
"rejectBtn"
);

let map;
let routeControl;
let driverMarker;

function startMap(order){

if(map){
return;
}

map =
L.map("map").setView(
[
Number(order.customerLat),
Number(order.customerLng)
],
14
);

L.tileLayer(
'https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png',
{
maxZoom:19
}
).addTo(map);

L.marker(
[
Number(order.customerLat),
Number(order.customerLng)
]
).addTo(map);

}

function updateMap(order){

startMap(order);

if(
!order.driverLat ||
!order.driverLng
){
return;
}

const driverLat =
Number(order.driverLat);

const driverLng =
Number(order.driverLng);

if(driverMarker){

driverMarker.setLatLng(
[
driverLat,
driverLng
]
);

}else{

driverMarker =
L.marker(
[
driverLat,
driverLng
]
).addTo(map);

}

if(routeControl){

map.removeControl(
routeControl
);

}

routeControl =
L.Routing.control({

waypoints:[

L.latLng(
driverLat,
driverLng
),

L.latLng(
Number(order.customerLat),
Number(order.customerLng)
)

],

addWaypoints:false,
draggableWaypoints:false,
fitSelectedRoutes:true,
show:false,

lineOptions:{
styles:[
{
color:"#ff8800",
weight:7
}
]
}

}).addTo(map);

}

onValue(
orderRef,
(snapshot)=>{

if(!snapshot.exists()){

window.location.replace(
"home.html"
);

return;

}

const order =
snapshot.val();

if(
order.status === "waiting_driver"
){

statusText.innerHTML =
"جاري البحث عن سائق";

liveStatus.innerHTML =
"بانتظار قبول السائق";

}

if(
order.status === "accepted"
||
order.status === "on_the_way"
||
order.status === "arrived"
){

waitingBox.style.display =
"none";

driverCard.style.display =
"block";

document.getElementById(
"driverName"
).innerHTML =
order.driverName || "";

document.getElementById(
"driverPhone"
).innerHTML =
order.driverPhone || "";

document.getElementById(
"whatsappBtn"
).onclick = ()=>{

window.open(
`https://wa.me/${order.driverPhone}`
);

};

updateMap(order);

}

if(order.status === "accepted"){

statusText.innerHTML =
"تم قبول الطلب";

liveStatus.innerHTML =
"السائق متجه للمتجر";

}

if(order.status === "on_the_way"){

statusText.innerHTML =
"السائق بالطريق إليك";

liveStatus.innerHTML =
"طلبك بالطريق";

}

if(order.status === "arrived"){

statusText.innerHTML =
"وصل السائق";

liveStatus.innerHTML =
"يمكنك استلام الطلب";

completeBtn.style.display =
"block";

rejectBtn.style.display =
"block";

}

if(order.status === "completed"){

alert("تم توصيل الطلب");

localStorage.removeItem(
"currentOrderId"
);

window.location.replace(
"home.html"
);

}

if(order.status === "cancelled"){

alert("تم إلغاء الطلب");

window.location.replace(
"home.html"
);

}

}
);

completeBtn.onclick =
async()=>{

await update(
orderRef,
{

status:"completed",

completedAt:
Date.now()

}
);

};

rejectBtn.onclick =
async()=>{

await update(
orderRef,
{

status:"cancelled",

cancelledAt:
Date.now()

}
);

};

</script>

</body>

</html>
