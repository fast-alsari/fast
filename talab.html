<!DOCTYPE html>
<html lang="ar" dir="rtl">

<head>

<meta charset="UTF-8">

<meta
name="viewport"
content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">

<title>
تتبع الطلب
</title>

<link
rel="stylesheet"
href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css"/>

<link
rel="stylesheet"
href="https://unpkg.com/leaflet/dist/leaflet.css"/>

<link
rel="stylesheet"
href="https://unpkg.com/leaflet-routing-machine/dist/leaflet-routing-machine.css"/>

<link
href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;500;600;700;800&display=swap"
rel="stylesheet">

<script src="https://unpkg.com/leaflet/dist/leaflet.js"></script>

<script src="https://unpkg.com/leaflet-routing-machine/dist/leaflet-routing-machine.js"></script>

<style>

*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:'Cairo',sans-serif;
-webkit-tap-highlight-color:transparent;
}

body{
background:#f5f6fa;
overflow-x:hidden;
padding-bottom:120px;
}

.header{
background:
linear-gradient(
135deg,
#ff8800,
#ff5500
);
padding:25px 20px;
color:white;
border-bottom-left-radius:30px;
border-bottom-right-radius:30px;
box-shadow:
0 8px 25px rgba(0,0,0,.10);
}

.header h2{
font-size:28px;
margin-bottom:10px;
}

.header p{
font-size:15px;
line-height:1.9;
opacity:.95;
}

.status-box{
margin-top:20px;
background:rgba(255,255,255,.15);
padding:18px;
border-radius:22px;
backdrop-filter:blur(10px);
}

.status-text{
font-size:18px;
font-weight:bold;
margin-bottom:10px;
}

.timer{
font-size:28px;
font-weight:bold;
}

.driver-card{
background:white;
margin:15px;
padding:18px;
border-radius:28px;
box-shadow:
0 5px 18px rgba(0,0,0,.06);
display:none;
}

.driver-top{
display:flex;
align-items:center;
gap:14px;
}

.driver-image{
width:85px;
height:85px;
border-radius:50%;
object-fit:cover;
background:#eee;
}

.driver-info{
flex:1;
}

.driver-name{
font-size:22px;
font-weight:bold;
margin-bottom:6px;
}

.driver-phone{
font-size:15px;
color:#666;
}

.whatsapp-btn{
width:100%;
height:55px;
border:none;
border-radius:18px;
background:#25D366;
color:white;
font-size:16px;
font-weight:bold;
cursor:pointer;
margin-top:16px;
}

.map-box{
margin:15px;
border-radius:28px;
overflow:hidden;
height:430px;
box-shadow:
0 5px 18px rgba(0,0,0,.06);
display:none;
}

#map{
width:100%;
height:100%;
}

.order-box{
background:white;
margin:15px;
padding:20px;
border-radius:28px;
box-shadow:
0 5px 18px rgba(0,0,0,.06);
}

.order-title{
font-size:22px;
font-weight:bold;
margin-bottom:18px;
}

.order-status{
font-size:17px;
line-height:2;
color:#555;
}

.actions{
display:flex;
flex-direction:column;
gap:12px;
margin-top:20px;
}

.action-btn{
width:100%;
height:56px;
border:none;
border-radius:20px;
font-size:16px;
font-weight:bold;
cursor:pointer;
color:white;
}

.complete-btn{
background:#00b894;
display:none;
}

.reject-btn{
background:#ff3b30;
display:none;
}

.cancel-btn{
background:#555;
}

.searching{
padding:60px 20px;
text-align:center;
}

.radar{
width:170px;
height:170px;
margin:auto;
border-radius:50%;
border:5px solid #ff8800;
position:relative;
animation:radar 2s infinite;
}

.radar::before{
content:"";
position:absolute;
top:50%;
left:50%;
transform:translate(-50%,-50%);
width:24px;
height:24px;
background:#ff8800;
border-radius:50%;
}

@keyframes radar{

0%{
box-shadow:
0 0 0 0 rgba(255,136,0,.45);
}

100%{
box-shadow:
0 0 0 55px rgba(255,136,0,0);
}

}

.searching p{
margin-top:30px;
font-size:22px;
font-weight:bold;
color:#777;
line-height:2;
}

</style>

</head>

<body>

<div class="header">

<h2>
تتبع الطلب 🚀
</h2>

<p id="headerText">

جاري البحث عن سائق توصيل

</p>

<div class="status-box">

<div
class="status-text"
id="statusText">

بانتظار قبول سائق

</div>

<div
class="timer"
id="timer">

00:00:00

</div>

</div>

</div>

<div
class="searching"
id="searchingBox">

<div class="radar"></div>

<p>

جاري البحث عن سائق مناسب

</p>

</div>

<div
class="driver-card"
id="driverCard">

<div class="driver-top">

<img
src="user.png"
id="driverImage"
class="driver-image">

<div class="driver-info">

<div
class="driver-name"
id="driverName">

السائق

</div>

<div
class="driver-phone"
id="driverPhone">

000000000

</div>

</div>

</div>

<button
class="whatsapp-btn"
id="whatsappBtn">

تواصل واتساب

</button>

</div>

<div
class="map-box"
id="mapBox">

<div id="map"></div>

</div>

<div class="order-box">

<div class="order-title">
حالة الطلب
</div>

<div
class="order-status"
id="liveStatus">

بانتظار قبول سائق

</div>

<div class="actions">

<button
class="action-btn complete-btn"
id="completeBtn">

استلام الطلب

</button>

<button
class="action-btn reject-btn"
id="rejectBtn">

رفض الطلب

</button>

<button
class="action-btn cancel-btn"
id="cancelBtn">

إلغاء الطلب

</button>

</div>

</div>

<script type="module">

import { db }
from "./firebase.js";

import {
ref,
onValue,
update,
remove
}
from "https://www.gstatic.com/firebasejs/12.13.0/firebase-database.js";

const currentUser =
JSON.parse(
localStorage.getItem("user")
);

if(
!currentUser ||
currentUser.type !== "customer"
){

window.location.replace(
"index.html"
);

}

const params =
new URLSearchParams(
location.search
);

const orderId =
params.get("orderId");

if(!orderId){

window.location.replace(
"home.html"
);

}

const orderRef =
ref(db,"orders/" + orderId);

const statusText =
document.getElementById(
"statusText"
);

const liveStatus =
document.getElementById(
"liveStatus"
);

const headerText =
document.getElementById(
"headerText"
);

const driverCard =
document.getElementById(
"driverCard"
);

const searchingBox =
document.getElementById(
"searchingBox"
);

const mapBox =
document.getElementById(
"mapBox"
);

const completeBtn =
document.getElementById(
"completeBtn"
);

const rejectBtn =
document.getElementById(
"rejectBtn"
);

let map;
let driverMarker;
let customerMarker;
let routingControl;

const customerIcon =
L.icon({

iconUrl:
"https://cdn-icons-png.flaticon.com/512/1077/1077114.png",

iconSize:[42,42],
iconAnchor:[21,42]

});

const driverIcon =
L.icon({

iconUrl:
"https://cdn-icons-png.flaticon.com/512/744/744465.png",

iconSize:[46,46],
iconAnchor:[23,46]

});

function initMap(order){

if(map){
return;
}

map =
L.map("map").setView(
[
order.customerLat,
order.customerLng
],
14
);

L.tileLayer(
'https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png',
{
maxZoom:19
}
).addTo(map);

customerMarker =
L.marker(
[
order.customerLat,
order.customerLng
],
{
icon:customerIcon
}
).addTo(map);

setTimeout(()=>{

map.invalidateSize();

},500);

}

function updateMap(order){

initMap(order);

if(
!order.driverLat ||
!order.driverLng
){
return;
}

if(driverMarker){

map.removeLayer(
driverMarker
);

}

driverMarker =
L.marker(
[
order.driverLat,
order.driverLng
],
{
icon:driverIcon
}
).addTo(map);

if(routingControl){

map.removeControl(
routingControl
);

}

routingControl =
L.Routing.control({

waypoints:[

L.latLng(
order.driverLat,
order.driverLng
),

L.latLng(
order.customerLat,
order.customerLng
)

],

routeWhileDragging:false,
addWaypoints:false,
draggableWaypoints:false,
fitSelectedRoutes:true,
show:false,

lineOptions:{
styles:[
{
color:"#2563eb",
weight:7
}
]
},

createMarker:()=>null

}).addTo(map);

}

function startTimer(createdAt){

setInterval(()=>{

const remaining =
Math.max(
0,
(60 * 60 * 1000)
-
(Date.now() - createdAt)
);

const hours =
String(
Math.floor(
remaining / 1000 / 60 / 60
)
).padStart(2,"0");

const minutes =
String(
Math.floor(
(remaining / 1000 / 60) % 60
)
).padStart(2,"0");

const seconds =
String(
Math.floor(
(remaining / 1000) % 60
)
).padStart(2,"0");

document.getElementById(
"timer"
).innerHTML =

`${hours}:${minutes}:${seconds}`;

},1000);

}

onValue(
orderRef,
(snapshot)=>{

if(!snapshot.exists()){

localStorage.removeItem(
"currentOrderId"
);

window.location.replace(
"home.html"
);

return;

}

const order =
snapshot.val();

startTimer(order.createdAt);

if(
order.status === "waiting_driver"
){

statusText.innerHTML =
"بانتظار قبول سائق";

liveStatus.innerHTML =
"جاري البحث عن سائق";

}

if(
order.status === "accepted"
){

searchingBox.style.display =
"none";

driverCard.style.display =
"block";

mapBox.style.display =
"block";

document.getElementById(
"driverName"
).innerHTML =

order.driverName || "السائق";

document.getElementById(
"driverPhone"
).innerHTML =

order.driverPhone || "";

document.getElementById(
"driverImage"
).src =

order.driverImage || "user.png";

document.getElementById(
"whatsappBtn"
).onclick = ()=>{

window.open(
`https://wa.me/${order.driverPhone}`
);

};

headerText.innerHTML =
"تم قبول الطلب";

statusText.innerHTML =
"السائق متجه إليك";

liveStatus.innerHTML =
"السائق في الطريق";

updateMap(order);

}

if(
order.status === "arrived"
){

completeBtn.style.display =
"block";

rejectBtn.style.display =
"block";

statusText.innerHTML =
"وصل السائق";

liveStatus.innerHTML =
"يرجى استلام الطلب";

updateMap(order);

}

if(
order.status === "delivered"
){

localStorage.removeItem(
"currentOrderId"
);

alert("تم توصيل الطلب");

window.location.replace(
"home.html"
);

}

if(
order.status === "cancelled"
){

localStorage.removeItem(
"currentOrderId"
);

alert("تم إلغاء الطلب");

window.location.replace(
"home.html"
);

}

}
);

completeBtn.onclick =
async function(){

await update(orderRef,{

status:"delivered",

deliveredAt:Date.now()

});

};

rejectBtn.onclick =
async function(){

await update(orderRef,{

status:"rejected_by_customer",

rejectedAt:Date.now()

});

};

document.getElementById(
"cancelBtn"
).onclick =
async function(){

const confirmCancel =
confirm("إلغاء الطلب؟");

if(!confirmCancel){
return;
}

await remove(orderRef);

localStorage.removeItem(
"currentOrderId"
);

window.location.replace(
"home.html"
);

};

</script>

</body>

</html>
