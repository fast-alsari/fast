<!DOCTYPE html>
<html lang="ar" dir="rtl">

<head>

<meta charset="UTF-8">

<meta
name="viewport"
content="width=device-width, initial-scale=1.0">

<title>
طلبات التكسي
</title>

<link
rel="stylesheet"
href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css"/>

<link
rel="stylesheet"
href="https://unpkg.com/leaflet/dist/leaflet.css"/>

<script src="https://unpkg.com/leaflet/dist/leaflet.js"></script>

<link
href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;500;600;700;800&display=swap"
rel="stylesheet">

<style>

*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:'Cairo',sans-serif;
}

body{
background:#f5f6fa;
padding-bottom:120px;
}

.header{
background:
linear-gradient(
135deg,
#ff8800,
#ff5500
);

padding:24px;
color:white;

border-bottom-left-radius:30px;
border-bottom-right-radius:30px;
}

.orders-container{
padding:15px;
display:flex;
flex-direction:column;
gap:18px;
}

.order-card{
background:white;
padding:18px;
border-radius:28px;
box-shadow:
0 5px 18px rgba(0,0,0,.06);
}

.order-top{
display:flex;
justify-content:space-between;
align-items:center;
margin-bottom:15px;
}

.price{
font-size:28px;
font-weight:bold;
color:#00b894;
}

.status{
padding:8px 14px;
border-radius:14px;
background:#fff3e0;
color:#ff8800;
font-size:13px;
font-weight:bold;
}

.customer-box{
background:#f8f8f8;
padding:15px;
border-radius:18px;
margin-bottom:15px;
}

.map{
width:100%;
height:300px;
border-radius:22px;
overflow:hidden;
margin-bottom:15px;
}

.actions{
display:grid;
grid-template-columns:1fr 1fr;
gap:10px;
}

.actions button,
.actions a{
height:52px;
border:none;
border-radius:16px;
font-size:14px;
font-weight:bold;
cursor:pointer;
text-decoration:none;
display:flex;
align-items:center;
justify-content:center;
color:white;
}

.accept-btn{
background:#00b894;
}

.whatsapp-btn{
background:#25D366;
}

.finish-btn{
background:#ff8800;
}

.reject-btn{
background:#e53935;
}

</style>

</head>

<body>

<div class="header">

<h2>
طلبات التكسي 🚖
</h2>

<p>
استقبال الرحلات الجديدة
</p>

</div>

<div
class="orders-container"
id="ordersContainer"></div>

<script type="module">

import { db }
from "./firebase.js";

import {
ref,
onValue,
update
}
from "https://www.gstatic.com/firebasejs/12.13.0/firebase-database.js";

import {
formatPrice
}
from "./utils.js";

const currentUser =
JSON.parse(
localStorage.getItem("user")
);

const container =
document.getElementById(
"ordersContainer"
);

onValue(
ref(db,"taxi_orders"),
(snapshot)=>{

container.innerHTML = "";

if(!snapshot.exists()){

container.innerHTML =
"لا توجد طلبات";

return;

}

const orders =
snapshot.val();

for(let key in orders){

const order =
orders[key];

container.innerHTML += `

<div class="order-card">

<div class="order-top">

<div class="status">
${order.status}
</div>

<div class="price">
${formatPrice(order.finalPrice)}
</div>

</div>

<div class="customer-box">

<h3>
${order.customerName}
</h3>

<p>
📞 ${order.customerPhone}
</p>

<p>
👥 ${order.persons} أشخاص
</p>

</div>

<div
class="map"
id="map_${order.id}"></div>

<div class="actions">

${order.status === "waiting"

?

`

<button
class="accept-btn"
onclick="acceptTaxi('${order.id}')">

قبول

</button>

`

:

`

<a
href="https://wa.me/${order.customerPhone}"
target="_blank"
class="whatsapp-btn">

واتساب

</a>

<button
class="finish-btn"
onclick="finishTaxi('${order.id}')">

تم التوصيل

</button>

<button
class="reject-btn"
onclick="rejectTaxi('${order.id}')">

رفض الزبون

</button>

`

}

</div>

</div>

`;

setTimeout(()=>{

createMap(order);

},100);

}

}
);

function createMap(order){

const map =
L.map(
`map_${order.id}`
).setView(
[
order.pickupLat,
order.pickupLng
],
13
);

L.tileLayer(
'https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png',
{
maxZoom:19
}
).addTo(map);

const pickup = [
order.pickupLat,
order.pickupLng
];

const destination = [
order.destinationLat,
order.destinationLng
];

L.marker(pickup)
.addTo(map);

L.marker(destination)
.addTo(map);

L.polyline(
[
pickup,
destination
],
{
color:"#2563eb",
weight:7
}
).addTo(map);

}

window.acceptTaxi =
async function(orderId){

await update(
ref(db,"taxi_orders/" + orderId),
{

status:"accepted",

driverId:
currentUser.id,

driverName:
currentUser.name,

driverPhone:
currentUser.phone

}
);

};

window.finishTaxi =
async function(orderId){

await update(
ref(db,"taxi_orders/" + orderId),
{

status:"completed",

completedAt:
Date.now()

}
);

alert("تم التوصيل");

};

window.rejectTaxi =
async function(orderId){

await update(
ref(db,"taxi_orders/" + orderId),
{

status:"cancelled"

}
);

alert("تم إلغاء الرحلة");

};

</script>

</body>

</html>
