<!DOCTYPE html>
<html lang="ar" dir="rtl">

<head>

<meta charset="UTF-8">

<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>لوحة تحكم الادمن</title>

<link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;500;700&display=swap" rel="stylesheet">

<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css"/>

<style>

*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:'Cairo',sans-serif;
}

body{
background:#f4f7fb;
padding:20px;
}

.header{
background:linear-gradient(45deg,#ff7b00,#0066ff);
padding:20px;
border-radius:20px;
color:#fff;
display:flex;
justify-content:space-between;
align-items:center;
margin-bottom:20px;
}

.logout-btn{
background:#fff;
color:#000;
border:none;
padding:10px 18px;
border-radius:12px;
cursor:pointer;
font-weight:bold;
}

.cards{
display:grid;
grid-template-columns:repeat(auto-fit,minmax(200px,1fr));
gap:15px;
margin-bottom:20px;
}

.stats-btn{
border:none;
background:linear-gradient(135deg,#ffffff,#f3f6ff);
padding:22px;
border-radius:24px;
display:flex;
align-items:center;
gap:15px;
cursor:pointer;
transition:0.3s;
box-shadow:0 8px 20px rgba(0,0,0,0.08);
text-align:right;
width:100%;
}

.stats-btn:hover{
transform:translateY(-5px);
}

.stats-icon{
width:70px;
height:70px;
border-radius:20px;
display:flex;
justify-content:center;
align-items:center;
font-size:28px;
color:white;
background:linear-gradient(45deg,#ff7b00,#0066ff);
flex-shrink:0;
}

.stats-info{
flex:1;
}

.stats-info h2{
font-size:34px;
color:#0066ff;
margin-bottom:5px;
}

.stats-info p{
font-size:16px;
font-weight:bold;
color:#444;
}

.tabs{
display:flex;
gap:10px;
margin-bottom:20px;
flex-wrap:wrap;
}

.tab-btn{
border:none;
padding:12px 18px;
border-radius:12px;
background:#ddd;
cursor:pointer;
font-weight:bold;
}

.tab-btn.active{
background:#ff7b00;
color:white;
}

.section{
display:none;
background:#fff;
padding:20px;
border-radius:20px;
margin-bottom:20px;
box-shadow:0 4px 10px rgba(0,0,0,0.08);
}

.active-section{
display:block;
}

.section-title{
font-size:22px;
margin-bottom:15px;
color:#ff7b00;
}

.item{
border:1px solid #ddd;
padding:15px;
border-radius:15px;
margin-bottom:15px;
}

.item p{
margin-bottom:8px;
}

.actions{
display:flex;
flex-wrap:wrap;
gap:10px;
margin-top:10px;
}

.actions button{
border:none;
padding:10px 15px;
border-radius:10px;
cursor:pointer;
font-weight:bold;
color:#fff;
}

.accept{
background:#00b894;
}

.reject{
background:#d63031;
}

.ban{
background:#e17055;
}

.location{
background:#0984e3;
}

.expire{
background:#6c5ce7;
}

.vip{
background:#111;
color:#ff8800 !important;
border:2px solid #ff8800 !important;
}

img{
max-width:100px;
max-height:100px;
object-fit:cover;
border-radius:15px;
margin-top:10px;
}

</style>

</head>

<body>

<div class="header">

<div>
<h1>لوحة تحكم الادمن</h1>
<p>إدارة التطبيق بالكامل</p>
</div>

<button class="logout-btn" onclick="logout()">
تسجيل الخروج
</button>

</div>

<div class="cards">

<button class="stats-btn" onclick="showSection('customersSection',document.querySelectorAll('.tab-btn')[0])">

<div class="stats-icon">
<i class="fa-solid fa-users"></i>
</div>

<div class="stats-info">
<h2 id="customersCount">0</h2>
<p>الزبائن</p>
</div>

</button>

<button class="stats-btn" onclick="showSection('storesSection',document.querySelectorAll('.tab-btn')[1])">

<div class="stats-icon">
<i class="fa-solid fa-store"></i>
</div>

<div class="stats-info">
<h2 id="storesCount">0</h2>
<p>المتاجر</p>
</div>

</button>

<button class="stats-btn" onclick="showSection('driversSection',document.querySelectorAll('.tab-btn')[2])">

<div class="stats-icon">
<i class="fa-solid fa-motorcycle"></i>
</div>

<div class="stats-info">
<h2 id="driversCount">0</h2>
<p>سائقين التوصيل</p>
</div>

</button>

<button class="stats-btn" onclick="showSection('taxiSection',document.querySelectorAll('.tab-btn')[3])">

<div class="stats-icon">
<i class="fa-solid fa-car"></i>
</div>

<div class="stats-info">
<h2 id="taxiCount">0</h2>
<p>سائقين التكسي</p>
</div>

</button>

</div>

<div class="tabs">

<button class="tab-btn active" onclick="showSection('customersSection',this)">
الزبائن
</button>

<button class="tab-btn" onclick="showSection('storesSection',this)">
المتاجر
</button>

<button class="tab-btn" onclick="showSection('driversSection',this)">
السواق
</button>

<button class="tab-btn" onclick="showSection('taxiSection',this)">
التكسي
</button>

<button class="tab-btn" onclick="showSection('productsSection',this)">
المنتجات
</button>

</div>

<div id="customersSection" class="section active-section">
<h2 class="section-title">المستخدمين</h2>
<div id="customersContainer"></div>
</div>

<div id="storesSection" class="section">
<h2 class="section-title">المتاجر</h2>
<div id="storesContainer"></div>
</div>

<div id="driversSection" class="section">
<h2 class="section-title">السواق</h2>
<div id="driversContainer"></div>
</div>

<div id="taxiSection" class="section">
<h2 class="section-title">سائقين التكسي</h2>
<div id="taxiContainer"></div>
</div>

<div id="productsSection" class="section">
<h2 class="section-title">المنتجات</h2>
<div id="productsContainer"></div>
</div>

<script type="module">

import { initializeApp } from "https://www.gstatic.com/firebasejs/12.13.0/firebase-app.js";

import {
getDatabase,
ref,
onValue,
update,
remove
}
from "https://www.gstatic.com/firebasejs/12.13.0/firebase-database.js";

const firebaseConfig = {

apiKey:"AIzaSyC7QzQTYMSGRV_nraJBneBqDqYGhugF0Pw",

authDomain:"fast-937c9.firebaseapp.com",

projectId:"fast-937c9",

storageBucket:"fast-937c9.firebasestorage.app",

messagingSenderId:"221388561840",

appId:"1:221388561840:web:ec9d75183ddd7d44be0a75",

measurementId:"G-CEKHEPNR9X",

databaseURL:"https://fast-937c9-default-rtdb.europe-west1.firebasedatabase.app"

};

const app = initializeApp(firebaseConfig);

const database = getDatabase(app);

const currentUser = JSON.parse(localStorage.getItem("user"));

if(!currentUser || currentUser.type !== "admin"){
window.location.href = "index.html";
}

window.logout = function(){
localStorage.removeItem("user");
window.location.href = "index.html";
};

window.showSection = function(id,button){

document.querySelectorAll(".section").forEach(section=>{
section.classList.remove("active-section");
});

document.getElementById(id).classList.add("active-section");

document.querySelectorAll(".tab-btn").forEach(btn=>{
btn.classList.remove("active");
});

button.classList.add("active");

};

function loadDashboard(){

// العملاء
onValue(ref(database,"customers"),(snapshot)=>{

const container = document.getElementById("customersContainer");

container.innerHTML = "";

if(snapshot.exists()){

const customers = snapshot.val();

document.getElementById("customersCount").innerText =
Object.keys(customers).length;

for(let id in customers){

let user = customers[id];

container.innerHTML += `

<div class="item">

<p><strong>الاسم:</strong> ${user.name || "-"}</p>

<p><strong>الهاتف:</strong> ${user.phone || "-"}</p>

<p><strong>العنوان:</strong> ${user.address || "-"}</p>

<p><strong>الحالة:</strong> ${user.status || "-"}</p>

</div>

`;

}

}

});

// المتاجر
onValue(ref(database,"stores"),(snapshot)=>{

const container = document.getElementById("storesContainer");

container.innerHTML = "";

if(snapshot.exists()){

const stores = snapshot.val();

document.getElementById("storesCount").innerText =
Object.keys(stores).length;

for(let id in stores){

let store = stores[id];

container.innerHTML += `

<div class="item">

<p><strong>اسم المتجر:</strong> ${store.store_name || "-"}</p>

<p><strong>المالك:</strong> ${store.owner || "-"}</p>

<p><strong>الهاتف:</strong> ${store.phone || "-"}</p>

<p><strong>الحالة:</strong> ${store.status || "-"}</p>

<img src="${store.storeImage || 'https://via.placeholder.com/100'}">

</div>

`;

}

}

});

// السواق
onValue(ref(database,"drivers"),(snapshot)=>{

const container = document.getElementById("driversContainer");

container.innerHTML = "";

if(snapshot.exists()){

const drivers = snapshot.val();

document.getElementById("driversCount").innerText =
Object.keys(drivers).length;

for(let id in drivers){

let driver = drivers[id];

container.innerHTML += `

<div class="item">

<p><strong>الاسم:</strong> ${driver.name || "-"}</p>

<p><strong>الهاتف:</strong> ${driver.phone || "-"}</p>

<p><strong>الحالة:</strong> ${driver.status || "-"}</p>

<img src="${driver.vehicleImage || 'https://via.placeholder.com/100'}">

</div>

`;

}

}

});

// التكسي
onValue(ref(database,"taxi_drivers"),(snapshot)=>{

const container = document.getElementById("taxiContainer");

container.innerHTML = "";

if(snapshot.exists()){

const taxis = snapshot.val();

document.getElementById("taxiCount").innerText =
Object.keys(taxis).length;

for(let id in taxis){

let taxi = taxis[id];

container.innerHTML += `

<div class="item">

<p><strong>الاسم:</strong> ${taxi.name || "-"}</p>

<p><strong>الهاتف:</strong> ${taxi.phone || "-"}</p>

<p><strong>نوع السيارة:</strong> ${taxi.carType || "-"}</p>

<img src="${taxi.carImage || 'https://via.placeholder.com/100'}">

</div>

`;

}

}

});

// المنتجات
onValue(ref(database,"store_products"),(snapshot)=>{

const container = document.getElementById("productsContainer");

container.innerHTML = "";

if(snapshot.exists()){

const storesProducts = snapshot.val();

for(let storeId in storesProducts){

let products = storesProducts[storeId];

for(let productId in products){

let product = products[productId];

container.innerHTML += `

<div class="item">

<p><strong>اسم المنتج:</strong> ${product.name || "-"}</p>

<p><strong>المتجر:</strong> ${product.storeName || "-"}</p>

<p><strong>السعر:</strong> ${product.price || 0} د.ع</p>

<p><strong>الحالة:</strong> ${product.status || "-"}</p>

<img src="${product.image || 'https://via.placeholder.com/100'}">

</div>

`;

}

}

}

});

}

loadDashboard();

</script>

</body>
</html>
