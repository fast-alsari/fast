<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>لوحة تحكم الادمن</title>

  <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;500;700;800&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css"/>

  <style>
    *{
      margin:0;
      padding:0;
      box-sizing:border-box;
      font-family:'Cairo',sans-serif;
    }

    body{
      background:#f4f7fb;
      padding:20px;
      color:#222;
    }

    .header{
      background:linear-gradient(45deg,#ff7b00,#0066ff);
      padding:20px;
      border-radius:20px;
      color:#fff;
      display:flex;
      justify-content:space-between;
      align-items:center;
      gap:12px;
      margin-bottom:20px;
      flex-wrap:wrap;
    }

    .header h1{
      font-size:28px;
      margin-bottom:6px;
    }

    .header p{
      font-size:14px;
      opacity:.95;
    }

    .logout-btn{
      background:#fff;
      color:#000;
      border:none;
      padding:10px 18px;
      border-radius:12px;
      cursor:pointer;
      font-weight:bold;
    }

    .cards{
      display:grid;
      grid-template-columns:repeat(auto-fit,minmax(220px,1fr));
      gap:15px;
      margin-bottom:20px;
    }

    .stats-btn{
      border:none;
      background:#fff;
      padding:22px;
      border-radius:24px;
      display:flex;
      align-items:center;
      gap:15px;
      cursor:pointer;
      transition:.3s;
      box-shadow:0 8px 20px rgba(0,0,0,.08);
      text-align:right;
    }

    .stats-btn:hover{
      transform:translateY(-5px);
    }

    .stats-icon{
      width:70px;
      height:70px;
      border-radius:20px;
      display:flex;
      justify-content:center;
      align-items:center;
      font-size:28px;
      color:#fff;
      background:linear-gradient(45deg,#ff7b00,#0066ff);
      flex-shrink:0;
    }

    .stats-info h2{
      font-size:34px;
      color:#0066ff;
      line-height:1.1;
    }

    .stats-info p{
      font-size:16px;
      font-weight:bold;
      color:#444;
      margin-top:4px;
    }

    .tabs{
      display:flex;
      gap:10px;
      margin-bottom:20px;
      flex-wrap:wrap;
    }

    .tab-btn{
      border:none;
      padding:12px 18px;
      border-radius:12px;
      background:#ddd;
      cursor:pointer;
      font-weight:bold;
    }

    .tab-btn.active{
      background:#ff7b00;
      color:#fff;
    }

    .section{
      display:none;
      background:#fff;
      padding:20px;
      border-radius:20px;
      margin-bottom:20px;
      box-shadow:0 4px 10px rgba(0,0,0,.08);
    }

    .active-section{
      display:block;
    }

    .section-title{
      font-size:22px;
      margin-bottom:15px;
      color:#ff7b00;
    }

    .filter-buttons{
      display:flex;
      gap:10px;
      flex-wrap:wrap;
      margin-bottom:20px;
    }

    .filter-buttons button{
      border:none;
      padding:10px 18px;
      border-radius:12px;
      cursor:pointer;
      font-weight:bold;
      background:#0066ff;
      color:#fff;
    }

    .item{
      border:1px solid #ddd;
      padding:15px;
      border-radius:15px;
      margin-bottom:15px;
      background:#fff;
    }

    .item p{
      margin-bottom:8px;
      line-height:1.8;
      word-break:break-word;
    }

    .actions{
      display:flex;
      gap:10px;
      flex-wrap:wrap;
      margin-top:15px;
    }

    .actions button{
      border:none;
      padding:10px 15px;
      border-radius:10px;
      cursor:pointer;
      font-weight:bold;
      color:#fff;
    }

    .accept{ background:#00b894; }
    .reject{ background:#d63031; }
    .map-btn{ background:#0984e3; }
    .vip-btn{ background:#ff8800; }
    .remove-vip-btn{ background:#555; }

    .big-image{
      width:120px;
      height:120px;
      object-fit:cover;
      border-radius:15px;
      margin-top:10px;
      border:2px solid #eee;
      background:#fafafa;
    }

    .status-active{
      color:#00b894;
      font-weight:bold;
    }

    .status-inactive{
      color:#d63031;
      font-weight:bold;
    }

    .vip-status{
      background:linear-gradient(45deg,#ff8800,#ff0000);
      color:white;
      padding:6px 12px;
      border-radius:10px;
      font-size:13px;
      font-weight:bold;
      display:inline-block;
      margin-top:8px;
    }

    .schedule-box{
      margin-top:15px;
      padding:15px;
      border-radius:15px;
      background:#f7f9ff;
      border:1px solid #e2e8ff;
    }

    .schedule-item{
      display:flex;
      justify-content:space-between;
      padding:8px 0;
      border-bottom:1px solid #eee;
      font-size:14px;
      gap:10px;
    }

    .schedule-item:last-child{
      border-bottom:none;
    }

    .mini-badge{
      display:inline-block;
      margin-top:8px;
      padding:6px 10px;
      border-radius:10px;
      background:#f3f3f3;
      font-size:13px;
      font-weight:bold;
    }

    @media (max-width:640px){
      body{ padding:12px; }
      .header h1{ font-size:22px; }
      .stats-btn{ padding:16px; }
      .stats-icon{ width:58px; height:58px; font-size:22px; }
      .stats-info h2{ font-size:28px; }
      .cards{ grid-template-columns:1fr 1fr; }
    }
  </style>
</head>

<body>

  <div class="header">
    <div>
      <h1>لوحة تحكم الادمن</h1>
      <p>إدارة التطبيق بالكامل</p>
    </div>

    <button class="logout-btn" onclick="logout()">تسجيل الخروج</button>
  </div>

  <div class="cards">
    <button class="stats-btn" onclick="showSection('customersSection',document.querySelectorAll('.tab-btn')[0])">
      <div class="stats-icon"><i class="fa-solid fa-users"></i></div>
      <div class="stats-info">
        <h2 id="customersCount">0</h2>
        <p>المستخدمين</p>
      </div>
    </button>

    <button class="stats-btn" onclick="showSection('storesSection',document.querySelectorAll('.tab-btn')[1])">
      <div class="stats-icon"><i class="fa-solid fa-store"></i></div>
      <div class="stats-info">
        <h2 id="storesCount">0</h2>
        <p>المتاجر</p>
      </div>
    </button>

    <button class="stats-btn" onclick="showSection('driversSection',document.querySelectorAll('.tab-btn')[2])">
      <div class="stats-icon"><i class="fa-solid fa-motorcycle"></i></div>
      <div class="stats-info">
        <h2 id="driversCount">0</h2>
        <p>سواق التوصيل</p>
      </div>
    </button>

    <button class="stats-btn" onclick="showSection('taxiSection',document.querySelectorAll('.tab-btn')[3])">
      <div class="stats-icon"><i class="fa-solid fa-taxi"></i></div>
      <div class="stats-info">
        <h2 id="taxiCount">0</h2>
        <p>سواق التكسي</p>
      </div>
    </button>

    <button class="stats-btn" onclick="showSection('productsSection',document.querySelectorAll('.tab-btn')[4])">
      <div class="stats-icon"><i class="fa-solid fa-box"></i></div>
      <div class="stats-info">
        <h2 id="productsCount">0</h2>
        <p>المنتجات</p>
      </div>
    </button>

    <button class="stats-btn" onclick="showSection('adsSection',document.querySelectorAll('.tab-btn')[5])">
      <div class="stats-icon"><i class="fa-solid fa-bullhorn"></i></div>
      <div class="stats-info">
        <h2 id="adsCount">0</h2>
        <p>الإعلانات</p>
      </div>
    </button>
  </div>

  <div class="tabs">
    <button class="tab-btn active" onclick="showSection('customersSection',this)">المستخدمين</button>
    <button class="tab-btn" onclick="showSection('storesSection',this)">المتاجر</button>
    <button class="tab-btn" onclick="showSection('driversSection',this)">سواق التوصيل</button>
    <button class="tab-btn" onclick="showSection('taxiSection',this)">سواق التكسي</button>
    <button class="tab-btn" onclick="showSection('productsSection',this)">المنتجات</button>
    <button class="tab-btn" onclick="showSection('adsSection',this)">الإعلانات</button>
  </div>

  <div id="customersSection" class="section active-section">
    <h2 class="section-title">المستخدمين</h2>
    <div id="customersContainer"></div>
  </div>

  <div id="storesSection" class="section">
    <h2 class="section-title">المتاجر</h2>

    <div class="filter-buttons">
      <button onclick="showActiveStores()">المتاجر المفعلة (<span id="activeStoresCount">0</span>)</button>
      <button onclick="showInactiveStores()">المتاجر الغير مفعلة (<span id="inactiveStoresCount">0</span>)</button>
      <button onclick="activateAllStores()">تفعيل الكل</button>
      <button onclick="deactivateAllStores()">الغاء تفعيل الكل</button>
    </div>

    <div id="storesContainer"></div>
  </div>

  <div id="driversSection" class="section">
    <h2 class="section-title">سواق التوصيل</h2>
    <div id="driversContainer"></div>
  </div>

  <div id="taxiSection" class="section">
    <h2 class="section-title">سواق التكسي</h2>
    <div id="taxiContainer"></div>
  </div>

  <div id="productsSection" class="section">
    <h2 class="section-title">المنتجات</h2>

    <div class="filter-buttons">
      <button onclick="showPendingProducts()">قيد المراجعة</button>
      <button onclick="showApprovedProducts()">المقبولة</button>
    </div>

    <div id="productsContainer"></div>
  </div>

  <div id="adsSection" class="section">
    <h2 class="section-title">لوحة الإعلانات</h2>

    <div class="item">
      <input type="file" id="adImage" accept="image/*" style="width:100%;padding:14px;border-radius:12px;border:1px solid #ddd;margin-bottom:12px;background:#fff;">
      <input type="text" id="adStoreId" placeholder="ايدي المتجر اختياري" style="width:100%;padding:14px;border-radius:12px;border:1px solid #ddd;margin-bottom:12px;">
      <input type="text" id="adLink" placeholder="رابط خارجي اختياري" style="width:100%;padding:14px;border-radius:12px;border:1px solid #ddd;margin-bottom:12px;">
      <button onclick="addAd()" style="width:100%;padding:14px;border:none;border-radius:14px;background:#00b894;color:#fff;font-size:16px;font-weight:bold;cursor:pointer;">
        رفع الإعلان
      </button>
    </div>

    <div id="adsContainer"></div>
  </div>

  <script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/12.13.0/firebase-app.js";
    import {
      getDatabase,
      ref,
      onValue,
      update,
      remove,
      set
    } from "https://www.gstatic.com/firebasejs/12.13.0/firebase-database.js";

    const firebaseConfig = {
      apiKey: "AIzaSyC7QzQTYMSGRV_nraJBneBqDqYGhugF0Pw",
      authDomain: "fast-937c9.firebaseapp.com",
      projectId: "fast-937c9",
      storageBucket: "fast-937c9.firebasestorage.app",
      messagingSenderId: "221388561840",
      appId: "1:221388561840:web:ec9d75183ddd7d44be0a75",
      measurementId: "G-CEKHEPNR9X",
      databaseURL: "https://fast-937c9-default-rtdb.europe-west1.firebasedatabase.app"
    };

    const app = initializeApp(firebaseConfig);
    const database = getDatabase(app);

    const IMAGE_UPLOAD_WORKER_URL = "https://floral-pine-2aa7.ahmed-a-ahmed00457.workers.dev/";

    const currentUser = JSON.parse(localStorage.getItem("user") || "null");
    if(!currentUser || currentUser.type !== "admin"){
      window.location.href = "index.html";
    }

    let allStoresData = {};
    let allProductsData = {};
    let allAdsData = {};

    function safeText(v, fallback = "-"){
      const s = String(v ?? "").trim();
      return s || fallback;
    }

    function formatDateValue(value){
      if(!value) return "-";
      return String(value);
    }

    function showSection(id, button){
      document.querySelectorAll(".section").forEach(section => section.classList.remove("active-section"));
      document.getElementById(id).classList.add("active-section");

      document.querySelectorAll(".tab-btn").forEach(btn => btn.classList.remove("active"));
      if(button) button.classList.add("active");
    }

    window.showSection = showSection;

    window.logout = function(){
      localStorage.removeItem("user");
      window.location.href = "index.html";
    };

    async function uploadAdImage(file){
      try{
        const formData = new FormData();
        formData.append("file", file);

        const response = await fetch(IMAGE_UPLOAD_WORKER_URL, {
          method:"POST",
          body:formData
        });

        const data = await response.json();
        return data.url || data.fullResponse?.url || "";
      }catch(error){
        console.error(error);
        alert("حدث خطأ أثناء رفع الصورة");
        return "";
      }
    }

    function openMap(lat, lng){
      if(!lat || !lng){
        alert("لا يوجد موقع لهذا المتجر");
        return;
      }
      window.open(`https://www.google.com/maps?q=${lat},${lng}`, "_blank");
    }
    window.openMap = openMap;

    function renderSchedule(workingHours){
      if(!workingHours) return "<p>لا يوجد جدول دوام</p>";

      const list = Array.isArray(workingHours)
        ? workingHours
        : Object.values(workingHours);

      if(!list.length) return "<p>لا يوجد جدول دوام</p>";

      return `
        <div class="schedule-box">
          <h3 style="margin-bottom:10px;">جدول الدوام الأسبوعي</h3>
          ${list.map(hour => `
            <div class="schedule-item">
              <span>${safeText(hour.day)}</span>
              <span>من: ${safeText(hour.from)} | الى: ${safeText(hour.to)}</span>
            </div>
          `).join("")}
        </div>
      `;
    }

    function renderStore(id, store){
      const container = document.getElementById("storesContainer");
      container.innerHTML += `
        <div class="item">
          <p><strong>اسم المتجر:</strong> ${safeText(store.store_name)}</p>
          <p><strong>اسم صاحب المتجر:</strong> ${safeText(store.owner)}</p>
          <p>
            <strong>الحالة:</strong>
            <span class="${store.status === "active" ? "status-active" : "status-inactive"}">${safeText(store.status, "inactive")}</span>
          </p>
          <p>
            <strong>نوع الحساب:</strong>
            ${
              String(store.accountType || "").toLowerCase() === "vip"
                ? `<span class="vip-status">🔥 VIP</span>`
                : `عادي`
            }
          </p>
          <p><strong>انتهاء VIP:</strong> ${safeText(store.vipExpireDate)}</p>
          <p><strong>تاريخ انتهاء الاشتراك:</strong> ${safeText(store.expireDate)}</p>
          <p><strong>تاريخ التجديد:</strong> ${safeText(store.renewDate)}</p>

          <div class="actions">
            <button class="accept" onclick="activateStore('${id}')">تفعيل شهر</button>
            <button class="reject" onclick="deactivateStore('${id}')">الغاء التفعيل</button>
            <button class="vip-btn" onclick="activateVipStore('${id}')">تفعيل VIP</button>
            <button class="remove-vip-btn" onclick="removeVipStore('${id}')">إلغاء VIP</button>
            <button class="map-btn" onclick="openMap('${store.latitude || ""}','${store.longitude || ""}')">عرض الموقع</button>
          </div>

          ${renderSchedule(store.workingHours)}

          <p><strong>صورة المتجر:</strong></p>
          <img class="big-image" src="${store.store_image || store.image || 'https://via.placeholder.com/120'}" onerror="this.src='https://via.placeholder.com/120'">

          <p><strong>هوية صاحب المتجر:</strong></p>
          <img class="big-image" src="${store.store_card || 'https://via.placeholder.com/120'}" onerror="this.src='https://via.placeholder.com/120'">
        </div>
      `;
    }

    function renderDriver(id, driver){
      const container = document.getElementById("driversContainer");
      container.innerHTML += `
        <div class="item">
          <p><strong>الاسم:</strong> ${safeText(driver.name)}</p>
          <p><strong>الرقم:</strong> ${safeText(driver.phone)}</p>
          <p><strong>الحالة:</strong> <span class="${driver.status === "active" ? "status-active" : "status-inactive"}">${safeText(driver.status, "inactive")}</span></p>
          <p><strong>تاريخ الاشتراك:</strong> ${safeText(driver.renewDate)}</p>
          <p><strong>تاريخ الانتهاء:</strong> ${safeText(driver.expireDate)}</p>

          <p>
            <strong>الحساب:</strong>
            ${
              String(driver.accountType || "").toLowerCase() === "vip"
                ? `<span class="vip-status">🔥 VIP</span>`
                : `عادي`
            }
          </p>

          <p><strong>انتهاء VIP:</strong> ${safeText(driver.vipExpireDate)}</p>
          <p><strong>عدد الطلبات:</strong> ${Number(driver.completedOrders || 0)}</p>
          <p><strong>مبلغ التوصيل:</strong> ${Number(driver.totalDeliveryAmount || 0).toLocaleString()} د.ع</p>

          <div class="actions">
            <button class="accept" onclick="activateDriver('${id}')">تفعيل</button>
            <button class="reject" onclick="deactivateDriver('${id}')">إلغاء</button>
            <button class="vip-btn" onclick="activateVipDriver('${id}')">VIP</button>
            <button class="remove-vip-btn" onclick="removeVipDriver('${id}')">إلغاء VIP</button>
          </div>

          <p><strong>صورة الهوية:</strong></p>
          <img class="big-image" src="${driver.idImage || 'https://via.placeholder.com/120'}" onerror="this.src='https://via.placeholder.com/120'">

          <p><strong>صورة المركبة:</strong></p>
          <img class="big-image" src="${driver.vehicleImage || 'https://via.placeholder.com/120'}" onerror="this.src='https://via.placeholder.com/120'">
        </div>
      `;
    }

    function renderTaxi(id, taxi){
      const container = document.getElementById("taxiContainer");
      container.innerHTML += `
        <div class="item">
          <p><strong>الاسم:</strong> ${safeText(taxi.name)}</p>
          <p><strong>الرقم:</strong> ${safeText(taxi.phone)}</p>
          <p><strong>نوع السيارة:</strong> ${safeText(taxi.vehicleType || taxi.carType)}</p>
          <p><strong>لون السيارة:</strong> ${safeText(taxi.color || taxi.carColor)}</p>
          <p><strong>رقم السيارة:</strong> ${safeText(taxi.plate || taxi.carNumber)}</p>
          <p><strong>الحالة:</strong> <span class="${taxi.status === "active" ? "status-active" : "status-inactive"}">${safeText(taxi.status, "inactive")}</span></p>
          <p><strong>تاريخ الاشتراك:</strong> ${safeText(taxi.renewDate)}</p>
          <p><strong>تاريخ الانتهاء:</strong> ${safeText(taxi.expireDate)}</p>

          <p>
            <strong>الحساب:</strong>
            ${
              String(taxi.accountType || "").toLowerCase() === "vip"
                ? `<span class="vip-status">🔥 VIP</span>`
                : `عادي`
            }
          </p>

          <p><strong>انتهاء VIP:</strong> ${safeText(taxi.vipExpireDate)}</p>
          <p><strong>عدد الطلبات:</strong> ${Number(taxi.completedOrders || 0)}</p>
          <p><strong>مبلغ التكسي:</strong> ${Number(taxi.totalTaxiAmount || 0).toLocaleString()} د.ع</p>
          <p><strong>التقييم:</strong> ${taxi.rating != null ? taxi.rating : "0.0"} / 10</p>
          <p><strong>عدد التقييمات:</strong> ${Number(taxi.ratingCount || 0)}</p>
          <p><strong>تاريخ الإنشاء:</strong> ${formatDateValue(taxi.createdAt)}</p>

          <div class="actions">
            <button class="accept" onclick="activateTaxi('${id}')">تفعيل</button>
            <button class="reject" onclick="deactivateTaxi('${id}')">إلغاء</button>
            <button class="vip-btn" onclick="activateVipTaxi('${id}')">VIP</button>
            <button class="remove-vip-btn" onclick="removeVipTaxi('${id}')">إلغاء VIP</button>
          </div>

          <p><strong>صورة الهوية:</strong></p>
          <img class="big-image" src="${taxi.idImage || 'https://via.placeholder.com/120'}" onerror="this.src='https://via.placeholder.com/120'">

          <p><strong>صورة السيارة:</strong></p>
          <img class="big-image" src="${taxi.vehicleImage || taxi.carImage || 'https://via.placeholder.com/120'}" onerror="this.src='https://via.placeholder.com/120'">
        </div>
      `;
    }

    function renderAd(id, ad){
      const container = document.getElementById("adsContainer");
      container.innerHTML += `
        <div class="item">
          <p><strong>الحالة:</strong> <span class="${ad.status === "active" ? "status-active" : "status-inactive"}">${safeText(ad.status)}</span></p>
          <p><strong>ايدي المتجر:</strong> ${safeText(ad.storeId)}</p>
          <p><strong>الرابط:</strong> ${safeText(ad.link)}</p>
          <img src="${ad.image}" class="big-image" onerror="this.src='https://via.placeholder.com/120'">
          <div class="actions">
            <button class="accept" onclick="activateAd('${id}')">تفعيل</button>
            <button class="reject" onclick="deactivateAd('${id}')">إيقاف</button>
            <button class="map-btn" onclick="deleteAd('${id}')">حذف</button>
          </div>
        </div>
      `;
    }

    function loadDashboard(){
      onValue(ref(database,"customers"), snapshot => {
        const container = document.getElementById("customersContainer");
        container.innerHTML = "";

        if(!snapshot.exists()){
          document.getElementById("customersCount").innerText = "0";
          return;
        }

        const customers = snapshot.val();
        document.getElementById("customersCount").innerText = Object.keys(customers).length;

        for(const id in customers){
          const user = customers[id];
          container.innerHTML += `
            <div class="item">
              <p><strong>الاسم:</strong> ${safeText(user.name)}</p>
              <p><strong>الرقم:</strong> ${safeText(user.phone)}</p>
              <p><strong>عدد الطلبات:</strong> ${Number(user.ordersCount || 0)}</p>
              <p><strong>السعر الكلي:</strong> ${Number(user.totalPrice || 0).toLocaleString()} د.ع</p>
              <p><strong>عدد التوصيلات:</strong> ${Number(user.deliveryCount || 0)}</p>
              <p><strong>السعر الكلي للتوصيل:</strong> ${Number(user.deliveryTotal || 0).toLocaleString()} د.ع</p>
              <p><strong>الطلبات الملغية:</strong> ${Number(user.cancelledOrders || 0)}</p>
              <p><strong>الطلبات المكتملة:</strong> ${Number(user.completedOrders || 0)}</p>
            </div>
          `;
        }
      });

      onValue(ref(database,"stores"), async snapshot => {
        const container = document.getElementById("storesContainer");
        container.innerHTML = "";

        if(!snapshot.exists()){
          document.getElementById("storesCount").innerText = "0";
          document.getElementById("activeStoresCount").innerText = "0";
          document.getElementById("inactiveStoresCount").innerText = "0";
          return;
        }

        const stores = snapshot.val();
        allStoresData = stores;
        document.getElementById("storesCount").innerText = Object.keys(stores).length;

        let activeCount = 0;
        let inactiveCount = 0;

        for(const id in stores){
          const store = stores[id];

          if(String(store.accountType || "").toLowerCase() === "vip"){
            const today = new Date().toISOString().split("T")[0];
            if(store.vipExpireDate && today > store.vipExpireDate){
              await update(ref(database,"stores/"+id), {
                accountType:"normal",
                vipExpireDate:""
              });
              store.accountType = "normal";
              store.vipExpireDate = "";
            }
          }

          if(store.status === "active") activeCount++;
          else inactiveCount++;

          renderStore(id, store);
        }

        document.getElementById("activeStoresCount").innerText = activeCount;
        document.getElementById("inactiveStoresCount").innerText = inactiveCount;
      });

      onValue(ref(database,"drivers"), snapshot => {
        const container = document.getElementById("driversContainer");
        container.innerHTML = "";

        if(!snapshot.exists()){
          document.getElementById("driversCount").innerText = "0";
          return;
        }

        const drivers = snapshot.val();
        document.getElementById("driversCount").innerText = Object.keys(drivers).length;

        for(const id in drivers){
          renderDriver(id, drivers[id]);
        }
      });

      onValue(ref(database,"taxis"), snapshot => {
        const container = document.getElementById("taxiContainer");
        container.innerHTML = "";

        if(!snapshot.exists()){
          document.getElementById("taxiCount").innerText = "0";
          return;
        }

        const taxis = snapshot.val();
        document.getElementById("taxiCount").innerText = Object.keys(taxis).length;

        for(const id in taxis){
          renderTaxi(id, taxis[id]);
        }
      });

      onValue(ref(database,"store_products"), snapshot => {
        const container = document.getElementById("productsContainer");
        container.innerHTML = "";
        allProductsData = {};
        let totalProducts = 0;

        if(!snapshot.exists()){
          document.getElementById("productsCount").innerText = "0";
          return;
        }

        const storesProducts = snapshot.val();

        for(const storeId in storesProducts){
          const products = storesProducts[storeId];

          for(const productId in products){
            const product = products[productId];
            product.id = productId;
            product.storeId = storeId;
            allProductsData[productId] = product;

            if(product.deleted) continue;
            totalProducts++;

            if(product.status !== "approved"){
              container.innerHTML += `
                <div class="item">
                  <p><strong>اسم المنتج:</strong> ${safeText(product.name)}</p>
                  <p><strong>السعر:</strong> ${Number(product.price || 0).toLocaleString()} د.ع</p>
                  <p><strong>اسم المتجر:</strong> ${safeText(product.storeName)}</p>
                  <p><strong>الوصف:</strong> ${safeText(product.description)}</p>
                  <img class="big-image" src="${product.image || 'https://via.placeholder.com/120'}" onerror="this.src='https://via.placeholder.com/120'">

                  <div class="actions">
                    <button class="accept" onclick="approveProduct('${storeId}','${productId}')">قبول</button>
                    <button class="reject" onclick="deleteProduct('${storeId}','${productId}')">حذف</button>
                  </div>
                </div>
              `;
            }
          }
        }

        document.getElementById("productsCount").innerText = totalProducts;
      });

      onValue(ref(database,"ads"), snapshot => {
        const container = document.getElementById("adsContainer");
        container.innerHTML = "";
        allAdsData = {};

        if(!snapshot.exists()){
          document.getElementById("adsCount").innerText = "0";
          container.innerHTML = `<div class="item">لا توجد إعلانات</div>`;
          return;
        }

        const ads = snapshot.val();
        document.getElementById("adsCount").innerText = Object.keys(ads).length;

        for(const id in ads){
          allAdsData[id] = ads[id];
          renderAd(id, ads[id]);
        }
      });
    }

    window.showActiveStores = function(){
      const container = document.getElementById("storesContainer");
      container.innerHTML = "";
      for(const id in allStoresData){
        if(allStoresData[id].status === "active"){
          renderStore(id, allStoresData[id]);
        }
      }
    };

    window.showInactiveStores = function(){
      const container = document.getElementById("storesContainer");
      container.innerHTML = "";
      for(const id in allStoresData){
        if(allStoresData[id].status !== "active"){
          renderStore(id, allStoresData[id]);
        }
      }
    };

    window.activateAllStores = async function(){
      for(const id in allStoresData){
        await update(ref(database,"stores/"+id), { status:"active" });
      }
      alert("تم تفعيل كل المتاجر");
    };

    window.deactivateAllStores = async function(){
      for(const id in allStoresData){
        await update(ref(database,"stores/"+id), { status:"inactive" });
      }
      alert("تم إلغاء تفعيل كل المتاجر");
    };

    window.activateStore = async function(id){
      const today = new Date();
      const nextMonth = new Date();
      nextMonth.setMonth(nextMonth.getMonth()+1);

      await update(ref(database,"stores/"+id), {
        status:"active",
        renewDate: today.toLocaleDateString("ar-EG"),
        expireDate: nextMonth.toLocaleDateString("ar-EG")
      });

      alert("تم تفعيل المتجر");
    };

    window.deactivateStore = async function(id){
      await update(ref(database,"stores/"+id), { status:"inactive" });
      alert("تم إلغاء تفعيل المتجر");
    };

    window.activateVipStore = async function(id){
      const nextMonth = new Date();
      nextMonth.setMonth(nextMonth.getMonth()+1);

      await update(ref(database,"stores/"+id), {
        accountType:"vip",
        vipExpireDate: nextMonth.toISOString().split("T")[0]
      });

      alert("تم تفعيل VIP");
    };

    window.removeVipStore = async function(id){
      await update(ref(database,"stores/"+id), {
        accountType:"normal",
        vipExpireDate:""
      });

      alert("تم إلغاء VIP");
    };

    window.activateDriver = async function(id){
      const today = new Date();
      const nextMonth = new Date();
      nextMonth.setMonth(nextMonth.getMonth()+1);

      await update(ref(database,"drivers/"+id), {

        renewDate: today.toLocaleDateString("ar-EG"),
        expireDate: nextMonth.toLocaleDateString("ar-EG")
      });

      alert("تم تفعيل السائق");
    };

    window.deactivateDriver = async function(id){
      await update(ref(database,"drivers/"+id), { status:"inactive" });
      alert("تم إلغاء تفعيل السائق");
    };

    window.activateVipDriver = async function(id){
      const nextMonth = new Date();
      nextMonth.setMonth(nextMonth.getMonth()+1);

      await update(ref(database,"drivers/"+id), {
        accountType:"vip",
        vipExpireDate: nextMonth.toISOString().split("T")[0]
      });

      alert("تم تفعيل VIP للسائق");
    };

    window.removeVipDriver = async function(id){
      await update(ref(database,"drivers/"+id), {
        accountType:"normal",
        vipExpireDate:""
      });

      alert("تم إلغاء VIP للسائق");
    };

    window.activateTaxi = async function(id){
      const today = new Date();
      const nextMonth = new Date();
      nextMonth.setMonth(nextMonth.getMonth()+1);

      await update(ref(database,"taxis/"+id), {
        status:"active",
        renewDate: today.toLocaleDateString("ar-EG"),
        expireDate: nextMonth.toLocaleDateString("ar-EG")
      });

      alert("تم تفعيل التكسي");
    };

    window.deactivateTaxi = async function(id){
      await update(ref(database,"taxis/"+id), { status:"inactive" });
      alert("تم إلغاء تفعيل التكسي");
    };

    window.activateVipTaxi = async function(id){
      const nextMonth = new Date();
      nextMonth.setMonth(nextMonth.getMonth()+1);

      await update(ref(database,"taxis/"+id), {
        accountType:"vip",
        vipExpireDate: nextMonth.toISOString().split("T")[0]
      });

      alert("تم تفعيل VIP للتكسي");
    };

    window.removeVipTaxi = async function(id){
      await update(ref(database,"taxis/"+id), {
        accountType:"normal",
        vipExpireDate:""
      });

      alert("تم إلغاء VIP للتكسي");
    };

    window.approveProduct = async function(storeId, productId){
      await update(ref(database,"store_products/"+storeId+"/"+productId), {
        status:"approved"
      });
      alert("تم قبول المنتج");
    };

    window.deleteProduct = async function(storeId, productId){
      try{
        await remove(ref(database,"store_products/"+storeId+"/"+productId));
        alert("تم حذف المنتج بنجاح");
      }catch(error){
        console.error(error);
        alert("فشل حذف المنتج");
      }
    };

    window.showPendingProducts = function(){
      const container = document.getElementById("productsContainer");
      container.innerHTML = "";

      for(const id in allProductsData){
        const product = allProductsData[id];
        if(product.deleted) continue;

        if(product.status !== "approved"){
          container.innerHTML += `
            <div class="item">
              <p><strong>اسم المنتج:</strong> ${safeText(product.name)}</p>
              <p><strong>السعر:</strong> ${Number(product.price || 0).toLocaleString()} د.ع</p>
              <p><strong>اسم المتجر:</strong> ${safeText(product.storeName)}</p>
              <img class="big-image" src="${product.image || 'https://via.placeholder.com/120'}" onerror="this.src='https://via.placeholder.com/120'">

              <div class="actions">
                <button class="accept" onclick="approveProduct('${product.storeId}','${product.id}')">قبول</button>
                <button class="reject" onclick="deleteProduct('${product.storeId}','${product.id}')">حذف</button>
              </div>
            </div>
          `;
        }
      }
    };

    window.showApprovedProducts = function(){
      const container = document.getElementById("productsContainer");
      container.innerHTML = "";

      for(const id in allProductsData){
        const product = allProductsData[id];
        if(product.deleted) continue;

        if(product.status === "approved"){
          container.innerHTML += `
            <div class="item">
              <p><strong>اسم المنتج:</strong> ${safeText(product.name)}</p>
              <p><strong>السعر:</strong> ${Number(product.price || 0).toLocaleString()} د.ع</p>
              <p><strong>اسم المتجر:</strong> ${safeText(product.storeName)}</p>
              <img class="big-image" src="${product.image || 'https://via.placeholder.com/120'}" onerror="this.src='https://via.placeholder.com/120'">

              <div class="actions">
                <button class="reject" onclick="deleteProduct('${product.storeId}','${product.id}')">حذف</button>
              </div>
            </div>
          `;
        }
      }
    };

    window.addAd = async function(){
      const imageFile = document.getElementById("adImage").files[0];
      const storeId = document.getElementById("adStoreId").value.trim();
      const link = document.getElementById("adLink").value.trim();

      if(!imageFile){
        alert("اختر صورة الإعلان");
        return;
      }

      const imageUrl = await uploadAdImage(imageFile);
      if(!imageUrl) return;

      const adId = "ad" + Date.now();

      try{
        await set(ref(database,"ads/" + adId), {
          image: imageUrl,
          link: link || "",
          storeId: storeId || "",
          status: "active"
        });

        document.getElementById("adImage").value = "";
        document.getElementById("adStoreId").value = "";
        document.getElementById("adLink").value = "";

        alert("تم رفع الإعلان");
      }catch(error){
        console.error(error);
        alert("Firebase Error: " + error.message);
      }
    };

    window.activateAd = async function(id){
      await update(ref(database,"ads/" + id), { status:"active" });
      alert("تم تفعيل الإعلان");
    };

    window.deactivateAd = async function(id){
      await update(ref(database,"ads/" + id), { status:"inactive" });
      alert("تم إيقاف الإعلان");
    };

    window.deleteAd = async function(id){
      await remove(ref(database,"ads/" + id));
      alert("تم حذف الإعلان");
    };

    loadDashboard();
  </script>
