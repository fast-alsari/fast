<!DOCTYPE html>
<html lang="ar" dir="rtl">

<head>

<meta charset="UTF-8">

<meta
name="viewport"
content="width=device-width, initial-scale=1.0">

<title>
لوحة الادمن
</title>

<link
rel="stylesheet"
href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css"/>

<link
href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;500;700;800&display=swap"
rel="stylesheet">

<style>

*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:'Cairo',sans-serif;
}

body{
background:#f5f6fa;
padding:15px;
padding-bottom:120px;
}

.header{
background:
linear-gradient(
135deg,
#ff8800,
#ff5500
);

padding:24px;
border-radius:28px;
color:white;
margin-bottom:20px;
}

.header h2{
font-size:28px;
margin-bottom:8px;
}

.stats{
display:grid;
grid-template-columns:repeat(2,1fr);
gap:15px;
margin-bottom:20px;
}

.stat-card{
background:white;
padding:20px;
border-radius:24px;
text-align:center;

box-shadow:
0 5px 18px rgba(0,0,0,.06);
}

.stat-card h2{
font-size:30px;
color:#ff6600;
margin-bottom:8px;
}

.stat-card p{
font-size:14px;
font-weight:bold;
color:#666;
}

.section{
background:white;
padding:18px;
border-radius:24px;
margin-bottom:18px;

box-shadow:
0 5px 18px rgba(0,0,0,.06);
}

.section-title{
font-size:18px;
font-weight:bold;
margin-bottom:15px;
color:#ff6600;
}

.user-card{
background:#fafafa;
padding:15px;
border-radius:18px;
margin-bottom:12px;
}

.user-card h3{
margin-bottom:6px;
}

.user-card p{
font-size:13px;
color:#666;
margin-bottom:4px;
}

.actions{
display:flex;
gap:10px;
margin-top:12px;
}

.actions button{
flex:1;
height:45px;
border:none;
border-radius:14px;
color:white;
font-weight:bold;
cursor:pointer;
}

.accept-btn{
background:#00b894;
}

.block-btn{
background:#e53935;
}

</style>

</head>

<body>

<div class="header">

<h2>
لوحة التحكم
</h2>

<p>
إدارة التطبيق بالكامل
</p>

</div>

<div class="stats">

<div class="stat-card">

<h2 id="storesCount">
0
</h2>

<p>
المتاجر
</p>

</div>

<div class="stat-card">

<h2 id="driversCount">
0
</h2>

<p>
السواق
</p>

</div>

<div class="stat-card">

<h2 id="ordersCount">
0
</h2>

<p>
الطلبات
</p>

</div>

<div class="stat-card">

<h2 id="customersCount">
0
</h2>

<p>
الزبائن
</p>

</div>

</div>

<div class="section">

<div class="section-title">
طلبات المتاجر
</div>

<div id="storesRequests"></div>

</div>

<div class="section">

<div class="section-title">
طلبات السواق
</div>

<div id="driversRequests"></div>

</div>

<script type="module">

import { db }
from "./firebase.js";

import {

ref,
onValue,
update

}

from "https://www.gstatic.com/firebasejs/12.13.0/firebase-database.js";

const admin =
JSON.parse(
localStorage.getItem("user")
);

if(
!admin ||
admin.type !== "admin"
){

window.location.replace(
"index.html"
);

}

onValue(
ref(db,"users"),
(snapshot)=>{

if(!snapshot.exists()){
return;
}

const data =
snapshot.val();

let stores = 0;
let drivers = 0;
let customers = 0;

const storesContainer =
document.getElementById(
"storesRequests"
);

const driversContainer =
document.getElementById(
"driversRequests"
);

storesContainer.innerHTML = "";
driversContainer.innerHTML = "";

for(let key in data){

const user =
data[key];

if(user.type === "store"){
stores++;
}

if(user.type === "driver"){
drivers++;
}

if(user.type === "customer"){
customers++;
}

if(
user.type === "store" &&
user.status === "pending"
){

storesContainer.innerHTML += `

<div class="user-card">

<h3>
${user.store_name || ""}
</h3>

<p>
📞 ${user.phone || ""}
</p>

<p>
📍 ${user.category || ""}
</p>

<div class="actions">

<button
class="accept-btn"
onclick="acceptUser('${key}')">

قبول

</button>

<button
class="block-btn"
onclick="blockUser('${key}')">

رفض

</button>

</div>

</div>

`;

}

if(
user.type === "driver" &&
user.status === "pending"
){

driversContainer.innerHTML += `

<div class="user-card">

<h3>
${user.name || ""}
</h3>

<p>
📞 ${user.phone || ""}
</p>

<p>
🚗 ${user.vehicleType || ""}
</p>

<div class="actions">

<button
class="accept-btn"
onclick="acceptUser('${key}')">

قبول

</button>

<button
class="block-btn"
onclick="blockUser('${key}')">

رفض

</button>

</div>

</div>

`;

}

}

document.getElementById(
"storesCount"
).innerHTML = stores;

document.getElementById(
"driversCount"
).innerHTML = drivers;

document.getElementById(
"customersCount"
).innerHTML = customers;

}
);

onValue(
ref(db,"orders"),
(snapshot)=>{

document.getElementById(
"ordersCount"
).innerHTML =

snapshot.exists()
?
Object.keys(snapshot.val()).length
:
0;

}
);

window.acceptUser =
async function(userId){

await update(
ref(db,"users/" + userId),
{

status:"active"

}
);

alert("تم القبول");

};

window.blockUser =
async function(userId){

await update(
ref(db,"users/" + userId),
{

status:"blocked"

}
);

alert("تم الرفض");

};

</script>

</body>

</html>
