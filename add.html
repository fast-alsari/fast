<!DOCTYPE html>
<html lang="ar" dir="rtl">

<head>

<meta charset="UTF-8">

<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>لوحة تحكم الادمن</title>

<link rel="preconnect"
href="https://fonts.googleapis.com">

<link rel="preconnect"
href="https://fonts.gstatic.com"
crossorigin>

<link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;500;600;700&display=swap"
rel="stylesheet">

<link rel="stylesheet"
href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css"/>

<style>

*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:'Cairo',sans-serif;
}

body{
background:#f3f4f6;
padding:20px;
}

.header{
display:flex;
justify-content:space-between;
align-items:center;
margin-bottom:25px;
}

.header h1{
font-size:28px;
color:#111827;
}

.logout-btn{
background:#ef4444;
color:white;
border:none;
padding:12px 20px;
border-radius:12px;
cursor:pointer;
font-size:15px;
font-weight:bold;
}

.cards{
display:grid;
grid-template-columns:repeat(auto-fit,minmax(220px,1fr));
gap:20px;
margin-bottom:25px;
}

.card{
padding:25px;
border-radius:20px;
color:white;
box-shadow:0 5px 15px rgba(0,0,0,0.08);
}

.card i{
font-size:35px;
margin-bottom:15px;
}

.card h2{
font-size:30px;
}

.card p{
font-size:18px;
}

.blue{
background:linear-gradient(135deg,#2563eb,#1d4ed8);
}

.orange{
background:linear-gradient(135deg,#f97316,#ea580c);
}

.green{
background:linear-gradient(135deg,#10b981,#059669);
}

.black{
background:linear-gradient(135deg,#111827,#374151);
}

.section{
background:white;
padding:20px;
border-radius:20px;
margin-bottom:25px;
box-shadow:0 5px 15px rgba(0,0,0,0.05);
}

.section h3{
margin-bottom:20px;
color:#111827;
}

.user-card{
border:1px solid #e5e7eb;
padding:15px;
border-radius:15px;
margin-bottom:15px;
}

.user-card p{
margin-bottom:10px;
color:#374151;
}

.actions{
display:flex;
gap:10px;
margin-top:15px;
flex-wrap:wrap;
}

.accept{
background:#10b981;
color:white;
border:none;
padding:10px 15px;
border-radius:10px;
cursor:pointer;
}

.reject{
background:#ef4444;
color:white;
border:none;
padding:10px 15px;
border-radius:10px;
cursor:pointer;
}

.renew{
background:#2563eb;
color:white;
border:none;
padding:10px 15px;
border-radius:10px;
cursor:pointer;
}

.ban{
background:#111827;
color:white;
border:none;
padding:10px 15px;
border-radius:10px;
cursor:pointer;
}

.pending{
background:#f59e0b;
color:white;
padding:5px 10px;
border-radius:8px;
font-size:13px;
}

.active{
background:#10b981;
color:white;
padding:5px 10px;
border-radius:8px;
font-size:13px;
}

.expired{
background:#ef4444;
color:white;
padding:5px 10px;
border-radius:8px;
font-size:13px;
}

</style>

</head>

<body>

<div class="header">

<h1>

<i class="fa-solid fa-shield-halved"></i>

لوحة تحكم الادمن

</h1>

<button class="logout-btn" onclick="logout()">

تسجيل خروج

</button>

</div>



<div class="cards">

<div class="card blue">

<i class="fa-solid fa-users"></i>

<h2 id="customersCount">0</h2>

<p>عدد المستخدمين</p>

</div>

<div class="card orange">

<i class="fa-solid fa-store"></i>

<h2 id="storesCount">0</h2>

<p>عدد المتاجر</p>

</div>

<div class="card green">

<i class="fa-solid fa-motorcycle"></i>

<h2 id="driversCount">0</h2>

<p>عدد السواق</p>

</div>

<div class="card black">

<i class="fa-solid fa-box"></i>

<h2 id="productsCount">0</h2>

<p>عدد المنتجات</p>

</div>

</div>



<div class="section">

<h3>

المستخدمين

</h3>

<div id="customersContainer"></div>

</div>



<div class="section">

<h3>

المتاجر

</h3>

<div id="storesContainer"></div>

</div>



<div class="section">

<h3>

السواق

</h3>

<div id="driversContainer"></div>

</div>



<script type="module">

import { initializeApp }
from
"https://www.gstatic.com/firebasejs/12.13.0/firebase-app.js";

import {
getDatabase,
ref,
get,
update,
remove
}
from
"https://www.gstatic.com/firebasejs/12.13.0/firebase-database.js";

const firebaseConfig = {

apiKey: "AIzaSyC7QzQTYMSGRV_nraJBneBqDqYGhugF0Pw",

authDomain: "fast-937c9.firebaseapp.com",

projectId: "fast-937c9",

storageBucket: "fast-937c9.firebasestorage.app",

messagingSenderId: "221388561840",

appId: "1:221388561840:web:ec9d75183ddd7d44be0a75",

measurementId: "G-CEKHEPNR9X",

databaseURL:
"https://fast-937c9-default-rtdb.europe-west1.firebasedatabase.app"

};

const app = initializeApp(firebaseConfig);

const database = getDatabase(app);

const currentUser =
JSON.parse(localStorage.getItem("user"));

if(!currentUser || currentUser.type !== "admin"){

window.location.href = "index.html";

}

window.logout = function(){

localStorage.removeItem("user");

window.location.href = "index.html";

};

async function loadDashboard(){



// المستخدمين

let customersSnapshot =
await get(ref(database,"customers"));

const customersContainer =
document.getElementById("customersContainer");

customersContainer.innerHTML = "";

let customersCount = 0;

if(customersSnapshot.exists()){

let customers = customersSnapshot.val();

customersCount = Object.keys(customers).length;

for(let id in customers){

let user = customers[id];

customersContainer.innerHTML += `

<div class="user-card">

<p>
<strong>الاسم:</strong>
${user.name}
</p>

<p>
<strong>الهاتف:</strong>
${user.phone}
</p>

<p>
<strong>العنوان:</strong>
${user.address}
</p>

<p>

<strong>الموقع:</strong>

<a target="_blank"
href="https://www.google.com/maps?q=${user.latitude},${user.longitude}">

فتح الموقع

</a>

</p>

<p>

<strong>الحالة:</strong>

${user.banned
? '<span class="expired">محظور</span>'
: '<span class="active">فعال</span>'}

</p>

<div class="actions">

<button class="ban"
onclick="banCustomer('${id}')">

حظر

</button>

<button class="accept"
onclick="unbanCustomer('${id}')">

فك الحظر

</button>

</div>

</div>

`;

}

}

document.getElementById("customersCount")
.innerText = customersCount;



// المتاجر

let storesSnapshot =
await get(ref(database,"stores"));

const storesContainer =
document.getElementById("storesContainer");

storesContainer.innerHTML = "";

let storesCount = 0;

if(storesSnapshot.exists()){

let stores = storesSnapshot.val();

storesCount = Object.keys(stores).length;

for(let id in stores){

let store = stores[id];

storesContainer.innerHTML += `

<div class="user-card">

<p>
<strong>اسم المتجر:</strong>
${store.store_name}
</p>

<p>
<strong>المالك:</strong>
${store.owner}
</p>

<p>
<strong>الهاتف:</strong>
${store.phone}
</p>

<p>
<strong>النوع:</strong>
${store.category}
</p>

<p>
<strong>عدد الطلبات:</strong>
${store.ordersCount || 0}
</p>

<p>
<strong>مبلغ المبيعات:</strong>
${store.totalSales || 0} د.ع
</p>

<p>

<strong>الحالة:</strong>

${store.status === "active"
? '<span class="active">مفعل</span>'
: '<span class="pending">قيد الانتظار</span>'}

</p>

<p>

<strong>ينتهي:</strong>

${store.expireAt
? new Date(store.expireAt)
.toLocaleDateString('ar-EG')
: 'غير محدد'}

</p>

<p>

<strong>الموقع:</strong>

<a target="_blank"
href="https://www.google.com/maps?q=${store.latitude},${store.longitude}">

فتح الموقع

</a>

</p>

<input type="date"
id="storeExpire_${id}">

<div class="actions">

<button class="accept"
onclick="approveStore('${id}')">

تفعيل

</button>

<button class="renew"
onclick="setStoreExpire('${id}')">

حفظ التاريخ

</button>

<button class="ban"
onclick="banStore('${id}')">

حظر

</button>

<button class="reject"
onclick="deleteStore('${id}')">

حذف

</button>

</div>

</div>

`;

}

}

document.getElementById("storesCount")
.innerText = storesCount;



// السواق

let driversSnapshot =
await get(ref(database,"drivers"));

const driversContainer =
document.getElementById("driversContainer");

driversContainer.innerHTML = "";

let driversCount = 0;

if(driversSnapshot.exists()){

let drivers = driversSnapshot.val();

driversCount = Object.keys(drivers).length;

for(let id in drivers){

let driver = drivers[id];

driversContainer.innerHTML += `

<div class="user-card">

<p>
<strong>الاسم:</strong>
${driver.name}
</p>

<p>
<strong>الهاتف:</strong>
${driver.phone}
</p>

<p>
<strong>المركبة:</strong>
${driver.vehicle}
</p>

<p>
<strong>عدد الطلبات:</strong>
${driver.ordersCount || 0}
</p>

<p>
<strong>مبلغ الربح:</strong>
${driver.totalProfit || 0} د.ع
</p>

<p>

<strong>الحالة:</strong>

${driver.status === "active"
? '<span class="active">مفعل</span>'
: '<span class="pending">قيد الانتظار</span>'}

</p>

<p>

<strong>ينتهي:</strong>

${driver.expireAt
? new Date(driver.expireAt)
.toLocaleDateString('ar-EG')
: 'غير محدد'}

</p>

<p>

<strong>الموقع:</strong>

<a target="_blank"
href="https://www.google.com/maps?q=${driver.latitude},${driver.longitude}">

فتح الموقع

</a>

</p>

<input type="date"
id="driverExpire_${id}">

<div class="actions">

<button class="accept"
onclick="approveDriver('${id}')">

تفعيل

</button>

<button class="renew"
onclick="setDriverExpire('${id}')">

حفظ التاريخ

</button>

<button class="ban"
onclick="banDriver('${id}')">

حظر

</button>

<button class="reject"
onclick="deleteDriver('${id}')">

حذف

</button>

</div>

</div>

`;

}

}

document.getElementById("driversCount")
.innerText = driversCount;

}



// تفعيل متجر

window.approveStore = async function(id){

await update(
ref(database,"stores/" + id),
{
status:"active"
}
);

loadDashboard();

};



// تفعيل سواق

window.approveDriver = async function(id){

await update(
ref(database,"drivers/" + id),
{
status:"active"
}
);

loadDashboard();

};



// تحديد انتهاء متجر

window.setStoreExpire = async function(id){

let date =
document.getElementById("storeExpire_" + id).value;

await update(
ref(database,"stores/" + id),
{
expireAt:new Date(date).getTime()
}
);

loadDashboard();

};



// تحديد انتهاء سواق

window.setDriverExpire = async function(id){

let date =
document.getElementById("driverExpire_" + id).value;

await update(
ref(database,"drivers/" + id),
{
expireAt:new Date(date).getTime()
}
);

loadDashboard();

};



// حظر متجر

window.banStore = async function(id){

await update(
ref(database,"stores/" + id),
{
banned:true
}
);

loadDashboard();

};



// حظر سواق

window.banDriver = async function(id){

await update(
ref(database,"drivers/" + id),
{
banned:true
}
);

loadDashboard();

};



// حظر مستخدم

window.banCustomer = async function(id){

await update(
ref(database,"customers/" + id),
{
banned:true
}
);

loadDashboard();

};



// فك حظر مستخدم

window.unbanCustomer = async function(id){

await update(
ref(database,"customers/" + id),
{
banned:false
}
);

loadDashboard();

};



// حذف متجر

window.deleteStore = async function(id){

await remove(
ref(database,"stores/" + id)
);

loadDashboard();

};



// حذف سواق

window.deleteDriver = async function(id){

await remove(
ref(database,"drivers/" + id)
);

loadDashboard();

};

loadDashboard();

</script>

</body>

</html>
