<!DOCTYPE html>
<html lang="ar" dir="rtl">

<head>

<meta charset="UTF-8">

<meta name="viewport"
content="width=device-width, initial-scale=1.0">

<title>
لوحة تحكم الادمن
</title>

<link rel="preconnect"
href="https://fonts.googleapis.com">

<link rel="preconnect"
href="https://fonts.gstatic.com"
crossorigin>

<link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;500;600;700;800&display=swap"
rel="stylesheet">

<link rel="stylesheet"
href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css"/>

<style>

*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:'Cairo',sans-serif;
}

body{
background:#f4f7fb;
overflow-x:hidden;
}

:root{
--main:#ff8800;
--main2:#ff5500;
--blue:#2563eb;
--green:#00b894;
--red:#e53935;
--dark:#111827;
--gray:#6b7280;
--card:#ffffff;
}

.header{
padding:20px;
background:
linear-gradient(
135deg,
var(--main),
var(--main2)
);

color:white;

display:flex;
justify-content:space-between;
align-items:center;

position:sticky;
top:0;
z-index:999;
box-shadow:0 8px 25px rgba(0,0,0,.12);
}

.header h1{
font-size:28px;
}

.header p{
margin-top:5px;
font-size:14px;
opacity:.9;
}

.logout-btn{
border:none;
background:white;
color:#000;
padding:12px 18px;
border-radius:14px;
cursor:pointer;
font-weight:bold;
font-size:14px;
}

.main{
padding:20px;
}

.dashboard-grid{
display:grid;
grid-template-columns:
repeat(auto-fit,minmax(220px,1fr));

gap:18px;
margin-bottom:25px;
}

.stat-card{
background:var(--card);
border-radius:24px;
padding:22px;
display:flex;
align-items:center;
gap:15px;
box-shadow:0 10px 25px rgba(0,0,0,.06);
transition:.25s;
}

.stat-card:hover{
transform:translateY(-4px);
}

.stat-icon{
width:70px;
height:70px;
border-radius:20px;
display:flex;
align-items:center;
justify-content:center;
font-size:28px;
color:white;
background:
linear-gradient(
135deg,
var(--main),
var(--main2)
);
}

.stat-info h2{
font-size:34px;
color:var(--blue);
}

.stat-info p{
font-size:15px;
font-weight:bold;
color:#444;
}

.tabs{
display:flex;
gap:10px;
overflow:auto;
padding-bottom:10px;
margin-bottom:20px;
}

.tabs::-webkit-scrollbar{
display:none;
}

.tab-btn{
border:none;
padding:12px 20px;
border-radius:14px;
background:#e5e7eb;
cursor:pointer;
font-weight:bold;
white-space:nowrap;
transition:.2s;
}

.tab-btn.active{
background:var(--main);
color:white;
}

.section{
display:none;
}

.active-section{
display:block;
}

.top-bar{
display:flex;
gap:12px;
flex-wrap:wrap;
margin-bottom:20px;
}

.search-box{
flex:1;
min-width:250px;
background:white;
border-radius:18px;
padding:14px 18px;
display:flex;
align-items:center;
gap:10px;
box-shadow:0 5px 15px rgba(0,0,0,.05);
}

.search-box input{
border:none;
outline:none;
width:100%;
font-size:15px;
background:none;
}

.filter-btn{
border:none;
padding:12px 18px;
border-radius:14px;
cursor:pointer;
font-weight:bold;
background:white;
box-shadow:0 5px 15px rgba(0,0,0,.05);
}

.cards-container{
display:grid;
grid-template-columns:
repeat(auto-fit,minmax(330px,1fr));

gap:18px;
}

.card{
background:white;
border-radius:26px;
padding:18px;
box-shadow:0 10px 25px rgba(0,0,0,.06);
transition:.25s;
position:relative;
overflow:hidden;
}

.card:hover{
transform:translateY(-4px);
}

.vip-badge{
position:absolute;
top:12px;
left:12px;
padding:6px 12px;
border-radius:12px;
font-size:12px;
font-weight:bold;
color:white;

background:
linear-gradient(
135deg,
#ff0000,
#ff8800
);
}

.card-top{
display:flex;
gap:14px;
margin-bottom:15px;
}

.card-image{
width:90px;
height:90px;
border-radius:20px;
object-fit:cover;
background:#eee;
border:2px solid #eee;
}

.card-info{
flex:1;
}

.card-info h3{
font-size:20px;
margin-bottom:6px;
}

.card-info p{
font-size:14px;
color:#555;
margin-bottom:5px;
}

.status{
display:inline-flex;
align-items:center;
gap:6px;
padding:6px 12px;
border-radius:12px;
font-size:13px;
font-weight:bold;
margin-top:8px;
}

.status.active{
background:#dcfce7;
color:#15803d;
}

.status.pending{
background:#fef3c7;
color:#b45309;
}

.status.inactive{
background:#fee2e2;
color:#b91c1c;
}

.actions{
display:flex;
flex-wrap:wrap;
gap:10px;
margin-top:15px;
}

.actions button{
flex:1;
min-width:120px;
border:none;
padding:12px;
border-radius:14px;
cursor:pointer;
font-weight:bold;
color:white;
font-size:14px;
}

.btn-green{
background:var(--green);
}

.btn-red{
background:var(--red);
}

.btn-blue{
background:var(--blue);
}

.btn-orange{
background:var(--main);
}

.info-grid{
display:grid;
grid-template-columns:1fr 1fr;
gap:10px;
margin-top:14px;
}

.info-box{
background:#f8fafc;
padding:12px;
border-radius:14px;
text-align:center;
}

.info-box h4{
font-size:13px;
color:#666;
margin-bottom:6px;
}

.info-box p{
font-size:17px;
font-weight:bold;
color:#111;
}

.empty{
padding:50px;
text-align:center;
color:#777;
font-size:18px;
}

.loading{
position:fixed;
inset:0;
background:white;
display:flex;
align-items:center;
justify-content:center;
z-index:999999;
}

.spinner{
width:70px;
height:70px;
border:5px solid #eee;
border-top:5px solid var(--main);
border-radius:50%;
animation:spin .8s linear infinite;
}

@keyframes spin{
100%{
transform:rotate(360deg);
}
}

@media(max-width:700px){

.header{
flex-direction:column;
gap:15px;
text-align:center;
}

.card-top{
flex-direction:column;
align-items:center;
text-align:center;
}

.card-image{
width:120px;
height:120px;
}

.info-grid{
grid-template-columns:1fr;
}

}

</style>

</head>

<body>

<div class="stat-info">

<!-- التبويبات -->

<div class="tabs">

<button
class="tab-btn active"
onclick="showSection('storesSection',this)">

<button
class="tab-btn"
onclick="showSection('driversSection',this)">

class="tab-btn"
onclick="showSection('taxiSection',this)">

<input
type="text"
id="storeSearch"
placeholder="بحث عن متجر..."
oninput="renderStores()">

</div>

class="filter-btn"
onclick="currentStoreFilter='all';renderStores()">

<script type="module">

import { initializeApp }
from
"https://www.gstatic.com/firebasejs/12.13.0/firebase-app.js";

import {

getDatabase,
ref,
onValue,
update,
remove

}

from
"https://www.gstatic.com/firebasejs/12.13.0/firebase-database.js";

const firebaseConfig = {

apiKey:"AIzaSyC7QzQTYMSGRV_nraJBneBqDqYGhugF0Pw",

authDomain:"fast-937c9.firebaseapp.com",

projectId:"fast-937c9",

databaseURL:
"https://fast-937c9-default-rtdb.europe-west1.firebasedatabase.app"

};

const app =
initializeApp(firebaseConfig);

const database =
getDatabase(app);

const currentUser =
JSON.parse(localStorage.getItem("user"));

if(
!currentUser ||
currentUser.type !== "admin"
){

window.location.href = "index.html";

}

// =======================
// متغيرات
// =======================

let storesData = {};
let driversData = {};
let taxiData = {};
let productsData = {};
let customersData = {};

let currentStoreFilter = "all";

// =======================
// تبديل الاقسام
// =======================

window.showSection = function(id,btn){

document.querySelectorAll(".section")
.forEach(section=>{

section.classList.remove("active-section");

});

document.getElementById(id)
.classList.add("active-section");

document.querySelectorAll(".tab-btn")
.forEach(button=>{

button.classList.remove("active");

});

btn.classList.add("active");

};

// =======================
// تسجيل خروج
// =======================

window.logout = function(){

localStorage.clear();

window.location.href = "index.html";

};

// =======================
// تحميل المستخدمين
// =======================

onValue(
ref(database,"customers"),
(snapshot)=>{

customersData = snapshot.val() || {};

document.getElementById("customersCount")
.innerText =
Object.keys(customersData).length;

renderCustomers();

hideLoading();

}
);

// =======================
// تحميل المتاجر
// =======================

onValue(
ref(database,"stores"),
(snapshot)=>{

storesData = snapshot.val() || {};

document.getElementById("storesCount")
.innerText =
Object.keys(storesData).length;

renderStores();

countVip();

hideLoading();

}
);

// =======================
// تحميل السواق
// =======================

onValue(
ref(database,"drivers"),
(snapshot)=>{

driversData = snapshot.val() || {};

document.getElementById("driversCount")
.innerText =
Object.keys(driversData).length;

renderDrivers();

countVip();

hideLoading();

}
);

// =======================
// تحميل التكاسي
// =======================

onValue(
ref(database,"taxis"),
(snapshot)=>{

taxiData = snapshot.val() || {};

document.getElementById("taxiCount")
.innerText =
Object.keys(taxiData).length;

renderTaxi();

countVip();

hideLoading();

}
);

// =======================
// تحميل المنتجات
// =======================

onValue(
ref(database,"store_products"),
(snapshot)=>{

productsData = snapshot.val() || {};

let total = 0;

for(let storeId in productsData){

for(let productId in productsData[storeId]){

total++;

}

}

document.getElementById("productsCount")
.innerText = total;

renderProducts();

hideLoading();

}
);

// =======================
// عد VIP
// =======================

function countVip(){

let total = 0;

Object.values(storesData)
.forEach(item=>{

if(item.accountType === "vip"){
total++;
}

});

Object.values(driversData)
.forEach(item=>{

if(item.accountType === "vip"){
total++;
}

});

Object.values(taxiData)
.forEach(item=>{

if(item.accountType === "vip"){
total++;
}

});

document.getElementById("vipCount")
.innerText = total;

}

// =======================
// رسم المتاجر
// =======================

window.renderStores = function(){

const container =
document.getElementById("storesContainer");

container.innerHTML = "";

let search =
document.getElementById("storeSearch")
.value
.toLowerCase();

let found = false;

for(let id in storesData){

let store = storesData[id];

if(
currentStoreFilter === "active"
&&
store.status !== "active"
){
continue;
}

if(
currentStoreFilter === "pending"
&&
store.status !== "pending"
){
continue;
}

if(
currentStoreFilter === "vip"
&&
store.accountType !== "vip"
){
continue;
}

if(
!(store.store_name || "")
.toLowerCase()
.includes(search)
){
continue;
}

found = true;

container.innerHTML += `

<div class="card">

${store.accountType === "vip"

?

'<div class="vip-badge">🔥 VIP</div>'

:

''

}

<div class="card-top">

<img
src="${store.store_image || 'store.png'}"
class="card-image">

<div class="card-info">

<h3>
${store.store_name || "-"}
</h3>

<p>
👤 ${store.owner || "-"}
</p>

<p>
📞 ${store.phone || "-"}
</p>

<div class="status ${store.status || 'inactive'}">

${store.status || "inactive"}

</div>

</div>

</div>

<div class="info-grid">

<div class="info-box">

<h4>
الطلبات
</h4>

<p>
${store.totalOrders || 0}
</p>

</div>

<div class="info-box">

<h4>
المبيعات
</h4>

<p>
${store.totalSales || 0}
</p>

</div>

</div>

<div class="actions">

<button
class="btn-green"
onclick="activateAccount('stores','${id}')">

تفعيل

</button>

<button
class="btn-red"
onclick="disableAccount('stores','${id}')">

تعطيل

</button>

<button
class="btn-orange"
onclick="toggleVip('stores','${id}','${store.accountType || "normal"}')">

VIP

</button>

<button
class="btn-blue"
onclick="openMap('${store.latitude}','${store.longitude}')">

الخريطة

</button>

</div>

</div>

`;

}

if(!found){

container.innerHTML = `
<div class="empty">
لا توجد نتائج
</div>
`;

}

};

// =======================
// رسم السواق
// =======================

function renderDrivers(){

const container =
document.getElementById("driversContainer");

container.innerHTML = "";

for(let id in driversData){

let driver = driversData[id];

container.innerHTML += `

<div class="card">

${driver.accountType === "vip"

?

'<div class="vip-badge">🔥 VIP</div>'

:

''

}

<div class="card-top">

<img
src="${driver.vehicleImage || 'user.png'}"
class="card-image">

<div class="card-info">

<h3>
${driver.name || "-"}
</h3>

<p>
📞 ${driver.phone || "-"}
</p>

<div class="status ${driver.status || 'inactive'}">

${driver.status || "inactive"}

</div>

</div>

</div>

<div class="actions">

<button
class="btn-green"
onclick="activateAccount('drivers','${id}')">

تفعيل

</button>

<button
class="btn-red"
onclick="disableAccount('drivers','${id}')">

تعطيل

</button>

<button
class="btn-orange"
onclick="toggleVip('drivers','${id}','${driver.accountType || "normal"}')">

VIP

</button>

</div>

</div>

`;

}

}

// =======================
// رسم التكاسي
// =======================

function renderTaxi(){

const container =
document.getElementById("taxiContainer");

container.innerHTML = "";

for(let id in taxiData){

let taxi = taxiData[id];

container.innerHTML += `

<div class="card">

${taxi.accountType === "vip"

?

'<div class="vip-badge">🔥 VIP</div>'

:

''

}

<div class="card-top">

<img
src="${taxi.vehicleImage || 'user.png'}"
class="card-image">

<div class="card-info">

<h3>
${taxi.name || "-"}
</h3>

<p>
🚗 ${taxi.vehicleType || "-"}
</p>

<p>
📞 ${taxi.phone || "-"}
</p>

<div class="status ${taxi.status || 'inactive'}">

${taxi.status || "inactive"}

</div>

</div>

</div>

<div class="actions">

<button
class="btn-green"
onclick="activateAccount('taxis','${id}')">

تفعيل

</button>

<button
class="btn-red"
onclick="disableAccount('taxis','${id}')">

تعطيل

</button>

<button
class="btn-orange"
onclick="toggleVip('taxis','${id}','${taxi.accountType || "normal"}')">

VIP

</button>

</div>

</div>

`;

}

}

// =======================
// رسم المنتجات
// =======================

function renderProducts(){

const container =
document.getElementById("productsContainer");

container.innerHTML = "";

for(let storeId in productsData){

for(let productId in productsData[storeId]){

let product =
productsData[storeId][productId];

container.innerHTML += `

<div class="card">

<div class="card-top">

<img
src="${product.image || 'product.png'}"
class="card-image">

<div class="card-info">

<h3>
${product.name || "-"}
</h3>

<p>
💰 ${product.price || 0} د.ع
</p>

<p>
🏪 ${product.storeName || "-"}
</p>

</div>

</div>

<div class="actions">

<button
class="btn-green"
onclick="approveProduct('${storeId}','${productId}')">

قبول

</button>

<button
class="btn-red"
onclick="deleteProduct('${storeId}','${productId}')">

حذف

</button>

</div>

</div>

`;

}

}

}

// =======================
// رسم المستخدمين
// =======================

function renderCustomers(){

const container =
document.getElementById("customersContainer");

container.innerHTML = "";

for(let id in customersData){

let user = customersData[id];

container.innerHTML += `

<div class="card">

<div class="card-top">

<img
src="user.png"
class="card-image">

<div class="card-info">

<h3>
${user.name || "-"}
</h3>

<p>
📞 ${user.phone || "-"}
</p>

</div>

</div>

<div class="info-grid">

<div class="info-box">

<h4>
الطلبات
</h4>

<p>
${user.totalOrders || 0}
</p>

</div>

<div class="info-box">

<h4>
المصروف
</h4>

<p>
${user.totalSpent || 0}
</p>

</div>

</div>

</div>

`;

}

}

// =======================
// تفعيل
// =======================

window.activateAccount =
async function(table,id){

const nextMonth =
new Date();

nextMonth.setMonth(
nextMonth.getMonth()+1
);

await update(
ref(database,table+"/"+id),
{

status:"active",

renewDate:
new Date()
.toISOString()
.split("T")[0],

expireDate:
nextMonth
.toISOString()
.split("T")[0]

}
);

};

// =======================
// تعطيل
// =======================

window.disableAccount =
async function(table,id){

await update(
ref(database,table+"/"+id),
{

status:"inactive"

}
);

};

// =======================
// VIP
// =======================

window.toggleVip =
async function(table,id,current){

if(current === "vip"){

await update(
ref(database,table+"/"+id),
{

accountType:"normal",
vipExpireDate:""

}
);

}else{

const nextMonth =
new Date();

nextMonth.setMonth(
nextMonth.getMonth()+1
);

await update(
ref(database,table+"/"+id),
{

accountType:"vip",

vipExpireDate:
nextMonth
.toISOString()
.split("T")[0]

}
);

}

};

// =======================
// حذف منتج
// =======================

window.deleteProduct =
async function(storeId,productId){

let ok =
confirm("حذف المنتج؟");

if(!ok){
return;
}

await remove(
ref(
database,
"store_products/"+storeId+"/"+productId
)
);

};

// =======================
// قبول منتج
// =======================

window.approveProduct =
async function(storeId,productId){

await update(
ref(
database,
"store_products/"+storeId+"/"+productId
),
{

status:"approved"

}
);

};

// =======================
// خريطة
// =======================

window.openMap =
function(lat,lng){

if(!lat || !lng){

alert("لا يوجد موقع");

return;

}

window.open(
`https://maps.google.com/?q=${lat},${lng}`,
"_blank"
);

};

.style.display = "none";
