<!DOCTYPE html>
<html lang="ar" dir="rtl">

<head>

<meta charset="UTF-8">

<meta name="viewport"
content="width=device-width, initial-scale=1.0">

<title>
لوحة تحكم الادمن
</title>

<link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;500;700&display=swap"
rel="stylesheet">

<link rel="stylesheet"
href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css"/>

<style>

*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:'Cairo',sans-serif;
}

body{
background:#f4f7fb;
padding:20px;
}

.header{
background:linear-gradient(45deg,#ff7b00,#0066ff);
padding:20px;
border-radius:20px;
color:#fff;
display:flex;
justify-content:space-between;
align-items:center;
margin-bottom:20px;
}

.logout-btn{
background:#fff;
color:#000;
border:none;
padding:10px 18px;
border-radius:12px;
cursor:pointer;
font-weight:bold;
}

.cards{
display:grid;
grid-template-columns:repeat(auto-fit,minmax(220px,1fr));
gap:15px;
margin-bottom:20px;
}

.stats-btn{
border:none;
background:#fff;
padding:22px;
border-radius:24px;
display:flex;
align-items:center;
gap:15px;
cursor:pointer;
transition:.3s;
box-shadow:0 8px 20px rgba(0,0,0,.08);
text-align:right;
}

.stats-btn:hover{
transform:translateY(-5px);
}

.stats-icon{
width:70px;
height:70px;
border-radius:20px;
display:flex;
justify-content:center;
align-items:center;
font-size:28px;
color:#fff;
background:linear-gradient(45deg,#ff7b00,#0066ff);
}

.stats-info h2{
font-size:34px;
color:#0066ff;
}

.stats-info p{
font-size:16px;
font-weight:bold;
color:#444;
}

.tabs{
display:flex;
gap:10px;
margin-bottom:20px;
flex-wrap:wrap;
}

.tab-btn{
border:none;
padding:12px 18px;
border-radius:12px;
background:#ddd;
cursor:pointer;
font-weight:bold;
}

.tab-btn.active{
background:#ff7b00;
color:#fff;
}

.section{
display:none;
background:#fff;
padding:20px;
border-radius:20px;
margin-bottom:20px;
box-shadow:0 4px 10px rgba(0,0,0,.08);
}

.active-section{
display:block;
}

.section-title{
font-size:22px;
margin-bottom:15px;
color:#ff7b00;
}

.item{
border:1px solid #ddd;
padding:15px;
border-radius:15px;
margin-bottom:15px;
}

.item p{
margin-bottom:8px;
}

.actions{
display:flex;
gap:10px;
flex-wrap:wrap;
margin-top:15px;
}

.actions button{
border:none;
padding:10px 15px;
border-radius:10px;
cursor:pointer;
font-weight:bold;
color:#fff;
}

.accept{
background:#00b894;
}

.reject{
background:#d63031;
}

.map-btn{
background:#0984e3;
}

.big-image{
width:120px;
height:120px;
object-fit:cover;
border-radius:15px;
margin-top:10px;
border:2px solid #eee;
}

.filter-buttons{
display:flex;
gap:10px;
flex-wrap:wrap;
margin-bottom:20px;
}

.filter-buttons button{
border:none;
padding:10px 18px;
border-radius:12px;
cursor:pointer;
font-weight:bold;
background:#0066ff;
color:#fff;
}

.status-active{
color:#00b894;
font-weight:bold;
}

.status-inactive{
color:#d63031;
font-weight:bold;
}

.schedule-box{
margin-top:15px;
padding:15px;
border-radius:15px;
background:#f7f9ff;
border:1px solid #e2e8ff;
}

.schedule-item{
display:flex;
justify-content:space-between;
padding:8px 0;
border-bottom:1px solid #eee;
font-size:14px;
gap:10px;
}

.schedule-item:last-child{
border-bottom:none;
}

</style>

</head>

<body>

<div class="header">

<div>
<h1>لوحة تحكم الادمن</h1>
<p>إدارة التطبيق بالكامل</p>
</div>

<button class="logout-btn"
onclick="logout()">
تسجيل الخروج
</button>

</div>

<div class="cards">

<button class="stats-btn"
onclick="showSection('customersSection',document.querySelectorAll('.tab-btn')[0])">

<div class="stats-icon">
<i class="fa-solid fa-users"></i>
</div>

<div class="stats-info">
<h2 id="customersCount">0</h2>
<p>المستخدمين</p>
</div>

</button>

<button class="stats-btn"
onclick="showSection('storesSection',document.querySelectorAll('.tab-btn')[1])">

<div class="stats-icon">
<i class="fa-solid fa-store"></i>
</div>

<div class="stats-info">
<h2 id="storesCount">0</h2>
<p>المتاجر</p>
</div>

</button>

<button class="stats-btn"
onclick="showSection('driversSection',document.querySelectorAll('.tab-btn')[2])">

<div class="stats-icon">
<i class="fa-solid fa-motorcycle"></i>
</div>

<div class="stats-info">
<h2 id="driversCount">0</h2>
<p>سواق التوصيل</p>
</div>

</button>

<button class="stats-btn"
onclick="showSection('taxiSection',document.querySelectorAll('.tab-btn')[3])">

<div class="stats-icon">
<i class="fa-solid fa-car"></i>
</div>

<div class="stats-info">
<h2 id="taxiCount">0</h2>
<p>سواق التكسي</p>
</div>

</button>

</div>

<div class="tabs">

<button class="tab-btn active"
onclick="showSection('customersSection',this)">
المستخدمين
</button>

<button class="tab-btn"
onclick="showSection('storesSection',this)">
المتاجر
</button>

<button class="tab-btn"
onclick="showSection('driversSection',this)">
سواق التوصيل
</button>

<button class="tab-btn"
onclick="showSection('taxiSection',this)">
سواق التكسي
</button>

</div>

<div id="customersSection"
class="section active-section">

<h2 class="section-title">
المستخدمين
</h2>

<div id="customersContainer"></div>

</div>

<div id="storesSection"
class="section">

<h2 class="section-title">
المتاجر
</h2>

<div class="filter-buttons">

<button onclick="showActiveStores()">
المتاجر المفعلة
(<span id="activeStoresCount">0</span>)
</button>

<button onclick="showInactiveStores()">
المتاجر الغير مفعلة
(<span id="inactiveStoresCount">0</span>)
</button>

<button onclick="activateAllStores()">
تفعيل الكل
</button>

<button onclick="deactivateAllStores()">
الغاء تفعيل الكل
</button>

</div>

<div id="storesContainer"></div>

</div>

<div id="driversSection"
class="section">

<h2 class="section-title">
سواق التوصيل
</h2>

<div id="driversContainer"></div>

</div>

<div id="taxiSection"
class="section">

<h2 class="section-title">
سواق التكسي
</h2>

<div id="taxiContainer"></div>

</div>

<script type="module">

import { initializeApp }
from "https://www.gstatic.com/firebasejs/12.13.0/firebase-app.js";

import {
getDatabase,
ref,
onValue,
update
}
from "https://www.gstatic.com/firebasejs/12.13.0/firebase-database.js";

const firebaseConfig = {

apiKey:"AIzaSyC7QzQTYMSGRV_nraJBneBqDqYGhugF0Pw",

authDomain:"fast-937c9.firebaseapp.com",

projectId:"fast-937c9",

storageBucket:"fast-937c9.firebasestorage.app",

messagingSenderId:"221388561840",

appId:"1:221388561840:web:ec9d75183ddd7d44be0a75",

measurementId:"G-CEKHEPNR9X",

databaseURL:"https://fast-937c9-default-rtdb.europe-west1.firebasedatabase.app"

};

const app = initializeApp(firebaseConfig);

const database = getDatabase(app);

const currentUser =
JSON.parse(localStorage.getItem("user"));

if(!currentUser || currentUser.type !== "admin"){
window.location.href = "index.html";
}

window.logout = function(){

localStorage.removeItem("user");

window.location.href = "index.html";

};

window.showSection = function(id,button){

document.querySelectorAll(".section")
.forEach(section=>{
section.classList.remove("active-section");
});

document.getElementById(id)
.classList.add("active-section");

document.querySelectorAll(".tab-btn")
.forEach(btn=>{
btn.classList.remove("active");
});

button.classList.add("active");

};

let allStoresData = {};

function loadDashboard(){

// المستخدمين

onValue(ref(database,"customers"),(snapshot)=>{

const container =
document.getElementById("customersContainer");

container.innerHTML = "";

if(snapshot.exists()){

const customers = snapshot.val();

document.getElementById("customersCount").innerText =
Object.keys(customers).length;

for(let id in customers){

let user = customers[id];

container.innerHTML += `

<div class="item">

<p><strong>الاسم:</strong>
${user.name || "-"}</p>

<p><strong>الرقم:</strong>
${user.phone || "-"}</p>

<p><strong>عدد الطلبات:</strong>
${user.ordersCount || 0}</p>

<p><strong>السعر الكلي:</strong>
${user.totalPrice || 0} د.ع</p>

<p><strong>عدد التوصيلات:</strong>
${user.deliveryCount || 0}</p>

<p><strong>السعر الكلي للتوصيل:</strong>
${user.deliveryTotal || 0} د.ع</p>

<p><strong>الطلبات الملغية:</strong>
${user.cancelledOrders || 0}</p>

<p><strong>الطلبات المكتملة:</strong>
${user.completedOrders || 0}</p>

</div>

`;

}

}

});

// المتاجر

onValue(ref(database,"stores"),(snapshot)=>{

const container =
document.getElementById("storesContainer");

container.innerHTML = "";

if(snapshot.exists()){

const stores = snapshot.val();

allStoresData = stores;

document.getElementById("storesCount").innerText =
Object.keys(stores).length;

let activeCount = 0;
let inactiveCount = 0;

for(let id in stores){

let store = stores[id];

if(store.status === "active"){
activeCount++;
}else{
inactiveCount++;
}

renderStore(id,store);

}

document.getElementById("activeStoresCount").innerText =
activeCount;

document.getElementById("inactiveStoresCount").innerText =
inactiveCount;

}

});

// سواق التوصيل

onValue(ref(database,"drivers"),(snapshot)=>{

const container =
document.getElementById("driversContainer");

container.innerHTML = "";

if(snapshot.exists()){

const drivers = snapshot.val();

document.getElementById("driversCount").innerText =
Object.keys(drivers).length;

for(let id in drivers){

let driver = drivers[id];

container.innerHTML += `

<div class="item">

<p><strong>الاسم:</strong>
${driver.name || "-"}</p>

<p><strong>الرقم:</strong>
${driver.phone || "-"}</p>

<p><strong>عدد الطلبات:</strong>
${driver.completedOrders || 0}</p>

<p><strong>مبلغ التوصيل الكلي:</strong>
${driver.totalDeliveryAmount || 0} د.ع</p>

<p><strong>صورة الهوية:</strong></p>

<img class="big-image"
src="${
driver.idImage ||
'https://via.placeholder.com/120'
}">

<p><strong>صورة الدراجة / السيارة:</strong></p>

<img class="big-image"
src="${
driver.vehicleImage ||
'https://via.placeholder.com/120'
}">

</div>

`;

}

}

});

// التكسي

onValue(ref(database,"taxi_drivers"),(snapshot)=>{

const container =
document.getElementById("taxiContainer");

container.innerHTML = "";

if(snapshot.exists()){

const taxis = snapshot.val();

document.getElementById("taxiCount").innerText =
Object.keys(taxis).length;

for(let id in taxis){

let taxi = taxis[id];

container.innerHTML += `

<div class="item">

<p><strong>الاسم:</strong>
${taxi.name || "-"}</p>

<p><strong>الرقم:</strong>
${taxi.phone || "-"}</p>

<p><strong>نوع السيارة:</strong>
${taxi.carType || "-"}</p>

<p><strong>لون السيارة:</strong>
${taxi.carColor || "-"}</p>

<p><strong>رقم السيارة:</strong>
${taxi.carNumber || "-"}</p>

<p><strong>صورة السيارة:</strong></p>

<img class="big-image"
src="${
taxi.carImage ||
'https://via.placeholder.com/120'
}">

</div>

`;

}

}

});

}

function renderStore(id,store){

const container =
document.getElementById("storesContainer");

container.innerHTML += `

<div class="item">

<p><strong>اسم المتجر:</strong>
${store.store_name || "-"}</p>

<p><strong>اسم صاحب المتجر:</strong>
${store.owner || "-"}</p>

<p>
<strong>الحالة:</strong>

<span class="${
store.status === "active"
? "status-active"
: "status-inactive"
}">
${store.status || "-"}
</span>

</p>

<p><strong>VPN:</strong>
${store.vpn || "غير مفعل"}</p>

<p><strong>تاريخ انتهاء الاشتراك:</strong>
${store.expireDate || "-"}</p>

<p><strong>تاريخ التجديد:</strong>
${store.renewDate || "-"}</p>

<div class="actions">

<button class="accept"
onclick="activateStore('${id}')">
تفعيل شهر
</button>

<button class="reject"
onclick="deactivateStore('${id}')">
الغاء التفعيل
</button>

<button class="map-btn"
onclick="openMap(
'${store.latitude || ""}',
'${store.longitude || ""}'
)">
عرض الموقع
</button>

</div>

<div class="schedule-box">

<h3 style="margin-bottom:10px;">
جدول الدوام الأسبوعي
</h3>

<div class="schedule-item">
<span>السبت</span>
<span>
فتح:
${store.schedule?.saturday?.open || "--:--"}
|
غلق:
${store.schedule?.saturday?.close || "--:--"}
</span>
</div>

<div class="schedule-item">
<span>الأحد</span>
<span>
فتح:
${store.schedule?.sunday?.open || "--:--"}
|
غلق:
${store.schedule?.sunday?.close || "--:--"}
</span>
</div>

<div class="schedule-item">
<span>الإثنين</span>
<span>
فتح:
${store.schedule?.monday?.open || "--:--"}
|
غلق:
${store.schedule?.monday?.close || "--:--"}
</span>
</div>

<div class="schedule-item">
<span>الثلاثاء</span>
<span>
فتح:
${store.schedule?.tuesday?.open || "--:--"}
|
غلق:
${store.schedule?.tuesday?.close || "--:--"}
</span>
</div>

<div class="schedule-item">
<span>الأربعاء</span>
<span>
فتح:
${store.schedule?.wednesday?.open || "--:--"}
|
غلق:
${store.schedule?.wednesday?.close || "--:--"}
</span>
</div>

<div class="schedule-item">
<span>الخميس</span>
<span>
فتح:
${store.schedule?.thursday?.open || "--:--"}
|
غلق:
${store.schedule?.thursday?.close || "--:--"}
</span>
</div>

<div class="schedule-item">
<span>الجمعة</span>
<span>
فتح:
${store.schedule?.friday?.open || "--:--"}
|
غلق:
${store.schedule?.friday?.close || "--:--"}
</span>
</div>

</div>


<p><strong>صورة المتجر:</strong></p>

<img class="big-image"
src="${store['store_image'] ? store['store_image'] : 'https://via.placeholder.com/120'}"
onerror="this.src='https://via.placeholder.com/120'">

<p><strong>هوية صاحب المتجر:</strong></p>

<img class="big-image"
src="${store['store_card'] ? store['store_card'] : 'https://via.placeholder.com/120'}"
onerror="this.src='https://via.placeholder.com/120'">

</div>

`;

}

window.activateStore = async function(id){

const today = new Date();

const nextMonth = new Date();

nextMonth.setMonth(nextMonth.getMonth()+1);

await update(ref(database,"stores/"+id),{

status:"active",

renewDate:today.toLocaleDateString(),

expireDate:nextMonth.toLocaleDateString()

});

};

window.deactivateStore = async function(id){

await update(ref(database,"stores/"+id),{

status:"inactive"

});

};

window.activateAllStores = async function(){

for(let id in allStoresData){

await update(ref(database,"stores/"+id),{
status:"active"
});

}

};

window.deactivateAllStores = async function(){

for(let id in allStoresData){

await update(ref(database,"stores/"+id),{
status:"inactive"
});

}

};

window.showActiveStores = function(){

const container =
document.getElementById("storesContainer");

container.innerHTML = "";

for(let id in allStoresData){

if(allStoresData[id].status === "active"){

renderStore(id,allStoresData[id]);

}

}

};

window.showInactiveStores = function(){

const container =
document.getElementById("storesContainer");

container.innerHTML = "";

for(let id in allStoresData){

if(allStoresData[id].status !== "active"){

renderStore(id,allStoresData[id]);

}

}

};

window.openMap = function(lat,lng){

if(!lat || !lng){

alert("لا يوجد موقع لهذا المتجر");

return;

}

window.open(
`https://www.google.com/maps?q=${lat},${lng}`,
"_blank"
);

};

loadDashboard();

</script>

</body>
</html>
