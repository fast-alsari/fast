
<!DOCTYPE html>
<html lang="ar" dir="rtl">

<head>

<meta charset="UTF-8">

<meta name="viewport"
content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">

<title>
طلبات التكسي
</title>

<link rel="preconnect"
href="https://fonts.googleapis.com">

<link rel="preconnect"
href="https://fonts.gstatic.com"
crossorigin>

<link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;500;600;700;800&display=swap"
rel="stylesheet">

<link rel="stylesheet"
href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css"/>

<link rel="stylesheet"
href="https://unpkg.com/leaflet/dist/leaflet.css"/>

<script src="https://unpkg.com/leaflet/dist/leaflet.js"></script>

<style>

*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:'Cairo',sans-serif;
-webkit-tap-highlight-color:transparent;
}

body{
background:#f5f6fa;
padding-bottom:120px;
overflow-x:hidden;
}

.header{
background:
linear-gradient(
135deg,
#ff8800,
#ff5500
);

padding:22px;
color:white;

border-bottom-left-radius:30px;
border-bottom-right-radius:30px;

box-shadow:0 8px 25px rgba(0,0,0,.12);
}

.driver-box{
display:flex;
align-items:center;
gap:14px;
}

.driver-image{
width:75px;
height:75px;
border-radius:50%;
object-fit:cover;
border:3px solid white;
background:white;
}

.driver-info h2{
font-size:22px;
margin-bottom:5px;
}

.driver-info p{
font-size:14px;
opacity:.9;
}

.online-btn{
margin-top:18px;
width:100%;
padding:15px;
border:none;
border-radius:18px;
background:white;
color:#00b894;
font-size:15px;
font-weight:bold;
cursor:pointer;
}

.stats{
display:grid;
grid-template-columns:1fr 1fr 1fr;
gap:12px;
padding:15px;
}

.stat-card{
background:white;
padding:18px;
border-radius:24px;
text-align:center;
box-shadow:0 5px 18px rgba(0,0,0,.06);
}

.stat-card h2{
font-size:28px;
color:#ff8800;
margin-bottom:5px;
}

.stat-card p{
font-size:13px;
font-weight:bold;
color:#666;
}

.orders-container{
padding:15px;
display:flex;
flex-direction:column;
gap:18px;
}

.order-card{
background:white;
padding:18px;
border-radius:28px;
box-shadow:0 5px 18px rgba(0,0,0,.06);
}

.order-top{
display:flex;
justify-content:space-between;
align-items:center;
margin-bottom:15px;
}

.order-price{
font-size:28px;
font-weight:bold;
color:#00b894;
}

.order-status{
padding:8px 14px;
border-radius:14px;
font-size:13px;
font-weight:bold;
background:#fff3e0;
color:#ff6600;
}

.customer-box{
background:#f8f8f8;
padding:15px;
border-radius:18px;
margin-bottom:15px;
}

.customer-box h3{
margin-bottom:6px;
}

.customer-box p{
font-size:14px;
color:#666;
margin-bottom:5px;
}

.map-box{
width:100%;
height:280px;
border-radius:22px;
overflow:hidden;
margin-bottom:15px;
}

.order-info{
display:grid;
grid-template-columns:1fr 1fr;
gap:12px;
margin-bottom:15px;
}

.info-card{
background:#f8f8f8;
padding:14px;
border-radius:18px;
text-align:center;
}

.info-card h4{
font-size:13px;
margin-bottom:6px;
color:#777;
}

.info-card p{
font-size:16px;
font-weight:bold;
}

.actions{
display:flex;
flex-wrap:wrap;
gap:10px;
}

.actions button,
.actions a{
flex:1;
padding:15px;
border:none;
border-radius:18px;
font-size:14px;
font-weight:bold;
cursor:pointer;
text-align:center;
text-decoration:none;
color:white;
}

.accept-btn{
background:#00b894;
}

.reject-btn{
background:#e53935;
}

.whatsapp-btn{
background:#25D366;
}

.arrive-btn{
background:#2563eb;
}

.start-btn{
background:#7c3aed;
}

.finish-btn{
background:#ff8800;
}

.empty{
padding:60px 20px;
text-align:center;
color:#777;
font-size:16px;
}

.loading{
position:fixed;
inset:0;
background:white;
display:flex;
align-items:center;
justify-content:center;
z-index:999999;
}

.spinner{
width:70px;
height:70px;
border:5px solid #eee;
border-top:5px solid #ff8800;
border-radius:50%;
animation:spin .8s linear infinite;
}

@keyframes spin{
100%{
transform:rotate(360deg);
}
}

.bottom-bar{
position:fixed;
bottom:0;
left:0;
right:0;
height:82px;
background:white;
display:flex;
justify-content:space-around;
align-items:center;
box-shadow:0 -5px 18px rgba(0,0,0,.08);
z-index:1000;
}

.nav-item{
display:flex;
flex-direction:column;
align-items:center;
gap:5px;
cursor:pointer;
color:#888;
font-size:13px;
font-weight:bold;
}

.nav-item.active{
color:#ff8800;
}

.nav-item i{
font-size:22px;
}

@media(max-width:700px){

.stats{
grid-template-columns:1fr;
}

.order-info{
grid-template-columns:1fr;
}

}

</style>

</head>

<body>

<div class="loading"
id="loading">

<div class="spinner"></div>

</div>

<div class="header">

<div class="driver-box">

<img
src="user.png"
id="driverImage"
class="driver-image">

<div class="driver-info">

<h2 id="driverName">
السائق
</h2>

<p id="driverPhone">
0000000000
</p>

</div>

</div>

<button
class="online-btn"
id="onlineBtn"
onclick="toggleOnline()">

متصل الآن

</button>

</div>

<div class="stats">

<div class="stat-card">

<h2 id="completedTrips">
0
</h2>

<p>
الرحلات المكتملة
</p>

</div>

<div class="stat-card">

<h2 id="totalProfit">
0
</h2>

<p>
الأرباح
</p>

</div>

<div class="stat-card">

<h2 id="cancelledTrips">
0
</h2>

<p>
الطلبات الملغية
</p>

</div>

</div>

<div
id="ordersContainer"
class="orders-container"></div>

<div class="bottom-bar">

<div class="nav-item active">

<i class="fa-solid fa-taxi"></i>

<span>
الطلبات
</span>

</div>

<div
class="nav-item"
onclick="window.location.href='asca.html'">

<i class="fa-solid fa-user"></i>

<span>
الحساب
</span>

</div>

</div>

<script type="module">

import { initializeApp }
from
"https://www.gstatic.com/firebasejs/12.13.0/firebase-app.js";

import {

getDatabase,
ref,
onValue,
update,
get

}

from
"https://www.gstatic.com/firebasejs/12.13.0/firebase-database.js";

const firebaseConfig = {

apiKey:"AIzaSyC7QzQTYMSGRV_nraJBneBqDqYGhugF0Pw",

authDomain:"fast-937c9.firebaseapp.com",

projectId:"fast-937c9",

databaseURL:
"https://fast-937c9-default-rtdb.europe-west1.firebasedatabase.app"

};

const app =
initializeApp(firebaseConfig);

const database =
getDatabase(app);

const currentUser =
JSON.parse(localStorage.getItem("user"));

if(
!currentUser ||
currentUser.type !== "taxi"
){

window.location.href =
"index.html";

}

let isOnline = true;

let driverLat = null;
let driverLng = null;

document.getElementById(
"driverName"
).innerHTML =
currentUser.name || "سائق";

document.getElementById(
"driverPhone"
).innerHTML =
currentUser.phone || "";

document.getElementById(
"driverImage"
).src =
currentUser.vehicleImage || "user.png";

document.getElementById(
"completedTrips"
).innerHTML =
currentUser.completedTrips || 0;

document.getElementById(
"totalProfit"
).innerHTML =
Number(
currentUser.totalProfit || 0
).toLocaleString();

document.getElementById(
"cancelledTrips"
).innerHTML =
Number(
currentUser.cancelledTrips || 0
);

// ======================
// GPS مباشر
// ======================

navigator.geolocation.watchPosition(

async(position)=>{

driverLat =
position.coords.latitude;

driverLng =
position.coords.longitude;

await update(
ref(database,"taxis/" + currentUser.id),
{

latitude:driverLat,
longitude:driverLng,
lastSeen:Date.now()

}
);

},

(error)=>{

console.log(error);

},

{
enableHighAccuracy:true,
maximumAge:3000,
timeout:10000
}

);

// ======================
// ايقونات
// ======================

const taxiIcon = L.icon({

iconUrl:
'https://cdn-icons-png.flaticon.com/512/744/744465.png',

iconSize:[45,45],
iconAnchor:[22,45]

});

const customerIcon = L.icon({

iconUrl:
'https://cdn-icons-png.flaticon.com/512/1077/1077114.png',

iconSize:[40,40],
iconAnchor:[20,40]

});

const destinationIcon = L.icon({

iconUrl:
'https://cdn-icons-png.flaticon.com/512/684/684908.png',

iconSize:[40,40],
iconAnchor:[20,40]

});

// ======================
// اونلاين
// ======================

window.toggleOnline =
async function(){

isOnline = !isOnline;

const btn =
document.getElementById(
"onlineBtn"
);

btn.innerHTML =

isOnline
?
"متصل الآن"
:
"متوقف";

btn.style.color =

isOnline
?
"#00b894"
:
"#e53935";

await update(
ref(database,"taxis/" + currentUser.id),
{

isOnline:isOnline,
lastSeen:Date.now()

}
);

};

// ======================
// الطلبات
// ======================

const ordersContainer =
document.getElementById(
"ordersContainer"
);

onValue(
ref(database,"taxi_orders"),
(snapshot)=>{

ordersContainer.innerHTML = "";

if(!snapshot.exists()){

ordersContainer.innerHTML = `
<div class="empty">
لا توجد طلبات
</div>
`;

hideLoading();

return;

}

const orders =
snapshot.val();

let found = false;

for(let key in orders){

const order = orders[key];

if(
order.status !== "waiting"
&&
order.driverId !== currentUser.id
){
continue;
}

found = true;

ordersContainer.innerHTML += `

<div class="order-card">

<div class="order-top">

<div class="order-status">

${getStatusText(order.status)}

</div>

<div class="order-price">

${Number(order.price || 0)
.toLocaleString()} د.ع

</div>

</div>

<div class="customer-box">

<h3>
${order.customerName || ""}
</h3>

<p>
📞 ${order.customerPhone || ""}
</p>

</div>

<div
class="map-box"
id="map_${order.id}"></div>

<div class="order-info">

<div class="info-card">

<h4>
المسافة
</h4>

<p>
${order.distance || 0} كم
</p>

</div>

<div class="info-card">

<h4>
الحالة
</h4>

<p>
${getStatusText(order.status)}
</p>

</div>

</div>

<div class="actions">

${order.status === "waiting"

?

`

<button
class="accept-btn"
onclick="acceptOrder('${order.id}')">

قبول الطلب

</button>

<button
class="reject-btn"
onclick="rejectOrder('${order.id}')">

رفض

</button>

`

:

`

<a
href="https://wa.me/${order.customerPhone}"
target="_blank"
class="whatsapp-btn">

واتساب

</a>

<button
class="arrive-btn"
onclick="arriveOrder('${order.id}')">

وصلت

</button>

<button
class="start-btn"
onclick="startTrip('${order.id}')">

بدأ الرحلة

</button>

<button
class="finish-btn"
onclick="finishOrder('${order.id}')">

تم التوصيل

</button>

`

}

</div>

</div>

`;

setTimeout(()=>{

createMap(order);

},100);

}

if(!found){

ordersContainer.innerHTML = `
<div class="empty">
لا توجد طلبات حالياً
</div>
`;

}

hideLoading();

}
);

// ======================
// خريطة
// ======================

function createMap(order){

const map = L.map(
`map_${order.id}`
).setView(
[
order.pickupLat,
order.pickupLng
],
13
);

L.tileLayer(
'https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png',
{
maxZoom:19
}
).addTo(map);

// سيارة التكسي

if(driverLat && driverLng){

L.marker(
[
driverLat,
driverLng
],
{
icon:taxiIcon
}
).addTo(map);

}

// الزبون

L.marker(
[
order.pickupLat,
order.pickupLng
],
{
icon:customerIcon
}
).addTo(map);

// الوجهة

L.marker(
[
order.destinationLat,
order.destinationLng
],
{
icon:destinationIcon
}
).addTo(map);

// خط السائق للزبون

if(driverLat && driverLng){

L.polyline([
[
driverLat,
driverLng
],
[
order.pickupLat,
order.pickupLng
]
],
{
color:"#2563eb",
weight:5
}
).addTo(map);

}

// خط الرحلة

L.polyline([
[
order.pickupLat,
order.pickupLng
],
[
order.destinationLat,
order.destinationLng
]
],
{
color:"#ff8800",
weight:5
}
).addTo(map);

}

// ======================
// قبول
// ======================

window.acceptOrder =
async function(orderId){

await update(
ref(database,"taxi_orders/" + orderId),
{

status:"accepted",

driverId:
currentUser.id,

driverName:
currentUser.name,

driverPhone:
currentUser.phone,

driverImage:
currentUser.vehicleImage || "",

vehicleType:
currentUser.vehicleType || ""

}
);

};

// ======================
// رفض
// ======================

window.rejectOrder =
async function(orderId){

await update(
ref(database,"taxi_orders/" + orderId),
{

status:"waiting"

}
);

};

// ======================
// وصلت
// ======================

window.arriveOrder =
async function(orderId){

await update(
ref(database,"taxi_orders/" + orderId),
{

status:"arrived",

arrivedAt:Date.now()

}
);

alert("لقد وصلت للزبون");

};

// ======================
// بدء الرحلة
// ======================

window.startTrip =
async function(orderId){

await update(
ref(database,"taxi_orders/" + orderId),
{

status:"started_trip",

startedAt:Date.now()

}
);

};

// ======================
// إنهاء الرحلة
// ======================

window.finishOrder =
async function(orderId){

const orderSnapshot =
await get(
ref(database,"taxi_orders/" + orderId)
);

if(orderSnapshot.exists()){

const order =
orderSnapshot.val();

await update(
ref(database,"taxis/" + currentUser.id),
{

completedTrips:
Number(
currentUser.completedTrips || 0
) + 1,

totalProfit:
Number(
currentUser.totalProfit || 0
)
+
Number(order.price || 0)

}
);

}

await update(
ref(database,"taxi_orders/" + orderId),
{

status:"completed",

completedAt:Date.now()

}
);

alert("تم توصيل الزبون بنجاح");

};

// ======================
// الحالة
// ======================

function getStatusText(status){

if(status === "waiting"){
return "بانتظار سائق";
}

if(status === "accepted"){
return "تم قبول الطلب";
}

if(status === "arrived"){
return "وصل السائق";
}

if(status === "started_trip"){
return "بدأت الرحلة";
}

if(status === "completed"){
return "تم التوصيل";
}

if(status === "cancelled"){
return "ملغي";
}

return status;

}

// ======================
// تحميل
// ======================

function hideLoading(){

document.getElementById(
"loading"
).style.display = "none";

}

</script>

</body>

</html>
