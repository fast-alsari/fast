<!DOCTYPE html>
<html lang="ar" dir="rtl">

<head>

<meta charset="UTF-8">

<meta
name="viewport"
content="width=device-width, initial-scale=1.0">

<title>
طلبات المتجر
</title>

<link
href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;500;600;700&display=swap"
rel="stylesheet">

<style>

*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:'Cairo',sans-serif;
}

body{
background:#f5f6fa;
padding:15px;
padding-bottom:120px;
}

.header{
background:
linear-gradient(
135deg,
#ff8800,
#ff5500
);

padding:22px;
border-radius:28px;
color:white;
margin-bottom:20px;
}

.orders-container{
display:flex;
flex-direction:column;
gap:16px;
}

.order-card{
background:white;
padding:18px;
border-radius:26px;
box-shadow:
0 5px 18px rgba(0,0,0,.06);
}

.order-top{
display:flex;
justify-content:space-between;
align-items:center;
margin-bottom:12px;
}

.customer-name{
font-size:20px;
font-weight:bold;
}

.status{
padding:8px 14px;
border-radius:12px;
background:#fff4e8;
font-size:13px;
font-weight:bold;
color:#ff8800;
}

.products{
margin-top:12px;
padding-top:12px;
border-top:1px solid #eee;
}

.product{
margin-bottom:10px;
font-size:14px;
}

.actions{
display:flex;
gap:10px;
margin-top:15px;
}

.actions button{
flex:1;
height:50px;
border:none;
border-radius:16px;
color:white;
font-size:14px;
font-weight:bold;
cursor:pointer;
}

.prepare-btn{
background:#2563eb;
}

.done-btn{
background:#00b894;
}

.empty{
padding:60px 20px;
text-align:center;
color:#777;
}

</style>

</head>

<body>

<div class="header">

<h2>
طلبات المتجر 📦
</h2>

<p>
إدارة الطلبات الحالية
</p>

</div>

<div
class="orders-container"
id="ordersContainer"></div>

<script type="module">

import { db }
from "./firebase.js";

import {
ref,
onValue,
update
}
from "https://www.gstatic.com/firebasejs/12.13.0/firebase-database.js";

import {
formatPrice
}
from "./utils.js";

const currentUser =
JSON.parse(
localStorage.getItem("user")
);

if(
!currentUser ||
currentUser.type !== "store"
){

window.location.replace(
"index.html"
);

}

const container =
document.getElementById(
"ordersContainer"
);

onValue(
ref(db,"orders"),
(snapshot)=>{

container.innerHTML = "";

if(!snapshot.exists()){

container.innerHTML = `
<div class="empty">
لا توجد طلبات
</div>
`;

return;

}

const orders =
snapshot.val();

let found = false;

for(let key in orders){

const order =
orders[key];

const hasStoreProducts =
order.products?.some(
item =>
item.storeId === currentUser.id
);

if(!hasStoreProducts){
continue;
}

found = true;

container.innerHTML += `

<div class="order-card">

<div class="order-top">

<div class="customer-name">
${order.customerName || ""}
</div>

<div class="status">
${getStatus(order.status)}
</div>

</div>

<div>
📞
${order.customerPhone || ""}
</div>

<div style="
margin-top:10px;
">

📍
${order.customerAddress || ""}

</div>

<div style="
margin-top:10px;
font-weight:bold;
color:#ff8800;
">

${formatPrice(order.finalTotal)}

</div>

<div class="products">

${renderProducts(order.products)}

</div>

<div class="actions">

<button
class="prepare-btn"
onclick="prepareOrder('${order.id}')">

تجهيز الطلب

</button>

<button
class="done-btn"
onclick="finishOrder('${order.id}')">

جاهز للاستلام

</button>

</div>

</div>

`;

}

if(!found){

container.innerHTML = `
<div class="empty">
لا توجد طلبات حالياً
</div>
`;

}

}
);

function renderProducts(products){

let html = "";

products.forEach(item=>{

if(item.storeId !== currentUser.id){
return;
}

html += `

<div class="product">

${item.name}
×
${item.qty}

</div>

`;

});

return html;

}

window.prepareOrder =
async function(orderId){

await update(
ref(db,"orders/" + orderId),
{

status:"preparing_order",
statusText:"جاري تجهيز الطلب"

}
);

alert("تم تحديث الطلب");

};

window.finishOrder =
async function(orderId){

await update(
ref(db,"orders/" + orderId),
{

status:"ready_for_pickup",
statusText:"الطلب جاهز للاستلام"

}
);

alert("تم تجهيز الطلب");

};

function getStatus(status){

if(status === "waiting_driver"){
return "بانتظار سائق";
}

if(status === "accepted"){
return "تم قبول الطلب";
}

if(status === "preparing_order"){
return "قيد التجهيز";
}

if(status === "ready_for_pickup"){
return "جاهز";
}

if(status === "on_the_way"){
return "بالطريق";
}

if(status === "delivered"){
return "تم التسليم";
}

return status;

}

</script>

</body>

</html>
