<!DOCTYPE html>
<html lang="ar" dir="rtl">

<head>

<meta charset="UTF-8">

<meta
name="viewport"
content="width=device-width, initial-scale=1.0">

<title>
طلبات المتجر
</title>

<link
rel="stylesheet"
href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css"/>

<link
href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;500;700;800&display=swap"
rel="stylesheet">

<style>

*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:'Cairo',sans-serif;
}

body{
background:#f5f6fa;
padding:15px;
padding-bottom:120px;
overflow-x:hidden;
}

.header{
background:
linear-gradient(
135deg,
#ff8800,
#ff5500
);

padding:22px;
border-radius:28px;
color:white;
margin-bottom:20px;

box-shadow:
0 8px 25px rgba(0,0,0,.12);
}

.header h2{
font-size:26px;
margin-bottom:8px;
}

.tabs{
display:flex;
gap:10px;
overflow:auto;
margin-bottom:20px;
}

.tabs::-webkit-scrollbar{
display:none;
}

.tab-btn{
border:none;
padding:12px 18px;
border-radius:16px;
background:white;
font-size:14px;
font-weight:bold;
cursor:pointer;
white-space:nowrap;

box-shadow:
0 5px 18px rgba(0,0,0,.06);
}

.tab-btn.active{
background:#ff8800;
color:white;
}

.orders-container{
display:flex;
flex-direction:column;
gap:18px;
}

.order-card{
background:white;
padding:18px;
border-radius:26px;

box-shadow:
0 5px 18px rgba(0,0,0,.06);
}

.order-top{
display:flex;
justify-content:space-between;
align-items:center;
margin-bottom:15px;
}

.order-id{
font-size:14px;
font-weight:bold;
color:#777;
}

.order-status{
padding:8px 14px;
border-radius:14px;
font-size:13px;
font-weight:bold;
background:#fff3e0;
color:#ff6600;
}

.customer-box{
background:#fafafa;
padding:15px;
border-radius:18px;
margin-bottom:15px;
}

.customer-box h3{
margin-bottom:6px;
}

.customer-box p{
font-size:13px;
color:#666;
margin-bottom:5px;
}

.products-box{
background:#fafafa;
padding:15px;
border-radius:18px;
margin-bottom:15px;
}

.product-item{
display:flex;
justify-content:space-between;
margin-bottom:10px;
padding-bottom:10px;
border-bottom:1px solid #eee;
}

.product-item:last-child{
margin-bottom:0;
padding-bottom:0;
border:none;
}

.price-box{
background:#fff7ef;
padding:16px;
border-radius:18px;
text-align:center;
margin-bottom:15px;
}

.price-box h2{
font-size:28px;
color:#ff6600;
margin-top:8px;
}

.actions{
display:flex;
gap:10px;
flex-wrap:wrap;
}

.actions button{
flex:1;
height:50px;
border:none;
border-radius:16px;
font-size:14px;
font-weight:bold;
cursor:pointer;
color:white;
}

.prepare-btn{
background:#2563eb;
}

.ready-btn{
background:#00b894;
}

.cancel-btn{
background:#e53935;
}

.empty{
background:white;
padding:60px 20px;
border-radius:26px;
text-align:center;
color:#777;

box-shadow:
0 5px 18px rgba(0,0,0,.06);
}

.bottom-bar{
position:fixed;
bottom:0;
left:0;
right:0;
height:82px;
background:white;

display:flex;
justify-content:space-around;
align-items:center;

box-shadow:
0 -5px 18px rgba(0,0,0,.08);

z-index:9999;
}

.nav-item{
display:flex;
flex-direction:column;
align-items:center;
gap:5px;

font-size:13px;
font-weight:bold;

color:#888;
cursor:pointer;
}

.nav-item.active{
color:#ff8800;
}

.nav-item i{
font-size:22px;
}

</style>

</head>

<body>

<div class="header">

<h2>
طلبات المتجر
</h2>

<p>
إدارة جميع الطلبات الحالية والسابقة
</p>

</div>

<div class="tabs">

<button
class="tab-btn active"
onclick="changeTab('all',this)">

الكل

</button>

<button
class="tab-btn"
onclick="changeTab('waiting_driver',this)">

جديدة

</button>

<button
class="tab-btn"
onclick="changeTab('preparing_order',this)">

قيد التجهيز

</button>

<button
class="tab-btn"
onclick="changeTab('picked_up',this)">

تم الاستلام

</button>

<button
class="tab-btn"
onclick="changeTab('delivered',this)">

مكتملة

</button>

</div>

<div
id="ordersContainer"
class="orders-container"></div>

<div class="bottom-bar">

<div
class="nav-item"
onclick="window.location.href='store-dashboard.html'">

<i class="fa-solid fa-shop"></i>

<span>
الرئيسية
</span>

</div>

<div
class="nav-item"
onclick="window.location.href='store-products.html'">

<i class="fa-solid fa-box"></i>

<span>
المنتجات
</span>

</div>

<div class="nav-item active">

<i class="fa-solid fa-bag-shopping"></i>

<span>
الطلبات
</span>

</div>

</div>

<script type="module">

import { db }
from "./firebase.js";

import {

ref,
onValue,
update

}

from
"https://www.gstatic.com/firebasejs/12.13.0/firebase-database.js";

const currentUser =
JSON.parse(
localStorage.getItem("user")
);

if(
!currentUser ||
currentUser.type !== "store"
){

window.location.replace(
"index.html"
);

}

const ordersContainer =
document.getElementById(
"ordersContainer"
);

let allOrders = [];
let currentTab = "all";

// =====================
// تحميل الطلبات
// =====================

onValue(
ref(db,"orders"),
(snapshot)=>{

allOrders = [];

if(snapshot.exists()){

const orders =
snapshot.val();

for(let key in orders){

const order =
orders[key];

const hasStore =
order.items?.some(
item =>
item.storeId === currentUser.id
);

if(!hasStore){
continue;
}

allOrders.push(order);

}

}

renderOrders();

}
);

// =====================
// عرض الطلبات
// =====================

function renderOrders(){

ordersContainer.innerHTML = "";

let filteredOrders =
allOrders;

if(currentTab !== "all"){

filteredOrders =
allOrders.filter(
order =>
order.status === currentTab
);

}

if(filteredOrders.length === 0){

ordersContainer.innerHTML = `

<div class="empty">
لا توجد طلبات
</div>

`;

return;

}

filteredOrders.reverse();

filteredOrders.forEach(order=>{

let storeItems =
order.items?.filter(
item =>
item.storeId === currentUser.id
) || [];

ordersContainer.innerHTML += `

<div class="order-card">

<div class="order-top">

<div class="order-id">

#${order.id || ""}

</div>

<div class="order-status">

${getStatusText(order.status)}

</div>

</div>

<div class="customer-box">

<h3>
${order.customerName || ""}
</h3>

<p>
📞 ${order.customerPhone || ""}
</p>

<p>
📍 ${order.customerAddress || ""}
</p>

<p>
🕒 ${order.createdTime || ""}
</p>

</div>

<div class="products-box">

${storeItems.map(item => `

<div class="product-item">

<div>

<b>
${item.name || ""}
</b>

<br>

<span>
الكمية:
${item.qty || 1}
</span>

</div>

<div>

${Number(item.totalPrice || 0)
.toLocaleString()} د.ع

</div>

</div>

`).join("")}

</div>

<div class="price-box">

الإجمالي

<h2>

${Number(order.totalPrice || 0)
.toLocaleString()} د.ع

</h2>

</div>

<div class="actions">

${order.status === "waiting_driver"

?

`

<button
class="prepare-btn"
onclick="prepareOrder('${order.id}')">

بدء التجهيز

</button>

<button
class="cancel-btn"
onclick="cancelOrder('${order.id}')">

الغاء

</button>

`

:

""}

${order.status === "preparing_order"

?

`

<button
class="ready-btn"
onclick="readyOrder('${order.id}')">

الطلب جاهز

</button>

`

:

""}

</div>

</div>

`;

});

}

// =====================
// تبويبات
// =====================

window.changeTab =
function(tab,button){

currentTab = tab;

document.querySelectorAll(".tab-btn")
.forEach(btn=>{

btn.classList.remove("active");

});

button.classList.add("active");

renderOrders();

};

// =====================
// تجهيز
// =====================

window.prepareOrder =
async function(orderId){

await update(
ref(
db,
"orders/" + orderId
),
{

status:"preparing_order",

statusText:
"المتجر يقوم بتجهيز الطلب"

}
);

alert("تم بدء تجهيز الطلب");

};

// =====================
// جاهز
// =====================

window.readyOrder =
async function(orderId){

await update(
ref(
db,
"orders/" + orderId
),
{

status:"picked_up",

statusText:
"الطلب جاهز للاستلام"

}
);

alert("تم تجهيز الطلب");

};

// =====================
// الغاء
// =====================

window.cancelOrder =
async function(orderId){

const confirmCancel =
confirm("هل تريد الغاء الطلب؟");

if(!confirmCancel){
return;
}

await update(
ref(
db,
"orders/" + orderId
),
{

status:"cancelled",

statusText:
"تم الغاء الطلب من المتجر"

}
);

alert("تم الغاء الطلب");

};

// =====================
// الحالة
// =====================

function getStatusText(status){

if(status === "waiting_driver"){
return "طلب جديد";
}

if(status === "accepted"){
return "تم قبول الطلب";
}

if(status === "preparing_order"){
return "قيد التجهيز";
}

if(status === "picked_up"){
return "مع السائق";
}

if(status === "on_the_way"){
return "بالطريق";
}

if(status === "arrived"){
return "وصل";
}

if(status === "delivered"){
return "مكتمل";
}

if(status === "cancelled"){
return "ملغي";
}

return status;

}

</script>

</body>

</html>
