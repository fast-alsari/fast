<!-- admin-taxis.html -->

<!DOCTYPE html>
<html lang="ar" dir="rtl">

<head>

<meta charset="UTF-8">

<meta
name="viewport"
content="width=device-width, initial-scale=1.0">

<title>
إدارة سيارات التكسي
</title>

<link
href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;500;700;800&display=swap"
rel="stylesheet">

<link
rel="stylesheet"
href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css"/>

<style>

*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:'Cairo',sans-serif;
}

body{
background:#f5f6fa;
padding-bottom:100px;
overflow-x:hidden;
}

.header{
background:
linear-gradient(
135deg,
#ff8800,
#ff5500
);

padding:25px 20px;
color:white;

border-bottom-left-radius:30px;
border-bottom-right-radius:30px;

box-shadow:0 8px 25px rgba(0,0,0,.12);
}

.header h1{
font-size:28px;
margin-bottom:8px;
}

.header p{
font-size:14px;
opacity:.95;
}

.search-box{
margin:15px;
background:white;
padding:15px;
border-radius:18px;
display:flex;
align-items:center;
gap:10px;
box-shadow:0 5px 18px rgba(0,0,0,.06);
}

.search-box input{
flex:1;
border:none;
outline:none;
font-size:15px;
}

.taxis-container{
padding:15px;
display:flex;
flex-direction:column;
gap:18px;
}

.taxi-card{
background:white;
padding:18px;
border-radius:28px;
box-shadow:0 5px 18px rgba(0,0,0,.06);
display:flex;
gap:15px;
align-items:center;
}

.taxi-image{
width:90px;
height:90px;
border-radius:22px;
object-fit:cover;
background:#eee;
}

.taxi-info{
flex:1;
}

.taxi-name{
font-size:22px;
font-weight:bold;
margin-bottom:8px;
}

.taxi-phone{
font-size:14px;
color:#666;
margin-bottom:6px;
}

.taxi-status{
display:inline-block;
padding:6px 12px;
border-radius:12px;
font-size:12px;
font-weight:bold;
}

.active-status{
background:#e8fff3;
color:#00b26b;
}

.blocked-status{
background:#ffeaea;
color:#e53935;
}

.actions{
display:flex;
flex-direction:column;
gap:10px;
}

.actions button{
width:120px;
height:44px;
border:none;
border-radius:15px;
font-size:13px;
font-weight:bold;
cursor:pointer;
color:white;
}

.block-btn{
background:#e53935;
}

.active-btn{
background:#00b894;
}

.delete-btn{
background:#111827;
}

.empty{
padding:60px 20px;
text-align:center;
font-size:16px;
color:#777;
}

.bottom-bar{
position:fixed;
bottom:0;
left:0;
right:0;
height:82px;
background:white;
display:flex;
justify-content:space-around;
align-items:center;
box-shadow:0 -5px 18px rgba(0,0,0,.08);
}

.nav-item{
display:flex;
flex-direction:column;
align-items:center;
gap:5px;
font-size:13px;
font-weight:bold;
color:#888;
cursor:pointer;
}

.nav-item.active{
color:#ff8800;
}

.nav-item i{
font-size:22px;
}

@media(max-width:700px){

.taxi-card{
flex-direction:column;
text-align:center;
}

.actions{
width:100%;
}

.actions button{
width:100%;
}

}

</style>

</head>

<body>

<div class="header">

<h1>
إدارة التكاسي
</h1>

<p>
إدارة جميع سائقي التكسي
</p>

</div>

<div class="search-box">

<i class="fa-solid fa-magnifying-glass"></i>

<input
type="text"
id="searchInput"
placeholder="ابحث عن سائق تكسي">

</div>

<div
class="taxis-container"
id="taxisContainer"></div>

<div class="bottom-bar">

<div
class="nav-item"
onclick="window.location.href='admin-orders.html'">

<i class="fa-solid fa-box"></i>

<span>
الطلبات
</span>

</div>

<div class="nav-item active">

<i class="fa-solid fa-taxi"></i>

<span>
التكاسي
</span>

</div>

<div
class="nav-item"
onclick="window.location.href='admin-statistics.html'">

<i class="fa-solid fa-chart-column"></i>

<span>
الإحصائيات
</span>

</div>

</div>

<script type="module">

import { db }
from "./config.js";

import {

ref,
onValue,
update,
remove

}

from
"https://www.gstatic.com/firebasejs/12.13.0/firebase-database.js";

const taxisContainer =
document.getElementById(
"taxisContainer"
);

let allTaxis = [];

onValue(
ref(db,"taxis"),
(snapshot)=>{

taxisContainer.innerHTML = "";

if(!snapshot.exists()){

taxisContainer.innerHTML = `
<div class="empty">
لا يوجد سواق تكسي
</div>
`;

return;

}

allTaxis =
Object.entries(snapshot.val())
.map(([id,taxi]) => ({

id,
...taxi

}));

renderTaxis(allTaxis);

});

function renderTaxis(taxis){

taxisContainer.innerHTML = "";

if(taxis.length === 0){

taxisContainer.innerHTML = `
<div class="empty">
لا توجد نتائج
</div>
`;

return;

}

taxis.forEach(taxi=>{

const active =
taxi.status !== "blocked";

taxisContainer.innerHTML += `

<div class="taxi-card">

<img
src="${taxi.image || 'taxi.png'}"
class="taxi-image"
onerror="this.src='taxi.png'">

<div class="taxi-info">

<div class="taxi-name">
${taxi.name || ""}
</div>

<div class="taxi-phone">
📞 ${taxi.phone || ""}
</div>

<div class="taxi-phone">
🚕 ${taxi.vehicleType || "تكسي"}
</div>

<div class="taxi-phone">
💰 ${Number(taxi.totalProfit || 0)
.toLocaleString()} د.ع
</div>

<div
class="
taxi-status
${active ? 'active-status' : 'blocked-status'}
">

${active ? 'نشط' : 'محظور'}

</div>

</div>

<div class="actions">

<button
class="
${active ? 'block-btn' : 'active-btn'}
"
onclick="
toggleTaxiStatus(
'${taxi.id}',
'${active ? 'blocked' : 'active'}'
)
">

${active ? 'حظر' : 'تفعيل'}

</button>

<button
class="delete-btn"
onclick="deleteTaxi('${taxi.id}')">

حذف

</button>

</div>

</div>

`;

});

}

document.getElementById(
"searchInput"
).addEventListener(
"input",
function(){

const value =
this.value.toLowerCase();

const filtered =
allTaxis.filter(taxi =>

(taxi.name || "")
.toLowerCase()
.includes(value)

||

(taxi.phone || "")
.includes(value)

);

renderTaxis(filtered);

}
);

window.toggleTaxiStatus =
async function(taxiId,status){

await update(
ref(db,"taxis/" + taxiId),
{

status:status

}
);

};

window.deleteTaxi =
async function(taxiId){

if(!confirm("حذف سائق التكسي؟")){
return;
}

await remove(
ref(db,"taxis/" + taxiId)
);

};

</script>

</body>

</html>
