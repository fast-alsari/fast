<!-- addresses.html -->

<!DOCTYPE html>
<html lang="ar" dir="rtl">

<head>

<meta charset="UTF-8">

<meta
name="viewport"
content="width=device-width, initial-scale=1.0">

<title>
العناوين
</title>

<link
href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;500;700;800&display=swap"
rel="stylesheet">

<link
rel="stylesheet"
href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css"/>

<style>

*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:'Cairo',sans-serif;
}

body{
background:#f5f6fa;
padding-bottom:120px;
overflow-x:hidden;
}

.header{
background:
linear-gradient(
135deg,
#ff8800,
#ff5500
);

padding:25px 20px;
color:white;

border-bottom-left-radius:30px;
border-bottom-right-radius:30px;

box-shadow:0 8px 25px rgba(0,0,0,.12);
}

.header h1{
font-size:28px;
margin-bottom:8px;
}

.header p{
font-size:14px;
opacity:.95;
}

.container{
padding:15px;
display:flex;
flex-direction:column;
gap:18px;
}

.card{
background:white;
padding:20px;
border-radius:28px;
box-shadow:0 5px 18px rgba(0,0,0,.06);
}

.card-title{
font-size:20px;
font-weight:bold;
margin-bottom:18px;
color:#222;
}

.input-group{
margin-bottom:16px;
}

.input-group label{
display:block;
margin-bottom:8px;
font-size:14px;
font-weight:bold;
color:#444;
}

.input-group input,
.input-group textarea{

width:100%;
border:none;
outline:none;

background:#f7f7f7;

padding:16px;
border-radius:18px;

font-size:15px;

}

textarea{
height:120px;
resize:none;
}

.save-btn{
width:100%;
height:58px;
border:none;
border-radius:20px;

background:
linear-gradient(
135deg,
#00b894,
#00a383
);

color:white;
font-size:16px;
font-weight:bold;
cursor:pointer;
}

.addresses-list{
display:flex;
flex-direction:column;
gap:15px;
}

.address-item{
background:#fff;
padding:18px;
border-radius:24px;
box-shadow:0 5px 18px rgba(0,0,0,.05);
}

.address-top{
display:flex;
justify-content:space-between;
align-items:center;
margin-bottom:10px;
gap:10px;
}

.address-name{
font-size:18px;
font-weight:bold;
color:#222;
}

.address-actions{
display:flex;
gap:10px;
}

.address-actions button{

width:42px;
height:42px;

border:none;
border-radius:14px;

cursor:pointer;
font-size:16px;
color:white;

}

.edit-btn{
background:#2563eb;
}

.delete-btn{
background:#e53935;
}

.address-details{
font-size:14px;
line-height:2;
color:#666;
}

.empty{
padding:60px 20px;
text-align:center;
font-size:16px;
color:#777;
}

.bottom-bar{
position:fixed;
bottom:0;
left:0;
right:0;
height:82px;
background:white;
display:flex;
justify-content:space-around;
align-items:center;
box-shadow:0 -5px 18px rgba(0,0,0,.08);
}

.nav-item{
display:flex;
flex-direction:column;
align-items:center;
gap:5px;
font-size:13px;
font-weight:bold;
cursor:pointer;
color:#888;
}

.nav-item.active{
color:#ff8800;
}

.nav-item i{
font-size:22px;
}

</style>

</head>

<body>

<div class="header">

<h1>
العناوين
</h1>

<p>
إدارة عناوين التوصيل الخاصة بك
</p>

</div>

<div class="container">

<div class="card">

<div class="card-title">
إضافة عنوان جديد
</div>

<div class="input-group">

<label>
اسم العنوان
</label>

<input
type="text"
id="addressName"
placeholder="مثال : المنزل">

</div>

<div class="input-group">

<label>
تفاصيل العنوان
</label>

<textarea
id="addressDetails"
placeholder="اكتب تفاصيل العنوان بالكامل"></textarea>

</div>

<button
class="save-btn"
onclick="saveAddress()">

حفظ العنوان

</button>

</div>

<div class="card">

<div class="card-title">
العناوين المحفوظة
</div>

<div
id="addressesList"
class="addresses-list"></div>

</div>

</div>

<div class="bottom-bar">

<div
class="nav-item"
onclick="window.location.href='home.html'">

<i class="fa-solid fa-house"></i>

<span>
الرئيسية
</span>

</div>

<div class="nav-item active">

<i class="fa-solid fa-location-dot"></i>

<span>
العناوين
</span>

</div>

<div
class="nav-item"
onclick="window.location.href='asca.html'">

<i class="fa-solid fa-user"></i>

<span>
الحساب
</span>

</div>

</div>

<script>

const currentUser =
JSON.parse(
localStorage.getItem("user")
);

if(
!currentUser ||
!currentUser.id
){

window.location.href =
"index.html";

}

let addresses =
JSON.parse(
localStorage.getItem(
`addresses_${currentUser.id}`
)
) || [];

let editId = null;

const list =
document.getElementById(
"addressesList"
);

renderAddresses();

window.saveAddress =
function(){

const name =
document.getElementById(
"addressName"
).value.trim();

const details =
document.getElementById(
"addressDetails"
).value.trim();

if(!name || !details){

alert("املأ جميع الحقول");
return;

}

if(editId){

addresses =
addresses.map(item=>{

if(item.id === editId){

return {
...item,
name:name,
details:details
};

}

return item;

});

editId = null;

}else{

addresses.push({

id:
"ADDR_" + Date.now(),

name:name,

details:details,

createdAt:Date.now()

});

}

localStorage.setItem(

`addresses_${currentUser.id}`,

JSON.stringify(addresses)

);

document.getElementById(
"addressName"
).value = "";

document.getElementById(
"addressDetails"
).value = "";

renderAddresses();

alert("تم حفظ العنوان");

};

function renderAddresses(){

list.innerHTML = "";

if(addresses.length === 0){

list.innerHTML = `
<div class="empty">
لا توجد عناوين محفوظة
</div>
`;

return;

}

addresses
.sort(
(a,b)=>
b.createdAt - a.createdAt
)
.forEach(item=>{

list.innerHTML += `

<div class="address-item">

<div class="address-top">

<div class="address-name">

${item.name || ""}

</div>

<div class="address-actions">

<button
class="edit-btn"
onclick="editAddress('${item.id}')">

<i class="fa-solid fa-pen"></i>

</button>

<button
class="delete-btn"
onclick="deleteAddress('${item.id}')">

<i class="fa-solid fa-trash"></i>

</button>

</div>

</div>

<div class="address-details">

${item.details || ""}

</div>

</div>

`;

});

}

window.editAddress =
function(id){

const address =
addresses.find(
item =>
item.id === id
);

if(!address){
return;
}

editId = id;

document.getElementById(
"addressName"
).value =
address.name || "";

document.getElementById(
"addressDetails"
).value =
address.details || "";

window.scrollTo({
top:0,
behavior:"smooth"
});

};

window.deleteAddress =
function(id){

if(!confirm("حذف العنوان ؟")){
return;
}

addresses =
addresses.filter(
item =>
item.id !== id
);

localStorage.setItem(

`addresses_${currentUser.id}`,

JSON.stringify(addresses)

);

renderAddresses();

};

</script>

</body>

</html>
