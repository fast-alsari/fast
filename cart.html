<!DOCTYPE html>
<html lang="ar" dir="rtl">

<head>

<meta charset="UTF-8">

<meta
name="viewport"
content="width=device-width, initial-scale=1.0">

<title>
السلة
</title>

<link
rel="stylesheet"
href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css"/>

<link
href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;500;600;700;800&display=swap"
rel="stylesheet">

<style>

*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:'Cairo',sans-serif;
}

body{
background:#f5f6fa;
padding-bottom:130px;
overflow-x:hidden;
}

.header{
background:
linear-gradient(
135deg,
#ff8800,
#ff5500
);

padding:22px;
color:white;

border-bottom-left-radius:30px;
border-bottom-right-radius:30px;

display:flex;
align-items:center;
gap:15px;
}

.back-btn{
width:48px;
height:48px;
border:none;
border-radius:50%;
background:white;
color:#ff6600;
font-size:18px;
cursor:pointer;
}

.header h2{
font-size:24px;
margin-bottom:5px;
}

.header p{
font-size:14px;
opacity:.95;
}

.cart-container{
padding:15px;
display:flex;
flex-direction:column;
gap:15px;
}

.cart-item{
background:white;
padding:15px;
border-radius:24px;

display:flex;
gap:14px;

box-shadow:
0 5px 18px rgba(0,0,0,.06);
}

.item-image{
width:95px;
height:95px;
border-radius:18px;
object-fit:cover;
background:#eee;
}

.item-content{
flex:1;
}

.item-name{
font-size:18px;
font-weight:bold;
margin-bottom:6px;
}

.item-store{
font-size:13px;
color:#666;
margin-bottom:8px;
}

.item-price{
font-size:18px;
font-weight:bold;
color:#ff6600;
margin-bottom:12px;
}

.qty-box{
display:flex;
align-items:center;
gap:10px;
}

.qty-btn{
width:34px;
height:34px;
border:none;
border-radius:10px;
background:#ff8800;
color:white;
font-size:18px;
cursor:pointer;
}

.qty-number{
width:45px;
height:34px;
border-radius:10px;
background:#f3f3f3;

display:flex;
align-items:center;
justify-content:center;

font-weight:bold;
}

.delete-btn{
margin-top:14px;
width:100%;
height:45px;
border:none;
border-radius:14px;
background:#ffebee;
color:#e53935;
font-size:14px;
font-weight:bold;
cursor:pointer;
}

.summary-box{
position:fixed;
bottom:0;
left:0;
right:0;

background:white;
padding:18px;

border-top-left-radius:28px;
border-top-right-radius:28px;

box-shadow:
0 -5px 20px rgba(0,0,0,.08);
}

.summary-row{
display:flex;
justify-content:space-between;
margin-bottom:12px;

font-size:16px;
}

.summary-total{
font-size:22px;
font-weight:bold;
color:#00b894;
}

.order-btn{
width:100%;
height:58px;
border:none;
border-radius:18px;

background:
linear-gradient(
135deg,
#00b894,
#00a383
);

color:white;
font-size:17px;
font-weight:bold;
cursor:pointer;
}

.empty{
padding:90px 20px;
text-align:center;
color:#777;
}

.empty i{
font-size:70px;
margin-bottom:20px;
color:#ddd;
}

</style>

</head>

<body>

<div class="header">

<button
class="back-btn"
onclick="window.location.href='home.html'">

<i class="fa-solid fa-arrow-right"></i>

</button>

<div>

<h2>
السلة 🛒
</h2>

<p>
راجع طلباتك قبل الإرسال
</p>

</div>

</div>

<div
class="cart-container"
id="cartContainer"></div>

<div
class="summary-box"
id="summaryBox">

<div class="summary-row">

<span>
مجموع المنتجات
</span>

<b id="productsTotal">
0 د.ع
</b>

</div>

<div class="summary-row">

<span>
أجور التوصيل
</span>

<b id="deliveryPrice">
0 د.ع
</b>

</div>

<div class="summary-row">

<span>
المجموع الكلي
</span>

<b
class="summary-total"
id="finalTotal">

0 د.ع

</b>

</div>

<button
class="order-btn"
onclick="sendOrder()">

إرسال الطلب 🚀

</button>

</div>

<script type="module">

import { db }
from "./firebase.js";

import {

ref,
set

}

from "https://www.gstatic.com/firebasejs/12.13.0/firebase-database.js";

const currentUser =
JSON.parse(
localStorage.getItem("user")
);

if(!currentUser){

window.location.replace(
"index.html"
);

}

let cart =
JSON.parse(
localStorage.getItem("cart")
) || [];

const cartContainer =
document.getElementById(
"cartContainer"
);

function renderCart(){

cartContainer.innerHTML = "";

if(cart.length === 0){

cartContainer.innerHTML = `

<div class="empty">

<i class="fa-solid fa-cart-shopping"></i>

<h2>
السلة فارغة
</h2>

</div>

`;

document.getElementById(
"summaryBox"
).style.display = "none";

return;

}

let productsTotal = 0;

cart.forEach((item,index)=>{

const itemTotal =
Number(item.price) *
Number(item.qty);

productsTotal += itemTotal;

cartContainer.innerHTML += `

<div class="cart-item">

<img
src="${item.image || 'product.png'}"
class="item-image">

<div class="item-content">

<div class="item-name">
${item.name}
</div>

<div class="item-store">
${item.storeName}
</div>

<div class="item-price">

${itemTotal.toLocaleString()} د.ع

</div>

<div class="qty-box">

<button
class="qty-btn"
onclick="decreaseQty(${index})">

-

</button>

<div class="qty-number">
${item.qty}
</div>

<button
class="qty-btn"
onclick="increaseQty(${index})">

+

</button>

</div>

<button
class="delete-btn"
onclick="deleteItem(${index})">

حذف المنتج

</button>

</div>

</div>

`;

});

const deliveryPrice =
3000;

const finalTotal =
productsTotal + deliveryPrice;

document.getElementById(
"productsTotal"
).innerHTML =

productsTotal.toLocaleString()
+
" د.ع";

document.getElementById(
"deliveryPrice"
).innerHTML =

deliveryPrice.toLocaleString()
+
" د.ع";

document.getElementById(
"finalTotal"
).innerHTML =

finalTotal.toLocaleString()
+
" د.ع";

}

window.increaseQty =
function(index){

cart[index].qty++;

saveCart();

};

window.decreaseQty =
function(index){

if(cart[index].qty > 1){

cart[index].qty--;

saveCart();

}

};

window.deleteItem =
function(index){

cart.splice(index,1);

saveCart();

};

function saveCart(){

localStorage.setItem(
"cart",
JSON.stringify(cart)
);

renderCart();

}

window.sendOrder =
async function(){

if(cart.length === 0){

alert("السلة فارغة");

return;

}

navigator.geolocation.getCurrentPosition(

async(position)=>{

const customerLat =
position.coords.latitude;

const customerLng =
position.coords.longitude;

const orderId =
"ORDER_" + Date.now();

const storesData = [];

cart.forEach(item=>{

if(
!storesData.find(
s => s.storeId === item.storeId
)
){

storesData.push({

storeId:
item.storeId,

storeName:
item.storeName

});

}

});

let productsTotal = 0;

cart.forEach(item=>{

productsTotal +=
Number(item.price) *
Number(item.qty);

});

const deliveryPrice =
3000;

const finalTotal =
productsTotal + deliveryPrice;

const orderData = {

id:orderId,

type:"delivery",

status:"waiting_driver",

customerId:
currentUser.id,

customerName:
currentUser.name || "",

customerPhone:
currentUser.phone || "",

customerAddress:
currentUser.address || "",

customerLat:
customerLat,

customerLng:
customerLng,

products:
cart,

storesData:
storesData,

productsTotal:
productsTotal,

deliveryPrice:
deliveryPrice,

finalTotal:
finalTotal,

createdAt:
Date.now()

};

await set(
ref(
db,
"orders/" + orderId
),
orderData
);

localStorage.removeItem(
"cart"
);

localStorage.setItem(
"currentOrderId",
orderId
);

alert("تم إرسال الطلب");

window.location.href =
`talab.html?orderId=${orderId}`;

},

()=>{

alert("يرجى تشغيل GPS");

}

);

};

renderCart();

</script>

</body>

</html>
