<!DOCTYPE html>
<html lang="ar" dir="rtl">

<head>

<meta charset="UTF-8">

<meta
name="viewport"
content="width=device-width, initial-scale=1.0">

<title>
السلة
</title>

<link
rel="stylesheet"
href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css"/>

<link
href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;500;600;700&display=swap"
rel="stylesheet">

<style>

*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:'Cairo',sans-serif;
}

body{
background:#f5f6fa;
padding-bottom:120px;
}

.header{
background:
linear-gradient(
135deg,
#ff8800,
#ff5500
);
padding:22px;
color:white;
border-bottom-left-radius:30px;
border-bottom-right-radius:30px;
}

.header h2{
font-size:26px;
}

.cart-container{
padding:15px;
display:flex;
flex-direction:column;
gap:15px;
}

.cart-item{
background:white;
padding:15px;
border-radius:24px;
display:flex;
gap:12px;
box-shadow:
0 5px 18px rgba(0,0,0,.06);
}

.cart-image{
width:95px;
height:95px;
border-radius:18px;
object-fit:cover;
background:#eee;
}

.cart-content{
flex:1;
}

.cart-name{
font-size:18px;
font-weight:bold;
margin-bottom:6px;
}

.cart-price{
font-size:17px;
color:#ff8800;
font-weight:bold;
margin-bottom:8px;
}

.qty-box{
display:flex;
align-items:center;
gap:10px;
margin-top:10px;
}

.qty-btn{
width:34px;
height:34px;
border:none;
border-radius:10px;
background:#ff8800;
color:white;
font-size:18px;
cursor:pointer;
}

.qty-text{
font-size:16px;
font-weight:bold;
}

.remove-btn{
margin-top:10px;
background:red;
color:white;
border:none;
padding:10px 15px;
border-radius:12px;
cursor:pointer;
font-size:13px;
font-weight:bold;
}

.summary{
position:fixed;
bottom:0;
left:0;
right:0;
background:white;
padding:18px;
box-shadow:
0 -5px 18px rgba(0,0,0,.08);
}

.total{
display:flex;
justify-content:space-between;
font-size:20px;
font-weight:bold;
margin-bottom:15px;
}

.order-btn{
width:100%;
height:56px;
border:none;
border-radius:18px;
background:
linear-gradient(
135deg,
#00b894,
#00a383
);
color:white;
font-size:17px;
font-weight:bold;
cursor:pointer;
}

.empty{
padding:60px 20px;
text-align:center;
font-size:17px;
color:#777;
}

</style>

</head>

<body>

<div class="header">

<h2>
السلة 🛒
</h2>

</div>

<div
class="cart-container"
id="cartContainer"></div>

<div class="summary">

<div class="total">

<span>
المجموع
</span>

<span id="totalPrice">
0 د.ع
</span>

</div>

<button
class="order-btn"
onclick="goCheckout()">

إتمام الطلب

</button>

</div>

<script type="module">

import {
formatPrice
}
from "./utils.js";

let cart =
JSON.parse(
localStorage.getItem("cart")
) || [];

const container =
document.getElementById(
"cartContainer"
);

function renderCart(){

container.innerHTML = "";

if(cart.length === 0){

container.innerHTML = `
<div class="empty">
السلة فارغة
</div>
`;

document.getElementById(
"totalPrice"
).innerHTML =
"0 د.ع";

return;

}

let total = 0;

cart.forEach((item,index)=>{

const itemTotal =
Number(item.price)
*
Number(item.qty);

total += itemTotal;

container.innerHTML += `

<div class="cart-item">

<img
src="${item.image || "product.png"}"
class="cart-image">

<div class="cart-content">

<div class="cart-name">
${item.name}
</div>

<div class="cart-price">

${formatPrice(item.price)}

</div>

<div>

الكمية:
${item.qty}

</div>

<div class="qty-box">

<button
class="qty-btn"
onclick="changeQty(${index},-1)">

-

</button>

<div class="qty-text">
${item.qty}
</div>

<button
class="qty-btn"
onclick="changeQty(${index},1)">

+

</button>

</div>

<button
class="remove-btn"
onclick="removeItem(${index})">

حذف

</button>

</div>

</div>

`;

});

document.getElementById(
"totalPrice"
).innerHTML =
formatPrice(total);

}

window.changeQty =
function(index,type){

cart[index].qty += type;

if(cart[index].qty <= 0){

cart.splice(index,1);

}

localStorage.setItem(
"cart",
JSON.stringify(cart)
);

renderCart();

};

window.removeItem =
function(index){

cart.splice(index,1);

localStorage.setItem(
"cart",
JSON.stringify(cart)
);

renderCart();

};

window.goCheckout =
function(){

if(cart.length === 0){

alert("السلة فارغة");

return;

}

window.location.href =
"checkout.html";

};

renderCart();

</script>

</body>

</html>
