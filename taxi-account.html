<!-- taxi-account.html -->

<!DOCTYPE html>
<html lang="ar" dir="rtl">

<head>

<meta charset="UTF-8">

<meta
name="viewport"
content="width=device-width, initial-scale=1.0">

<title>
حساب سائق التكسي
</title>

<link
href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;500;700&display=swap"
rel="stylesheet">

<style>

body{
margin:0;
padding:20px;
font-family:'Cairo',sans-serif;
background:#f5f6fa;
padding-bottom:100px;
}

.header{
background:
linear-gradient(
135deg,
#ff8800,
#ff5500
);

padding:30px 20px;
border-radius:30px;
text-align:center;
color:white;
margin-bottom:20px;
}

.image{
width:100px;
height:100px;
border-radius:50%;
object-fit:cover;
border:4px solid white;
background:white;
margin-bottom:15px;
}

.name{
font-size:26px;
font-weight:bold;
margin-bottom:8px;
}

.phone{
font-size:15px;
opacity:.9;
}

.card{
background:white;
padding:18px;
border-radius:24px;
margin-bottom:15px;
box-shadow:0 5px 18px rgba(0,0,0,.06);
}

.label{
font-size:13px;
color:#777;
margin-bottom:6px;
}

.value{
font-size:18px;
font-weight:bold;
}

.logout-btn{
width:100%;
height:58px;
border:none;
border-radius:20px;
background:red;
color:white;
font-size:17px;
font-weight:bold;
cursor:pointer;
margin-top:15px;
}

.bottom-bar{
position:fixed;
bottom:0;
left:0;
right:0;
height:82px;
background:white;
display:flex;
justify-content:space-around;
align-items:center;
box-shadow:0 -5px 18px rgba(0,0,0,.08);
}

.nav-item{
display:flex;
flex-direction:column;
align-items:center;
font-size:13px;
font-weight:bold;
color:#888;
}

.active{
color:#ff8800;
}

</style>

</head>

<body>

<div class="header">

<img
src="user.png"
id="userImage"
class="image">

<div
class="name"
id="userName">

سائق التكسي

</div>

<div
class="phone"
id="userPhone">

000000000

</div>

</div>

<div class="card">

<div class="label">
نوع المركبة
</div>

<div
class="value"
id="vehicleType">

تكسي

</div>

</div>

<div class="card">

<div class="label">
إجمالي الأرباح
</div>

<div
class="value"
id="totalProfit">

0 د.ع

</div>

</div>

<div class="card">

<div class="label">
الرحلات المكتملة
</div>

<div
class="value"
id="completedTrips">

0

</div>

</div>

<button
class="logout-btn"
onclick="logout()">

تسجيل الخروج

</button>

<div class="bottom-bar">

<div
class="nav-item"
onclick="window.location.href='taxi-orders.html'">

🚖

<span>
الطلبات
</span>

</div>

<div
class="nav-item"
onclick="window.location.href='taxi-history.html'">

🕓

<span>
السجل
</span>

</div>

<div class="nav-item active">

👤

<span>
الحساب
</span>

</div>

</div>

<script>

const currentUser =
JSON.parse(
localStorage.getItem("user")
);

if(
!currentUser ||
currentUser.type !== "taxi"
){

window.location.replace(
"index.html"
);

}

document.getElementById(
"userName"
).innerHTML =
currentUser.name || "";

document.getElementById(
"userPhone"
).innerHTML =
currentUser.phone || "";

document.getElementById(
"userImage"
).src =
currentUser.image || "user.png";

document.getElementById(
"vehicleType"
).innerHTML =
currentUser.vehicleType || "تكسي";

document.getElementById(
"totalProfit"
).innerHTML =

Number(
currentUser.totalProfit || 0
).toLocaleString()

+

" د.ع";

document.getElementById(
"completedTrips"
).innerHTML =
currentUser.completedTrips || 0;

function logout(){

localStorage.clear();

sessionStorage.clear();

window.location.replace(
"index.html"
);

}

</script>

</body>

</html>
