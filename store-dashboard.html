<!DOCTYPE html>
<html lang="ar" dir="rtl">

<head>

<meta charset="UTF-8">

<meta
name="viewport"
content="width=device-width, initial-scale=1.0">

<title>
لوحة المتجر
</title>

<link
rel="stylesheet"
href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css"/>

<link
href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;500;700;800&display=swap"
rel="stylesheet">

<style>

*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:'Cairo',sans-serif;
}

body{
background:#f5f6fa;
padding:15px;
padding-bottom:120px;
overflow-x:hidden;
}

.header{
background:
linear-gradient(
135deg,
#ff8800,
#ff5500
);

padding:22px;
border-radius:28px;
color:white;
margin-bottom:20px;

box-shadow:
0 8px 25px rgba(0,0,0,.12);
}

.store-box{
display:flex;
align-items:center;
gap:15px;
}

.store-image{
width:80px;
height:80px;
border-radius:22px;
object-fit:cover;
background:white;
padding:4px;
}

.store-info h2{
font-size:24px;
margin-bottom:5px;
}

.store-info p{
font-size:14px;
opacity:.95;
}

.stats{
display:grid;
grid-template-columns:repeat(2,1fr);
gap:15px;
margin-bottom:20px;
}

.stat-card{
background:white;
padding:20px;
border-radius:24px;
text-align:center;

box-shadow:
0 5px 18px rgba(0,0,0,.06);
}

.stat-card h2{
font-size:30px;
color:#ff6600;
margin-bottom:8px;
}

.stat-card p{
font-size:14px;
font-weight:bold;
color:#666;
}

.section{
background:white;
padding:18px;
border-radius:24px;
margin-bottom:18px;

box-shadow:
0 5px 18px rgba(0,0,0,.06);
}

.section-title{
font-size:18px;
font-weight:bold;
margin-bottom:15px;
color:#ff6600;
}

.order-card{
background:#fafafa;
padding:16px;
border-radius:18px;
margin-bottom:12px;
}

.order-card h3{
margin-bottom:8px;
}

.order-card p{
font-size:13px;
color:#666;
margin-bottom:5px;
}

.actions{
display:flex;
gap:10px;
margin-top:15px;
}

.actions button{
flex:1;
height:48px;
border:none;
border-radius:16px;
font-size:14px;
font-weight:bold;
cursor:pointer;
color:white;
}

.accept-btn{
background:#00b894;
}

.ready-btn{
background:#2563eb;
}

.bottom-bar{
position:fixed;
bottom:0;
left:0;
right:0;
height:82px;
background:white;

display:flex;
justify-content:space-around;
align-items:center;

box-shadow:
0 -5px 18px rgba(0,0,0,.08);

z-index:9999;
}

.nav-item{
display:flex;
flex-direction:column;
align-items:center;
gap:5px;

font-size:13px;
font-weight:bold;

color:#888;
cursor:pointer;
}

.nav-item.active{
color:#ff8800;
}

.nav-item i{
font-size:22px;
}

</style>

</head>

<body>

<div class="header">

<div class="store-box">

<img
src="store.png"
id="storeImage"
class="store-image">

<div class="store-info">

<h2 id="storeName">
المتجر
</h2>

<p id="storeCategory">
القسم
</p>

</div>

</div>

</div>

<div class="stats">

<div class="stat-card">

<h2 id="todayOrders">
0
</h2>

<p>
طلبات اليوم
</p>

</div>

<div class="stat-card">

<h2 id="completedOrders">
0
</h2>

<p>
الطلبات المكتملة
</p>

</div>

<div class="stat-card">

<h2 id="totalProducts">
0
</h2>

<p>
المنتجات
</p>

</div>

<div class="stat-card">

<h2 id="totalProfit">
0
</h2>

<p>
الأرباح
</p>

</div>

</div>

<div class="section">

<div class="section-title">
الطلبات الحالية
</div>

<div id="ordersContainer"></div>

</div>

<div class="bottom-bar">

<div class="nav-item active">

<i class="fa-solid fa-shop"></i>

<span>
الرئيسية
</span>

</div>

<div
class="nav-item"
onclick="window.location.href='store-products.html'">

<i class="fa-solid fa-box"></i>

<span>
المنتجات
</span>

</div>

<div
class="nav-item"
onclick="window.location.href='asca.html'">

<i class="fa-solid fa-user"></i>

<span>
الحساب
</span>

</div>

</div>

<script type="module">

import { db }
from "./firebase.js";

import {

ref,
onValue,
update

}

from
"https://www.gstatic.com/firebasejs/12.13.0/firebase-database.js";

const currentUser =
JSON.parse(
localStorage.getItem("user")
);

if(
!currentUser ||
currentUser.type !== "store"
){

window.location.replace(
"index.html"
);

}

document.getElementById(
"storeName"
).innerHTML =

currentUser.store_name || "";

document.getElementById(
"storeCategory"
).innerHTML =

currentUser.category || "";

document.getElementById(
"storeImage"
).src =

currentUser.store_image || "store.png";

// =====================
// المنتجات
// =====================

onValue(
ref(
db,
"store_products/" + currentUser.id
),
(snapshot)=>{

document.getElementById(
"totalProducts"
).innerHTML =

snapshot.exists()
?
Object.keys(snapshot.val()).length
:
0;

}
);

// =====================
// الطلبات
// =====================

const ordersContainer =
document.getElementById(
"ordersContainer"
);

onValue(
ref(db,"orders"),
(snapshot)=>{

ordersContainer.innerHTML = "";

let todayOrders = 0;
let completedOrders = 0;
let totalProfit = 0;

if(!snapshot.exists()){

ordersContainer.innerHTML =
"لا توجد طلبات";

return;

}

const orders =
snapshot.val();

for(let key in orders){

const order =
orders[key];

const hasStore =
order.items?.some(
item =>
item.storeId === currentUser.id
);

if(!hasStore){
continue;
}

todayOrders++;

if(order.status === "delivered"){

completedOrders++;

totalProfit +=
Number(order.productsPrice || 0);

}

if(
[
"accepted",
"waiting_driver",
"preparing_order"
]
.includes(order.status)
){

ordersContainer.innerHTML += `

<div class="order-card">

<h3>
${order.customerName || ""}
</h3>

<p>
📞 ${order.customerPhone || ""}
</p>

<p>
💰 ${Number(order.totalPrice || 0)
.toLocaleString()} د.ع
</p>

<p>
🛒 ${order.items?.length || 0} منتج
</p>

<div class="actions">

<button
class="accept-btn"
onclick="prepareOrder('${order.id}')">

تجهيز الطلب

</button>

<button
class="ready-btn"
onclick="finishPrepare('${order.id}')">

جاهز للاستلام

</button>

</div>

</div>

`;

}

}

document.getElementById(
"todayOrders"
).innerHTML = todayOrders;

document.getElementById(
"completedOrders"
).innerHTML = completedOrders;

document.getElementById(
"totalProfit"
).innerHTML =

Number(totalProfit)
.toLocaleString();

}
);

// =====================
// تجهيز
// =====================

window.prepareOrder =
async function(orderId){

await update(
ref(
db,
"orders/" + orderId
),
{

status:"preparing_order",

statusText:
"المتجر يقوم بتجهيز الطلب"

}
);

alert("تم بدء تجهيز الطلب");

};

// =====================
// جاهز
// =====================

window.finishPrepare =
async function(orderId){

await update(
ref(
db,
"orders/" + orderId
),
{

status:"picked_up",

statusText:
"الطلب جاهز مع السائق"

}
);

alert("تم تجهيز الطلب");

};

</script>

</body>

</html>
