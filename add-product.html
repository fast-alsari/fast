<!DOCTYPE html>
<html lang="ar" dir="rtl">

<head>

<meta charset="UTF-8">

<meta
name="viewport"
content="width=device-width, initial-scale=1.0">

<title>
إضافة منتج
</title>

<link
rel="stylesheet"
href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css"/>

<link
href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;500;600;700;800&display=swap"
rel="stylesheet">

<style>

*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:'Cairo',sans-serif;
}

body{
background:#f5f6fa;
padding:15px;
padding-bottom:120px;
}

.header{
background:
linear-gradient(
135deg,
#ff8800,
#ff5500
);

padding:22px;
border-radius:28px;
color:white;

display:flex;
align-items:center;
gap:15px;

margin-bottom:20px;
}

.back-btn{
width:48px;
height:48px;
border:none;
border-radius:50%;
background:white;
color:#ff6600;
font-size:18px;
cursor:pointer;
}

.header h2{
font-size:24px;
margin-bottom:4px;
}

.header p{
font-size:14px;
opacity:.9;
}

.form-box{
background:white;
padding:20px;
border-radius:28px;

box-shadow:
0 5px 18px rgba(0,0,0,.06);
}

.input-group{
margin-bottom:18px;
}

.input-group label{
display:block;
margin-bottom:8px;
font-size:14px;
font-weight:bold;
}

.input-group input,
.input-group textarea,
.input-group select{
width:100%;
padding:16px;
border-radius:18px;
border:1px solid #ddd;
background:#fafafa;
outline:none;
font-size:15px;
}

textarea{
resize:none;
height:130px;
}

.image-preview{
width:100%;
height:240px;
border-radius:24px;
object-fit:cover;
background:#eee;
margin-bottom:18px;
}

.save-btn{
width:100%;
height:58px;
border:none;
border-radius:18px;

background:
linear-gradient(
135deg,
#00b894,
#00a383
);

color:white;
font-size:17px;
font-weight:bold;
cursor:pointer;
}

</style>

</head>

<body>

<div class="header">

<button
class="back-btn"
onclick="window.location.href='store-panel.html'">

<i class="fa-solid fa-arrow-right"></i>

</button>

<div>

<h2>
إضافة منتج
</h2>

<p>
قم بإضافة منتج جديد للمتجر
</p>

</div>

</div>

<div class="form-box">

<img
src="product.png"
id="previewImage"
class="image-preview">

<div class="input-group">

<label>
صورة المنتج
</label>

<input
type="file"
id="productImage"
accept="image/*">

</div>

<div class="input-group">

<label>
اسم المنتج
</label>

<input
type="text"
id="productName"
placeholder="اسم المنتج">

</div>

<div class="input-group">

<label>
السعر
</label>

<input
type="number"
id="productPrice"
placeholder="السعر بالدينار">

</div>

<div class="input-group">

<label>
وصف المنتج
</label>

<textarea
id="productDescription"
placeholder="اكتب وصف المنتج"></textarea>

</div>

<div class="input-group">

<label>
القسم
</label>

<select id="productCategory">

<option value="مطاعم">
مطاعم
</option>

<option value="ماركت">
ماركت
</option>

<option value="حلويات">
حلويات
</option>

<option value="مشروبات">
مشروبات
</option>

</select>

</div>

<button
class="save-btn"
onclick="saveProduct()">

حفظ المنتج

</button>

</div>

<script type="module">

import { db }
from "./firebase.js";

import {

ref,
set

}

from "https://www.gstatic.com/firebasejs/12.13.0/firebase-database.js";

const currentUser =
JSON.parse(
localStorage.getItem("user")
);

if(
!currentUser ||
currentUser.type !== "store"
){

window.location.replace(
"index.html"
);

}

let imageBase64 = "";

document.getElementById(
"productImage"
).addEventListener(
"change",
function(e){

const file =
e.target.files[0];

if(!file){
return;
}

const reader =
new FileReader();

reader.onload =
function(event){

imageBase64 =
event.target.result;

document.getElementById(
"previewImage"
).src = imageBase64;

};

reader.readAsDataURL(file);

}
);

window.saveProduct =
async function(){

const name =
document.getElementById(
"productName"
).value.trim();

const price =
document.getElementById(
"productPrice"
).value.trim();

const description =
document.getElementById(
"productDescription"
).value.trim();

const category =
document.getElementById(
"productCategory"
).value;

if(
!name ||
!price
){

alert("يرجى ملء الحقول");

return;

}

const productId =
"PRODUCT_" + Date.now();

const productData = {

id:productId,

storeId:
currentUser.id,

storeName:
currentUser.store_name || "",

name:name,

price:Number(price),

description:description,

category:category,

image:
imageBase64 || "",

status:"active",

createdAt:
Date.now()

};

await set(
ref(
db,
"store_products/" +
currentUser.id +
"/" +
productId
),
productData
);

alert("تم حفظ المنتج");

window.location.replace(
"store-panel.html"
);

};

</script>

</body>

</html>
