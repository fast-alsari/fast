<!DOCTYPE html>
<html lang="ar" dir="rtl">

<head>

<meta charset="UTF-8">

<meta
name="viewport"
content="width=device-width, initial-scale=1.0">

<title>
إضافة منتج
</title>

<link
href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;500;600;700&display=swap"
rel="stylesheet">

<style>

*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:'Cairo',sans-serif;
}

body{
background:#f5f6fa;
padding:15px;
padding-bottom:100px;
}

.header{
background:
linear-gradient(
135deg,
#ff8800,
#ff5500
);

padding:22px;
border-radius:28px;
color:white;
margin-bottom:20px;
}

.header h2{
font-size:26px;
margin-bottom:6px;
}

.card{
background:white;
padding:20px;
border-radius:26px;
box-shadow:
0 5px 18px rgba(0,0,0,.06);
}

.input-group{
margin-bottom:18px;
}

.input-group label{
display:block;
margin-bottom:8px;
font-size:14px;
font-weight:bold;
}

.input,
.textarea{
width:100%;
border:none;
background:#f5f5f5;
border-radius:16px;
padding:15px;
outline:none;
font-size:15px;
}

.input{
height:56px;
}

.textarea{
height:120px;
resize:none;
}

.image-preview{
width:100%;
height:220px;
border-radius:22px;
background:#f5f5f5;
object-fit:cover;
margin-top:12px;
}

.save-btn{
width:100%;
height:58px;
border:none;
border-radius:18px;
background:
linear-gradient(
135deg,
#00b894,
#00a383
);

color:white;
font-size:17px;
font-weight:bold;
cursor:pointer;
margin-top:10px;
}

</style>

</head>

<body>

<div class="header">

<h2>
إضافة منتج 🛍️
</h2>

<p>
أضف منتج جديد للمتجر
</p>

</div>

<div class="card">

<div class="input-group">

<label>
اسم المنتج
</label>

<input
type="text"
id="nameInput"
class="input"
placeholder="اسم المنتج">

</div>

<div class="input-group">

<label>
السعر
</label>

<input
type="number"
id="priceInput"
class="input"
placeholder="السعر">

</div>

<div class="input-group">

<label>
الوصف
</label>

<textarea
id="descriptionInput"
class="textarea"
placeholder="وصف المنتج"></textarea>

</div>

<div class="input-group">

<label>
رابط الصورة
</label>

<input
type="text"
id="imageInput"
class="input"
placeholder="رابط الصورة">

<img
src="product.png"
id="imagePreview"
class="image-preview">

</div>

<button
class="save-btn"
onclick="saveProduct()">

حفظ المنتج

</button>

</div>

<script type="module">

import { db }
from "./firebase.js";

import {
ref,
set
}
from "https://www.gstatic.com/firebasejs/12.13.0/firebase-database.js";

import {
generateId
}
from "./utils.js";

const currentUser =
JSON.parse(
localStorage.getItem("user")
);

if(
!currentUser ||
currentUser.type !== "store"
){

window.location.replace(
"index.html"
);

}

const imageInput =
document.getElementById(
"imageInput"
);

const imagePreview =
document.getElementById(
"imagePreview"
);

imageInput.addEventListener(
"input",
()=>{

imagePreview.src =
imageInput.value || "product.png";

}
);

window.saveProduct =
async function(){

const name =
document.getElementById(
"nameInput"
).value.trim();

const price =
document.getElementById(
"priceInput"
).value.trim();

const description =
document.getElementById(
"descriptionInput"
).value.trim();

const image =
document.getElementById(
"imageInput"
).value.trim();

if(
!name ||
!price
){

alert("اكمل البيانات");

return;

}

const productId =
generateId("PRODUCT");

const productData = {

id:productId,

storeId:
currentUser.id,

name:name,

price:
Number(price),

description:
description,

image:
image || "",

status:"active",

createdAt:
Date.now()

};

await set(

ref(
db,
"store_products/" +
currentUser.id +
"/" +
productId
),

productData

);

alert("تم إضافة المنتج");

window.location.replace(
"store.html"
);

};

</script>

</body>

</html>
