<!-- favorite.html -->

<!DOCTYPE html>
<html lang="ar" dir="rtl">

<head>

<meta charset="UTF-8">

<meta
name="viewport"
content="width=device-width, initial-scale=1.0">

<title>
المفضلة
</title>

<link
href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;500;700;800&display=swap"
rel="stylesheet">

<link
rel="stylesheet"
href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css"/>

<style>

*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:'Cairo',sans-serif;
}

body{
background:#f5f6fa;
padding-bottom:110px;
overflow-x:hidden;
}

.header{
background:
linear-gradient(
135deg,
#ff8800,
#ff5500
);

padding:25px 20px;
color:white;

border-bottom-left-radius:30px;
border-bottom-right-radius:30px;

box-shadow:0 8px 25px rgba(0,0,0,.12);
}

.header h1{
font-size:28px;
margin-bottom:8px;
}

.header p{
font-size:14px;
opacity:.95;
}

.container{
padding:15px;
display:flex;
flex-direction:column;
gap:18px;
}

.favorite-card{
background:white;
padding:16px;
border-radius:28px;
box-shadow:0 5px 18px rgba(0,0,0,.06);
display:flex;
gap:15px;
align-items:center;
}

.favorite-image{
width:90px;
height:90px;
border-radius:22px;
object-fit:cover;
background:#eee;
}

.favorite-info{
flex:1;
}

.favorite-name{
font-size:18px;
font-weight:bold;
margin-bottom:8px;
color:#222;
}

.favorite-category{
font-size:14px;
color:#666;
margin-bottom:10px;
}

.favorite-distance{
font-size:13px;
font-weight:bold;
color:#ff8800;
}

.actions{
display:flex;
flex-direction:column;
gap:10px;
}

.open-btn,
.remove-btn{

width:110px;
height:44px;

border:none;
border-radius:16px;

font-size:14px;
font-weight:bold;
cursor:pointer;

}

.open-btn{
background:#00b894;
color:white;
}

.remove-btn{
background:#e53935;
color:white;
}

.empty{
padding:70px 20px;
text-align:center;
font-size:17px;
color:#777;
}

.empty i{
font-size:70px;
margin-bottom:20px;
color:#ff8800;
}

.bottom-bar{
position:fixed;
bottom:0;
left:0;
right:0;
height:82px;
background:white;
display:flex;
justify-content:space-around;
align-items:center;
box-shadow:0 -5px 18px rgba(0,0,0,.08);
}

.nav-item{
display:flex;
flex-direction:column;
align-items:center;
gap:5px;
font-size:13px;
font-weight:bold;
cursor:pointer;
color:#888;
}

.nav-item.active{
color:#ff8800;
}

.nav-item i{
font-size:22px;
}

</style>

</head>

<body>

<div class="header">

<h1>
المفضلة
</h1>

<p>
المتاجر التي أضفتها للمفضلة
</p>

</div>

<div
id="favoritesContainer"
class="container"></div>

<div class="bottom-bar">

<div
class="nav-item"
onclick="window.location.href='home.html'">

<i class="fa-solid fa-house"></i>

<span>
الرئيسية
</span>

</div>

<div class="nav-item active">

<i class="fa-solid fa-heart"></i>

<span>
المفضلة
</span>

</div>

<div
class="nav-item"
onclick="window.location.href='asca.html'">

<i class="fa-solid fa-user"></i>

<span>
الحساب
</span>

</div>

</div>

<script>

const container =
document.getElementById(
"favoritesContainer"
);

let favorites =
JSON.parse(
localStorage.getItem("favorites")
) || [];

renderFavorites();

function renderFavorites(){

container.innerHTML = "";

if(favorites.length === 0){

container.innerHTML = `

<div class="empty">

<i class="fa-solid fa-heart-crack"></i>

<div>
لا توجد متاجر بالمفضلة
</div>

</div>

`;

return;

}

favorites.forEach(store=>{

container.innerHTML += `

<div class="favorite-card">

<img
src="${store.image || 'store.png'}"
class="favorite-image"
onerror="this.src='store.png'">

<div class="favorite-info">

<div class="favorite-name">

${store.name || ""}

</div>

<div class="favorite-category">

${store.category || ""}

</div>

<div class="favorite-distance">

📍 ${store.distance || 0} كم

</div>

</div>

<div class="actions">

<button
class="open-btn"
onclick="openStore('${store.id}')">

فتح

</button>

<button
class="remove-btn"
onclick="removeFavorite('${store.id}')">

حذف

</button>

</div>

</div>

`;

});

}

window.removeFavorite =
function(storeId){

favorites =
favorites.filter(
item =>
item.id !== storeId
);

localStorage.setItem(
"favorites",
JSON.stringify(favorites)
);

renderFavorites();

};

window.openStore =
function(storeId){

window.location.href =
`home.html?store=${storeId}`;

};

</script>

</body>

</html>
