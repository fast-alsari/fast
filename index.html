const app =
initializeApp(firebaseConfig);

const database =
getDatabase(app);

// =========================
// حفظ الجلسة
// =========================

function saveSession(user){

localStorage.setItem(
"user",
JSON.stringify({
phone:user.phone,
type:user.type
})
);

}

// =========================
// حذف الجلسة
// =========================

function clearSession(){

localStorage.removeItem("user");

}

// =========================
// اظهار الصفحات
// =========================

window.showSection =
function(id){

document.querySelectorAll(".section")
.forEach(section=>{

section.classList.remove("active");

});

document
.getElementById(id)
.classList.add("active");

};

// =========================
// رسالة الحالة
// =========================

function showAccountStatus(status){

showSection("pendingSection");

const pendingMessage =
document.getElementById("pendingMessage");

// pending

if(status === "pending"){

pendingMessage.innerHTML = `

حالة حسابك غير مفعلة حالياً <br><br>

يرجى التواصل مع الإدارة لتفعيل الحساب

`;

}

// banned

if(status === "banned"){

pendingMessage.innerHTML = `

تم حظر حسابك من الإدارة

`;

}

// disabled

if(status === "disabled"){

pendingMessage.innerHTML = `

تم إيقاف حسابك مؤقتاً

`;

}

// expired

if(status === "expired"){

pendingMessage.innerHTML = `

انتهى اشتراك حسابك <br><br>

يرجى التواصل مع الإدارة للتجديد

`;

}

}

// =========================
// تحويل الصفحات
// =========================

function redirectUser(user){

if(user.type === "customer"){

window.location.replace("home.html");

}

if(user.type === "store"){

window.location.replace("store.html");

}

if(user.type === "driver"){

window.location.replace("drive.html");

}

if(user.type === "taxi"){

window.location.replace("tixe.html");

}

if(user.type === "admin"){

window.location.replace("add.html");

}

}

// =========================
// مراقبة الحساب لحظياً
// =========================

function monitorUser(user){

let table = "";

// تحديد الجدول

if(user.type === "customer"){
table = "customers";
}

if(user.type === "store"){
table = "stores";
}

if(user.type === "driver"){
table = "drivers";
}

if(user.type === "taxi"){
table = "taxis";
}

if(user.type === "admin"){
table = "admins";
}

// مراقبة الحساب

onValue(

ref(database, table + "/" + user.phone),

async(snapshot)=>{

// اذا الحساب محذوف

if(!snapshot.exists()){

clearSession();

alert("تم حذف الحساب");

window.location.replace("index.html");

return;

}

const updatedUser =
snapshot.val();

// تحديث الجلسة

saveSession(updatedUser);

// =========================
// فحص انتهاء الاشتراك
// =========================

const today =
new Date()
.toISOString()
.split("T")[0];

// انتهاء VIP

if(
updatedUser.accountType === "vip" &&
updatedUser.vipExpireDate &&
updatedUser.vipExpireDate < today
){

await update(
ref(database, table + "/" + user.phone),
{
accountType:"normal",
vipExpireDate:""
}
);

}

// انتهاء الاشتراك

if(
updatedUser.expireDate &&
updatedUser.expireDate < today &&
updatedUser.status === "active"
){

await update(
ref(database, table + "/" + user.phone),
{
status:"expired"
}
);

return;

}

// =========================
// فحص الحالة
// =========================

// active

if(updatedUser.status === "active"){

redirectUser(updatedUser);

return;

}

// pending

if(
updatedUser.status === "pending"
){

showAccountStatus("pending");

return;

}

// banned

if(
updatedUser.status === "banned"
){

showAccountStatus("banned");

return;

}

// disabled

if(
updatedUser.status === "disabled"
){

showAccountStatus("disabled");

return;

}

// expired

if(
updatedUser.status === "expired"
){

showAccountStatus("expired");

return;

}

}

);

}

// =========================
// تسجيل دخول تلقائي
// =========================

async function autoLogin(){

const savedUser =
JSON.parse(
localStorage.getItem("user")
);

if(!savedUser){

return;

}

// تشغيل المراقبة اللحظية

monitorUser(savedUser);

}

autoLogin();

// =========================
// تسجيل الدخول
// =========================

window.login =
async function(){

const phone =
document.getElementById("login_phone")
.value;

const password =
document.getElementById("login_password")
.value;

const tables = [

"admins",
"customers",
"stores",
"drivers",
"taxis"

];

for(let table of tables){

const snapshot =
await get(
child(ref(database), table)
);

if(snapshot.exists()){

const data =
snapshot.val();

for(let key in data){

const user =
data[key];

if(
user.phone === phone &&
user.password === password
){

saveSession(user);

monitorUser(user);

return;

}

}

}

}

alert("بيانات الدخول غير صحيحة");

};

// =========================
// تسجيل خروج
// =========================

window.logout =
function(){

clearSession();

window.location.replace("index.html");

};

</script>
