<!DOCTYPE html>
<html lang="ar" dir="rtl">

<head>

<meta charset="UTF-8">

<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>عالسريع</title>

<link rel="icon" href="Logo.png">

<link rel="apple-touch-icon" href="Logo.png">

<meta name="apple-mobile-web-app-capable" content="yes">

<meta name="apple-mobile-web-app-status-bar-style" content="default">

<link rel="preconnect" href="https://fonts.googleapis.com">

<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>

<link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;500;600;700&display=swap" rel="stylesheet">

<link rel="stylesheet" href="style.css">

<link rel="stylesheet"
href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css"/>

<link rel="stylesheet"
href="https://unpkg.com/leaflet/dist/leaflet.css"/>

<script src="https://unpkg.com/leaflet/dist/leaflet.js"></script>

<style>

.work-times{
margin-top:20px;
padding:15px;
background:#f7f7f7;
border-radius:15px;
}

.work-times h3{
margin-bottom:15px;
font-size:18px;
}

.day-row{
display:flex;
justify-content:space-between;
align-items:center;
margin-bottom:12px;
gap:10px;
flex-wrap:wrap;
}

.day-row label{
font-weight:bold;
min-width:80px;
}

.time-selects{
display:flex;
gap:10px;
flex:1;
}

.time-selects select{
flex:1;
padding:10px;
border-radius:10px;
border:1px solid #ddd;
font-family:'Cairo',sans-serif;
}

.map-box{
width:100%;
height:300px;
border-radius:20px;
overflow:hidden;
margin-top:15px;
}

</style>

</head>

<body>

<div class="container">

<!-- تسجيل الدخول -->

<div id="loginSection" class="card section active">

<div class="logo">
<img src="Logo.png">
</div>

<p class="app-text">
نوصلك طلبك بأقل من ساعة 🚀
</p>

<h2 class="title">
تسجيل الدخول
</h2>

<input
type="text"
id="login_phone"
placeholder="رقم الهاتف">

<div class="password-box">

<input
type="password"
id="login_password"
placeholder="الرمز السري">

<i class="fa-solid fa-eye"
onclick="togglePassword('login_password',this)">
</i>

</div>

<button onclick="login()">
تسجيل الدخول
</button>

<div class="link">

<a onclick="showSection('registerSection')">
إنشاء حساب
</a>

</div>

</div>

<!-- إنشاء حساب -->

<div id="registerSection" class="card section">

<div class="logo">
<img src="Logo.png">
</div>

<h2 class="title">
إنشاء حساب
</h2>

<select
id="account_type"
onchange="changeRegisterForm()">

<option value="">
اختر نوع الحساب
</option>

<option value="customer">
زبون
</option>

<option value="taxi">
تكسي
</option>

<option value="store">
متجر
</option>

<option value="driver">
سائق توصيل
</option>

</select>

<!-- المتجر -->

<div id="storeForm" style="display:none;">

<input
type="text"
id="store_owner"
placeholder="الاسم الكامل">

<input
type="text"
id="store_phone"
placeholder="رقم الهاتف">

<input
type="text"
id="store_name"
placeholder="اسم المتجر">

<select id="store_category">

<option value="">
اختر نوع المتجر
</option>

<option>مطعم</option>
<option>مخبز</option>
<option>ماركت</option>
<option>خضروات</option>
<option>مواد انشائية</option>
<option>أدوات احتياطية</option>
<option>ملابس</option>
<option>صيدلية</option>
<option>الكترونيات</option>

</select>

<div class="password-box">

<input
type="password"
id="store_password"
placeholder="الرمز السري">

<i class="fa-solid fa-eye"
onclick="togglePassword('store_password',this)">
</i>

</div>

<p class="upload-title">
صورة المتجر
</p>

<input
type="file"
id="store_image"
accept="image/*">

<p class="upload-title">
صورة البطاقة الموحدة
</p>

<input
type="file"
id="store_card"
accept="image/*">

<!-- أوقات الدوام -->

<div class="work-times">

<h3>
أوقات عمل المتجر
</h3>

<div id="daysContainer"></div>

</div>

<p class="map-title">
حدد موقع المتجر على الخريطة
</p>

<div id="storeMap" class="map-box"></div>

</div>

<button onclick="registerAccount()">
إنشاء الحساب
</button>

<div class="link">

<a onclick="showSection('loginSection')">
العودة لتسجيل الدخول
</a>

</div>

</div>

</div>

<script type="module">

import { initializeApp }
from
"https://www.gstatic.com/firebasejs/12.13.0/firebase-app.js";

import {
getDatabase,
ref,
set
}
from
"https://www.gstatic.com/firebasejs/12.13.0/firebase-database.js";

const firebaseConfig = {

apiKey:"AIzaSyC7QzQTYMSGRV_nraJBneBqDqYGhugF0Pw",

authDomain:"fast-937c9.firebaseapp.com",

projectId:"fast-937c9",

storageBucket:"fast-937c9.firebasestorage.app",

messagingSenderId:"221388561840",

appId:"1:221388561840:web:ec9d75183ddd7d44be0a75",

measurementId:"G-CEKHEPNR9X",

databaseURL:
"https://fast-937c9-default-rtdb.europe-west1.firebasedatabase.app"

};

const app =
initializeApp(firebaseConfig);

const database =
getDatabase(app);

const IMGBB_API_KEY =
"fa7d8e3e0c7fbc7686b65048fff45913";

async function uploadImage(file){

if(!file){
return "";
}

const formData = new FormData();

formData.append("image",file);

const response = await fetch(
`https://api.imgbb.com/1/upload?key=${IMGBB_API_KEY}`,
{
method:"POST",
body:formData
}
);

const data = await response.json();

return data.data.url;

}

// أيام الأسبوع

const days = [

"الأحد",
"الاثنين",
"الثلاثاء",
"الأربعاء",
"الخميس",
"الجمعة",
"السبت"

];

// ساعات الدوام

const hours = [

"مغلق",
"6 صباحاً",
"7 صباحاً",
"8 صباحاً",
"9 صباحاً",
"10 صباحاً",
"11 صباحاً",
"12 ظهراً",
"1 ظهراً",
"2 ظهراً",
"3 عصراً",
"4 عصراً",
"5 عصراً",
"6 مساءً",
"7 مساءً",
"8 مساءً",
"9 مساءً",
"10 مساءً",
"11 مساءً"

];

// إنشاء جدول الدوام

const daysContainer =
document.getElementById("daysContainer");

days.forEach((day,index)=>{

daysContainer.innerHTML += `

<div class="day-row">

<label>${day}</label>

<div class="time-selects">

<select id="from_${index}">
${hours.map(h=>`<option>${h}</option>`).join("")}
</select>

<select id="to_${index}">
${hours.map(h=>`<option>${h}</option>`).join("")}
</select>

</div>

</div>

`;

});

// خريطة المتجر

let storeMap;
let storeMarker;

let store_latitude = "";
let store_longitude = "";

function loadStoreMap(){

storeMap = L.map('storeMap')
.setView([33.3152,44.3661],13);

L.tileLayer(
'https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png',
{
maxZoom:19
}
).addTo(storeMap);

storeMap.on('click',function(e){

store_latitude =
e.latlng.lat;

store_longitude =
e.latlng.lng;

if(storeMarker){

storeMap.removeLayer(storeMarker);

}

storeMarker =
L.marker([
store_latitude,
store_longitude
]).addTo(storeMap);

});

}

setTimeout(loadStoreMap,500);

// اظهار كلمة السر

window.togglePassword =
function(id,icon){

let input =
document.getElementById(id);

if(input.type === "password"){

input.type = "text";

icon.classList.replace(
"fa-eye",
"fa-eye-slash"
);

}else{

input.type = "password";

icon.classList.replace(
"fa-eye-slash",
"fa-eye"
);

}

};

// اظهار الصفحات

window.showSection =
function(id){

document.querySelectorAll(".section")
.forEach(section=>{

section.classList.remove("active");

});

document
.getElementById(id)
.classList.add("active");

};

// تغيير نوع الحساب

window.changeRegisterForm =
function(){

let type =
document.getElementById("account_type").value;

document.getElementById("storeForm")
.style.display = "none";

if(type === "store"){

document.getElementById("storeForm")
.style.display = "block";

}

};

// إنشاء حساب متجر

window.registerAccount =
async function(){

let id =
"STORE"+Date.now();

const storeImageFile =
document.getElementById("store_image").files[0];

const storeCardFile =
document.getElementById("store_card").files[0];

if(!storeImageFile || !storeCardFile){

alert("ارفع صور المتجر والبطاقة");

return;

}

if(store_latitude === "" || store_longitude === ""){

alert("حدد موقع المتجر");

return;

}

const storeImageUrl =
await uploadImage(storeImageFile);

const storeCardUrl =
await uploadImage(storeCardFile);

// أوقات الدوام

let workingHours = [

{
day:"الأحد",
from:document.getElementById("from_0").value,
to:document.getElementById("to_0").value
},

{
day:"الاثنين",
from:document.getElementById("from_1").value,
to:document.getElementById("to_1").value
},

{
day:"الثلاثاء",
from:document.getElementById("from_2").value,
to:document.getElementById("to_2").value
},

{
day:"الأربعاء",
from:document.getElementById("from_3").value,
to:document.getElementById("to_3").value
},

{
day:"الخميس",
from:document.getElementById("from_4").value,
to:document.getElementById("to_4").value
},

{
day:"الجمعة",
from:document.getElementById("from_5").value,
to:document.getElementById("to_5").value
},

{
day:"السبت",
from:document.getElementById("from_6").value,
to:document.getElementById("to_6").value
}

];

let storeData = {

id:id,

type:"store",

status:"pending",

owner:
document.getElementById("store_owner").value,

phone:
document.getElementById("store_phone").value,

store_name:
document.getElementById("store_name").value,

category:
document.getElementById("store_category").value,

password:
document.getElementById("store_password").value,

latitude:store_latitude,

longitude:store_longitude,

storeImage:storeImageUrl,

storeCard:storeCardUrl,

workingHours:workingHours,

createdAt:Date.now()

};

await set(
ref(database,"stores/"+storeData.phone),
storeData
);

alert("تم إنشاء الحساب وحفظ أوقات الدوام");

console.log(storeData);

};

</script>

</body>
</html>
