<!DOCTYPE html>
<html lang="ar" dir="rtl">

<head>

<meta charset="UTF-8">

<meta
name="viewport"
content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">

<title>
عالسريع
</title>

<link
rel="stylesheet"
href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css"/>

<link
href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;500;600;700;800&display=swap"
rel="stylesheet">

<style>

*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:'Cairo',sans-serif;
-webkit-tap-highlight-color:transparent;
}

body{
background:
linear-gradient(
135deg,
#fff5ee,
#ffffff
);
min-height:100vh;
overflow-x:hidden;
}

.container{
padding:20px;
max-width:500px;
margin:auto;
}

.logo-box{
padding:40px 20px 20px;
text-align:center;
}

.logo-circle{
width:120px;
height:120px;
margin:auto;
border-radius:35px;
background:
linear-gradient(
135deg,
#ff8800,
#ff5500
);
display:flex;
align-items:center;
justify-content:center;
box-shadow:
0 10px 30px rgba(255,136,0,.25);
margin-bottom:20px;
}

.logo-circle i{
font-size:55px;
color:white;
}

.app-title{
font-size:38px;
font-weight:800;
color:#ff6600;
margin-bottom:10px;
}

.app-desc{
font-size:15px;
line-height:1.9;
color:#666;
}

.card{
background:white;
padding:22px;
border-radius:30px;
box-shadow:
0 10px 35px rgba(0,0,0,.06);
margin-top:20px;
}

.tabs{
display:flex;
gap:10px;
margin-bottom:22px;
}

.tab-btn{
flex:1;
height:52px;
border:none;
border-radius:18px;
font-size:15px;
font-weight:bold;
cursor:pointer;
background:#f2f2f2;
color:#666;
transition:.3s;
}

.tab-btn.active{
background:
linear-gradient(
135deg,
#ff8800,
#ff5500
);
color:white;
}

.form{
display:none;
}

.form.active{
display:block;
}

.input-group{
margin-bottom:18px;
}

.input-group label{
display:block;
margin-bottom:8px;
font-size:14px;
font-weight:bold;
color:#333;
}

.input-box{
position:relative;
}

.input-box i{
position:absolute;
right:18px;
top:50%;
transform:translateY(-50%);
color:#ff8800;
font-size:15px;
}

.input-box input,
.input-box select{
width:100%;
height:58px;
padding:0 50px 0 15px;
border:none;
background:#f8f8f8;
border-radius:18px;
outline:none;
font-size:15px;
}

.submit-btn{
width:100%;
height:58px;
border:none;
border-radius:20px;
background:
linear-gradient(
135deg,
#00b894,
#00a383
);
color:white;
font-size:16px;
font-weight:bold;
cursor:pointer;
margin-top:10px;
}

.loading{
position:fixed;
inset:0;
background:rgba(255,255,255,.9);
display:none;
align-items:center;
justify-content:center;
z-index:99999;
}

.spinner{
width:70px;
height:70px;
border-radius:50%;
border:5px solid #eee;
border-top:5px solid #ff8800;
animation:spin .8s linear infinite;
}

@keyframes spin{

100%{
transform:rotate(360deg);
}

}

.note{
margin-top:20px;
text-align:center;
font-size:13px;
line-height:1.8;
color:#777;
}

</style>

</head>

<body>

<div
class="loading"
id="loading">

<div class="spinner"></div>

</div>

<div class="container">

<div class="logo-box">

<div class="logo-circle">

<i class="fa-solid fa-bolt"></i>

</div>

<div class="app-title">
عالسريع
</div>

<div class="app-desc">

توصيل طلبات وتكسي بسرعة وأمان 🚀

</div>

</div>

<div class="card">

<div class="tabs">

<button
class="tab-btn active"
id="loginTab">

تسجيل الدخول

</button>

<button
class="tab-btn"
id="registerTab">

إنشاء حساب

</button>

</div>

<!-- LOGIN -->

<div
class="form active"
id="loginForm">

<div class="input-group">

<label>
رقم الهاتف
</label>

<div class="input-box">

<i class="fa-solid fa-phone"></i>

<input
type="tel"
id="loginPhone"
placeholder="07xxxxxxxxx">

</div>

</div>

<div class="input-group">

<label>
كلمة المرور
</label>

<div class="input-box">

<i class="fa-solid fa-lock"></i>

<input
type="password"
id="loginPassword"
placeholder="********">

</div>

</div>

<button
class="submit-btn"
onclick="login()">

دخول

</button>

</div>

<!-- REGISTER -->

<div
class="form"
id="registerForm">

<div class="input-group">

<label>
الاسم الكامل
</label>

<div class="input-box">

<i class="fa-solid fa-user"></i>

<input
type="text"
id="registerName"
placeholder="اسمك الكامل">

</div>

</div>

<div class="input-group">

<label>
رقم الهاتف
</label>

<div class="input-box">

<i class="fa-solid fa-phone"></i>

<input
type="tel"
id="registerPhone"
placeholder="07xxxxxxxxx">

</div>

</div>

<div class="input-group">

<label>
كلمة المرور
</label>

<div class="input-box">

<i class="fa-solid fa-lock"></i>

<input
type="password"
id="registerPassword"
placeholder="********">

</div>

</div>

<div class="input-group">

<label>
نوع الحساب
</label>

<div class="input-box">

<i class="fa-solid fa-users"></i>

<select id="registerType">

<option value="customer">
زبون
</option>

<option value="driver">
سائق توصيل
</option>

<option value="taxi">
سائق تكسي
</option>

<option value="store">
متجر
</option>

</select>

</div>

</div>

<div class="input-group">

<label>
العنوان
</label>

<div class="input-box">

<i class="fa-solid fa-location-dot"></i>

<input
type="text"
id="registerAddress"
placeholder="عنوانك">

</div>

</div>

<button
class="submit-btn"
onclick="register()">

إنشاء الحساب

</button>

</div>

<div class="note">

باستمرارك فأنت توافق على شروط الاستخدام وسياسة الخصوصية

</div>

</div>

</div>

<script type="module">

import { db }
from "./firebase.js";

import {
ref,
get,
set
}
from "https://www.gstatic.com/firebasejs/12.13.0/firebase-database.js";

import {
generateId
}
from "./utils.js";

const loginTab =
document.getElementById("loginTab");

const registerTab =
document.getElementById("registerTab");

const loginForm =
document.getElementById("loginForm");

const registerForm =
document.getElementById("registerForm");

loginTab.onclick = ()=>{

loginTab.classList.add("active");
registerTab.classList.remove("active");

loginForm.classList.add("active");
registerForm.classList.remove("active");

};

registerTab.onclick = ()=>{

registerTab.classList.add("active");
loginTab.classList.remove("active");

registerForm.classList.add("active");
loginForm.classList.remove("active");

};

function showLoading(){

document.getElementById(
"loading"
).style.display = "flex";

}

function hideLoading(){

document.getElementById(
"loading"
).style.display = "none";

}

window.register =
async function(){

const name =
document.getElementById(
"registerName"
).value.trim();

const phone =
document.getElementById(
"registerPhone"
).value.trim();

const password =
document.getElementById(
"registerPassword"
).value.trim();

const type =
document.getElementById(
"registerType"
).value;

const address =
document.getElementById(
"registerAddress"
).value.trim();

if(
!name ||
!phone ||
!password
){

alert("املأ جميع الحقول");
return;

}

showLoading();

try{

const usersRef =
ref(db,"users");

const snapshot =
await get(usersRef);

if(snapshot.exists()){

const users =
snapshot.val();

for(let key in users){

if(users[key].phone === phone){

hideLoading();

alert("رقم الهاتف مستخدم");

return;

}

}

}

const userId =
generateId("USER");

navigator.geolocation.getCurrentPosition(

async(position)=>{

const userData = {

id:userId,

name:name,

phone:phone,

password:password,

type:type,

address:address,

status:"active",

createdAt:Date.now(),

latitude:
position.coords.latitude,

longitude:
position.coords.longitude,

image:"",

isOnline:false,

completedOrders:0,

cancelledOrders:0,

totalProfit:0

};

await set(
ref(db,"users/" + userId),
userData
);

localStorage.setItem(
"user",
JSON.stringify(userData)
);

hideLoading();

redirectUser(type);

},

async()=>{

const userData = {

id:userId,

name:name,

phone:phone,

password:password,

type:type,

address:address,

status:"active",

createdAt:Date.now(),

latitude:0,
longitude:0,

image:"",

isOnline:false,

completedOrders:0,

cancelledOrders:0,

totalProfit:0

};

await set(
ref(db,"users/" + userId),
userData
);

localStorage.setItem(
"user",
JSON.stringify(userData)
);

hideLoading();

redirectUser(type);

}

);

}catch(error){

hideLoading();

alert("حدث خطأ");

console.log(error);

}

};

window.login =
async function(){

const phone =
document.getElementById(
"loginPhone"
).value.trim();

const password =
document.getElementById(
"loginPassword"
).value.trim();

if(!phone || !password){

alert("املأ البيانات");

return;

}

showLoading();

try{

const snapshot =
await get(ref(db,"users"));

if(!snapshot.exists()){

hideLoading();

alert("الحساب غير موجود");

return;

}

const users =
snapshot.val();

let foundUser = null;

for(let key in users){

const user = users[key];

if(
user.phone === phone &&
user.password === password
){

foundUser = user;

break;

}

}

hideLoading();

if(!foundUser){

alert("بيانات الدخول غير صحيحة");

return;

}

localStorage.setItem(
"user",
JSON.stringify(foundUser)
);

redirectUser(foundUser.type);

}catch(error){

hideLoading();

alert("حدث خطأ");

console.log(error);

}

};

function redirectUser(type){

if(type === "customer"){

window.location.href =
"home.html";

}

else if(type === "driver"){

window.location.href =
"drive.html";

}

else if(type === "taxi"){

window.location.href =
"w.html";

}

else if(type === "store"){

window.location.href =
"store.html";

}

else{

window.location.href =
"home.html";

}

}

</script>

</body>

</html>
