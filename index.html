// ==========================

// ==========================
// اظهار واخفاء كلمة السر
// ==========================

window.togglePassword = function(id,icon){

let input =
document.getElementById(id);

if(input.type==="password"){

input.type="text";

icon.classList.replace(
"fa-eye",
"fa-eye-slash"
);

}else{

input.type="password";

icon.classList.replace(
"fa-eye-slash",
"fa-eye"
);

}

};



// ==========================
// اظهار الصفحات
// ==========================

window.showSection = function(sectionId){

document
.querySelectorAll(".section")
.forEach(section=>{

section.classList.remove("active");

});

document
.getElementById(sectionId)
.classList.add("active");

};



// ==========================
// تغيير نوع الحساب
// ==========================

window.changeRegisterForm = function(){

let type =
document.getElementById("account_type").value;

document.getElementById("customerForm")
.style.display="none";

document.getElementById("storeForm")
.style.display="none";

document.getElementById("driverForm")
.style.display="none";



// زبون

if(type==="customer"){

document.getElementById("customerForm")
.style.display="block";

setTimeout(()=>{

loadMap();

},300);

}



// متجر

if(type==="store"){

document.getElementById("storeForm")
.style.display="block";

setTimeout(()=>{

loadStoreMap();

},300);

}



// دليفري

if(type==="driver"){

.style.display="block";

};



// ==========================
// خريطة الزبون
// ==========================

function loadMap(){

if(map){

map.remove();

}

map = L.map('map')
.setView([35.4893,43.2275],13);

L.tileLayer(

'https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png',

{

maxZoom:19,
minZoom:6

}

).addTo(map);

setTimeout(()=>{

map.invalidateSize();

},300);

map.on('click',function(e){

latitude = e.latlng.lat;

longitude = e.latlng.lng;

if(marker){

map.removeLayer(marker);

}

marker = L.marker([
latitude,
longitude
]).addTo(map);

});

}



// ==========================
// خريطة المتجر
// ==========================

function loadStoreMap(){

if(storeMap){

storeMap.remove();

}

storeMap = L.map('storeMap')
.setView([35.4893,43.2275],13);

L.tileLayer(

'https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png',

{

maxZoom:19,
minZoom:6

}

).addTo(storeMap);

setTimeout(()=>{

storeMap.invalidateSize();

},300);

storeMap.on('click',function(e){

store_latitude = e.latlng.lat;

store_longitude = e.latlng.lng;

if(storeMarker){

storeMap.removeLayer(storeMarker);

}

storeMarker = L.marker([
store_latitude,
store_longitude
]).addTo(storeMap);

});

}



// ==========================
// حفظ الجلسة
// ==========================

function saveSession(userData){

localStorage.setItem(
"user",
JSON.stringify(userData)
);

}



// ==========================
// تسجيل الدخول
// ==========================

window.login = async function(){

let phone =
document.getElementById("login_phone").value;

let password =
document.getElementById("login_password").value;



if(phone==="" || password===""){

alert("املأ جميع الحقول");

return;

}



try{

// ====================
// الزبائن
// ====================

let customers =
await get(child(
ref(database),
"customers"
));

if(customers.exists()){

let data = customers.val();

for(let key in data){

if(
data[key].phone===phone &&
data[key].password===password
){

saveSession(data[key]);

window.location.href="home.html";

return;

}

}

}



// ====================
// المتاجر
// ====================

let stores =
await get(child(
ref(database),
"stores"
));

if(stores.exists()){

let data = stores.val();

for(let key in data){

if(
data[key].phone===phone &&
data[key].password===password
){

if(data[key].status!=="active"){

alert("الحساب بانتظار موافقة الادمن");

return;

}

saveSession(data[key]);

window.location.href="store.html";

return;

}

}

}



// ====================
// السائقين
// ====================

let drivers =
await get(child(
ref(database),
"drivers"
));

if(drivers.exists()){

let data = drivers.val();

for(let key in data){

if(
data[key].phone===phone &&
data[key].password===password
){

if(data[key].status!=="active"){

alert("الحساب بانتظار موافقة الادمن");

return;

}

saveSession(data[key]);

window.location.href="driver.html";

return;

}

}

}

alert("رقم الهاتف او الرمز السري غير صحيح");

}catch(error){

console.log(error);

alert("حدث خطأ");

}

};



// ==========================
// إنشاء الحساب
// ==========================

window.registerAccount = async function(){

let type =
document.getElementById("account_type").value;



// ====================
// الزبون
// ====================

if(type==="customer"){

let id = "CUS"+Date.now();

let customerData = {

id:id,

name:
document.getElementById("customer_name").value,

phone:
document.getElementById("customer_phone").value,

address:
document.getElementById("customer_address").value,

nearpoint:
document.getElementById("customer_nearpoint").value,

password:
document.getElementById("customer_password").value,

latitude:latitude,

longitude:longitude,

type:"customer",

status:"active",

createdAt:Date.now()

};



await set(
ref(database,'customers/'+id),
customerData
);

saveSession(customerData);

alert("تم إنشاء حساب الزبون");

window.location.href="home.html";

}



// ====================
// المتجر
// ====================

if(type==="store"){

let id = "STORE"+Date.now();

let workTimes = {};

days.forEach((day,index)=>{

workTimes[day]={

from:
document.getElementById(`from_${index}`).value,

to:
document.getElementById(`to_${index}`).value

};

});

let storeData = {

id:id,

owner:
document.getElementById("store_owner").value,

phone:
document.getElementById("store_phone").value,

store_name:
document.getElementById("store_name").value,

category:
document.getElementById("store_category").value,

password:
document.getElementById("store_password").value,

latitude:store_latitude,

longitude:store_longitude,

workTimes:workTimes,

type:"store",

status:"pending",

createdAt:Date.now()

};



await set(
ref(database,'stores/'+id),
storeData
);

saveSession(storeData);

showSection("pendingSection");

}



// ====================
// الدليفري
// ====================

if(type==="driver"){

let id = "DRV"+Date.now();

let driverData = {

id:id,

name:
document.getElementById("driver_name").value,

phone:
document.getElementById("driver_phone").value,

vehicle:
document.getElementById("driver_vehicle").value,

password:
document.getElementById("driver_password").value,

type:"driver",

status:"pending",

createdAt:Date.now()

};



await set(
ref(database,'drivers/'+id),
driverData
);

saveSession(driverData);

showSection("pendingSection");

}

};



// ==========================
// تحديث موقع السائق live

window.updateDriverLocation =
async function(driverId,lat,lng){

await update(
ref(database,
"driversLocations/"+driverId),
{

latitude:lat,

longitude:lng,

updatedAt:Date.now()

}

};
