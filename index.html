<!-- ========================= -->
<!-- index.html -->
<!-- ========================= -->

<!DOCTYPE html>
<html lang="ar" dir="rtl">

<head>

<meta charset="UTF-8">

<meta name="viewport"
content="width=device-width, initial-scale=1.0">

<title>عالسريع</title>

<link rel="icon" href="Logo.png">

<link rel="stylesheet"
href="style.css">

<link rel="stylesheet"
href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css"/>

<link rel="stylesheet"
href="https://unpkg.com/leaflet/dist/leaflet.css"/>

<script src="https://unpkg.com/leaflet/dist/leaflet.js"></script>

<link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;500;600;700&display=swap"
rel="stylesheet">

</head>

<body>

<div class="container">

<!-- LOGIN -->

<div id="loginSection"
class="card section active">

<div class="logo">

<img src="Logo.png">

</div>

<h2 class="title">

تسجيل الدخول

</h2>

<input
type="text"
id="login_phone"
placeholder="رقم الهاتف">

<div class="password-box">

<input
type="password"
id="login_password"
placeholder="الرمز السري">

<i class="fa-solid fa-eye"
onclick="togglePassword('login_password',this)">
</i>

</div>

<button onclick="login()">

تسجيل الدخول

</button>

<div class="link">

<a onclick="showSection('registerSection')">

إنشاء حساب

</a>

</div>

</div>

<!-- REGISTER -->

<div id="registerSection"
class="card section">

<div class="logo">

<img src="Logo.png">

</div>

<h2 class="title">

إنشاء حساب

</h2>

<select
id="account_type"
onchange="changeRegisterForm()">

<option value="">

اختر نوع الحساب

</option>

<option value="customer">

زبون

</option>

<option value="store">

متجر

</option>

<option value="driver">

سائق توصيل

</option>

</select>

<!-- CUSTOMER -->

<div id="customerForm"
style="display:none;">

<input type="text"
id="customer_name"
placeholder="الاسم الكامل">

<input type="text"
id="customer_phone"
placeholder="رقم الهاتف">

<input type="text"
id="customer_address"
placeholder="العنوان">

<input type="text"
id="customer_nearpoint"
placeholder="اقرب نقطة دالة">

<div class="password-box">

<input type="password"
id="customer_password"
placeholder="الرمز السري">

<i class="fa-solid fa-eye"
onclick="togglePassword('customer_password',this)">
</i>

</div>

<p class="map-title">

حدد موقعك

</p>

<div id="map"
class="map-box"></div>

</div>

<!-- STORE -->

<div id="storeForm"
style="display:none;">

<input type="text"
id="store_owner"
placeholder="اسم صاحب المتجر">

<input type="text"
id="store_phone"
placeholder="رقم الهاتف">

<input type="text"
id="store_name"
placeholder="اسم المتجر">

<select id="store_category">

<option value="">
نوع المتجر
</option>

<option>مطعم</option>
<option>ماركت</option>
<option>صيدلية</option>

</select>

<div class="password-box">

<input type="password"
id="store_password"
placeholder="الرمز السري">

<i class="fa-solid fa-eye"
onclick="togglePassword('store_password',this)">
</i>

</div>

<p class="map-title">

حدد موقع المتجر

</p>

<div id="storeMap"
class="map-box"></div>

</div>

<!-- DRIVER -->

<div id="driverForm"
style="display:none;">

<input type="text"
id="driver_name"
placeholder="الاسم الكامل">

<input type="text"
id="driver_phone"
placeholder="رقم الهاتف">

<select id="driver_vehicle">

<option>دراجة</option>

<option>سيارة</option>

</select>

<div class="password-box">

<input type="password"
id="driver_password"
placeholder="الرمز السري">

<i class="fa-solid fa-eye"
onclick="togglePassword('driver_password',this)">
</i>

</div>

</div>

<button onclick="registerAccount()">

إنشاء الحساب

</button>

<div class="link">

<a onclick="showSection('loginSection')">

تسجيل الدخول

</a>

</div>

</div>

<!-- PENDING -->

<div id="pendingSection"
class="card section">

<div class="logo">

<img src="Logo.png">

</div>

<h2 class="title">

تم استلام طلبك

</h2>

<p class="pending-text">

انتظر موافقة الادمن

</p>

</div>

</div>

<script type="module">

// ==========================
// FIREBASE IMPORTS
// ==========================

import { initializeApp }
from
"https://www.gstatic.com/firebasejs/12.13.0/firebase-app.js";

import {

getDatabase,
ref,
set,
get,
child,
update

}
from
"https://www.gstatic.com/firebasejs/12.13.0/firebase-database.js";

import {

getAuth,
RecaptchaVerifier,
signInWithPhoneNumber,
signOut

}
from
"https://www.gstatic.com/firebasejs/12.13.0/firebase-auth.js";



// ==========================
// FIREBASE CONFIG
// ==========================

const firebaseConfig = {

apiKey: "AIzaSyC7QzQTYMSGRV_nraJBneBqDqYGhugF0Pw",

authDomain: "fast-937c9.firebaseapp.com",

projectId: "fast-937c9",

storageBucket: "fast-937c9.firebasestorage.app",

messagingSenderId: "221388561840",

appId: "1:221388561840:web:ec9d75183ddd7d44be0a75",

measurementId: "G-CEKHEPNR9X",

databaseURL:
"https://fast-937c9-default-rtdb.europe-west1.firebasedatabase.app"

};



// ==========================
// START FIREBASE
// ==========================

const app =
initializeApp(firebaseConfig);

const database =
getDatabase(app);

const auth =
getAuth(app);



// ==========================
// SAVE SESSION
// ==========================

function saveSession(userData){

localStorage.setItem(
"user",
JSON.stringify(userData)
);

}



// ==========================
// LOGOUT
// ==========================

window.logout =
async function(){

localStorage.removeItem(
"user"
);

await signOut(auth);

window.location.href =
"index.html";

};



// ==========================
// PASSWORD SHOW
// ==========================

window.togglePassword =
function(id,icon){

let input =
document.getElementById(id);

if(input.type==="password"){

input.type="text";

icon.classList.replace(
"fa-eye",
"fa-eye-slash"
);

}else{

input.type="password";

icon.classList.replace(
"fa-eye-slash",
"fa-eye"
);

}

};



// ==========================
// SHOW SECTION
// ==========================

window.showSection =
function(sectionId){

document
.querySelectorAll(".section")
.forEach(section=>{

section.classList.remove("active");

});

document
.getElementById(sectionId)
.classList.add("active");

};



// ==========================
// CHANGE FORM
// ==========================

window.changeRegisterForm =
function(){

let type =
document.getElementById(
"account_type"
).value;

document.getElementById(
"customerForm"
).style.display="none";

document.getElementById(
"storeForm"
).style.display="none";

document.getElementById(
"driverForm"
).style.display="none";

if(type==="customer"){

document.getElementById(
"customerForm"
).style.display="block";

setTimeout(loadMap,300);

}

if(type==="store"){

document.getElementById(
"storeForm"
).style.display="block";

setTimeout(loadStoreMap,300);

}

if(type==="driver"){

document.getElementById(
"driverForm"
).style.display="block";

}

};



// ==========================
// MAPS
// ==========================

let map;
let marker;
let latitude="";
let longitude="";

let storeMap;
let storeMarker;
let store_latitude="";
let store_longitude="";



// ==========================
// CUSTOMER MAP
// ==========================

function loadMap(){

if(map){

map.remove();

}

map = L.map('map')
.setView([33.3152,44.3661],13);

L.tileLayer(
'https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png'
).addTo(map);

map.on('click',function(e){

latitude=e.latlng.lat;

longitude=e.latlng.lng;

if(marker){

map.removeLayer(marker);

}

marker =
L.marker([
latitude,
longitude
]).addTo(map);

});

}



// ==========================
// STORE MAP
// ==========================

function loadStoreMap(){

if(storeMap){

storeMap.remove();

}

storeMap = L.map('storeMap')
.setView([33.3152,44.3661],13);

L.tileLayer(
'https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png'
).addTo(storeMap);

storeMap.on('click',function(e){

store_latitude=e.latlng.lat;

store_longitude=e.latlng.lng;

if(storeMarker){

storeMap.removeLayer(storeMarker);

}

storeMarker =
L.marker([
store_latitude,
store_longitude
]).addTo(storeMap);

});

}



// ==========================
// RECAPTCHA
// ==========================

window.recaptchaVerifier =
new RecaptchaVerifier(

auth,

"loginSection",

{

size:"invisible"

}

);



// ==========================
// LOGIN
// ==========================

window.login =
async function(){

let phone =
document.getElementById(
"login_phone"
).value.trim();

let password =
document.getElementById(
"login_password"
).value.trim();

if(phone==="" || password===""){

alert("املأ جميع الحقول");

return;

}

if(!phone.startsWith("+964")){

phone =
"+964"+phone.replace(/^0/,"");

}

try{

const confirmationResult =
await signInWithPhoneNumber(

auth,
phone,
window.recaptchaVerifier

);

let code =
prompt("ادخل رمز التحقق");

if(!code){

return;

}

const result =
await confirmationResult.confirm(code);

const user =
result.user;



// ADMIN

if(user.phoneNumber ===
"+9647700000000"){

let adminData = {

name:"Admin",

phone:user.phoneNumber,

type:"admin"

};

saveSession(adminData);

window.location.href =
"add.html";

return;

}



// CUSTOMERS

let customers =
await get(
child(ref(database),
"customers")
);

if(customers.exists()){

let data =
customers.val();

for(let key in data){

if(

data[key].phone===phone &&
data[key].password===password

){

saveSession(data[key]);

window.location.href =
"home.html";

return;

}

}

}



// STORES

let stores =
await get(
child(ref(database),
"stores")
);

if(stores.exists()){

let data =
stores.val();

for(let key in data){

if(

data[key].phone===phone &&
data[key].password===password

){

if(data[key].status!=="active"){

alert(
"حساب المتجر بانتظار الموافقة"
);

return;

}

saveSession(data[key]);

window.location.href =
"sala.html";

return;

}

}

}



// DRIVERS

let drivers =
await get(
child(ref(database),
"drivers")
);

if(drivers.exists()){

let data =
drivers.val();

for(let key in data){

if(

data[key].phone===phone &&
data[key].password===password

){

if(data[key].status!=="active"){

alert(
"حساب السائق بانتظار الموافقة"
);

return;

}

saveSession(data[key]);

window.location.href =
"drive.html";

return;

}

}

}

alert("الحساب غير موجود");

}catch(error){

console.log(error);

alert(error.message);

}

};



// ==========================
// REGISTER
// ==========================

window.registerAccount =
async function(){

let type =
document.getElementById(
"account_type"
).value;



// CUSTOMER

if(type==="customer"){

let id =
"CUS"+Date.now();

let customerData = {

id:id,

name:
document.getElementById(
"customer_name"
).value,

phone:
"+964"+
document.getElementById(
"customer_phone"
).value.replace(/^0/,""),

address:
document.getElementById(
"customer_address"
).value,

nearpoint:
document.getElementById(
"customer_nearpoint"
).value,

password:
document.getElementById(
"customer_password"
).value,

latitude:latitude,

longitude:longitude,

type:"customer",

status:"active",

createdAt:Date.now()

};

await set(
ref(database,
'customers/'+id),
customerData
);

saveSession(customerData);

window.location.href =
"home.html";

}



// STORE

if(type==="store"){

let id =
"STORE"+Date.now();

let storeData = {

id:id,

owner:
document.getElementById(
"store_owner"
).value,

phone:
"+964"+
document.getElementById(
"store_phone"
).value.replace(/^0/,""),

store_name:
document.getElementById(
"store_name"
).value,

category:
document.getElementById(
"store_category"
).value,

password:
document.getElementById(
"store_password"
).value,

latitude:store_latitude,

longitude:store_longitude,

type:"store",

status:"pending",

createdAt:Date.now()

};

await set(
ref(database,
'stores/'+id),
storeData
);

showSection(
"pendingSection"
);

}



// DRIVER

if(type==="driver"){

let id =
"DRV"+Date.now();

let driverData = {

id:id,

name:
document.getElementById(
"driver_name"
).value,

phone:
"+964"+
document.getElementById(
"driver_phone"
).value.replace(/^0/,""),

vehicle:
document.getElementById(
"driver_vehicle"
).value,

password:
document.getElementById(
"driver_password"
).value,

type:"driver",

status:"pending",

createdAt:Date.now()

};

await set(
ref(database,
'drivers/'+id),
driverData
);

showSection(
"pendingSection"
);

}

};



// ==========================
// UPDATE DRIVER LOCATION
// ==========================

window.updateDriverLocation =
async function(driverId,lat,lng){

await update(

ref(
database,
"driversLocations/"+driverId
),

{

latitude:lat,

longitude:lng,

updatedAt:Date.now()

}

);

};

</script>

</body>

</html>
