<script>



let map;

let marker;

let latitude = "";

let longitude = "";




// تشغيل الخريطة

function loadMap(){


map = L.map('map').setView([33.3152,44.3661], 12);


L.tileLayer(

'https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png',

{

maxZoom:19

}).addTo(map);




map.on('click', function(e){


latitude = e.latlng.lat;

longitude = e.latlng.lng;




if(marker){

map.removeLayer(marker);

}




marker = L.marker([latitude, longitude]).addTo(map);

});

}







// تبديل الصفحات

function showSection(sectionId){


let sections = document.querySelectorAll('.section');


sections.forEach(section => {

section.classList.remove('active');

});


document
.getElementById(sectionId)
.classList.add('active');

}








// تغيير نوع الحساب

function changeRegisterForm(){


let type = document
.getElementById("account_type")
.value;



document.getElementById("customerForm").style.display = "none";

document.getElementById("storeForm").style.display = "none";




if(type == "customer"){


document.getElementById("customerForm").style.display = "block";


setTimeout(function(){

loadMap();

},500);

}




if(type == "store"){


document.getElementById("storeForm").style.display = "block";

}

}









// إنشاء الحساب

function registerAccount(){



let type = document
.getElementById("account_type")
.value;







// تسجيل الزبون

if(type == "customer"){



let name = document
.getElementById("customer_name")
.value;



let phone = document
.getElementById("customer_phone")
.value;



let address = document
.getElementById("customer_address")
.value;



let nearpoint = document
.getElementById("customer_nearpoint")
.value;



let password = document
.getElementById("customer_password")
.value;






if(

name == "" ||

phone == "" ||

address == "" ||

nearpoint == "" ||

password == "" ||

latitude == ""

){

alert(

"⚠️ املأ جميع الحقول للتمتع باستخدام التوصيل السريع"

);

return;

}






let data = {


name:name,

phone:phone,

address:address,

nearpoint:nearpoint,

password:password,

latitude:latitude,

longitude:longitude

}






google.script.run

.withSuccessHandler(function(res){


alert(res);



window.location.href = "home-store.html";

})

.registerCustomer(data);

}









// تسجيل المتجر

if(type == "store"){



let owner = document
.getElementById("store_owner")
.value;



let phone = document
.getElementById("store_phone")
.value;



let storeName = document
.getElementById("store_name")
.value;



let category = document
.getElementById("store_category")
.value;



let password = document
.getElementById("store_password")
.value;






if(

owner == "" ||

phone == "" ||

storeName == "" ||

password == ""

){

alert(

"⚠️ املأ جميع الحقول للتمتع باستخدام التوصيل السريع"

);

return;

}







let data = {


owner:owner,

phone:phone,

store_name:storeName,

category:category,

password:password

}






google.script.run

.withSuccessHandler(function(res){


alert(

"تم إرسال طلب إضافة المتجر بنجاح"

);


showSection('loginSection');

})

.registerStore(data);

}

}









// تسجيل الدخول

function login(){



let phone = document
.getElementById("login_phone")
.value;



let password = document
.getElementById("login_password")
.value;






if(phone == "" || password == ""){

alert(

"⚠️ يرجى إدخال رقم الهاتف وكلمة المرور"

);

return;

}







let data = {


phone:phone,

password:password

}






google.script.run

.withSuccessHandler(function(res){



if(res.success){



localStorage.setItem(

"user",

JSON.stringify(res)

);



window.location.href = "home-store.html";



}else{


alert(

"رقم الهاتف او كلمة المرور غير صحيحة"

);

}

})

.checkLogin(data);

}



</script>
