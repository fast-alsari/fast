<!DOCTYPE html>
<html lang="ar" dir="rtl">

<head>

<meta charset="UTF-8">

<meta http-equiv="X-UA-Compatible" content="IE=edge">

<meta name="viewport" content="width=device-width, initial-scale=1.0">

<meta name="theme-color" content="#ffffff">

<meta name="mobile-web-app-capable" content="yes">

<title>عالسريع</title>

<link rel="icon" href="Logo.png">

<link rel="apple-touch-icon" href="Logo.png">

<meta name="apple-mobile-web-app-capable" content="yes">

<meta name="apple-mobile-web-app-status-bar-style" content="default">

<link rel="preconnect" href="https://fonts.googleapis.com">

<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>

<link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;500;600;700&display=swap" rel="stylesheet">

<link rel="stylesheet" href="style.css">

<link rel="stylesheet"
href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css"/>

<style>

*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:'Cairo',sans-serif;
}

body{
background:#f5f5f5;
padding:20px;
}

.container{
max-width:450px;
margin:auto;
}

.card{
background:#fff;
padding:25px;
border-radius:20px;
box-shadow:0 5px 20px rgba(0,0,0,0.08);
display:none;
}

.section.active{
display:block;
}

.logo{
text-align:center;
margin-bottom:20px;
}

.logo img{
width:110px;
height:110px;
object-fit:contain;
}

.title{
text-align:center;
margin-bottom:20px;
font-size:24px;
font-weight:700;
}

.app-text{
text-align:center;
margin-bottom:20px;
color:#666;
}

input,
select{
width:100%;
height:52px;
border:none;
background:#f2f2f2;
border-radius:14px;
padding:0 15px;
margin-bottom:15px;
font-size:15px;
outline:none;
}

.password-box{
position:relative;
}

.password-box i{
position:absolute;
left:15px;
top:18px;
cursor:pointer;
color:#666;
}

button{
width:100%;
height:52px;
border:none;
border-radius:14px;
background:#000;
color:#fff;
font-size:16px;
font-weight:700;
cursor:pointer;
transition:0.3s;
}

button:hover{
opacity:0.9;
}

.link{
text-align:center;
margin-top:15px;
}

.link a{
cursor:pointer;
color:#000;
font-weight:700;
}

.upload-title{
margin-bottom:10px;
font-weight:700;
}

.pending-icon{
font-size:70px;
text-align:center;
margin-bottom:20px;
color:#ff9800;
}

.pending-text{
text-align:center;
line-height:2;
color:#555;
}

.whatsapp-link{
display:block;
margin-top:20px;
text-align:center;
background:#25D366;
color:#fff;
padding:14px;
border-radius:12px;
text-decoration:none;
font-weight:700;
}

#toast{
position:fixed;
bottom:20px;
right:20px;
background:#000;
color:#fff;
padding:14px 20px;
border-radius:12px;
opacity:0;
pointer-events:none;
transition:0.3s;
z-index:9999;
}

#toast.show{
opacity:1;
}

</style>

</head>

<body>

<div class="container">

<!-- تسجيل الدخول -->

<div id="loginSection" class="card section active">

<div class="logo">
<img src="Logo.png">
</div>

<p class="app-text">
نوصلك طلبك بأقل من ساعة 🚀
</p>

<h2 class="title">
تسجيل الدخول
</h2>

<input
type="tel"
id="login_phone"
placeholder="رقم الهاتف">

<div class="password-box">

<input
type="password"
id="login_password"
placeholder="الرمز السري">

<i class="fa-solid fa-eye"
onclick="togglePassword('login_password',this)">
</i>

</div>

<button onclick="login()">
تسجيل الدخول
</button>

<div class="link">

<a onclick="showSection('registerSection')">
إنشاء حساب
</a>

</div>

</div>

<!-- إنشاء حساب -->

<div id="registerSection" class="card section">

<div class="logo">
<img src="Logo.png">
</div>

<h2 class="title">
إنشاء حساب
</h2>

<select
id="account_type"
onchange="changeRegisterForm()">

<option value="">
اختر نوع الحساب
</option>

<option value="customer">
زبون
</option>

<option value="store">
متجر
</option>

<option value="driver">
سائق توصيل
</option>

<option value="taxi">
تكسي
</option>

</select>

<!-- الزبون -->

<div id="customerForm" style="display:none;">

<input
type="text"
id="customer_name"
placeholder="الاسم الكامل">

<input
type="tel"
id="customer_phone"
placeholder="رقم الهاتف واتساب">

<div class="password-box">

<input
type="password"
id="customer_password"
placeholder="الرمز السري">

<i class="fa-solid fa-eye"
onclick="togglePassword('customer_password',this)">
</i>

</div>

</div>

<!-- المتجر -->

<div id="storeForm" style="display:none;">

<input
type="text"
id="store_owner"
placeholder="الاسم الكامل">

<input
type="tel"
id="store_phone"
placeholder="رقم الهاتف واتساب">

<input
type="text"
id="store_name"
placeholder="اسم المتجر">

<select id="store_category">

<option value="">
نوع المتجر
</option>

<option>مطعم</option>
<option>ماركت</option>
<option>صيدلية</option>
<option>الكترونيات</option>
<option>ملابس</option>

</select>

<div class="password-box">

<input
type="password"
id="store_password"
placeholder="الرمز السري">

<i class="fa-solid fa-eye"
onclick="togglePassword('store_password',this)">
</i>

</div>

<p class="upload-title">
صورة المتجر
</p>

<input
type="file"
id="store_image"
accept="image/*">

<p class="upload-title">
صورة البطاقة الموحدة
</p>

<input
type="file"
id="store_card"
accept="image/*">

</div>

<!-- سائق التوصيل -->

<div id="driverForm" style="display:none;">

<input
type="text"
id="driver_name"
placeholder="الاسم الكامل">

<input
type="tel"
id="driver_phone"
placeholder="رقم الهاتف واتساب">

<select id="driver_vehicle">

<option>
دراجة
</option>

<option>
سيارة
</option>

</select>

<div class="password-box">

<input
type="password"
id="driver_password"
placeholder="الرمز السري">

<i class="fa-solid fa-eye"
onclick="togglePassword('driver_password',this)">
</i>

</div>

<p class="upload-title">
صورة الهوية
</p>

<input
type="file"
id="driver_card"
accept="image/*">

<p class="upload-title">
صورة السيارة او الدراجة
</p>

<input
type="file"
id="driver_vehicle_image"
accept="image/*">

</div>

<!-- التكسي -->

<div id="taxiForm" style="display:none;">

<input
type="text"
id="taxi_name"
placeholder="اسم السائق الكامل">

<select id="taxi_vehicle">

<option value="">
نوع المركبة
</option>

<option>
سيارة
</option>

<option>
دراجة
</option>

</select>

<input
type="text"
id="taxi_plate"
placeholder="رقم المركبة الكامل">

<select id="taxi_color">

<option value="">
لون المركبة
</option>

<option>ابيض</option>
<option>اسود</option>
<option>احمر</option>
<option>ازرق</option>
<option>فضي</option>
<option>رمادي</option>

</select>

<input
type="tel"
id="taxi_phone"
placeholder="رقم الهاتف واتساب">

<div class="password-box">

<input
type="password"
id="taxi_password"
placeholder="الرمز السري">

<i class="fa-solid fa-eye"
onclick="togglePassword('taxi_password',this)">
</i>

</div>

<p class="upload-title">
صورة الهوية
</p>

<input
type="file"
id="taxi_card"
accept="image/*">

<p class="upload-title">
صورة السيارة من الأمام
</p>

<input
type="file"
id="taxi_vehicle_image"
accept="image/*">

</div>

<button onclick="registerAccount()">
إنشاء الحساب
</button>

<div class="link">

<a onclick="showSection('loginSection')">
العودة لتسجيل الدخول
</a>

</div>

</div>

<!-- صفحة الانتظار -->

<div id="pendingSection" class="card section">

<div class="logo">
<img src="Logo.png">
</div>

<div class="pending-icon">
<i class="fa-solid fa-clock"></i>
</div>

<h2 class="title">
حالة الحساب
</h2>

<p
class="pending-text"
id="pendingMessage">

انتظر الموافقة على الحساب

</p>

<a
href="https://wa.me/9647851521585"
class="whatsapp-link">

تواصل معنا عبر واتساب

</a>

</div>

</div>

<div id="toast"></div>

<script type="module">

import { initializeApp }
from
"https://www.gstatic.com/firebasejs/12.13.0/firebase-app.js";

import {
getDatabase,
ref,
set,
get,
child
}
from
"https://www.gstatic.com/firebasejs/12.13.0/firebase-database.js";

const firebaseConfig = {

apiKey: "YOUR_API_KEY",

authDomain: "YOUR_AUTH_DOMAIN",

projectId: "YOUR_PROJECT_ID",

storageBucket: "YOUR_STORAGE_BUCKET",

messagingSenderId: "YOUR_MESSAGING_ID",

appId: "YOUR_APP_ID",

databaseURL: "YOUR_DATABASE_URL"

};

const app = initializeApp(firebaseConfig);

const database = getDatabase(app);

const IMGBB_API_KEY =
"YOUR_IMGBB_API_KEY";

function showToast(message){

const toast =
document.getElementById("toast");

toast.innerText = message;

toast.classList.add("show");

setTimeout(()=>{

toast.classList.remove("show");

},3000);

}

async function uploadImage(file){

try{

if(!file){

return "";

}

const formData = new FormData();

formData.append("image",file);

const response = await fetch(

`https://api.imgbb.com/1/upload?key=${IMGBB_API_KEY}`,

{
method:"POST",
body:formData
}

);

const data = await response.json();

if(data.success){

return data.data.url;

}else{

showToast("فشل رفع الصورة");

return "";

}

}catch(error){

console.log(error);

showToast("حدث خطأ أثناء رفع الصورة");

return "";

}

}

function saveSession(userData){

localStorage.setItem(
"user",
JSON.stringify(userData)
);

}

const currentUser =
JSON.parse(localStorage.getItem("user"));

if(currentUser){

if(currentUser.type==="customer"){
window.location.href="home.html";
}

if(currentUser.type==="store"){
window.location.href="store.html";
}

if(currentUser.type==="driver"){
window.location.href="drive.html";
}

if(currentUser.type==="taxi"){
window.location.href="tixe.html";
}

if(currentUser.type==="admin"){
window.location.href="add.html";
}

}

window.showSection = function(id){

document.querySelectorAll(".section")
.forEach(section=>{

section.classList.remove("active");

});

document
.getElementById(id)
.classList.add("active");

};

window.togglePassword = function(id,icon){

let input =
document.getElementById(id);

if(input.type==="password"){

input.type="text";

icon.classList.replace(
"fa-eye",
"fa-eye-slash"
);

}else{

input.type="password";

icon.classList.replace(
"fa-eye-slash",
"fa-eye"
);

}

};

window.changeRegisterForm = function(){

document.getElementById("customerForm")
.style.display="none";

document.getElementById("storeForm")
.style.display="none";

document.getElementById("driverForm")
.style.display="none";

document.getElementById("taxiForm")
.style.display="none";

let type =
document.getElementById("account_type").value;

if(type==="customer"){

document.getElementById("customerForm")
.style.display="block";

}

if(type==="store"){

document.getElementById("storeForm")
.style.display="block";

}

if(type==="driver"){

document.getElementById("driverForm")
.style.display="block";

}

if(type==="taxi"){

document.getElementById("taxiForm")
.style.display="block";

}

};

async function phoneExists(phone){

const tables = [
"customers",
"stores",
"drivers",
"taxis",
"admins"
];

for(let table of tables){

const snapshot = await get(
child(ref(database),table)
);

if(snapshot.exists()){

const data = snapshot.val();

for(let key in data){

if(data[key].phone === phone){

return true;

}

}

}

}

return false;

}

function checkAccountStatus(user){

if(user.status==="pending"){

document.getElementById("pendingMessage")
.innerHTML =
"انتظر الموافقة على طلبك";

showSection("pendingSection");

return false;

}

if(user.status==="expired"){

document.getElementById("pendingMessage")
.innerHTML =
"انتهت صلاحية حسابك";

showSection("pendingSection");

return false;

}

if(user.status==="banned"){

document.getElementById("pendingMessage")
.innerHTML =
"حسابك محظور";

showSection("pendingSection");

return false;

}

if(user.status==="disabled"){

document.getElementById("pendingMessage")
.innerHTML =
"حسابك متوقف";

showSection("pendingSection");

return false;

}

return true;

}

window.registerAccount =
async function(){

let type =
document.getElementById("account_type").value;

if(type==="customer"){

let phone =
document.getElementById("customer_phone").value;

if(await phoneExists(phone)){

showToast("رقم الهاتف مستخدم مسبقاً");

return;

}

let user = {

id:phone,
type:"customer",
status:"active",

name:
document.getElementById("customer_name").value,

phone:phone,

password:
document.getElementById("customer_password").value,

createdAt:Date.now()

};

await set(
ref(database,"customers/"+phone),
user
);

saveSession(user);

window.location.href="home.html";

}

if(type==="store"){

let phone =
document.getElementById("store_phone").value;

if(await phoneExists(phone)){

showToast("رقم الهاتف مستخدم مسبقاً");

return;

}

const image =
await uploadImage(
document.getElementById("store_image").files[0]
);

const card =
await uploadImage(
document.getElementById("store_card").files[0]
);

let user = {

id:phone,
type:"store",
status:"pending",

owner:
document.getElementById("store_owner").value,

phone:phone,

store_name:
document.getElementById("store_name").value,

category:
document.getElementById("store_category").value,

password:
document.getElementById("store_password").value,

image:image,
card:card,

createdAt:Date.now()

};

await set(
ref(database,"stores/"+phone),
user
);

saveSession(user);

showSection("pendingSection");

}

if(type==="driver"){

let phone =
document.getElementById("driver_phone").value;

if(await phoneExists(phone)){

showToast("رقم الهاتف مستخدم مسبقاً");

return;

}

const card =
await uploadImage(
document.getElementById("driver_card").files[0]
);

const vehicle =
await uploadImage(
document.getElementById("driver_vehicle_image").files[0]
);

let user = {

id:phone,
type:"driver",
status:"pending",

name:
document.getElementById("driver_name").value,

phone:phone,

vehicle:
document.getElementById("driver_vehicle").value,

password:
document.getElementById("driver_password").value,

card:card,
vehicle_image:vehicle,

createdAt:Date.now()

};

await set(
ref(database,"drivers/"+phone),
user
);

saveSession(user);

showSection("pendingSection");

}

if(type==="taxi"){

let phone =
document.getElementById("taxi_phone").value;

if(await phoneExists(phone)){

showToast("رقم الهاتف مستخدم مسبقاً");

return;

}

const card =
await uploadImage(
document.getElementById("taxi_card").files[0]
);

const vehicle =
await uploadImage(
document.getElementById("taxi_vehicle_image").files[0]
);

let user = {

id:phone,
type:"taxi",
status:"pending",

name:
document.getElementById("taxi_name").value,

vehicle:
document.getElementById("taxi_vehicle").value,

plate:
document.getElementById("taxi_plate").value,

color:
document.getElementById("taxi_color").value,

phone:phone,

password:
document.getElementById("taxi_password").value,

card:card,

vehicle_image:vehicle,

createdAt:Date.now()

};

await set(
ref(database,"taxis/"+phone),
user
);

saveSession(user);

showSection("pendingSection");

}

};

window.login =
async function(){

let phone =
document.getElementById("login_phone").value;

let password =
document.getElementById("login_password").value;

const tables = [

{
name:"admins",
page:"add.html"
},

{
name:"customers",
page:"home.html"
},

{
name:"stores",
page:"store.html"
},

{
name:"drivers",
page:"drive.html"
},

{
name:"taxis",
page:"tixe.html"
}

];

for(let table of tables){

const snapshot =
await get(
ref(database,
`${table.name}/${phone}`)
);

if(snapshot.exists()){

let user = snapshot.val();

if(user.password === password){

if(!checkAccountStatus(user)){
return;
}

saveSession(user);

window.location.href =
table.page;

return;

}

}

}

showToast("بيانات تسجيل الدخول غير صحيحة");

};

window.logout = function(){

localStorage.removeItem("user");

window.location.href="index.html";

};

</script>

</body>
</html>
