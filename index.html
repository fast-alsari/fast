<!DOCTYPE html>
<html lang="ar" dir="rtl">

<head>

<meta charset="UTF-8">

<meta name="viewport"
content="width=device-width, initial-scale=1.0">

<title>عالسريع</title>

<link rel="icon" href="Logo.png">

<link rel="apple-touch-icon" href="Logo.png">

<meta name="theme-color" content="#000000">

<meta name="apple-mobile-web-app-capable" content="yes">

<meta name="mobile-web-app-capable" content="yes">

<link rel="preconnect"
href="https://fonts.googleapis.com">

<link rel="preconnect"
href="https://fonts.gstatic.com"
crossorigin>

<link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;500;600;700&display=swap"
rel="stylesheet">

<link rel="stylesheet"
href="indx.css">

<link rel="stylesheet"
href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css"/>

<link rel="stylesheet"
href="https://unpkg.com/leaflet/dist/leaflet.css"/>

<script src="https://unpkg.com/leaflet/dist/leaflet.js"></script>

</head>

<body>

<div class="container">

<!-- تسجيل الدخول -->

<div id="loginSection"
class="card section active">

<div class="logo">
<img src="Logo.png">
</div>

<p class="app-text">
نوصلك طلبك بأقل من ساعة 🚀
</p>

<h2 class="title">
تسجيل الدخول
</h2>

<input
type="text"
id="login_phone"
placeholder="رقم الهاتف واتساب">

<div class="password-box">

<input
type="password"
id="login_password"
placeholder="الرمز السري">

<i class="fa-solid fa-eye"
onclick="togglePassword('login_password',this)">
</i>

</div>

<button onclick="login()">
تسجيل الدخول
</button>

<div class="link">

<a onclick="showSection('registerSection')">
إنشاء حساب
</a>

</div>

</div>

<!-- إنشاء حساب -->

<div id="registerSection"
class="card section">

<div class="logo">
<img src="Logo.png">
</div>

<h2 class="title">
إنشاء حساب
</h2>

<select
id="account_type"
onchange="changeRegisterForm()">

<option value="">
اختر نوع الحساب
</option>

<option value="customer">
زبون
</option>

<option value="store">
متجر
</option>

<option value="driver">
سائق توصيل
</option>

<option value="taxi">
تكسي
</option>

</select>

<!-- الزبون -->

<div id="customerForm"
style="display:none;">

<input
type="text"
id="customer_name"
placeholder="الاسم الكامل">

<input
type="text"
id="customer_phone"
placeholder="رقم الهاتف واتساب">

<div class="password-box">

<input
type="password"
id="customer_password"
placeholder="الرمز السري">

<i class="fa-solid fa-eye"
onclick="togglePassword('customer_password',this)">
</i>

</div>

</div>

<!-- المتجر -->

<div id="storeForm"
style="display:none;">

<input
type="text"
id="store_owner"
placeholder="الاسم الكامل">

<input
type="text"
id="store_phone"
placeholder="رقم الهاتف واتساب">

<input
type="text"
id="store_name"
placeholder="اسم المتجر">

<select id="store_category">

<option value="">
اختر نوع المتجر
</option>

<option>مطعم</option>
<option>مخبز</option>
<option>ماركت</option>
<option>خضروات</option>
<option>مواد انشائية</option>
<option>أدوات احتياطية</option>
<option>ملابس</option>
<option>صيدلية</option>
<option>الكترونيات</option>

</select>

<div class="password-box">

<input
type="password"
id="store_password"
placeholder="الرمز السري">

<i class="fa-solid fa-eye"
onclick="togglePassword('store_password',this)">
</i>

</div>

<p class="upload-title">
صورة المتجر
</p>

<input
type="file"
id="store_image"
accept="image/*">

<p class="upload-title">
صورة البطاقة الموحدة
</p>

<input
type="file"
id="store_card"
accept="image/*">

</div>

<!-- سائق التوصيل -->

<div id="driverForm"
style="display:none;">

<input
type="text"
id="driver_name"
placeholder="الاسم الكامل">

<input
type="text"
id="driver_phone"
placeholder="رقم الهاتف واتساب">

<input
type="text"
id="driver_vehicle"
placeholder="نوع المركبة">

<div class="password-box">

<input
type="password"
id="driver_password"
placeholder="الرمز السري">

<i class="fa-solid fa-eye"
onclick="togglePassword('driver_password',this)">
</i>

</div>

<p class="upload-title">
صورة الهوية
</p>

<input
type="file"
id="driver_card"
accept="image/*">

<p class="upload-title">
صورة السيارة او الدراجة
</p>

<input
type="file"
id="driver_vehicle_image"
accept="image/*">

</div>

<!-- التكسي -->

<div id="taxiForm"
style="display:none;">

<input
type="text"
id="taxi_name"
placeholder="اسم السائق الكامل">

<input
type="text"
id="taxi_phone"
placeholder="رقم الهاتف واتساب">

<input
type="text"
id="taxi_vehicle_type"
placeholder="نوع المركبة">

<input
type="text"
id="taxi_vehicle_brand"
placeholder="ماركة السيارة">

<input
type="text"
id="taxi_plate"
placeholder="رقم المركبة الكامل">

<select id="taxi_color">

<option value="">
لون المركبة
</option>

<option>أبيض</option>
<option>أسود</option>
<option>أحمر</option>
<option>أزرق</option>
<option>فضي</option>
<option>رمادي</option>
<option>أصفر</option>
<option>أخضر</option>

</select>

<div class="password-box">

<input
type="password"
id="taxi_password"
placeholder="الرمز السري">

<i class="fa-solid fa-eye"
onclick="togglePassword('taxi_password',this)">
</i>

</div>

<p class="upload-title">
صورة الهوية
</p>

<input
type="file"
id="taxi_card"
accept="image/*">

<p class="upload-title">
صورة المركبة من الأمام
</p>

<input
type="file"
id="taxi_vehicle_image"
accept="image/*">

</div>

<button onclick="registerAccount()">
إنشاء الحساب
</button>

<div class="link">

<a onclick="showSection('loginSection')">
العودة لتسجيل الدخول
</a>

</div>

</div>

<!-- صفحة الانتظار -->

<div id="pendingSection"
class="card section">

<div class="logo">
<img src="Logo.png">
</div>

<div class="pending-icon">
<i class="fa-solid fa-clock"></i>
</div>

<h2 class="title">
تم استلام طلبك
</h2>

<p class="pending-text">
انتظر ريثما يتم مراجعة حسابك
وسوف يتم تفعيل الحساب قريباً
</p>

</div>

</div>

<script type="module">

import { initializeApp }
from
"https://www.gstatic.com/firebasejs/12.13.0/firebase-app.js";

import {
getDatabase,
ref,
set,
get,
child
}
from
"https://www.gstatic.com/firebasejs/12.13.0/firebase-database.js";

const firebaseConfig = {

apiKey: "AIzaSyC7QzQTYMSGRV_nraJBneBqDqYGhugF0Pw",

authDomain: "fast-937c9.firebaseapp.com",

projectId: "fast-937c9",

storageBucket: "fast-937c9.firebasestorage.app",

messagingSenderId: "221388561840",

appId: "1:221388561840:web:ec9d75183ddd7d44be0a75",

measurementId: "G-CEKHEPNR9X",

databaseURL:
"https://fast-937c9-default-rtdb.europe-west1.firebasedatabase.app"

};

const app = initializeApp(firebaseConfig);

const database = getDatabase(app);

const IMGBB_API_KEY =
"fa7d8e3e0c7fbc7686b65048fff45913";

window.togglePassword = function(id,icon){

let input =
document.getElementById(id);

if(input.type==="password"){

input.type="text";

icon.classList.replace(
"fa-eye",
"fa-eye-slash"
);

}else{

input.type="password";

icon.classList.replace(
"fa-eye-slash",
"fa-eye"
);

}

};

window.showSection = function(sectionId){

document.querySelectorAll(".section")
.forEach(section=>{

section.classList.remove("active");

});

document
.getElementById(sectionId)
.classList.add("active");

};

window.changeRegisterForm = function(){

let type =
document.getElementById("account_type").value;

document.getElementById("customerForm")
.style.display="none";

document.getElementById("storeForm")
.style.display="none";

document.getElementById("driverForm")
.style.display="none";

document.getElementById("taxiForm")
.style.display="none";

if(type==="customer"){

document.getElementById("customerForm")
.style.display="block";

}

if(type==="store"){

document.getElementById("storeForm")
.style.display="block";

}

if(type==="driver"){

document.getElementById("driverForm")
.style.display="block";

}

if(type==="taxi"){

document.getElementById("taxiForm")
.style.display="block";

}

};

function saveSession(userData){

localStorage.setItem(
"user",
JSON.stringify(userData)
);

}

async function uploadImage(file){

if(!file){
return "";
}

try{

const formData = new FormData();

formData.append("image",file);

const response = await fetch(
`https://api.imgbb.com/1/upload?key=${IMGBB_API_KEY}`,
{
method:"POST",
body:formData,
headers:{
"Accept":"application/json"
}
}
);

const data = await response.json();

if(data.success){

return data.data.url;

}else{

return "";

}

}catch(error){

console.log(error);

return "";

}

}

async function phoneExists(path,phone){

const snapshot =
await get(child(ref(database),path));

if(snapshot.exists()){

const data = snapshot.val();

for(let key in data){

if(data[key].phone === phone){

return true;

}

}

}

return false;

}

window.registerAccount =
async function(){

let type =
document.getElementById("account_type").value;

if(type==="customer"){

let phone =
document.getElementById("customer_phone").value;

let exists =
await phoneExists("customers",phone);

if(exists){

alert("رقم الهاتف مستخدم مسبقاً");

return;

}

let id = "CUS"+Date.now();

let customerData = {

id:id,
type:"customer",
status:"active",

name:
document.getElementById("customer_name").value,

phone:phone,

password:
document.getElementById("customer_password").value,

createdAt:Date.now()

};

await set(
ref(database,"customers/"+id),
customerData
);

saveSession(customerData);

window.location.href="home.html";

}

};

</script>

</body>
</html>
