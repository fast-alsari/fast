<div class="container">





<!-- تسجيل الدخول -->

<div id="loginSection"

class="card section active">



<div class="logo">

<img src="Logo.png">

</div>




<p class="app-text">

نوصلك طلبك بأقل من ساعة 🚀

</p>




<h2 class="title">

تسجيل الدخول

</h2>





<input

type="text"

id="login_phone"

placeholder="رقم الهاتف">






<div class="password-box">

<input

type="password"

id="login_password"

placeholder="الرمز السري">



<i class="fa-solid fa-eye"

onclick="togglePassword('login_password',this)">

</i>

</div>






<button onclick="login()">

</button>






<div class="link">

<a onclick="showSection('registerSection')">

إنشاء حساب

</a>

</div>

<!-- إنشاء حساب -->

<div id="registerSection"

class="card section">



<div class="logo">

<img src="Logo.png">

</div>



<h2 class="title">

إنشاء حساب

</h2>






<select

id="account_type"

onchange="changeRegisterForm()">


<option value="">

اختر نوع الحساب

</option>


<option value="customer">

زبون

</option>


<option value="store">

متجر

</option>


<option value="driver">

سائق توصيل

</option>

</select>









<!-- الزبون -->

<div id="customerForm"

style="display:none;">



<input

type="text"

id="customer_name"

placeholder="الاسم الكامل">

type="text"

id="customer_phone"

placeholder="رقم الهاتف">

<div class="password-box">

<input

type="password"

id="customer_password"

<i class="fa-solid fa-eye"

onclick="togglePassword('customer_password',this)">

</i>

</div>






<p class="map-title">

حدد موقعك على الخريطة

</p>





<div id="map"

class="map-box">

</div>

</div>

style="display:none;">

</option>

<option>مخبز</option>

<option>ماركت</option>

<option>خضروات</option>

<option>الكترونيات</option>

<option>أجهزة كهربائية</option>

</select>







<div class="password-box">

<input

type="password"

onclick="togglePassword('store_password',this)">

</i>

</div>






<p class="upload-title">

<input type="file"
