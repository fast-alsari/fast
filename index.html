<!DOCTYPE html>
<html lang="ar" dir="rtl">

<head>

<meta charset="UTF-8">

<meta name="viewport"
content="width=device-width, initial-scale=1.0">

<title>
عالسريع
</title>

<link rel="icon" href="Logo.png">

<link rel="apple-touch-icon" href="Logo.png">

<meta name="apple-mobile-web-app-capable" content="yes">

<meta name="apple-mobile-web-app-status-bar-style" content="default">

<link rel="preconnect"
href="https://fonts.googleapis.com">

<link rel="preconnect"
href="https://fonts.gstatic.com"
crossorigin>

<link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;500;600;700&display=swap"
rel="stylesheet">

<link rel="stylesheet"
href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css"/>

<link rel="stylesheet"
href="https://unpkg.com/leaflet/dist/leaflet.css"/>

<script src="https://unpkg.com/leaflet/dist/leaflet.js"></script>

<style>

*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:'Cairo',sans-serif;
}

body{
background:#f4f7fb;
padding:20px;
}

.container{
max-width:500px;
margin:auto;
}

.card{
background:#fff;
padding:25px;
border-radius:25px;
box-shadow:0 5px 20px rgba(0,0,0,0.08);
margin-bottom:20px;
}

.logo{
text-align:center;
margin-bottom:20px;
}

.logo img{
width:120px;
}

.title{
text-align:center;
margin-bottom:20px;
color:#ff7b00;
}

.app-text{
text-align:center;
margin-bottom:20px;
font-size:16px;
color:#555;
}

input,
select{
width:100%;
padding:14px;
border:none;
outline:none;
border-radius:15px;
background:#f1f3f6;
margin-bottom:15px;
font-size:15px;
}

button{
width:100%;
padding:15px;
border:none;
border-radius:15px;
background:linear-gradient(45deg,#ff7b00,#0066ff);
color:#fff;
font-size:16px;
font-weight:bold;
cursor:pointer;
}

.password-box{
position:relative;
}

.password-box i{
position:absolute;
left:15px;
top:18px;
cursor:pointer;
color:#666;
}

.link{
text-align:center;
margin-top:15px;
}

.link a{
cursor:pointer;
color:#0066ff;
font-weight:bold;
}

.section{
display:none;
}

.active{
display:block;
}

.pending-icon{
font-size:70px;
color:#ff7b00;
text-align:center;
margin-bottom:20px;
}

.pending-text{
text-align:center;
line-height:2;
font-size:16px;
}

.upload-title,
.map-title{
margin-bottom:10px;
font-weight:bold;
color:#444;
}

.map-box{
height:250px;
border-radius:20px;
overflow:hidden;
margin-top:10px;
}

.work-times{
margin:20px 0;
}

.day-row{
background:#f8f9fb;
padding:12px;
border-radius:15px;
margin-bottom:10px;
}

.day-row label{
font-weight:bold;
display:block;
margin-bottom:10px;
}

.time-selects{
display:flex;
gap:10px;
}

.time-selects select{
margin-bottom:0;
}

</style>

</head>

<body>

<div class="container">

<!-- تسجيل الدخول -->

<div id="loginSection"
class="card section active">

<div class="logo">
<img src="Logo.png">
</div>

<p class="app-text">
نوصلك طلبك بأقل من ساعة 🚀
</p>

<h2 class="title">
تسجيل الدخول
</h2>

<input
type="text"
id="login_phone"
placeholder="رقم الهاتف">

<div class="password-box">

<input
type="password"
id="login_password"
placeholder="الرمز السري">

<i class="fa-solid fa-eye"
onclick="togglePassword('login_password',this)">
</i>

</div>

<button onclick="login()"
id="loginBtn">

تسجيل الدخول

</button>

<div class="link">

<a onclick="showSection('registerSection')">

إنشاء حساب

</a>

</div>

</div>

<!-- إنشاء حساب -->

<div id="registerSection"
class="card section">

<div class="logo">
<img src="Logo.png">
</div>

<h2 class="title">
إنشاء حساب
</h2>

<select id="account_type"
onchange="changeRegisterForm()">

<option value="">
اختر نوع الحساب
</option>

<option value="customer">
زبون
</option>

<option value="store">
متجر
</option>

<option value="driver">
سائق توصيل
</option>

<option value="taxi">
تكسي
</option>

</select>

<!-- الزبون -->

<div id="customerForm"
style="display:none;">

<input
type="text"
id="customer_name"
placeholder="الاسم الكامل">

<input
type="tel"
id="customer_phone"
placeholder="رقم الهاتف">

<div class="password-box">

<input
type="password"
id="customer_password"
placeholder="الرمز السري">

<i class="fa-solid fa-eye"
onclick="togglePassword('customer_password',this)">
</i>

</div>

</div>

<!-- المتجر -->

<div id="storeForm"
style="display:none;">

<input
type="text"
id="store_owner"
placeholder="اسم صاحب المتجر">

<input
type="tel"
id="store_phone"
placeholder="رقم الهاتف">

<input
type="text"
id="store_name"
placeholder="اسم المتجر">

<select id="store_category">

<option value="">
اختر نوع المتجر
</option>

<option>
مطعم
</option>

<option>
ماركت
</option>

<option>
مخبز
</option>

<option>
الكترونيات
</option>

<option>
صيدلية
</option>

</select>

<div class="password-box">

<input
type="password"
id="store_password"
placeholder="الرمز السري">

<i class="fa-solid fa-eye"
onclick="togglePassword('store_password',this)">
</i>

</div>

<div class="work-times">

<h3 style="margin-bottom:15px;">
أوقات الدوام
</h3>

<div id="daysContainer"></div>

</div>

<p class="map-title">
حدد موقع المتجر
</p>

<div id="storeMap"
class="map-box"></div>

</div>

<!-- سائق -->

<div id="driverForm"
style="display:none;">

<input
type="text"
id="driver_name"
placeholder="اسم السائق">

<input
type="tel"
id="driver_phone"
placeholder="رقم الهاتف">

<select id="driver_vehicle">

<option>
دراجة
</option>

<option>
سيارة
</option>

</select>

<div class="password-box">

<input
type="password"
id="driver_password"
placeholder="الرمز السري">

<i class="fa-solid fa-eye"
onclick="togglePassword('driver_password',this)">
</i>

</div>

</div>

<!-- تكسي -->

<div id="taxiForm"
style="display:none;">

<input
type="text"
id="taxi_name"
placeholder="اسم السائق">

<input
type="tel"
id="taxi_phone"
placeholder="رقم الهاتف">

<select id="taxi_vehicle">

<option>
سيارة
</option>

<option>
دراجة
</option>

</select>

<input
type="text"
id="taxi_plate"
placeholder="رقم المركبة">

<div class="password-box">

<input
type="password"
id="taxi_password"
placeholder="الرمز السري">

<i class="fa-solid fa-eye"
onclick="togglePassword('taxi_password',this)">
</i>

</div>

</div>

<button onclick="registerAccount()"
id="registerBtn">

إنشاء الحساب

</button>

<div class="link">

<a onclick="showSection('loginSection')">

العودة لتسجيل الدخول

</a>

</div>

</div>

<!-- صفحة حالة الحساب -->

<div id="pendingSection"
class="card section">

<div class="logo">
<img src="Logo.png">
</div>

<div class="pending-icon">
<i class="fa-solid fa-clock"></i>
</div>

<h2 class="title">
حالة الحساب
</h2>

<p class="pending-text"
id="pendingMessage">

جاري التحقق من حالة الحساب...

</p>

</div>

</div>

<script type="module">

import { initializeApp }
from
"https://www.gstatic.com/firebasejs/12.13.0/firebase-app.js";

import {

getDatabase,
ref,
set,
get,
child,
onValue

}
from
"https://www.gstatic.com/firebasejs/12.13.0/firebase-database.js";

const firebaseConfig = {

apiKey:"AIzaSyC7QzQTYMSGRV_nraJBneBqDqYGhugF0Pw",

authDomain:"fast-937c9.firebaseapp.com",

projectId:"fast-937c9",

storageBucket:"fast-937c9.firebasestorage.app",

messagingSenderId:"221388561840",

appId:"1:221388561840:web:ec9d75183ddd7d44be0a75",

measurementId:"G-CEKHEPNR9X",

databaseURL:
"https://fast-937c9-default-rtdb.europe-west1.firebasedatabase.app"

};

const app =
initializeApp(firebaseConfig);

const database =
getDatabase(app);

// =========================
// ايام الاسبوع
// =========================

const days = [

"الأحد",
"الاثنين",
"الثلاثاء",
"الأربعاء",
"الخميس",
"الجمعة",
"السبت"

];

// =========================
// ساعات الدوام
// =========================

const hours = [

"مغلق",
"6 صباحاً",
"7 صباحاً",
"8 صباحاً",
"9 صباحاً",
"10 صباحاً",
"11 صباحاً",
"12 ظهراً",
"1 ظهراً",
"2 ظهراً",
"3 عصراً",
"4 عصراً",
"5 عصراً",
"6 مساءً",
"7 مساءً",
"8 مساءً",
"9 مساءً",
"10 مساءً",
"11 مساءً"

];

// =========================
// جدول الدوام
// =========================

const daysContainer =
document.getElementById("daysContainer");

days.forEach((day,index)=>{

daysContainer.innerHTML += `

<div class="day-row">

<label>
${day}
</label>

<div class="time-selects">

<select id="from_${index}">

${hours.map(h=>
`<option>${h}</option>`
).join("")}

</select>

<select id="to_${index}">

${hours.map(h=>
`<option>${h}</option>`
).join("")}

</select>

</div>

</div>

`;

});

// =========================
// خريطة
// =========================

let storeMap;
let storeMarker;

let store_latitude = "";
let store_longitude = "";

function loadStoreMap(){

if(storeMap){

storeMap.remove();

}

storeMap =
L.map('storeMap')
.setView([33.3152,44.3661],13);

L.tileLayer(
'https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png'
).addTo(storeMap);

storeMap.on('click',function(e){

store_latitude =
e.latlng.lat;

store_longitude =
e.latlng.lng;

if(storeMarker){

storeMap.removeLayer(storeMarker);

}

storeMarker =
L.marker([
store_latitude,
store_longitude
]).addTo(storeMap);

});

}

// =========================
// اظهار الصفحات
// =========================

window.showSection =
function(sectionId){

document.querySelectorAll(".section")
.forEach(section=>{

section.classList.remove("active");

});

document
.getElementById(sectionId)
.classList.add("active");

};

// =========================
// اظهار كلمة السر
// =========================

window.togglePassword =
function(id,icon){

let input =
document.getElementById(id);

if(input.type === "password"){

input.type = "text";

icon.classList.replace(
"fa-eye",
"fa-eye-slash"
);

}else{

input.type = "password";

icon.classList.replace(
"fa-eye-slash",
"fa-eye"
);

}

};

// =========================
// تغيير نوع الحساب
// =========================

window.changeRegisterForm =
function(){

let type =
document.getElementById("account_type")
.value;

document.getElementById("customerForm")
.style.display = "none";

document.getElementById("storeForm")
.style.display = "none";

document.getElementById("driverForm")
.style.display = "none";

document.getElementById("taxiForm")
.style.display = "none";

if(type === "customer"){

document.getElementById("customerForm")
.style.display = "block";

}

if(type === "store"){

document.getElementById("storeForm")
.style.display = "block";

setTimeout(loadStoreMap,300);

}

if(type === "driver"){

document.getElementById("driverForm")
.style.display = "block";

}

if(type === "taxi"){

document.getElementById("taxiForm")
.style.display = "block";

}

};

// =========================
// حفظ الجلسة
// =========================

function saveSession(user){

localStorage.setItem(
"user",
JSON.stringify(user)
);

}

// =========================
// مراقبة الحساب مباشرة
// =========================

function monitorAccountStatus(user){

let table = "";

if(user.type === "store"){
table = "stores";
}

if(user.type === "driver"){
table = "drivers";
}

if(user.type === "taxi"){
table = "taxis";
}

onValue(

ref(database, table + "/" + user.phone),

(snapshot)=>{

if(!snapshot.exists()) return;

let updatedUser =
snapshot.val();

saveSession(updatedUser);

// pending

if(updatedUser.status === "pending"){

document.getElementById("pendingMessage")
.innerHTML = `

حالة حسابك غير مفعلة حالياً <br><br>

يرجى التواصل مع الإدارة لتفعيل الحساب

`;

}

// active

if(updatedUser.status === "active"){

document.getElementById("pendingMessage")
.innerHTML = `

تم تفعيل الحساب بنجاح <br><br>

جاري تحويلك...

`;

setTimeout(()=>{

if(updatedUser.type === "store"){

window.location.replace("store.html");

}

if(updatedUser.type === "driver"){

window.location.replace("drive.html");

}

if(updatedUser.type === "taxi"){

window.location.replace("tixe.html");

}

},1500);

}

// banned

if(updatedUser.status === "banned"){

document.getElementById("pendingMessage")
.innerHTML = `

حسابك محظور من الإدارة

`;

}

// disabled

if(updatedUser.status === "disabled"){

document.getElementById("pendingMessage")
.innerHTML = `

حسابك موقوف حالياً

`;

}

// expired

if(updatedUser.status === "expired"){

document.getElementById("pendingMessage")
.innerHTML = `

انتهت صلاحية حسابك

`;

}

}

);

}

// =========================
// انشاء الحساب
// =========================

window.registerAccount =
async function(){

const registerBtn =
document.getElementById("registerBtn");

registerBtn.disabled = true;

registerBtn.innerText =
"جاري إنشاء الحساب...";

try{

let type =
document.getElementById("account_type")
.value;

// =========================
// زبون
// =========================

if(type === "customer"){

let customerData = {

id:"CUS"+Date.now(),

type:"customer",

status:"active",

name:
document.getElementById("customer_name").value,

phone:
document.getElementById("customer_phone").value,

password:
document.getElementById("customer_password").value,

createdAt:Date.now()

};

await set(

ref(
database,
"customers/" + customerData.phone
),

customerData

);

saveSession(customerData);

window.location.replace("home.html");

}

// =========================
// متجر
// =========================

if(type === "store"){

let workingHours = [];

days.forEach((day,index)=>{

workingHours.push({

day:day,

from:
document.getElementById(
`from_${index}`
).value,

to:
document.getElementById(
`to_${index}`
).value

});

});

let storeData = {

id:"STORE"+Date.now(),

type:"store",

status:"pending",

owner:
document.getElementById("store_owner").value,

phone:
document.getElementById("store_phone").value,

store_name:
document.getElementById("store_name").value,

category:
document.getElementById("store_category").value,

password:
document.getElementById("store_password").value,

latitude:store_latitude,

longitude:store_longitude,

workingHours:workingHours,

createdAt:Date.now()

};

await set(

ref(
database,
"stores/" + storeData.phone
),

storeData

);

saveSession(storeData);

showSection("pendingSection");

monitorAccountStatus(storeData);

}

// =========================
// سائق
// =========================

if(type === "driver"){

let driverData = {

id:"DRV"+Date.now(),

type:"driver",

status:"pending",

name:
document.getElementById("driver_name").value,

phone:
document.getElementById("driver_phone").value,

vehicle:
document.getElementById("driver_vehicle").value,

password:
document.getElementById("driver_password").value,

createdAt:Date.now()

};

await set(

ref(
database,
"drivers/" + driverData.phone
),

driverData

);

saveSession(driverData);

showSection("pendingSection");

monitorAccountStatus(driverData);

}

// =========================
// تكسي
// =========================

if(type === "taxi"){

let taxiData = {

id:"TAXI"+Date.now(),

type:"taxi",

status:"pending",

name:
document.getElementById("taxi_name").value,

phone:
document.getElementById("taxi_phone").value,

vehicle:
document.getElementById("taxi_vehicle").value,

plate:
document.getElementById("taxi_plate").value,

password:
document.getElementById("taxi_password").value,

createdAt:Date.now()

};

await set(

ref(
database,
"taxis/" + taxiData.phone
),

taxiData

);

saveSession(taxiData);

showSection("pendingSection");

monitorAccountStatus(taxiData);

}

}catch(error){

console.log(error);

alert("حدث خطأ");

}

registerBtn.disabled = false;

registerBtn.innerText =
"إنشاء الحساب";

};

// =========================
// تسجيل الدخول
// =========================

window.login =
async function(){

let phone =
document.getElementById("login_phone")
.value;

let password =
document.getElementById("login_password")
.value;

// customers

const customers =
await get(
child(ref(database),"customers")
);

if(customers.exists()){

let data =
customers.val();

for(let key in data){

let user =
data[key];

if(
user.phone === phone &&
user.password === password
){

saveSession(user);

window.location.replace("home.html");

return;

}

}

}

// stores

const stores =
await get(
child(ref(database),"stores")
);

if(stores.exists()){

let data =
stores.val();

for(let key in data){

let user =
data[key];

if(
user.phone === phone &&
user.password === password
){

saveSession(user);

if(user.status === "active"){

window.location.replace("store.html");

}else{

showSection("pendingSection");

monitorAccountStatus(user);

}

return;

}

}

}

// drivers

const drivers =
await get(
child(ref(database),"drivers")
);

if(drivers.exists()){

let data =
drivers.val();

for(let key in data){

let user =
data[key];

if(
user.phone === phone &&
user.password === password
){

saveSession(user);

if(user.status === "active"){

window.location.replace("drive.html");

}else{

showSection("pendingSection");

monitorAccountStatus(user);

}

return;

}

}

}

// taxis

const taxis =
await get(
child(ref(database),"taxis")
);

if(taxis.exists()){

let data =
taxis.val();

for(let key in data){

let user =
data[key];

if(
user.phone === phone &&
user.password === password
){

saveSession(user);

if(user.status === "active"){

window.location.replace("tixe.html");

}else{

showSection("pendingSection");

monitorAccountStatus(user);

}

return;

}

}

}

alert("بيانات الدخول غير صحيحة");

};

</script>

</body>
</html>
