<!DOCTYPE html>
<html lang="ar" dir="rtl">

<head>

<meta charset="UTF-8">

<meta name="viewport"
content="width=device-width, initial-scale=1.0">

<title>
عالسريع
</title>

<link rel="preconnect"
href="https://fonts.googleapis.com">

<link rel="preconnect"
href="https://fonts.gstatic.com"
crossorigin>

<link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;500;600;700&display=swap"
rel="stylesheet">

<link rel="stylesheet"
href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css"/>

<style>

*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:'Cairo',sans-serif;
}

body{
background:#f4f7fb;
padding:20px;
}

.container{
max-width:500px;
margin:auto;
}

.card{
background:#fff;
padding:25px;
border-radius:25px;
box-shadow:0 5px 20px rgba(0,0,0,0.08);
margin-bottom:20px;
}

.title{
text-align:center;
margin-bottom:20px;
color:#ff7b00;
font-size:28px;
font-weight:bold;
}

.section{
display:none;
}

.active{
display:block;
}

input,
select{
width:100%;
padding:15px;
border:none;
outline:none;
border-radius:15px;
background:#f1f3f6;
margin-bottom:15px;
font-size:15px;
}

button{
width:100%;
padding:15px;
border:none;
border-radius:15px;
background:linear-gradient(45deg,#ff7b00,#0066ff);
color:#fff;
font-size:16px;
font-weight:bold;
cursor:pointer;
}

.password-box{
position:relative;
}

.password-box i{
position:absolute;
left:15px;
top:18px;
cursor:pointer;
color:#666;
}

.link{
text-align:center;
margin-top:15px;
}

.link a{
color:#0066ff;
font-weight:bold;
cursor:pointer;
}

.pending-box{
text-align:center;
padding:40px 20px;
}

.pending-box i{
font-size:70px;
margin-bottom:20px;
color:#ff7b00;
}

.pending-box p{
line-height:2;
font-size:18px;
}

.day-row{
background:#f8f9fb;
padding:12px;
border-radius:15px;
margin-bottom:10px;
}

.day-row label{
display:block;
margin-bottom:10px;
font-weight:bold;
}

.time-row{
display:flex;
gap:10px;
}

</style>

</head>

<body>

<div class="container">

<!-- تسجيل الدخول -->

<div id="loginSection"
class="card section active">

<h2 class="title">
تسجيل الدخول
</h2>

<input
type="text"
id="login_phone"
placeholder="رقم الهاتف">

<div class="password-box">

<input
type="password"
id="login_password"
placeholder="الرمز السري">

<i class="fa-solid fa-eye"
onclick="togglePassword('login_password',this)">
</i>

</div>

<button onclick="login()"
id="loginBtn">

تسجيل الدخول

</button>

<div class="link">

<a onclick="showSection('registerSection')">

إنشاء حساب

</a>

</div>

</div>

<!-- إنشاء حساب -->

<div id="registerSection"
class="card section">

<h2 class="title">
إنشاء حساب
</h2>

<select id="account_type"
onchange="changeForm()">

<option value="">
اختر نوع الحساب
</option>

<option value="customer">
زبون
</option>

<option value="store">
متجر
</option>

<option value="driver">
سائق توصيل
</option>

<option value="taxi">
تكسي
</option>

</select>

<!-- الزبون -->

<div id="customerForm"
style="display:none;">

<input
type="text"
id="customer_name"
placeholder="الاسم الكامل">

<input
type="text"
id="customer_phone"
placeholder="رقم الهاتف">

<div class="password-box">

<input
type="password"
id="customer_password"
placeholder="الرمز السري">

<i class="fa-solid fa-eye"
onclick="togglePassword('customer_password',this)">
</i>

</div>

</div>

<!-- المتجر -->

<div id="storeForm"
style="display:none;">

<input
type="text"
id="store_owner"
placeholder="اسم صاحب المتجر">

<input
type="text"
id="store_phone"
placeholder="رقم الهاتف">

<input
type="text"
id="store_name"
placeholder="اسم المتجر">

<select id="store_category">

<option>
مطعم
</option>

<option>
ماركت
</option>

<option>
صيدلية
</option>

<option>
الكترونيات
</option>

</select>

<div class="password-box">

<input
type="password"
id="store_password"
placeholder="الرمز السري">

<i class="fa-solid fa-eye"
onclick="togglePassword('store_password',this)">
</i>

</div>

<h3 style="margin-bottom:15px;">
أوقات الدوام
</h3>

<div id="daysContainer"></div>

</div>

<!-- السائق -->

<div id="driverForm"
style="display:none;">

<input
type="text"
id="driver_name"
placeholder="اسم السائق">

<input
type="text"
id="driver_phone"
placeholder="رقم الهاتف">

<select id="driver_vehicle">

<option>
دراجة
</option>

<option>
سيارة
</option>

</select>

<div class="password-box">

<input
type="password"
id="driver_password"
placeholder="الرمز السري">

<i class="fa-solid fa-eye"
onclick="togglePassword('driver_password',this)">
</i>

</div>

</div>

<!-- التكسي -->

<div id="taxiForm"
style="display:none;">

<input
type="text"
id="taxi_name"
placeholder="اسم السائق">

<input
type="text"
id="taxi_phone"
placeholder="رقم الهاتف">

<input
type="text"
id="taxi_plate"
placeholder="رقم المركبة">

<div class="password-box">

<input
type="password"
id="taxi_password"
placeholder="الرمز السري">

<i class="fa-solid fa-eye"
onclick="togglePassword('taxi_password',this)">
</i>

</div>

</div>

<button onclick="registerAccount()"
id="registerBtn">

إنشاء الحساب

</button>

<div class="link">

<a onclick="showSection('loginSection')">

العودة لتسجيل الدخول

</a>

</div>

</div>

<!-- صفحة الانتظار -->

<div id="pendingSection"
class="card section">

<div class="pending-box">

<i class="fa-solid fa-clock"></i>

<h2 class="title">
حالة الحساب
</h2>

<p id="pendingMessage">

جاري التحقق من الحساب...

</p>

</div>

</div>

</div>

<script type="module">

import { initializeApp }
from
"https://www.gstatic.com/firebasejs/12.13.0/firebase-app.js";

import {

getDatabase,
ref,
set,
get,
onValue,
child,
update

}
from
"https://www.gstatic.com/firebasejs/12.13.0/firebase-database.js";

// Firebase

const firebaseConfig = {

apiKey:"AIzaSyC7QzQTYMSGRV_nraJBneBqDqYGhugF0Pw",

authDomain:"fast-937c9.firebaseapp.com",

projectId:"fast-937c9",

storageBucket:"fast-937c9.firebasestorage.app",

messagingSenderId:"221388561840",

appId:"1:221388561840:web:ec9d75183ddd7d44be0a75",

databaseURL:
"https://fast-937c9-default-rtdb.europe-west1.firebasedatabase.app"

};

const app =
initializeApp(firebaseConfig);

const database =
getDatabase(app);

// ايام الاسبوع

const days = [

"الأحد",
"الاثنين",
"الثلاثاء",
"الأربعاء",
"الخميس",
"الجمعة",
"السبت"

];

// ساعات الدوام

const hours = [

"مغلق",
"6 صباحاً",
"7 صباحاً",
"8 صباحاً",
"9 صباحاً",
"10 صباحاً",
"11 صباحاً",
"12 ظهراً",
"1 ظهراً",
"2 ظهراً",
"3 عصراً",
"4 عصراً",
"5 عصراً",
"6 مساءً",
"7 مساءً",
"8 مساءً",
"9 مساءً",
"10 مساءً"

];

// انشاء جدول الدوام

const daysContainer =
document.getElementById("daysContainer");

days.forEach((day,index)=>{

daysContainer.innerHTML += `

<div class="day-row">

<label>
${day}
</label>

<div class="time-row">

<select id="from_${index}">

${hours.map(h=>
`<option>${h}</option>`
).join("")}

</select>

<select id="to_${index}">

${hours.map(h=>
`<option>${h}</option>`
).join("")}

</select>

</div>

</div>

`;

});

// اظهار كلمة السر

window.togglePassword =
function(id,icon){

const input =
document.getElementById(id);

if(input.type === "password"){

input.type = "text";

icon.classList.replace(
"fa-eye",
"fa-eye-slash"
);

}else{

input.type = "password";

icon.classList.replace(
"fa-eye-slash",
"fa-eye"
);

}

};

// اظهار الاقسام

window.showSection =
function(id){

document.querySelectorAll(".section")
.forEach(section=>{

section.classList.remove("active");

});

document
.getElementById(id)
.classList.add("active");

};

// تغيير الفورم

window.changeForm =
function(){

const type =
document.getElementById("account_type")
.value;

document.getElementById("customerForm")
.style.display = "none";

document.getElementById("storeForm")
.style.display = "none";

document.getElementById("driverForm")
.style.display = "none";

document.getElementById("taxiForm")
.style.display = "none";

if(type === "customer"){

document.getElementById("customerForm")
.style.display = "block";

}

if(type === "store"){

document.getElementById("storeForm")
.style.display = "block";

}

if(type === "driver"){

document.getElementById("driverForm")
.style.display = "block";

}

if(type === "taxi"){

document.getElementById("taxiForm")
.style.display = "block";

}

};

// حفظ الجلسة

function saveSession(user){

localStorage.setItem(
"user",
JSON.stringify({
phone:user.phone,
type:user.type
})
);

}

// حذف الجلسة

function clearSession(){

localStorage.removeItem("user");

}

// تحويل الصفحات

function redirectUser(user){

if(user.type === "customer"){

window.location.replace("home.html");

}

if(user.type === "store"){

window.location.replace("store.html");

}

if(user.type === "driver"){

window.location.replace("drive.html");

}

if(user.type === "taxi"){

window.location.replace("tixe.html");

}

if(user.type === "admin"){

window.location.replace("add.html");

}

}

// عرض الحالة

function showStatus(status){

showSection("pendingSection");

const msg =
document.getElementById("pendingMessage");

if(status === "pending"){

msg.innerHTML = `

حالة حسابك غير مفعلة حالياً <br><br>

يرجى التواصل مع الإدارة لتفعيل الحساب

`;

}

if(status === "disabled"){

msg.innerHTML = `

تم إيقاف حسابك

`;

}

if(status === "banned"){

msg.innerHTML = `

تم حظر حسابك

`;

}

if(status === "expired"){

msg.innerHTML = `

انتهى اشتراك حسابك

`;

}

}

// مراقبة الحساب realtime

function monitorUser(user){

let table = "";

if(user.type === "customer"){
table = "customers";
}

if(user.type === "store"){
table = "stores";
}

if(user.type === "driver"){
table = "drivers";
}

if(user.type === "taxi"){
table = "taxis";
}

if(user.type === "admin"){
table = "admins";
}

onValue(

ref(database, table + "/" + user.phone),

async(snapshot)=>{

if(!snapshot.exists()){

clearSession();

window.location.replace("index.html");

return;

}

const updatedUser =
snapshot.val();

saveSession(updatedUser);

// فحص انتهاء الاشتراك

const today =
new Date()
.toISOString()
.split("T")[0];

if(
updatedUser.expireDate &&
updatedUser.expireDate < today &&
updatedUser.status === "active"
){

await update(
ref(database, table + "/" + user.phone),
{
status:"expired"
}
);

return;

}

// pending

if(updatedUser.status === "pending"){

showStatus("pending");

return;

}

// disabled

if(updatedUser.status === "disabled"){

showStatus("disabled");

return;

}

// banned

if(updatedUser.status === "banned"){

showStatus("banned");

return;

}

// expired

if(updatedUser.status === "expired"){

showStatus("expired");

return;

}

// active

if(updatedUser.status === "active"){

redirectUser(updatedUser);

return;

}

}

);

}

// تسجيل تلقائي

const savedUser =
JSON.parse(
localStorage.getItem("user")
);

if(savedUser){

monitorUser(savedUser);

}

// انشاء حساب

window.registerAccount =
async function(){

const btn =
document.getElementById("registerBtn");

btn.disabled = true;

btn.innerText =
"جاري إنشاء الحساب...";

const type =
document.getElementById("account_type")
.value;

// زبون

if(type === "customer"){

const customerData = {

id:"CUS"+Date.now(),

type:"customer",

status:"active",

name:
document.getElementById("customer_name").value,

phone:
document.getElementById("customer_phone").value,

password:
document.getElementById("customer_password").value,

createdAt:Date.now()

};

await set(
ref(database,"customers/" + customerData.phone),
customerData
);

saveSession(customerData);

redirectUser(customerData);

}

// متجر

if(type === "store"){

const workingHours = [];

days.forEach((day,index)=>{

workingHours.push({

day:day,

from:
document.getElementById(
`from_${index}`
).value,

to:
document.getElementById(
`to_${index}`
).value

});

});

const storeData = {

id:"STORE"+Date.now(),

type:"store",

status:"pending",

owner:
document.getElementById("store_owner").value,

phone:
document.getElementById("store_phone").value,

store_name:
document.getElementById("store_name").value,

category:
document.getElementById("store_category").value,

password:
document.getElementById("store_password").value,

workingHours:workingHours,

createdAt:Date.now()

};

await set(
ref(database,"stores/" + storeData.phone),
storeData
);

saveSession(storeData);

monitorUser(storeData);

}

// سائق

if(type === "driver"){

const driverData = {

id:"DRV"+Date.now(),

type:"driver",

status:"pending",

name:
document.getElementById("driver_name").value,

phone:
document.getElementById("driver_phone").value,

vehicle:
document.getElementById("driver_vehicle").value,

password:
document.getElementById("driver_password").value,

createdAt:Date.now()

};

await set(
ref(database,"drivers/" + driverData.phone),
driverData
);

saveSession(driverData);

monitorUser(driverData);

}

// تكسي

if(type === "taxi"){

const taxiData = {

id:"TAXI"+Date.now(),

type:"taxi",

status:"pending",

name:
document.getElementById("taxi_name").value,

phone:
document.getElementById("taxi_phone").value,

plate:
document.getElementById("taxi_plate").value,

password:
document.getElementById("taxi_password").value,

createdAt:Date.now()

};

await set(
ref(database,"taxis/" + taxiData.phone),
taxiData
);

saveSession(taxiData);

monitorUser(taxiData);

}

btn.disabled = false;

btn.innerText =
"إنشاء الحساب";

};

// تسجيل الدخول

window.login =
async function(){

const phone =
document.getElementById("login_phone")
.value;

const password =
document.getElementById("login_password")
.value;

const tables = [

"admins",
"customers",
"stores",
"drivers",
"taxis"

];

for(let table of tables){

const snapshot =
await get(
child(ref(database),table)
);

if(snapshot.exists()){

const data =
snapshot.val();

for(let key in data){

const user =
data[key];

if(
user.phone === phone &&
user.password === password
){

saveSession(user);

monitorUser(user);

return;

}

}

}

}

alert("بيانات الدخول غير صحيحة");

};

</script>

</body>

</html>
