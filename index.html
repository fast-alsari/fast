<script>



// رابط السكربت السري

const SECRET_URL =

"https://script.google.com/macros/s/ضع_الرابط_السري_هنا/exec";





let map;

let marker;

let latitude = "";

let longitude = "";




let storeMap;

let storeMarker;

let store_latitude = "";

let store_longitude = "";







// اظهار واخفاء الرمز السري

function togglePassword(id,icon){


let input = document.getElementById(id);



if(input.type == "password"){


input.type = "text";

icon.classList.remove("fa-eye");

icon.classList.add("fa-eye-slash");



}else{


input.type = "password";

icon.classList.remove("fa-eye-slash");

icon.classList.add("fa-eye");

}

}








// خريطة الزبون - الشرقاط

function loadMap(){


map = L.map('map')

.setView([35.4893,43.2275],13);




L.tileLayer(

'https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png',

{

maxZoom:19

}).addTo(map);





map.on('click', function(e){


latitude = e.latlng.lat;

longitude = e.latlng.lng;





if(marker){

map.removeLayer(marker);

}





marker = L.marker([

latitude,

longitude

]).addTo(map);

});

}









// خريطة المتجر - الشرقاط

function loadStoreMap(){


storeMap = L.map('storeMap')

.setView([35.4893,43.2275],13);




L.tileLayer(

'https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png',

{

maxZoom:19

}).addTo(storeMap);





storeMap.on('click', function(e){


store_latitude = e.latlng.lat;

store_longitude = e.latlng.lng;





if(storeMarker){

storeMap.removeLayer(storeMarker);

}





storeMarker = L.marker([

store_latitude,

store_longitude

]).addTo(storeMap);

});

}









// تبديل الصفحات

function showSection(sectionId){


let sections = document.querySelectorAll('.section');



sections.forEach(section => {

section.classList.remove('active');

});



document

.getElementById(sectionId)

.classList.add('active');

}









// تغيير نوع الحساب

function changeRegisterForm(){


let type = document

.getElementById("account_type")

.value;





document.getElementById("customerForm")

.style.display = "none";


document.getElementById("storeForm")

.style.display = "none";


document.getElementById("driverForm")

.style.display = "none";






if(type == "customer"){


document.getElementById("customerForm")

.style.display = "block";



setTimeout(function(){

loadMap();

},500);

}






if(type == "store"){


document.getElementById("storeForm")

.style.display = "block";



setTimeout(function(){

loadStoreMap();

},500);

}






if(type == "driver"){


document.getElementById("driverForm")

.style.display = "block";

}

}










// تسجيل الدخول

async function login(){



let phone = document

.getElementById("login_phone")

.value;





let password = document

.getElementById("login_password")

.value;






if(phone == "" || password == ""){


alert(

"⚠️ يرجى ملء جميع الحقول"

);


return;

}






let response = await fetch(SECRET_URL,{


method:"POST",


body:JSON.stringify({

action:"login",

phone:phone,

password:password

})

});





let result = await response.json();






if(result.success){



localStorage.setItem(

"user",

JSON.stringify(result)

);




window.location.href = "home-store.html";



}else{


localStorage.removeItem("user");



alert(

"رقم الهاتف او الرمز السري غير صحيح"

);

}

}









// إنشاء الحساب

async function registerAccount(){



let type = document

.getElementById("account_type")

.value;










// الزبون

if(type == "customer"){



let data = {


action:"register_customer",



id:"CUS"+Date.now(),



name:document

.getElementById("customer_name")

.value,




phone:document

.getElementById("customer_phone")

.value,




address:document

.getElementById("customer_address")

.value,




nearpoint:document

.getElementById("customer_nearpoint")

.value,




password:document

.getElementById("customer_password")

.value,




latitude:latitude,

longitude:longitude

}






if(

data.name == "" ||

data.phone == "" ||

data.address == "" ||

data.nearpoint == "" ||

data.password == "" ||

latitude == ""

){

alert(

"⚠️ املأ جميع الحقول"

);

return;

}







await fetch(SECRET_URL,{


method:"POST",


body:JSON.stringify(data)

});






window.location.href = "home-store.html";

}










// المتجر

if(type == "store"){



let data = {


action:"register_store",



id:"STO"+Date.now(),



owner:document

.getElementById("store_owner")

.value,




phone:document

.getElementById("store_phone")

.value,




store_name:document

.getElementById("store_name")

.value,




category:document

.getElementById("store_category")

.value,




password:document

.getElementById("store_password")

.value,




latitude:store_latitude,

longitude:store_longitude

}







if(

data.owner == "" ||

data.phone == "" ||

data.store_name == "" ||

data.password == "" ||

store_latitude == ""

){

alert(

"⚠️ املأ جميع الحقول"

);

return;

}







await fetch(SECRET_URL,{


method:"POST",


body:JSON.stringify(data)

});






showSection("pendingSection");

}










// الدليفري

if(type == "driver"){



let data = {


action:"register_driver",



id:"DRV"+Date.now(),



name:document

.getElementById("driver_name")

.value,




phone:document

.getElementById("driver_phone")

.value,




vehicle:document

.getElementById("driver_vehicle")

.value,




password:document

.getElementById("driver_password")

.value

}







if(

data.name == "" ||

data.phone == "" ||

data.password == ""

){

alert(

"⚠️ املأ جميع الحقول"

);

return;

}







await fetch(SECRET_URL,{


method:"POST",


body:JSON.stringify(data)

});






showSection("pendingSection");

}

}



</script>
