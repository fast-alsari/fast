<!DOCTYPE html>
<html lang="ar" dir="rtl">

<head>

<meta charset="UTF-8">

<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>عالسريع</title>

<link rel="stylesheet" href="style.css">

<link rel="icon" href="Logo.png">

<link rel="apple-touch-icon" href="Logo.png">

<meta name="apple-mobile-web-app-capable" content="yes">

<meta name="apple-mobile-web-app-status-bar-style" content="default">

<link rel="preconnect" href="https://fonts.googleapis.com">

<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>

<link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;500;600;700&display=swap" rel="stylesheet">


<link rel="stylesheet"

href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css"/>


<link rel="stylesheet"

href="https://unpkg.com/leaflet/dist/leaflet.css"/>


<script src="https://unpkg.com/leaflet/dist/leaflet.js"></script>

</head>

<body>




<div class="container">





<!-- تسجيل الدخول -->

<div id="loginSection"

class="card section active">



<div class="logo">

<img src="Logo.png">

</div>




<p class="app-text">

نوصلك طلبك بأقل من ساعة 🚀

</p>




<h2 class="title">

تسجيل الدخول

</h2>





<input

type="text"

id="login_phone"

placeholder="رقم الهاتف">






<div class="password-box">

<input

type="password"

id="login_password"

placeholder="الرمز السري">



<i class="fa-solid fa-eye"

onclick="togglePassword('login_password',this)">

</i>

</div>






<button onclick="login()">

تسجيل الدخول

</button>






<div class="link">

<a onclick="showSection('registerSection')">

إنشاء حساب

</a>

</div>

</div>










<!-- إنشاء حساب -->

<div id="registerSection"

class="card section">



<div class="logo">

<img src="Logo.png">

</div>



<h2 class="title">

إنشاء حساب

</h2>






<select

id="account_type"

onchange="changeRegisterForm()">


<option value="">

اختر نوع الحساب

</option>


<option value="customer">

زبون

</option>


<option value="store">

متجر

</option>


<option value="driver">

سائق توصيل

</option>

</select>









<!-- الزبون -->

<div id="customerForm"

style="display:none;">



<input

type="text"

id="customer_name"

placeholder="الاسم الكامل">





<input

type="text"

id="customer_phone"

placeholder="رقم الهاتف">





<input

type="text"

id="customer_address"

placeholder="العنوان الكامل">





<input

type="text"

id="customer_nearpoint"

placeholder="اقرب نقطة دالة">






<div class="password-box">

<input

type="password"

id="customer_password"

placeholder="الرمز السري">



<i class="fa-solid fa-eye"

onclick="togglePassword('customer_password',this)">

</i>

</div>






<p class="map-title">

حدد موقعك على الخريطة

</p>





<div id="map"

class="map-box">

</div>

</div>










<!-- المتجر -->

<div id="storeForm"

style="display:none;">





<input

type="text"

id="store_owner"

placeholder="الاسم الكامل">





<input

type="text"

id="store_phone"

placeholder="رقم الهاتف">





<input

type="text"

id="store_name"

placeholder="اسم المتجر">






<select id="store_category">

<option>مطاعم</option>

<option>ماركت</option>

<option>خضروات</option>

<option>مواد انشائية</option>

<option>صيدليات</option>

</select>







<div class="password-box">

<input

type="password"

id="store_password"

placeholder="الرمز السري">



<i class="fa-solid fa-eye"

onclick="togglePassword('store_password',this)">

</i>

</div>






<p class="upload-title">

صورة المتجر

</p>

<input type="file"

id="store_image">






<p class="upload-title">

صورة البطاقة الموحدة

</p>

<input type="file"

id="store_card">






<p class="map-title">

حدد موقع المتجر على الخريطة

</p>




<div id="storeMap"

class="map-box">

</div>

</div>









<!-- الدليفري -->

<div id="driverForm"

style="display:none;">





<input

type="text"

id="driver_name"

placeholder="الاسم الكامل">





<input

type="text"

id="driver_phone"

placeholder="رقم الهاتف">






<select id="driver_vehicle">

<option>دراجة</option>

<option>سيارة</option>

</select>







<div class="password-box">

<input

type="password"

id="driver_password"

placeholder="الرمز السري">



<i class="fa-solid fa-eye"

onclick="togglePassword('driver_password',this)">

</i>

</div>






<p class="upload-title">

صورة الهوية

</p>

<input type="file"

id="driver_card">






<p class="upload-title">

صورة السيارة او الدراجة

</p>

<input type="file"

id="driver_vehicle_image">

</div>









<button onclick="registerAccount()">

إنشاء الحساب

</button>







<div class="link">

<a onclick="showSection('loginSection')">

العودة لتسجيل الدخول

</a>

</div>

</div>

</div>






<script>


let map;

let marker;

let latitude = "";

let longitude = "";



let storeMap;

let storeMarker;

let store_latitude = "";

let store_longitude = "";




// اظهار واخفاء كلمة السر

function togglePassword(id,icon){


let input = document.getElementById(id);



if(input.type == "password"){


input.type = "text";


icon.classList.remove("fa-eye");

icon.classList.add("fa-eye-slash");


}else{


input.type = "password";


icon.classList.remove("fa-eye-slash");

icon.classList.add("fa-eye");

}

}





// خريطة الزبون

function loadMap(){


if(map){

map.remove();

}



map = L.map('map')

.setView([35.4893,43.2275],13);




L.tileLayer(

'https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png',

{

maxZoom:19,

minZoom:6

}

).addTo(map);





setTimeout(function(){

map.invalidateSize();

},300);





map.on('click', function(e){


latitude = e.latlng.lat;

longitude = e.latlng.lng;





if(marker){

map.removeLayer(marker);

}





marker = L.marker([

latitude,

longitude

]).addTo(map);

});

}





// خريطة المتجر

function loadStoreMap(){


if(storeMap){

storeMap.remove();

}



storeMap = L.map('storeMap')

.setView([35.4893,43.2275],13);




L.tileLayer(

'https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png',

{

maxZoom:19,

minZoom:6

}

).addTo(storeMap);





setTimeout(function(){

storeMap.invalidateSize();

},300);





storeMap.on('click', function(e){


store_latitude = e.latlng.lat;

store_longitude = e.latlng.lng;





if(storeMarker){

storeMap.removeLayer(storeMarker);

}





storeMarker = L.marker([

store_latitude,

store_longitude

]).addTo(storeMap);

});

}





// تبديل الصفحات

function showSection(sectionId){


let sections = document.querySelectorAll('.section');



sections.forEach(section => {

section.classList.remove('active');

});



document

.getElementById(sectionId)

.classList.add('active');

}





// تغيير نوع الحساب

function changeRegisterForm(){


let type = document

.getElementById("account_type")

.value;





document.getElementById("customerForm")

.style.display = "none";


document.getElementById("storeForm")

.style.display = "none";


document.getElementById("driverForm")

.style.display = "none";






if(type == "customer"){


document.getElementById("customerForm")

.style.display = "block";



setTimeout(function(){

loadMap();

},500);

}






if(type == "store"){


document.getElementById("storeForm")

.style.display = "block";



setTimeout(function(){

loadStoreMap();

},500);

}






if(type == "driver"){


document.getElementById("driverForm")

.style.display = "block";

}

}





function login(){

alert("هنا تضيف كود تسجيل الدخول");

}



function registerAccount(){

alert("هنا تضيف كود إنشاء الحساب");

}


</script>

</body>

</html>
