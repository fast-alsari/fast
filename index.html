<!DOCTYPE html>
<html lang="ar" dir="rtl">

<head>

<meta charset="UTF-8">

<meta name="viewport"
content="width=device-width, initial-scale=1.0">

<title>عالسريع</title>

<link rel="icon" href="Logo.png">

<link rel="apple-touch-icon" href="Logo.png">

<meta name="apple-mobile-web-app-capable" content="yes">

<meta name="apple-mobile-web-app-status-bar-style" content="default">

<link rel="preconnect"
href="https://fonts.googleapis.com">

<link rel="preconnect"
href="https://fonts.gstatic.com"
crossorigin>

<link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;500;600;700&display=swap"
rel="stylesheet">

<link rel="stylesheet"
href="style.css">

<link rel="stylesheet"
href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css"/>

<link rel="stylesheet"
href="https://unpkg.com/leaflet/dist/leaflet.css"/>

<script src="https://unpkg.com/leaflet/dist/leaflet.js"></script>

</head>

<body>

<div class="container">

<!-- تسجيل الدخول -->

<div id="loginSection"
class="card section active">

<div class="logo">
<img src="Logo.png">
</div>

<p class="app-text">
نوصلك طلبك عالسريع
</p>

<h2 class="title">
تسجيل الدخول
</h2>

<input
type="tel"
id="login_phone"
placeholder="رقم الهاتف">

<div class="password-box">

<input
type="password"
id="login_password"
placeholder="الرمز السري">

<i class="fa-solid fa-eye"
onclick="togglePassword('login_password',this)">
</i>

</div>

<button onclick="login()">
تسجيل الدخول
</button>

<div class="link">

<a onclick="showSection('registerSection')">
إنشاء حساب
</a>

</div>

</div>

<!-- إنشاء حساب -->

<div id="registerSection"
class="card section">

<div class="logo">
<img src="Logo.png">
</div>

<h2 class="title">
إنشاء حساب
</h2>

<select
id="account_type"
onchange="changeRegisterForm()">

<option value="">
اختر نوع الحساب
</option>

<option value="customer">
زبون
</option>

<option value="store">
متجر
</option>

<option value="driver">
سائق توصيل
</option>

<option value="taxi">
تكسي
</option>

</select>

<!-- الزبون -->

<div id="customerForm"
style="display:none;">

<input
type="text"
id="customer_name"
placeholder="الاسم الكامل">

<input
type="tel"
id="customer_phone"
placeholder="رقم الهاتف">

<div class="password-box">

<input
type="password"
id="customer_password"
placeholder="الرمز السري">

<i class="fa-solid fa-eye"
onclick="togglePassword('customer_password',this)">
</i>

</div>

</div>

<!-- المتجر -->

<div id="storeForm"
style="display:none;">

<input
type="text"
id="store_owner_name"
placeholder="اسم صاحب المتجر">

<input
type="text"
id="store_name"
placeholder="اسم المتجر">

<input
type="tel"
id="store_phone"
placeholder="رقم الهاتف">

<select id="store_category">

<option value="">
نوع المتجر
</option>

<option>مطعم</option>
<option>ماركت</option>
<option>مخبز</option>
<option>صيدلية</option>
<option>ملابس</option>
<option>الكترونيات</option>

</select>

<div class="password-box">

<input
type="password"
id="store_password"
placeholder="الرمز السري">

<i class="fa-solid fa-eye"
onclick="togglePassword('store_password',this)">
</i>

</div>

<p class="upload-title">
صورة المتجر
</p>

<input
type="file"
id="store_image"
accept="image/*">

<p class="upload-title">
صورة الهوية
</p>

<input
type="file"
id="store_card_image"
accept="image/*">

<div class="work-times">

<h3>
أوقات الدوام
</h3>

<div id="daysContainer"></div>

</div>

<p class="map-title">
حدد موقع المتجر
</p>

<div id="storeMap"
class="map-box"></div>

</div>

<!-- سائق -->

<div id="driverForm"
style="display:none;">

<input
type="text"
id="driver_name"
placeholder="الاسم الكامل">

<input
type="tel"
id="driver_phone"
placeholder="رقم الهاتف">

<select id="driver_vehicle">

<option value="دراجة">
دراجة
</option>

<option value="سيارة">
سيارة
</option>

</select>

<div class="password-box">

<input
type="password"
id="driver_password"
placeholder="الرمز السري">

<i class="fa-solid fa-eye"
onclick="togglePassword('driver_password',this)">
</i>

</div>

<p class="upload-title">
صورة الهوية
</p>

<input
type="file"
id="driver_card_image"
accept="image/*">

<p class="upload-title">
صورة المركبة
</p>

<input
type="file"
id="driver_vehicle_image"
accept="image/*">

</div>

<!-- تكسي -->

<div id="taxiForm"
style="display:none;">

<input
type="text"
id="taxi_name"
placeholder="اسم السائق">

<input
type="tel"
id="taxi_phone"
placeholder="رقم الهاتف">

<select id="taxi_vehicle">

<option value="سيارة">
سيارة
</option>

<option value="دراجة">
دراجة
</option>

</select>

<input
type="text"
id="taxi_plate"
placeholder="رقم المركبة">

<select id="taxi_color">

<option value="">
لون المركبة
</option>

<option>ابيض</option>
<option>اسود</option>
<option>احمر</option>
<option>ازرق</option>

</select>

<div class="password-box">

<input
type="password"
id="taxi_password"
placeholder="الرمز السري">

<i class="fa-solid fa-eye"
onclick="togglePassword('taxi_password',this)">
</i>

</div>

<p class="upload-title">
صورة الهوية
</p>

<input
type="file"
id="taxi_card_image"
accept="image/*">

<p class="upload-title">
صورة المركبة
</p>

<input
type="file"
id="taxi_vehicle_image"
accept="image/*">

</div>

<button onclick="registerAccount()">
إنشاء الحساب
</button>

<div class="link">

<a onclick="showSection('loginSection')">
العودة لتسجيل الدخول
</a>

</div>

</div>

<!-- الانتظار -->

<div id="pendingSection"
class="card section">

<div class="logo">
<img src="Logo.png">
</div>

<h2 class="title">
تم استلام طلبك
</h2>

<p id="pendingMessage">

انتظر تفعيل الحساب

</p>

</div>

</div>

<script type="module">

// Firebase

import { initializeApp }
from
"https://www.gstatic.com/firebasejs/12.13.0/firebase-app.js";

import {
getDatabase,
ref,
set,
get,
child
}
from
"https://www.gstatic.com/firebasejs/12.13.0/firebase-database.js";

const firebaseConfig = {

apiKey:"AIzaSyC7QzQTYMSGRV_nraJBneBqDqYGhugF0Pw",

authDomain:"fast-937c9.firebaseapp.com",

projectId:"fast-937c9",

storageBucket:"fast-937c9.firebasestorage.app",

messagingSenderId:"221388561840",

appId:"1:221388561840:web:ec9d75183ddd7d44be0a75",

databaseURL:
"https://fast-937c9-default-rtdb.europe-west1.firebasedatabase.app"

};

const app =
initializeApp(firebaseConfig);

const database =
getDatabase(app);

// ImgBB

const IMGBB_API_KEY =
"fa7d8e3e0c7fbc7686b65048fff45913";

async function uploadImage(file){

if(!file){
return "";
}

const formData =
new FormData();

formData.append("image",file);

const response =
await fetch(
`https://api.imgbb.com/1/upload?key=${IMGBB_API_KEY}`,
{
method:"POST",
body:formData
}
);

const data =
await response.json();

return data.data.url;

}

// الجلسة

function saveSession(user){

localStorage.setItem(
"user",
JSON.stringify(user)
);

sessionStorage.setItem(
"user",
JSON.stringify(user)
);

}

// الصفحات

window.showSection = function(id){

document
.querySelectorAll(".section")
.forEach(section=>{

section.classList.remove("active");

});

document
.getElementById(id)
.classList.add("active");

};

// اظهار كلمة السر

window.togglePassword =
function(id,icon){

let input =
document.getElementById(id);

if(input.type === "password"){

input.type = "text";

icon.classList.replace(
"fa-eye",
"fa-eye-slash"
);

}else{

input.type = "password";

icon.classList.replace(
"fa-eye-slash",
"fa-eye"
);

}

};

// تغيير نوع الحساب

window.changeRegisterForm =
function(){

let type =
document.getElementById("account_type").value;

document
.querySelectorAll(
"#customerForm,#storeForm,#driverForm,#taxiForm"
)
.forEach(form=>{

form.style.display="none";

});

if(type==="customer"){

document.getElementById("customerForm")
.style.display="block";

}

if(type==="store"){

document.getElementById("storeForm")
.style.display="block";

if(!storeMap){

setTimeout(loadStoreMap,300);

}

}

if(type==="driver"){

document.getElementById("driverForm")
.style.display="block";

}

if(type==="taxi"){

document.getElementById("taxiForm")
.style.display="block";

}

};

// الخريطة

let storeMap;
let storeMarker;

let storeLatitude = "";
let storeLongitude = "";

function loadStoreMap(){

storeMap =
L.map("storeMap")
.setView([35.4893,43.2275],13);

L.tileLayer(
'https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png'
).addTo(storeMap);

storeMap.on("click",function(e){

storeLatitude =
e.latlng.lat;

storeLongitude =
e.latlng.lng;

if(storeMarker){

storeMap.removeLayer(storeMarker);

}

storeMarker =
L.marker([
storeLatitude,
storeLongitude
]).addTo(storeMap);

});

}

// الدوام

const days = [
"الأحد",
"الاثنين",
"الثلاثاء",
"الأربعاء",
"الخميس",
"الجمعة",
"السبت"
];

const hours = [
"مغلق",
"1 AM","2 AM","3 AM","4 AM",
"5 AM","6 AM","7 AM","8 AM",
"9 AM","10 AM","11 AM","12 AM",
"1 PM","2 PM","3 PM","4 PM",
"5 PM","6 PM","7 PM","8 PM",
"9 PM","10 PM","11 PM","12 PM"
];

const daysContainer =
document.getElementById("daysContainer");

days.forEach((day,index)=>{

daysContainer.innerHTML += `

<div class="day-row">

<label>${day}</label>

<select id="from_${index}">

<option value="">
من
</option>

${hours.map(hour=>`
<option value="${hour}">
${hour}
</option>
`).join("")}

</select>

<select id="to_${index}">

<option value="">
إلى
</option>

${hours.map(hour=>`
<option value="${hour}">
${hour}
</option>
`).join("")}

</select>

</div>

`;

});

// فحص الهاتف

async function phoneExists(phone){

const snapshot =
await get(
child(ref(database),"users")
);

if(!snapshot.exists()){
return false;
}

const data = snapshot.val();

for(let key in data){

if(data[key].phone === phone){

return true;

}

}

return false;

}

// إنشاء الحساب

window.registerAccount =
async function(){

let type =
document.getElementById("account_type").value;

if(type === ""){

alert("اختر نوع الحساب");

return;

}

let userData = {

id:"",
type:type,
status:"pending",

name:"",
owner_name:"",

phone:"",
password:"",

image:"",
card_image:"",
vehicle_image:"",

vehicle:"",
plate:"",
color:"",

category:"",

location:{
latitude:"",
longitude:""
},

workingHours:[],

createdAt:Date.now()

};

// زبون

if(type==="customer"){

userData.id =
"CUS"+Date.now();

userData.status =
"active";

userData.name =
document.getElementById("customer_name").value;

userData.phone =
document.getElementById("customer_phone").value;

userData.password =
document.getElementById("customer_password").value;

}

// متجر

if(type==="store"){

userData.id =
"STORE"+Date.now();

userData.name =
document.getElementById("store_name").value;

userData.owner_name =
document.getElementById("store_owner_name").value;

userData.phone =
document.getElementById("store_phone").value;

userData.password =
document.getElementById("store_password").value;

userData.category =
document.getElementById("store_category").value;

userData.location.latitude =
storeLatitude;

userData.location.longitude =
storeLongitude;

userData.image =
await uploadImage(
document.getElementById("store_image").files[0]
);

userData.card_image =
await uploadImage(
document.getElementById("store_card_image").files[0]
);

days.forEach((day,index)=>{

userData.workingHours.push({

day:day,

from:
document.getElementById(`from_${index}`).value,

to:
document.getElementById(`to_${index}`).value

});

});

}

// دليفري

if(type==="driver"){

userData.id =
"DRV"+Date.now();

userData.name =
document.getElementById("driver_name").value;

userData.phone =
document.getElementById("driver_phone").value;

userData.password =
document.getElementById("driver_password").value;

userData.vehicle =
document.getElementById("driver_vehicle").value;

userData.card_image =
await uploadImage(
document.getElementById("driver_card_image").files[0]
);

userData.vehicle_image =
await uploadImage(
document.getElementById("driver_vehicle_image").files[0]
);

}

// تكسي

if(type==="taxi"){

userData.id =
"TAXI"+Date.now();

userData.name =
document.getElementById("taxi_name").value;

userData.phone =
document.getElementById("taxi_phone").value;

userData.password =
document.getElementById("taxi_password").value;

userData.vehicle =
document.getElementById("taxi_vehicle").value;

userData.plate =
document.getElementById("taxi_plate").value;

userData.color =
document.getElementById("taxi_color").value;

userData.card_image =
await uploadImage(
document.getElementById("taxi_card_image").files[0]
);

userData.vehicle_image =
await uploadImage(
document.getElementById("taxi_vehicle_image").files[0]
);

}

// فحص الرقم

if(await phoneExists(userData.phone)){

alert("رقم الهاتف مستخدم");

return;

}

// حفظ

await set(
ref(database,"users/"+userData.id),
userData
);

saveSession(userData);

// توجيه

if(userData.status !== "active"){

showSection("pendingSection");

return;

}

if(userData.type==="customer"){

window.location.href =
"home.html";

}

};

// تسجيل الدخول

window.login =
async function(){

let phone =
document.getElementById("login_phone").value;

let password =
document.getElementById("login_password").value;

const snapshot =
await get(
child(ref(database),"users")
);

if(!snapshot.exists()){

alert("لا توجد حسابات");

return;

}

const data =
snapshot.val();

for(let key in data){

let user = data[key];

if(
user.phone === phone &&
user.password === password
){

saveSession(user);

if(user.status !== "active"){

showSection("pendingSection");

return;

}

if(user.type==="customer"){

window.location.href =
"home.html";

}

if(user.type==="store"){

window.location.href =
"store.html";

}

if(user.type==="driver"){

window.location.href =
"drive.html";

}

if(user.type==="taxi"){

window.location.href =
"tixe.html";

}

return;

}

}

alert("بيانات الدخول غير صحيحة");

};

// تسجيل خروج

window.logout = function(){

localStorage.clear();

sessionStorage.clear();

window.location.href =
"index.html";

};

</script>

</body>
</html>
