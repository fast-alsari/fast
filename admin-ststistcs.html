<!-- admin-statistics.html -->

<!DOCTYPE html>
<html lang="ar" dir="rtl">

<head>

<meta charset="UTF-8">

<meta
name="viewport"
content="width=device-width, initial-scale=1.0">

<title>
إحصائيات النظام
</title>

<link
href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;500;700;800&display=swap"
rel="stylesheet">

<link
rel="stylesheet"
href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css"/>

<style>

*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:'Cairo',sans-serif;
}

body{
background:#f5f6fa;
padding-bottom:100px;
overflow-x:hidden;
}

.header{
background:
linear-gradient(
135deg,
#ff8800,
#ff5500
);

padding:25px 20px;
color:white;

border-bottom-left-radius:30px;
border-bottom-right-radius:30px;

box-shadow:0 8px 25px rgba(0,0,0,.12);
}

.header h1{
font-size:28px;
margin-bottom:8px;
}

.header p{
font-size:14px;
opacity:.95;
}

.stats-grid{
padding:15px;
display:grid;
grid-template-columns:repeat(auto-fit,minmax(220px,1fr));
gap:15px;
}

.stat-card{
background:white;
padding:25px 20px;
border-radius:28px;
box-shadow:0 5px 18px rgba(0,0,0,.06);
text-align:center;
}

.stat-icon{
width:70px;
height:70px;
margin:auto;
border-radius:50%;
display:flex;
align-items:center;
justify-content:center;
font-size:28px;
margin-bottom:15px;
color:white;
}

.orange{
background:#ff8800;
}

.green{
background:#00b894;
}

.blue{
background:#2563eb;
}

.red{
background:#e53935;
}

.purple{
background:#7c3aed;
}

.dark{
background:#111827;
}

.stat-number{
font-size:34px;
font-weight:bold;
margin-bottom:10px;
color:#222;
}

.stat-title{
font-size:15px;
font-weight:bold;
color:#666;
}

.section{
padding:0 15px 20px;
}

.section-title{
font-size:22px;
font-weight:bold;
margin-bottom:15px;
color:#333;
}

.info-box{
background:white;
padding:20px;
border-radius:25px;
box-shadow:0 5px 18px rgba(0,0,0,.06);
margin-bottom:15px;
}

.info-line{
display:flex;
justify-content:space-between;
padding:14px 0;
border-bottom:1px solid #eee;
font-size:15px;
}

.info-line:last-child{
border-bottom:none;
}

.bottom-bar{
position:fixed;
bottom:0;
left:0;
right:0;
height:82px;
background:white;
display:flex;
justify-content:space-around;
align-items:center;
box-shadow:0 -5px 18px rgba(0,0,0,.08);
}

.nav-item{
display:flex;
flex-direction:column;
align-items:center;
gap:5px;
font-size:13px;
font-weight:bold;
color:#888;
cursor:pointer;
}

.nav-item.active{
color:#ff8800;
}

.nav-item i{
font-size:22px;
}

</style>

</head>

<body>

<div class="header">

<h1>
إحصائيات التطبيق
</h1>

<p>
متابعة أداء التطبيق بالكامل
</p>

</div>

<div class="stats-grid">

<div class="stat-card">

<div class="stat-icon orange">

<i class="fa-solid fa-box"></i>

</div>

<div
class="stat-number"
id="ordersCount">

0

</div>

<div class="stat-title">
كل الطلبات
</div>

</div>

<div class="stat-card">

<div class="stat-icon green">

<i class="fa-solid fa-money-bill-wave"></i>

</div>

<div
class="stat-number"
id="profitsCount">

0

</div>

<div class="stat-title">
إجمالي الأرباح
</div>

</div>

<div class="stat-card">

<div class="stat-icon blue">

<i class="fa-solid fa-store"></i>

</div>

<div
class="stat-number"
id="storesCount">

0

</div>

<div class="stat-title">
عدد المتاجر
</div>

</div>

<div class="stat-card">

<div class="stat-icon red">

<i class="fa-solid fa-motorcycle"></i>

</div>

<div
class="stat-number"
id="driversCount">

0

</div>

<div class="stat-title">
عدد السواق
</div>

</div>

<div class="stat-card">

<div class="stat-icon purple">

<i class="fa-solid fa-taxi"></i>

</div>

<div
class="stat-number"
id="taxisCount">

0

</div>

<div class="stat-title">
عدد التكاسي
</div>

</div>

<div class="stat-card">

<div class="stat-icon dark">

<i class="fa-solid fa-users"></i>

</div>

<div
class="stat-number"
id="customersCount">

0

</div>

<div class="stat-title">
عدد المستخدمين
</div>

</div>

</div>

<div class="section">

<div class="section-title">
إحصائيات التوصيل
</div>

<div class="info-box">

<div class="info-line">

<span>
طلبات مكتملة
</span>

<b id="completedOrders">
0
</b>

</div>

<div class="info-line">

<span>
طلبات ملغية
</span>

<b id="cancelledOrders">
0
</b>

</div>

<div class="info-line">

<span>
طلبات قيد التوصيل
</span>

<b id="activeOrders">
0
</b>

</div>

<div class="info-line">

<span>
رحلات التكسي المكتملة
</span>

<b id="completedTaxiTrips">
0
</b>

</div>

</div>

</div>

<div class="bottom-bar">

<div
class="nav-item"
onclick="window.location.href='admin-orders.html'">

<i class="fa-solid fa-box"></i>

<span>
الطلبات
</span>

</div>

<div
class="nav-item"
onclick="window.location.href='admin-users.html'">

<i class="fa-solid fa-users"></i>

<span>
المستخدمين
</span>

</div>

<div class="nav-item active">

<i class="fa-solid fa-chart-column"></i>

<span>
الإحصائيات
</span>

</div>

</div>

<script type="module">

import { db }
from "./config.js";

import {

ref,
onValue

}

from
"https://www.gstatic.com/firebasejs/12.13.0/firebase-database.js";

function setText(id,value){

document.getElementById(id)
.innerHTML = value;

}

// ====================
// الطلبات
// ====================

onValue(
ref(db,"orders"),
(snapshot)=>{

let total = 0;
let profits = 0;
let completed = 0;
let cancelled = 0;
let active = 0;

if(snapshot.exists()){

const orders =
snapshot.val();

Object.values(orders)
.forEach(order=>{

total++;

profits +=
Number(order.deliveryPrice || 0);

if(
order.status === "delivered"
){
completed++;
}

if(
[
"cancelled",
"cancelled_by_customer",
"failed_no_driver"
]
.includes(order.status)
){
cancelled++;
}

if(
[
"accepted",
"on_the_way",
"arrived",
"picked_up"
]
.includes(order.status)
){
active++;
}

});

}

setText(
"ordersCount",
total
);

setText(
"profitsCount",
profits.toLocaleString()
);

setText(
"completedOrders",
completed
);

setText(
"cancelledOrders",
cancelled
);

setText(
"activeOrders",
active
);

}
);

// ====================
// المستخدمين
// ====================

onValue(
ref(db,"customers"),
(snapshot)=>{

const count =
snapshot.exists()
?
Object.keys(snapshot.val()).length
:
0;

setText(
"customersCount",
count
);

}
);

// ====================
// المتاجر
// ====================

onValue(
ref(db,"stores"),
(snapshot)=>{

const count =
snapshot.exists()
?
Object.keys(snapshot.val()).length
:
0;

setText(
"storesCount",
count
);

}
);

// ====================
// السواق
// ====================

onValue(
ref(db,"drivers"),
(snapshot)=>{

const count =
snapshot.exists()
?
Object.keys(snapshot.val()).length
:
0;

setText(
"driversCount",
count
);

}
);

// ====================
// التكاسي
// ====================

onValue(
ref(db,"taxis"),
(snapshot)=>{

let count = 0;
let completedTrips = 0;

if(snapshot.exists()){

const taxis =
snapshot.val();

count =
Object.keys(taxis).length;

Object.values(taxis)
.forEach(taxi=>{

completedTrips +=
Number(
taxi.completedTrips || 0
);

});

}

setText(
"taxisCount",
count
);

setText(
"completedTaxiTrips",
completedTrips
);

}
);

</script>

</body>

</html>
