<!DOCTYPE html>
<html lang="ar" dir="rtl">

<head>

<meta charset="UTF-8">

<meta
name="viewport"
content="width=device-width, initial-scale=1.0">

<title>
لوحة السائق
</title>

<link
rel="stylesheet"
href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css"/>

<link
rel="stylesheet"
href="https://unpkg.com/leaflet/dist/leaflet.css"/>

<link
rel="stylesheet"
href="https://unpkg.com/leaflet-routing-machine/dist/leaflet-routing-machine.css"/>

<script src="https://unpkg.com/leaflet/dist/leaflet.js"></script>

<script src="https://unpkg.com/leaflet-routing-machine/dist/leaflet-routing-machine.js"></script>

<link
href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;500;600;700;800&display=swap"
rel="stylesheet">

<style>

*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:'Cairo',sans-serif;
-webkit-tap-highlight-color:transparent;
}

body{
background:#f5f6fa;
padding-bottom:120px;
overflow-x:hidden;
}

.header{
background:
linear-gradient(
135deg,
#ff8800,
#ff5500
);

padding:22px;
color:white;

border-bottom-left-radius:30px;
border-bottom-right-radius:30px;
}

.driver-box{
display:flex;
align-items:center;
gap:14px;
}

.driver-image{
width:80px;
height:80px;
border-radius:50%;
object-fit:cover;
background:white;
border:3px solid white;
}

.driver-info h2{
font-size:24px;
margin-bottom:5px;
}

.driver-info p{
font-size:14px;
opacity:.9;
}

.online-btn{
margin-top:20px;
width:100%;
height:55px;
border:none;
border-radius:18px;
background:white;
color:#00b894;
font-size:16px;
font-weight:bold;
cursor:pointer;
}

.stats{
display:grid;
grid-template-columns:1fr 1fr 1fr;
gap:12px;
padding:15px;
}

.stat-card{
background:white;
padding:18px;
border-radius:22px;
text-align:center;

box-shadow:
0 5px 18px rgba(0,0,0,.06);
}

.stat-card h2{
font-size:28px;
color:#ff6600;
margin-bottom:6px;
}

.stat-card p{
font-size:13px;
font-weight:bold;
color:#666;
}

.orders-container{
padding:15px;
display:flex;
flex-direction:column;
gap:18px;
}

.order-card{
background:white;
padding:18px;
border-radius:28px;

box-shadow:
0 5px 18px rgba(0,0,0,.06);
}

.order-top{
display:flex;
justify-content:space-between;
align-items:center;
margin-bottom:15px;
}

.order-price{
font-size:28px;
font-weight:bold;
color:#00b894;
}

.order-status{
padding:8px 14px;
border-radius:14px;
font-size:13px;
font-weight:bold;
background:#fff3e0;
color:#ff6600;
}

.customer-box{
background:#f8f8f8;
padding:15px;
border-radius:18px;
margin-bottom:15px;
}

.customer-box h3{
margin-bottom:8px;
}

.customer-box p{
font-size:14px;
color:#666;
margin-bottom:5px;
}

.map-box{
width:100%;
height:320px;
border-radius:22px;
overflow:hidden;
margin-bottom:15px;
}

.info-grid{
display:grid;
grid-template-columns:1fr 1fr;
gap:12px;
margin-bottom:15px;
}

.info-card{
background:#f8f8f8;
padding:14px;
border-radius:18px;
text-align:center;
}

.info-card h4{
font-size:13px;
color:#777;
margin-bottom:6px;
}

.info-card p{
font-size:16px;
font-weight:bold;
}

.actions{
display:flex;
flex-wrap:wrap;
gap:10px;
}

.actions button,
.actions a{
flex:1;
height:52px;
border:none;
border-radius:18px;
font-size:14px;
font-weight:bold;
cursor:pointer;
text-decoration:none;

display:flex;
align-items:center;
justify-content:center;

color:white;
}

.accept-btn{
background:#00b894;
}

.reject-btn{
background:#e53935;
}

.whatsapp-btn{
background:#25D366;
}

.store-btn{
background:#7c3aed;
}

.pickup-btn{
background:#2563eb;
}

.finish-btn{
background:#ff8800;
}

.empty{
padding:80px 20px;
text-align:center;
color:#777;
}

.loading{
position:fixed;
inset:0;
background:white;

display:flex;
align-items:center;
justify-content:center;

z-index:99999;
}

.spinner{
width:70px;
height:70px;
border:5px solid #eee;
border-top:5px solid #ff8800;
border-radius:50%;

animation:spin .8s linear infinite;
}

@keyframes spin{
100%{
transform:rotate(360deg);
}
}

.bottom-bar{
position:fixed;
bottom:0;
left:0;
right:0;
height:82px;

background:white;

display:flex;
justify-content:space-around;
align-items:center;

box-shadow:
0 -5px 18px rgba(0,0,0,.08);
}

.nav-item{
display:flex;
flex-direction:column;
align-items:center;
gap:5px;

color:#888;
font-size:13px;
font-weight:bold;

cursor:pointer;
}

.nav-item.active{
color:#ff8800;
}

.nav-item i{
font-size:22px;
}

@media(max-width:700px){

.stats{
grid-template-columns:1fr;
}

.info-grid{
grid-template-columns:1fr;
}

}

</style>

</head>

<body>

<div
class="loading"
id="loading">

<div class="spinner"></div>

</div>

<div class="header">

<div class="driver-box">

<img
src="user.png"
id="driverImage"
class="driver-image">

<div class="driver-info">

<h2 id="driverName">
السائق
</h2>

<p id="driverPhone">
000000000
</p>

</div>

</div>

<button
class="online-btn"
id="onlineBtn"
onclick="toggleOnline()">

متصل الآن

</button>

</div>

<div class="stats">

<div class="stat-card">

<h2 id="completedOrders">
0
</h2>

<p>
طلبات مكتملة
</p>

</div>

<div class="stat-card">

<h2 id="totalProfit">
0
</h2>

<p>
الأرباح
</p>

</div>

<div class="stat-card">

<h2 id="cancelledOrders">
0
</h2>

<p>
طلبات ملغية
</p>

</div>

</div>

<div
id="ordersContainer"
class="orders-container"></div>

<div class="bottom-bar">

<div class="nav-item active">

<i class="fa-solid fa-motorcycle"></i>

<span>
الطلبات
</span>

</div>

<div
class="nav-item"
onclick="window.location.href='asca.html'">

<i class="fa-solid fa-user"></i>

<span>
الحساب
</span>

</div>

</div>

<script type="module">

import { db }
from "./firebase.js";

import {

ref,
onValue,
update,
get

}

from "https://www.gstatic.com/firebasejs/12.13.0/firebase-database.js";

const currentUser =
JSON.parse(
localStorage.getItem("user")
);

if(
!currentUser ||
currentUser.type !== "driver"
){

window.location.replace(
"index.html"
);

}

let driverLat = null;
let driverLng = null;

let isOnline = true;

document.getElementById(
"driverName"
).innerHTML =

currentUser.name || "سائق";

document.getElementById(
"driverPhone"
).innerHTML =

currentUser.phone || "";

document.getElementById(
"driverImage"
).src =

currentUser.image || "user.png";

document.getElementById(
"completedOrders"
).innerHTML =

currentUser.completedOrders || 0;

document.getElementById(
"cancelledOrders"
).innerHTML =

currentUser.cancelledOrders || 0;

document.getElementById(
"totalProfit"
).innerHTML =

Number(
currentUser.totalProfit || 0
).toLocaleString();

// =====================
// GPS مباشر
// =====================

navigator.geolocation.watchPosition(

async(position)=>{

driverLat =
position.coords.latitude;

driverLng =
position.coords.longitude;

await update(
ref(
db,
"drivers/" + currentUser.id
),
{

latitude:driverLat,
longitude:driverLng,
lastSeen:Date.now()

}
);

},

(error)=>{

console.log(error);

},

{
enableHighAccuracy:true,
maximumAge:3000,
timeout:10000
}

);

// =====================
// اونلاين
// =====================

window.toggleOnline =
async function(){

isOnline = !isOnline;

const btn =
document.getElementById(
"onlineBtn"
);

btn.innerHTML =

isOnline
?
"متصل الآن"
:
"متوقف";

btn.style.color =

isOnline
?
"#00b894"
:
"#e53935";

await update(
ref(
db,
"drivers/" + currentUser.id
),
{

isOnline:isOnline

}
);

};

// =====================
// الطلبات
// =====================

const ordersContainer =
document.getElementById(
"ordersContainer"
);

onValue(
ref(db,"orders"),
(snapshot)=>{

ordersContainer.innerHTML = "";

if(!snapshot.exists()){

ordersContainer.innerHTML = `

<div class="empty">

لا توجد طلبات حالياً

</div>

`;

hideLoading();

return;

}

const orders =
snapshot.val();

let found = false;

for(let key in orders){

const order =
orders[key];

if(
order.status !== "waiting_driver"
&&
order.driverId !== currentUser.id
){
continue;
}

found = true;

ordersContainer.innerHTML += `

<div class="order-card">

<div class="order-top">

<div class="order-status">

${getStatusText(order.status)}

</div>

<div class="order-price">

${Number(order.deliveryPrice || 0)
.toLocaleString()} د.ع

</div>

</div>

<div class="customer-box">

<h3>
${order.customerName || ""}
</h3>

<p>
📞 ${order.customerPhone || ""}
</p>

<p>
📍 ${order.customerAddress || ""}
</p>

</div>

<div
class="map-box"
id="map_${order.id}"></div>

<div class="info-grid">

<div class="info-card">

<h4>
عدد المنتجات
</h4>

<p>
${order.products?.length || 0}
</p>

</div>

<div class="info-card">

<h4>
السعر الكلي
</h4>

<p>

${Number(order.finalTotal || 0)
.toLocaleString()} د.ع

</p>

</div>

</div>

<div class="actions">

${order.status === "waiting_driver"

?

`

<button
class="accept-btn"
onclick="acceptOrder('${order.id}')">

قبول الطلب

</button>

<button
class="reject-btn"
onclick="rejectOrder('${order.id}')">

رفض

</button>

`

:

`

<a
href="https://wa.me/${order.customerPhone}"
target="_blank"
class="whatsapp-btn">

واتساب

</a>

<button
class="store-btn"
onclick="goToStore('${order.id}')">

استلام الطلب

</button>

<button
class="pickup-btn"
onclick="startDelivery('${order.id}')">

بدء التوصيل

</button>

<button
class="finish-btn"
onclick="finishOrder('${order.id}')">

تم التوصيل

</button>

`

}

</div>

</div>

`;

setTimeout(()=>{

createMap(order);

},100);

}

if(!found){

ordersContainer.innerHTML = `

<div class="empty">

لا توجد طلبات حالياً

</div>

`;

}

hideLoading();

}
);

// =====================
// الخريطة
// =====================

function createMap(order){

const map =
L.map(
`map_${order.id}`
).setView(
[
order.customerLat,
order.customerLng
],
13
);

L.tileLayer(
'https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png',
{
maxZoom:19
}
).addTo(map);

if(driverLat && driverLng){

L.marker(
[
driverLat,
driverLng
]
).addTo(map);

}

L.marker(
[
order.customerLat,
order.customerLng
]
).addTo(map);

if(
order.storesData &&
order.storesData.length > 0
){

const store =
order.storesData[0];

if(
store.storeLat &&
store.storeLng
){

L.marker(
[
store.storeLat,
store.storeLng
]
).addTo(map);

L.polyline([
[
store.storeLat,
store.storeLng
],
[
order.customerLat,
order.customerLng
]
],
{
color:"#ff8800",
weight:5
}
).addTo(map);

}

}

}

// =====================
// قبول الطلب
// =====================

window.acceptOrder =
async function(orderId){

await update(
ref(
db,
"orders/" + orderId
),
{

status:"accepted",

driverId:
currentUser.id,

driverName:
currentUser.name,

driverPhone:
currentUser.phone,

driverLat:
driverLat,

driverLng:
driverLng,

acceptedAt:
Date.now()

}
);

};

// =====================
// رفض
// =====================

window.rejectOrder =
async function(orderId){

await update(
ref(
db,
"orders/" + orderId
),
{

status:"waiting_driver"

}
);

};

// =====================
// استلام الطلب
// =====================

window.goToStore =
async function(orderId){

await update(
ref(
db,
"orders/" + orderId
),
{

status:"picked_up",

pickedUpAt:
Date.now()

}
);

};

// =====================
// بدء التوصيل
// =====================

window.startDelivery =
async function(orderId){

await update(
ref(
db,
"orders/" + orderId
),
{

status:"on_the_way",

startedDeliveryAt:
Date.now()

}
);

};

// =====================
// إنهاء
// =====================

window.finishOrder =
async function(orderId){

const orderSnapshot =
await get(
ref(
db,
"orders/" + orderId
)
);

if(orderSnapshot.exists()){

const order =
orderSnapshot.val();

await update(
ref(
db,
"drivers/" + currentUser.id
),
{

completedOrders:
Number(
currentUser.completedOrders || 0
) + 1,

totalProfit:
Number(
currentUser.totalProfit || 0
)
+
Number(order.deliveryPrice || 0)

}
);

}

await update(
ref(
db,
"orders/" + orderId
),
{

status:"delivered",

deliveredAt:
Date.now()

}
);

alert("تم توصيل الطلب");

};

// =====================
// الحالة
// =====================

function getStatusText(status){

if(status === "waiting_driver"){
return "بانتظار سائق";
}

if(status === "accepted"){
return "تم قبول الطلب";
}

if(status === "picked_up"){
return "تم استلام الطلب";
}

if(status === "on_the_way"){
return "بالطريق";
}

if(status === "delivered"){
return "تم التوصيل";
}

return status;

}

// =====================
// loading
// =====================

function hideLoading(){

document.getElementById(
"loading"
).style.display = "none";

}

</script>

</body>

</html>
