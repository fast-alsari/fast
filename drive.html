<!DOCTYPE html>
<html lang="ar" dir="rtl">

<head>

<meta charset="UTF-8">

<meta
name="viewport"
content="width=device-width, initial-scale=1.0"
/>

<title>
طلبات التوصيل
</title>

<link
href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;600;700;800&display=swap"
rel="stylesheet"
/>

<link
rel="stylesheet"
href="https://unpkg.com/leaflet/dist/leaflet.css"
/>

<script
src="https://unpkg.com/leaflet/dist/leaflet.js">
</script>

<link
rel="stylesheet"
href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css"
/>

<style>

*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:'Cairo',sans-serif;
}

body{
background:#f4f6f9;
overflow-x:hidden;
padding-bottom:50px;
}

/* ================= HEADER ================= */

.header{

background:
linear-gradient(
135deg,
#ff8a00,
#ff4d00
);

padding:18px;

display:flex;
justify-content:space-between;
align-items:center;

border-bottom-left-radius:30px;
border-bottom-right-radius:30px;

color:white;

box-shadow:
0 10px 25px rgba(0,0,0,.12);

}

.driver-info{
display:flex;
flex-direction:column;
gap:10px;
}

.driver-name{
font-size:24px;
font-weight:800;
}

.driver-badges{
display:flex;
flex-wrap:wrap;
gap:10px;
}

.badge{
background:white;
color:#ff5b00;
padding:8px 14px;
border-radius:14px;
font-size:13px;
font-weight:700;
}

.header-left{
display:flex;
align-items:center;
gap:12px;
}

.driver-image{
width:70px;
height:70px;
border-radius:50%;
border:3px solid white;
object-fit:cover;
}

.logout-btn{

width:50px;
height:50px;

border:none;
border-radius:15px;

background:white;
color:#ff5b00;

font-size:18px;
cursor:pointer;

}

/* ================= ORDERS ================= */

.orders-container{
padding:15px;
display:flex;
flex-direction:column;
gap:18px;
}

.order-card{

background:white;

border-radius:25px;
padding:18px;

box-shadow:
0 5px 20px rgba(0,0,0,.08);

}

.order-header{
display:flex;
align-items:center;
gap:12px;
margin-bottom:15px;
}

.store-image{
width:60px;
height:60px;
border-radius:16px;
object-fit:cover;
}

.order-title{
font-size:21px;
font-weight:800;
}

.order-store{
font-size:15px;
color:#777;
margin-top:3px;
}

.order-details{
margin-top:12px;
line-height:2;
color:#555;
font-size:15px;
}

.price-box{

margin-top:15px;

padding:18px;

background:#fff4eb;

border-radius:18px;

font-size:23px;
font-weight:800;

color:#ff5b00;

text-align:center;
line-height:2;

}

.order-buttons{
display:flex;
gap:12px;
margin-top:18px;
}

.btn{

flex:1;

padding:16px;

border:none;
border-radius:18px;

font-size:17px;
font-weight:700;

cursor:pointer;

}

.accept-btn{
background:#00b894;
color:white;
}

.reject-btn{
background:#ff3b30;
color:white;
}

/* ================= DELIVERY PAGE ================= */

.delivery-page{
display:none;
}

#map{
width:100%;
height:55vh;
}

.map-controls{
padding:15px;
display:flex;
gap:10px;
}

.map-btn{

flex:1;

padding:14px;

border:none;
border-radius:15px;

background:#ff7b00;
color:white;

font-size:16px;
font-weight:700;

cursor:pointer;

}

.delivery-container{
padding:15px;
display:flex;
flex-direction:column;
gap:15px;
}

.box{

background:white;

padding:18px;

border-radius:25px;

box-shadow:
0 5px 20px rgba(0,0,0,.08);

}

.status-box{

background:#fff6e9;

color:#ff6a00;

font-size:20px;
font-weight:800;

text-align:center;

}

.timer-title{
font-size:18px;
font-weight:700;
margin-bottom:10px;
}

.timer-count{
font-size:40px;
font-weight:800;
color:red;
text-align:center;
}

.items-box{
display:flex;
flex-direction:column;
gap:12px;
margin-top:15px;
}

.item-card{

padding:14px;

border-radius:18px;

background:#fafafa;

border:1px solid #eee;

}

.item-name{
font-size:18px;
font-weight:800;
margin-bottom:8px;
}

.item-description{
color:#777;
margin-bottom:8px;
}

.item-price{
font-size:17px;
font-weight:800;
color:#ff5b00;
}

.action-btn{

width:100%;

padding:18px;

border:none;
border-radius:20px;

font-size:18px;
font-weight:800;

cursor:pointer;

margin-top:15px;

}

.arrived-btn{
background:#00b894;
color:white;
}

.delivered-btn{
background:#0984e3;
color:white;
}

.extend-btn{
background:#ff8a00;
color:white;
}

</style>

</head>

<body>

<header class="header">

<div class="driver-info">

<h2
class="driver-name"
id="driverName">

السائق

</h2>

<div class="driver-badges">

<div class="badge">

المكتملة:
<span id="completedCount">
0
</span>

</div>

<div class="badge">

الارباح:
<span id="monthProfit">
0
</span>

د.ع

</div>

<div class="badge">

الحساب:
<span id="accountType">
عادي
</span>

</div>

</div>

</div>

<div class="header-left">

<button
class="logout-btn"
id="logoutBtn">

<i class="fa-solid fa-right-from-bracket"></i>

</button>

<img
src="driver.png"
class="driver-image"
/>

</div>

</header>

<div
class="orders-container"
id="ordersContainer">

</div>

<div
class="delivery-page"
id="deliveryPage">

<div id="map"></div>

<div class="map-controls">

<button
class="map-btn"
id="zoomInBtn">

تكبير +

</button>

<button
class="map-btn"
id="zoomOutBtn">

تصغير -

</button>

<button
class="map-btn"
id="stopTrackingBtn">

ايقاف التتبع

</button>

</div>

<div class="delivery-container">

<div
class="box status-box"
id="deliveryStatus">

التوجه نحو المتجر

</div>

<div class="box">

<h2 id="customerName"></h2>

<p
style="margin-top:10px;"
id="storeName"></p>

<div class="price-box">

سعر الطلب:
<span id="productsPrice"></span>

د.ع

<br>

اجرة التوصيل:
<span id="deliveryPrice"></span>

د.ع

</div>

</div>

<div class="box">

<div
class="timer-title"
id="timerTitle">

الوقت المتبقي للوصول للمتجر

</div>

<div
class="timer-count"
id="timerCount">

15:00

</div>

<button
class="action-btn extend-btn"
id="extendTimeBtn">

طلب زيادة الوقت +10 دقائق

</button>

</div>

<div class="box">

<h3>

تفاصيل الطلب

</h3>

<div
class="items-box"
id="itemsBox">

</div>

</div>

<div class="box">

<p id="customerPhone"></p>

<p
style="margin-top:10px;"
id="customerAddress"></p>

<p
style="margin-top:10px;"
id="nearestPoint"></p>

</div>

<button
class="action-btn arrived-btn"
id="arrivedStoreBtn"
style="display:none;">

وصلت الى المتجر

</button>

<button
class="action-btn delivered-btn"
id="deliveredBtn"
style="display:none;">

تم ايصال الطلب

</button>

</div>

</div>

<script type="module">

import { initializeApp }
from "https://www.gstatic.com/firebasejs/12.13.0/firebase-app.js";

import {

getDatabase,
ref,
onValue,
update,
get,
set

}

from "https://www.gstatic.com/firebasejs/12.13.0/firebase-database.js";

/* ================= FIREBASE ================= */

const firebaseConfig = {

apiKey:"YOUR_API_KEY",

authDomain:"YOUR_DOMAIN",

databaseURL:"YOUR_DATABASE_URL",

projectId:"YOUR_PROJECT_ID",

storageBucket:"YOUR_BUCKET",

messagingSenderId:"YOUR_SENDER_ID",

appId:"YOUR_APP_ID"

};

const app =
initializeApp(firebaseConfig);

const db =
getDatabase(app);

/* ================= DRIVER ================= */

const currentDriver =
JSON.parse(
localStorage.getItem("user")
);

if(!currentDriver){

window.location.href =
"index.html";

}

document.getElementById(
"driverName"
).innerHTML =
currentDriver.name || "سائق";

document.getElementById(
"accountType"
).innerHTML =
currentDriver.subscription || "عادي";

/* ================= VARIABLES ================= */

let currentOrderId = null;

let currentOrderData = null;

let map = null;

let driverMarker = null;

let trackingWatcher = null;

let currentStage = "store";

let timerInterval = null;

let remainingSeconds = 900;

/* ================= DISTANCE ================= */

function calculateDistance(
lat1,
lon1,
lat2,
lon2
){

const R = 6371;

const dLat =
(lat2-lat1) *
Math.PI / 180;

const dLon =
(lon2-lon1) *
Math.PI / 180;

const a =

Math.sin(dLat/2) *
Math.sin(dLat/2)

+

Math.cos(lat1 * Math.PI/180)

*

Math.cos(lat2 * Math.PI/180)

*

Math.sin(dLon/2) *
Math.sin(dLon/2);

const c =
2 *
Math.atan2(
Math.sqrt(a),
Math.sqrt(1-a)
);

return R * c;

}

/* ================= LOAD ORDERS ================= */

onValue(
ref(db,"orders"),
(snapshot)=>{

const container =
document.getElementById(
"ordersContainer"
);

container.innerHTML = "";

if(!snapshot.exists()){
return;
}

const orders =
snapshot.val();

Object.keys(orders)
.forEach((orderId)=>{

const order =
orders[orderId];

if(
order.status !==
"waiting_driver"
){
return;
}

container.innerHTML += `

<div class="order-card">

<div class="order-header">

<img
src="${
order.storeImage ||
'store.png'
}"
class="store-image"
/>

<div>

<div class="order-title">

${order.customerName}

</div>

<div class="order-store">

${order.storeName}

</div>

</div>

</div>

<div class="order-details">

📞 ${order.customerPhone}

<br>

📍 ${order.customerAddress}

</div>

<div class="price-box">

سعر الطلب:
${order.productsPrice || 0}

د.ع

<br>

اجرة التوصيل:
${order.deliveryPrice || 0}

د.ع

</div>

<div class="order-buttons">

<button
class="btn accept-btn"
onclick="acceptOrder('${orderId}')">

قبول

</button>

<button
class="btn reject-btn"
onclick="rejectOrder('${orderId}')">

رفض

</button>

</div>

</div>

`;

});

});

/* ================= REJECT ORDER ================= */

window.rejectOrder =
async function(orderId){

await update(
ref(
db,
"orders/" + orderId
),
{

status:"rejected"

}
);

};

/* ================= ACCEPT ORDER ================= */

window.acceptOrder =
async function(orderId){

currentOrderId =
orderId;

const snapshot =
await get(
ref(
db,
"orders/" + orderId
)
);

if(!snapshot.exists()){

alert("الطلب غير موجود");

return;

}

const order =
snapshot.val();

currentOrderData =
order;

await update(
ref(
db,
"orders/" + orderId
),
{

status:"accepted",

driverId:
currentDriver.id,

acceptedDriver:
currentDriver.name,

acceptedAt:
Date.now()

}
);

document.getElementById(
"ordersContainer"
).style.display =
"none";

document.getElementById(
"deliveryPage"
).style.display =
"block";

fillOrderData(order);

initializeMap(order);

startTimer(900);

};

/* ================= FILL DATA ================= */

function fillOrderData(order){

document.getElementById(
"customerName"
).innerHTML =
order.customerName;

document.getElementById(
"storeName"
).innerHTML =
"المتجر: " +
order.storeName;

document.getElementById(
"productsPrice"
).innerHTML =
order.productsPrice || 0;

document.getElementById(
"deliveryPrice"
).innerHTML =
order.deliveryPrice || 0;

document.getElementById(
"customerPhone"
).innerHTML =
"📞 " +
order.customerPhone;

document.getElementById(
"customerAddress"
).innerHTML =
"📍 " +
order.customerAddress;

document.getElementById(
"nearestPoint"
).innerHTML =
"📌 " +
(
order.nearestPoint ||
"لا يوجد"
);

const itemsBox =
document.getElementById(
"itemsBox"
);

itemsBox.innerHTML = "";

(order.items || [])
.forEach((item)=>{

itemsBox.innerHTML += `

<div class="item-card">

<div class="item-name">

${item.name}

</div>

<div class="item-description">

${item.description || "لا يوجد وصف"}

</div>

<div>

الكمية:
${item.qty}

</div>

<div class="item-price">

السعر الكلي:
${item.qty * item.price}

د.ع

</div>

</div>

`;

});

}

/* ================= MAP ================= */

function initializeMap(order){

navigator.geolocation.getCurrentPosition(

(position)=>{

const driverLat =
position.coords.latitude;

const driverLng =
position.coords.longitude;

map =
L.map("map")
.setView(
[
driverLat,
driverLng
],
14
);

L.tileLayer(
'https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png'
).addTo(map);

driverMarker =
L.marker(
[
driverLat,
driverLng
]
)
.addTo(map);

L.marker(
[
order.storeLat,
order.storeLng
]
)
.addTo(map);

L.marker(
[
order.customerLat,
order.customerLng
]
)
.addTo(map);

L.polyline(
[
[
driverLat,
driverLng
],
[
order.storeLat,
order.storeLng
],
[
order.customerLat,
order.customerLng
]
],
{
color:"blue",
weight:6
}
).addTo(map);

trackingWatcher =
navigator.geolocation.watchPosition(

(position)=>{

const lat =
position.coords.latitude;

const lng =
position.coords.longitude;

driverMarker.setLatLng(
[
lat,
lng
]
);

map.panTo(
[
lat,
lng
]
);

set(
ref(
db,
`drivers/${currentDriver.id}/latitude`
),
lat
);

set(
ref(
db,
`drivers/${currentDriver.id}/longitude`
),
lng
);

checkArrival(
lat,
lng
);

}

);

}

);

}

/* ================= CHECK ARRIVAL ================= */

function checkArrival(lat,lng){

if(!currentOrderData){
return;
}

if(currentStage === "store"){

const distance =
calculateDistance(
lat,
lng,
currentOrderData.storeLat,
currentOrderData.storeLng
);

if(distance <= 0.1){

document.getElementById(
"arrivedStoreBtn"
).style.display =
"block";

}

}

if(currentStage === "customer"){

const distance =
calculateDistance(
lat,
lng,
currentOrderData.customerLat,
currentOrderData.customerLng
);

if(distance <= 0.1){

document.getElementById(
"deliveredBtn"
).style.display =
"block";

}

}

}

/* ================= TIMER ================= */

function startTimer(seconds){

remainingSeconds =
seconds;

clearInterval(timerInterval);

timerInterval =
setInterval(async()=>{

remainingSeconds--;

const minutes =
Math.floor(
remainingSeconds / 60
);

const sec =
remainingSeconds % 60;

document.getElementById(
"timerCount"
).innerHTML =

`${minutes}:${
sec < 10 ?
"0" + sec
:
sec
}`;

if(remainingSeconds <= 0){

clearInterval(
timerInterval
);

await update(
ref(
db,
`drivers/${currentDriver.id}`
),
{

status:"inactive",

reactiveAt:
Date.now() +
(3 * 24 * 60 * 60 * 1000)

}
);

await update(
ref(
db,
`orders/${currentOrderId}`
),
{

status:"not_completed"

}
);

alert(
"تم تعطيل الحساب لمدة 3 ايام بسبب التأخير"
);

window.location.reload();

}

},1000);

}

/* ================= EXTEND TIME ================= */

document.getElementById(
"extendTimeBtn"
).onclick = ()=>{

remainingSeconds += 600;

alert(
"تمت اضافة 10 دقائق"
);

};

/* ================= ARRIVED STORE ================= */

document.getElementById(
"arrivedStoreBtn"
).onclick =
async()=>{

currentStage =
"customer";

document.getElementById(
"deliveryStatus"
).innerHTML =
"التوجه نحو الزبون";

document.getElementById(
"timerTitle"
).innerHTML =
"الوقت المتبقي لايصال الطلب";

document.getElementById(
"arrivedStoreBtn"
).style.display =
"none";

await update(
ref(
db,
`orders/${currentOrderId}`
),
{

status:"picked_up"

}
);

startTimer(2700);

};

/* ================= DELIVERED ================= */

document.getElementById(
"deliveredBtn"
).onclick =
async()=>{

await update(
ref(
db,
`orders/${currentOrderId}`
),
{

status:"delivered",

deliveredAt:
Date.now()

}
);

alert(
"تم ايصال الطلب بنجاح"
);

window.location.reload();

};

/* ================= MAP CONTROLS ================= */

document.getElementById(
"zoomInBtn"
).onclick = ()=>{

if(map){
map.zoomIn();
}

};

document.getElementById(
"zoomOutBtn"
).onclick = ()=>{

if(map){
map.zoomOut();
}

};

document.getElementById(
"stopTrackingBtn"
).onclick = ()=>{

if(trackingWatcher){

navigator.geolocation.clearWatch(
trackingWatcher
);

alert(
"تم ايقاف التتبع"
);

}

};

/* ================= LOGOUT ================= */

document.getElementById(
"logoutBtn"
).onclick = ()=>{

localStorage.removeItem(
"user"
);

window.location.href =
"index.html";

};

</script>

</body>

</html>
