<!DOCTYPE html>
<html lang="ar" dir="rtl">

<head>

<meta charset="UTF-8">

<meta
name="viewport"
content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">

<title>
سائق التوصيل
</title>

<link
rel="stylesheet"
href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css"/>

<link
rel="stylesheet"
href="https://unpkg.com/leaflet/dist/leaflet.css"/>

<link
rel="stylesheet"
href="https://unpkg.com/leaflet-routing-machine/dist/leaflet-routing-machine.css"/>

<link
href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;500;600;700;800&display=swap"
rel="stylesheet">

<script src="https://unpkg.com/leaflet/dist/leaflet.js"></script>

<script src="https://unpkg.com/leaflet-routing-machine/dist/leaflet-routing-machine.js"></script>

<style>

*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:'Cairo',sans-serif;
-webkit-tap-highlight-color:transparent;
}

body{
background:#f5f6fa;
padding-bottom:120px;
overflow-x:hidden;
}

.header{
background:
linear-gradient(
135deg,
#ff8800,
#ff5500
);
padding:22px;
color:white;
border-bottom-left-radius:30px;
border-bottom-right-radius:30px;
box-shadow:
0 8px 25px rgba(0,0,0,.10);
}

.driver-box{
display:flex;
align-items:center;
gap:14px;
}

.driver-image{
width:78px;
height:78px;
border-radius:50%;
object-fit:cover;
border:3px solid white;
background:white;
}

.driver-info h2{
font-size:24px;
margin-bottom:5px;
}

.driver-info p{
font-size:14px;
opacity:.9;
}

.online-btn{
margin-top:20px;
width:100%;
height:55px;
border:none;
border-radius:20px;
background:white;
color:#00b894;
font-size:15px;
font-weight:bold;
cursor:pointer;
}

.stats{
display:grid;
grid-template-columns:1fr 1fr 1fr;
gap:12px;
padding:15px;
}

.stat-card{
background:white;
padding:18px;
border-radius:25px;
text-align:center;
box-shadow:
0 5px 18px rgba(0,0,0,.06);
}

.stat-card h2{
font-size:28px;
color:#ff8800;
margin-bottom:6px;
}

.stat-card p{
font-size:13px;
font-weight:bold;
color:#666;
}

.orders-container{
padding:15px;
display:flex;
flex-direction:column;
gap:18px;
}

.order-card{
background:white;
padding:18px;
border-radius:28px;
box-shadow:
0 5px 18px rgba(0,0,0,.06);
}

.order-top{
display:flex;
justify-content:space-between;
align-items:center;
margin-bottom:15px;
gap:10px;
}

.order-price{
font-size:28px;
font-weight:bold;
color:#00b894;
}

.order-status{
padding:8px 14px;
border-radius:14px;
background:#fff3e0;
color:#ff6600;
font-size:13px;
font-weight:bold;
}

.customer-box{
background:#f8f8f8;
padding:15px;
border-radius:20px;
margin-bottom:15px;
}

.customer-box h3{
margin-bottom:6px;
font-size:19px;
}

.customer-box p{
font-size:14px;
color:#666;
margin-bottom:6px;
}

.map-box{
width:100%;
height:320px;
border-radius:22px;
overflow:hidden;
margin-bottom:15px;
}

.order-info{
display:grid;
grid-template-columns:1fr 1fr;
gap:12px;
margin-bottom:15px;
}

.info-card{
background:#f8f8f8;
padding:15px;
border-radius:18px;
text-align:center;
}

.info-card h4{
font-size:13px;
margin-bottom:8px;
color:#777;
}

.info-card p{
font-size:16px;
font-weight:bold;
}

.actions{
display:flex;
flex-wrap:wrap;
gap:10px;
}

.actions button,
.actions a{
flex:1;
height:52px;
border:none;
border-radius:18px;
font-size:14px;
font-weight:bold;
cursor:pointer;
text-decoration:none;
display:flex;
align-items:center;
justify-content:center;
color:white;
}

.accept-btn{
background:#00b894;
}

.reject-btn{
background:#ff3b30;
}

.whatsapp-btn{
background:#25D366;
}

.arrive-btn{
background:#2563eb;
}

.finish-btn{
background:#ff8800;
}

.empty{
padding:70px 20px;
text-align:center;
font-size:16px;
color:#777;
}

.loading{
position:fixed;
inset:0;
background:white;
display:flex;
align-items:center;
justify-content:center;
z-index:999999;
}

.spinner{
width:70px;
height:70px;
border-radius:50%;
border:5px solid #eee;
border-top:5px solid #ff8800;
animation:spin .8s linear infinite;
}

@keyframes spin{

100%{
transform:rotate(360deg);
}

}

.bottom-bar{
position:fixed;
bottom:0;
left:0;
right:0;
height:84px;
background:white;
display:flex;
justify-content:space-around;
align-items:center;
box-shadow:
0 -5px 18px rgba(0,0,0,.08);
z-index:99999;
}

.nav-item{
display:flex;
flex-direction:column;
align-items:center;
gap:5px;
font-size:13px;
font-weight:bold;
cursor:pointer;
color:#888;
}

.nav-item.active{
color:#ff8800;
}

.nav-item i{
font-size:22px;
}

@media(max-width:700px){

.stats{
grid-template-columns:1fr;
}

.order-info{
grid-template-columns:1fr;
}

}

</style>

</head>

<body>

<div
class="loading"
id="loading">

<div class="spinner"></div>

</div>

<div class="header">

<div class="driver-box">

<img
src="user.png"
id="driverImage"
class="driver-image">

<div class="driver-info">

<h2 id="driverName">
السائق
</h2>

<p id="driverPhone">
0000000000
</p>

</div>

</div>

<button
class="online-btn"
id="onlineBtn"
onclick="toggleOnline()">

متصل الآن

</button>

</div>

<div class="stats">

<div class="stat-card">

<h2 id="completedOrders">
0
</h2>

<p>
الطلبات المكتملة
</p>

</div>

<div class="stat-card">

<h2 id="totalProfit">
0
</h2>

<p>
الأرباح
</p>

</div>

<div class="stat-card">

<h2 id="cancelledOrders">
0
</h2>

<p>
الطلبات الملغية
</p>

</div>

</div>

<div
class="orders-container"
id="ordersContainer"></div>

<div class="bottom-bar">

<div class="nav-item active">

<i class="fa-solid fa-motorcycle"></i>

<span>
الطلبات
</span>

</div>

<div
class="nav-item"
onclick="window.location.href='asca.html'">

<i class="fa-solid fa-user"></i>

<span>
الحساب
</span>

</div>

</div>

<script type="module">

import { db }
from "./firebase.js";

import {
ref,
onValue,
update,
get
}
from "https://www.gstatic.com/firebasejs/12.13.0/firebase-database.js";

import {
calculateDistance,
formatPrice
}
from "./utils.js";

const currentUser =
JSON.parse(
localStorage.getItem("user")
);

if(
!currentUser ||
currentUser.type !== "driver"
){

window.location.replace(
"index.html"
);

}

let isOnline = true;

let driverLat = 0;
let driverLng = 0;

document.getElementById(
"driverName"
).innerHTML =
currentUser.name || "";

document.getElementById(
"driverPhone"
).innerHTML =
currentUser.phone || "";

document.getElementById(
"driverImage"
).src =
currentUser.image || "user.png";

document.getElementById(
"completedOrders"
).innerHTML =
currentUser.completedOrders || 0;

document.getElementById(
"cancelledOrders"
).innerHTML =
currentUser.cancelledOrders || 0;

document.getElementById(
"totalProfit"
).innerHTML =
Number(
currentUser.totalProfit || 0
).toLocaleString();

navigator.geolocation.watchPosition(

async(position)=>{

driverLat =
position.coords.latitude;

driverLng =
position.coords.longitude;

await update(
ref(db,"users/" + currentUser.id),
{

latitude:driverLat,
longitude:driverLng,
lastSeen:Date.now()

}
);

},

()=>{},

{
enableHighAccuracy:true,
maximumAge:3000,
timeout:10000
}

);

window.toggleOnline =
async function(){

isOnline = !isOnline;

const btn =
document.getElementById(
"onlineBtn"
);

btn.innerHTML =

isOnline
?
"متصل الآن"
:
"متوقف";

btn.style.color =

isOnline
?
"#00b894"
:
"#ff3b30";

await update(
ref(db,"users/" + currentUser.id),
{

isOnline:isOnline

}
);

};

const ordersContainer =
document.getElementById(
"ordersContainer"
);

onValue(
ref(db,"orders"),
(snapshot)=>{

ordersContainer.innerHTML = "";

if(!snapshot.exists()){

ordersContainer.innerHTML = `
<div class="empty">
لا توجد طلبات
</div>
`;

hideLoading();

return;

}

const orders =
snapshot.val();

let found = false;

for(let key in orders){

const order =
orders[key];

if(
order.status !== "waiting_driver"
&&
order.driverId !== currentUser.id
){
continue;
}

found = true;

ordersContainer.innerHTML += `

<div class="order-card">

<div class="order-top">

<div class="order-status">

${getStatusText(order.status)}

</div>

<div class="order-price">

${formatPrice(order.deliveryPrice)}

</div>

</div>

<div class="customer-box">

<h3>

${order.customerName || ""}

</h3>

<p>

📞 ${order.customerPhone || ""}

</p>

<p>

📍 ${order.customerAddress || ""}

</p>

</div>

<div
class="map-box"
id="map_${order.id}"></div>

<div class="order-info">

<div class="info-card">

<h4>
المجموع
</h4>

<p>

${formatPrice(order.finalTotal)}

</p>

</div>

<div class="info-card">

<h4>
الحالة
</h4>

<p>

${getStatusText(order.status)}

</p>

</div>

</div>

<div class="actions">

${order.status === "waiting_driver"

?

`

<button
class="accept-btn"
onclick="acceptOrder('${order.id}')">

قبول الطلب

</button>

<button
class="reject-btn"
onclick="rejectOrder('${order.id}')">

رفض

</button>

`

:

`

<a
href="https://wa.me/${order.customerPhone}"
target="_blank"
class="whatsapp-btn">

واتساب

</a>

<button
class="arrive-btn"
onclick="arriveOrder('${order.id}')">

وصلت

</button>

<button
class="finish-btn"
onclick="finishOrder('${order.id}')">

تم التوصيل

</button>

`

}

</div>

</div>

`;

setTimeout(()=>{

createMap(order);

},100);

}

if(!found){

ordersContainer.innerHTML = `
<div class="empty">
لا توجد طلبات حالياً
</div>
`;

}

hideLoading();

}
);

function createMap(order){

const map =
L.map(
`map_${order.id}`
).setView(
[
order.customerLat,
order.customerLng
],
13
);

L.tileLayer(
'https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png',
{
maxZoom:19
}
).addTo(map);

L.marker(
[
driverLat,
driverLng
]
).addTo(map);

L.marker(
[
order.customerLat,
order.customerLng
]
).addTo(map);

L.Routing.control({

waypoints:[

L.latLng(
driverLat,
driverLng
),

L.latLng(
order.customerLat,
order.customerLng
)

],

routeWhileDragging:false,
addWaypoints:false,
draggableWaypoints:false,
fitSelectedRoutes:true,
show:false,

lineOptions:{
styles:[
{
color:"#2563eb",
weight:6
}
]
},

createMarker:()=>null

}).addTo(map);

}

window.acceptOrder =
async function(orderId){

await update(
ref(db,"orders/" + orderId),
{

status:"accepted",

driverId:
currentUser.id,

driverName:
currentUser.name,

driverPhone:
currentUser.phone,

driverImage:
currentUser.image || "",

driverLat:
driverLat,

driverLng:
driverLng

}
);

};

window.rejectOrder =
async function(orderId){

await update(
ref(db,"orders/" + orderId),
{

status:"waiting_driver"

}
);

};

window.arriveOrder =
async function(orderId){

await update(
ref(db,"orders/" + orderId),
{

status:"arrived",

arrivedAt:Date.now()

}
);

alert("تم الوصول");

};

window.finishOrder =
async function(orderId){

const orderSnapshot =
await get(
ref(db,"orders/" + orderId)
);

if(orderSnapshot.exists()){

const order =
orderSnapshot.val();

await update(
ref(db,"users/" + currentUser.id),
{

completedOrders:
Number(
currentUser.completedOrders || 0
) + 1,

totalProfit:
Number(
currentUser.totalProfit || 0
)
+
Number(order.deliveryPrice || 0)

}
);

}

await update(
ref(db,"orders/" + orderId),
{

status:"delivered",

deliveredAt:Date.now()

}
);

alert("تم توصيل الطلب");

};

function getStatusText(status){

if(status === "waiting_driver"){
return "بانتظار سائق";
}

if(status === "accepted"){
return "تم قبول الطلب";
}

if(status === "arrived"){
return "وصل السائق";
}

if(status === "delivered"){
return "تم التوصيل";
}

if(status === "cancelled"){
return "ملغي";
}

return status;

}

function hideLoading(){

document.getElementById(
"loading"
).style.display = "none";

}

</script>

</body>

</html>
