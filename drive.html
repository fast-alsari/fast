<!-- driver.html -->

<!DOCTYPE html>
<html lang="ar" dir="rtl">

<head>

<meta charset="UTF-8">

<meta name="viewport"
content="width=device-width, initial-scale=1.0">

<title>طلبات التوصيل</title>

<link rel="stylesheet" href="driver.css">

<link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;700&display=swap"
rel="stylesheet">

<!-- LEAFLET MAP -->

<link rel="stylesheet"
href="https://unpkg.com/leaflet/dist/leaflet.css"/>

<script
src="https://unpkg.com/leaflet/dist/leaflet.js">
</script>

</head>

<body>

<!-- HEADER -->

<header class="header">

    <div>

        <h2>
            طلبات التوصيل
        </h2>

        <p>
            الطلبات الحالية
        </p>

    </div>

    <img
    src="driver.png"
    class="driver-image">

</header>

<!-- ORDERS -->

<div class="orders-container"
id="ordersContainer">

</div>

<!-- DELIVERY PAGE -->

<div class="delivery-page"
id="deliveryPage">

    <!-- MAP -->

    <div id="map"></div>

    <!-- INFO -->

    <div class="delivery-info">

        <h3>
            معلومات الزبون
        </h3>

        <p id="customerName"></p>

        <p id="customerPhone"></p>

        <p id="customerAddress"></p>

        <p id="nearestPoint"></p>

    </div>

    <!-- BUTTON -->

    <button
    id="deliveredBtn">

    تم الايصال

    </button>

</div>

<!-- FIREBASE -->

<script type="module">

import { initializeApp }
from "https://www.gstatic.com/firebasejs/10.12.2/firebase-app.js";

import {

getFirestore,
collection,
getDocs,
doc,
updateDoc

}
from "https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore.js";

import {

getAuth,
onAuthStateChanged

}
from "https://www.gstatic.com/firebasejs/10.12.2/firebase-auth.js";

/* FIREBASE */

const firebaseConfig = {

apiKey: "ضع_apiKey",

authDomain: "ضع_authDomain",

projectId: "ضع_projectId",

storageBucket: "ضع_storageBucket",

messagingSenderId: "ضع_senderId",

appId: "ضع_appId"

};

const app =
initializeApp(firebaseConfig);

const db =
getFirestore(app);

const auth =
getAuth(app);

let currentOrderId = null;

/* AUTH */

onAuthStateChanged(auth,(user)=>{

    if(!user){

        window.location.href =
        "index.html";

        return;

    }

    loadOrders();

});

/* LOAD ORDERS */

async function loadOrders(){

    const container =
    document.getElementById(
    "ordersContainer"
    );

    container.innerHTML = "";

    const querySnapshot =
    await getDocs(
    collection(db,"orders")
    );

    querySnapshot.forEach((docSnap)=>{

        const order =
        docSnap.data();

        if(order.status === "pending"){

            container.innerHTML += `

            <div class="order-card">

                <h3>
                    ${order.storeName}
                </h3>

                <p>

                📍 من:
                ${order.storeLocation}

                </p>

                <p>

                🏠 الى:
                ${order.customerAddress}

                </p>

                <p>

                📌 اقرب نقطة:
                ${order.nearestPoint}

                </p>

                <button
                onclick="acceptOrder(
                '${docSnap.id}',
                '${order.customerName}',
                '${order.customerPhone}',
                '${order.customerAddress}',
                '${order.nearestPoint}',
                ${order.customerLat},
                ${order.customerLng}
                )">

                قبول الطلب

                </button>

            </div>

            `;

        }

    });

}

/* ACCEPT ORDER */

window.acceptOrder =
async(
id,
name,
phone,
address,
point,
lat,
lng
)=>{

currentOrderId = id;

/* تحديث الطلب */

await updateDoc(
doc(db,"orders",id),
{

status:"accepted"

}
);

/* اخفاء الطلبات */

document.getElementById(
"ordersContainer"
).style.display = "none";

/* اظهار صفحة التوصيل */

document.getElementById(
"deliveryPage"
).style.display = "block";

/* معلومات الزبون */

document.getElementById(
"customerName"
).innerHTML =
"👤 " + name;

document.getElementById(
"customerPhone"
).innerHTML =
"📞 " + phone;

document.getElementById(
"customerAddress"
).innerHTML =
"📍 " + address;

document.getElementById(
"nearestPoint"
).innerHTML =
"📌 " + point;

/* الخريطة */

navigator.geolocation
.getCurrentPosition((position)=>{

const driverLat =
position.coords.latitude;

const driverLng =
position.coords.longitude;

/* MAP */

const map =
L.map('map')
.setView(
[driverLat,driverLng],
13
);

L.tileLayer(
'https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png'
).addTo(map);

/* DRIVER */

L.marker(
[driverLat,driverLng]
)
.addTo(map)
.bindPopup(
'موقعك الحالي'
)
.openPopup();

/* CUSTOMER */

L.marker(
[lat,lng]
)
.addTo(map)
.bindPopup(
'موقع الزبون'
);

/* LINE */

L.polyline(
[
[driverLat,driverLng],
[lat,lng]
],
{
color:'blue'
}
).addTo(map);

});

}

/* DELIVERED */

document.getElementById(
"deliveredBtn"
).addEventListener(
"click",
async()=>{

await updateDoc(
doc(db,"orders",
currentOrderId),
{

status:"delivered"

}
);

alert("تم توصيل الطلب");

window.location.reload();

});

</script>

</body>

</html>
