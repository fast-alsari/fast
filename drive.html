<!-- drive.html -->

<!DOCTYPE html>
<html lang="ar" dir="rtl">

<head>

<meta charset="UTF-8">

<meta name="viewport"
content="width=device-width, initial-scale=1.0">

<title>
طلبات التوصيل
</title>

<link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;600;700&display=swap"
rel="stylesheet">

<link rel="stylesheet"
href="https://unpkg.com/leaflet/dist/leaflet.css"/>

<script
src="https://unpkg.com/leaflet/dist/leaflet.js">
</script>

<link rel="stylesheet"
href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css"/>

<style>

*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:'Cairo',sans-serif;
}

body{
background:#f5f5f5;
padding-bottom:40px;
overflow-x:hidden;
}

/* HEADER */

.header{
background:
linear-gradient(
135deg,
#ff8800,
#ff5500
);

padding:20px;
border-bottom-left-radius:30px;
border-bottom-right-radius:30px;

display:flex;
justify-content:space-between;
align-items:center;

color:white;

box-shadow:
0 5px 20px rgba(0,0,0,.12);
}

.driver-info{
display:flex;
flex-direction:column;
gap:10px;
}

.driver-name{
font-size:22px;
font-weight:bold;
}

.driver-top-info{
display:flex;
flex-direction:column;
gap:8px;
margin-top:10px;
}

.driver-badge{
background:white;
color:#ff6600;
padding:8px 14px;
border-radius:14px;
font-size:14px;
font-weight:bold;
width:fit-content;
}

.expire-box{
background:rgba(255,255,255,.2);
padding:8px 14px;
border-radius:14px;
font-size:14px;
width:fit-content;
}

.header-left{
display:flex;
align-items:center;
gap:12px;
}

.logout-btn{
width:50px;
height:50px;
border:none;
border-radius:16px;
background:white;
color:#ff5500;
font-size:20px;
cursor:pointer;

display:flex;
align-items:center;
justify-content:center;
}

.driver-image{
width:75px;
height:75px;
border-radius:50%;
border:3px solid white;
object-fit:cover;
}

/* RADAR */

.radar-box{
display:flex;
flex-direction:column;
align-items:center;
justify-content:center;
padding:80px 20px;
}

.radar{
width:170px;
height:170px;
border-radius:50%;
border:5px solid #ff8800;
animation:radarPulse 2s infinite;
position:relative;
}

.radar::before{
content:"";
position:absolute;
top:50%;
left:50%;
width:20px;
height:20px;
background:#ff8800;
border-radius:50%;
transform:translate(-50%,-50%);
}

@keyframes radarPulse{

0%{
box-shadow:
0 0 0 0 rgba(255,136,0,.5);
}

100%{
box-shadow:
0 0 0 50px rgba(255,136,0,0);
}

}

.radar-text{
margin-top:25px;
font-size:20px;
font-weight:bold;
color:#777;
}

/* ORDERS */

.orders-container{
padding:15px;
display:flex;
flex-direction:column;
gap:18px;
}

.order-card{
background:white;
padding:20px;
border-radius:25px;
box-shadow:0 5px 20px rgba(0,0,0,.08);
}

.order-card h3{
font-size:22px;
margin-bottom:15px;
}

.order-card p{
margin-bottom:10px;
color:#555;
font-size:15px;
}

.price-box{
margin-top:15px;
padding:15px;
border-radius:16px;
background:#fff4e8;
font-size:20px;
font-weight:bold;
color:#ff6600;
text-align:center;
}

.order-buttons{
display:flex;
gap:10px;
margin-top:18px;
}

.accept-btn{
flex:1;
padding:15px;
border:none;
border-radius:16px;
background:#00b894;
color:white;
font-size:16px;
font-weight:bold;
cursor:pointer;
}

/* DELIVERY */

.delivery-page{
display:none;
}

#map{
width:100%;
height:55vh;
}

.delivery-info{
background:white;
margin:15px;
padding:20px;
border-radius:25px;
box-shadow:0 5px 20px rgba(0,0,0,.08);
}

.delivery-info h3{
margin-bottom:15px;
font-size:22px;
}

.delivery-info p{
margin-bottom:12px;
font-size:16px;
color:#555;
}

#deliveredBtn{
width:calc(100% - 30px);
margin:0 15px;
padding:18px;
border:none;
border-radius:18px;
background:#00b894;
color:white;
font-size:18px;
font-weight:bold;
cursor:pointer;
}

</style>

</head>

<body>

<!-- HEADER -->

<header class="header">

<div class="driver-info">

<h2 class="driver-name"
id="driverName">

السائق

</h2>

<p>
طلبات التوصيل الحالية
</p>

<div class="driver-top-info">

<div
class="driver-badge"
id="driverAccountType">

عادي

</div>

<div
class="expire-box"
id="expireDate">

ينتهي:
غير محدد

</div>

</div>

</div>

<div class="header-left">

<button
class="logout-btn"
id="logoutBtn">

<i class="fa-solid fa-right-from-bracket"></i>

</button>

<img
src="driver.png"
class="driver-image">

</div>

</header>

<!-- RADAR -->

<div
class="radar-box"
id="radarBox">

<div class="radar"></div>

<div class="radar-text">

جاري البحث عن طلبات...

</div>

</div>

<!-- ORDERS -->

<div
class="orders-container"
id="ordersContainer">

</div>

<!-- DELIVERY -->

<div
class="delivery-page"
id="deliveryPage">

<div id="map"></div>

<div class="delivery-info">

<h3>
معلومات الزبون
</h3>

<p id="customerName"></p>

<p id="customerPhone"></p>

<p id="customerAddress"></p>

<p id="nearestPoint"></p>

</div>

<button id="deliveredBtn">

تم الايصال

</button>

</div>

<script type="module">

import { initializeApp }
from "https://www.gstatic.com/firebasejs/12.13.0/firebase-app.js";

import {

getDatabase,
ref,
onValue,
update,
get

}
from "https://www.gstatic.com/firebasejs/12.13.0/firebase-database.js";

/* FIREBASE */

const firebaseConfig = {

apiKey:"AIzaSyC7QzQTYMSGRV_nraJBneBqDqYGhugF0Pw",

authDomain:"fast-937c9.firebaseapp.com",

projectId:"fast-937c9",

storageBucket:"fast-937c9.firebasestorage.app",

messagingSenderId:"221388561840",

appId:"1:221388561840:web:ec9d75183ddd7d44be0a75",

measurementId:"G-CEKHEPNR9X",

databaseURL:
"https://fast-937c9-default-rtdb.europe-west1.firebasedatabase.app"

};

const app =
initializeApp(firebaseConfig);

const db =
getDatabase(app);

/* بيانات السائق */

const currentDriver =
JSON.parse(
localStorage.getItem("user")
);

/* اذا ماكو جلسة */

if(!currentDriver){

window.location.replace(
"index.html"
);

}

/* اظهار بيانات السائق */

document.getElementById(
"driverName"
).innerHTML =
currentDriver.name || "سائق";

document.getElementById(
"driverAccountType"
).innerHTML =
currentDriver.subscription || "عادي";

document.getElementById(
"expireDate"
).innerHTML =
"ينتهي الاشتراك: " +
(
currentDriver.expireDate ||
"غير محدد"
);

let currentOrderId = null;

/* تأخير حسب نوع الاشتراك */

function getDelay(){

const type =
(
currentDriver.subscription ||
"normal"
).toLowerCase();

if(type === "vip"){
return 0;
}

return 10000;

}

/* الطلبات */

onValue(
ref(db,"orders"),
(snapshot)=>{

const radarBox =
document.getElementById(
"radarBox"
);

const container =
document.getElementById(
"ordersContainer"
);

container.innerHTML = "";

if(!snapshot.exists()){

radarBox.style.display =
"flex";

return;

}

const orders =
snapshot.val();

let found = false;

Object.keys(orders)
.forEach((key)=>{

const order =
orders[key];

if(
order.status !== "waiting_driver"
){

return;

}

found = true;

setTimeout(()=>{

container.innerHTML += `

<div class="order-card">

<h3>
${order.customerName}
</h3>

<p>
📞 ${order.customerPhone}
</p>

<p>
📍 ${order.customerAddress}
</p>

<div class="price-box">

سعر التوصيل:
${order.deliveryPrice}
د.ع

</div>

<div class="order-buttons">

<button
class="accept-btn"
onclick="acceptOrder('${key}')">

قبول الطلب

</button>

</div>

</div>

`;

radarBox.style.display =
"none";

},getDelay());

});

if(!found){

radarBox.style.display =
"flex";

}

});

/* قبول الطلب */

window.acceptOrder =
async function(id){

const orderRef =
ref(db,"orders/"+id);

const snapshot =
await get(orderRef);

if(!snapshot.exists()){

alert("تم حذف الطلب");

return;

}

const order =
snapshot.val();

if(order.status !== "waiting_driver"){

alert("تم قبول الطلب من سائق آخر");

return;

}

await update(orderRef,{

status:"accepted",

acceptedDriver:
currentDriver.name,

driverId:
currentDriver.id,

acceptedAt:
Date.now()

});

currentOrderId = id;

document.getElementById(
"ordersContainer"
).style.display =
"none";

document.getElementById(
"radarBox"
).style.display =
"none";

document.getElementById(
"deliveryPage"
).style.display =
"block";

document.getElementById(
"customerName"
).innerHTML =
"👤 " +
order.customerName;

document.getElementById(
"customerPhone"
).innerHTML =
"📞 " +
order.customerPhone;

document.getElementById(
"customerAddress"
).innerHTML =
"📍 " +
order.customerAddress;

document.getElementById(
"nearestPoint"
).innerHTML =
"📌 " +
(order.nearestPoint || "لا يوجد");

/* MAP */

navigator.geolocation
.getCurrentPosition((position)=>{

const driverLat =
position.coords.latitude;

const driverLng =
position.coords.longitude;

const map =
L.map("map")
.setView(
[
driverLat,
driverLng
],
13
);

L.tileLayer(
'https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png'
).addTo(map);

L.marker(
[
driverLat,
driverLng
]
)
.addTo(map)
.bindPopup(
"موقعك"
)
.openPopup();

if(
order.customerLat &&
order.customerLng
){

L.marker(
[
order.customerLat,
order.customerLng
]
)
.addTo(map)
.bindPopup(
"موقع الزبون"
);

L.polyline(
[
[
driverLat,
driverLng
],
[
order.customerLat,
order.customerLng
]
],
{
color:"blue"
}
).addTo(map);

}

});

};

/* تم التوصيل */

document.getElementById(
"deliveredBtn"
).addEventListener(
"click",
async()=>{

if(!currentOrderId){
return;
}

await update(
ref(
db,
"orders/" +
currentOrderId
),
{

status:"delivered",

deliveredAt:
Date.now()

}
);

alert(
"تم توصيل الطلب"
);

window.location.reload();

});

/* تسجيل خروج */

document.getElementById(
"logoutBtn"
).addEventListener(
"click",
function(){

localStorage.removeItem(
"user"
);

window.location.replace(
"index.html"
);

});

</script>

</body>

</html>
