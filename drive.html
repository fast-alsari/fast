<!-- drive.html -->

<!DOCTYPE html>
<html lang="ar" dir="rtl">

<head>

<meta charset="UTF-8">

<meta name="viewport"
content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">

<title>
طلبات التوصيل
</title>

<link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;500;600;700&display=swap"
rel="stylesheet">

<link rel="stylesheet"
href="https://unpkg.com/leaflet/dist/leaflet.css"/>

<script
src="https://unpkg.com/leaflet/dist/leaflet.js">
</script>

<link rel="stylesheet"
href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css"/>

<style>

*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:'Cairo',sans-serif;
}

body{
background:#f5f5f5;
padding-bottom:30px;
overflow-x:hidden;
}

.header{

background:
linear-gradient(
135deg,
#ff8800,
#ff5500
);

padding:18px;

border-bottom-left-radius:30px;
border-bottom-right-radius:30px;

display:flex;
justify-content:space-between;
align-items:center;

color:white;

box-shadow:
0 5px 20px rgba(0,0,0,.12);

}

.driver-info{
display:flex;
flex-direction:column;
gap:10px;
}

.driver-name{
font-size:24px;
font-weight:bold;
}

.driver-badge{

background:white;
color:#ff6600;

padding:8px 14px;

border-radius:14px;

font-size:14px;
font-weight:bold;

width:fit-content;

}

.header-left{
display:flex;
align-items:center;
gap:12px;
}

.logout-btn{

width:52px;
height:52px;

border:none;

border-radius:16px;

background:white;
color:#ff5500;

font-size:20px;

cursor:pointer;

display:flex;
align-items:center;
justify-content:center;

}

.driver-image{

width:65px;
height:65px;

border-radius:50%;

border:3px solid white;

object-fit:cover;

}

.radar-box{

display:flex;
flex-direction:column;

align-items:center;
justify-content:center;

padding:50px 20px;

}

.radar{

width:170px;
height:170px;

border-radius:50%;

border:5px solid #ff8800;

animation:radarPulse 2s infinite;

position:relative;

}

.radar::before{

content:"";

position:absolute;

top:50%;
left:50%;

width:22px;
height:22px;

background:#ff8800;

border-radius:50%;

transform:translate(-50%,-50%);

}

@keyframes radarPulse{

0%{

box-shadow:
0 0 0 0 rgba(255,136,0,.5);

}

100%{

box-shadow:
0 0 0 55px rgba(255,136,0,0);

}

}

.radar-text{

margin-top:28px;

font-size:22px;
font-weight:bold;

color:#777;

}

.orders-container{

padding:15px;

display:flex;
flex-direction:column;

gap:18px;

}

.order-card{

background:white;

padding:18px;

border-radius:25px;

box-shadow:
0 5px 20px rgba(0,0,0,.08);

}

.order-card h3{

font-size:23px;

margin-bottom:15px;

}

.order-card p{

margin-bottom:10px;

font-size:15px;
color:#555;

}

.items-box{

margin-top:15px;

padding:12px;

background:#fafafa;

border-radius:18px;

}

.item{

padding:10px 0;

border-bottom:1px solid #eee;

font-size:14px;

}

.item:last-child{
border:none;
}

.price-box{

margin-top:15px;

padding:16px;

border-radius:18px;

background:#fff4e8;

font-size:19px;
font-weight:bold;

color:#ff6600;

text-align:center;

line-height:2;

}

.order-buttons{

display:flex;
gap:10px;

margin-top:18px;

}

.accept-btn{

flex:1;

padding:16px;

border:none;

border-radius:18px;

background:#00b894;

color:white;

font-size:16px;
font-weight:bold;

cursor:pointer;

}

.reject-btn{

flex:1;

padding:16px;

border:none;

border-radius:18px;

background:red;

color:white;

font-size:16px;
font-weight:bold;

cursor:pointer;

}

.delivery-page{
display:none;
}

#map{

width:100%;
height:55vh;

margin-top:10px;

}

.delivery-info{

background:white;

margin:15px;

padding:20px;

border-radius:25px;

box-shadow:
0 5px 20px rgba(0,0,0,.08);

}

.delivery-info h3{

font-size:23px;

margin-bottom:15px;

}

.delivery-info p{

margin-bottom:14px;

font-size:16px;

color:#555;

}

.delivery-btn{

width:calc(100% - 30px);

margin:0 15px 15px;

padding:18px;

border:none;

border-radius:18px;

background:#00b894;

color:white;

font-size:18px;
font-weight:bold;

cursor:pointer;

}

.pickup-btn{

background:#ff8800;

}

</style>

</head>

<body>

<header class="header">

<div class="driver-info">

<div class="driver-name"
id="driverName">

السائق

</div>

<div class="driver-badge">

الطلبات المكتملة:
<span id="completedCount">
0
</span>

</div>

<div class="driver-badge">

ارباح الشهر:
<span id="monthProfit">
0
</span>
د.ع

</div>

<div class="driver-badge"
id="driverType">

عادي

</div>

</div>

<div class="header-left">

<button
class="logout-btn"
id="logoutBtn">

<i class="fa-solid fa-right-from-bracket"></i>

</button>

<img
src="driver.png"
class="driver-image">

</div>

</header>

<div
class="orders-container"
id="ordersContainer">

<div
class="radar-box"
id="radarBox">

<div class="radar"></div>

<div class="radar-text">

جاري البحث عن طلبات...

</div>

</div>

</div>

<div
class="delivery-page"
id="deliveryPage">

<div id="map"></div>

<div class="delivery-info">

<h3>
معلومات الزبون
</h3>

<p id="customerName"></p>

<p id="customerPhone"></p>

<p id="customerAddress"></p>

<button
id="whatsappBtn"
class="delivery-btn"
style="background:#25D366;">

واتساب الزبون

</button>

</div>

<button
id="pickupBtn"
class="delivery-btn pickup-btn">

تم استلام الطلب من المتجر

</button>

<button
id="arrivedBtn"
class="delivery-btn"
style="background:#0984e3;">

وصلت للزبون

</button>

<button
id="deliveredBtn"
class="delivery-btn">

تم التوصيل

</button>

</div>

<script type="module">

import { initializeApp }
from "https://www.gstatic.com/firebasejs/12.13.0/firebase-app.js";

import {

getDatabase,
ref,
onValue,
update,
get,
set

}

from "https://www.gstatic.com/firebasejs/12.13.0/firebase-database.js";

const firebaseConfig = {

apiKey:"AIzaSyC7QzQTYMSGRV_nraJBneBqDqYGhugF0Pw",

authDomain:"fast-937c9.firebaseapp.com",

projectId:"fast-937c9",

databaseURL:
"https://fast-937c9-default-rtdb.europe-west1.firebasedatabase.app"

};

const app =
initializeApp(firebaseConfig);

const db =
getDatabase(app);

const currentDriver =
JSON.parse(localStorage.getItem("user"));

if(!currentDriver){

window.location.replace("index.html");

}

document.getElementById("driverName")
.innerHTML =
currentDriver.name || "سائق";

document.getElementById("driverType")
.innerHTML =
currentDriver.subscription || "عادي";

let driverLat = null;
let driverLng = null;

let currentOrderId = null;
let currentOrderData = null;

let map;
let driverMarker;
let customerMarker;
let storeMarker;
let routeLine;

const bikeIcon =
L.icon({

iconUrl:
"https://cdn-icons-png.flaticon.com/512/2972/2972185.png",

iconSize:[45,45]

});

navigator.geolocation.watchPosition(

async(position)=>{

driverLat =
position.coords.latitude;

driverLng =
position.coords.longitude;

await update(

ref(db,"drivers/" + currentDriver.id),

{
latitude:driverLat,
longitude:driverLng
}

);

if(currentOrderId){

await update(

ref(db,"orders/" + currentOrderId),

{
driverLat,
driverLng
}

);

updateDriverMarker();

}

}

);

function updateDriverMarker(){

if(
!map
||
!driverLat
||
!driverLng
){
return;
}

if(!driverMarker){

driverMarker =
L.marker(

[driverLat,driverLng],

{
icon:bikeIcon
}

)

.addTo(map)

.bindPopup("السائق");

}else{

driverMarker.setLatLng(
[driverLat,driverLng]
);

}

drawRoute();

}

function drawRoute(){

if(
!currentOrderData
||
!map
){
return;
}

if(routeLine){

map.removeLayer(routeLine);

}

let points = [];

if(currentOrderData.status === "accepted"){

points = [

[driverLat,driverLng],

[
Number(currentOrderData.storeLat),
Number(currentOrderData.storeLng)
]

];

}

if(
currentOrderData.status === "picked_up"
||
currentOrderData.status === "arrived"
){

points = [

[driverLat,driverLng],

[
Number(currentOrderData.customerLat),
Number(currentOrderData.customerLng)
]

];

}

routeLine =
L.polyline(

points,

{
color:"blue",
weight:6
}

).addTo(map);

map.fitBounds(

routeLine.getBounds(),

{
padding:[40,40]
}

);

}

function openDeliveryPage(order){

currentOrderData = order;

document.getElementById("ordersContainer")
.style.display = "none";

document.getElementById("deliveryPage")
.style.display = "block";

document.getElementById("customerName")
.innerHTML =
"👤 " + order.customerName;

document.getElementById("customerPhone")
.innerHTML =
"📞 " + order.customerPhone;

document.getElementById("customerAddress")
.innerHTML =
"📍 " + order.customerAddress;

document.getElementById("whatsappBtn")
.onclick = function(){

window.open(
`https://wa.me/${order.customerPhone}`
);

};

if(!map){

map =
L.map("map").setView(

[
Number(order.customerLat),
Number(order.customerLng)
],

13

);

L.tileLayer(

'https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png'

).addTo(map);

customerMarker =
L.marker(

[
Number(order.customerLat),
Number(order.customerLng)
]

)

.addTo(map)

.bindPopup("الزبون");

storeMarker =
L.marker(

[
Number(order.storeLat),
Number(order.storeLng)
]

)

.addTo(map)

.bindPopup("المتجر");

}

setTimeout(()=>{

map.invalidateSize();

},500);

updateDriverMarker();

}

onValue(
ref(db,"orders"),
(snapshot)=>{

const container =
document.getElementById("ordersContainer");

container.innerHTML = "";

if(!snapshot.exists()){

container.innerHTML = `
<div class="radar-box">
<div class="radar"></div>
<div class="radar-text">
جاري البحث عن طلبات...
</div>
</div>
`;

return;

}

const orders =
snapshot.val();

let found = false;

Object.keys(orders).forEach((key)=>{

const order =
orders[key];

if(order.status !== "waiting_driver"){
return;
}

found = true;

container.innerHTML += `

<div class="order-card">

<h3>
${order.customerName}
</h3>

<p>
📞 ${order.customerPhone}
</p>

<p>
📍 ${order.customerAddress}
</p>

<div class="items-box">

${order.items.map(item=>`

<div class="item">

🍔 ${item.name}

<br>

الكمية:
${item.qty}

</div>

`).join("")}

</div>

<div class="price-box">

سعر التوصيل:
${order.deliveryPrice} د.ع

<br>

المجموع:
${order.totalPrice} د.ع

</div>

<div class="order-buttons">

<button
class="accept-btn"
onclick="acceptOrder('${key}')">

قبول

</button>

<button
class="reject-btn"
onclick="rejectOrder('${key}')">

رفض

</button>

</div>

</div>

`;

});

if(!found){

container.innerHTML = `
<div class="radar-box">
<div class="radar"></div>
<div class="radar-text">
جاري البحث عن طلبات...
</div>
</div>
`;

}

});

window.rejectOrder =
async function(id){

await update(

ref(db,"orders/" + id + "/rejectedBy"),

{
[currentDriver.id]:true
}

);

alert("تم رفض الطلب");

};

window.acceptOrder =
async function(id){

const orderRef =
ref(db,"orders/" + id);

const snapshot =
await get(orderRef);

if(!snapshot.exists()){

alert("تم حذف الطلب");
return;

}

const order =
snapshot.val();

currentOrderId = id;

await update(orderRef,{

status:"accepted",

acceptedDriver:
currentDriver.name,

driverId:
currentDriver.id,

driverPhone:
currentDriver.phone || "",

driverLat,
driverLng,

acceptedAt:
Date.now()

});

openDeliveryPage({

...order,
status:"accepted"

});

};

document.getElementById("pickupBtn")
.onclick =
async function(){

if(!currentOrderId){
return;
}

await update(

ref(db,"orders/" + currentOrderId),

{
status:"picked_up"
}

);

currentOrderData.status =
"picked_up";

drawRoute();

};

document.getElementById("arrivedBtn")
.onclick =
async function(){

if(!currentOrderId){
return;
}

await update(

ref(db,"orders/" + currentOrderId),

{
status:"arrived"
}

);

currentOrderData.status =
"arrived";

drawRoute();

};

document.getElementById("deliveredBtn")
.onclick =
async function(){

if(!currentOrderId){
return;
}

await update(

ref(db,"orders/" + currentOrderId),

{
status:"delivered",
deliveredAt:Date.now()
}

);

alert("تم توصيل الطلب");

window.location.reload();

};

document.getElementById("logoutBtn")
.onclick =
function(){

localStorage.removeItem("user");

window.location.replace(
"index.html"
);

};

</script>

</body>

</html>
