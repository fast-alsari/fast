<!-- drive.html -->

<!DOCTYPE html>
<html lang="ar" dir="rtl">

<head>

<meta charset="UTF-8">

<meta name="viewport"
content="width=device-width, initial-scale=1.0">

<title>
طلبات التوصيل
</title>

<link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;500;600;700&display=swap"
rel="stylesheet">

<link rel="stylesheet"
href="https://unpkg.com/leaflet/dist/leaflet.css"/>

<script
src="https://unpkg.com/leaflet/dist/leaflet.js">
</script>

<link rel="stylesheet"
href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css"/>

<style>

*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:'Cairo',sans-serif;
}

body{
background:#f5f5f5;
padding-bottom:40px;
overflow-x:hidden;
}

/* HEADER */

.header{
background:
linear-gradient(
135deg,
#ff8800,
#ff5500
);

padding:15px;
border-bottom-left-radius:30px;
border-bottom-right-radius:30px;

display:flex;
justify-content:space-between;
align-items:flex-start;

color:white;

box-shadow:
0 5px 20px rgba(0,0,0,.12);
}

.driver-info{
display:flex;
flex-direction:column;
gap:10px;
}

.driver-name{
font-size:22px;
font-weight:bold;
}

.driver-top-info{
display:flex;
flex-direction:column;
gap:8px;
margin-top:10px;
}

.driver-badge{
background:white;
color:#ff6600;
padding:7px 12px;
border-radius:14px;
font-size:13px;
font-weight:bold;
width:fit-content;
}

.header-left{
display:flex;
flex-direction:column;
align-items:center;
gap:12px;
}

.logout-btn{
width:48px;
height:48px;
border:none;
border-radius:15px;
background:white;
color:#ff5500;
font-size:20px;
cursor:pointer;
display:flex;
align-items:center;
justify-content:center;
}

.driver-image{
width:55px;
height:55px;
object-fit:contain;
}

/* RADAR */

.radar-box{
display:flex;
flex-direction:column;
align-items:center;
justify-content:center;
padding:25px 20px;
width:100%;
}

.radar{
width:130px;
height:130px;
border-radius:50%;
border:5px solid #ff8800;
animation:radarPulse 2s infinite;
position:relative;
}

.radar::before{
content:"";
position:absolute;
top:50%;
left:50%;
width:18px;
height:18px;
background:#ff8800;
border-radius:50%;
transform:translate(-50%,-50%);
}

@keyframes radarPulse{

0%{
box-shadow:
0 0 0 0 rgba(255,136,0,.5);
}

100%{
box-shadow:
0 0 0 40px rgba(255,136,0,0);
}

}

.radar-text{
margin-top:20px;
font-size:18px;
font-weight:bold;
color:#777;
}

/* ORDERS */

.orders-container{
padding:15px;
display:flex;
flex-direction:column;
gap:18px;
}

.order-card{
background:white;
padding:16px;
border-radius:25px;
box-shadow:0 5px 20px rgba(0,0,0,.08);
}

.order-title{
display:flex;
justify-content:space-between;
align-items:center;
margin-bottom:15px;
}

.customer-name{
font-size:21px;
font-weight:bold;
}

.delivery-price{
background:#fff4e8;
padding:10px 15px;
border-radius:14px;
font-weight:bold;
color:#ff6600;
}

.store-box{
background:#fafafa;
padding:14px;
border-radius:20px;
margin-bottom:14px;
border:1px solid #eee;
}

.store-header{
display:flex;
align-items:center;
gap:12px;
margin-bottom:12px;
}

.store-image{
width:60px;
height:60px;
border-radius:16px;
object-fit:cover;
background:#eee;
}

.store-name{
font-size:17px;
font-weight:bold;
}

.product-box{
background:white;
padding:12px;
border-radius:18px;
margin-bottom:10px;
border:1px solid #eee;
}

.product-top{
display:flex;
align-items:center;
gap:12px;
}

.product-image{
width:58px;
height:58px;
border-radius:14px;
object-fit:cover;
background:#eee;
}

.product-info{
flex:1;
}

.product-name{
font-size:15px;
font-weight:bold;
margin-bottom:5px;
}

.product-details{
font-size:13px;
color:#666;
line-height:1.8;
}

.total-box{
background:#fff4e8;
padding:15px;
border-radius:18px;
text-align:center;
font-size:18px;
font-weight:bold;
color:#ff6600;
margin-top:15px;
line-height:2;
}

.map-box{
width:100%;
height:220px;
border-radius:22px;
overflow:hidden;
margin-top:15px;
border:2px solid #eee;
}

.order-buttons{
display:flex;
gap:10px;
margin-top:18px;
}

.accept-btn{
flex:1;
padding:16px;
border:none;
border-radius:16px;
background:#00b894;
color:white;
font-size:16px;
font-weight:bold;
cursor:pointer;
}

.reject-btn{
flex:1;
padding:16px;
border:none;
border-radius:16px;
background:red;
color:white;
font-size:16px;
font-weight:bold;
cursor:pointer;
}

/* DELIVERY */

.delivery-page{
display:none;
}

#map{
width:100%;
height:55vh;
}

.delivery-info{
background:white;
margin:15px;
padding:15px;
border-radius:25px;
box-shadow:0 5px 20px rgba(0,0,0,.08);
}

.delivery-info h3{
margin-bottom:15px;
font-size:22px;
}

.delivery-info p{
margin-bottom:12px;
font-size:16px;
color:#555;
}

.action-btn{
width:100%;
padding:18px;
border:none;
border-radius:18px;
color:white;
font-size:17px;
font-weight:bold;
cursor:pointer;
margin-top:12px;
}

.arrive-store{
background:#ff8800;
}

.arrive-customer{
background:#0984e3;
}

.done-btn{
background:#00b894;
}

.problem-btn{
background:red;
}
.custom-store-icon{
background:transparent;
border:none;
}

.customer-flag{
background:transparent;
border:none;
}

.driver-live-box{
background:white;
padding:12px;
border-radius:18px;
margin-top:15px;
box-shadow:0 5px 15px rgba(0,0,0,.08);
}

.driver-live-title{
font-size:18px;
font-weight:bold;
margin-bottom:10px;
color:#ff6600;
}
</style>

</head>

<body>

<header class="header">

<div class="driver-info">

<div class="driver-name"
id="driverName">

السائق

</div>

<div class="driver-top-info">

<div class="driver-badge">

الطلبات المنجزة:
<span id="completedCount">
0
</span>

</div>

<div class="driver-badge">

الأرباح الشهرية:
<span id="monthProfit">
0
</span>

د.ع

</div>

<div class="driver-badge"
id="driverAccountType">

VIP

</div>

</div>

</div>

<div class="header-left">

<button
class="logout-btn"
id="logoutBtn">

<i class="fa-solid fa-right-from-bracket"></i>

</button>

<img
src="motorbike.png"
class="driver-image">

</div>

</header>

<div
class="orders-container"
id="ordersContainer">

<div
class="radar-box"
id="radarBox">

<div class="radar"></div>

<div class="radar-text">

جاري البحث عن طلبات...

</div>

</div>

</div>

<div
class="delivery-page"
id="deliveryPage">

<div id="map"></div>

<div class="delivery-info">

<h3>
معلومات الزبون
</h3>

<p id="customerName"></p>

<p id="customerPhone"></p>

<p id="customerAddress"></p>

<button
id="whatsappCustomer"
class="action-btn"
style="background:#25D366;">

واتساب الزبون

</button>

<button
id="arrivedStoreBtn"
class="action-btn arrive-store">

وصلت المتجر

</button>

<button
id="arrivedCustomerBtn"
class="action-btn arrive-customer">

وصلت الزبون

</button>

<button
id="deliveredBtn"
class="action-btn done-btn">

تم التوصيل

</button>

<button
id="failedBtn"
class="action-btn problem-btn">

مشكلة بالتوصيل

</button>

</div>

</div>

<script type="module">

import { initializeApp }
from "https://www.gstatic.com/firebasejs/12.13.0/firebase-app.js";

import {

getDatabase,
ref,
onValue,
update,
get,
set

}

from "https://www.gstatic.com/firebasejs/12.13.0/firebase-database.js";

const firebaseConfig = {

apiKey:"AIzaSy",

authDomain:"fast-937c9.firebaseapp.com",

projectId:"fast-937c9",

databaseURL:
"https://fast-937c9-default-rtdb.europe-west1.firebasedatabase.app"

};

const app =
initializeApp(firebaseConfig);

const db =
getDatabase(app);

const currentDriver =
JSON.parse(
localStorage.getItem("user")
);

if(!currentDriver){

window.location.replace(
"index.html"
);

}

document.getElementById(
"driverName"
).innerHTML =
currentDriver.name || "سائق";

document.getElementById(
"driverAccountType"
).innerHTML =
currentDriver.subscription || "عادي";

let driverLat = null;
let driverLng = null;
let currentOrderId = null;

let map;
let driverMarker;
let customerMarker;
let routeLines = [];
let storeMarkers = [];

const bikeIcon = L.icon({

iconUrl:"motorbike.png",

iconSize:[50,50],

iconAnchor:[25,25]

});

const customerIcon = L.icon({


iconUrl:
"https://cdn-icons-png.flaticon.com/512/684/684908.png",

iconSize:[45,45],

iconAnchor:[22,45]

});

function createStoreIcon(store){

return L.divIcon({

className:"custom-store-icon",

html:`

<div style="
display:flex;
flex-direction:column;
align-items:center;
">

<img
src="${store.storeImage || 'store.png'}"
style="
width:45px;
height:45px;
border-radius:50%;
border:3px solid white;
object-fit:cover;
background:white;
box-shadow:0 3px 10px rgba(0,0,0,.2);
">

<div style="
background:white;
padding:4px 8px;
border-radius:10px;
margin-top:4px;
font-size:11px;
font-weight:bold;
white-space:nowrap;
box-shadow:0 2px 8px rgba(0,0,0,.15);
">

${store.storeName}

</div>

</div>

`,

iconSize:[60,60],
iconAnchor:[30,30]

});

}
navigator.geolocation.watchPosition(

(position)=>{

driverLat =
position.coords.latitude;

driverLng =
position.coords.longitude;

update(
ref(
db,
"drivers/" + currentDriver.id
),
{

latitude:driverLat,
longitude:driverLng

}
);
if(currentOrderId){

update(
ref(
db,
"orders/" + currentOrderId
),
{

driverLat:driverLat,
driverLng:driverLng

}
);

}

}
);

function calculateDistance(lat1, lon1, lat2, lon2){

const R = 6371;

const dLat =
(lat2-lat1) * Math.PI / 180;

const dLon =
(lon2-lon1) * Math.PI / 180;

const a =

Math.sin(dLat/2) *
Math.sin(dLat/2)

+

Math.cos(lat1 * Math.PI / 180)

*

Math.cos(lat2 * Math.PI / 180)

*

Math.sin(dLon/2)

*

Math.sin(dLon/2);

const c =
2 * Math.atan2(
Math.sqrt(a),
Math.sqrt(1-a)
);

return R * c;

}

onValue(
ref(db,"orders"),
(snapshot)=>{

const container =
document.getElementById(
"ordersContainer"
);

container.innerHTML = "";

if(!snapshot.exists()){

container.innerHTML = `
<div class="radar-box">

<div class="radar"></div>

<div class="radar-text">

جاري البحث عن طلبات...

</div>

</div>
`;

return;

}

const orders =
snapshot.val();

Object.keys(orders)
.forEach((key)=>{

const order =
orders[key];

if(
order.status !== "waiting_driver"
){
return;
}

if(
order.rejectedBy &&
order.rejectedBy[currentDriver.id]
){

const rejectTime =
order.rejectedBy[currentDriver.id];

if(
Date.now() - rejectTime < 3600000
){
return;
}

}

if(
driverLat === null ||
driverLng === null
){
return;
}
const distance =
calculateDistance(

driverLat,
driverLng,

Number(order.customerLat),
Number(order.customerLng)

);

if(distance > 25){
return;
}

container.innerHTML += `

<div class="order-card">

<div class="order-title">

<div>

<div class="customer-name">

👤 ${order.customerName}

</div>

<div style="
font-size:13px;
color:#777;
margin-top:5px;
">

🏪 عدد المتاجر:
${order.storesData?.length || 1}

</div>

</div>

<div class="delivery-price">

🚚 ${order.deliveryPrice} د.ع

</div>

</div>

${(order.storesData || []).map(store => `

<div class="store-box">

<div class="store-header">

<img
src="${store.storeImage || 'store.png'}"
class="store-image">

<div class="store-name">

🏪 ${store.storeName}

</div>

</div>

${order.items
.filter(item =>
item.storeId === store.storeId
)
.map(item => `

<div class="product-box">

<div class="product-top">

<img
src="${item.image || 'product.png'}"
class="product-image">

<div class="product-info">

<div class="product-name">

🍔 ${item.name}

</div>

<div class="product-details">

📦 الكمية:
${item.qty}

<br>

💰 السعر:
${item.price} د.ع

<br>

🧾 المجموع:
${item.totalPrice} د.ع

</div>

</div>

</div>

</div>

`).join("")}

</div>

`).join("")}

<div class="total-box">

💰 المنتجات:
${order.productsPrice} د.ع

<br>

🚚 التوصيل:
${order.deliveryPrice} د.ع

<br>

🧾 الكلي:
${order.totalPrice} د.ع

</div>

<div
class="map-box"
id="miniMap_${key}">
</div>

<div class="order-buttons">

<button
class="accept-btn"
onclick="acceptOrder('${key}')">

قبول الطلب

</button>

<button
class="reject-btn"
onclick="rejectOrder('${key}')">

رفض الطلب

</button>

</div>

</div>

`;

setTimeout(()=>{

const miniMap =
L.map(`miniMap_${key}`,{

zoomControl:false,
attributionControl:false

})

.setView(

[
Number(order.customerLat),
Number(order.customerLng)
],

12

);

L.tileLayer(
'https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png'
).addTo(miniMap);

L.marker(

[
driverLat,
driverLng
],

{

icon:bikeIcon

}

)

.addTo(miniMap);

L.marker(

[
Number(order.customerLat),
Number(order.customerLng)
],

{

icon:customerIcon

}

)

.addTo(miniMap);

if(order.storesData){

order.storesData.forEach(store=>{

L.marker(

[
Number(store.storeLat),
Number(store.storeLng)
],

{

icon:createStoreIcon(store)

}

)

.addTo(miniMap);

});

}

if(order.storesData){

order.storesData.forEach(store=>{

L.polyline(

[
[
driverLat,
driverLng
],
[
Number(store.storeLat),
Number(store.storeLng)
]
],

{

color:"#ff8800",
weight:5

}

)

.addTo(miniMap);

});

}

L.polyline(

[
[
driverLat,
driverLng
],
[
Number(order.customerLat),
Number(order.customerLng)
]
],

{

color:"green",
weight:5

}

)

.addTo(miniMap);

},500);
});

});
});

window.rejectOrder =
async function(id){

await update(
ref(
db,
"orders/" + id + "/rejectedBy"
),
{

[currentDriver.id]:
Date.now()

}
);

};

window.acceptOrder =
async function(id){

const orderRef =
ref(db,"orders/" + id);

const snapshot =
await get(orderRef);

if(!snapshot.exists()){
return;
}

const order =
snapshot.val();

await update(orderRef,{

status:"accepted",

statusText:
"السائق متجه إلى المتجر",

acceptedDriver:
currentDriver.name,

driverId:
currentDriver.id,

driverPhone:
currentDriver.phone || "",

driverVehicle:
currentDriver.vehicle || "",

driverImage:
currentDriver.vehicle_image || "",

driverLat:driverLat,
driverLng:driverLng,

acceptedAt:
Date.now()

});

currentOrderId = id;

document.getElementById(
"ordersContainer"
).style.display =
"none";

document.getElementById(
"deliveryPage"
).style.display =
"block";

document.getElementById(
"customerName"
).innerHTML =
"👤 " + order.customerName;

document.getElementById(
"customerPhone"
).innerHTML =
"📞 " + order.customerPhone;

document.getElementById(
"customerAddress"
).innerHTML =
"📍 " + order.customerAddress;

document.getElementById(
"whatsappCustomer"
).onclick = function(){

window.open(
`https://wa.me/${order.customerPhone}`
);

};

if(map){
map.remove();
}

map =
L.map("map").setView(
[
driverLat,
driverLng
],
13
);

L.tileLayer(
'https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png'
).addTo(map);

driverMarker =
L.marker(
[
driverLat,
driverLng
],
{
icon:bikeIcon
}
)
.addTo(map);

customerMarker =
L.marker(
[
Number(order.customerLat),
Number(order.customerLng)
],
{
icon:customerIcon
}
)
.addTo(map);

if(order.storesData){

order.storesData.forEach(store=>{

const marker =
L.marker(
[
Number(store.storeLat),
Number(store.storeLng)
],
{
icon:createStoreIcon(store)
}
)
.addTo(map);

storeMarkers.push(marker);

L.polyline(
[
[
driverLat,
driverLng
],
[
Number(store.storeLat),
Number(store.storeLng)
]
],
{
color:"#ff8800",
weight:5
}
).addTo(map);

});

}

L.polyline(
[
[
driverLat,
driverLng
],
[
Number(order.customerLat),
Number(order.customerLng)
]
],
{
color:"green",
weight:5
}
).addTo(map);

};

document.getElementById(
"arrivedStoreBtn"
).onclick =
async function(){

if(!currentOrderId){
return;
}

await update(
ref(
db,
"orders/" + currentOrderId
),
{

status:"picked_up",

statusText:
"تم استلام الطلب من المتجر"

}
);

alert("تم تحديث الحالة");

};

document.getElementById(
"arrivedCustomerBtn"
).onclick =
async function(){

if(!currentOrderId){
return;
}

await update(
ref(
db,
"orders/" + currentOrderId
),
{

status:"arrived",

statusText:
"السائق وصل إلى الزبون"

}
);

alert("تم تحديث الحالة");

};

document.getElementById(
"deliveredBtn"
).onclick =
async function(){

if(!currentOrderId){
return;
}

await update(
ref(
db,
"orders/" + currentOrderId
),
{

status:"delivered",

statusText:
"تم تسليم الطلب",

deliveredAt:
Date.now()

}
);

alert("تم توصيل الطلب");

window.location.reload();

};

document.getElementById(
"failedBtn"
).onclick =
async function(){

if(!currentOrderId){
return;
}

await update(
ref(
db,
"orders/" + currentOrderId
),
{

status:"delivery_problem"

}
);

alert("تم تسجيل المشكلة");

window.location.reload();

};

document.getElementById(
"logoutBtn"
).onclick =
function(){

localStorage.clear();

window.location.replace(
"index.html"
);

};

</script>

</body>

</html>
