<!-- drive.html -->

<!DOCTYPE html>
<html lang="ar" dir="rtl">

<head>

<meta charset="UTF-8">

<meta
name="viewport"
content="width=device-width, initial-scale=1.0">

<title>
طلبات التوصيل
</title>

<link
href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;600;700&display=swap"
rel="stylesheet">

<link
rel="stylesheet"
href="https://unpkg.com/leaflet/dist/leaflet.css"/>

<script
src="https://unpkg.com/leaflet/dist/leaflet.js">
</script>

<link
rel="stylesheet"
href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css"/>

<style>

*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:'Cairo',sans-serif;
}

body{
background:#f5f5f5;
padding-bottom:50px;
overflow-x:hidden;
}

/* HEADER */

.header{
background:
linear-gradient(
135deg,
#ff8800,
#ff5500
);

padding:15px;
border-bottom-left-radius:30px;
border-bottom-right-radius:30px;

display:flex;
justify-content:space-between;
align-items:center;

color:white;
box-shadow:0 5px 20px rgba(0,0,0,.12);
}

.driver-info{
display:flex;
flex-direction:column;
gap:8px;
}

.driver-name{
font-size:24px;
font-weight:bold;
}

.driver-badge{
background:white;
color:#ff6600;
padding:7px 12px;
border-radius:12px;
font-size:13px;
font-weight:bold;
width:fit-content;
}

.header-left{
display:flex;
align-items:center;
gap:10px;
}

.logout-btn{
width:48px;
height:48px;
border:none;
border-radius:14px;
background:white;
color:#ff6600;
font-size:20px;
cursor:pointer;
}

.driver-image{
width:65px;
height:65px;
border-radius:50%;
border:3px solid white;
object-fit:cover;
}

/* RADAR */

.radar-box{
display:flex;
flex-direction:column;
align-items:center;
justify-content:center;
padding:50px 20px;
}

.radar{
width:170px;
height:170px;
border-radius:50%;
border:5px solid #ff8800;
position:relative;
animation:radarPulse 2s infinite;
}

.radar::before{
content:"";
position:absolute;
top:50%;
left:50%;
width:22px;
height:22px;
background:#ff8800;
border-radius:50%;
transform:translate(-50%,-50%);
}

@keyframes radarPulse{

0%{
box-shadow:0 0 0 0 rgba(255,136,0,.5);
}

100%{
box-shadow:0 0 0 50px rgba(255,136,0,0);
}

}

.radar-text{
margin-top:25px;
font-size:24px;
font-weight:bold;
color:#777;
}

/* ORDERS */

.orders-container{
padding:15px;
display:flex;
flex-direction:column;
gap:20px;
}

.order-card{
background:white;
border-radius:25px;
padding:18px;
box-shadow:0 5px 20px rgba(0,0,0,.08);
}

.order-top{
display:flex;
align-items:center;
gap:12px;
margin-bottom:15px;
}

.store-image{
width:65px;
height:65px;
border-radius:16px;
object-fit:cover;
}

.customer-name{
font-size:24px;
font-weight:bold;
margin-bottom:5px;
}

.store-name{
font-size:18px;
color:#666;
font-weight:bold;
}

.big-price{
margin-top:15px;
background:#fff3e7;
padding:18px;
border-radius:18px;
text-align:center;
color:#ff6600;
font-size:24px;
font-weight:bold;
line-height:2;
}

.accept-btn{
width:100%;
margin-top:18px;
padding:16px;
border:none;
border-radius:16px;
background:#00b894;
color:white;
font-size:18px;
font-weight:bold;
cursor:pointer;
}

/* DELIVERY */

.delivery-page{
display:none;
}

#map{
width:100%;
height:55vh;
}

.map-buttons{
display:flex;
gap:10px;
padding:15px;
}

.map-btn{
flex:1;
padding:14px;
border:none;
border-radius:15px;
background:#ff6600;
color:white;
font-size:16px;
font-weight:bold;
cursor:pointer;
}

.delivery-info{
background:white;
margin:15px;
padding:18px;
border-radius:25px;
box-shadow:0 5px 20px rgba(0,0,0,.08);
}

.timer-box{
margin-top:15px;
padding:15px;
background:#fff3e7;
border-radius:18px;
text-align:center;
font-size:26px;
font-weight:bold;
color:#ff6600;
}

.extra-btn{
width:100%;
margin-top:15px;
padding:16px;
border:none;
border-radius:16px;
background:#0984e3;
color:white;
font-size:18px;
font-weight:bold;
cursor:pointer;
}

#deliveredBtn{
width:100%;
margin-top:15px;
padding:18px;
border:none;
border-radius:18px;
background:#00b894;
color:white;
font-size:20px;
font-weight:bold;
display:none;
cursor:pointer;
}

.product-item{
padding:14px;
margin-top:10px;
background:#fafafa;
border-radius:15px;
line-height:2;
}

</style>

</head>

<body>

<header class="header">

<div class="driver-info">

<h2
class="driver-name"
id="driverName">

السائق

</h2>

<div class="driver-badge">

الطلبات المكتملة:
<span id="completedCount">
0
</span>

</div>

<div class="driver-badge">

ارباح الشهر:
<span id="monthProfit">
0
</span>
د.ع

</div>

<div class="driver-badge">

الطلبات الحالية:
<span id="currentOrdersCount">
0
</span>

</div>

</div>

<div class="header-left">

<button
class="logout-btn"
id="logoutBtn">

<i class="fa-solid fa-right-from-bracket"></i>

</button>

<img
src="driver.png"
class="driver-image">

</div>

</header>

<div
class="orders-container"
id="ordersContainer">

<div
class="radar-box"
id="radarBox">

<div class="radar"></div>

<div class="radar-text">

جاري البحث عن طلبات...

</div>

</div>

</div>

<div
class="delivery-page"
id="deliveryPage">

<div id="map"></div>

<div class="map-buttons">

<button
class="map-btn"
id="zoomIn">

تكبير

</button>

<button
class="map-btn"
id="zoomOut">

تصغير

</button>

<button
class="map-btn"
id="stopTracking">

ايقاف التتبع

</button>

</div>

<div class="delivery-info">

<h2 id="customerName"></h2>

<p id="storeName"></p>

<p id="customerPhone"></p>

<button
id="whatsappCustomer"
class="extra-btn"
style="background:#25D366;">

واتساب الزبون

</button>

<div id="productsContainer"></div>

<div
class="big-price"
id="pricesBox">

</div>

<div
class="timer-box"
id="timerBox">

15:00

</div>

<button
class="extra-btn"
id="extraTimeBtn">

طلب زيادة الوقت +10 دقائق

</button>

<button
id="deliveredBtn">

تم الايصال

</button>

</div>

</div>

<script type="module">

import { initializeApp }
from "https://www.gstatic.com/firebasejs/12.13.0/firebase-app.js";

import {

getDatabase,
ref,
onValue,
update,
get,
set

}

from "https://www.gstatic.com/firebasejs/12.13.0/firebase-database.js";

const firebaseConfig = {

apiKey:"AIzaSyC7QzQTYMSGRV_nraJBneBqDqYGhugF0Pw",

authDomain:"fast-937c9.firebaseapp.com",

projectId:"fast-937c9",

storageBucket:"fast-937c9.firebasestorage.app",

messagingSenderId:"221388561840",

appId:"1:221388561840:web:ec9d75183ddd7d44be0a75",

databaseURL:
"https://fast-937c9-default-rtdb.europe-west1.firebasedatabase.app"

};

const app =
initializeApp(firebaseConfig);

const db =
getDatabase(app);

const currentDriver =
JSON.parse(
localStorage.getItem("user")
);

if(!currentDriver){

window.location.href =
"index.html";

}

document.getElementById(
"driverName"
).innerHTML =
currentDriver.name || "سائق";

let currentOrderId = null;

let map;
let watchId;

function calculateDistance(
lat1,
lon1,
lat2,
lon2
){

const R = 6371;

const dLat =
(lat2-lat1) *
Math.PI / 180;

const dLon =
(lon2-lon1) *
Math.PI / 180;

const a =

Math.sin(dLat/2) *
Math.sin(dLat/2)

+

Math.cos(lat1*Math.PI/180)

*

Math.cos(lat2*Math.PI/180)

*

Math.sin(dLon/2)

*

Math.sin(dLon/2);

const c =
2 *
Math.atan2(
Math.sqrt(a),
Math.sqrt(1-a)
);

return R * c;

}

/* الطلبات */

onValue(
ref(db,"orders"),
(snapshot)=>{

const container =
document.getElementById(
"ordersContainer"
);

container.innerHTML = "";

if(!snapshot.exists()){

container.innerHTML = `

<div class="radar-box">

<div class="radar"></div>

<div class="radar-text">

جاري البحث عن طلبات...

</div>

</div>

`;

return;

}

const orders =
snapshot.val();

Object.keys(orders)
.forEach((key)=>{

const order =
orders[key];

if(
order.status !==
"waiting_driver"
){
return;
}

container.innerHTML += `

<div class="order-card">

<div class="order-top">

<img
src="${order.storeImage || 'store.png'}"
class="store-image">

<div>

<div class="customer-name">

${order.customerName}

</div>

<div class="store-name">

${order.storeName}

</div>

</div>

</div>

<div class="big-price">

سعر الطلب:
${order.productsPrice || 0}
د.ع

<br>

اجرة التوصيل:
${order.deliveryPrice || 0}
د.ع

</div>

<button
class="accept-btn"
onclick="acceptOrder('${key}')">

عرض الطلب

</button>

</div>

`;

});

});

/* قبول الطلب */

window.acceptOrder =
async function(id){

const snapshot =
await get(
ref(db,"orders/"+id)
);

if(!snapshot.exists()){
return;
}

const order =
snapshot.val();

currentOrderId = id;

await update(
ref(db,"orders/"+id),
{
status:"accepted",
driverId:currentDriver.id
}
);

document.getElementById(
"ordersContainer"
).style.display =
"none";

document.getElementById(
"deliveryPage"
).style.display =
"block";

document.getElementById(
"customerName"
).innerHTML =
order.customerName;

document.getElementById(
"storeName"
).innerHTML =
"المتجر: " +
order.storeName;

document.getElementById(
"customerPhone"
).innerHTML =
"📞 " +
order.customerPhone;

document.getElementById(
"whatsappCustomer"
).onclick = ()=>{

window.open(
`https://wa.me/${order.customerPhone}`
);

};

document.getElementById(
"pricesBox"
).innerHTML =

`
سعر الطلب:
${order.productsPrice} د.ع

<br>

اجرة التوصيل:
${order.deliveryPrice} د.ع

<br>

المجموع:
${order.totalPrice} د.ع
`;

const productsContainer =
document.getElementById(
"productsContainer"
);

productsContainer.innerHTML = "";

order.items.forEach((item)=>{

productsContainer.innerHTML += `

<div class="product-item">

🍔 ${item.name}

<br>

الكمية:
${item.qty}

<br>

السعر:
${item.price} د.ع

<br>

الوصف:
${item.description || "لا يوجد"}

</div>

`;

});

/* الخريطة */

navigator.geolocation
.getCurrentPosition((position)=>{

const driverLat =
position.coords.latitude;

const driverLng =
position.coords.longitude;

map =
L.map("map").setView(
[
driverLat,
driverLng
],
13
);

L.tileLayer(
'https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png'
).addTo(map);

const route =
[
[
driverLat,
driverLng
],
[
order.storeLat,
order.storeLng
],
[
order.customerLat,
order.customerLng
]
];

L.polyline(
route,
{
color:"blue",
weight:6
}
).addTo(map);

L.marker(route[0]).addTo(map);

L.marker(route[1]).addTo(map);

L.marker(route[2]).addTo(map);

watchId =
navigator.geolocation.watchPosition(

(pos)=>{

const newLat =
pos.coords.latitude;

const newLng =
pos.coords.longitude;

map.setView(
[
newLat,
newLng
]
);

}

);

});

/* المؤقت */

let totalSeconds =
15 * 60;

let reachedStore = false;

const timer =
setInterval(async()=>{

const minutes =
Math.floor(totalSeconds / 60);

const seconds =
totalSeconds % 60;

document.getElementById(
"timerBox"
).innerHTML =

`${minutes}:${seconds
.toString()
.padStart(2,'0')}`;

totalSeconds--;

navigator.geolocation
.getCurrentPosition(
async(position)=>{

const distanceToStore =
calculateDistance(

position.coords.latitude,
position.coords.longitude,

order.storeLat,
order.storeLng

);

const distanceToCustomer =
calculateDistance(

position.coords.latitude,
position.coords.longitude,

order.customerLat,
order.customerLng

);

/* وصل للمتجر */

if(
distanceToStore < 0.2 &&
!reachedStore
){

reachedStore = true;

totalSeconds =
45 * 60;

alert(
"تم الوصول للمتجر"
);

}

/* وصل للزبون */

if(
distanceToCustomer < 0.2 &&
reachedStore
){

document.getElementById(
"deliveredBtn"
).style.display =
"block";

}

});

if(totalSeconds <= 0){

clearInterval(timer);

await update(
ref(
db,
"orders/" + id
),
{
status:"waiting_driver"
}
);

await update(
ref(
db,
"drivers/" +
currentDriver.id
),
{
status:"inactive",
reactiveAt:
Date.now() +
(
3 * 24 * 60 * 60 * 1000
)
}
);

alert(
"تم تعطيل الحساب لمدة 3 ايام"
);

window.location.reload();

}

},1000);

/* زيادة الوقت */

document.getElementById(
"extraTimeBtn"
).onclick = ()=>{

totalSeconds +=
10 * 60;

};

};

/* تم الايصال */

document.getElementById(
"deliveredBtn"
).onclick =
async()=>{

await update(
ref(
db,
"orders/" +
currentOrderId
),
{
status:"delivered"
}
);

alert(
"تم توصيل الطلب"
);

window.location.reload();

};

/* الخريطة */

document.getElementById(
"zoomIn"
).onclick = ()=>{

map.zoomIn();

};

document.getElementById(
"zoomOut"
).onclick = ()=>{

map.zoomOut();

};

document.getElementById(
"stopTracking"
).onclick = ()=>{

navigator.geolocation
.clearWatch(watchId);

alert(
"تم ايقاف التتبع"
);

};

/* تسجيل خروج */

document.getElementById(
"logoutBtn"
).onclick = ()=>{

localStorage.removeItem(
"user"
);

window.location.href =
"index.html";

};

</script>

</body>

</html>
