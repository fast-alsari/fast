<!DOCTYPE html>
<html lang="ar" dir="rtl">

<head>

<meta charset="UTF-8">

<meta
name="viewport"
content="width=device-width, initial-scale=1.0">

<title>
لوحة السائق
</title>

<link
rel="stylesheet"
href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css"/>

<link
rel="stylesheet"
href="https://unpkg.com/leaflet/dist/leaflet.css"/>

<link
rel="stylesheet"
href="https://unpkg.com/leaflet-routing-machine/dist/leaflet-routing-machine.css"/>

<script src="https://unpkg.com/leaflet/dist/leaflet.js"></script>

<script src="https://unpkg.com/leaflet-routing-machine/dist/leaflet-routing-machine.js"></script>

<link
href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;500;600;700;800&display=swap"
rel="stylesheet">

<style>

*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:'Cairo',sans-serif;
}

body{
background:#f5f6fa;
padding-bottom:120px;
overflow-x:hidden;
}

.header{
background:
linear-gradient(
135deg,
#ff8800,
#ff5500
);

padding:24px;
color:white;

border-bottom-left-radius:30px;
border-bottom-right-radius:30px;
}

.driver-box{
display:flex;
align-items:center;
gap:14px;
}

.driver-image{
width:80px;
height:80px;
border-radius:50%;
object-fit:cover;
border:3px solid white;
background:white;
}

.driver-info h2{
font-size:24px;
margin-bottom:6px;
}

.driver-info p{
opacity:.9;
}

.online-btn{
margin-top:18px;
width:100%;
height:54px;
border:none;
border-radius:18px;
background:white;
color:#00b894;
font-size:16px;
font-weight:bold;
cursor:pointer;
}

.stats{
display:grid;
grid-template-columns:1fr 1fr;
gap:15px;
padding:15px;
}

.stat-card{
background:white;
padding:20px;
border-radius:24px;
text-align:center;
box-shadow:
0 5px 18px rgba(0,0,0,.06);
}

.stat-card h2{
font-size:32px;
color:#ff8800;
margin-bottom:8px;
}

.orders-container{
padding:15px;
display:flex;
flex-direction:column;
gap:18px;
}

.order-card{
background:white;
padding:18px;
border-radius:28px;
box-shadow:
0 5px 18px rgba(0,0,0,.06);
}

.order-top{
display:flex;
justify-content:space-between;
align-items:center;
margin-bottom:15px;
}

.order-price{
font-size:28px;
font-weight:bold;
color:#00b894;
}

.order-status{
padding:8px 14px;
border-radius:14px;
background:#fff3e0;
color:#ff6600;
font-size:13px;
font-weight:bold;
}

.customer-box{
background:#f8f8f8;
padding:15px;
border-radius:18px;
margin-bottom:15px;
}

.customer-box h3{
margin-bottom:8px;
}

.customer-box p{
font-size:14px;
color:#666;
margin-bottom:5px;
}

.map-box{
width:100%;
height:300px;
border-radius:22px;
overflow:hidden;
margin-bottom:15px;
}

.actions{
display:grid;
grid-template-columns:1fr 1fr;
gap:10px;
}

.actions button,
.actions a{
height:50px;
border:none;
border-radius:16px;
font-size:14px;
font-weight:bold;
cursor:pointer;
text-decoration:none;
display:flex;
align-items:center;
justify-content:center;
color:white;
}

.accept-btn{
background:#00b894;
}

.pickup-btn{
background:#2563eb;
}

.delivery-btn{
background:#7c3aed;
}

.finish-btn{
background:#ff8800;
}

.whatsapp-btn{
background:#25D366;
}

.empty{
padding:60px 20px;
text-align:center;
color:#777;
font-size:16px;
}

.bottom-bar{
position:fixed;
bottom:0;
left:0;
right:0;
height:82px;
background:white;
display:flex;
justify-content:space-around;
align-items:center;
box-shadow:
0 -5px 18px rgba(0,0,0,.08);
}

.nav-item{
display:flex;
flex-direction:column;
align-items:center;
gap:5px;
font-size:13px;
font-weight:bold;
color:#888;
}

.nav-item.active{
color:#ff8800;
}

.nav-item i{
font-size:22px;
}

</style>

</head>

<body>

<div class="header">

<div class="driver-box">

<img
src="user.png"
id="driverImage"
class="driver-image">

<div class="driver-info">

<h2 id="driverName">
السائق
</h2>

<p id="driverPhone">
000000
</p>

</div>

</div>

<button
class="online-btn"
id="onlineBtn"
onclick="toggleOnline()">

متصل الآن

</button>

</div>

<div class="stats">

<div class="stat-card">

<h2 id="completedOrders">
0
</h2>

<p>
طلبات مكتملة
</p>

</div>

<div class="stat-card">

<h2 id="profits">
0
</h2>

<p>
الأرباح
</p>

</div>

</div>

<div
class="orders-container"
id="ordersContainer"></div>

<div class="bottom-bar">

<div class="nav-item active">

<i class="fa-solid fa-motorcycle"></i>

<span>
الطلبات
</span>

</div>

<div
class="nav-item"
onclick="window.location.href='asca.html'">

<i class="fa-solid fa-user"></i>

<span>
الحساب
</span>

</div>

</div>

<script type="module">

import { db }
from "./firebase.js";

import {
ref,
onValue,
update
}
from "https://www.gstatic.com/firebasejs/12.13.0/firebase-database.js";

import {
formatPrice
}
from "./utils.js";

const currentUser =
JSON.parse(
localStorage.getItem("user")
);

if(
!currentUser ||
currentUser.type !== "driver"
){

window.location.replace(
"index.html"
);

}

let driverLat = null;
let driverLng = null;
let isOnline = true;

document.getElementById(
"driverName"
).innerHTML =
currentUser.name || "";

document.getElementById(
"driverPhone"
).innerHTML =
currentUser.phone || "";

document.getElementById(
"driverImage"
).src =
currentUser.image || "user.png";

document.getElementById(
"completedOrders"
).innerHTML =
currentUser.completedOrders || 0;

document.getElementById(
"profits"
).innerHTML =
formatPrice(
currentUser.totalProfit || 0
);

navigator.geolocation.watchPosition(

async(position)=>{

driverLat =
position.coords.latitude;

driverLng =
position.coords.longitude;

await update(
ref(db,"drivers/" + currentUser.id),
{

latitude:driverLat,
longitude:driverLng,
isOnline:isOnline,
lastSeen:Date.now()

}
);

},

(error)=>{

console.log(error);

},

{
enableHighAccuracy:true
}

);

window.toggleOnline =
async function(){

isOnline = !isOnline;

const btn =
document.getElementById(
"onlineBtn"
);

btn.innerHTML =
isOnline
?
"متصل الآن"
:
"متوقف";

btn.style.color =
isOnline
?
"#00b894"
:
"#e53935";

await update(
ref(db,"drivers/" + currentUser.id),
{

isOnline:isOnline

}
);

};

const container =
document.getElementById(
"ordersContainer"
);

onValue(
ref(db,"orders"),
(snapshot)=>{

container.innerHTML = "";

if(!snapshot.exists()){

container.innerHTML = `
<div class="empty">
لا توجد طلبات
</div>
`;

return;

}

const orders =
snapshot.val();

let found = false;

for(let key in orders){

const order =
orders[key];

if(
order.status !== "waiting_driver"
&&
order.driverId !== currentUser.id
){
continue;
}

found = true;

container.innerHTML += `

<div class="order-card">

<div class="order-top">

<div class="order-status">
${getStatus(order.status)}
</div>

<div class="order-price">
${formatPrice(order.deliveryPrice)}
</div>

</div>

<div class="customer-box">

<h3>
${order.customerName || ""}
</h3>

<p>
📞 ${order.customerPhone || ""}
</p>

<p>
📍 ${order.customerAddress || ""}
</p>

</div>

<div
class="map-box"
id="map_${order.id}"></div>

<div class="actions">

${order.status === "waiting_driver"

?

`

<button
class="accept-btn"
onclick="acceptOrder('${order.id}')">

قبول الطلب

</button>

`

:

`

<a
href="https://wa.me/${order.customerPhone}"
target="_blank"
class="whatsapp-btn">

واتساب

</a>

<button
class="pickup-btn"
onclick="pickupOrder('${order.id}')">

استلام الطلب

</button>

<button
class="delivery-btn"
onclick="deliverOrder('${order.id}')">

بالطريق

</button>

<button
class="finish-btn"
onclick="finishOrder('${order.id}')">

تم التوصيل

</button>

`

}

</div>

</div>

`;

setTimeout(()=>{

createMap(order);

},100);

}

if(!found){

container.innerHTML = `
<div class="empty">
لا توجد طلبات حالياً
</div>
`;

}

}
);

function createMap(order){

const map = L.map(
`map_${order.id}`
).setView(
[
order.customerLat,
order.customerLng
],
13
);

L.tileLayer(
'https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png',
{
maxZoom:19
}
).addTo(map);

const customer =
L.latLng(
order.customerLat,
order.customerLng
);

const store =
L.latLng(
order.products[0]?.storeLat || 0,
order.products[0]?.storeLng || 0
);

L.marker(customer)
.addTo(map);

L.marker(store)
.addTo(map);

L.polyline(
[
store,
customer
],
{
color:"#ff8800",
weight:6
}
).addTo(map);

if(driverLat && driverLng){

L.marker(
[
driverLat,
driverLng
]
).addTo(map);

L.polyline(
[
[
driverLat,
driverLng
],
store
],
{
color:"#2563eb",
weight:6
}
).addTo(map);

}

}

window.acceptOrder =
async function(orderId){

await update(
ref(db,"orders/" + orderId),
{

status:"accepted",

driverId:
currentUser.id,

driverName:
currentUser.name,

driverPhone:
currentUser.phone,

driverLat:
driverLat,

driverLng:
driverLng,

statusText:
"السائق متجه للمتجر"

}
);

};

window.pickupOrder =
async function(orderId){

await update(
ref(db,"orders/" + orderId),
{

status:"picked_up",

statusText:
"تم استلام الطلب"

}
);

};

window.deliverOrder =
async function(orderId){

await update(
ref(db,"orders/" + orderId),
{

status:"on_the_way",

statusText:
"السائق بالطريق إليك"

}
);

};

window.finishOrder =
async function(orderId){

await update(
ref(db,"orders/" + orderId),
{

status:"delivered",

statusText:
"تم توصيل الطلب",

deliveredAt:
Date.now()

}
);

alert("تم التوصيل");

};

function getStatus(status){

if(status === "waiting_driver"){
return "بانتظار سائق";
}

if(status === "accepted"){
return "تم القبول";
}

if(status === "picked_up"){
return "تم الاستلام";
}

if(status === "on_the_way"){
return "بالطريق";
}

if(status === "delivered"){
return "تم التوصيل";
}

return status;

}

</script>

</body>

</html>
