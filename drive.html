<!-- drive.html -->

<!DOCTYPE html>
<html lang="ar" dir="rtl">

<head>

<meta charset="UTF-8">

<meta name="viewport"
content="width=device-width, initial-scale=1.0">

<title>
طلبات التوصيل
</title>

<link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;600;700&display=swap"
rel="stylesheet">

<link rel="stylesheet"
href="https://unpkg.com/leaflet/dist/leaflet.css"/>

<script
src="https://unpkg.com/leaflet/dist/leaflet.js">
</script>

<link rel="stylesheet"
href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css"/>

<style>

*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:'Cairo',sans-serif;
}

body{
background:#f5f5f5;
padding-bottom:40px;
overflow-x:hidden;
}

/* HEADER */

.header{
background:
linear-gradient(
135deg,
#ff8800,
#ff5500
);

padding:20px;
border-bottom-left-radius:30px;
border-bottom-right-radius:30px;

display:flex;
justify-content:space-between;
align-items:center;

color:white;

box-shadow:
0 5px 20px rgba(0,0,0,.12);
}

.header-left{
display:flex;
align-items:center;
gap:12px;
}

.logout-btn{
width:48px;
height:48px;
border:none;
border-radius:14px;
background:white;
color:#ff5500;
font-size:20px;
cursor:pointer;

display:flex;
align-items:center;
justify-content:center;

box-shadow:
0 5px 15px rgba(0,0,0,.12);
}

.driver-image{
width:70px;
height:70px;
border-radius:50%;
border:3px solid white;
object-fit:cover;
}

.driver-top-info{
margin-top:15px;
display:flex;
flex-direction:column;
gap:8px;
}

.driver-badge{
background:white;
color:#ff6600;
padding:8px 14px;
border-radius:14px;
font-size:14px;
font-weight:bold;
width:fit-content;
}

.expire-box{
background:rgba(255,255,255,.2);
padding:8px 14px;
border-radius:14px;
font-size:14px;
width:fit-content;
}

/* RADAR */

.radar-box{
display:flex;
flex-direction:column;
align-items:center;
justify-content:center;
padding:80px 20px;
}

.radar{
width:160px;
height:160px;
border-radius:50%;
border:5px solid #ff8800;
position:relative;
animation:radarPulse 2s infinite;
}

.radar::before{
content:"";
position:absolute;
top:50%;
left:50%;
width:20px;
height:20px;
background:#ff8800;
border-radius:50%;
transform:translate(-50%,-50%);
}

@keyframes radarPulse{

0%{
box-shadow:
0 0 0 0 rgba(255,136,0,.5);
}

100%{
box-shadow:
0 0 0 50px rgba(255,136,0,0);
}

}

.radar-text{
margin-top:25px;
font-size:18px;
font-weight:bold;
color:#777;
}

/* ORDERS */

.orders-container{
padding:15px;
display:flex;
flex-direction:column;
gap:18px;
}

.order-card{
background:white;
padding:20px;
border-radius:25px;
box-shadow:0 5px 20px rgba(0,0,0,.08);
}

.order-card h3{
font-size:22px;
margin-bottom:12px;
}

.order-card p{
margin-bottom:8px;
color:#666;
font-size:15px;
}

.price-box{
margin-top:15px;
background:#fff4e8;
padding:14px;
border-radius:16px;
font-size:18px;
font-weight:bold;
color:#ff6600;
text-align:center;
}

.order-buttons{
display:flex;
gap:10px;
margin-top:18px;
}

.accept-btn{
flex:1;
padding:14px;
border:none;
border-radius:16px;
background:#00b894;
color:white;
font-size:16px;
font-weight:bold;
cursor:pointer;
}

.back-btn{
flex:1;
padding:14px;
border:none;
border-radius:16px;
background:#ddd;
font-size:16px;
font-weight:bold;
cursor:pointer;
}

/* DELIVERY PAGE */

.delivery-page{
display:none;
}

#map{
height:55vh;
width:100%;
}

.delivery-info{
padding:20px;
background:white;
margin:15px;
border-radius:25px;
box-shadow:0 5px 20px rgba(0,0,0,.08);
}

.delivery-info h3{
margin-bottom:15px;
font-size:22px;
}

.delivery-info p{
margin-bottom:12px;
font-size:16px;
color:#555;
}

#deliveredBtn{
width:calc(100% - 30px);
margin:0 15px;
padding:18px;
border:none;
border-radius:18px;
background:#00b894;
color:white;
font-size:18px;
font-weight:bold;
cursor:pointer;
}

</style>

</head>

<body>

<!-- HEADER -->

<header class="header">

<div>

<h2>
طلبات التوصيل
</h2>

<p>

اهلاً،
<span id="driverName">

السائق

</span>

👋

</p>

<div class="driver-top-info">

<div
class="driver-badge"
id="driverAccountType">

VIP

</div>

<div
class="expire-box"
id="expireDate">

ينتهي:
2026/1/1

</div>

</div>

</div>

<div class="header-left">

<button
class="logout-btn"
onclick="logout()">

<i class="fa-solid fa-right-from-bracket"></i>

</button>

<img
src="driver.png"
class="driver-image">

</div>

</header>

<!-- NO ORDERS -->

<div
class="radar-box"
id="radarBox">

<div class="radar"></div>

<div class="radar-text">

جاري البحث عن طلبات...

</div>

</div>

<!-- ORDERS -->

<div
class="orders-container"
id="ordersContainer">

</div>

<!-- DELIVERY PAGE -->

<div
class="delivery-page"
id="deliveryPage">

<div id="map"></div>

<div class="delivery-info">

<h3>
معلومات الزبون
</h3>

<p id="customerName"></p>

<p id="customerPhone"></p>

<p id="customerAddress"></p>

<p id="nearestPoint"></p>

</div>

<button id="deliveredBtn">

تم الايصال

</button>

</div>

<script type="module">

import { initializeApp }
from "https://www.gstatic.com/firebasejs/10.12.2/firebase-app.js";

import {

getDatabase,
ref,
onValue,
update,
get

}
from "https://www.gstatic.com/firebasejs/10.12.2/firebase-database.js";

/* FIREBASE */

const firebaseConfig = {

apiKey:"ضع_apiKey",

authDomain:"ضع_authDomain",

databaseURL:"ضع_databaseURL",

projectId:"ضع_projectId",

storageBucket:"ضع_storageBucket",

messagingSenderId:"ضع_senderId",

appId:"ضع_appId"

};

const app =
initializeApp(firebaseConfig);

const db =
getDatabase(app);

/* DRIVER */

const currentDriver =
JSON.parse(
localStorage.getItem("user")
);

if(!currentDriver){

window.location.href =
"index.html";

}

/* اسم السائق */

document.getElementById(
"driverName"
).innerHTML =
currentDriver.name || "سائق";

/* نوع الحساب */

document.getElementById(
"driverAccountType"
).innerHTML =
currentDriver.subscription ||
"عادي";

/* تاريخ الانتهاء */

document.getElementById(
"expireDate"
).innerHTML =
"ينتهي الاشتراك: " +
(
currentDriver.expireDate ||
"غير محدد"
);

let currentOrderId = null;

/* حساب التأخير */

function getDelay(){

const type =
(
currentDriver.subscription ||
"normal"
)
.toLowerCase();

if(type === "vip"){

return 0;

}

if(type === "sender"){

return 60000;

}

return 120000;

}

/* الطلبات اللحظية */

onValue(
ref(db,"orders"),
(snapshot)=>{

const radarBox =
document.getElementById(
"radarBox"
);

const container =
document.getElementById(
"ordersContainer"
);

container.innerHTML = "";

if(!snapshot.exists()){

radarBox.style.display =
"flex";

return;

}

const orders =
snapshot.val();

let found = false;

Object.keys(orders)
.forEach((key)=>{

const order =
orders[key];

/* انتهاء الطلب */

if(
Date.now() -
order.createdAt >
3600000
){

update(
ref(db,"orders/"+key),
{
status:"expired"
}
);

return;

}

/* اذا الطلب مقبول */

if(order.status !== "pending"){

return;

}

found = true;

/* تأخير الحساب */

setTimeout(()=>{

container.innerHTML += `

<div class="order-card">

<h3>

${order.customerName}

</h3>

<p>

📍 من:
${order.storeLocation}

</p>

<p>

🏠 الى:
${order.customerAddress}

</p>

<div class="price-box">

سعر التوصيل:
${order.deliveryPrice}
د.ع

</div>

<div class="order-buttons">

<button
class="accept-btn"
onclick="acceptOrder(
'${key}'
)">

قبول الطلب

</button>

<button
class="back-btn">

رجوع

</button>

</div>

</div>

`;

radarBox.style.display =
"none";

},getDelay());

});

if(!found){

radarBox.style.display =
"flex";

}

});

/* قبول الطلب */

window.acceptOrder =
async function(id){

const orderRef =
ref(db,"orders/"+id);

const snapshot =
await get(orderRef);

if(!snapshot.exists()){

alert(
"تم حذف الطلب"
);

return;

}

const order =
snapshot.val();

/* اذا الطلب مقبول */

if(order.status !== "pending"){

alert(
"تم قبول الطلب من سائق آخر"
);

return;

}

/* قبول الطلب */

await update(orderRef,{

status:"accepted",

acceptedDriver:
currentDriver.name,

driverId:
currentDriver.id,

acceptedAt:
Date.now()

});

currentOrderId = id;

/* اخفاء الطلبات */

document.getElementById(
"ordersContainer"
).style.display =
"none";

document.getElementById(
"radarBox"
).style.display =
"none";

/* اظهار التوصيل */

document.getElementById(
"deliveryPage"
).style.display =
"block";

/* بيانات الزبون */

document.getElementById(
"customerName"
).innerHTML =
"👤 " +
order.customerName;

document.getElementById(
"customerPhone"
).innerHTML =
"📞 " +
order.customerPhone;

document.getElementById(
"customerAddress"
).innerHTML =
"📍 " +
order.customerAddress;

document.getElementById(
"nearestPoint"
).innerHTML =
"📌 " +
order.nearestPoint;

/* MAP */

navigator.geolocation
.getCurrentPosition((position)=>{

const driverLat =
position.coords.latitude;

const driverLng =
position.coords.longitude;

const map =
L.map('map')
.setView(
[
driverLat,
driverLng
],
13
);

L.tileLayer(
'https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png'
).addTo(map);

/* DRIVER */

L.marker(
[
driverLat,
driverLng
]
)
.addTo(map)
.bindPopup(
'موقعك الحالي'
)
.openPopup();

/* CUSTOMER */

L.marker(
[
order.customerLat,
order.customerLng
]
)
.addTo(map)
.bindPopup(
'موقع الزبون'
);

/* ROUTE */

L.polyline(
[
[
driverLat,
driverLng
],
[
order.customerLat,
order.customerLng
]
],
{
color:'blue'
}
).addTo(map);

});

};

/* تم التوصيل */

document.getElementById(
"deliveredBtn"
).addEventListener(
"click",
async()=>{

if(!currentOrderId){

return;

}

await update(
ref(
db,
"orders/" +
currentOrderId
),
{

status:"delivered",

deliveredAt:
Date.now()

}
);

alert(
"تم توصيل الطلب"
);

window.location.reload();

});

/* تسجيل الخروج */

window.logout =
function(){

/* حذف بيانات الجلسة */

localStorage.removeItem(
"user"
);

localStorage.removeItem(
"driver"
);

/* حذف التخزين بالكامل */

localStorage.clear();

/* تحويل */

window.location.href =
"index.html";

};

</script>

</body>

</html>
