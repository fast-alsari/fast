<!-- drive.html -->

<!DOCTYPE html>
<html lang="ar" dir="rtl">

<head>

<meta charset="UTF-8">

<meta
name="viewport"
content="width=device-width, initial-scale=1.0">

<title>
السائق
</title>

<link
href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;500;600;700;800&display=swap"
rel="stylesheet">

<link
rel="stylesheet"
href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css"/>

<link
rel="stylesheet"
href="https://unpkg.com/leaflet/dist/leaflet.css"/>

<link
rel="stylesheet"
href="https://unpkg.com/leaflet-routing-machine/dist/leaflet-routing-machine.css"/>

<script
src="https://unpkg.com/leaflet/dist/leaflet.js">
</script>

<script
src="https://unpkg.com/leaflet-routing-machine/dist/leaflet-routing-machine.js">
</script>

<style>

*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:'Cairo',sans-serif;
-webkit-tap-highlight-color:transparent;
}

body{
background:#f5f5f5;
overflow-x:hidden;
padding-bottom:30px;
}

.header{
background:
linear-gradient(
135deg,
#ff8800,
#ff5500
);

padding:20px;
border-bottom-left-radius:30px;
border-bottom-right-radius:30px;
display:flex;
justify-content:space-between;
align-items:center;
color:white;
box-shadow:0 5px 20px rgba(0,0,0,.10);
}

.driver-info{
display:flex;
align-items:center;
gap:14px;
}

.driver-image{
width:60px;
height:60px;
border-radius:50%;
object-fit:cover;
border:3px solid white;
background:white;
}

.driver-name{
font-size:22px;
font-weight:bold;
}

.logout-btn{
width:48px;
height:48px;
border:none;
border-radius:16px;
background:white;
color:#ff5500;
font-size:20px;
cursor:pointer;
}

.orders-container{
padding:15px;
display:flex;
flex-direction:column;
gap:18px;
}

.order-card{
background:white;
padding:16px;
border-radius:24px;
box-shadow:0 5px 18px rgba(0,0,0,.08);
}

.customer-name{
font-size:21px;
font-weight:bold;
margin-bottom:15px;
}

.store-box{
background:#fafafa;
padding:14px;
border-radius:20px;
margin-bottom:14px;
border:1px solid #eee;
}

.store-header{
display:flex;
align-items:center;
gap:12px;
margin-bottom:12px;
}

.store-image{
width:65px;
height:65px;
border-radius:18px;
object-fit:cover;
background:#eee;
}

.store-name{
font-size:17px;
font-weight:bold;
}

.product-box{
background:white;
padding:12px;
border-radius:18px;
margin-bottom:10px;
border:1px solid #eee;
}

.product-top{
display:flex;
align-items:center;
gap:12px;
}

.product-image{
width:60px;
height:60px;
border-radius:16px;
object-fit:cover;
background:#eee;
}

.product-info{
flex:1;
}

.product-name{
font-size:15px;
font-weight:bold;
margin-bottom:6px;
}

.product-details{
font-size:13px;
color:#666;
line-height:1.8;
}

.price-box{
background:#fff4e8;
padding:15px;
border-radius:18px;
text-align:center;
font-size:18px;
font-weight:bold;
color:#ff6600;
margin-top:15px;
line-height:2;
}

.map-box{
width:100%;
height:250px;
border-radius:22px;
overflow:hidden;
margin-top:15px;
}

.order-buttons{
display:flex;
gap:10px;
margin-top:18px;
}

.accept-btn,
.reject-btn{
flex:1;
padding:16px;
border:none;
border-radius:18px;
font-size:15px;
font-weight:bold;
cursor:pointer;
color:white;
}

.accept-btn{
background:#00b894;
}

.reject-btn{
background:#e53935;
}

.delivery-page{
display:none;
}

#liveMap{
width:100%;
height:60vh;
border-bottom-left-radius:30px;
border-bottom-right-radius:30px;
overflow:hidden;
}

.delivery-info{
background:white;
margin:15px;
padding:18px;
border-radius:25px;
box-shadow:0 5px 18px rgba(0,0,0,.08);
}

.delivery-info h3{
font-size:22px;
margin-bottom:15px;
}

.delivery-info p{
font-size:15px;
margin-bottom:10px;
color:#555;
}

.action-btn{
width:100%;
padding:17px;
border:none;
border-radius:18px;
font-size:16px;
font-weight:bold;
cursor:pointer;
color:white;
margin-top:12px;
}

.done-btn{
background:#00b894;
}

.problem-btn{
background:#e53935;
}

.whatsapp-btn{
background:#25D366;
}

.radar-box{
display:flex;
flex-direction:column;
align-items:center;
justify-content:center;
padding:40px 20px;
}

.radar{
width:130px;
height:130px;
border-radius:50%;
border:5px solid #ff8800;
animation:radarPulse 2s infinite;
position:relative;
}

.radar::before{
content:"";
position:absolute;
top:50%;
left:50%;
width:18px;
height:18px;
background:#ff8800;
border-radius:50%;
transform:translate(-50%,-50%);
}

@keyframes radarPulse{

0%{
box-shadow:0 0 0 0 rgba(255,136,0,.5);
}

100%{
box-shadow:0 0 0 40px rgba(255,136,0,0);
}

}

.radar-text{
margin-top:20px;
font-size:18px;
font-weight:bold;
color:#777;
}

</style>

</head>

<body>

<header class="header">

<div class="driver-info">

<img
id="driverImage"
src="user.png"
class="driver-image">

<div
class="driver-name"
id="driverName">

السائق

</div>

</div>

<button
class="logout-btn"
id="logoutBtn">

<i class="fa-solid fa-right-from-bracket"></i>

</button>

</header>

<div
class="orders-container"
id="ordersContainer">

<div class="radar-box">

<div class="radar"></div>

<div class="radar-text">
جاري البحث عن الطلبات...
</div>

</div>

</div>

<div
class="delivery-page"
id="deliveryPage">

<div id="liveMap"></div>

<div class="delivery-info">

<h3>
معلومات الزبون
</h3>

<p id="customerName"></p>

<p id="customerPhone"></p>

<p id="customerAddress"></p>

<button
id="whatsappCustomer"
class="action-btn whatsapp-btn">

واتساب الزبون

</button>

<div id="productsDetails"></div>

<button
id="deliveredBtn"
class="action-btn done-btn">

تم التوصيل

</button>

<button
id="problemBtn"
class="action-btn problem-btn">

مشكلة بالتوصيل

</button>

</div>

</div>

<script type="module">

import { initializeApp }
from
"https://www.gstatic.com/firebasejs/12.13.0/firebase-app.js";

import {

getDatabase,
ref,
onValue,
update,
get

}

from
"https://www.gstatic.com/firebasejs/12.13.0/firebase-database.js";

const firebaseConfig = {

apiKey:"AIzaSyC7QzQTYMSGRV_nraJBneBqDqYGhugF0Pw",

authDomain:"fast-937c9.firebaseapp.com",

projectId:"fast-937c9",

databaseURL:
"https://fast-937c9-default-rtdb.europe-west1.firebasedatabase.app"

};

const app =
initializeApp(firebaseConfig);

const db =
getDatabase(app);

const currentDriver =
JSON.parse(localStorage.getItem("user"));

if(
!currentDriver ||
currentDriver.type !== "driver"
){

window.location.href =
"index.html";

}

document.getElementById(
"driverName"
).innerHTML =

currentDriver.name || "سائق";

document.getElementById(
"driverImage"
).src =

currentDriver.vehicleImage || "user.png";

let driverLat = null;
let driverLng = null;

let currentOrderId = null;

let map = null;
let driverMarker = null;
let routeControl = null;

const bikeIcon =
L.divIcon({

html:`
<div style="
font-size:38px;
transform:rotate(-15deg);
">
🛵
</div>
`,

className:"",
iconSize:[40,40],
iconAnchor:[20,20]

});

navigator.geolocation.watchPosition(

async(position)=>{

driverLat =
position.coords.latitude;

driverLng =
position.coords.longitude;

await update(
ref(db,"drivers/" + currentDriver.id),
{
latitude:driverLat,
longitude:driverLng,
lastUpdate:Date.now()
}
);

if(currentOrderId){

await update(
ref(db,"orders/" + currentOrderId),
{
driverLat,
driverLng
}
);

if(driverMarker){

driverMarker.setLatLng([
driverLat,
driverLng
]);

}

}

},

()=>{

alert("فعل GPS");

},

{
enableHighAccuracy:true
}

);

onValue(
ref(db,"orders"),
(snapshot)=>{

const container =
document.getElementById(
"ordersContainer"
);

container.innerHTML = "";

if(!snapshot.exists()){

container.innerHTML = `
<div class="radar-box">
<div class="radar"></div>
<div class="radar-text">
لا توجد طلبات
</div>
</div>
`;

return;

}

const orders =
snapshot.val();

Object.keys(orders).forEach((id)=>{

const order =
orders[id];

if(
order.status !== "waiting_driver"
){
return;
}

container.innerHTML += `

<div class="order-card">

<div class="customer-name">
👤 ${order.customerName}
</div>

${(order.storesData || []).map(store => `

<div class="store-box">

<div class="store-header">

<img
src="${store.storeImage || 'store.png'}"
class="store-image">

<div class="store-name">
${store.storeName}
</div>

</div>

${(order.items || [])
.filter(item => item.storeId === store.storeId)
.map(item => `

<div class="product-box">

<div class="product-top">

<img
src="${item.image || 'product.png'}"
class="product-image">

<div class="product-info">

<div class="product-name">
${item.name}
</div>

<div class="product-details">

الكمية:
${item.qty}

<br>

السعر:
${item.price} د.ع

</div>

</div>

</div>

</div>

`).join("")}

</div>

`).join("")}

<div class="price-box">

🚚 التوصيل:
${Number(order.deliveryPrice || 0).toLocaleString()}

د.ع

<br>

🧾 الكلي:
${Number(order.totalPrice || 0).toLocaleString()}

د.ع

</div>

<div class="map-box" id="map_${id}"></div>

<div class="order-buttons">

<button
class="accept-btn"
onclick="acceptOrder('${id}')">

قبول الطلب

</button>

<button
class="reject-btn"
onclick="rejectOrder('${id}')">

رفض

</button>

</div>

</div>

`;

setTimeout(()=>{

const miniMap =
L.map(`map_${id}`,{
zoomControl:false,
attributionControl:false
}).setView(
[
order.customerLat,
order.customerLng
],
13
);

L.tileLayer(
'https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png'
).addTo(miniMap);

L.marker([
order.customerLat,
order.customerLng
]).addTo(miniMap);

},200);

});

}

);

window.rejectOrder =
async function(id){

await update(
ref(db,"orders/" + id),
{
rejected:true
}
);

};

window.acceptOrder =
async function(id){

currentOrderId = id;

const snapshot =
await get(
ref(db,"orders/" + id)
);

if(!snapshot.exists()){
return;
}

const order =
snapshot.val();

await update(
ref(db,"orders/" + id),
{
status:"accepted",
driverId:currentDriver.id,
driverName:currentDriver.name || "",
driverPhone:currentDriver.phone || "",
driverImage:currentDriver.vehicleImage || "",
driverLat,
driverLng
}
);

document.getElementById(
"ordersContainer"
).style.display = "none";

document.getElementById(
"deliveryPage"
).style.display = "block";

document.getElementById(
"customerName"
).innerHTML =
"👤 " + order.customerName;

document.getElementById(
"customerPhone"
).innerHTML =
"📞 " + order.customerPhone;

document.getElementById(
"customerAddress"
).innerHTML =
"📍 " + (order.customerAddress || "");

document.getElementById(
"whatsappCustomer"
).onclick = function(){

window.open(
"https://wa.me/" +
order.customerPhone
);

};

document.getElementById(
"productsDetails"
).innerHTML =

(order.storesData || []).map(store => `

<div class="store-box">

<div class="store-header">

<img
src="${store.storeImage || 'store.png'}"
class="store-image">

<div class="store-name">
${store.storeName}
</div>

</div>

${(order.items || [])
.filter(item => item.storeId === store.storeId)
.map(item => `

<div class="product-box">

<div class="product-top">

<img
src="${item.image || 'product.png'}"
class="product-image">

<div class="product-info">

<div class="product-name">
${item.name}
</div>

<div class="product-details">

الكمية:
${item.qty}

<br>

السعر:
${item.price} د.ع

</div>

</div>

</div>

</div>

`).join("")}

</div>

`).join("");

if(map){
map.remove();
}

map =
L.map("liveMap").setView(
[
driverLat,
driverLng
],
14
);

L.tileLayer(
'https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png'
).addTo(map);

driverMarker =
L.marker(
[
driverLat,
driverLng
],
{
icon:bikeIcon
}
).addTo(map);

(order.storesData || []).forEach(store=>{

L.marker(
[
Number(store.storeLat),
Number(store.storeLng)
]
).addTo(map);

});

L.marker(
[
Number(order.customerLat),
Number(order.customerLng)
]
).addTo(map);

let waypoints = [];

(order.storesData || []).forEach(store=>{

waypoints.push(
L.latLng(
Number(store.storeLat),
Number(store.storeLng)
)
);

});

waypoints.push(
L.latLng(
Number(order.customerLat),
Number(order.customerLng)
)
);

routeControl =
L.Routing.control({

waypoints:[

L.latLng(
driverLat,
driverLng
),

...waypoints

],

routeWhileDragging:false,
addWaypoints:false,
draggableWaypoints:false,
fitSelectedRoutes:true,
show:false,

lineOptions:{
styles:[
{
color:"#ff6600",
weight:7
}
]
},

createMarker:()=>null

}).addTo(map);

setTimeout(()=>{

map.invalidateSize();

},500);

};

document.getElementById(
"deliveredBtn"
).onclick =
async function(){

if(!currentOrderId){
return;
}

await update(
ref(db,"orders/" + currentOrderId),
{
status:"delivered",
deliveredAt:Date.now()
}
);

alert("تم التوصيل");

window.location.reload();

};

document.getElementById(
"problemBtn"
).onclick =
async function(){

if(!currentOrderId){
return;
}

await update(
ref(db,"orders/" + currentOrderId),
{
status:"problem"
}
);

alert("تم تسجيل المشكلة");

};

document.getElementById(
"logoutBtn"
).onclick =
function(){

localStorage.clear();

window.location.href =
"index.html";

};

</script>

</body>

</html>
