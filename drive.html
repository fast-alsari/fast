<!-- drive.html -->

<!DOCTYPE html>
<html lang="ar" dir="rtl">

<head>

<meta charset="UTF-8">

<meta name="viewport"
content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">

<title>
السائق
</title>

<link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;500;600;700&display=swap"
rel="stylesheet">

<link rel="stylesheet"
href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css"/>

<link rel="stylesheet"
href="https://unpkg.com/leaflet/dist/leaflet.css"/>

<script
src="https://unpkg.com/leaflet/dist/leaflet.js">
</script>

<style>

*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:'Cairo',sans-serif;
}

body{
background:#f5f5f5;
overflow-x:hidden;
padding-bottom:40px;
}

.header{

background:
linear-gradient(
135deg,
#ff8800,
#ff5500
);

padding:14px 15px;

border-bottom-left-radius:30px;
border-bottom-right-radius:30px;

color:white;

box-shadow:
0 8px 25px rgba(0,0,0,.12);

display:flex;
justify-content:space-between;
align-items:flex-start;

}

.driver-info{
flex:1;
}

.driver-name{

font-size:23px;
font-weight:bold;

margin-bottom:12px;

}

.stats{

display:flex;
flex-wrap:wrap;
gap:10px;

}

.stat{

background:rgba(255,255,255,.18);

padding:9px 14px;

border-radius:15px;

font-size:13px;
font-weight:bold;

backdrop-filter:blur(10px);

}

.driver-side{

display:flex;
flex-direction:column;
align-items:center;
gap:10px;

}

.driver-image{

width:58px;
height:58px;

border-radius:18px;

object-fit:contain;

background:white;

padding:6px;

}

.logout-btn{

width:45px;
height:45px;

border:none;

border-radius:14px;

background:white;

color:#ff5500;

font-size:18px;

cursor:pointer;

}

.radar-box{

display:flex;
flex-direction:column;
align-items:center;
justify-content:center;

padding:50px 20px;

}

.radar{

width:145px;
height:145px;

border-radius:50%;

border:5px solid #ff8800;

position:relative;

animation:radarPulse 2s infinite;

}

.radar::before{

content:"";

position:absolute;

top:50%;
left:50%;

width:20px;
height:20px;

background:#ff8800;

border-radius:50%;

transform:translate(-50%,-50%);

}

@keyframes radarPulse{

0%{
box-shadow:
0 0 0 0 rgba(255,136,0,.5);
}

100%{
box-shadow:
0 0 0 55px rgba(255,136,0,0);
}

}

.radar-text{

margin-top:25px;

font-size:20px;
font-weight:bold;

color:#777;

}

.orders-container{

padding:15px;

display:flex;
flex-direction:column;
gap:18px;

}

.order-card{

background:white;

border-radius:28px;

padding:15px;

box-shadow:
0 5px 20px rgba(0,0,0,.08);

overflow:hidden;

}

.order-map{

width:100%;
height:190px;

border-radius:22px;

margin-bottom:15px;

}

.order-name{

font-size:21px;
font-weight:bold;

margin-bottom:12px;

}

.order-info{

font-size:15px;
color:#555;

line-height:2;

margin-bottom:12px;

}

.price-box{

background:#fff5eb;

padding:15px;

border-radius:18px;

font-size:17px;
font-weight:bold;

color:#ff6600;

line-height:2;

margin-bottom:15px;

}

.btns{

display:flex;
gap:10px;

}

.accept-btn{

flex:1;

padding:16px;

border:none;

border-radius:18px;

background:#00b894;

color:white;

font-size:16px;
font-weight:bold;

cursor:pointer;

}

.reject-btn{

flex:1;

padding:16px;

border:none;

border-radius:18px;

background:red;

color:white;

font-size:16px;
font-weight:bold;

cursor:pointer;

}

.delivery-page{
display:none;
}

#mainMap{

width:100%;
height:55vh;

}

.delivery-box{

background:white;

margin:15px;

padding:20px;

border-radius:25px;

box-shadow:
0 5px 20px rgba(0,0,0,.08);

}

.delivery-box h2{

font-size:25px;

margin-bottom:18px;

}

.delivery-box p{

font-size:16px;

line-height:2;

color:#555;

margin-bottom:12px;

}

.action-btn{

width:100%;

padding:18px;

border:none;

border-radius:20px;

color:white;

font-size:18px;
font-weight:bold;

cursor:pointer;

margin-top:14px;

}

.store-btn{
background:#ff8800;
}

.customer-btn{
background:#0984e3;
}

.done-btn{
background:#00b894;
}

.problem-btn{
background:red;
}

.whatsapp-btn{

width:100%;

padding:16px;

border:none;

border-radius:18px;

background:#25D366;

color:white;

font-size:17px;
font-weight:bold;

cursor:pointer;

margin-top:15px;

}

</style>

</head>

<body>

<header class="header">

<div class="driver-info">

<div class="driver-name"
id="driverName">

السائق

</div>

<div class="stats">

<div class="stat">
الطلبات:
<span id="completedOrders">
0
</span>
</div>

<div class="stat">
الارباح:
<span id="profits">
0
</span>
د.ع
</div>

<div class="stat"
id="accountType">

VIP

</div>

<div class="stat"
id="expireDate">

غير محدد

</div>

</div>

</div>

<div class="driver-side">

<button
class="logout-btn"
onclick="logout()">

<i class="fa-solid fa-right-from-bracket"></i>

</button>

<img
src="motorbike.png"
class="driver-image">

</div>

</header>

<div
class="radar-box"
id="radarBox">

<div class="radar"></div>

<div class="radar-text">

جاري البحث عن طلبات...

</div>

</div>

<div
class="orders-container"
id="ordersContainer">

</div>

<div
class="delivery-page"
id="deliveryPage">

<div id="mainMap"></div>

<div class="delivery-box">

<h2>
تفاصيل الطلب
</h2>

<p id="customerName"></p>

<p id="storesCount"></p>

<p id="productsPrice"></p>

<p id="deliveryPrice"></p>

<p id="totalPrice"></p>

<p id="customerAddress"></p>

<button
class="whatsapp-btn"
id="whatsappBtn">

مراسلة الزبون عبر واتساب

</button>

<button
class="action-btn store-btn"
id="arrivedStoreBtn">

وصلت المتجر

</button>

<button
class="action-btn customer-btn"
id="arrivedCustomerBtn">

وصلت الزبون

</button>

<button
class="action-btn done-btn"
id="doneBtn">

تم التوصيل

</button>

<button
class="action-btn problem-btn"
id="problemBtn">

لم يتم التوصيل بسبب مشكلة

</button>

</div>

</div>

<script type="module">

import { initializeApp }

from "https://www.gstatic.com/firebasejs/12.13.0/firebase-app.js";

import {

getDatabase,
ref,
onValue,
update,
get,
set

}

from "https://www.gstatic.com/firebasejs/12.13.0/firebase-database.js";

const firebaseConfig = {

apiKey:"AIzaSyC7QzQTYMSGRV_nraJBneBqDqYGhugF0Pw",

authDomain:"fast-937c9.firebaseapp.com",

projectId:"fast-937c9",

databaseURL:
"https://fast-937c9-default-rtdb.europe-west1.firebasedatabase.app"

};

const app =
initializeApp(firebaseConfig);

const db =
getDatabase(app);

const currentDriver =
JSON.parse(localStorage.getItem("user"));

if(!currentDriver){

window.location.replace("index.html");

}

document.getElementById("driverName")
.innerHTML =
currentDriver.name || "سائق";

document.getElementById("accountType")
.innerHTML =
currentDriver.subscription || "عادي";

document.getElementById("expireDate")
.innerHTML =
"ينتهي: " +
(currentDriver.expireDate || "غير محدد");

let driverLat = null;
let driverLng = null;

let currentOrder = null;
let currentOrderId = null;

let mainMap;
let driverMarker;
let customerMarker;
let routeLine;

const bikeIcon = L.icon({

iconUrl:
"https://cdn-icons-png.flaticon.com/512/2972/2972185.png",

iconSize:[45,45]

});

const customerIcon = L.icon({

iconUrl:
"https://cdn-icons-png.flaticon.com/512/684/684908.png",

iconSize:[40,40]

});

const storeIcon = L.icon({

iconUrl:
"https://cdn-icons-png.flaticon.com/512/3081/3081559.png",

iconSize:[38,38]

});

navigator.geolocation.watchPosition(

async(position)=>{

driverLat =
position.coords.latitude;

driverLng =
position.coords.longitude;

await update(

ref(db,"drivers/" + currentDriver.id),

{

latitude:driverLat,
longitude:driverLng

}

);

if(currentOrderId){

await update(

ref(db,"orders/" + currentOrderId),

{

driverLat:driverLat,
driverLng:driverLng

}

);

if(driverMarker){

driverMarker.setLatLng(
[driverLat,driverLng]
);

}

}

}

);

function calculateDistance(lat1, lon1, lat2, lon2){

const R = 6371;

const dLat =
(lat2-lat1) * Math.PI / 180;

const dLon =
(lon2-lon1) * Math.PI / 180;

const a =

Math.sin(dLat/2) *
Math.sin(dLat/2)

+

Math.cos(lat1 * Math.PI / 180)

*

Math.cos(lat2 * Math.PI / 180)

*

Math.sin(dLon/2)

*

Math.sin(dLon/2);

const c =
2 * Math.atan2(
Math.sqrt(a),
Math.sqrt(1-a)
);

return R * c;

}

onValue(

ref(db,"orders"),

(snapshot)=>{

const container =
document.getElementById("ordersContainer");

container.innerHTML = "";

let found = false;

if(snapshot.exists()){

const orders = snapshot.val();

Object.keys(orders)
.forEach((key)=>{

const order =
orders[key];

if(
order.status !== "waiting_driver"
){
return;
}

if(
order.hiddenDrivers
&&
order.hiddenDrivers[currentDriver.id]
){

return;

}

if(
!driverLat ||
!driverLng
){
return;
}

const distance =
calculateDistance(

driverLat,
driverLng,

Number(order.customerLat),
Number(order.customerLng)

);

if(distance > 25){
return;
}

found = true;

document.getElementById("radarBox")
.style.display = "none";

const mapId =
"map_" + key;

container.innerHTML += `

<div class="order-card">

<div
class="order-map"
id="${mapId}">

</div>

<div class="order-name">

👤 ${order.customerName}

</div>

<div class="order-info">

🛒 عدد المتاجر:
${order.storesData?.length || 1}

<br>

📦 المنتجات:
${order.items?.length || 0}

</div>

<div class="price-box">

💰 سعر المنتجات:
${order.productsPrice || 0} د.ع

<br>

🚚 التوصيل:
${order.deliveryPrice || 0} د.ع

<br>

🧾 المجموع:
${order.totalPrice || 0} د.ع

</div>

<div class="btns">

<button
class="accept-btn"
onclick="acceptOrder('${key}')">

قبول

</button>

<button
class="reject-btn"
onclick="rejectOrder('${key}')">

رفض

</button>

</div>

</div>

`;

setTimeout(()=>{

const miniMap =
L.map(mapId).setView(

[
Number(order.customerLat),
Number(order.customerLng)
],

12

);

L.tileLayer(
'https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png'
).addTo(miniMap);

L.marker(

[
driverLat,
driverLng
],

{
icon:bikeIcon
}

)

.addTo(miniMap);

L.marker(

[
Number(order.customerLat),
Number(order.customerLng)
],

{
icon:customerIcon
}

)

.addTo(miniMap);

const points = [

[
driverLat,
driverLng
]

];

if(order.storesData){

order.storesData.forEach(store=>{

points.push([

Number(store.storeLat),
Number(store.storeLng)

]);

L.marker(

[
Number(store.storeLat),
Number(store.storeLng)
],

{
icon:storeIcon
}

)

.addTo(miniMap);

});

}

points.push([

Number(order.customerLat),
Number(order.customerLng)

]);

L.polyline(

points,

{
color:"blue",
weight:5
}

)

.addTo(miniMap);

},300);

});

}

if(!found){

document.getElementById("radarBox")
.style.display = "flex";

}

}

);

window.rejectOrder =
async function(orderId){

await update(

ref(db,"orders/" + orderId + "/hiddenDrivers"),

{

[currentDriver.id]:Date.now()

}

);

setTimeout(async()=>{

const snapshot =
await get(
ref(db,"orders/" + orderId)
);

if(snapshot.exists()){

const order =
snapshot.val();

if(order.hiddenDrivers){

delete order.hiddenDrivers[currentDriver.id];

await update(

ref(db,"orders/" + orderId),

{

hiddenDrivers:
order.hiddenDrivers

}

);

}

}

},3600000);

};

window.acceptOrder =
async function(orderId){

const snapshot =
await get(
ref(db,"orders/" + orderId)
);

if(!snapshot.exists()){

alert("الطلب غير موجود");

return;

}

const order =
snapshot.val();

currentOrderId =
orderId;

currentOrder =
order;

await update(

ref(db,"orders/" + orderId),

{

status:"accepted",

acceptedDriver:
currentDriver.name,

driverId:
currentDriver.id,

driverPhone:
currentDriver.phone,

driverLat:driverLat,

driverLng:driverLng,

acceptedAt:Date.now()

}

);

document.getElementById("ordersContainer")
.style.display = "none";

document.getElementById("radarBox")
.style.display = "none";

document.getElementById("deliveryPage")
.style.display = "block";

document.getElementById("customerName")
.innerHTML =
"👤 " + order.customerName;

document.getElementById("storesCount")
.innerHTML =
"🏪 عدد المتاجر: " +
(order.storesData?.length || 1);

document.getElementById("productsPrice")
.innerHTML =
"💰 سعر المنتجات: " +
(order.productsPrice || 0)
+
" د.ع";

document.getElementById("deliveryPrice")
.innerHTML =
"🚚 سعر التوصيل: " +
(order.deliveryPrice || 0)
+
" د.ع";

document.getElementById("totalPrice")
.innerHTML =
"🧾 المجموع: " +
(order.totalPrice || 0)
+
" د.ع";

document.getElementById("customerAddress")
.innerHTML =
"📍 " +
(order.customerAddress || "");

document.getElementById("whatsappBtn")
.onclick =
function(){

window.open(
`https://wa.me/${order.customerPhone}`
);

};

initMainMap(order);

};

function initMainMap(order){

mainMap =
L.map("mainMap").setView(

[
driverLat,
driverLng
],

13

);

L.tileLayer(
'https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png'
).addTo(mainMap);

driverMarker =
L.marker(

[
driverLat,
driverLng
],

{
icon:bikeIcon
}

)

.addTo(mainMap)

.bindPopup("السائق");

customerMarker =
L.marker(

[
Number(order.customerLat),
Number(order.customerLng)
],

{
icon:customerIcon
}

)

.addTo(mainMap)

.bindPopup("الزبون");

const routePoints = [

[
driverLat,
driverLng
]

];

if(order.storesData){

order.storesData.forEach(store=>{

L.marker(

[
Number(store.storeLat),
Number(store.storeLng)
],

{
icon:storeIcon
}

)

.addTo(mainMap)

.bindPopup(store.storeName);

routePoints.push([

Number(store.storeLat),
Number(store.storeLng)

]);

});

}

routePoints.push([

Number(order.customerLat),
Number(order.customerLng)

]);

routeLine =
L.polyline(

routePoints,

{
color:"blue",
weight:6
}

)

.addTo(mainMap);

mainMap.fitBounds(
routeLine.getBounds(),
{
padding:[40,40]
}
);

}

document.getElementById("arrivedStoreBtn")
.onclick =
async function(){

if(!currentOrderId){
return;
}

await update(

ref(db,"orders/" + currentOrderId),

{

status:"picked_up",

statusText:"وصل السائق للمتجر"

}

);

alert("تم اشعار الزبون");

};

document.getElementById("arrivedCustomerBtn")
.onclick =
async function(){

if(!currentOrderId){
return;
}

await update(

ref(db,"orders/" + currentOrderId),

{

status:"arrived",

statusText:"وصل السائق للزبون"

}

);

alert("تم اشعار الزبون");

};

document.getElementById("doneBtn")
.onclick =
async function(){

if(!currentOrderId){
return;
}

await update(

ref(db,"orders/" + currentOrderId),

{

status:"delivered",

statusText:"تم التوصيل",

deliveredAt:Date.now()

}

);

alert("تم التوصيل");

window.location.reload();

};

document.getElementById("problemBtn")
.onclick =
async function(){

if(!currentOrderId){
return;
}

await update(

ref(db,"orders/" + currentOrderId),

{

status:"cancelled_problem",

statusText:"لم يتم التوصيل بسبب مشكلة",

cancelledAt:Date.now()

}

);

alert("تم تسجيل المشكلة");

window.location.reload();

};

window.logout =
function(){

localStorage.clear();

window.location.replace(
"index.html"
);

};

</script>

</body>

</html>
