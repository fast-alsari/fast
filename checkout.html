<!DOCTYPE html>
<html lang="ar" dir="rtl">

<head>

<meta charset="UTF-8">

<meta
name="viewport"
content="width=device-width, initial-scale=1.0">

<title>
تأكيد الطلب
</title>

<link
href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;500;600;700&display=swap"
rel="stylesheet">

<style>

*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:'Cairo',sans-serif;
}

body{
background:#f5f6fa;
padding-bottom:120px;
}

.header{
background:
linear-gradient(
135deg,
#ff8800,
#ff5500
);
padding:22px;
color:white;
border-bottom-left-radius:30px;
border-bottom-right-radius:30px;
}

.form{
padding:15px;
display:flex;
flex-direction:column;
gap:15px;
}

.card{
background:white;
padding:18px;
border-radius:24px;
box-shadow:
0 5px 18px rgba(0,0,0,.06);
}

.input{
width:100%;
height:56px;
border:none;
background:#f5f5f5;
border-radius:16px;
padding:0 15px;
outline:none;
font-size:15px;
margin-top:12px;
}

.textarea{
width:100%;
height:120px;
border:none;
background:#f5f5f5;
border-radius:16px;
padding:15px;
outline:none;
resize:none;
margin-top:12px;
font-size:15px;
}

.total-box{
display:flex;
justify-content:space-between;
font-size:18px;
font-weight:bold;
margin-bottom:15px;
}

.order-btn{
width:100%;
height:58px;
border:none;
border-radius:18px;
background:
linear-gradient(
135deg,
#00b894,
#00a383
);
color:white;
font-size:17px;
font-weight:bold;
cursor:pointer;
}

</style>

</head>

<body>

<div class="header">

<h2>
تأكيد الطلب 🚀
</h2>

</div>

<div class="form">

<div class="card">

<h3>
العنوان
</h3>

<input
type="text"
id="addressInput"
class="input"
placeholder="اكتب عنوانك">

<textarea
id="notesInput"
class="textarea"
placeholder="ملاحظات إضافية"></textarea>

</div>

<div class="card">

<div class="total-box">

<span>
سعر المنتجات
</span>

<span id="productsPrice">
0 د.ع
</span>

</div>

<div class="total-box">

<span>
سعر التوصيل
</span>

<span id="deliveryPrice">
2500 د.ع
</span>

</div>

<div class="total-box">

<span>
المجموع النهائي
</span>

<span id="finalPrice">
0 د.ع
</span>

</div>

<button
class="order-btn"
onclick="sendOrder()">

إرسال الطلب

</button>

</div>

</div>

<script type="module">

import { db }
from "./firebase.js";

import {
ref,
set
}
from "https://www.gstatic.com/firebasejs/12.13.0/firebase-database.js";

import {
formatPrice,
generateId
}
from "./utils.js";

const currentUser =
JSON.parse(
localStorage.getItem("user")
);

const cart =
JSON.parse(
localStorage.getItem("cart")
) || [];

if(
!currentUser ||
cart.length === 0
){

window.location.replace(
"home.html"
);

}

let productsTotal = 0;

cart.forEach(item=>{

productsTotal +=
Number(item.price)
*
Number(item.qty);

});

const deliveryPrice = 2500;

const finalTotal =
productsTotal +
deliveryPrice;

document.getElementById(
"productsPrice"
).innerHTML =
formatPrice(productsTotal);

document.getElementById(
"deliveryPrice"
).innerHTML =
formatPrice(deliveryPrice);

document.getElementById(
"finalPrice"
).innerHTML =
formatPrice(finalTotal);

window.sendOrder =
async function(){

const address =
document.getElementById(
"addressInput"
).value.trim();

const notes =
document.getElementById(
"notesInput"
).value.trim();

if(!address){

alert("اكتب العنوان");

return;

}

const orderId =
generateId("ORDER");

const orderData = {

id:orderId,

type:"delivery",

status:"waiting_driver",

customerId:
currentUser.id,

customerName:
currentUser.name || "",

customerPhone:
currentUser.phone || "",

customerImage:
currentUser.image || "",

customerLat:
currentUser.latitude || 0,

customerLng:
currentUser.longitude || 0,

customerAddress:
address,

notes:notes,

products:cart,

productsTotal:
productsTotal,

deliveryPrice:
deliveryPrice,

finalTotal:
finalTotal,

createdAt:
Date.now()

};

await set(
ref(db,"orders/" + orderId),
orderData
);

localStorage.removeItem(
"cart"
);

localStorage.setItem(
"currentOrderId",
orderId
);

alert("تم إرسال الطلب");

window.location.href =
`talab.html?orderId=${orderId}`;

};

</script>

</body>

</html>
