<!-- checkout.html -->

<!DOCTYPE html>
<html lang="ar" dir="rtl">

<head>

<meta charset="UTF-8">

<meta
name="viewport"
content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">

<title>
إتمام الطلب
</title>

<link
rel="stylesheet"
href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css"/>

<link
href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;500;700;800&display=swap"
rel="stylesheet">

<style>

*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:'Cairo',sans-serif;
-webkit-tap-highlight-color:transparent;
}

body{
background:#f5f6fa;
padding-bottom:120px;
overflow-x:hidden;
}

.header{
background:
linear-gradient(
135deg,
#ff8800,
#ff5500
);

padding:22px;
color:white;

border-bottom-left-radius:30px;
border-bottom-right-radius:30px;

box-shadow:
0 8px 25px rgba(0,0,0,.12);
}

.header-top{
display:flex;
align-items:center;
gap:14px;
}

.back-btn{
width:45px;
height:45px;
border:none;
border-radius:50%;
background:white;
color:#ff6600;
font-size:18px;
cursor:pointer;
flex-shrink:0;
}

.header h2{
font-size:24px;
margin-bottom:4px;
}

.header p{
font-size:14px;
opacity:.9;
}

.page-content{
padding:15px;
display:flex;
flex-direction:column;
gap:18px;
}

.card{
background:white;
padding:18px;
border-radius:25px;
box-shadow:
0 5px 18px rgba(0,0,0,.06);
}

.card-title{
font-size:18px;
font-weight:bold;
margin-bottom:16px;
color:#333;
}

.products-list{
display:flex;
flex-direction:column;
gap:12px;
}

.product-item{
display:flex;
gap:12px;
align-items:center;
background:#f8f8f8;
padding:12px;
border-radius:18px;
}

.product-image{
width:75px;
height:75px;
border-radius:16px;
object-fit:cover;
background:#eee;
}

.product-info{
flex:1;
}

.product-name{
font-size:16px;
font-weight:bold;
margin-bottom:5px;
}

.product-price{
font-size:14px;
color:#666;
margin-bottom:5px;
}

.product-qty{
font-size:13px;
font-weight:bold;
color:#ff6600;
}

.summary-box{
display:flex;
flex-direction:column;
gap:12px;
}

.summary-row{
display:flex;
justify-content:space-between;
align-items:center;
font-size:15px;
}

.summary-row.total{
padding-top:12px;
border-top:1px solid #eee;
font-size:18px;
font-weight:bold;
}

textarea{
width:100%;
height:120px;
border:none;
outline:none;
resize:none;
background:#f7f7f7;
border-radius:18px;
padding:15px;
font-size:15px;
}

.order-btn{
width:100%;
height:58px;
border:none;
border-radius:22px;

background:
linear-gradient(
135deg,
#00b894,
#00a383
);

color:white;
font-size:17px;
font-weight:bold;
cursor:pointer;

box-shadow:
0 8px 20px rgba(0,184,148,.25);
}

.empty{
padding:50px 20px;
text-align:center;
color:#777;
font-size:16px;
}

.loading{
position:fixed;
inset:0;
background:white;
display:flex;
align-items:center;
justify-content:center;
z-index:999999;
}

.spinner{
width:70px;
height:70px;
border-radius:50%;
border:5px solid #eee;
border-top:5px solid #ff8800;
animation:spin .8s linear infinite;
}

@keyframes spin{
100%{
transform:rotate(360deg);
}
}

</style>

</head>

<body>

<div
class="loading"
id="loading">

<div class="spinner"></div>

</div>

<div class="header">

<div class="header-top">

<button
class="back-btn"
onclick="history.back()">

<i class="fa-solid fa-arrow-right"></i>

</button>

<div>

<h2>
إتمام الطلب
</h2>

<p>
راجع طلبك قبل الإرسال
</p>

</div>

</div>

</div>

<div class="page-content">

<div class="card">

<div class="card-title">
المنتجات
</div>

<div
class="products-list"
id="productsList"></div>

</div>

<div class="card">

<div class="card-title">
ملخص الطلب
</div>

<div class="summary-box">

<div class="summary-row">

<span>
سعر المنتجات
</span>

<b id="productsTotal">
0 د.ع
</b>

</div>

<div class="summary-row">

<span>
أجرة التوصيل
</span>

<b id="deliveryPrice">
0 د.ع
</b>

</div>

<div class="summary-row total">

<span>
المجموع النهائي
</span>

<b id="finalTotal">
0 د.ع
</b>

</div>

</div>

</div>

<div class="card">

<div class="card-title">
ملاحظات الطلب
</div>

<textarea
id="orderNote"
placeholder="اكتب ملاحظاتك هنا..."></textarea>

</div>

<button
class="order-btn"
onclick="sendOrder()">

إرسال الطلب 🚀

</button>

</div>

<script type="module">

import { db }
from "./firebase.js";

import {

ref,
set

}

from
"https://www.gstatic.com/firebasejs/12.13.0/firebase-database.js";

// ====================
// المستخدم
// ====================

const currentUser =
JSON.parse(
localStorage.getItem("user")
);

if(!currentUser){

window.location.replace(
"index.html"
);

}

// ====================
// السلة
// ====================

let cart =
JSON.parse(
localStorage.getItem("cart")
) || [];

if(cart.length === 0){

document.body.innerHTML = `
<div class="empty">
السلة فارغة
</div>
`;

}

// ====================
// العناصر
// ====================

const productsList =
document.getElementById(
"productsList"
);

let productsTotal = 0;

cart.forEach(item=>{

const total =
Number(item.price || 0)
*
Number(item.qty || 1);

productsTotal += total;

productsList.innerHTML += `

<div class="product-item">

<img
src="${item.image || 'product.png'}"
class="product-image"
onerror="this.src='product.png'">

<div class="product-info">

<div class="product-name">
${item.name || ""}
</div>

<div class="product-price">
${Number(item.price || 0)
.toLocaleString()} د.ع
</div>

<div class="product-qty">
الكمية: ${item.qty || 1}
</div>

</div>

</div>

`;

});

// ====================
// التوصيل
// ====================

let deliveryPrice = 2000;

const finalTotal =
productsTotal + deliveryPrice;

// ====================
// عرض
// ====================

document.getElementById(
"productsTotal"
).innerHTML =

productsTotal.toLocaleString()
+
" د.ع";

document.getElementById(
"deliveryPrice"
).innerHTML =

deliveryPrice.toLocaleString()
+
" د.ع";

document.getElementById(
"finalTotal"
).innerHTML =

finalTotal.toLocaleString()
+
" د.ع";

// ====================
// ارسال الطلب
// ====================

window.sendOrder =
async function(){

const orderId =
"ORDER_" + Date.now();

const note =
document.getElementById(
"orderNote"
).value
.trim();

const storesData = [];

cart.forEach(item=>{

if(
!storesData.find(
s => s.storeId === item.storeId
)
){

storesData.push({

storeId:item.storeId,
storeName:item.storeName || "",

});

}

});

const orderData = {

id:orderId,

type:"delivery",

status:"waiting_driver",

statusText:
"بانتظار قبول سائق",

customerId:
currentUser.id,

customerName:
currentUser.name || "",

customerPhone:
currentUser.phone || "",

customerImage:
currentUser.image || "",

customerLat:
Number(currentUser.latitude || 0),

customerLng:
Number(currentUser.longitude || 0),

storesData:storesData,

products:cart,

productsTotal:
productsTotal,

deliveryPrice:
deliveryPrice,

finalTotal:
finalTotal,

note:note,

createdAt:
Date.now()

};

await set(
ref(
db,
"orders/" + orderId
),
orderData
);

localStorage.setItem(
"currentOrderId",
orderId
);

localStorage.removeItem(
"cart"
);

alert("تم إرسال الطلب");

window.location.replace(
"talab.html?orderId=" + orderId);

};

// ====================
// تحميل
// ====================

document.getElementById(
"loading"
).style.display = "none";

</script>

</body>

</html>
