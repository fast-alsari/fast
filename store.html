<!-- stor.html -->

<!DOCTYPE html>
<html lang="ar" dir="rtl">

<head>

<meta charset="UTF-8">

<meta name="viewport"
content="width=device-width, initial-scale=1.0">

<title>

لوحة تحكم المتجر

</title>

<link rel="preconnect"
href="https://fonts.googleapis.com">

<link rel="preconnect"
href="https://fonts.gstatic.com"
crossorigin>

<link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;500;700&display=swap"
rel="stylesheet">

<link rel="stylesheet"
href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css"/>

<style>

*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:'Cairo',sans-serif;
}

body{
background:#f5f5f5;
padding:20px;
padding-bottom:120px;
}

.header{
background:linear-gradient(135deg,#ff8800,#ffb300);
padding:25px;
border-radius:30px;
color:white;
display:flex;
justify-content:space-between;
align-items:center;
margin-bottom:20px;
}

.store-info{
display:flex;
align-items:center;
gap:15px;
}

.store-image{
width:85px;
height:85px;
border-radius:20px;
object-fit:cover;
border:3px solid white;
}

.store-info h2{
font-size:22px;
margin-bottom:5px;
}

.store-info p{
font-size:14px;
}

.logout-btn{
background:white;
color:#ff8800;
border:none;
padding:12px 18px;
border-radius:15px;
font-weight:bold;
cursor:pointer;
}

.stats{
display:grid;
grid-template-columns:repeat(2,1fr);
gap:15px;
margin-bottom:25px;
}

.stat-card{
background:white;
padding:20px;
border-radius:25px;
box-shadow:0 5px 20px rgba(0,0,0,.08);
text-align:center;
}

.stat-card h3{
font-size:16px;
margin-bottom:10px;
color:#555;
}

.stat-card p{
font-size:24px;
font-weight:bold;
color:#ff8800;
}

.add-product-box{
background:white;
padding:20px;
border-radius:30px;
box-shadow:0 5px 20px rgba(0,0,0,.08);
margin-bottom:25px;
}

.section-title{
font-size:22px;
margin-bottom:20px;
color:#ff8800;
font-weight:bold;
}

.input-group{
margin-bottom:15px;
}

.input-group label{
display:block;
margin-bottom:8px;
font-weight:bold;
}

.input-group input,
.input-group textarea{
width:100%;
padding:14px;
border-radius:15px;
border:1px solid #ddd;
outline:none;
font-size:15px;
}

textarea{
resize:none;
height:120px;
}

.add-btn{
width:100%;
padding:16px;
border:none;
border-radius:18px;
background:#ff8800;
color:white;
font-size:16px;
font-weight:bold;
cursor:pointer;
}

.products-container{
display:flex;
flex-direction:column;
gap:15px;
}

.product-card{
background:white;
padding:15px;
border-radius:25px;
box-shadow:0 5px 20px rgba(0,0,0,.08);
display:flex;
gap:15px;
align-items:center;
}

.product-image{
width:110px;
height:110px;
border-radius:20px;
object-fit:cover;
}

.product-info{
flex:1;
}

.product-info h3{
margin-bottom:8px;
font-size:20px;
}

.product-info p{
font-size:14px;
color:#666;
margin-bottom:6px;
}

.status{
padding:8px 14px;
border-radius:12px;
display:inline-block;
font-size:13px;
font-weight:bold;
margin-top:8px;
}

.pending{
background:#fff3cd;
color:#856404;
}

.active{
background:#d4edda;
color:#155724;
}

.rejected{
background:#f8d7da;
color:#721c24;
}

.empty{
background:white;
padding:40px;
border-radius:25px;
text-align:center;
color:#666;
}

</style>

</head>

<body>

<div class="header">

<div class="store-info">

<img
src="store.png"
id="storeImage"
class="store-image">

<div>

<h2 id="storeName">

اسم المتجر

</h2>

<p id="ownerName">

صاحب المتجر

</p>

</div>

</div>

<button
class="logout-btn"
onclick="logout()">

تسجيل الخروج

</button>

</div>

<div class="stats">

<div class="stat-card">

<h3>

مبيعات هذا الشهر

</h3>

<p id="salesTotal">

0 د.ع

</p>

</div>

<div class="stat-card">

<h3>

عدد الطلبات المكتملة

</h3>

<p id="ordersCount">

0

</p>

</div>

</div>

<div class="add-product-box">

<div class="section-title">

اضافة منتج جديد

</div>

<div class="input-group">

<label>

صورة المنتج

</label>

<input
type="file"
id="productImage"
accept="image/*">

</div>

<div class="input-group">

<label>

اسم المنتج

</label>

<input
type="text"
id="productName"
placeholder="اسم المنتج">

</div>

<div class="input-group">

<label>

سعر المنتج

</label>

<input
type="number"
id="productPrice"
placeholder="سعر المنتج">

</div>

<div class="input-group">

<label>

شرح المنتج

</label>

<textarea
id="productDescription"
placeholder="اكتب شرح عن المنتج">

</textarea>

</div>

<button
class="add-btn"
onclick="addProduct()">

رفع طلب اضافة المنتج

</button>

</div>

<div class="section-title">

منتجات المتجر

</div>

<div
id="productsContainer"
class="products-container">

</div>

<script type="module">

import { initializeApp }
from
"https://www.gstatic.com/firebasejs/12.13.0/firebase-app.js";

import {
getDatabase,
ref,
set,
get,
child
}
from
"https://www.gstatic.com/firebasejs/12.13.0/firebase-database.js";

const firebaseConfig = {

apiKey:
"AIzaSyC7QzQTYMSGRV_nraJBneBqDqYGhugF0Pw",

authDomain:
"fast-937c9.firebaseapp.com",

projectId:
"fast-937c9",

storageBucket:
"fast-937c9.firebasestorage.app",

messagingSenderId:
"221388561840",

appId:
"1:221388561840:web:ec9d75183ddd7d44be0a75",

databaseURL:
"https://fast-937c9-default-rtdb.europe-west1.firebasedatabase.app"

};

const app =
initializeApp(firebaseConfig);

const database =
getDatabase(app);



// =========================
// ImgBB
// =========================

const IMGBB_API_KEY =
"fa7d8e3e0c7fbc7686b65048fff45913";

async function uploadImage(file){

if(!file){
return "product.png";
}

if(!file.type.startsWith("image/")){

alert("اختر صورة فقط");

return "product.png";

}

if(file.size > 5 * 1024 * 1024){

alert("حجم الصورة أكبر من 5MB");

return "product.png";

}

const formData = new FormData();

formData.append("image",file);

const response = await fetch(

`https://api.imgbb.com/1/upload?key=${IMGBB_API_KEY}`,

{
method:"POST",
body:formData
}

);

const data = await response.json();

return data.data.url;

}



// =========================
// المستخدم الحالي
// =========================

const currentUser =
JSON.parse(
localStorage.getItem("user")
);

if(!currentUser){

window.location.href =
"index.html";

}

if(currentUser.type !== "store"){

window.location.href =
"index.html";

}



// =========================
// معلومات المتجر
// =========================

document.getElementById("storeName")
.innerHTML =

currentUser.store_name;

document.getElementById("ownerName")
.innerHTML =

`صاحب المتجر : ${currentUser.owner}`;

if(currentUser.store_image){

document.getElementById("storeImage")
.src = currentUser.store_image;

}



// =========================
// الاحصائيات
// =========================

async function loadStats(){

let totalSales = 0;

let totalOrders = 0;

const snapshot =
await get(
child(ref(database),"orders")
);

if(snapshot.exists()){

const orders =
snapshot.val();

for(let key in orders){

const order =
orders[key];

if(
order.status === "completed"
){

order.items.forEach(item=>{

if(
item.storeName ===
currentUser.store_name
){

totalSales +=
item.price * item.qty;

totalOrders++;

}

});

}

}

}

document.getElementById("salesTotal")
.innerHTML =

`${totalSales} د.ع`;

document.getElementById("ordersCount")
.innerHTML =

totalOrders;

}

loadStats();



// =========================
// اضافة منتج
// =========================

window.addProduct =
async function(){

const name =
document.getElementById("productName")
.value;

const price =
document.getElementById("productPrice")
.value;

const description =
document.getElementById("productDescription")
.value;

const imageFile =
document.getElementById("productImage")
.files[0];

if(
name === "" ||
price === "" ||
description === ""
){

alert("املأ جميع الحقول");

return;

}



// =========================
// رفع الصورة
// =========================

let imageUrl =
await uploadImage(imageFile);



// =========================
// بيانات المنتج
// =========================

let productId =
"PROD"+Date.now();

let productData = {

id:productId,

storeId:
currentUser.id,

storeName:
currentUser.store_name,

name:name,

price:price,

description:description,

image:imageUrl,

status:"pending",

createdAt:Date.now()

};



// =========================
// حفظ المنتج
// =========================

await set(

ref(
database,
"store_products/"+currentUser.id+"/"+productId
),

productData

);



// =========================
// تنظيف الحقول
// =========================

document.getElementById("productName")
.value = "";

document.getElementById("productPrice")
.value = "";

document.getElementById("productDescription")
.value = "";

document.getElementById("productImage")
.value = "";

alert(
"تم رفع طلب المنتج وبانتظار موافقة الادمن"
);

loadProducts();

};



// =========================
// تحميل المنتجات
// =========================

async function loadProducts(){

const container =
document.getElementById("productsContainer");

container.innerHTML = "";

const snapshot =
await get(
child(
ref(database),
"store_products/"+currentUser.id
)
);

if(snapshot.exists()){

const products =
snapshot.val();

for(let key in products){

const product =
products[key];

let statusText = "";
let statusClass = "";

if(product.status === "pending"){

statusText = "بانتظار الموافقة";
statusClass = "pending";

}

if(product.status === "active"){

statusText = "تمت الموافقة";
statusClass = "active";

}

if(product.status === "rejected"){

statusText = "تم الرفض";
statusClass = "rejected";

}

container.innerHTML += `

<div class="product-card">

<img
src="${product.image}"
class="product-image">

<div class="product-info">

<h3>

${product.name}

</h3>

<p>

💰 السعر :
${product.price}
د.ع

</p>

<p>

📝 ${product.description}

</p>

<div class="status ${statusClass}">

${statusText}

</div>

</div>

</div>

`;

}

}else{

container.innerHTML =

`<div class="empty">

لا توجد منتجات حالياً

</div>`;

}

}

loadProducts();



// =========================
// تسجيل خروج
// =========================

window.logout = function(){

localStorage.removeItem("user");

window.location.href =
"index.html";

};

</script>

</body>

</html>
