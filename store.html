<!-- stor.html -->

<!DOCTYPE html>
<html lang="ar" dir="rtl">

<head>

<meta charset="UTF-8">

<meta name="viewport"
content="width=device-width, initial-scale=1.0">

<title>
لوحة تحكم المتجر
</title>

<link rel="preconnect"
href="https://fonts.googleapis.com">

<link rel="preconnect"
href="https://fonts.gstatic.com"
crossorigin>

<link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;500;700&display=swap"
rel="stylesheet">

<link rel="stylesheet"
href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css"/>

<style>

*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:'Cairo',sans-serif;
}

body{
background:#f5f5f5;
padding:20px;
padding-bottom:120px;
}





.logout-btn{
background:white;
color:#ff8800;
border:none;
padding:12px 18px;
border-radius:15px;
font-weight:bold;
cursor:pointer;
}

.add-product-box{
background:white;
padding:28px;
border-radius:35px;
margin-bottom:30px;
box-shadow:0 10px 30px rgba(0,0,0,.08);
border:1px solid #f0f0f0;
}

.section-title{
font-size:22px;
margin-bottom:20px;
color:#ff8800;
font-weight:bold;
}

.input-group{
margin-bottom:15px;
}

.input-group label{
display:block;
margin-bottom:8px;
font-weight:bold;
}

.input-group input,
.input-group textarea{
width:100%;
padding:16px;
border-radius:18px;
border:2px solid #f1f1f1;
outline:none;
font-size:15px;
background:#fafafa;
transition:.3s;
}

.input-group input:focus,
.input-group textarea:focus{
border-color:#ff8800;
background:white;
}

textarea{
resize:none;
height:120px;
}
.add-btn{
width:100%;
padding:18px;
border:none;
border-radius:20px;
background:linear-gradient(135deg,#ff8800,#ff6a00);
color:white;
font-size:17px;
font-weight:bold;
cursor:pointer;
transition:.3s;
box-shadow:0 8px 20px rgba(255,136,0,.25);
}

.add-btn:hover{
transform:translateY(-2px);
}

.products-container{
display:flex;
flex-direction:column;
gap:15px;
}

.product-card{
background:white;
padding:15px;
border-radius:25px;
box-shadow:0 5px 20px rgba(0,0,0,.08);
display:flex;
gap:15px;
align-items:center;
}

.product-image{
width:110px;
height:110px;
border-radius:20px;
object-fit:cover;
background:#eee;
border:1px solid #ddd;
}

.product-info{
flex:1;
}

.product-info h3{
margin-bottom:10px;
font-size:22px;
color:#222;
}

.product-info p{
font-size:15px;
color:#666;
margin-bottom:8px;
line-height:1.7;
}

.status{
padding:8px 14px;
border-radius:12px;
display:inline-block;
font-size:13px;
font-weight:bold;
margin-top:8px;
color:white;
}

.status.pending{
background:#ff9800;
}

.status.approved{
background:#28a745;
}

.empty{
background:white;
padding:40px;
border-radius:25px;
text-align:center;
color:#666;
}




.top-dashboard{
background:white;
padding:25px;
border-radius:35px;
margin-bottom:25px;
box-shadow:0 8px 25px rgba(0,0,0,.08);
}

.dashboard-header{
display:flex;
justify-content:space-between;
align-items:center;
gap:15px;
flex-wrap:wrap;
margin-bottom:25px;
}

.dashboard-user{
display:flex;
align-items:center;
gap:15px;
}

.dashboard-image{
width:95px;
height:95px;
border-radius:24px;
object-fit:cover;
border:4px solid #ff8800;
background:#fff;
}

.dashboard-user h2{
font-size:26px;
margin-bottom:6px;
color:#222;
}

.dashboard-user p{
font-size:15px;
color:#666;
margin-bottom:4px;
}

.expire-text{
color:#ff8800 !important;
font-weight:bold;
}

.logout-btn{
background:linear-gradient(135deg,#ff8800,#ff6a00);
color:white;
border:none;
padding:14px 20px;
border-radius:16px;
font-weight:bold;
cursor:pointer;
font-size:15px;
}

.stats-grid{
display:grid;
grid-template-columns:
repeat(auto-fit,minmax(160px,1fr));
gap:15px;
}

.stat-card{
background:#fafafa;
padding:20px;
border-radius:24px;
text-align:center;
border:1px solid #eee;
transition:.3s;
}

.stat-card:hover{
transform:translateY(-3px);
}

.stat-card h3{
font-size:24px;
color:#ff8800;
margin-bottom:8px;
}

.stat-card span{
font-size:14px;
font-weight:bold;
color:#666;
}

.action-buttons{
display:flex;
gap:10px;
margin-top:14px;
flex-wrap:wrap;
}

.edit-btn{
background:linear-gradient(135deg,#ff9800,#ff6a00);
color:white;
border:none;
padding:11px 18px;
border-radius:14px;
cursor:pointer;
font-weight:bold;
font-size:14px;
transition:.3s;
}

.delete-btn{
background:linear-gradient(135deg,#ff3d3d,#d50000);
color:white;
border:none;
padding:11px 18px;
border-radius:14px;
cursor:pointer;
font-weight:bold;
font-size:14px;
transition:.3s;
}

.edit-btn:hover,
.delete-btn:hover{
transform:scale(1.05);
}

.product-card{
transition:.3s;
}

.product-card:hover{
transform:translateY(-4px);
box-shadow:0 15px 35px rgba(0,0,0,.12);
}

.stat-card{
position:relative;
overflow:hidden;
}

.stat-card::before{
content:"";
position:absolute;
top:0;
right:0;
width:100%;
height:5px;
background:linear-gradient(135deg,#ff8800,#ff5500);
}

.add-product-box{
position:relative;
overflow:hidden;
}

.add-product-box::before{
content:"";
position:absolute;
top:0;
right:0;
width:100%;
height:6px;
background:linear-gradient(135deg,#ff8800,#ff5500);
}

.product-image{
width:120px;
height:120px;
border-radius:22px;
}

@media(max-width:700px){

.product-card{
flex-direction:column;
align-items:flex-start;
}

.product-image{
width:100%;
height:220px;
}

.dashboard-header{
flex-direction:column;
align-items:flex-start;
}

.dashboard-user{
width:100%;
}

.logout-btn{
width:100%;
}

}

.map-open-btn{
margin-top:12px;
background:linear-gradient(135deg,#ff8800,#ff5500);
color:white;
border:none;
padding:12px 18px;
border-radius:15px;
font-size:14px;
font-weight:bold;
cursor:pointer;
display:flex;
align-items:center;
gap:8px;
transition:.3s;
}

.map-open-btn:hover{
transform:scale(1.04);
}

.map-modal{
display:none;
position:fixed;
top:0;
left:0;
right:0;
bottom:0;
background:rgba(0,0,0,.5);
z-index:99999;
justify-content:center;
align-items:center;
padding:20px;
}

.map-box{
width:100%;
max-width:500px;
height:420px;
background:white;
border-radius:28px;
overflow:hidden;
position:relative;
box-shadow:0 10px 35px rgba(0,0,0,.25);
}

.close-map{
position:absolute;
top:12px;
left:12px;
width:42px;
height:42px;
border:none;
border-radius:50%;
background:red;
color:white;
font-size:18px;
font-weight:bold;
cursor:pointer;
z-index:5;
}

#storeMapFrame{
width:100%;
height:100%;
border:none;
}



</style>

</head>

<body>

<div class="top-dashboard">

<div class="dashboard-header">

<div class="dashboard-user">

<img
src="store.png"
id="topStoreImage"
class="dashboard-image">

<div>

<h2 id="topStoreName">
اسم المتجر
</h2>

<p id="topOwnerName">
صاحب المتجر
</p>

<p class="expire-text">

الاشتراك:
<span id="expireDate">
--
</span>

</p>

<button
class="map-open-btn"
onclick="openStoreMap()">

<i class="fa-solid fa-location-dot"></i>

موقع المتجر

</button>

</div>

</div>

<button
class="logout-btn"
onclick="logout()">

تسجيل الخروج

</button>

</div>

<div class="stats-grid">

<div class="stat-card">

<h3 id="productsTotal">
0
</h3>

<span>
عدد المنتجات
</span>

</div>

<div class="stat-card">

<h3 id="salesTotal">
0 د.ع
</h3>

<span>
مبيعات هذا الشهر
</span>

</div>

<div class="stat-card">

<h3 id="lastMonthSales">
0 د.ع
</h3>

<span>
مبيعات الشهر السابق
</span>

</div>

<div class="stat-card">

<h3 id="pendingOrders">
0
</h3>

<span>
الطلبات الحالية
</span>

</div>

<div class="stat-card">

<h3 id="completedOrders">
0
</h3>

<span>
الطلبات المنجزة
</span>

</div>

<div class="stat-card">

<h3 id="cancelledOrders">
0
</h3>

<span>
الطلبات الملغية
</span>

</div>

</div>

</div>
<div class="add-product-box">

<div class="section-title">

اضافة منتج جديد

</div>

<div class="input-group">

<label>

صورة المنتج

</label>

<input
type="file"
id="productImage"
accept="image/*">

</div>

<div class="input-group">

<label>

اسم المنتج

</label>

<input
type="text"
id="productName"
placeholder="اسم المنتج">

</div>

<div class="input-group">

<label>

سعر المنتج

</label>

<input
type="number"
id="productPrice"
placeholder="سعر المنتج">

</div>

<div class="input-group">

<label>

شرح المنتج

</label>

<textarea
id="productDescription"
placeholder="اكتب شرح عن المنتج">

</textarea>

</div>

<button
class="add-btn"
onclick="addProduct()">

رفع المنتج

</button>

</div>

<div class="section-title">

منتجات المتجر

</div>

<div
id="productsContainer"
class="products-container">

</div>

<script type="module">

// =========================
// Firebase
// =========================

import { initializeApp }
from
"https://www.gstatic.com/firebasejs/12.13.0/firebase-app.js";

import {
getDatabase,
ref,
set,
onValue,
update
}
from
"https://www.gstatic.com/firebasejs/12.13.0/firebase-database.js";

const firebaseConfig = {

apiKey:
"AIzaSyC7QzQTYMSGRV_nraJBneBqDqYGhugF0Pw",

authDomain:
"fast-937c9.firebaseapp.com",

projectId:
"fast-937c9",

databaseURL:
"https://fast-937c9-default-rtdb.europe-west1.firebasedatabase.app"

};

const app =
initializeApp(firebaseConfig);

const database =
getDatabase(app);



// =========================
// IMGBB
// =========================

const IMGBB_API_KEY =
"fa7d8e3e0c7fbc7686b65048fff45913";

async function uploadImage(file){

try{

const formData = new FormData();

formData.append("image",file);

const response = await fetch(

`https://api.imgbb.com/1/upload?key=${IMGBB_API_KEY}`,

{
method:"POST",
body:formData
}

);

const data = await response.json();

console.log(data);

if(data.success){

// رابط الصورة الحقيقي
return data.data.image.url;

}else{

alert("فشل رفع الصورة");

return "product.png";

}

}catch(error){

console.log(error);

alert("حدث خطأ أثناء رفع الصورة");

return "product.png";

}

}



// =========================
// المستخدم الحالي
// =========================

const currentUser =
JSON.parse(
localStorage.getItem("user")
);

if(!currentUser){

window.location.href =
"index.html";

}
// =========================
// انشاء بيانات المبيعات تلقائياً
// =========================

onValue(
ref(database,"stores/"+currentUser.id),
async(snapshot)=>{

if(snapshot.exists()){

const storeData =
snapshot.val();

let updateData = {};



// اذا ما موجود totalSales

if(storeData.totalSales === undefined){

updateData.totalSales = 0;

}



// اذا ما موجود lastMonthSales

if(storeData.lastMonthSales === undefined){

updateData.lastMonthSales = 0;

}



// اذا ما موجود salesMonth

if(storeData.salesMonth === undefined){

updateData.salesMonth =
new Date().getMonth() + 1;

}



// اذا توجد بيانات ناقصة

if(Object.keys(updateData).length > 0){

await update(
ref(database,"stores/"+currentUser.id),
updateData
);

}

}

});


// =========================
// معلومات المتجر
// =========================



document.getElementById("topStoreName")
.innerHTML =
currentUser.store_name || "-";

document.getElementById("topOwnerName")
.innerHTML =
`صاحب المتجر : ${currentUser.owner || "-"}`;

document.getElementById("expireDate")
.innerHTML =
currentUser.expireDate || "-";

if(currentUser.store_image){

document.getElementById("topStoreImage")
.src =
currentUser.store_image;

}

window.openStoreMap = function(){

if(
!currentUser.latitude ||
!currentUser.longitude
){

alert("لا يوجد موقع محفوظ للمتجر");
return;

}

document.getElementById("mapModal")
.style.display = "flex";

document.getElementById("storeMapFrame")
.src =

`https://maps.google.com/maps?q=${currentUser.latitude},${currentUser.longitude}&z=16&output=embed`;

};

window.closeStoreMap = function(){

document.getElementById("mapModal")
.style.display = "none";

document.getElementById("storeMapFrame")
.src = "";

};

// =========================
// اضافة منتج
// =========================

window.addProduct =
async function(){

const name =
document.getElementById("productName")
.value.trim();

const price =
document.getElementById("productPrice")
.value.trim();

const description =
document.getElementById("productDescription")
.value.trim();

const imageFile =
document.getElementById("productImage")
.files[0];

if(
name === "" ||
price === "" ||
description === "" ||
!imageFile
){

alert("املأ جميع الحقول");

return;

}



// =========================
// رفع الصورة الحقيقي
// =========================

const imageUrl =
await uploadImage(imageFile);



// =========================
// حفظ المنتج
// =========================

const productId =
"PROD"+Date.now();

const productData = {

id:productId,

storeId:
currentUser.id,

storeName:
currentUser.store_name,

name:name,

price:price,

description:description,

image:imageUrl,

status:"pending",

createdAt:Date.now()

};

// حفظ داخل store_products
await set(

ref(
database,
"store_products/"
+ currentUser.id +
"/" +
productId
),

productData

);

// =========================
// تنظيف الحقول
// =========================

document.getElementById("productName")
.value = "";

document.getElementById("productPrice")
.value = "";

document.getElementById("productDescription")
.value = "";

document.getElementById("productImage")
.value = "";

alert("تم رفع المنتج بنجاح");

//loadProducts();

};



// =========================
// تحميل المنتجات
// =========================

// =========================
// تحميل المنتجات
// =========================

async function loadProducts(){

const container =
document.getElementById("productsContainer");

onValue(
ref(database,"store_products/" + currentUser.id),
(snapshot)=>{

container.innerHTML = "";

if(snapshot.exists()){

let totalProducts = 0;

const products =
snapshot.val();

for(let key in products){

const product =
products[key];

if(product.deleted) continue;

if(!product.image){
product.image = "product.png";
}

totalProducts++;

container.innerHTML += `

<div class="product-card">

<img
src="${product.image}"
class="product-image"
referrerpolicy="no-referrer"
crossorigin="anonymous"
onerror="this.src='product.png'">

<div class="product-info">

<h3>
${product.name}
</h3>

<p>
💰 ${product.price} د.ع
</p>

<p>
📝 ${product.description}
</p>

<div class="status ${
product.status === "approved"
? "approved"
: "pending"
}">

${
product.status === "approved"

?

"تمت الموافقة"

:

"قيد المراجعة"
}

</div>

<div class="action-buttons">

<button
class="edit-btn"
onclick="editProduct('${product.id}')">

<i class="fa-solid fa-pen"></i>
تعديل

</button>

<button
class="delete-btn"
onclick="deleteProduct('${product.id}')">

<i class="fa-solid fa-trash"></i>
حذف

</button>

</div>

</div>

</div>

`;

}

document.getElementById("productsTotal")
.innerHTML =
totalProducts;



}else{

container.innerHTML =

`<div class="empty">
لا توجد منتجات حالياً
</div>`;

}

});

}

loadProducts();

// =========================
// عرض مبلغ المبيعات الحقيقي
// =========================

onValue(
ref(database,"stores/"+currentUser.id),
async(snapshot)=>{


if(snapshot.exists()){

const storeData =
snapshot.val();

document.getElementById("lastMonthSales")
.innerHTML =
(storeData.lastMonthSales || 0)
+ " د.ع";

document.getElementById("pendingOrders")
.innerHTML =
(storeData.pendingOrders || 0);

document.getElementById("completedOrders")
.innerHTML =
(storeData.completedOrders || 0);

document.getElementById("cancelledOrders")
.innerHTML =
(storeData.cancelledOrders || 0);

const currentMonth =
new Date().getMonth() + 1;

// تصفير تلقائي عند بداية شهر جديد

if(
storeData.salesMonth &&
storeData.salesMonth !== currentMonth
){

await update(
ref(database,"stores/"+currentUser.id),
{

lastMonthSales:
storeData.totalSales || 0,

totalSales:0,

salesMonth:currentMonth

}
);

}

// عرض المبيعات الحالية

document.getElementById("salesTotal")
.innerHTML =
(storeData.totalSales || 0)
+ " د.ع";

}

});

// =========================
// تسجيل خروج
// =========================
// =========================
// تعديل المنتج
// =========================

window.editProduct = async function(productId){

const newPrice =
prompt("ادخل السعر الجديد");

if(newPrice === null) return;

const newDescription =
prompt("ادخل شرح المنتج الجديد");

if(newDescription === null) return;

await set(
ref(
database,
"store_products/" + currentUser.id + "/" + productId + "/price"
),
newPrice
);

await set(
ref(
database,
"store_products/" + currentUser.id + "/" + productId + "/description"
),
newDescription
);

alert("تم تعديل المنتج");

};



// =========================
// حذف المنتج
// =========================

window.deleteProduct = async function(productId){

const confirmDelete =
confirm("هل تريد حذف المنتج نهائياً؟");

if(!confirmDelete) return;

await set(
ref(
database,
"store_products/" + currentUser.id + "/" + productId
),
null
);

alert("تم حذف المنتج نهائياً");

};
window.logout = function(){

// حذف الجلسة كاملة

localStorage.clear();

sessionStorage.clear();

// حذف الرجوع للصفحة

window.history.pushState(null,null,"index.html");

window.location.replace("index.html");

};

window.addEventListener("pageshow",function(event){

if(
event.persisted ||
window.performance
&&
window.performance.navigation.type === 2
){

const user =
localStorage.getItem("user");

if(!user){

window.location.replace("index.html");

}

}

});
</script>

<div
id="mapModal"
class="map-modal">

<div class="map-box">

<button
class="close-map"
onclick="closeStoreMap()">

✕

</button>

<iframe
id="storeMapFrame"
loading="lazy">
</iframe>

</div>

</div>

</body>

</html>
