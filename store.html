<!DOCTYPE html>
<html lang="ar" dir="rtl">

<head>

<meta charset="UTF-8">

<meta
name="viewport"
content="width=device-width, initial-scale=1.0">

<title>
لوحة المتجر
</title>

<link
rel="stylesheet"
href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css"/>

<link
href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;500;600;700&display=swap"
rel="stylesheet">

<style>

*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:'Cairo',sans-serif;
}

body{
background:#f5f6fa;
padding-bottom:120px;
}

.header{
background:
linear-gradient(
135deg,
#ff8800,
#ff5500
);

padding:22px;
color:white;
border-bottom-left-radius:30px;
border-bottom-right-radius:30px;
}

.store-box{
display:flex;
align-items:center;
gap:14px;
}

.store-image{
width:80px;
height:80px;
border-radius:20px;
object-fit:cover;
background:white;
}

.store-name{
font-size:24px;
font-weight:bold;
margin-bottom:5px;
}

.store-category{
font-size:14px;
opacity:.9;
}

.products-container{
padding:15px;
display:flex;
flex-direction:column;
gap:15px;
}

.product-card{
background:white;
padding:15px;
border-radius:24px;
box-shadow:
0 5px 18px rgba(0,0,0,.06);
}

.product-top{
display:flex;
gap:12px;
margin-bottom:12px;
}

.product-image{
width:90px;
height:90px;
border-radius:18px;
object-fit:cover;
background:#eee;
}

.product-info{
flex:1;
}

.product-name{
font-size:18px;
font-weight:bold;
margin-bottom:6px;
}

.product-price{
font-size:18px;
color:#ff8800;
font-weight:bold;
margin-bottom:6px;
}

.product-description{
font-size:13px;
color:#666;
line-height:1.8;
}

.actions{
display:flex;
gap:10px;
margin-top:12px;
}

.actions button{
flex:1;
height:48px;
border:none;
border-radius:14px;
font-size:14px;
font-weight:bold;
cursor:pointer;
color:white;
}

.edit-btn{
background:#2563eb;
}

.delete-btn{
background:#e53935;
}

.add-btn{
position:fixed;
bottom:95px;
left:15px;
width:65px;
height:65px;
border:none;
border-radius:50%;
background:
linear-gradient(
135deg,
#00b894,
#00a383
);
color:white;
font-size:26px;
cursor:pointer;
box-shadow:
0 10px 25px rgba(0,184,148,.3);
}

.bottom-bar{
position:fixed;
bottom:0;
left:0;
right:0;
height:82px;
background:white;
display:flex;
justify-content:space-around;
align-items:center;
box-shadow:
0 -5px 18px rgba(0,0,0,.08);
}

.nav-item{
display:flex;
flex-direction:column;
align-items:center;
gap:5px;
font-size:13px;
font-weight:bold;
color:#888;
cursor:pointer;
}

.nav-item.active{
color:#ff8800;
}

.nav-item i{
font-size:22px;
}

.empty{
padding:50px 20px;
text-align:center;
color:#777;
}

</style>

</head>

<body>

<div class="header">

<div class="store-box">

<img
src="store.png"
id="storeImage"
class="store-image">

<div>

<div
class="store-name"
id="storeName">

المتجر

</div>

<div
class="store-category"
id="storeCategory">

القسم

</div>

</div>

</div>

</div>

<div
class="products-container"
id="productsContainer"></div>

<button
class="add-btn"
onclick="window.location.href='add-product.html'">

<i class="fa-solid fa-plus"></i>

</button>

<div class="bottom-bar">

<div class="nav-item active">

<i class="fa-solid fa-store"></i>

<span>
المنتجات
</span>

</div>

<div
class="nav-item"
onclick="window.location.href='store-orders.html'">

<i class="fa-solid fa-bag-shopping"></i>

<span>
الطلبات
</span>

</div>

</div>

<script type="module">

import { db }
from "./firebase.js";

import {
ref,
onValue,
remove
}
from "https://www.gstatic.com/firebasejs/12.13.0/firebase-database.js";

import {
formatPrice
}
from "./utils.js";

const currentUser =
JSON.parse(
localStorage.getItem("user")
);

if(
!currentUser ||
currentUser.type !== "store"
){

window.location.replace(
"index.html"
);

}

document.getElementById(
"storeName"
).innerHTML =
currentUser.store_name || "";

document.getElementById(
"storeCategory"
).innerHTML =
currentUser.category || "";

document.getElementById(
"storeImage"
).src =
currentUser.store_image || "store.png";

const container =
document.getElementById(
"productsContainer"
);

onValue(
ref(
db,
"store_products/" + currentUser.id
),
(snapshot)=>{

container.innerHTML = "";

if(!snapshot.exists()){

container.innerHTML = `
<div class="empty">
لا توجد منتجات
</div>
`;

return;

}

const products =
snapshot.val();

for(let key in products){

const product =
products[key];

container.innerHTML += `

<div class="product-card">

<div class="product-top">

<img
src="${product.image || "product.png"}"
class="product-image">

<div class="product-info">

<div class="product-name">
${product.name || ""}
</div>

<div class="product-price">
${formatPrice(product.price)}
</div>

<div class="product-description">
${product.description || ""}
</div>

</div>

</div>

<div class="actions">

<button
class="edit-btn"
onclick="editProduct('${key}')">

تعديل

</button>

<button
class="delete-btn"
onclick="deleteProduct('${key}')">

حذف

</button>

</div>

</div>

`;

}

}
);

window.editProduct =
function(productId){

window.location.href =
`edit-product.html?id=${productId}`;

};

window.deleteProduct =
async function(productId){

const confirmDelete =
confirm("حذف المنتج؟");

if(!confirmDelete){
return;
}

await remove(
ref(
db,
"store_products/" +
currentUser.id +
"/" +
productId
)
);

alert("تم حذف المنتج");

};

</script>

</body>

</html>
