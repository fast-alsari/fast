<!-- home.html -->

<!DOCTYPE html>
<html lang="ar" dir="rtl">

<head>

<meta charset="UTF-8">

<meta name="viewport"
content="width=device-width, initial-scale=1.0">

<title>
عالسريع
</title>

<link rel="stylesheet"
href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css"/>

<link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;500;600;700&display=swap"
rel="stylesheet">

<style>

*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:'Cairo',sans-serif;
}

body{
background:#f7f7f7;
padding-bottom:110px;
overflow-x:hidden;
}

.page{
display:none;
}

.active-page{
display:block;
}

.header{
background:linear-gradient(135deg,#ff8800,#ff5500);
padding:20px;
border-bottom-left-radius:35px;
border-bottom-right-radius:35px;
color:white;
box-shadow:0 8px 30px rgba(0,0,0,.15);
}

.header-top{
display:flex;
justify-content:space-between;
align-items:center;
}

.user-image{
width:65px;
height:65px;
border-radius:50%;
border:3px solid white;
object-fit:cover;
}

.search-box{
margin-top:18px;
background:white;
padding:15px;
border-radius:18px;
display:flex;
align-items:center;
}

.search-box i{
color:#ff8800;
font-size:18px;
}

.search-box input{
border:none;
outline:none;
width:100%;
margin-right:10px;
font-size:15px;
}

.filters{
display:flex;
gap:10px;
overflow:auto;
padding:15px;
}

.filters::-webkit-scrollbar{
display:none;
}

.filter-btn{
border:none;
padding:10px 18px;
border-radius:14px;
background:#eee;
font-weight:bold;
cursor:pointer;
white-space:nowrap;
}

.filter-btn.active{
background:#ff8800;
color:white;
}

.stores-container{
padding:15px;
display:flex;
flex-direction:column;
gap:18px;
}

.store-card{
background:white;
padding:15px;
border-radius:28px;
box-shadow:0 5px 20px rgba(0,0,0,.08);
position:relative;
overflow:hidden;
cursor:pointer;
border:3px solid transparent;
}

.store-header{
display:flex;
gap:15px;
align-items:center;
}

.store-image{
width:95px;
height:95px;
border-radius:22px;
object-fit:cover;
}

.store-info{
flex:1;
}

.store-name{
display:flex;
align-items:center;
gap:6px;
margin-bottom:8px;
}

.store-name h3{
font-size:20px;
}

.ok-icon{
width:18px;
height:18px;
object-fit:contain;
}

.store-info p{
font-size:14px;
color:#666;
margin-bottom:4px;
}

/* صفحة المتجر */

.single-store-page{
display:none;
position:fixed;
top:0;
left:0;
right:0;
bottom:0;
background:#f7f7f7;
z-index:999;
overflow-y:auto;
padding-bottom:120px;
animation:openPage .25s ease;
}

@keyframes openPage{

from{
transform:translateX(100px);
opacity:0;
}

to{
transform:translateX(0);
opacity:1;
}

}

.store-top-bar{
background:linear-gradient(135deg,#ff8800,#ff5500);
padding:20px;
display:flex;
align-items:center;
gap:15px;
color:white;
border-bottom-left-radius:30px;
border-bottom-right-radius:30px;
position:sticky;
top:0;
z-index:20;
}

.back-btn{
width:45px;
height:45px;
border-radius:50%;
border:none;
background:white;
color:#ff6600;
font-size:18px;
cursor:pointer;
}

.single-store-info{
display:flex;
align-items:center;
gap:12px;
}

.single-store-image{
width:70px;
height:70px;
border-radius:18px;
object-fit:cover;
border:3px solid white;
}

/* المنتجات */

.products-container{
padding:15px;
display:flex;
flex-direction:column;
gap:18px;
}

.product-card{
background:white;
padding:15px;
border-radius:25px;
box-shadow:0 5px 20px rgba(0,0,0,.08);
}

.product-image{
width:100%;
height:220px;
object-fit:cover;
border-radius:20px;
margin-bottom:12px;
}

.product-name{
font-size:20px;
font-weight:bold;
margin-bottom:8px;
}

.product-desc{
font-size:14px;
color:#666;
line-height:1.7;
margin-bottom:10px;
}

.product-price{
font-size:20px;
font-weight:bold;
color:#ff8800;
margin-bottom:12px;
}

.qty-box{
display:flex;
justify-content:space-between;
align-items:center;
margin-bottom:15px;
}

.qty-controller{
display:flex;
align-items:center;
gap:10px;
background:#f2f2f2;
padding:6px 10px;
border-radius:16px;
}

.qty-btn{
width:34px;
height:34px;
border:none;
border-radius:10px;
background:#ff8800;
color:white;
font-size:20px;
font-weight:bold;
cursor:pointer;
}

.qty-input{
width:45px;
height:34px;
text-align:center;
border:none;
background:white;
border-radius:10px;
font-size:16px;
font-weight:bold;
}

.add-btn{
width:100%;
padding:15px;
border:none;
border-radius:16px;
background:#00b894;
color:white;
font-size:16px;
font-weight:bold;
cursor:pointer;
}

/* السلة */

.cart-container{
padding:15px;
display:flex;
flex-direction:column;
gap:15px;
}

.cart-item{
background:white;
padding:15px;
border-radius:22px;
display:flex;
gap:15px;
align-items:center;
box-shadow:0 5px 20px rgba(0,0,0,.08);
}

.cart-image{
width:80px;
height:80px;
border-radius:16px;
object-fit:cover;
}

.cart-info{
flex:1;
}

.cart-info h3{
margin-bottom:6px;
}

.cart-info p{
margin-bottom:4px;
color:#555;
}

.delete-btn{
background:red;
border:none;
padding:10px 14px;
border-radius:12px;
color:white;
cursor:pointer;
font-weight:bold;
}

.summary-box{
background:white;
margin:15px;
padding:20px;
border-radius:25px;
box-shadow:0 5px 20px rgba(0,0,0,.08);
}

.bill-line{
display:flex;
justify-content:space-between;
margin-bottom:14px;
font-size:16px;
}

.final-price{
font-size:24px;
font-weight:bold;
color:#ff8800;
margin-top:10px;
}

.tip-title{
margin-top:15px;
margin-bottom:8px;
font-size:14px;
color:#666;
}

.tip-input{
width:100%;
padding:14px;
border-radius:14px;
border:1px solid #ddd;
margin-bottom:15px;
font-size:15px;
outline:none;
}

.send-order{
width:100%;
padding:16px;
border:none;
border-radius:16px;
background:#00b894;
color:white;
font-size:17px;
font-weight:bold;
cursor:pointer;
}

/* الحساب */

.account-card{
margin:20px;
background:white;
padding:25px;
border-radius:30px;
position:relative;
box-shadow:0 5px 20px rgba(0,0,0,.08);
}

.top-logout{
position:absolute;
top:20px;
left:20px;
width:auto;
padding:12px 18px;
margin:0;
display:flex;
align-items:center;
gap:8px;
font-size:14px;
}

.account-image{
width:110px;
height:110px;
border-radius:50%;
border:4px solid #ff8800;
margin:40px auto 15px;
display:block;
object-fit:cover;
}

#accountName{
text-align:center;
margin-bottom:25px;
font-size:24px;
}

.account-info-box{
display:flex;
flex-direction:column;
gap:15px;
}

.account-info-item{
display:flex;
align-items:flex-start;
gap:15px;
background:#f8f8f8;
padding:16px;
border-radius:18px;
}

.info-icon{
width:50px;
height:50px;
border-radius:15px;
background:linear-gradient(135deg,#ff8800,#ff5500);
display:flex;
align-items:center;
justify-content:center;
color:white;
font-size:20px;
flex-shrink:0;
}

.account-info-item h4{
font-size:15px;
margin-bottom:5px;
color:#444;
}

.account-info-item p{
font-size:15px;
color:#777;
line-height:1.7;
word-break:break-word;
}

.logout-btn{
padding:16px;
border:none;
border-radius:16px;
background:red;
color:white;
font-size:16px;
font-weight:bold;
cursor:pointer;
}

/* البار السفلي */

.bottom-bar{
position:fixed;
bottom:0;
left:0;
right:0;
height:85px;
background:white;
display:flex;
justify-content:space-around;
align-items:center;
box-shadow:0 -5px 20px rgba(0,0,0,.08);
z-index:1000;
}

.nav-item{
display:flex;
flex-direction:column;
align-items:center;
color:#888;
cursor:pointer;
}

.nav-item.active{
color:#ff8800;
}

.nav-item i{
font-size:22px;
margin-bottom:5px;
}

.empty{
text-align:center;
padding:40px;
color:#777;
}

</style>

</head>

<body>

<!-- الرئيسية -->

<div id="homePage"
class="page active-page">

<div class="header">

<div class="header-top">

<div>

<h2 id="welcomeText">
اهلاً بك

<p>
اطلب كل ما تحتاجه 🚀
</p>

<img

السلة

onclick="showPage('accountPage',this)">

<script type="module">

import { initializeApp }
from "https://www.gstatic.com/firebasejs/12.13.0/firebase-app.js";

import {
getDatabase,
ref,
get,
set,
child
}
from "https://www.gstatic.com/firebasejs/12.13.0/firebase-database.js";

const firebaseConfig = {

apiKey:"AIzaSyC7QzQTYMSGRV_nraJBneBqDqYGhugF0Pw",

authDomain:"fast-937c9.firebaseapp.com",

projectId:"fast-937c9",

storageBucket:"fast-937c9.firebasestorage.app",

messagingSenderId:"221388561840",

appId:"1:221388561840:web:ec9d75183ddd7d44be0a75",

databaseURL:
"https://fast-937c9-default-rtdb.europe-west1.firebasedatabase.app"

};

const app =
initializeApp(firebaseConfig);

const database =
getDatabase(app);

const currentUser =
JSON.parse(localStorage.getItem("user"));

if(!currentUser){

window.location.href =
"index.html";

}

document.getElementById("welcomeText")
.innerHTML =
`اهلاً ${currentUser.name}`;

/* بيانات الحساب */

document.getElementById("accountName")
.innerHTML =
currentUser.name || "مستخدم";

document.getElementById("accountFullName")
.innerHTML =
currentUser.name || "---";

document.getElementById("accountPhone")
.innerHTML =
currentUser.phone || "---";

document.getElementById("accountAddress")
.innerHTML =
currentUser.address || "---";

document.getElementById("accountNearestPoint")
.innerHTML =
currentUser.nearpoint || "---";

document.getElementById("accountType")
.innerHTML =
currentUser.type || "مستخدم";

/* متغيرات */

let allStores = [];

let allProducts = [];

let cart =
JSON.parse(
localStorage.getItem("cart")
) || [];

const storesContainer =
document.getElementById("storesContainer");

/* تحميل المتاجر */

async function loadStores(){

const snapshot =
await get(
child(ref(database),"stores")
);

allStores = [];

if(snapshot.exists()){

const stores =
snapshot.val();

for(let key in stores){

let store = stores[key];

store.id = key;

if(store.status === "active"){

let vipActive = false;

if(store.accountType === "vip"){

if(store.vipExpireDate){

let today =
new Date()
.toISOString()
.split("T")[0];

if(today <= store.vipExpireDate){

vipActive = true;

}

}else{

vipActive = true;

}

}

store.vip = vipActive;

allStores.push(store);

}

}

allStores.sort((a,b)=>
(b.vip === true) - (a.vip === true)
);

generateFilters();

renderStores(allStores);

}

}

loadStores();

/* فلترة */

function generateFilters(){

const filtersContainer =
document.querySelector(".filters");

filtersContainer.innerHTML = "";

filtersContainer.innerHTML += `

<button
class="filter-btn active"
data-category="all">

الكل

</button>

`;

let categories = [];

allStores.forEach(store=>{

if(
store.category &&
!categories.includes(store.category)
){

categories.push(store.category);

}

});

categories.forEach(category=>{

filtersContainer.innerHTML += `

<button
class="filter-btn"
data-category="${category}">

${category}

</button>

`;

});

document.querySelectorAll(".filter-btn")
.forEach(button=>{

button.addEventListener("click",()=>{

document.querySelectorAll(".filter-btn")
.forEach(btn=>{

btn.classList.remove("active");

});

button.classList.add("active");

let category =
button.dataset.category;

if(category === "all"){

renderStores(allStores);

}else{

let filtered =
allStores.filter(store=>
store.category === category
);

renderStores(filtered);

}

});

});

}

/* عرض المتاجر */

function renderStores(stores){

storesContainer.innerHTML = "";

if(stores.length === 0){

storesContainer.innerHTML = `

<div class="empty">

لا توجد نتائج

</div>

`;

return;

}

stores.forEach((store,index)=>{

storesContainer.innerHTML += `

<div
class="store-card ${store.vip ? "vip-store" : ""}"
onclick="openStore('${store.id}')">

${store.vip ? `

<div class="vip-badge">

🔥 VIP

</div>

` : ""}

<div class="store-header">

<img
src="${store.image || "store.png"}"
class="store-image">

<div class="store-info">

<div class="store-name">

<h3>

${store.store_name}

</h3>

<img
src="ok.png"
class="ok-icon">

</div>

<p>

🏪 ${store.category}

</p>

<p>

📞 ${store.phone}

</p>

</div>

</div>

</div>

`;

});

}

/* البحث */

document.getElementById("searchInput")
.addEventListener("input",function(){

let value =
this.value.toLowerCase();

let filtered =
allStores.filter(store=>

(store.store_name || "")
.toLowerCase()
.includes(value)

||

(store.category || "")
.toLowerCase()
.includes(value)

);

renderStores(filtered);

});

/* فتح متجر */

window.openStore =
async function(storeId){

const store =
allStores.find(s=>s.id === storeId);

document.getElementById("singleStorePage")
.style.display = "block";

document.getElementById("singleStoreName")
.innerHTML =
store.store_name;

document.getElementById("singleStoreCategory")
.innerHTML =
store.category;

document.getElementById("singleStoreImage")
.src =
store.image || "store.png";

const container =
document.getElementById("singleProductsContainer");

container.innerHTML = `
<div class="empty">
جاري التحميل...
</div>
`;

const snapshot =
await get(
child(
ref(database),
"store_products/"+store.id
)
);

container.innerHTML = "";

if(snapshot.exists()){

const products =
snapshot.val();

for(let key in products){

const product =
products[key];

product.id = key;

product.storeId =
store.id;

product.storeName =
store.store_name;

product.storeLat =
store.latitude || "";

product.storeLng =
store.longitude || "";

if(product.status === "active"){

allProducts.push(product);

container.innerHTML += `

<div class="product-card">

<img
src="${product.image || "product.png"}"
class="product-image">

<div class="product-name">

${product.name}

</div>

<div class="product-desc">

${product.description || ""}

</div>

<div class="product-price">

${product.price} د.ع

</div>

<div class="qty-box">

<span>
الكمية
</span>

<div class="qty-controller">

<button
class="qty-btn"
onclick="decreaseQty('${product.id}')">

-

</button>

<input
type="text"
readonly
value="1"
id="qty_${product.id}"
class="qty-input">

<button
class="qty-btn"
onclick="increaseQty('${product.id}')">

+

</button>

</div>

</div>

<button
class="add-btn"
onclick='addToCart(${JSON.stringify(product)})'>

اضافة الى السلة

</button>

</div>

`;

}

}

}

};

/* رجوع */

window.backHome =
function(){

document.getElementById("singleStorePage")
.style.display = "none";

};

/* كمية */

window.increaseQty =
function(id){

const input =
document.getElementById(`qty_${id}`);

input.value =
Number(input.value)+1;

};

window.decreaseQty =
function(id){

const input =
document.getElementById(`qty_${id}`);

if(Number(input.value)>1){

input.value =
Number(input.value)-1;

}

};

/* سلة */

window.addToCart =
function(product){

let qty =
Number(
document.getElementById(
`qty_${product.id}`
).value
);

cart.push({

...product,
qty:qty

});

localStorage.setItem(
"cart",
JSON.stringify(cart)
);

updateCart();

alert("تمت الاضافة");

};

function updateCart(){

const cartContainer =
document.getElementById("cartContainer");

const itemsTotal =
document.getElementById("itemsTotal");

const finalTotal =
document.getElementById("finalTotal");

cartContainer.innerHTML = "";

if(cart.length === 0){

cartContainer.innerHTML = `
<div class="empty">
السلة فارغة
</div>
`;

itemsTotal.innerHTML =
"0 د.ع";

finalTotal.innerHTML =
"0 د.ع";

return;

}

let total = 0;

cart.forEach((item,index)=>{

let itemTotal =
Number(item.price) *

updateCart();

window.deleteCartItem =
function(index){

cart.splice(index,1);

localStorage.setItem(
"cart",
JSON.stringify(cart)
);

updateCart();

};

document.getElementById("tipInput")
.addEventListener("input",updateCart);

/* ارسال الطلب */

window.sendOrder =
async function(){

if(cart.length === 0){

alert("السلة فارغة");

return;

}

navigator.geolocation.getCurrentPosition(

async(position)=>{

let total = 0;

cart.forEach(item=>{

total +=
Number(item.price) *
Number(item.qty);

});

let tip =
Number(
document.getElementById("tipInput").value || 0
);

const orderId =
"ORDER"+Date.now();

const orderData = {

id:orderId,

customerId:
currentUser.id,

customerName:
currentUser.name,

customerPhone:
currentUser.phone,

customerAddress:
currentUser.address || "",

nearestPoint:
currentUser.nearpoint || "",

customerLat:
position.coords.latitude,

customerLng:
position.coords.longitude,

items:cart,

storeName:
cart[0].storeName || "",

storeLat:
cart[0].storeLat || "",

storeLng:
cart[0].storeLng || "",

deliveryPrice:2000,

tip:tip,

productsPrice:total,

totalPrice:
total + 2000 + tip,

status:"pending",

createdAt:Date.now()

};

await set(
ref(database,"orders/"+orderId),
orderData
);

cart = [];

localStorage.removeItem("cart");

updateCart();

alert("تم ارسال الطلب 🚀");

},

()=>{

alert("فعل GPS حتى يتم ارسال الطلب");

}

);

};

/* تنقل */

window.showPage =
function(pageId,element){

document.querySelectorAll(".page")
.forEach(page=>{

page.classList.remove("active-page");

});

document.getElementById(pageId)
.classList.add("active-page");

document.querySelectorAll(".nav-item")
.forEach(item=>{

item.classList.remove("active");

});

element.classList.add("active");

};

/* تسجيل خروج */

window.logout =
function(){

localStorage.removeItem("user");

window.location.href =
"index.html";

};

</script>
