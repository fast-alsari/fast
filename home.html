<!-- home.html -->

<!DOCTYPE html>
<html lang="ar" dir="rtl">

<head>

<meta charset="UTF-8">

<meta name="viewport"
content="width=device-width, initial-scale=1.0">

<title>عالسريع</title>

<link rel="stylesheet"
href="style.css">

<link rel="preconnect"
href="https://fonts.googleapis.com">

<link rel="preconnect"
href="https://fonts.gstatic.com"
crossorigin>

<link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;500;700&display=swap"
rel="stylesheet">

<link rel="stylesheet"
href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css"/>

</head>

<body>

<!-- HEADER -->

<header class="main-header">

<div class="header-top">

<div>

<h2 id="welcomeText">

اهلاً بك 👋

</h2>

<p class="header-subtitle">

اطلب كل ما تحتاجه بسهولة

</p>

</div>

<img
id="userImage"
src="user.png"
class="profile-image">

</div>

</header>

<!-- الصفحات -->

<div class="pages-wrapper">

<!-- الرئيسية -->

<section id="homePage"
class="page active-page">

<!-- البحث -->

<div class="search-box">

<i class="fa-solid fa-magnifying-glass"></i>

<input
type="text"
id="searchInput"
placeholder="ابحث عن متجر...">

</div>

<!-- الفلاتر -->

<div
id="categoriesContainer"
class="categories-container">

</div>

<!-- المتاجر -->

<div
id="storesContainer"
class="stores-container">

</div>

</section>

<!-- السلة -->

<section id="cartPage"
class="page">

<div class="page-title">

السلة 🛒

</div>

<div id="cartContainer">

<p class="empty-text">

لا توجد منتجات بالسلة

</p>

</div>

<button
id="sendOrderBtn"
class="main-btn">

ارسال الطلب

</button>

</section>

<!-- الحساب -->

<section id="accountPage"
class="page">

<div class="account-card">

<img
id="accountImage"
src="user.png"
class="account-image">

<h2 id="accountName">

اسم المستخدم

</h2>

<p id="accountPhone">

رقم الهاتف

</p>

<p id="accountType">

نوع الحساب

</p>

<button
onclick="logout()"
class="logout-btn">

تسجيل الخروج

</button>

</div>

</section>

</div>

<!-- البار السفلي -->

<nav class="bottom-nav">

<div
class="nav-item active-nav"
onclick="showPage('homePage',this)">

<div class="nav-circle">

<i class="fa-solid fa-house"></i>

</div>

<span>

الرئيسية

</span>

</div>

<div
class="nav-item"
onclick="showPage('cartPage',this)">

<div class="nav-circle">

<i class="fa-solid fa-cart-shopping"></i>

</div>

<span>

السلة

</span>

</div>

<div
class="nav-item"
onclick="showPage('accountPage',this)">

<div class="nav-circle">

<i class="fa-solid fa-user"></i>

</div>

<span>

الحساب

</span>

</div>

</nav>

<!-- FIREBASE -->

<script type="module">

import { initializeApp }
from
"https://www.gstatic.com/firebasejs/12.13.0/firebase-app.js";

import {
getDatabase,
ref,
get,
child
}
from
"https://www.gstatic.com/firebasejs/12.13.0/firebase-database.js";

// Firebase Config

const firebaseConfig = {

apiKey:
"AIzaSyC7QzQTYMSGRV_nraJBneBqDqYGhugF0Pw",

authDomain:
"fast-937c9.firebaseapp.com",

projectId:
"fast-937c9",

storageBucket:
"fast-937c9.firebasestorage.app",

messagingSenderId:
"221388561840",

appId:
"1:221388561840:web:ec9d75183ddd7d44be0a75",

measurementId:
"G-CEKHEPNR9X",

databaseURL:
"https://fast-937c9-default-rtdb.europe-west1.firebasedatabase.app"

};

const app =
initializeApp(firebaseConfig);

const database =
getDatabase(app);

// الجلسة

const currentUser =
JSON.parse(localStorage.getItem("user"));

if(!currentUser){

window.location.href =
"index.html";

}

// معلومات المستخدم

document.getElementById("welcomeText")
.innerHTML =

`اهلاً ${currentUser.name || currentUser.owner}`;

document.getElementById("accountName")
.innerHTML =

currentUser.name ||
currentUser.owner;

document.getElementById("accountPhone")
.innerHTML =

currentUser.phone;

document.getElementById("accountType")
.innerHTML =

currentUser.type;

if(currentUser.image){

document.getElementById("userImage")
.src = currentUser.image;

document.getElementById("accountImage")
.src = currentUser.image;

}

// الصفحات

window.showPage =
function(pageId,element){

document.querySelectorAll(".page")
.forEach(page=>{

page.classList.remove("active-page");

});

document.getElementById(pageId)
.classList.add("active-page");

document.querySelectorAll(".nav-item")
.forEach(item=>{

item.classList.remove("active-nav");

});

element.classList.add("active-nav");

};

// السلة

let cart = JSON.parse(
localStorage.getItem("cart")
) || [];

function saveCart(){

localStorage.setItem(
"cart",
JSON.stringify(cart)
);

}

function renderCart(){

const cartContainer =
document.getElementById("cartContainer");

if(cart.length===0){

cartContainer.innerHTML = `

<p class="empty-text">

لا توجد منتجات بالسلة

</p>

`;

return;

}

cartContainer.innerHTML = "";

cart.forEach((item,index)=>{

cartContainer.innerHTML += `

<div class="cart-item">

<img
src="${item.image}"
class="cart-image">

<div class="cart-info">

<h3>

${item.name}

</h3>

<p>

${item.store}

</p>

</div>

<button
onclick="removeCart(${index})"
class="remove-btn">

حذف

</button>

</div>

`;

});

}

window.removeCart =
function(index){

cart.splice(index,1);

saveCart();

renderCart();

};

// تحميل المتاجر

async function loadStores(){

const storesContainer =
document.getElementById("storesContainer");

const categoriesContainer =
document.getElementById("categoriesContainer");

storesContainer.innerHTML = "";

try{

const snapshot =
await get(
child(ref(database),"stores")
);

if(snapshot.exists()){

const stores = snapshot.val();

let categories = [];

for(let key in stores){

const store = stores[key];

if(store.status==="active"){

if(!categories.includes(store.category)){

categories.push(store.category);

}

storesContainer.innerHTML += `

<div
class="store-card"
data-category="${store.category}">

<img
class="store-image"
src="${store.image || 'store.png'}">

<div class="store-info">

<div class="store-name-box">

<h3>

${store.store_name}

</h3>

<img
src="ok.png"
class="verified-icon">

</div>

<p class="store-category">

${store.category}

</p>

<p class="store-distance">

📍 قريب منك

</p>

<button
class="add-btn"
onclick='addToCart(
"${store.store_name}",
"${store.image || 'store.png'}"
)'>

إضافة للسلة

</button>

</div>

</div>

`;

}

}

// الفلاتر

categoriesContainer.innerHTML =

`<button
class="category-btn active-category"
onclick="filterStores('all',this)">

الكل

</button>`;

categories.forEach(category=>{

categoriesContainer.innerHTML += `

<button
class="category-btn"
onclick="filterStores('${category}',this)">

${category}

</button>

`;

});

}

}catch(error){

console.log(error);

}

}

loadStores();

// فلترة

window.filterStores =
function(category,element){

document.querySelectorAll(".category-btn")
.forEach(btn=>{

btn.classList.remove("active-category");

});

element.classList.add("active-category");

document.querySelectorAll(".store-card")
.forEach(card=>{

if(
category==="all" ||
card.dataset.category===category
){

card.style.display="flex";

}else{

card.style.display="none";

}

});

};

// البحث المباشر

document.getElementById("searchInput")
.addEventListener("input",function(){

let value =
this.value.toLowerCase();

document.querySelectorAll(".store-card")
.forEach(card=>{

let text =
card.innerText.toLowerCase();

if(text.includes(value)){

card.style.display="flex";

}else{

card.style.display="none";

}

});

});

// إضافة للسلة

window.addToCart =
function(name,image){

cart.push({

name:name,
image:image,
store:name

});

saveCart();

renderCart();

alert("تمت الإضافة للسلة");

};

// ارسال الطلب

document.getElementById("sendOrderBtn")
.onclick = function(){

if(cart.length===0){

alert("السلة فارغة");

return;

}

alert("تم ارسال الطلب");

cart = [];

saveCart();

renderCart();

};

// تسجيل خروج

window.logout =
function(){

localStorage.removeItem("user");

window.location.href =
"index.html";

};

renderCart();

</script>

</body>

</html>
