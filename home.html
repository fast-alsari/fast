<!-- home.html -->

<!DOCTYPE html>
<html lang="ar" dir="rtl">

<head>

    <meta charset="UTF-8">

    <meta name="viewport"
    content="width=device-width, initial-scale=1.0">

    <title>الرئيسية</title>

    <!-- ملف الستايل -->
    <link rel="stylesheet" href="home.css">

    <!-- خطوط -->
    <link rel="preconnect"
    href="https://fonts.googleapis.com">

    <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;700&display=swap"
    rel="stylesheet">

</head>

<body>

<!-- HEADER -->

<header class="header">

    <div class="header-top">

        <div>

            <h2 id="welcomeText">
                اهلاً بك 👋
            </h2>

            <p>
                اطلب كل ما تحتاجه بسهولة
            </p>

        </div>

        <img
        id="userImage"
        class="profile-image"
        src="user.png">

    </div>

</header>

<!-- SEARCH -->

<div class="search-box">

    <input
    type="text"
    placeholder="ابحث عن متجر ...">

</div>

<!-- STORES -->

<section class="stores-section">

    <div class="section-title">

        <h3>
            المتاجر المتاحة
        </h3>

    </div>

    <div
    class="stores-container"
    id="storesContainer">

    </div>

</section>

<!-- BOTTOM NAV -->

<nav class="bottom-nav">

    <a href="home.html"
    class="nav-item active">

        <img
        src="home.png"
        class="nav-icon">

        <span>
            الرئيسية
        </span>

    </a>

    <a href="cart.html"
    class="nav-item">

        <img
        src="cart.png"
        class="nav-icon">

        <span>
            السلة
        </span>

    </a>

    <a href="account.html"
    class="nav-item">

        <img
        src="user.png"
        class="nav-icon">

        <span>
            الحساب
        </span>

    </a>

</nav>

<!-- FIREBASE -->
<script type="module">

import { initializeApp }
from "https://www.gstatic.com/firebasejs/12.13.0/firebase-app.js";

import {
getDatabase,
ref,
get,
child
}
from "https://www.gstatic.com/firebasejs/12.13.0/firebase-database.js";

const firebaseConfig = {

apiKey: "AIzaSyC7QzQTYMSGRV_nraJBneBqDqYGhugF0Pw",

authDomain: "fast-937c9.firebaseapp.com",

projectId: "fast-937c9",

storageBucket: "fast-937c9.firebasestorage.app",

messagingSenderId: "221388561840",

appId: "1:221388561840:web:ec9d75183ddd7d44be0a75",

measurementId: "G-CEKHEPNR9X",

databaseURL:
"https://fast-937c9-default-rtdb.europe-west1.firebasedatabase.app"

};

const app = initializeApp(firebaseConfig);

const database = getDatabase(app);



// =======================
// التحقق من الجلسة
// =======================

const currentUser =
JSON.parse(localStorage.getItem("user"));

if(!currentUser){

window.location.href = "index.html";

}



// =======================
// معلومات المستخدم
// =======================

document.getElementById("welcomeText")
.innerHTML =
`اهلاً ${currentUser.name || currentUser.owner || "👋"}`;

if(currentUser.image){

document.getElementById("userImage")
.src = currentUser.image;

}



// =======================
// تحميل المتاجر
// =======================

async function loadStores(){

const storesContainer =
document.getElementById("storesContainer");

storesContainer.innerHTML = "";

try{

const snapshot =
await get(
child(ref(database),"stores")
);

if(snapshot.exists()){

const stores = snapshot.val();

for(let key in stores){

const store = stores[key];

if(store.status === "active"){

storesContainer.innerHTML += `

<div class="store-card">

<img
class="store-image"
src="${
store.image || "store.png"
}">

<div class="store-info">

<div class="store-name-box">

<h3>
${store.store_name}
</h3>

<img
src="ok.png"
class="verified-icon">

</div>

<p class="store-status">

🟢 متاح حالياً

</p>

</div>

</div>

`;

}

}

}else{

storesContainer.innerHTML =

"<p>لا توجد متاجر حالياً</p>";

}

}catch(error){

console.log(error);

storesContainer.innerHTML =

"<p>حدث خطأ بتحميل المتاجر</p>";

}

}

loadStores();



// =======================
// تسجيل خروج
// =======================

window.logout = function(){

localStorage.removeItem("user");

window.location.href = "index.html";

};

</script>

</body>

</html>
