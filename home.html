<!-- home.html -->

<!DOCTYPE html>
<html lang="ar" dir="rtl">

<head>

<meta charset="UTF-8">

<meta name="viewport"

<link rel="stylesheet"

rel="stylesheet">

</head>

<body>

<!-- HEADER -->

<header class="header">

<div class="header-top">

<div>

<h2 id="welcomeText">

اهلاً بك 👋

</h2>

<p>

اطلب كل ما تحتاجه بسهولة

</p>

</div>

<img
id="userImage"
class="profile-image"
src="user.png">

</div>

</header>

<!-- SEARCH -->

<div class="search-box">

<input
type="text"
id="searchInput"
placeholder="ابحث عن متجر ...">

</div>

<!-- FILTER -->

<div class="filter-buttons">

<button
class="filter-btn active"
onclick="filterStores('all',this)">

الكل

</button>

<button
class="filter-btn"
onclick="filterStores('مطعم',this)">

مطاعم

</button>

<button
class="filter-btn"
onclick="filterStores('ماركت',this)">

ماركت

</button>

<button
class="filter-btn"
onclick="filterStores('صيدلية',this)">

صيدليات

</button>

<button
class="filter-btn"
onclick="filterStores('ملابس',this)">

ملابس

</button>

</div>

<!-- STORES -->

<section class="stores-section">

<div class="section-title">

<h3>

</h3>

<div
class="stores-container"

</section>

<!-- BOTTOM NAV -->

<nav class="bottom-nav">

<span>

</span>

</a>

<a href="cart.html"
class="nav-item">

<img
src="cart.png"
class="nav-icon">

<span>

السلة

</span>

</a>

<a href="account.html"
class="nav-item">

<img
src="user.png"
class="nav-icon">

<span>

الحساب

</span>

</a>

</nav>

<script type="module">

// Firebase

import { initializeApp }
from "https://www.gstatic.com/firebasejs/12.13.0/firebase-app.js";

import {
getDatabase,
ref,
get,
child
}
from "https://www.gstatic.com/firebasejs/12.13.0/firebase-database.js";

const firebaseConfig = {

apiKey: "AIzaSyC7QzQTYMSGRV_nraJBneBqDqYGhugF0Pw",

authDomain: "fast-937c9.firebaseapp.com",

projectId: "fast-937c9",

storageBucket: "fast-937c9.firebasestorage.app",

messagingSenderId: "221388561840",

appId: "1:221388561840:web:ec9d75183ddd7d44be0a75",

measurementId: "G-CEKHEPNR9X",

databaseURL:
"https://fast-937c9-default-rtdb.europe-west1.firebasedatabase.app"

};

const app = initializeApp(firebaseConfig);

const database = getDatabase(app);



// ======================
// SESSION
// ======================

const currentUser =
JSON.parse(localStorage.getItem("user"));

if(!currentUser){

window.location.href =
"index.html";

}



// ======================
// USER INFO
// ======================

document.getElementById("welcomeText")
.innerHTML =

`اهلاً ${currentUser.name || "👋"}`;

if(currentUser.image){

document.getElementById("userImage")
.src = currentUser.image;

}



// ======================
// STORE FILTER
// ======================

let allStores = [];

window.filterStores =
function(category,button){

document
.querySelectorAll(".filter-btn")
.forEach(btn=>{

btn.classList.remove("active");

});

button.classList.add("active");

if(category==="all"){

renderStores(allStores);

return;

}

let filtered =
allStores.filter(store =>

store.category === category

);

renderStores(filtered);

};



// ======================
// DISTANCE
// ======================

function getDistanceFromLatLonInKm(
lat1,
lon1,
lat2,
lon2
){

const R = 6371;

const dLat =
deg2rad(lat2-lat1);

const dLon =
deg2rad(lon2-lon1);

const a =

Math.sin(dLat/2) *
Math.sin(dLat/2) +

Math.cos(deg2rad(lat1)) *
Math.cos(deg2rad(lat2)) *

Math.sin(dLon/2) *
Math.sin(dLon/2);

const c =
2 * Math.atan2(
Math.sqrt(a),
Math.sqrt(1-a)
);

return (R * c).toFixed(1);

}

function deg2rad(deg){

return deg * (Math.PI/180);

}



// ======================
// LOAD STORES
// ======================

async function loadStores(){

const storesContainer =
document.getElementById("storesContainer");

storesContainer.innerHTML = "";

try{

const snapshot =
await get(
child(ref(database),"stores")
);

if(snapshot.exists()){

const stores = snapshot.val();

allStores = [];

for(let key in stores){

const store = stores[key];

if(store.status==="active"){

allStores.push(store);

}

}

renderStores(allStores);

}else{

storesContainer.innerHTML =

"<p class='empty-text'>لا توجد متاجر</p>";

}

}catch(error){

console.log(error);

}

}



// ======================
// RENDER STORES
// ======================

function renderStores(stores){

const storesContainer =
document.getElementById("storesContainer");

storesContainer.innerHTML = "";

stores.forEach(store=>{

let distance = "غير معروف";

if(
currentUser.latitude &&
store.latitude
){

distance =

getDistanceFromLatLonInKm(

currentUser.latitude,
currentUser.longitude,

store.latitude,
store.longitude

)

+ " كم";

}

storesContainer.innerHTML += `

<div class="store-card">

<div class="store-right">

<img
class="store-image"
src="${
store.image || "store.png"
}">

<div class="store-details">

<div class="store-name-row">

<div class="store-name">

${store.store_name}

</div>

<img
src="ok.png"
class="verified-icon">

</div>

<div class="store-distance">

📍 يبعد عنك ${distance}

</div>

<div class="store-status">

🟢 متاح حالياً

</div>

</div>

</div>

</div>

`;

});

}



// ======================
// SEARCH
// ======================

document
.getElementById("searchInput")

.addEventListener("keyup",function(){

let value =
this.value.toLowerCase();

let filtered =
allStores.filter(store =>

store.store_name
.toLowerCase()
.includes(value)

);

renderStores(filtered);

});



// ======================
// LOGOUT
// ======================

window.logout = function(){

localStorage.removeItem("user");

window.location.href =
"index.html";

};

loadStores();

</script>

</body>

</html>
