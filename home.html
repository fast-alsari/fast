<script type="module">

import { initializeApp }
from "https://www.gstatic.com/firebasejs/12.13.0/firebase-app.js";

import {
getDatabase,
ref,
set,
update,
child,
get,
onValue
}

from "https://www.gstatic.com/firebasejs/12.13.0/firebase-database.js";

const firebaseConfig = {

apiKey:"AIzaSyC7QzQTYMSGRV_nraJBneBqDqYGhugF0Pw",

authDomain:"fast-937c9.firebaseapp.com",

projectId:"fast-937c9",

databaseURL:
"https://fast-937c9-default-rtdb.europe-west1.firebasedatabase.app"

};

const app =
initializeApp(firebaseConfig);

const database =
getDatabase(app);

const currentUser =
JSON.parse(localStorage.getItem("user"));

if(!currentUser || !currentUser.id){

window.location.href = "index.html";

}

window.addEventListener(
"pageshow",
async function(){

const currentOrderId =
localStorage.getItem("currentOrderId");

if(currentOrderId){

const snapshot =
await get(
ref(database,"orders/" + currentOrderId)
);

if(snapshot.exists()){

const order =
snapshot.val();

const blockedStatuses = [

"waiting_driver",
"accepted",
"going_to_store",
"picked_up",
"on_the_way",
"arrived"

];

if(
blockedStatuses.includes(order.status)
){

window.location.replace(
"talab.html?orderId=" +
currentOrderId
);

}

}

}

}
);

const currentOrderId =
localStorage.getItem("currentOrderId");

if(currentOrderId){

const activeOrderSnapshot =
await get(
ref(database,"orders/" + currentOrderId)
);

if(activeOrderSnapshot.exists()){

const activeOrder =
activeOrderSnapshot.val();

const blockedStatuses = [

"waiting_driver",
"accepted",
"going_to_store",
"picked_up",
"on_the_way",
"arrived"

];

if(
blockedStatuses.includes(activeOrder.status)
){

window.location.href =
"talab.html?orderId=" +
currentOrderId;

}

}else{

localStorage.removeItem(
"currentOrderId"
);

}

}

async function loadCurrentUser(){

let tableName = "";

if(currentUser.type === "customer"){
tableName = "customers";
}

if(currentUser.type === "store"){
tableName = "stores";
}

if(currentUser.type === "driver"){
tableName = "drivers";
}

if(currentUser.type === "taxi"){
tableName = "taxis";
}

const snapshot = await get(
ref(database, tableName + "/" + currentUser.id)
);

if(!snapshot.exists()){

localStorage.clear();

sessionStorage.clear();

window.location.href = "index.html";

return;

}

const userData = snapshot.val();

userData.id =
userData.id || currentUser.id;

localStorage.setItem(
"user",
JSON.stringify(userData)
);

document.getElementById("welcomeText")
.innerHTML =
`اهلاً ${userData.name || "مستخدم"}`;

document.getElementById("accountName")
.innerHTML =
userData.name || "مستخدم";

document.getElementById("accountPhone")
.innerHTML =
userData.phone || "";

document.getElementById("accountAddress")
.innerHTML =
userData.address || "";

}

loadCurrentUser();

startAdsSlider();

let allStores = [];

let adsList = [];
let currentAdIndex = 0;
let userLatitude = null;
let userLongitude = null;
let cart =
JSON.parse(
localStorage.getItem("cart")
) || [];

const storesContainer =
document.getElementById("storesContainer");
navigator.geolocation.watchPosition(

(position)=>{

userLatitude =
position.coords.latitude;

userLongitude =
position.coords.longitude;

// تحديث موقع المستخدم داخل Firebase

set(
ref(database,
"customers/" + currentUser.id + "/userLat"
),
userLatitude
);

set(
ref(database,
"customers/" + currentUser.id + "/userLng"
),
userLongitude
);
// حفظ الموقع للتاكسي
localStorage.setItem(
"userLat",
userLatitude
);

localStorage.setItem(
"userLng",
userLongitude
);

// حفظ داخل بيانات اليوزر
let savedUser =
JSON.parse(localStorage.getItem("user"));

if(savedUser){

savedUser.userLat =
userLatitude;

savedUser.userLng =
userLongitude;

localStorage.setItem(
"user",
JSON.stringify(savedUser)
);

}

if(allStores.length === 0){
startLiveStores();
}

},

(error)=>{

alert("يرجى تشغيل GPS");

},

{
enableHighAccuracy:true,
maximumAge:0,
timeout:10000
}

);
function calculateDistance(lat1, lon1, lat2, lon2){

const R = 6371;

const dLat =
(lat2-lat1) * Math.PI / 180;

const dLon =
(lon2-lon1) * Math.PI / 180;

const a =

Math.sin(dLat/2) *
Math.sin(dLat/2)

+

Math.cos(lat1 * Math.PI / 180)

*

Math.cos(lat2 * Math.PI / 180)

*

Math.sin(dLon/2)

*

Math.sin(dLon/2);

const c =
2 * Math.atan2(
Math.sqrt(a),
Math.sqrt(1-a)
);

return R * c;

}

function startLiveStores(){

onValue(

ref(database,"stores"),

(snapshot)=>{

allStores = [];

if(snapshot.exists()){

if(userLatitude === null || userLongitude === null){
return;
}

const stores = snapshot.val();

for(let key in stores){

let store = stores[key];

store.id = key;

if(store.status !== "active")
continue;

if(!store.latitude || !store.longitude)
continue;

const distance =
calculateDistance(

userLatitude,
userLongitude,

Number(store.latitude),
Number(store.longitude)

);

if(distance > 25)
continue;

store.distance =
distance.toFixed(1);

store.vip =
store.accountType === "vip";

allStores.push(store);

}

// ترتيب المتاجر
allStores.sort((a,b)=>{

const aOpen = isStoreOpen(a);
const bOpen = isStoreOpen(b);

// VIP أولاً
if(a.vip && !b.vip){
return -1;
}

if(!a.vip && b.vip){
return 1;
}

// المفتوح بعد VIP
if(aOpen && !bOpen){
return -1;
}

if(!aOpen && bOpen){
return 1;
}

// الأقرب أولاً
return a.distance - b.distance;

});

generateFilters();

renderStores(allStores);

}

}

);

}

function startAdsSlider(){

onValue(

ref(database,"ads"),

(snapshot)=>{

const adsSlider =
document.getElementById("adsSlider");

const adsTrack =
document.getElementById("adsTrack");

adsTrack.innerHTML = "";

adsList = [];

if(!snapshot.exists()){

adsSlider.style.display = "none";

return;

}

const ads = snapshot.val();

for(let key in ads){

const ad = ads[key];

if(ad.status !== "active")
continue;

if(!ad.image)
continue;

adsList.push({
id:key,
...ad
});

}

if(adsList.length === 0){

adsSlider.style.display = "none";

return;

}

adsSlider.style.display = "block";

adsList.forEach((ad,index)=>{

adsTrack.innerHTML += `

<div
class="
ad-slide
${index === 0 ? "active" : ""}
"
id="ad_${index}"
onclick="openAd(${index})"
>

<img
src="${ad.image}"
onerror="this.src='store.png'">

</div>

`;

});

currentAdIndex = 0;

if(window.adsInterval){
clearInterval(window.adsInterval);
}

window.adsInterval = setInterval(()=>{

if(adsList.length >= 1){

changeAd();

}

},5000);

}

);

}

function changeAd(){

if(adsList.length === 0)
return;

// اذا اعلان واحد فقط
if(adsList.length === 1){

const onlySlide =
document.getElementById("ad_0");

onlySlide.classList.remove("active");

setTimeout(()=>{

onlySlide.classList.add("active");

},200);

return;

}

const slides =
document.querySelectorAll(".ad-slide");

// تنظيف الحالات القديمة
slides.forEach(slide=>{

slide.classList.remove("active");
slide.classList.remove("prev");

});

// السلايد القديم
const oldSlide =
document.getElementById(
`ad_${currentAdIndex}`
);

oldSlide.classList.add("prev");

// التالي
currentAdIndex++;

if(currentAdIndex >= adsList.length){

currentAdIndex = 0;

}

// السلايد الجديد
const newSlide =
document.getElementById(

function isStoreOpen(store){

if(!store.workingHours){
return false;
}

const days = [
"الأحد",
"الاثنين",
"الثلاثاء",
"الأربعاء",
"الخميس",
"الجمعة",
"السبت"
];

const now = new Date();

const currentDay =
days[now.getDay()];

const currentHour =
now.getHours();

const currentMinute =
now.getMinutes();

const currentTime =
currentHour + (currentMinute / 60);

// البحث عن اليوم الحالي
let todaySchedule = null;

Object.values(store.workingHours)
.forEach(item=>{

if(item.day === currentDay){

todaySchedule = item;

}

});

if(!todaySchedule){
return false;
}

// اذا مغلق
if(
todaySchedule.from === "مغلق" ||
todaySchedule.to === "مغلق"
){
return false;
}

// تحويل الوقت
function convertTo24(time){

if(!time){
return 0;
}

const parts = time.trim().split(" ");

const hourMinute = parts[0];
const period = parts[1];

let hour =
parseInt(hourMinute.split(":")[0]);

let minute =
hourMinute.includes(":")
? parseInt(hourMinute.split(":")[1])
: 0;

// AM
if(period === "AM"){

if(hour === 12){
hour = 0;
}

}

// PM
else if(period === "PM"){

if(hour !== 12){
hour += 12;
}

}

return hour + (minute / 60);

}

const fromHour =
convertTo24(todaySchedule.from);

const toHour =
convertTo24(todaySchedule.to);

// مقارنة الوقت الحالي// 24 ساعة
if(fromHour === toHour){

return true;

}

// دوام طبيعي
if(fromHour < toHour){

return (
currentTime >= fromHour &&
currentTime < toHour
);

}

// دوام يعبر منتصف الليل
return (
currentTime >= fromHour ||
currentTime < toHour
);
}

// =========================

deliveryPrice = 0;

let uniqueStores =
[...new Set(cart.map(item => item.storeId))];

// اذا ماكو منتجات
if(uniqueStores.length === 0){

deliveryPrice = 0;

}else{

allStores.find(
s => s.id === uniqueStores[0]
);

if(firstStore){

const distance =
calculateDistance(

userLatitude,
userLongitude,

Number(firstStore.longitude)

);

// =========================
// تسعيرة توصيل ذكية ومناسبة
// =========================

if(distance <= 1){

deliveryPrice = 1500;

}

else if(distance <= 3){

deliveryPrice = 2000;

}

else if(distance <= 5){

deliveryPrice = 3000;

}

else if(distance <= 8){

deliveryPrice = 4000;

}

else if(distance <= 12){

deliveryPrice = 5000;

}

else{

deliveryPrice =
5000 + Math.round((distance - 12) * 250);

}

// حد اعلى
if(deliveryPrice > 10000){

deliveryPrice = 10000;

}
 
}

// =========================
// زيادة المتاجر المتعددة
// =========================

// متجرين
if(uniqueStores.length === 2){

deliveryPrice =
Math.round(deliveryPrice * 1.6);

}

// 3 متاجر
else if(uniqueStores.length === 3){

deliveryPrice =
Math.round(deliveryPrice * 2);

}

// 4 متاجر واكثر
else if(uniqueStores.length >= 4){

deliveryPrice =
Math.round(deliveryPrice * 2.5);

}

// =========================
// حماية السائق
// =========================

// طلبات كبيرة
if(total >= 50000){

deliveryPrice += 1000;

}

if(total >= 100000){

deliveryPrice += 2000;

}

// وقت الليل
const hour = new Date().getHours();

if(hour >= 12 || hour <= 6){

deliveryPrice += 1000;

}

// =========================
// حد ادنى وحد اعلى
// =========================

if(deliveryPrice < 2000){

deliveryPrice = 2000;

}

if(deliveryPrice > 15000){

deliveryPrice = 15000;

}

}

// تحديث النص
document.getElementById("deliveryPriceText")
.innerHTML =
Number(deliveryPrice).toLocaleString() + " د.ع";
itemsTotal.innerHTML =
