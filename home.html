<!DOCTYPE html>
<html lang="ar" dir="rtl">

<head>

<meta charset="UTF-8">

<meta
name="viewport"
content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">

<title>
عالسريع
</title>

<link
rel="stylesheet"
href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css"/>

<link
href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;500;600;700;800&display=swap"
rel="stylesheet">

<style>

*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:'Cairo',sans-serif;
-webkit-tap-highlight-color:transparent;
}

body{
background:#f5f6fa;
padding-bottom:120px;
overflow-x:hidden;
}

.header{
background:
linear-gradient(
135deg,
#ff8800,
#ff5500
);
padding:22px;
color:white;
border-bottom-left-radius:30px;
border-bottom-right-radius:30px;
box-shadow:
0 8px 25px rgba(0,0,0,.10);
}

.header-top{
display:flex;
justify-content:space-between;
align-items:center;
gap:12px;
}

.welcome h2{
font-size:24px;
margin-bottom:5px;
}

.welcome p{
font-size:14px;
opacity:.9;
}

.taxi-btn{
width:65px;
height:65px;
border-radius:50%;
background:white;
display:flex;
align-items:center;
justify-content:center;
font-size:28px;
color:#ff8800;
box-shadow:
0 5px 18px rgba(0,0,0,.15);
cursor:pointer;
flex-shrink:0;
}

.search-box{
margin-top:20px;
background:white;
height:58px;
border-radius:18px;
display:flex;
align-items:center;
padding:0 18px;
}

.search-box i{
color:#ff8800;
font-size:16px;
}

.search-box input{
border:none;
outline:none;
width:100%;
margin-right:12px;
font-size:15px;
background:none;
}

.filters{
display:flex;
gap:10px;
overflow:auto;
padding:15px;
}

.filters::-webkit-scrollbar{
display:none;
}

.filter-btn{
border:none;
padding:11px 18px;
border-radius:14px;
background:white;
font-size:14px;
font-weight:bold;
cursor:pointer;
white-space:nowrap;
box-shadow:
0 3px 10px rgba(0,0,0,.05);
}

.filter-btn.active{
background:#ff8800;
color:white;
}

.stores-container{
padding:15px;
display:flex;
flex-direction:column;
gap:16px;
}

.store-card{
background:white;
padding:15px;
border-radius:28px;
box-shadow:
0 5px 18px rgba(0,0,0,.06);
cursor:pointer;
transition:.2s;
}

.store-card:active{
transform:scale(.99);
}

.closed-store{
opacity:.55;
pointer-events:none;
}

.store-top{
display:flex;
gap:14px;
}

.store-image{
width:88px;
height:88px;
border-radius:22px;
object-fit:cover;
background:#eee;
}

.store-content{
flex:1;
}

.store-name{
display:flex;
justify-content:space-between;
align-items:center;
margin-bottom:6px;
gap:10px;
}

.store-name h3{
font-size:18px;
}

.store-distance{
font-size:13px;
font-weight:bold;
color:#ff8800;
}

.store-category{
font-size:14px;
color:#666;
margin-bottom:8px;
}

.store-status{
display:inline-flex;
align-items:center;
gap:6px;
padding:6px 12px;
border-radius:14px;
background:#f5f5f5;
font-size:12px;
font-weight:bold;
}

.status-dot{
width:10px;
height:10px;
border-radius:50%;
}

.open-dot{
background:#00c853;
}

.closed-dot{
background:red;
}

.single-store{
position:fixed;
inset:0;
background:#f5f6fa;
z-index:9999;
display:none;
overflow-y:auto;
padding-bottom:120px;
}

.store-header{
background:
linear-gradient(
135deg,
#ff8800,
#ff5500
);
padding:20px;
display:flex;
align-items:center;
gap:12px;
color:white;
position:sticky;
top:0;
z-index:100;
}

.back-btn{
width:45px;
height:45px;
border:none;
border-radius:50%;
background:white;
color:#ff6600;
font-size:18px;
cursor:pointer;
}

.products{
padding:15px;
display:flex;
flex-direction:column;
gap:16px;
}

.product-card{
background:white;
padding:14px;
border-radius:25px;
display:flex;
gap:14px;
box-shadow:
0 5px 18px rgba(0,0,0,.06);
}

.product-image{
width:100px;
height:100px;
border-radius:20px;
object-fit:cover;
background:#eee;
}

.product-content{
flex:1;
}

.product-name{
font-size:17px;
font-weight:bold;
margin-bottom:5px;
}

.product-price{
font-size:20px;
font-weight:bold;
color:#ff8800;
margin-bottom:8px;
}

.product-description{
font-size:13px;
line-height:1.8;
color:#666;
margin-bottom:12px;
}

.qty-box{
display:flex;
align-items:center;
gap:8px;
margin-bottom:12px;
}

.qty-btn{
width:34px;
height:34px;
border:none;
border-radius:12px;
background:#ff8800;
color:white;
font-size:18px;
cursor:pointer;
}

.qty-input{
width:45px;
height:34px;
border:none;
background:#f3f3f3;
border-radius:12px;
text-align:center;
font-weight:bold;
}

.add-btn{
width:100%;
height:46px;
border:none;
border-radius:15px;
background:#00b894;
color:white;
font-size:15px;
font-weight:bold;
cursor:pointer;
}

.bottom-bar{
position:fixed;
bottom:0;
left:0;
right:0;
height:84px;
background:white;
display:flex;
justify-content:space-around;
align-items:center;
box-shadow:
0 -5px 18px rgba(0,0,0,.08);
z-index:99999;
}

.nav-item{
display:flex;
flex-direction:column;
align-items:center;
gap:5px;
font-size:13px;
font-weight:bold;
cursor:pointer;
color:#888;
}

.nav-item.active{
color:#ff8800;
}

.nav-item i{
font-size:22px;
}

.empty{
padding:70px 20px;
text-align:center;
font-size:16px;
color:#777;
}

</style>

</head>

<body>

<div class="header">

<div class="header-top">

<div class="welcome">

<h2 id="welcomeText">
اهلاً بك
</h2>

<p>
اطلب كل ما تحتاجه 🚀
</p>

</div>

<div
class="taxi-btn"
onclick="window.location.href='taxie.html'">

<i class="fa-solid fa-taxi"></i>

</div>

</div>

<div class="search-box">

<i class="fa-solid fa-magnifying-glass"></i>

<input
type="text"
id="searchInput"
placeholder="ابحث عن متجر أو منتج">

</div>

</div>

<div
class="filters"
id="filters"></div>

<div
class="stores-container"
id="storesContainer"></div>

<!-- STORE -->

<div
class="single-store"
id="singleStore">

<div class="store-header">

<button
class="back-btn"
onclick="closeStore()">

<i class="fa-solid fa-arrow-right"></i>

</button>

<div>

<h2 id="storeTitle">
المتجر
</h2>

<p id="storeCategory">
القسم
</p>

</div>

</div>

<div
class="products"
id="productsContainer"></div>

</div>

<!-- NAV -->

<div class="bottom-bar">

<div class="nav-item active">

<i class="fa-solid fa-house"></i>

<span>
الرئيسية
</span>

</div>

<div
class="nav-item"
onclick="window.location.href='cart.html'">

<i class="fa-solid fa-cart-shopping"></i>

<span>
السلة
</span>

</div>

<div
class="nav-item"
onclick="window.location.href='asca.html'">

<i class="fa-solid fa-user"></i>

<span>
الحساب
</span>

</div>

</div>

<script type="module">

import { db }
from "./firebase.js";

import {
ref,
get,
onValue
}
from "https://www.gstatic.com/firebasejs/12.13.0/firebase-database.js";

import {
calculateDistance,
formatPrice
}
from "./utils.js";

const currentUser =
JSON.parse(
localStorage.getItem("user")
);

if(
!currentUser ||
currentUser.type !== "customer"
){

window.location.replace(
"index.html"
);

}

document.getElementById(
"welcomeText"
).innerHTML =

`اهلاً ${currentUser.name || ""}`;

let allStores = [];

let userLat = 0;
let userLng = 0;

navigator.geolocation.getCurrentPosition(

(position)=>{

userLat =
position.coords.latitude;

userLng =
position.coords.longitude;

loadStores();

},

()=>{

alert("يرجى تشغيل GPS");

}

);

function loadStores(){

onValue(
ref(db,"users"),
(snapshot)=>{

allStores = [];

if(!snapshot.exists()){

renderStores([]);

return;

}

const users =
snapshot.val();

for(let key in users){

const store =
users[key];

if(store.type !== "store"){
continue;
}

if(store.status !== "active"){
continue;
}

const distance =
calculateDistance(

userLat,
userLng,

Number(store.latitude || 0),
Number(store.longitude || 0)

);

allStores.push({

id:store.id,

name:store.name || "",

image:
store.image || "store.png",

category:
store.category || "عام",

distance:
distance.toFixed(1),

latitude:
store.latitude || 0,

longitude:
store.longitude || 0,

workingHours:
store.workingHours || []

});

}

allStores.sort((a,b)=>
a.distance - b.distance
);

renderFilters();

renderStores(allStores);

}
);

}

function renderFilters(){

const filters =
document.getElementById(
"filters"
);

filters.innerHTML = `
<button
class="filter-btn active"
data-category="all">
الكل
</button>
`;

const categories = [];

allStores.forEach(store=>{

if(
!categories.includes(store.category)
){

categories.push(store.category);

}

});

categories.forEach(category=>{

filters.innerHTML += `
<button
class="filter-btn"
data-category="${category}">
${category}
</button>
`;

});

document
.querySelectorAll(".filter-btn")
.forEach(btn=>{

btn.onclick = ()=>{

document
.querySelectorAll(".filter-btn")
.forEach(item=>{

item.classList.remove("active");

});

btn.classList.add("active");

const category =
btn.dataset.category;

if(category === "all"){

renderStores(allStores);

}else{

renderStores(
allStores.filter(
store =>
store.category === category
)
);

}

};

});

}

function renderStores(stores){

const container =
document.getElementById(
"storesContainer"
);

container.innerHTML = "";

if(stores.length === 0){

container.innerHTML = `
<div class="empty">
لا توجد متاجر
</div>
`;

return;

}

stores.forEach(store=>{

container.innerHTML += `

<div
class="store-card"
onclick="openStore('${store.id}')">

<div class="store-top">

<img
src="${store.image}"
class="store-image"
onerror="this.src='store.png'">

<div class="store-content">

<div class="store-name">

<h3>
${store.name}
</h3>

<div class="store-distance">

📍 ${store.distance} كم

</div>

</div>

<div class="store-category">

${store.category}

</div>

<div class="store-status">

<div class="status-dot open-dot"></div>

<span>
مفتوح الآن
</span>

</div>

</div>

</div>

</div>

`;

});

}

document.getElementById(
"searchInput"
).addEventListener(
"input",
function(){

const value =
this.value.toLowerCase();

const filtered =
allStores.filter(store=>

(store.name || "")
.toLowerCase()
.includes(value)

||

(store.category || "")
.toLowerCase()
.includes(value)

);

renderStores(filtered);

}
);

window.openStore =
async function(storeId){

const store =
allStores.find(
s => s.id === storeId
);

if(!store){
return;
}

document.getElementById(
"singleStore"
).style.display = "block";

document.getElementById(
"storeTitle"
).innerHTML =
store.name;

document.getElementById(
"storeCategory"
).innerHTML =
store.category;

const container =
document.getElementById(
"productsContainer"
);

container.innerHTML = `
<div class="empty">
جاري تحميل المنتجات...
</div>
`;

const snapshot =
await get(
ref(db,"products/" + storeId)
);

container.innerHTML = "";

if(!snapshot.exists()){

container.innerHTML = `
<div class="empty">
لا توجد منتجات
</div>
`;

return;

}

const products =
snapshot.val();

for(let key in products){

const product =
products[key];

container.innerHTML += `

<div class="product-card">

<img
src="${product.image || "product.png"}"
class="product-image"
onerror="this.src='product.png'">

<div class="product-content">

<div class="product-name">

${product.name || ""}

</div>

<div class="product-price">

${formatPrice(product.price)}

</div>

<div class="product-description">

${product.description || ""}

</div>

<div class="qty-box">

<button
class="qty-btn"
onclick="decreaseQty('${key}')">

-

</button>

<input
type="text"
readonly
value="1"
id="qty_${key}"
class="qty-input">

<button
class="qty-btn"
onclick="increaseQty('${key}')">

+

</button>

</div>

<button
class="add-btn"
onclick='addToCart(
${JSON.stringify(product)},
${JSON.stringify(store)},
"${key}"
)'>

اضافة للسلة

</button>

</div>

</div>

`;

}

};

window.closeStore =
function(){

document.getElementById(
"singleStore"
).style.display = "none";

};

window.increaseQty =
function(id){

const input =
document.getElementById(
`qty_${id}`
);

input.value =
Number(input.value) + 1;

};

window.decreaseQty =
function(id){

const input =
document.getElementById(
`qty_${id}`
);

if(Number(input.value) > 1){

input.value =
Number(input.value) - 1;

}

};

window.addToCart =
function(product,store,id){

const qty =
Number(
document.getElementById(
`qty_${id}`
).value
);

let cart =
JSON.parse(
localStorage.getItem("cart")
) || [];

const exists =
cart.find(item =>
item.productId === id
);

if(exists){

exists.qty += qty;

}else{

cart.push({

productId:id,

storeId:store.id,

storeName:store.name,

name:product.name || "",

price:Number(product.price || 0),

image:product.image || "",

description:
product.description || "",

qty:qty

});

}

localStorage.setItem(
"cart",
JSON.stringify(cart)
);

alert("تمت الإضافة للسلة");

};

</script>

</body>

</html>
