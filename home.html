<!DOCTYPE html>
<html lang="ar" dir="rtl">

<head>

<meta charset="UTF-8">

<meta name="viewport"
content="width=device-width, initial-scale=1.0">

<title>عالسريع</title>

<link rel="stylesheet"
href="style.css">

<link rel="preconnect"
href="https://fonts.googleapis.com">

<link rel="preconnect"
href="https://fonts.gstatic.com"
crossorigin>

<link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;500;700&display=swap"
rel="stylesheet">

</head>

<body>

<!-- HEADER -->

<header class="header">

<div class="header-top">

<div>

<h2 id="welcomeText">

اهلاً بك 👋

</h2>

<p>

اطلب كل ما تحتاجه بسهولة

</p>

</div>

<img
id="userImage"
class="profile-image"
src="user.png">

</div>

</header>

<!-- HOME PAGE -->

<div id="homePage"
class="page active-page">

<div class="search-box">

<input
type="text"
id="searchInput"
placeholder="ابحث عن متجر ...">

</div>

<div class="filter-buttons">

<button
class="filter-btn active"
onclick="filterStores('all',this)">

الكل

</button>

<button
class="filter-btn"
onclick="filterStores('مطعم',this)">

مطاعم

</button>

<button
class="filter-btn"
onclick="filterStores('ماركت',this)">

ماركت

</button>

<button
class="filter-btn"
onclick="filterStores('صيدلية',this)">

صيدليات

</button>

</div>

<section class="stores-section">

<div
class="stores-container"
id="storesContainer">

</div>

</section>

</div>

<!-- CART PAGE -->

<div id="cartPage"
class="page">

<div class="page-title">

السلة

</div>

<div id="cartContainer">

<p class="empty-text">

السلة فارغة

</p>

</div>

<button
class="send-order-btn"
onclick="sendOrder()">

ارسال الطلب

</button>

</div>

<!-- ACCOUNT PAGE -->

<div id="accountPage"
class="page">

<div class="account-card">

<img
id="accountImage"
class="account-image"
src="user.png">

<h2 id="accountName">

اسم المستخدم

</h2>

<div class="account-info">

<div class="info-item"
id="accountPhone">

📞

</div>

<div class="info-item"
id="accountAddress">

📍

</div>

<div class="info-item"
id="accountType">

👤

</div>

</div>

<button
class="logout-btn"
onclick="logout()">

تسجيل الخروج

</button>

</div>

</div>

<!-- BOTTOM NAV -->

<nav class="bottom-nav">

<div
class="nav-item active-nav"
onclick="openPage('homePage',this)">

<div class="nav-circle">

🏠

</div>

<span>

الرئيسية

</span>

</div>

<div
class="nav-item"
onclick="openPage('cartPage',this)">

<div class="nav-circle">

🛒

</div>

<span>

السلة

</span>

</div>

<div
class="nav-item"
onclick="openPage('accountPage',this)">

<div class="nav-circle">

👤

</div>

<span>

الحساب

</span>

</div>

</nav>

<script type="module">

import { initializeApp }
from "https://www.gstatic.com/firebasejs/12.13.0/firebase-app.js";

import {
getDatabase,
ref,
get,
child,
push,
set
}
from "https://www.gstatic.com/firebasejs/12.13.0/firebase-database.js";

const firebaseConfig = {

apiKey: "AIzaSyC7QzQTYMSGRV_nraJBneBqDqYGhugF0Pw",

authDomain: "fast-937c9.firebaseapp.com",

projectId: "fast-937c9",

storageBucket: "fast-937c9.firebasestorage.app",

messagingSenderId: "221388561840",

appId: "1:221388561840:web:ec9d75183ddd7d44be0a75",

databaseURL:
"https://fast-937c9-default-rtdb.europe-west1.firebasedatabase.app"

};

const app = initializeApp(firebaseConfig);

const database = getDatabase(app);



// USER

const currentUser =
JSON.parse(localStorage.getItem("user"));

if(!currentUser){

window.location.href =
"index.html";

}



// USER INFO

document.getElementById("welcomeText")
.innerHTML =

`اهلاً ${currentUser.name || ""} 👋`;

document.getElementById("accountName")
.innerHTML =

currentUser.name || "";

document.getElementById("accountPhone")
.innerHTML =

"📞 " + currentUser.phone;

document.getElementById("accountAddress")
.innerHTML =

"📍 " + (currentUser.address || "غير محدد");

document.getElementById("accountType")
.innerHTML =

"👤 " + currentUser.type;



// STORES

let allStores = [];

let cart = [];

async function loadStores(){

const storesContainer =
document.getElementById("storesContainer");

storesContainer.innerHTML = "";

const snapshot =
await get(
child(ref(database),"stores")
);

if(snapshot.exists()){

const stores = snapshot.val();

allStores = [];

for(let key in stores){

const store = stores[key];

if(store.status==="active"){

allStores.push(store);

}

}

renderStores(allStores);

}

}

function renderStores(stores){

const storesContainer =
document.getElementById("storesContainer");

storesContainer.innerHTML = "";

stores.forEach(store=>{

storesContainer.innerHTML += `

<div class="store-card">

<div class="store-right">

<img
class="store-image"
src="${
store.image || "store.png"
}">

<div class="store-details">

<div class="store-name-row">

<div class="store-name">

${store.store_name}

</div>

<img
src="ok.png"
class="verified-icon">

</div>

<div class="store-distance">

📍 ${store.category}

</div>

<div class="store-status">

🟢 متاح حالياً

</div>

<button
class="add-cart-btn"
onclick='addToCart(${JSON.stringify(store)})'>

اضافة للسلة

</button>

</div>

</div>

</div>

`;

});

}



// FILTER

window.filterStores =
function(category,button){

document
.querySelectorAll(".filter-btn")
.forEach(btn=>{

btn.classList.remove("active");

});

button.classList.add("active");

if(category==="all"){

renderStores(allStores);

return;

}

let filtered =
allStores.filter(store =>

store.category === category

);

renderStores(filtered);

};



// SEARCH

document
.getElementById("searchInput")

.addEventListener("keyup",function(){

let value =
this.value.toLowerCase();

let filtered =
allStores.filter(store =>

store.store_name
.toLowerCase()
.includes(value)

);

renderStores(filtered);

});



// CART

window.addToCart = function(store){

cart.push(store);

renderCart();

};

function renderCart(){

const cartContainer =
document.getElementById("cartContainer");

if(cart.length===0){

cartContainer.innerHTML =

"<p class='empty-text'>السلة فارغة</p>";

return;

}

cartContainer.innerHTML = "";

cart.forEach(item=>{

cartContainer.innerHTML += `

<div class="cart-item">

<img
src="${
item.image || "store.png"
}">

<div>

<h3>

${item.store_name}

</h3>

<p>

${item.category}

</p>

</div>

</div>

`;

});

}



// SEND ORDER

window.sendOrder =
async function(){

if(cart.length===0){

alert("السلة فارغة");

return;

}

const orderId =
Date.now();

await set(

ref(database,"orders/"+orderId),

{

id:orderId,

user:currentUser,

items:cart,

status:"pending",

createdAt:Date.now()

}

);

alert("تم ارسال الطلب");

cart = [];

renderCart();

};



// PAGES

window.openPage =
function(pageId,element){

document
.querySelectorAll(".page")
.forEach(page=>{

page.classList.remove("active-page");

});

document
.getElementById(pageId)
.classList.add("active-page");

document
.querySelectorAll(".nav-item")
.forEach(item=>{

item.classList.remove("active-nav");

});

element.classList.add("active-nav");

};



// LOGOUT

window.logout = function(){

localStorage.removeItem("user");

window.location.href =
"index.html";

};

loadStores();

</script>

</body>

</html>
