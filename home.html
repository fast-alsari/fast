<!-- home.html -->

<!DOCTYPE html>
<html lang="ar" dir="rtl">

<head>

<meta charset="UTF-8">

<meta name="viewport"
content="width=device-width, initial-scale=1.0">

<title>عالسريع</title>

<link rel="stylesheet"
href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css"/>

<link rel="preconnect"
href="https://fonts.googleapis.com">

<link rel="preconnect"
href="https://fonts.gstatic.com"
crossorigin>

<link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;500;600;700&display=swap"
rel="stylesheet">

<style>

*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:'Cairo',sans-serif;
}

body{
background:#ffffff;
padding-bottom:120px;
}

.header{
padding:20px;
background:linear-gradient(135deg,#ff8800,#ffb300);
border-bottom-left-radius:30px;
border-bottom-right-radius:30px;
color:white;
}

.header-top{
display:flex;
justify-content:space-between;
align-items:center;
}

.user-image{
width:60px;
height:60px;
border-radius:50%;
object-fit:cover;
border:3px solid white;
}

.search-box{
margin-top:20px;
background:white;
padding:14px;
border-radius:18px;
display:flex;
align-items:center;
}

.search-box input{
border:none;
outline:none;
width:100%;
font-size:15px;
margin-right:10px;
}

.filters{
display:flex;
gap:10px;
overflow:auto;
padding:15px;
}

.filters button{
border:none;
padding:10px 18px;
border-radius:14px;
background:#eee;
font-weight:bold;
cursor:pointer;
}

.filters .active{
background:#ff8800;
color:white;
}

.stores-container{
padding:15px;
display:flex;
flex-direction:column;
gap:15px;
}

.store-card{
background:white;
border-radius:25px;
padding:15px;
box-shadow:0 5px 20px rgba(0,0,0,.08);
}

.store-header{
display:flex;
gap:15px;
align-items:center;
cursor:pointer;
}

.store-image{
width:85px;
height:85px;
border-radius:20px;
object-fit:cover;
}

.store-info h3{
font-size:18px;
margin-bottom:5px;
}

.store-info p{
color:#666;
}

.products{
margin-top:20px;
display:flex;
flex-direction:column;
gap:15px;
}

.product{
background:#fafafa;
border-radius:20px;
padding:15px;
}

.product-image{
width:100%;
height:180px;
border-radius:20px;
object-fit:cover;
margin-bottom:10px;
}

.product-name{
font-size:18px;
font-weight:bold;
margin-bottom:6px;
}

.product-desc{
color:#666;
font-size:14px;
margin-bottom:10px;
}

.product-price{
color:#ff8800;
font-size:18px;
font-weight:bold;
margin-bottom:10px;
}

.qty-row{
display:flex;
justify-content:space-between;
align-items:center;
margin-bottom:12px;
}

.qty-row input{
width:80px;
padding:8px;
border-radius:10px;
border:1px solid #ddd;
}

.add-cart-btn{
width:100%;
padding:14px;
border:none;
border-radius:15px;
background:#ff8800;
color:white;
font-size:15px;
font-weight:bold;
}

.page{
display:none;
}

.active-page{
display:block;
}

.cart-container{
padding:15px;
display:flex;
flex-direction:column;
gap:15px;
}

.cart-item{
background:white;
border-radius:20px;
padding:15px;
display:flex;
gap:15px;
align-items:center;
box-shadow:0 5px 20px rgba(0,0,0,.08);
}

.cart-image{
width:80px;
height:80px;
border-radius:15px;
object-fit:cover;
}

.cart-info{
flex:1;
}

.delete-btn{
background:red;
color:white;
border:none;
padding:10px 14px;
border-radius:12px;
}

.summary-box{
background:white;
margin:15px;
padding:20px;
border-radius:25px;
box-shadow:0 5px 20px rgba(0,0,0,.08);
}

.summary-box p{
margin-bottom:15px;
font-size:16px;
}

.tip-input{
width:100%;
padding:14px;
border-radius:14px;
border:1px solid #ddd;
margin-bottom:15px;
}

.total{
font-size:20px;
font-weight:bold;
color:#ff8800;
}

.send-order{
width:100%;
padding:16px;
border:none;
border-radius:16px;
background:#00b894;
color:white;
font-size:17px;
font-weight:bold;
}

.account-card{
margin:20px;
background:white;
padding:25px;
border-radius:30px;
box-shadow:0 5px 20px rgba(0,0,0,.08);
text-align:center;
}

.account-image{
width:110px;
height:110px;
border-radius:50%;
object-fit:cover;
border:4px solid #ff8800;
margin-bottom:15px;
}

.account-info{
margin-top:15px;
text-align:right;
}

.account-info p{
margin-bottom:10px;
}

.logout-btn{
width:100%;
margin-top:20px;
padding:16px;
border:none;
border-radius:16px;
background:red;
color:white;
font-size:16px;
font-weight:bold;
}

.bottom-bar{
position:fixed;
bottom:0;
right:0;
left:0;
height:85px;
background:white;
display:flex;
justify-content:space-around;
align-items:center;
box-shadow:0 -5px 20px rgba(0,0,0,.08);
}

.nav-item{
display:flex;
flex-direction:column;
align-items:center;
color:#888;
cursor:pointer;
}

.nav-item.active{
color:#ff8800;
}

.nav-item i{
font-size:22px;
margin-bottom:5px;
}

.empty{
text-align:center;
padding:40px;
color:#888;
}

</style>

</head>

<body>

<!-- الرئيسية -->

<div id="homePage"
class="page active-page">

<div class="header">

<div class="header-top">

<div>

<h2 id="welcomeText">

اهلاً بك

</h2>

<p>

اطلب كل ما تحتاجه 🚀

</p>

</div>

<img
src="user.png"
id="userImage"
class="user-image">

</div>

<div class="search-box">

<i class="fa-solid fa-magnifying-glass"></i>

<input
type="text"
id="searchInput"
placeholder="ابحث عن متجر">

</div>

</div>

<div class="filters">

<button
class="active filter-btn"
data-category="all">

الكل

</button>

<button
class="filter-btn"
data-category="مطعم">

مطاعم

</button>

<button
class="filter-btn"
data-category="ماركت">

ماركت

</button>

<button
class="filter-btn"
data-category="صيدلية">

صيدليات

</button>

</div>

<div
id="storesContainer"
class="stores-container">

</div>

</div>

<!-- السلة -->

<div id="cartPage"
class="page">

<div
id="cartContainer"
class="cart-container">

</div>

<div class="summary-box">

<p>

المجموع :
<span id="itemsTotal">
0
</span>
د.ع

</p>

<p>

اجرة التوصيل :
3000 د.ع

</p>

<input
type="number"
id="tipInput"
class="tip-input"
placeholder="اكرامية للسائق">

<p class="total">

المبلغ الكلي :
<span id="finalTotal">
0
</span>
د.ع

</p>

<button
class="send-order"
onclick="sendOrder()">

طلب توصيل 🚀

</button>

</div>

</div>

<!-- الحساب -->

<div id="accountPage"
class="page">

<div class="account-card">

<img
src="user.png"
id="accountImage"
class="account-image">

<h2 id="accountName">

اسم المستخدم

</h2>

<div class="account-info">

<p id="accountPhone"></p>

<p id="accountAddress"></p>

<p id="accountType"></p>

</div>

<button
class="logout-btn"
onclick="logout()">

تسجيل الخروج

</button>

</div>

</div>

<!-- البار السفلي -->

<div class="bottom-bar">

<div
class="nav-item active"
onclick="showPage('homePage',this)">

<i class="fa-solid fa-house"></i>

<span>

الرئيسية

</span>

</div>

<div
class="nav-item"
onclick="showPage('cartPage',this)">

<i class="fa-solid fa-cart-shopping"></i>

<span>

السلة

</span>

</div>

<div
class="nav-item"
onclick="showPage('accountPage',this)">

<i class="fa-solid fa-user"></i>

<span>

الحساب

</span>

</div>

</div>

<script type="module">

import { initializeApp }
from
"https://www.gstatic.com/firebasejs/12.13.0/firebase-app.js";

import {
getDatabase,
ref,
get,
child,
set
}
from
"https://www.gstatic.com/firebasejs/12.13.0/firebase-database.js";

const firebaseConfig = {

apiKey:
"YOUR_API_KEY",

authDomain:
"YOUR_AUTH_DOMAIN",

projectId:
"YOUR_PROJECT_ID",

storageBucket:
"YOUR_STORAGE_BUCKET",

messagingSenderId:
"YOUR_MESSAGING_ID",

appId:
"YOUR_APP_ID",

databaseURL:
"YOUR_DATABASE_URL"

};

const app =
initializeApp(firebaseConfig);

const database =
getDatabase(app);

const currentUser =
JSON.parse(
localStorage.getItem("user")
);

if(!currentUser){

window.location.href =
"index.html";

}

document.getElementById("welcomeText")
.innerHTML =

`اهلاً ${currentUser.name || currentUser.owner}`;

document.getElementById("accountName")
.innerHTML =

currentUser.name ||
currentUser.owner;

document.getElementById("accountPhone")
.innerHTML =

`📞 ${currentUser.phone}`;

document.getElementById("accountAddress")
.innerHTML =

`📍 ${currentUser.address || "لا يوجد عنوان"}`;

document.getElementById("accountType")
.innerHTML =

`👤 ${currentUser.type}`;

window.showPage =
function(pageId,element){

document.querySelectorAll(".page")
.forEach(page=>{

page.classList.remove("active-page");

});

document.getElementById(pageId)
.classList.add("active-page");

document.querySelectorAll(".nav-item")
.forEach(item=>{

item.classList.remove("active");

});

element.classList.add("active");

};

const storesContainer =
document.getElementById("storesContainer");

let allStores = [];

async function loadStores(){

const snapshot =
await get(
child(ref(database),"stores")
);

if(snapshot.exists()){

const stores =
snapshot.val();

allStores = [];

for(let key in stores){

const store =
stores[key];

if(store.status === "active"){

allStores.push(store);

}

}

renderStores(allStores);

}

}

loadStores();

function renderStores(stores){

storesContainer.innerHTML = "";

if(stores.length === 0){

storesContainer.innerHTML =

`<div class="empty">
لا توجد متاجر
</div>`;

return;

}

stores.forEach((store,index)=>{

storesContainer.innerHTML += `

<div class="store-card">

<div
class="store-header"
onclick="toggleProducts(${index})">

<img
src="${
store.image || "store.png"
}"
class="store-image">

<div class="store-info">

<h3>

${store.store_name}

</h3>

<p>

${store.category}

</p>

</div>

</div>

<div
id="products_${index}"
style="display:none;"
class="products">

${

store.products ?

Object.values(store.products).map((product,pIndex)=>`

<div class="product">

<img
src="${
product.image || "product.png"
}"
class="product-image">

<div class="product-name">

${product.name}

</div>

<div class="product-desc">

${product.description || ""}

</div>

<div class="product-price">

${product.price}
د.ع

</div>

<div class="qty-row">

<span>

الكمية

</span>

<input
type="number"
value="1"
min="1"
id="qty_${index}_${pIndex}">

</div>

<button
class="add-cart-btn"
onclick='addToCart(
${JSON.stringify(product)},
document.getElementById("qty_${index}_${pIndex}").value,
"${store.store_name}"
)'>

اضافة الى السلة

</button>

</div>

`).join("")

:

`<div class="empty">
لا توجد منتجات
</div>`

}

</div>

</div>

`;

});

}

window.toggleProducts =
function(index){

let products =

document.getElementById(
`products_${index}`
);

if(products.style.display === "none"){

products.style.display = "block";

}else{

products.style.display = "none";

}

};

document.getElementById("searchInput")
.addEventListener("input",function(){

let value =
this.value.toLowerCase();

let filtered =
allStores.filter(store=>

store.store_name
.toLowerCase()
.includes(value)

);

renderStores(filtered);

});

document.querySelectorAll(".filter-btn")
.forEach(button=>{

button.addEventListener("click",()=>{

document.querySelectorAll(".filter-btn")
.forEach(btn=>{

btn.classList.remove("active");

});

button.classList.add("active");

let category =
button.dataset.category;

if(category === "all"){

renderStores(allStores);

}else{

let filtered =
allStores.filter(store=>

store.category === category

);

renderStores(filtered);

}

});

});

let cart =

JSON.parse(
localStorage.getItem("cart")
) || [];

window.addToCart =
function(product,qty,storeName){

qty = Number(qty);

cart.push({

storeName:storeName,

name:product.name,

price:Number(product.price),

qty:qty,

image:product.image || "product.png"

});

localStorage.setItem(
"cart",
JSON.stringify(cart)
);

loadCart();

alert("تمت اضافة المنتج للسلة");

};

function loadCart(){

const cartContainer =
document.getElementById("cartContainer");

cartContainer.innerHTML = "";

if(cart.length === 0){

cartContainer.innerHTML =

`<div class="empty">
السلة فارغة
</div>`;

updateTotals();

return;

}

cart.forEach((item,index)=>{

cartContainer.innerHTML += `

<div class="cart-item">

<img
src="${item.image}"
class="cart-image">

<div class="cart-info">

<h3>

${item.name}

</h3>

<p>

🏪 ${item.storeName}

</p>

<p>

الكمية :
${item.qty}

</p>

<p>

${item.price * item.qty}
د.ع

</p>

</div>

<button
class="delete-btn"
onclick="removeCart(${index})">

حذف

</button>

</div>

`;

});

updateTotals();

}

loadCart();

window.removeCart =
function(index){

cart.splice(index,1);

localStorage.setItem(
"cart",
JSON.stringify(cart)
);

loadCart();

};

function updateTotals(){

let itemsTotal = 0;

cart.forEach(item=>{

itemsTotal +=
item.price * item.qty;

});

let delivery = 3000;

let tip = Number(
document.getElementById("tipInput")
?.value || 0
);

document.getElementById("itemsTotal")
.innerHTML = itemsTotal;

document.getElementById("finalTotal")
.innerHTML =

itemsTotal + delivery + tip;

}

document.getElementById("tipInput")
.addEventListener("input",updateTotals);

window.sendOrder =
async function(){

if(cart.length === 0){

alert("السلة فارغة");

return;

}

let total = 0;

cart.forEach(item=>{

total += item.price * item.qty;

});

let tip = Number(
document.getElementById("tipInput")
.value || 0
);

let orderId =
"ORDER"+Date.now();

let orderData = {

id:orderId,

customerId:
currentUser.id,

customerName:
currentUser.name,

customerPhone:
currentUser.phone,

items:cart,

deliveryPrice:3000,

tip:tip,

totalPrice:
total + 3000 + tip,

status:"waiting_driver",

createdAt:Date.now()

};

await set(

ref(database,"orders/"+orderId),

orderData

);

cart = [];

localStorage.removeItem("cart");

loadCart();

alert("تم ارسال الطلب بنجاح 🚀");

};

window.logout = function(){

localStorage.removeItem("user");

window.location.href =
"index.html";

};

</script>

</body>

</html>
