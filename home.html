<script type="module">

import { initializeApp }
from "https://www.gstatic.com/firebasejs/12.13.0/firebase-app.js";

import {
getDatabase,
ref,
set,
get,
onValue,
update
}
from "https://www.gstatic.com/firebasejs/12.13.0/firebase-database.js";

const firebaseConfig = {

apiKey:"AIzaSyC7QzQTYMSGRV_nraJBneBqDqYGhugF0Pw",

authDomain:"fast-937c9.firebaseapp.com",

projectId:"fast-937c9",

databaseURL:
"https://fast-937c9-default-rtdb.europe-west1.firebasedatabase.app"

};

const app =
initializeApp(firebaseConfig);

const database =
getDatabase(app);

const currentUser =
JSON.parse(localStorage.getItem("user"));

if(!currentUser || !currentUser.id){

window.location.href =
"index.html";

}

document.getElementById("welcomeText")
.innerHTML =
اهلاً ${currentUser.name || "مستخدم"};

let allStores = [];
let userLatitude = null;
let userLongitude = null;

let cart =
JSON.parse(localStorage.getItem("cart"))
|| [];

navigator.geolocation.watchPosition(

(position)=>{

userLatitude =
position.coords.latitude;

userLongitude =
position.coords.longitude;

update(
ref(
database,
"customers/" + currentUser.id
),
{

userLat:userLatitude,
userLng:userLongitude

}
);

if(allStores.length === 0){

startLiveStores();

}

}

);

function calculateDistance(lat1, lon1, lat2, lon2){

const R = 6371;

const dLat =
(lat2-lat1) * Math.PI / 180;

const dLon =
(lon2-lon1) * Math.PI / 180;

const a =

Math.sin(dLat/2) *
Math.sin(dLat/2)

+

Math.cos(lat1 * Math.PI / 180)

*

Math.cos(lat2 * Math.PI / 180)

*

Math.sin(dLon/2)

*

Math.sin(dLon/2);

const c =
2 * Math.atan2(
Math.sqrt(a),
Math.sqrt(1-a)
);

return R * c;

}

function startLiveStores(){

onValue(

ref(database,"stores"),

(snapshot)=>{

allStores = [];

if(snapshot.exists()){

const stores =
snapshot.val();

for(let key in stores){

let store =
stores[key];

store.id = key;

if(store.status !== "active")
continue;

if(!store.latitude || !store.longitude)
continue;

const distance =
calculateDistance(

userLatitude,
userLongitude,

Number(store.latitude),
Number(store.longitude)

);

if(distance > 25)
continue;

store.distance =
distance.toFixed(1);

allStores.push(store);

}

renderStores(allStores);

}

}

);

}

function renderStores(stores){

const container =
document.getElementById("storesContainer");

container.innerHTML = "";

stores.forEach((store)=>{

container.innerHTML += `

<div
class="store-card"
onclick="openStore('${store.id}')">

<div class="store-header">

<img
src="${store.store_image || store.image || 'store.png'}"
class="store-image">

<div class="store-info">

<div class="store-name">

${store.store_name}

</div>

<div class="store-distance">

📍 ${store.distance} كم

</div>

</div>

</div>

</div>

`;

});

}

window.openStore =
async function(storeId){

const store =
allStores.find(s => s.id === storeId);

const snapshot =
await get(
ref(
database,
"store_products/" + storeId
)
);

const container =
document.getElementById("storesContainer");

container.innerHTML = "";

const products =
snapshot.val();

for(let key in products){

const product =
products[key];

product.id = key;

product.storeId =
store.id;

product.storeName =
store.store_name;

product.storeImage =
store.store_image || "store.png";

container.innerHTML += `

<div class="product-card">

<img
src="${product.image || 'product.png'}"
class="product-image">

<div class="product-content">

<div class="product-name">

${product.name}

</div>

<div class="product-price">

${product.price} د.ع

</div>

<div class="qty-controller">

<button
class="qty-btn"
onclick="decreaseQty('${product.id}')">

-

</button>

<input
id="qty_${product.id}"
class="qty-input"
value="1"
readonly>

<button
class="qty-btn"
onclick="increaseQty('${product.id}')">

+

</button>

</div>

<button
class="add-btn"
onclick='addToCart(${JSON.stringify(product)})'>

اضافة للسلة

</button>

</div>

</div>

`;

}

};

window.increaseQty =
function(id){

document.getElementById(
`qty_${id}`
).value++;

};

window.decreaseQty =
function(id){

const input =
document.getElementById(
`qty_${id}`
);

if(Number(input.value) > 1){

input.value--;

}

};

window.addToCart =
function(product){

const qty =
Number(
document.getElementById(
`qty_${product.id}`
).value
);

cart.push({

id:product.id,
name:product.name,
price:Number(product.price),
qty:qty,
image:product.image || "",
description:product.description || "",
storeId:product.storeId,
storeName:product.storeName,
storeImage:product.storeImage

});

localStorage.setItem(
"cart",
JSON.stringify(cart)
);

updateCart();

alert("تمت الاضافة");

};

function updateCart(){

const container =
document.getElementById(
"cartContainer"
);

container.innerHTML = "";

let total = 0;

cart.forEach((item,index)=>{

const itemTotal =
Number(item.price) *
Number(item.qty);

total += itemTotal;

container.innerHTML += `

<div class="cart-item">

<img
src="${item.image}"
class="cart-image">

<div class="cart-info">

<h3>
${item.name}
</h3>

<p>
${itemTotal} د.ع
</p>

</div>

<button
class="delete-btn"
onclick="removeCart(${index})">

حذف

</button>

</div>

`;

});

const deliveryPrice = 1000;

const tip =
Number(
document.getElementById(
"tipInput"
).value || 0
);

document.getElementById(
"itemsTotal"
).innerHTML =
total + " د.ع";

document.getElementById(
"deliveryPriceText"
).innerHTML =
deliveryPrice + " د.ع";

document.getElementById(
"finalTotal"
).innerHTML =

(total + deliveryPrice + tip)

+ " د.ع";

}

updateCart();

window.removeCart =
function(index){

cart.splice(index,1);

localStorage.setItem(
"cart",
JSON.stringify(cart)
);

updateCart();

};

window.sendOrder =
async function(){

if(cart.length === 0){

alert("السلة فارغة");

return;

}

navigator.geolocation.getCurrentPosition(

async(position)=>{

let total = 0;

cart.forEach(item=>{

total +=
Number(item.price) *
Number(item.qty);

});

const tip =
Number(
document.getElementById(
"tipInput"
).value || 0
);

const deliveryPrice = 1000;

const orderId =
"ORDER" + Date.now();

const storesData =

[...new Set(cart.map(item => item.storeId))]

.map(storeId => {

const store =
allStores.find(
s => s.id === storeId
);

return {

storeId:
store?.id || "",

storeName:
store?.store_name || "",

storeImage:
store?.store_image || "store.png",

storeLat:
store?.latitude || "",

storeLng:
store?.longitude || "",

storePhone:
store?.phone || "",

storeCategory:
store?.category || ""

};

});

const orderData = {

id:orderId,

customerId:
currentUser.id,

customerName:
currentUser.name || "",

customerPhone:
currentUser.phone || "",

customerAddress:
currentUser.address || "",

customerLat:
position.coords.latitude,

customerLng:
position.coords.longitude,

items:

cart.map(item => ({

id:item.id,

name:item.name,

price:Number(item.price),

qty:Number(item.qty),

totalPrice:
Number(item.price) *
Number(item.qty),

image:item.image,

description:item.description,

storeId:item.storeId,

storeName:item.storeName,

storeImage:item.storeImage

})),

storeId:
cart[0]?.storeId || "",

storeName:
cart[0]?.storeName || "",

storeLat:
storesData[0]?.storeLat || "",

storeLng:
storesData[0]?.storeLng || "",

storesData:
storesData,

deliveryPrice:
deliveryPrice,

tip:
tip,

productsPrice:
total,

totalPrice:
total + deliveryPrice + tip,

status:
"waiting_driver",

statusText:
"بانتظار قبول سائق",

driverFound:
false,

delivered:
false,

failedDriverSearch:
false,

acceptedDriver:"",
driverId:"",
driverPhone:"",
driverLat:"",
driverLng:"",

createdAt:
Date.now(),

createdDate:
new Date().toLocaleDateString("ar-EG"),

createdTime:
new Date().toLocaleTimeString("ar-EG"),

rejectedBy:{}

};

await set(

ref(
database,
"orders/" + orderId
),

orderData

);

localStorage.setItem(
"currentOrderId",
orderId
);

localStorage.removeItem(
"cart"
);

window.location.href =
"talab.html?orderId=" +
orderId;

}

);

};

window.showPage =
function(pageId,element){

document.querySelectorAll(".page")
.forEach(page=>{

page.classList.remove(
"active-page"
);

});

document.getElementById(pageId)
.classList.add(
"active-page"
);

document.querySelectorAll(".nav-item")
.forEach(item=>{

item.classList.remove(
"active"
);

});

element.classList.add(
"active"
);

};

</script>

</body>

</html>
