<!DOCTYPE html>
<html lang="ar" dir="rtl">

<head>

<meta charset="UTF-8">

<meta name="viewport"
content="width=device-width, initial-scale=1.0">

<title>
عالسريع
</title>

<link rel="stylesheet"
href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css"/>

<link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;500;600;700&display=swap"
rel="stylesheet">

<style>

*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:'Cairo',sans-serif;
}

body{
background:#f7f7f7;
padding-bottom:100px;
overflow-x:hidden;
}

.page{
display:none;
}

.active-page{
display:block;
}

/* header */

.header{
background:linear-gradient(135deg,#ff8800,#ff5500);
padding:20px;
border-bottom-left-radius:35px;
border-bottom-right-radius:35px;
color:white;
box-shadow:0 8px 25px rgba(0,0,0,.15);
}

.user-box{
display:flex;
align-items:center;
gap:15px;
}

.user-image{
width:65px;
height:65px;
border-radius:50%;
border:3px solid white;
object-fit:cover;
}

.user-name-row{
display:flex;
align-items:center;
gap:8px;
}

.ok-icon{
width:18px;
height:18px;
object-fit:contain;
}

.small-text{
font-size:13px;
margin-top:4px;
opacity:.9;
}

.search-box{
margin-top:20px;
background:white;
padding:15px;
border-radius:18px;
display:flex;
align-items:center;
}

.search-box i{
color:#ff8800;
font-size:18px;
}

.search-box input{
border:none;
outline:none;
width:100%;
margin-right:10px;
font-size:15px;
background:none;
}

/* filters */

.filters{
display:flex;
gap:10px;
overflow:auto;
padding:15px;
}

.filters::-webkit-scrollbar{
display:none;
}

.filter-btn{
border:none;
padding:10px 18px;
border-radius:14px;
background:#eee;
font-weight:bold;
cursor:pointer;
white-space:nowrap;
}

.filter-btn.active{
background:#ff8800;
color:white;
}

/* stores */

.stores-container{
padding:15px;
display:flex;
flex-direction:column;
gap:18px;
}

.store-card{
background:white;
padding:15px;
border-radius:28px;
box-shadow:0 5px 20px rgba(0,0,0,.08);
cursor:pointer;
position:relative;
}

.vip-store{
border:3px solid #ff8800;
}

.vip-badge{
position:absolute;
bottom:12px;
left:12px;
background:#ff8800;
padding:8px 14px;
border-radius:14px;
color:white;
font-weight:bold;
font-size:13px;
}

.store-header{
display:flex;
gap:15px;
align-items:center;
}

.store-image{
width:95px;
height:95px;
border-radius:22px;
object-fit:cover;
}

.store-info{
flex:1;
}

.store-name{
display:flex;
align-items:center;
gap:6px;
margin-bottom:8px;
}

.store-info p{
font-size:14px;
color:#666;
margin-bottom:4px;
}

/* products */

.single-store-page{
display:none;
position:fixed;
top:0;
left:0;
right:0;
bottom:0;
background:#f7f7f7;
z-index:999;
overflow-y:auto;
padding-bottom:120px;
}

.store-top-bar{
background:linear-gradient(135deg,#ff8800,#ff5500);
padding:20px;
display:flex;
align-items:center;
gap:15px;
color:white;
border-bottom-left-radius:30px;
border-bottom-right-radius:30px;
position:sticky;
top:0;
}

.back-btn{
width:45px;
height:45px;
border:none;
border-radius:50%;
background:white;
color:#ff8800;
font-size:18px;
cursor:pointer;
}

.single-store-info{
display:flex;
align-items:center;
gap:12px;
}

.single-store-image{
width:70px;
height:70px;
border-radius:18px;
object-fit:cover;
border:3px solid white;
}

.products-container{
padding:15px;
display:flex;
flex-direction:column;
gap:18px;
}

.product-card{
background:white;
padding:15px;
border-radius:25px;
box-shadow:0 5px 20px rgba(0,0,0,.08);
}

.product-image{
width:100%;
height:220px;
object-fit:cover;
border-radius:20px;
margin-bottom:12px;
}

.product-name{
font-size:20px;
font-weight:bold;
margin-bottom:8px;
}

.product-desc{
font-size:14px;
color:#666;
margin-bottom:10px;
line-height:1.7;
}

.product-price{
font-size:20px;
font-weight:bold;
color:#ff8800;
margin-bottom:12px;
}

.qty-box{
display:flex;
justify-content:space-between;
align-items:center;
margin-bottom:15px;
}

.qty-controller{
display:flex;
align-items:center;
gap:10px;
background:#f2f2f2;
padding:6px 10px;
border-radius:16px;
}

.qty-btn{
width:34px;
height:34px;
border:none;
border-radius:10px;
background:#ff8800;
color:white;
font-size:18px;
cursor:pointer;
}

.qty-input{
width:45px;
height:34px;
border:none;
background:white;
border-radius:10px;
text-align:center;
font-weight:bold;
}

.add-btn{
width:100%;
padding:15px;
border:none;
border-radius:16px;
background:#00b894;
color:white;
font-size:16px;
font-weight:bold;
cursor:pointer;
}

/* cart */

.cart-header,
.account-header{
padding:25px 20px 10px;
}

.cart-container{
padding:15px;
display:flex;
flex-direction:column;
gap:15px;
}

.cart-item{
background:white;
padding:15px;
border-radius:22px;
display:flex;
align-items:center;
gap:15px;
box-shadow:0 5px 20px rgba(0,0,0,.08);
}

.cart-image{
width:80px;
height:80px;
border-radius:16px;
object-fit:cover;
}

.cart-info{
flex:1;
}

.delete-btn{
background:red;
border:none;
padding:10px 14px;
border-radius:12px;
color:white;
cursor:pointer;
}

.summary-box{
background:white;
margin:15px;
padding:20px;
border-radius:25px;
}

.summary-row{
display:flex;
justify-content:space-between;
margin-bottom:15px;
}

.tip-input{
width:100%;
padding:15px;
border-radius:15px;
border:1px solid #ddd;
margin:15px 0;
}

.summary-total{
display:flex;
justify-content:space-between;
align-items:center;
padding-top:15px;
border-top:1px solid #eee;
}

.send-order{
width:100%;
padding:16px;
border:none;
border-radius:16px;
background:#00b894;
color:white;
font-size:17px;
font-weight:bold;
margin-top:20px;
cursor:pointer;
}

/* account */

.account-card{
margin:20px;
background:white;
padding:25px;
border-radius:30px;
text-align:center;
}

.account-image{
width:110px;
height:110px;
border-radius:50%;
border:4px solid #ff8800;
margin-bottom:15px;
object-fit:cover;
}

.account-info{
margin-top:25px;
display:flex;
flex-direction:column;
gap:15px;
}

.info-item{
background:#f7f7f7;
padding:15px;
border-radius:16px;
display:flex;
align-items:center;
gap:12px;
}

.info-item i{
color:#ff8800;
}

.logout-btn{
width:100%;
padding:16px;
border:none;
border-radius:16px;
background:red;
color:white;
font-size:16px;
font-weight:bold;
margin-top:20px;
cursor:pointer;
}

/* bottom bar */

.bottom-bar{
position:fixed;
bottom:0;
left:0;
right:0;
height:85px;
background:white;
display:flex;
justify-content:space-around;
align-items:center;
box-shadow:0 -5px 20px rgba(0,0,0,.08);
border-top-left-radius:25px;
border-top-right-radius:25px;
z-index:1000;
}

.nav-item{
display:flex;
flex-direction:column;
align-items:center;
color:#888;
cursor:pointer;
font-size:13px;
font-weight:600;
}

.nav-item.active{
color:#ff8800;
}

.nav-item i{
font-size:22px;
margin-bottom:5px;
}

.empty{
text-align:center;
padding:40px;
color:#777;
}

</style>

</head>

<body>

<!-- الرئيسية -->

<div id="homePage"
class="page active-page">

<div class="header">

<div class="user-box">

<img
src="user.png"
class="user-image">

<div>

<div class="user-name-row">

<h2 id="welcomeText">
اهلاً بك
</h2>

<img
src="ok.png"
class="ok-icon">

</div>

<p class="small-text">
اطلب كل ما تحتاجه 🚀
</p>

</div>

</div>

<div class="search-box">

<i class="fa-solid fa-magnifying-glass"></i>

<input
type="text"
id="searchInput"
placeholder="ابحث عن متجر او منتج">

</div>

</div>

<div class="filters"></div>

<div id="storesContainer"
class="stores-container"></div>

</div>

<!-- صفحة المتجر -->

<div id="singleStorePage"
class="single-store-page">

<div class="store-top-bar">

<button class="back-btn"
onclick="backHome()">

<i class="fa-solid fa-arrow-right"></i>

</button>

<div class="single-store-info">

<img
id="singleStoreImage"
src="store.png"
class="single-store-image">

<div>

<h2 id="singleStoreName"></h2>

<p id="singleStoreCategory"></p>

</div>

</div>

</div>

<div id="singleProductsContainer"
class="products-container"></div>

</div>

<!-- السلة -->

<div id="cartPage"
class="page">

<div class="cart-header">

<h2>
السلة 🛒
</h2>

</div>

<div id="cartContainer"
class="cart-container">

<div class="empty">
السلة فارغة
</div>

</div>

<div class="summary-box">

<div class="summary-row">

<span>
مجموع الطلبات
</span>

<span id="itemsTotal">
0
</span>

</div>

<div class="summary-row">

<span>
اجرة التوصيل
</span>

<span>
2000 د.ع
</span>

</div>

<input
type="number"
id="tipInput"
class="tip-input"
placeholder="اكرامية للسائق">

<div class="summary-total">

<span>
المبلغ الكلي
</span>

<h2>
<span id="finalTotal">
0
</span>
د.ع
</h2>

</div>

<button
class="send-order">

طلب الآن 🚀

</button>

</div>

</div>

<!-- الحساب -->

<div id="accountPage"
class="page">

<div class="account-header">

<h2>
الحساب 👤
</h2>

</div>

<div class="account-card">

<img
src="user.png"
class="account-image">

<h2 id="accountName">
اسم المستخدم
</h2>

<div class="account-info">

<div class="info-item">

<i class="fa-solid fa-phone"></i>

<p id="accountPhone"></p>

</div>

<div class="info-item">

<i class="fa-solid fa-location-dot"></i>

<p id="accountAddress"></p>

</div>

<div class="info-item">

<i class="fa-solid fa-user"></i>

<p id="accountType"></p>

</div>

</div>

<button
class="logout-btn"
onclick="logout()">

تسجيل الخروج

</button>

</div>

</div>

<!-- البار السفلي -->

<div class="bottom-bar">

<div
class="nav-item active"
onclick="showPage('homePage',this)">

<i class="fa-solid fa-house"></i>

<span>
الرئيسية
</span>

</div>

<div
class="nav-item"
onclick="showPage('cartPage',this)">

<i class="fa-solid fa-cart-shopping"></i>

<span>
السلة
</span>

</div>

<div
class="nav-item"
onclick="showPage('accountPage',this)">

<i class="fa-solid fa-user"></i>

<span>
الحساب
</span>

</div>

</div>

<script type="module">

import { initializeApp }
from "https://www.gstatic.com/firebasejs/12.13.0/firebase-app.js";

import {
getDatabase,
ref,
get,
child
}
from "https://www.gstatic.com/firebasejs/12.13.0/firebase-database.js";

const firebaseConfig = {

apiKey:"YOUR_API_KEY",

authDomain:"YOUR_AUTH_DOMAIN",

projectId:"YOUR_PROJECT_ID",

storageBucket:"YOUR_STORAGE_BUCKET",

messagingSenderId:"YOUR_SENDER_ID",

appId:"YOUR_APP_ID",

databaseURL:"YOUR_DATABASE_URL"

};

const app =
initializeApp(firebaseConfig);

const database =
getDatabase(app);

const currentUser =
JSON.parse(localStorage.getItem("user"));

if(!currentUser){

window.location.href =
"index.html";

}

document.getElementById("welcomeText")
.innerHTML =
currentUser.name;

document.getElementById("accountName")
.innerHTML =
currentUser.name || "";

document.getElementById("accountPhone")
.innerHTML =
currentUser.phone || "";

document.getElementById("accountAddress")
.innerHTML =
currentUser.address || "";

document.getElementById("accountType")
.innerHTML =
currentUser.accountType || "حساب عادي";

let allStores = [];

let cart =
JSON.parse(localStorage.getItem("cart")) || [];

const storesContainer =
document.getElementById("storesContainer");

async function loadStores(){

const snapshot =
await get(
child(ref(database),"stores")
);

allStores = [];

if(snapshot.exists()){

const stores =
snapshot.val();

for(let key in stores){

let store =
stores[key];

store.id = key;

if(store.status === "active"){

allStores.push(store);

}

}

renderStores(allStores);

}

}

loadStores();

function renderStores(stores){

storesContainer.innerHTML = "";

stores.forEach(store=>{

storesContainer.innerHTML += `

<div
class="store-card ${store.accountType === "vip" ? "vip-store" : ""}"
onclick="openStore('${store.id}')">

${store.accountType === "vip"
?
`<div class="vip-badge">VIP 🔥</div>`
:
""
}

<div class="store-header">

<img
src="${store.image || "store.png"}"
class="store-image">

<div class="store-info">

<div class="store-name">

<h3>
${store.store_name}
</h3>

<img
src="ok.png"
class="ok-icon">

</div>

<p>
🏪 ${store.category || ""}
</p>

<p>
📞 ${store.phone || ""}
</p>

</div>

</div>

</div>

`;

});

}

window.openStore =
async function(storeId){

const store =
allStores.find(s=>s.id===storeId);

document.getElementById("singleStorePage")
.style.display = "block";

document.getElementById("singleStoreName")
.innerHTML =
store.store_name;

document.getElementById("singleStoreCategory")
.innerHTML =
store.category;

document.getElementById("singleStoreImage")
.src =
store.image || "store.png";

const container =
document.getElementById("singleProductsContainer");

container.innerHTML = "";

const snapshot =
await get(
child(ref(database),
"store_products/"+store.id)
);

if(snapshot.exists()){

const products =
snapshot.val();

for(let key in products){

let product =
products[key];

product.id = key;

container.innerHTML += `

<div class="product-card">

<img
src="${product.image || "product.png"}"
class="product-image">

<div class="product-name">
${product.name}
</div>

<div class="product-desc">
${product.description || ""}
</div>

<div class="product-price">
${product.price} د.ع
</div>

<div class="qty-box">

<span>
الكمية
</span>

<div class="qty-controller">

<button
class="qty-btn"
onclick="decreaseQty('${product.id}')">
-
</button>

<input
type="text"
readonly
value="1"
id="qty_${product.id}"
class="qty-input">

<button
class="qty-btn"
onclick="increaseQty('${product.id}')">
+
</button>

</div>

</div>

<button
class="add-btn"
onclick="addToCart('${product.id}',
'${product.name}',
'${product.price}',
'${product.image || "product.png"}')">

اضافة الى السلة

</button>

</div>

`;

}

}

};

window.backHome =
function(){

document.getElementById("singleStorePage")
.style.display = "none";

};

window.increaseQty =
function(id){

const input =
document.getElementById(`qty_${id}`);

input.value =
Number(input.value) + 1;

};

window.decreaseQty =
function(id){

const input =
document.getElementById(`qty_${id}`);

if(Number(input.value) > 1){

input.value =
Number(input.value) - 1;

}

};

window.addToCart =
function(id,name,price,image){

const qty =
Number(
document.getElementById(`qty_${id}`).value
);

cart.push({
id,
name,
price:Number(price),
image,
qty
});

localStorage.setItem(
"cart",
JSON.stringify(cart)
);

renderCart();

alert("تمت الاضافة للسلة");

};

function renderCart(){

const container =
document.getElementById("cartContainer");

const itemsTotal =
document.getElementById("itemsTotal");

const finalTotal =
document.getElementById("finalTotal");

if(cart.length === 0){

container.innerHTML = `
<div class="empty">
السلة فارغة
</div>
`;

itemsTotal.innerHTML = "0";
finalTotal.innerHTML = "0";

return;

}

container.innerHTML = "";

let total = 0;

cart.forEach((item,index)=>{

const itemTotal =
item.price * item.qty;

total += itemTotal;

container.innerHTML += `

<div class="cart-item">

<img
src="${item.image}"
class="cart-image">

<div class="cart-info">

<h3>
${item.name}
</h3>

<p>
${item.qty} × ${item.price}
</p>

<h4>
${itemTotal} د.ع
</h4>

</div>

<button
class="delete-btn"
onclick="removeCartItem(${index})">

<i class="fa-solid fa-trash"></i>

</button>

</div>

`;

});

itemsTotal.innerHTML =
`${total} د.ع`;

const tip =
Number(
document.getElementById("tipInput").value || 0
);

finalTotal.innerHTML =
total + 2000 + tip;

}

window.removeCartItem =
function(index){

cart.splice(index,1);

localStorage.setItem(
"cart",
JSON.stringify(cart)
);

renderCart();

};

document.getElementById("tipInput")
.addEventListener("input",
renderCart);

renderCart();

window.showPage =
function(pageId,element){

document.querySelectorAll(".page")
.forEach(page=>{

page.classList.remove("active-page");

});

document.getElementById(pageId)
.classList.add("active-page");

document.querySelectorAll(".nav-item")
.forEach(item=>{

item.classList.remove("active");

});

element.classList.add("active");

};

window.logout =
function(){

localStorage.removeItem("user");

window.location.href =
"index.html";

};

document.getElementById("searchInput")
.addEventListener("input",(e)=>{

const value =
e.target.value.toLowerCase();

const filtered =
allStores.filter(store=>

store.store_name
.toLowerCase()
.includes(value)

||

store.category
.toLowerCase()
.includes(value)

);

renderStores(filtered);

});

</script>

</body>

</html>
