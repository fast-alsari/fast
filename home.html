<!-- home.html -->

<!DOCTYPE html>
<html lang="ar" dir="rtl">

<head>

<meta charset="UTF-8">

<meta name="viewport"
content="width=device-width, initial-scale=1.0">

<title>
عالسريع
</title>

<link rel="stylesheet"
href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css"/>

<link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;500;600;700&display=swap"
rel="stylesheet">

<style>

*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:'Cairo',sans-serif;
}

body{
background:#f7f7f7;
padding-bottom:110px;
overflow-x:hidden;
}

.page{
display:none;
}

.active-page{
display:block;
}

.header{
background:linear-gradient(135deg,#ff8800,#ff5500);
padding:20px;
border-bottom-left-radius:30px;
border-bottom-right-radius:30px;
color:white;
box-shadow:0 8px 25px rgba(0,0,0,.12);
}

.header-top{
display:flex;
justify-content:space-between;
align-items:center;
}

.user-image{
width:60px;
height:60px;
border-radius:50%;
border:3px solid white;
object-fit:cover;
}

.search-box{
margin-top:18px;
background:white;
padding:14px;
border-radius:16px;
display:flex;
align-items:center;
}

.search-box i{
color:#ff8800;
font-size:18px;
}

.search-box input{
border:none;
outline:none;
width:100%;
margin-right:10px;
font-size:15px;
}

.filters{
display:flex;
gap:10px;
overflow:auto;
padding:15px;
}

.filters::-webkit-scrollbar{
display:none;
}

.filter-btn{
border:none;
padding:10px 18px;
border-radius:14px;
background:#eee;
font-weight:bold;
cursor:pointer;
white-space:nowrap;
}

.filter-btn.active{
background:#ff8800;
color:white;
}

.stores-container{
padding:15px;
display:flex;
flex-direction:column;
gap:14px;
}

.store-card{
background:white;
padding:12px;
border-radius:22px;
box-shadow:0 5px 18px rgba(0,0,0,.06);
position:relative;
cursor:pointer;
overflow:hidden;
border:3px solid transparent;
}

.vip-store{
background:
linear-gradient(#fff,#fff) padding-box,
linear-gradient(
135deg,
#ff0000,
#ff8800,
#000000,
#ff2200
) border-box;
}

.vip-badge{
position:absolute;
top:10px;
left:10px;
background:linear-gradient(135deg,#ff0000,#ff8800);
padding:6px 12px;
border-radius:14px;
color:white;
font-size:11px;
font-weight:bold;
}

.store-header{
display:flex;
align-items:center;
gap:12px;
}

.store-image{
width:78px;
height:78px;
border-radius:18px;
object-fit:cover;
background:#eee;
border:1px solid #ddd;
}

.store-info{
flex:1;
}

.store-name{
display:flex;
align-items:center;
gap:5px;
margin-bottom:5px;
}

.store-name h3{
font-size:17px;
}

.ok-icon{
width:17px;
height:17px;
object-fit:contain;
}

.store-info p{
font-size:13px;
color:#666;
margin-bottom:3px;
}

.single-store-page{
display:none;
position:fixed;
top:0;
left:0;
right:0;
bottom:0;
background:#f7f7f7;
z-index:999;
overflow-y:auto;
padding-bottom:120px;
}

.store-top-bar{
background:linear-gradient(135deg,#ff8800,#ff5500);
padding:18px;
display:flex;
align-items:center;
gap:12px;
color:white;
position:sticky;
top:0;
z-index:100;
}

.back-btn{
width:42px;
height:42px;
border-radius:50%;
border:none;
background:white;
color:#ff6600;
font-size:18px;
cursor:pointer;
}

.single-store-info{
display:flex;
align-items:center;
gap:10px;
}

.single-store-image{
width:65px;
height:65px;
border-radius:16px;
object-fit:cover;
background:#fff;
}

.products-container{
padding:15px;
display:flex;
flex-direction:column;
gap:14px;
}

.product-card{
background:white;
padding:12px;
border-radius:22px;
box-shadow:0 5px 18px rgba(0,0,0,.06);
display:flex;
gap:12px;
align-items:center;
}

.product-image{
width:95px;
height:95px;
object-fit:cover;
border-radius:18px;
background:#eee;
flex-shrink:0;
}

.product-content{
flex:1;
}

.product-name{
font-size:17px;
font-weight:bold;
margin-bottom:5px;
}

.product-price{
font-size:18px;
font-weight:bold;
color:#ff8800;
margin-bottom:5px;
}

.product-note{
font-size:12px;
color:#666;
margin-bottom:10px;
line-height:1.5;
}

.qty-box{
display:flex;
justify-content:flex-start;
margin-bottom:10px;
}

.qty-controller{
display:flex;
align-items:center;
gap:8px;
background:#f2f2f2;
padding:5px 8px;
border-radius:14px;
}

.qty-btn{
width:32px;
height:32px;
border:none;
border-radius:10px;
background:#ff8800;
color:white;
font-size:18px;
font-weight:bold;
cursor:pointer;
}

.qty-input{
width:42px;
height:32px;
text-align:center;
border:none;
background:white;
border-radius:10px;
font-size:15px;
font-weight:bold;
}

.add-btn{
width:100%;
padding:13px;
border:none;
border-radius:14px;
background:#00b894;
color:white;
font-size:15px;
font-weight:bold;
cursor:pointer;
}

.cart-container{
padding:15px;
display:flex;
flex-direction:column;
gap:14px;
}

.cart-item{
background:white;
padding:12px;
border-radius:20px;
display:flex;
gap:12px;
align-items:center;
box-shadow:0 5px 18px rgba(0,0,0,.06);
}

.cart-image{
width:75px;
height:75px;
border-radius:16px;
object-fit:cover;
background:#eee;
}

.cart-info{
flex:1;
}

.cart-info h3{
margin-bottom:4px;
font-size:16px;
}

.cart-info p{
margin-bottom:3px;
color:#666;
font-size:13px;
}

.cart-note{
font-size:12px;
color:#777;
line-height:1.5;
}

.delete-btn{
background:red;
border:none;
padding:10px 13px;
border-radius:12px;
color:white;
cursor:pointer;
font-weight:bold;
}

.summary-box{
background:white;
margin:15px;
padding:20px;
border-radius:24px;
box-shadow:0 5px 18px rgba(0,0,0,.06);
}

.bill-line{
display:flex;
justify-content:space-between;
margin-bottom:12px;
font-size:15px;
}

.final-price{
font-size:22px;
font-weight:bold;
color:#ff8800;
margin-top:10px;
}

.tip-input{
width:100%;
padding:13px;
border-radius:14px;
border:1px solid #ddd;
margin:15px 0;
font-size:14px;
outline:none;
}

.send-order{
width:100%;
padding:15px;
border:none;
border-radius:15px;
background:#00b894;
color:white;
font-size:16px;
font-weight:bold;
cursor:pointer;
}

.account-card{
margin:20px;
background:white;
padding:25px;
border-radius:26px;
box-shadow:0 5px 18px rgba(0,0,0,.06);
text-align:center;
}

.account-image{
width:100px;
height:100px;
border-radius:50%;
border:4px solid #ff8800;
margin:15px auto;
display:block;
object-fit:cover;
}

.logout-btn{
padding:15px;
border:none;
border-radius:15px;
background:red;
color:white;
font-size:15px;
font-weight:bold;
cursor:pointer;
width:100%;
margin-top:20px;
}

.bottom-bar{
position:fixed;
bottom:0;
left:0;
right:0;
height:82px;
background:white;
display:flex;
justify-content:space-around;
align-items:center;
box-shadow:0 -5px 18px rgba(0,0,0,.08);
z-index:1000;
}

.nav-item{
display:flex;
flex-direction:column;
align-items:center;
color:#888;
cursor:pointer;
}

.nav-item.active{
color:#ff8800;
}

.nav-item i{
font-size:21px;
margin-bottom:5px;
}

.empty{
text-align:center;
padding:35px;
color:#777;
}

</style>

</head>

<body>

<div id="homePage"
class="page active-page">

<div class="header">

<div class="header-top">

<div>

<h2 id="welcomeText">
اهلاً بك
</h2>

<p>
اطلب كل ما تحتاجه 🚀
</p>

</div>

<img
src="user.png"
class="user-image">

</div>

<div class="search-box">

<i class="fa-solid fa-magnifying-glass"></i>

<input
type="text"
id="searchInput"
placeholder="ابحث عن متجر او منتج">

</div>

</div>

<div class="filters"></div>

<div id="storesContainer"
class="stores-container"></div>

</div>

<div id="singleStorePage"
class="single-store-page">

<div class="store-top-bar">

<button
class="back-btn"
onclick="backHome()">

<i class="fa-solid fa-arrow-right"></i>

</button>

<div class="single-store-info">

<img
id="singleStoreImage"
src="store.png"
class="single-store-image"
onerror="this.src='store.png'">

<div>

<h2 id="singleStoreName">
اسم المتجر
</h2>

<p id="singleStoreCategory">
القسم
</p>

</div>

</div>

</div>

<div id="singleProductsContainer"
class="products-container"></div>

</div>

<div id="cartPage"
class="page">

<div id="cartContainer"
class="cart-container"></div>

<div class="summary-box">

<div class="bill-line">
<span>مجموع المنتجات</span>
<span id="itemsTotal">0 د.ع</span>
</div>

<div class="bill-line">
<span>التوصيل</span>
<span>2000 د.ع</span>
</div>

<input
type="number"
id="tipInput"
class="tip-input"
placeholder="اكرامية للسائق">

<div class="bill-line final-price">
<span>المجموع</span>
<span id="finalTotal">0 د.ع</span>
</div>

<button
class="send-order"
onclick="sendOrder()">

طلب توصيل 🚀

</button>

</div>

</div>

<div id="accountPage"
class="page">

<div class="account-card">

<img
src="user.png"
class="account-image">

<h2 id="accountName">
مستخدم
</h2>

<br>

<p id="accountPhone"></p>

<br>

<p id="accountAddress"></p>

<button
class="logout-btn"
onclick="logout()">

تسجيل الخروج

</button>

</div>

</div>

<div class="bottom-bar">

<div
class="nav-item active"
onclick="showPage('homePage',this)">

<i class="fa-solid fa-house"></i>

<span>
الرئيسية
</span>

</div>

<div
class="nav-item"
onclick="showPage('cartPage',this)">

<i class="fa-solid fa-cart-shopping"></i>

<span>
السلة
</span>

</div>

<div
class="nav-item"
onclick="showPage('accountPage',this)">

<i class="fa-solid fa-user"></i>

<span>
الحساب
</span>

</div>

</div>

<script type="module">

import { initializeApp }
from "https://www.gstatic.com/firebasejs/12.13.0/firebase-app.js";

import {
getDatabase,
ref,
get,
set,
child
}
from "https://www.gstatic.com/firebasejs/12.13.0/firebase-database.js";

const firebaseConfig = {

apiKey:"AIzaSyC7QzQTYMSGRV_nraJBneBqDqYGhugF0Pw",

authDomain:"fast-937c9.firebaseapp.com",

projectId:"fast-937c9",

databaseURL:
"https://fast-937c9-default-rtdb.europe-west1.firebasedatabase.app"

};

const app =
initializeApp(firebaseConfig);

const database =
getDatabase(app);

const currentUser =
JSON.parse(localStorage.getItem("user"));

if(!currentUser){

window.location.href =
"index.html";

}

document.getElementById("welcomeText")
.innerHTML =
`اهلاً ${currentUser.name}`;

document.getElementById("accountName")
.innerHTML =
currentUser.name || "مستخدم";

document.getElementById("accountPhone")
.innerHTML =
currentUser.phone || "";

document.getElementById("accountAddress")
.innerHTML =
currentUser.address || "";

let allStores = [];

let cart =
JSON.parse(
localStorage.getItem("cart")
) || [];

const storesContainer =
document.getElementById("storesContainer");

async function loadStores(){

const snapshot =
await get(
child(ref(database),"stores")
);

allStores = [];

if(snapshot.exists()){

const stores =
snapshot.val();

for(let key in stores){

let store = stores[key];

store.id = key;

if(store.status === "active"){

store.vip =
store.accountType === "vip";

allStores.push(store);

}

}

allStores.sort((a,b)=>
(b.vip === true) - (a.vip === true)
);

generateFilters();

renderStores(allStores);

}

}

loadStores();

function generateFilters(){

const filtersContainer =
document.querySelector(".filters");

filtersContainer.innerHTML = "";

filtersContainer.innerHTML += `
<button class="filter-btn active"
data-category="all">
الكل
</button>
`;

let categories = [];

allStores.forEach(store=>{

if(
store.category &&
!categories.includes(store.category)
){

categories.push(store.category);

}

});

categories.forEach(category=>{

filtersContainer.innerHTML += `
<button class="filter-btn"
data-category="${category}">
${category}
</button>
`;

});

document.querySelectorAll(".filter-btn")
.forEach(button=>{

button.addEventListener("click",()=>{

document.querySelectorAll(".filter-btn")
.forEach(btn=>{

btn.classList.remove("active");

});

button.classList.add("active");

let category =
button.dataset.category;

if(category === "all"){

renderStores(allStores);

}else{

let filtered =
allStores.filter(store=>
store.category === category
);

renderStores(filtered);

}

});

});

}

function renderStores(stores){

storesContainer.innerHTML = "";

if(stores.length === 0){

storesContainer.innerHTML = `
<div class="empty">
لا توجد نتائج
</div>
`;

return;

}

stores.forEach((store)=>{

storesContainer.innerHTML += `

<div
class="store-card ${store.vip ? "vip-store" : ""}"
onclick="openStore('${store.id}')">

${store.vip ? `
<div class="vip-badge">
🔥 VIP
</div>
` : ""}

<div class="store-header">

<img
src="${store.store_image || store.image || "store.png"}"
class="store-image"
referrerpolicy="no-referrer"
crossorigin="anonymous"
onerror="this.src='store.png'">

<div class="store-info">

<div class="store-name">

<h3>
${store.store_name}
</h3>

<img
src="ok.png"
class="ok-icon">

</div>

<p>
🏪 ${store.category}
</p>

<p>
📞 ${store.phone}
</p>

</div>

</div>

</div>

`;

});

}

document.getElementById("searchInput")
.addEventListener("input",function(){

let value =
this.value.toLowerCase();

let filtered =
allStores.filter(store=>

(store.store_name || "")
.toLowerCase()
.includes(value)

||

(store.category || "")
.toLowerCase()
.includes(value)

);

renderStores(filtered);

});

window.openStore =
async function(storeId){

const store =
allStores.find(s=>s.id === storeId);

document.getElementById("singleStorePage")
.style.display = "block";

document.getElementById("singleStoreName")
.innerHTML =
store.store_name;

document.getElementById("singleStoreCategory")
.innerHTML =
store.category;

document.getElementById("singleStoreImage")
.src =
store.store_image || store.image || "store.png";

const container =
document.getElementById("singleProductsContainer");

container.innerHTML = "";

const snapshot =
await get(
child(
ref(database),
"store_products/"+store.id
)
);

if(snapshot.exists()){

const products =
snapshot.val();

for(let key in products){

const product =
products[key];

product.id = key;

product.storeId =
store.id;

product.storeName =
store.store_name;

if(product.status === "active"){

container.innerHTML += `

<div class="product-card">

<img
src="${product.image || "product.png"}"
class="product-image"
referrerpolicy="no-referrer"
crossorigin="anonymous"
onerror="this.src='product.png'">

<div class="product-content">

<div class="product-name">
${product.name}
</div>

<div class="product-price">
${product.price} د.ع
</div>

<div class="product-note">
📝 ${product.description || "لا توجد ملاحظات"}
</div>

<div class="qty-box">

<div class="qty-controller">

<button
class="qty-btn"
onclick="decreaseQty('${product.id}')">

-

</button>

<input
type="text"
readonly
value="1"
id="qty_${product.id}"
class="qty-input">

<button
class="qty-btn"
onclick="increaseQty('${product.id}')">

+

</button>

</div>

</div>

<button
class="add-btn"
onclick='addToCart(${JSON.stringify(product)})'>

اضافة الى السلة

</button>

</div>

</div>

`;

}

}

}else{

container.innerHTML = `
<div class="empty">
لا توجد منتجات حالياً
</div>
`;

}

};

window.backHome =
function(){

document.getElementById("singleStorePage")
.style.display = "none";

};

window.increaseQty =
function(id){

const input =
document.getElementById(`qty_${id}`);

input.value =
Number(input.value)+1;

};

window.decreaseQty =
function(id){

const input =
document.getElementById(`qty_${id}`);

if(Number(input.value)>1){

input.value =
Number(input.value)-1;

}

};

window.addToCart =
function(product){

let qty =
Number(
document.getElementById(
`qty_${product.id}`
).value
);

if(
cart.length > 0 &&
cart[0].storeId !== product.storeId
){

alert(
"يمكنك الطلب من متجر واحد فقط"
);

return;

}

cart.push({

...product,
qty:qty

});

localStorage.setItem(
"cart",
JSON.stringify(cart)
);

updateCart();

alert("تمت الاضافة");

};

function updateCart(){

const cartContainer =
document.getElementById("cartContainer");

const itemsTotal =
document.getElementById("itemsTotal");

const finalTotal =
document.getElementById("finalTotal");

cartContainer.innerHTML = "";

if(cart.length === 0){

cartContainer.innerHTML = `
<div class="empty">
السلة فارغة
</div>
`;

itemsTotal.innerHTML =
"0 د.ع";

finalTotal.innerHTML =
"0 د.ع";

return;

}

let total = 0;

cart.forEach((item,index)=>{

let itemTotal =
Number(item.price) *
Number(item.qty);

total += itemTotal;

cartContainer.innerHTML += `

<div class="cart-item">

<img
src="${item.image || "product.png"}"
class="cart-image"
referrerpolicy="no-referrer"
crossorigin="anonymous"
onerror="this.src='product.png'">

<div class="cart-info">

<h3>
${item.name}
</h3>

<p>
🏪 ${item.storeName}
</p>

<p>
📦 الكمية :
${item.qty}
</p>

<p>
💰 ${itemTotal} د.ع
</p>

<div class="cart-note">
📝 ${item.description || "لا توجد ملاحظات"}
</div>

</div>

<button
class="delete-btn"
onclick="deleteCartItem(${index})">

حذف

</button>

</div>

`;

});

let tip =
Number(
document.getElementById("tipInput").value || 0
);

itemsTotal.innerHTML =
`${total} د.ع`;

finalTotal.innerHTML =
`${total + 2000 + tip} د.ع`;

}

updateCart();

window.deleteCartItem =
function(index){

cart.splice(index,1);

localStorage.setItem(
"cart",
JSON.stringify(cart)
);

updateCart();

};

document.getElementById("tipInput")
.addEventListener("input",updateCart);

window.sendOrder =
async function(){

if(cart.length === 0){

alert("السلة فارغة");

return;

}

navigator.geolocation.getCurrentPosition(

async(position)=>{

let total = 0;

cart.forEach(item=>{

total +=
Number(item.price) *
Number(item.qty);

});

let tip =
Number(
document.getElementById("tipInput").value || 0
);

const orderId =
"ORDER"+Date.now();

const orderData = {

id:orderId,

customerId:
currentUser.id,

customerName:
currentUser.name,

customerPhone:
currentUser.phone,

customerAddress:
currentUser.address || "",

items:cart,

storeId:
cart[0].storeId || "",

storeName:
cart[0].storeName || "",

deliveryPrice:2000,

tip:tip,

productsPrice:total,

totalPrice:
total + 2000 + tip,

status:"pending",

createdAt:Date.now(),

customerLat:
position.coords.latitude,

customerLng:
position.coords.longitude

};

await set(
ref(database,"orders/"+orderId),
orderData
);

cart = [];

localStorage.removeItem("cart");

updateCart();

alert("تم ارسال الطلب 🚀");

}

);

};

window.showPage =
function(pageId,element){

document.querySelectorAll(".page")
.forEach(page=>{

page.classList.remove("active-page");

});

document.getElementById(pageId)
.classList.add("active-page");

document.querySelectorAll(".nav-item")
.forEach(item=>{

item.classList.remove("active");

});

element.classList.add("active");

};

window.logout =
function(){

localStorage.removeItem("user");

window.location.href =
"index.html";

};

</script>

</body>

</html>
