<!-- home.html -->

<!DOCTYPE html>
<html lang="ar" dir="rtl">

<head>

<meta charset="UTF-8">

<meta name="viewport"
content="width=device-width, initial-scale=1.0">

<title>عالسريع</title>

<link rel="stylesheet"
href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css"/>

<link rel="preconnect"
href="https://fonts.googleapis.com">

<link rel="preconnect"
href="https://fonts.gstatic.com"
crossorigin>

<link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;500;600;700&display=swap"
rel="stylesheet">

<style>

*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:'Cairo',sans-serif;
}

body{
background:#0d1117;
overflow-x:hidden;
direction:rtl;
padding-bottom:120px;
min-height:100vh;
position:relative;
}

/* خلفية متحركة */

body::before{
content:"";
position:fixed;
inset:0;
background:
radial-gradient(circle at 20% 20%, rgba(255,119,0,.35), transparent 35%),
radial-gradient(circle at 80% 20%, rgba(0,119,255,.35), transparent 35%),
radial-gradient(circle at 50% 80%, rgba(255,255,255,.12), transparent 35%);
filter:blur(60px);
animation:bgMove 8s infinite alternate ease-in-out;
z-index:-2;
}

body::after{
content:"";
position:fixed;
inset:0;
background:linear-gradient(
180deg,
rgba(0,0,0,.2),
rgba(0,0,0,.8)
);
z-index:-1;
}

@keyframes bgMove{

0%{
transform:scale(1)
translate(0,0);
}

100%{
transform:scale(1.2)
translate(40px,-20px);
}

}

/* الصفحات */

.page{
display:none;
animation:fade .4s ease;
}

.active-page{
display:block;
}

@keyframes fade{

0%{
opacity:0;
transform:translateY(20px);
}

100%{
opacity:1;
transform:translateY(0);
}

}

/* HEADER */

.header{
padding:20px;
}

.header-box{
background:rgba(255,255,255,.12);
backdrop-filter:blur(20px);
border-radius:30px;
padding:20px;
display:flex;
justify-content:space-between;
align-items:center;
border:1px solid rgba(255,255,255,.12);
box-shadow:0 10px 30px rgba(0,0,0,.3);
}

.header-text h2{
color:white;
font-size:23px;
margin-bottom:5px;
}

.header-text p{
color:#ddd;
font-size:14px;
}

.user-image{
width:60px;
height:60px;
border-radius:50%;
border:3px solid #ff8800;
object-fit:cover;
}

/* البحث */

.search-area{
padding:0 20px;
margin-top:5px;
}

.search-box{
background:rgba(255,255,255,.12);
border-radius:20px;
padding:15px;
display:flex;
align-items:center;
backdrop-filter:blur(20px);
border:1px solid rgba(255,255,255,.12);
}

.search-box i{
color:#ff8800;
font-size:18px;
margin-left:10px;
}

.search-box input{
flex:1;
background:none;
border:none;
outline:none;
color:white;
font-size:15px;
}

.search-box input::placeholder{
color:#ccc;
}

/* الفلترة */

.filters{
display:flex;
gap:10px;
overflow:auto;
padding:20px;
}

.filters::-webkit-scrollbar{
display:none;
}

.filter-btn{
padding:10px 18px;
border:none;
border-radius:16px;
background:rgba(255,255,255,.12);
color:white;
font-weight:bold;
cursor:pointer;
transition:.3s;
white-space:nowrap;
}

.filter-btn.active{
background:linear-gradient(
135deg,
#ff8800,
#ffb300
);
transform:scale(1.05);
box-shadow:0 8px 18px rgba(255,136,0,.4);
}

/* المتاجر */

.stores-container{
padding:0 20px;
display:flex;
flex-direction:column;
gap:16px;
}

.store-card{
background:rgba(255,255,255,.12);
backdrop-filter:blur(20px);
border-radius:28px;
padding:14px;
display:flex;
gap:14px;
align-items:center;
position:relative;
overflow:hidden;
border:1px solid rgba(255,255,255,.1);
}

.store-card::before{
content:"";
position:absolute;
inset:-2px;
background:linear-gradient(
90deg,
#ff8800,
#fff,
#0077ff,
#ff8800
);
background-size:300%;
animation:borderMove 4s linear infinite;
z-index:-1;
filter:blur(12px);
opacity:.7;
}

@keyframes borderMove{

0%{
background-position:0%;
}

100%{
background-position:300%;
}

}

.store-image{
width:85px;
height:85px;
border-radius:22px;
object-fit:cover;
}

.store-info{
flex:1;
}

.store-top{
display:flex;
align-items:center;
gap:6px;
margin-bottom:6px;
}

.store-top h3{
color:white;
font-size:18px;
}

.verify{
width:18px;
height:18px;
}

.store-category{
color:#ffb300;
font-size:13px;
margin-bottom:5px;
}

.store-distance{
color:#ddd;
font-size:13px;
margin-bottom:10px;
}

.add-btn{
padding:10px 15px;
border:none;
border-radius:14px;
background:linear-gradient(
135deg,
#ff8800,
#ff6d00
);
color:white;
font-weight:bold;
cursor:pointer;
}

/* السلة */

.cart-container{
padding:20px;
display:flex;
flex-direction:column;
gap:15px;
}

.cart-item{
background:rgba(255,255,255,.12);
backdrop-filter:blur(20px);
border-radius:25px;
padding:14px;
display:flex;
align-items:center;
gap:12px;
}

.cart-image{
width:75px;
height:75px;
border-radius:18px;
object-fit:cover;
}

.cart-info{
flex:1;
}

.cart-info h3{
color:white;
margin-bottom:5px;
}

.cart-info p{
color:#ddd;
font-size:13px;
}

.delete-btn{
padding:10px 14px;
border:none;
border-radius:12px;
background:#ff3d00;
color:white;
font-weight:bold;
}

.send-order{
margin:20px;
width:calc(100% - 40px);
padding:16px;
border:none;
border-radius:18px;
background:linear-gradient(
135deg,
#00c853,
#00e676
);
color:white;
font-size:17px;
font-weight:bold;
}

/* الحساب */

.account-card{
margin:20px;
background:rgba(255,255,255,.12);
backdrop-filter:blur(20px);
border-radius:30px;
padding:25px;
text-align:center;
border:1px solid rgba(255,255,255,.1);
}

.account-image{
width:110px;
height:110px;
border-radius:50%;
border:4px solid #ff8800;
object-fit:cover;
margin-bottom:15px;
}

.account-card h2{
color:white;
margin-bottom:10px;
}

.account-info{
background:rgba(255,255,255,.08);
padding:14px;
border-radius:18px;
margin-top:12px;
color:white;
font-size:14px;
text-align:right;
}

.account-info p{
margin-bottom:10px;
}

.logout-btn{
margin-top:18px;
width:100%;
padding:16px;
border:none;
border-radius:18px;
background:linear-gradient(
135deg,
#ff1744,
#ff5252
);
color:white;
font-size:16px;
font-weight:bold;
}

/* البار السفلي */

.bottom-bar{
position:fixed;
bottom:20px;
left:50%;
transform:translateX(-50%);
width:92%;
height:85px;
background:rgba(255,255,255,.12);
backdrop-filter:blur(25px);
border-radius:35px;
display:flex;
justify-content:space-around;
align-items:center;
border:1px solid rgba(255,255,255,.1);
box-shadow:0 12px 25px rgba(0,0,0,.35);
z-index:999;
}

.nav-item{
display:flex;
flex-direction:column;
align-items:center;
justify-content:center;
color:#bbb;
cursor:pointer;
transition:.3s;
width:90px;
height:65px;
border-radius:25px;
position:relative;
}

.nav-item i{
font-size:22px;
margin-bottom:5px;
transition:.3s;
}

.nav-item span{
font-size:13px;
font-weight:bold;
}

.nav-item.active{
color:white;
transform:translateY(-10px);
}

.nav-item.active i{
color:#ff8800;
transform:scale(1.2);
}

.nav-item.active::before{
content:"";
position:absolute;
width:55px;
height:55px;
background:linear-gradient(
135deg,
#ff8800,
#ffb300
);
border-radius:50%;
z-index:-1;
animation:pulse 1.5s infinite;
}

@keyframes pulse{

0%{
transform:scale(1);
opacity:.7;
}

100%{
transform:scale(1.35);
opacity:0;
}

}

.empty{
padding:30px;
text-align:center;
color:white;
}

</style>

</head>

<body>

<!-- الرئيسية -->

<div id="homePage"
class="page active-page">

<div class="header">

<div class="header-box">

<div class="header-text">

<h2 id="welcomeText">

اهلاً بك 👋

</h2>

<p>

اطلب كل ما تحتاجه بسهولة

</p>

</div>

<img
src="user.png"
id="userImage"
class="user-image">

</div>

</div>

<div class="search-area">

<div class="search-box">

<i class="fa-solid fa-magnifying-glass"></i>

<input
type="text"
id="searchInput"
placeholder="ابحث عن متجر">

</div>

</div>

<div class="filters">

<button
class="filter-btn active"
data-category="all">

الكل

</button>

<button
class="filter-btn"
data-category="مطعم">

مطاعم

</button>

<button
class="filter-btn"
data-category="ماركت">

ماركت

</button>

<button
class="filter-btn"
data-category="صيدلية">

صيدليات

</button>

<button
class="filter-btn"
data-category="الكترونيات">

الكترونيات

</button>

</div>

<div
id="storesContainer"
class="stores-container">

</div>

</div>

<!-- السلة -->

<div id="cartPage"
class="page">

<div
id="cartContainer"
class="cart-container">

</div>

<button
class="send-order"
onclick="sendOrder()">

ارسال الطلب

</button>

</div>

<!-- الحساب -->

<div id="accountPage"
class="page">

<div class="account-card">

<img
src="user.png"
id="accountImage"
class="account-image">

<h2 id="accountName">

اسم المستخدم

</h2>

<div class="account-info">

<p id="accountPhone"></p>

<p id="accountAddress"></p>

<p id="accountType"></p>

</div>

<button
class="logout-btn"
onclick="logout()">

تسجيل الخروج

</button>

</div>

</div>

<!-- البار السفلي -->

<div class="bottom-bar">

<div
class="nav-item active"
onclick="showPage('homePage',this)">

<i class="fa-solid fa-house"></i>

<span>

الرئيسية

</span>

</div>

<div
class="nav-item"
onclick="showPage('cartPage',this)">

<i class="fa-solid fa-cart-shopping"></i>

<span>

السلة

</span>

</div>

<div
class="nav-item"
onclick="showPage('accountPage',this)">

<i class="fa-solid fa-user"></i>

<span>

الحساب

</span>

</div>

</div>

<script type="module">

import { initializeApp }
from
"https://www.gstatic.com/firebasejs/12.13.0/firebase-app.js";

import {
getDatabase,
ref,
get,
child,
set
}
from
"https://www.gstatic.com/firebasejs/12.13.0/firebase-database.js";

const firebaseConfig = {

apiKey:
"AIzaSyC7QzQTYMSGRV_nraJBneBqDqYGhugF0Pw",

authDomain:
"fast-937c9.firebaseapp.com",

projectId:
"fast-937c9",

storageBucket:
"fast-937c9.firebasestorage.app",

messagingSenderId:
"221388561840",

appId:
"1:221388561840:web:ec9d75183ddd7d44be0a75",

databaseURL:
"https://fast-937c9-default-rtdb.europe-west1.firebasedatabase.app"

};

const app =
initializeApp(firebaseConfig);

const database =
getDatabase(app);

// التحقق من الجلسة

const currentUser =
JSON.parse(
localStorage.getItem("user")
);

if(!currentUser){

window.location.href =
"index.html";

}

// بيانات الحساب

document.getElementById("welcomeText")
.innerHTML =

`اهلاً ${currentUser.name || currentUser.owner}`;

document.getElementById("accountName")
.innerHTML =

currentUser.name ||
currentUser.owner;

document.getElementById("accountPhone")
.innerHTML =

`📞 ${currentUser.phone}`;

document.getElementById("accountAddress")
.innerHTML =

`📍 ${currentUser.address || "لا يوجد عنوان"}`;

document.getElementById("accountType")
.innerHTML =

`👤 ${currentUser.type}`;

if(currentUser.image){

document.getElementById("userImage")
.src = currentUser.image;

document.getElementById("accountImage")
.src = currentUser.image;

}

// تغيير الصفحات

window.showPage =
function(pageId,element){

document.querySelectorAll(".page")
.forEach(page=>{

page.classList.remove("active-page");

});

document.getElementById(pageId)
.classList.add("active-page");

document.querySelectorAll(".nav-item")
.forEach(item=>{

item.classList.remove("active");

});

element.classList.add("active");

};

// تحميل المتاجر

const storesContainer =
document.getElementById("storesContainer");

let allStores = [];

async function loadStores(){

const snapshot =
await get(
child(ref(database),"stores")
);

if(snapshot.exists()){

const stores =
snapshot.val();

allStores = [];

for(let key in stores){

const store =
stores[key];

if(store.status === "active"){

allStores.push(store);

}

}

renderStores(allStores);

}

}

loadStores();

// عرض المتاجر

function renderStores(stores){

storesContainer.innerHTML = "";

if(stores.length === 0){

storesContainer.innerHTML =

`<div class="empty">
لا توجد متاجر
</div>`;

return;

}

stores.forEach(store=>{

storesContainer.innerHTML += `

<div class="store-card">

<img
src="${
store.image || "store.png"
}"
class="store-image">

<div class="store-info">

<div class="store-top">

<h3>

${store.store_name}

</h3>

<img
src="ok.png"
class="verify">

</div>

<div class="store-category">

${store.category}

</div>

<div class="store-distance">

📍 يبعد عنك تقريباً
${Math.floor(Math.random()*10)+1}
كم

</div>

<button
class="add-btn"
onclick='addToCart(${JSON.stringify(store)})'>

اضافة للسلة

</button>

</div>

</div>

`;

});

}

// البحث

document.getElementById("searchInput")
.addEventListener("input",function(){

let value =
this.value.toLowerCase();

let filtered =
allStores.filter(store=>

store.store_name
.toLowerCase()
.includes(value)

);

renderStores(filtered);

});

// الفلترة

document.querySelectorAll(".filter-btn")
.forEach(button=>{

button.addEventListener("click",()=>{

document.querySelectorAll(".filter-btn")
.forEach(btn=>{

btn.classList.remove("active");

});

button.classList.add("active");

let category =
button.dataset.category;

if(category === "all"){

renderStores(allStores);

}else{

let filtered =
allStores.filter(store=>

store.category === category

);

renderStores(filtered);

}

});

});

// السلة

let cart =

JSON.parse(
localStorage.getItem("cart")
) || [];

window.addToCart =
function(store){

cart.push(store);

localStorage.setItem(
"cart",
JSON.stringify(cart)
);

loadCart();

};

function loadCart(){

const cartContainer =
document.getElementById("cartContainer");

cartContainer.innerHTML = "";

if(cart.length === 0){

cartContainer.innerHTML =

`<div class="empty">
السلة فارغة
</div>`;

return;

}

cart.forEach((item,index)=>{

cartContainer.innerHTML += `

<div class="cart-item">

<img
src="${
item.image || "store.png"
}"
class="cart-image">

<div class="cart-info">

<h3>

${item.store_name}

</h3>

<p>

${item.category}

</p>

</div>

<button
class="delete-btn"
onclick="removeCart(${index})">

حذف

</button>

</div>

`;

});

}

loadCart();

window.removeCart =
function(index){

cart.splice(index,1);

localStorage.setItem(
"cart",
JSON.stringify(cart)
);

loadCart();

};

// ارسال الطلب

window.sendOrder =
async function(){

if(cart.length === 0){

alert("السلة فارغة");

return;

}

let orderId =
"ORDER"+Date.now();

let orderData = {

id:orderId,

customerId:
currentUser.id,

customerName:
currentUser.name,

customerPhone:
currentUser.phone,

orders:cart,

status:"pending",

createdAt:Date.now()

};

await set(

ref(database,"orders/"+orderId),

orderData

);

cart = [];

localStorage.removeItem("cart");

loadCart();

alert("تم ارسال الطلب");

};

// تسجيل الخروج

window.logout = function(){

localStorage.removeItem("user");

window.location.href =
"index.html";

};

</script>

</body>

</html>
