<!-- home.html -->

<!DOCTYPE html>
<html lang="ar" dir="rtl">

<head>

<meta charset="UTF-8">

<meta name="viewport"
content="width=device-width, initial-scale=1.0">

<title>
عالسريع
</title>

<link rel="stylesheet"
href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css"/>

<link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;500;600;700&display=swap"
rel="stylesheet">

<style>

*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:'Cairo',sans-serif;
}

body{
background:#f7f7f7;
padding-bottom:110px;
overflow-x:hidden;
}

.page{
display:none;
}

.active-page{
display:block;
}

.header{
background:linear-gradient(135deg,#ff8800,#ff5500);
padding:20px;
border-bottom-left-radius:35px;
border-bottom-right-radius:35px;
color:white;
box-shadow:0 8px 30px rgba(0,0,0,.15);
}

.header-top{
display:flex;
justify-content:space-between;
align-items:center;
}

.user-image{
width:65px;
height:65px;
border-radius:50%;
border:3px solid white;
object-fit:cover;
}

.search-box{
margin-top:18px;
background:white;
padding:15px;
border-radius:18px;
display:flex;
align-items:center;
}

.search-box i{
color:#ff8800;
font-size:18px;
}

.search-box input{
border:none;
outline:none;
width:100%;
margin-right:10px;
font-size:15px;
}

.filters{
display:flex;
gap:10px;
overflow:auto;
padding:15px;
}

.filters::-webkit-scrollbar{
display:none;
}

.filter-btn{
border:none;
padding:10px 18px;
border-radius:14px;
background:#eee;
font-weight:bold;
cursor:pointer;
white-space:nowrap;
}

.filter-btn.active{
background:#ff8800;
color:white;
}

.stores-container{
padding:15px;
display:flex;
flex-direction:column;
gap:18px;
}

.store-card{
background:white;
padding:15px;
border-radius:28px;
box-shadow:0 5px 20px rgba(0,0,0,.08);
position:relative;
overflow:hidden;
cursor:pointer;
border:3px solid transparent;
}

.vip-store{
background:
linear-gradient(#fff,#fff) padding-box,
linear-gradient(
135deg,
#ff0000,
#000000,
#ff8800,
#000000,
#ff2200
) border-box;

background-size:300% 300%;
animation:vipMove 5s ease infinite;
}

@keyframes vipMove{

0%{
background-position:0% 50%;
}

50%{
background-position:100% 50%;
}

100%{
background-position:0% 50%;
}

}

.vip-badge{
position:absolute;
bottom:12px;
left:12px;
background:linear-gradient(135deg,#ff0000,#000,#ff8800);
padding:8px 16px;
border-radius:16px;
display:flex;
align-items:center;
gap:8px;
color:white;
font-weight:bold;
box-shadow:0 5px 20px rgba(0,0,0,.25);
animation:vipPulse 2s infinite;
z-index:10;
}

@keyframes vipPulse{

0%{
transform:scale(1);
}

50%{
transform:scale(1.07);
}

100%{
transform:scale(1);
}

}

.store-header{
display:flex;
gap:15px;
align-items:center;
}

.store-image{
width:95px;
height:95px;
border-radius:22px;
object-fit:cover;
}

.store-info{
flex:1;
}

.store-name{
display:flex;
align-items:center;
gap:6px;
margin-bottom:8px;
}

.store-name h3{
font-size:20px;
}

.ok-icon{
width:18px;
height:18px;
object-fit:contain;
}

.store-info p{
font-size:14px;
color:#666;
margin-bottom:4px;
}

/* صفحة المتجر */

.single-store-page{
display:none;
position:fixed;
top:0;
left:0;
right:0;
bottom:0;
background:#f7f7f7;
z-index:999;
overflow-y:auto;
padding-bottom:120px;
animation:openPage .25s ease;
}

@keyframes openPage{

from{
transform:translateX(100px);
opacity:0;
}

to{
transform:translateX(0);
opacity:1;
}

}

.store-top-bar{
background:linear-gradient(135deg,#ff8800,#ff5500);
padding:20px;
display:flex;
align-items:center;
gap:15px;
color:white;
border-bottom-left-radius:30px;
border-bottom-right-radius:30px;
position:sticky;
top:0;
z-index:20;
}

.back-btn{
width:45px;
height:45px;
border-radius:50%;
border:none;
background:white;
color:#ff6600;
font-size:18px;
cursor:pointer;
}

.single-store-info{
display:flex;
align-items:center;
gap:12px;
}

.single-store-image{
width:70px;
height:70px;
border-radius:18px;
object-fit:cover;
border:3px solid white;
}

/* المنتجات */

.products-container{
padding:15px;
display:flex;
flex-direction:column;
gap:18px;
}

.product-card{
background:white;
padding:15px;
border-radius:25px;
box-shadow:0 5px 20px rgba(0,0,0,.08);
}

.product-image{
width:100%;
height:220px;
object-fit:cover;
border-radius:20px;
margin-bottom:12px;
}

.product-name{
font-size:20px;
font-weight:bold;
margin-bottom:8px;
}

.product-desc{
font-size:14px;
color:#666;
line-height:1.7;
margin-bottom:10px;
}

.product-price{
font-size:20px;
font-weight:bold;
color:#ff8800;
margin-bottom:12px;
}

.qty-box{
display:flex;
justify-content:space-between;
align-items:center;
margin-bottom:15px;
}

.qty-controller{
display:flex;
align-items:center;
gap:10px;
background:#f2f2f2;
padding:6px 10px;
border-radius:16px;
}

.qty-btn{
width:34px;
height:34px;
border:none;
border-radius:10px;
background:#ff8800;
color:white;
font-size:20px;
font-weight:bold;
cursor:pointer;
}

.qty-input{
width:45px;
height:34px;
text-align:center;
border:none;
background:white;
border-radius:10px;
font-size:16px;
font-weight:bold;
}

.add-btn{
width:100%;
padding:15px;
border:none;
border-radius:16px;
background:#00b894;
color:white;
font-size:16px;
font-weight:bold;
cursor:pointer;
}

/* السلة */

.cart-container{
padding:15px;
display:flex;
flex-direction:column;
gap:15px;
}

.cart-item{
background:white;
padding:15px;
border-radius:22px;
display:flex;
gap:15px;
align-items:center;
box-shadow:0 5px 20px rgba(0,0,0,.08);
}

.cart-image{
width:80px;
height:80px;
border-radius:16px;
object-fit:cover;
}

.cart-info{
flex:1;
}

.delete-btn{
background:red;
border:none;
padding:10px 14px;
border-radius:12px;
color:white;
cursor:pointer;
}

.summary-box{
background:white;
margin:15px;
padding:20px;
border-radius:25px;
}

.tip-input{
width:100%;
padding:14px;
border-radius:14px;
border:1px solid #ddd;
margin:15px 0;
}

.send-order{
width:100%;
padding:16px;
border:none;
border-radius:16px;
background:#00b894;
color:white;
font-size:17px;
font-weight:bold;
cursor:pointer;
}

/* الحساب */

.account-card{
margin:20px;
background:white;
padding:25px;
border-radius:30px;
text-align:center;
}

.account-image{
width:110px;
height:110px;
border-radius:50%;
border:4px solid #ff8800;
margin-bottom:15px;
object-fit:cover;
}

.logout-btn{
width:100%;
padding:16px;
border:none;
border-radius:16px;
background:red;
color:white;
font-size:16px;
font-weight:bold;
margin-top:20px;
cursor:pointer;
}

/* البار السفلي */

.bottom-bar{
position:fixed;
bottom:0;
left:0;
right:0;
height:85px;
background:white;
display:flex;
justify-content:space-around;
align-items:center;
box-shadow:0 -5px 20px rgba(0,0,0,.08);
z-index:1000;
}

.nav-item{
display:flex;
flex-direction:column;
align-items:center;
color:#888;
cursor:pointer;
}

.nav-item.active{
color:#ff8800;
}

.nav-item i{
font-size:22px;
margin-bottom:5px;
}

.empty{
text-align:center;
padding:40px;
color:#777;
}

</style>

</head>

<body>

<!-- الرئيسية -->

<div id="homePage"
class="page active-page">

<div class="header">

<div class="header-top">

<div>

<h2 id="welcomeText">
اهلاً بك
</h2>

<p>
اطلب كل ما تحتاجه 🚀
</p>

</div>

<img
src="user.png"
class="user-image">

</div>

<div class="search-box">

<i class="fa-solid fa-magnifying-glass"></i>

<input
type="text"
id="searchInput"
placeholder="ابحث عن متجر">

</div>

</div>

<div class="filters"></div>

<div id="storesContainer"
class="stores-container"></div>

</div>

<!-- صفحة المتجر -->

<div id="singleStorePage"
class="single-store-page">

<div class="store-top-bar">

<button class="back-btn"
onclick="backHome()">

<i class="fa-solid fa-arrow-right"></i>

</button>

<div class="single-store-info">

<img
id="singleStoreImage"
src="store.png"
class="single-store-image">

<div>

<h2 id="singleStoreName">
اسم المتجر
</h2>

<p id="singleStoreCategory">
القسم
</p>

</div>

</div>

</div>

<div id="singleProductsContainer"
class="products-container"></div>

</div>

<!-- السلة -->

<div id="cartPage"
class="page">

<div id="cartContainer"
class="cart-container">

<div class="empty">
السلة فارغة
</div>

</div>

<div class="summary-box">

<p>
المجموع :
<span id="itemsTotal">
0
</span>
د.ع
</p>

<p>
اجرة التوصيل : 3000 د.ع
</p>

<input
type="number"
id="tipInput"
class="tip-input"
placeholder="اكرامية للسائق">

<h2>
المبلغ الكلي :
<span id="finalTotal">
3000
</span>
د.ع
</h2>

<br>

<button
class="send-order"
onclick="sendOrder()">

طلب توصيل 🚀

</button>

</div>

</div>

<!-- الحساب -->

<div id="accountPage"
class="page">

<div class="account-card">

<img
src="user.png"
class="account-image">

<h2 id="accountName">
اسم المستخدم
</h2>

<br>

<p id="accountPhone"></p>

<p id="accountAddress"></p>

<p id="accountType"></p>

<button
class="logout-btn"
onclick="logout()">

تسجيل الخروج

</button>

</div>

</div>

<!-- البار السفلي -->

<div class="bottom-bar">

<div
class="nav-item active"
onclick="showPage('homePage',this)">

<i class="fa-solid fa-house"></i>

<span>
الرئيسية
</span>

</div>

<div
class="nav-item"
onclick="showPage('cartPage',this)">

<i class="fa-solid fa-cart-shopping"></i>

<span>
السلة
</span>

</div>

<div
class="nav-item"
onclick="showPage('accountPage',this)">

<i class="fa-solid fa-user"></i>

<span>
الحساب
</span>

</div>

</div>

</body>

</html>
