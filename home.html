<!-- store.html -->

<!DOCTYPE html>
<html lang="ar" dir="rtl">

<head>

<meta charset="UTF-8">

<meta name="viewport"
content="width=device-width, initial-scale=1.0">

<title>
لوحة تحكم المتجر
</title>

<link rel="preconnect"
href="https://fonts.googleapis.com">

<link rel="preconnect"
href="https://fonts.gstatic.com"
crossorigin>

<link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;500;700&display=swap"
rel="stylesheet">

<link rel="stylesheet"
href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css"/>

<style>

*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:'Cairo',sans-serif;
}

body{
background:#f5f7fb;
padding:20px;
padding-bottom:120px;
}

.header{
background:linear-gradient(
135deg,
#ff8800,
#ff5500
);
padding:25px;
border-radius:30px;
display:flex;
justify-content:space-between;
align-items:center;
color:white;
margin-bottom:20px;
position:relative;
overflow:hidden;
}

.vip-header{
animation:vipGlow 3s linear infinite;
}

.vip-header::before{
content:"";
position:absolute;
top:-4px;
left:-4px;
right:-4px;
bottom:-4px;
background:linear-gradient(
90deg,
#ff0000,
#000000,
#ff8800,
#000000,
#ffcc00,
#ff0000
);
background-size:400%;
animation:borderMove 4s linear infinite;
z-index:-1;
}

@keyframes borderMove{

0%{
background-position:0%;
}

100%{
background-position:400%;
}

}

@keyframes vipGlow{

0%{
box-shadow:0 0 15px rgba(255,0,0,.3);
}

50%{
box-shadow:0 0 35px rgba(255,136,0,.5);
}

100%{
box-shadow:0 0 15px rgba(0,0,0,.3);
}

}

.store-info{
display:flex;
align-items:center;
gap:15px;
}

.store-image{
width:90px;
height:90px;
border-radius:20px;
object-fit:cover;
border:3px solid white;
}

.store-details h2{
font-size:24px;
margin-bottom:5px;
display:flex;
align-items:center;
gap:8px;
}

.verify-icon{
width:20px;
height:20px;
}

.store-details p{
font-size:14px;
}

.vip-badge{
margin-top:8px;
display:inline-block;
background:black;
padding:8px 15px;
border-radius:14px;
font-size:13px;
font-weight:bold;
}

.logout-btn{
background:white;
border:none;
padding:12px 18px;
border-radius:14px;
font-weight:bold;
cursor:pointer;
color:#ff5500;
}

.stats{
display:grid;
grid-template-columns:repeat(2,1fr);
gap:15px;
margin-bottom:20px;
}

.stat-card{
background:white;
padding:20px;
border-radius:25px;
box-shadow:0 5px 20px rgba(0,0,0,.08);
text-align:center;
}

.stat-card h3{
font-size:16px;
margin-bottom:10px;
color:#666;
}

.stat-card p{
font-size:24px;
font-weight:bold;
color:#ff8800;
}

.add-product-box{
background:white;
padding:20px;
border-radius:30px;
box-shadow:0 5px 20px rgba(0,0,0,.08);
margin-bottom:20px;
}

.section-title{
font-size:22px;
margin-bottom:20px;
color:#ff8800;
font-weight:bold;
}

.input-group{
margin-bottom:15px;
}

.input-group label{
display:block;
margin-bottom:8px;
font-weight:bold;
}

.input-group input,
.input-group textarea{
width:100%;
padding:15px;
border-radius:15px;
border:1px solid #ddd;
outline:none;
font-size:15px;
}

textarea{
resize:none;
height:120px;
}

.add-btn{
width:100%;
padding:16px;
border:none;
border-radius:18px;
background:#ff8800;
color:white;
font-size:16px;
font-weight:bold;
cursor:pointer;
}

.products-container{
display:flex;
flex-direction:column;
gap:15px;
}

.product-card{
background:white;
padding:15px;
border-radius:25px;
box-shadow:0 5px 20px rgba(0,0,0,.08);
display:flex;
gap:15px;
align-items:center;
}

.product-image{
width:120px;
height:120px;
border-radius:20px;
object-fit:cover;
}

.product-info{
flex:1;
}

.product-info h3{
font-size:20px;
margin-bottom:8px;
}

.product-info p{
font-size:14px;
color:#666;
margin-bottom:6px;
}

.status{
padding:8px 14px;
border-radius:12px;
display:inline-block;
font-size:13px;
font-weight:bold;
margin-top:8px;
}

.pending{
background:#fff3cd;
color:#856404;
}

.active{
background:#d4edda;
color:#155724;
}

.rejected{
background:#f8d7da;
color:#721c24;
}

.empty{
background:white;
padding:40px;
border-radius:25px;
text-align:center;
color:#666;
}

</style>

</head>

<body>

<div
id="header"
class="header">

<div class="store-info">

<img
src="store.png"
id="storeImage"
class="store-image">

<div class="store-details">

<h2>

<span id="storeName">
اسم المتجر
</span>

<img
src="ok.png"
class="verify-icon">

</h2>

<p id="ownerName">
صاحب المتجر
</p>

<div id="vipBadge"></div>

</div>

</div>

<button
class="logout-btn"
onclick="logout()">

تسجيل الخروج

</button>

</div>

<div class="stats">

<div class="stat-card">

<h3>
مبيعات هذا الشهر
</h3>

<p id="salesTotal">
0 د.ع
</p>

</div>

<div class="stat-card">

<h3>
عدد الطلبات المكتملة
</h3>

<p id="ordersCount">
0
</p>

</div>

</div>

<div class="add-product-box">

<div class="section-title">
اضافة منتج جديد
</div>

<div class="input-group">

<label>
صورة المنتج
</label>

<input
type="file"
id="productImage">

</div>

<div class="input-group">

<label>
اسم المنتج
</label>

<input
type="text"
id="productName"
placeholder="اسم المنتج">

</div>

<div class="input-group">

<label>
سعر المنتج
</label>

<input
type="number"
id="productPrice"
placeholder="سعر المنتج">

</div>

<div class="input-group">

<label>
شرح المنتج
</label>

<textarea
id="productDescription"
placeholder="اكتب شرح عن المنتج">

</textarea>

</div>

<button
class="add-btn"
onclick="addProduct()">

رفع طلب اضافة المنتج

</button>

</div>

<div class="section-title">
منتجات المتجر
</div>

<div
id="productsContainer"
class="products-container">

</div>

<script type="module">

import { initializeApp }
from
"https://www.gstatic.com/firebasejs/12.13.0/firebase-app.js";

import {
getDatabase,
ref,
set,
get,
child
}
from
"https://www.gstatic.com/firebasejs/12.13.0/firebase-database.js";

const firebaseConfig = {

apiKey:
"AIzaSyC7QzQTYMSGRV_nraJBneBqDqYGhugF0Pw",

authDomain:
"fast-937c9.firebaseapp.com",

projectId:
"fast-937c9",

storageBucket:
"fast-937c9.firebasestorage.app",

messagingSenderId:
"221388561840",

appId:
"1:221388561840:web:ec9d75183ddd7d44be0a75",

databaseURL:
"https://fast-937c9-default-rtdb.europe-west1.firebasedatabase.app"

};

const app =
initializeApp(firebaseConfig);

const database =
getDatabase(app);

// =========================
// جلب الجلسة
// =========================

const currentUser =
JSON.parse(
localStorage.getItem("user")
);

// اذا ماكو جلسة
if(!currentUser){

window.location.href =
"index.html";

}

// اذا الحساب زبون
if(currentUser.type === "customer"){

window.location.href =
"home.html";

}

// اذا الحساب سائق
if(currentUser.type === "driver"){

window.location.href =
"driver.html";

}

// اذا الحساب ادمن
if(currentUser.type === "admin"){

window.location.href =
"add.html";

}

// اذا مو متجر
if(currentUser.type !== "store"){

localStorage.removeItem("user");

window.location.href =
"index.html";

}

// =========================
// جلب بيانات المتجر
// =========================

let storeSnapshot;

try{

storeSnapshot =
await get(
child(
ref(database),
"stores/"+currentUser.id
)
);

}catch(error){

console.log(error);

alert("حدث خطأ بالاتصال");

window.location.href =
"index.html";

}

// اذا المتجر محذوف
if(!storeSnapshot.exists()){

alert("هذا الحساب غير موجود");

localStorage.removeItem("user");

window.location.href =
"index.html";

}

const freshStore =
storeSnapshot.val();

// =========================
// التحقق من الحالة
// =========================

if(
freshStore.status === "pending"
){

alert(
"بانتظار موافقة الادمن على حساب المتجر"
);

window.location.href =
"index.html";

}

if(
freshStore.status === "disabled"
){

alert(
"تم تعطيل حساب المتجر"
);

localStorage.removeItem("user");

window.location.href =
"index.html";

}

if(
freshStore.status === "banned"
){

alert(
"تم حظر حساب المتجر"
);

localStorage.removeItem("user");

window.location.href =
"index.html";

}

if(
freshStore.status !== "active"
){

alert(
"الحساب غير مفعل"
);

localStorage.removeItem("user");

window.location.href =
"index.html";

}

// =========================
// انتهاء الاشتراك
// =========================

if(freshStore.expireDate){

let today =
new Date()
.toISOString()
.split("T")[0];

if(today > freshStore.expireDate){

alert(
"انتهت صلاحية المتجر"
);

localStorage.removeItem("user");

window.location.href =
"index.html";

}

}

// =========================
// تحديث الجلسة
// =========================

localStorage.setItem(
"user",
JSON.stringify(freshStore)
);

// =========================
// عرض البيانات
// =========================

document.getElementById("storeName")
.innerHTML =
freshStore.store_name;

document.getElementById("ownerName")
.innerHTML =
`صاحب المتجر : ${freshStore.owner}`;

if(freshStore.image){

document.getElementById("storeImage")
.src =
freshStore.image;

}

// =========================
// VIP
// =========================

let vipActive = false;

if(
freshStore.accountType === "vip"
){

if(freshStore.vipExpireDate){

let today =
new Date()
.toISOString()
.split("T")[0];

if(today <= freshStore.vipExpireDate){

vipActive = true;

}

}else{

vipActive = true;

}

}

if(vipActive){

document.getElementById("header")
.classList.add("vip-header");

document.getElementById("vipBadge")
.innerHTML =

`
<div class="vip-badge">
🔥 متجر VIP
</div>
`;

}

// =========================
// الاحصائيات
// =========================

async function loadStats(){

let totalSales = 0;

let totalOrders = 0;

const snapshot =
await get(
child(ref(database),"orders")
);

if(snapshot.exists()){

const orders =
snapshot.val();

for(let key in orders){

const order =
orders[key];

if(
order.status === "completed"
){

order.items.forEach(item=>{

if(
item.storeName ===
freshStore.store_name
){

totalSales +=
item.price * item.qty;

totalOrders++;

}

});

}

}

}

document.getElementById("salesTotal")
.innerHTML =
`${totalSales} د.ع`;

document.getElementById("ordersCount")
.innerHTML =
totalOrders;

}

loadStats();

// =========================
// اضافة منتج
// =========================

window.addProduct =
async function(){

const name =
document.getElementById("productName")
.value;

const price =
document.getElementById("productPrice")
.value;

const description =
document.getElementById("productDescription")
.value;

const imageFile =
document.getElementById("productImage")
.files[0];

if(
name === "" ||
price === "" ||
description === ""
){

alert("املأ جميع الحقول");

return;

}

let imageUrl =
"product.png";

if(imageFile){

imageUrl =
URL.createObjectURL(imageFile);

}

let productId =
"PROD"+Date.now();

let productData = {

id:productId,

storeId:
freshStore.id,

storeName:
freshStore.store_name,

name:name,

price:price,

description:description,

image:imageUrl,

status:"pending",

createdAt:Date.now()

};

await set(

ref(
database,
"store_products/"+freshStore.id+"/"+productId
),

productData

);

document.getElementById("productName")
.value = "";

document.getElementById("productPrice")
.value = "";

document.getElementById("productDescription")
.value = "";

document.getElementById("productImage")
.value = "";

alert(
"تم رفع المنتج وبانتظار موافقة الادمن"
);

loadProducts();

};

// =========================
// تحميل المنتجات
// =========================

async function loadProducts(){

const container =
document.getElementById("productsContainer");

container.innerHTML = "";

const snapshot =
await get(
child(
ref(database),
"store_products/"+freshStore.id
)
);

if(snapshot.exists()){

const products =
snapshot.val();

for(let key in products){

const product =
products[key];

let statusText = "";
let statusClass = "";

if(product.status === "pending"){

statusText =
"بانتظار الموافقة";

statusClass =
"pending";

}

if(product.status === "active"){

statusText =
"تمت الموافقة";

statusClass =
"active";

}

if(product.status === "rejected"){

statusText =
"تم رفض المنتج";

statusClass =
"rejected";

}

container.innerHTML += `

<div class="product-card">

<img
src="${product.image}"
class="product-image">

<div class="product-info">

<h3>
${product.name}
</h3>

<p>
💰 السعر :
${product.price}
د.ع
</p>

<p>
📝 ${product.description}
</p>

<div
class="status ${statusClass}">

${statusText}

</div>

</div>

</div>

`;

}

}else{

container.innerHTML =

`<div class="empty">
لا توجد منتجات حالياً
</div>`;

}

}

loadProducts();

// =========================
// تسجيل خروج
// =========================

window.logout =
function(){

localStorage.removeItem("user");

window.location.href =
"index.html";

};

</script>

</body>

</html>
