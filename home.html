<!-- home.html -->

<!DOCTYPE html>
<html lang="ar" dir="rtl">

<head>

<meta charset="UTF-8">

<meta name="viewport"
content="width=device-width, initial-scale=1.0">

<title>
عالسريع
</title>

<link rel="stylesheet"
href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css"/>

<link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;500;600;700&display=swap"
rel="stylesheet">

<style>

*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:'Cairo',sans-serif;
}

body{
background:#f7f7f7;
padding-bottom:110px;
overflow-x:hidden;
}

.page{
display:none;
}

.active-page{
display:block;
}

.header{
background:linear-gradient(135deg,#ff8800,#ff5500);
padding:20px;
border-bottom-left-radius:30px;
border-bottom-right-radius:30px;
color:white;
}

.header-top{
display:flex;
justify-content:space-between;
align-items:center;
}

.search-box{
margin-top:18px;
background:white;
padding:14px;
border-radius:16px;
display:flex;
align-items:center;
}

.search-box input{
border:none;
outline:none;
width:100%;
font-size:15px;
margin-right:10px;
}

.filters{
display:flex;
gap:10px;
overflow:auto;
padding:15px;
}

.filters::-webkit-scrollbar{
display:none;
}

.filter-btn{
border:none;
padding:10px 18px;
border-radius:14px;
background:#eee;
font-weight:bold;
cursor:pointer;
white-space:nowrap;
}

.filter-btn.active{
background:#ff8800;
color:white;
}

.stores-container{
padding:15px;
display:flex;
flex-direction:column;
gap:14px;
}

.store-card{
background:white;
padding:14px;
border-radius:22px;
box-shadow:0 5px 18px rgba(0,0,0,.06);
cursor:pointer;
}

.store-header{
display:flex;
gap:12px;
align-items:center;
}

.store-image{
width:80px;
height:80px;
border-radius:18px;
object-fit:cover;
background:#eee;
}

.store-info{
flex:1;
}

.store-name{
display:flex;
align-items:center;
justify-content:space-between;
margin-bottom:5px;
}

.store-name h3{
font-size:17px;
}

.store-category{
font-size:13px;
color:#666;
margin-bottom:6px;
}

.store-distance{
font-size:12px;
color:#ff8800;
font-weight:bold;
}

.store-status{
margin-top:10px;
display:inline-flex;
align-items:center;
gap:6px;
padding:5px 10px;
border-radius:12px;
font-size:12px;
font-weight:bold;
background:#f3f3f3;
}

.status-dot{
width:10px;
height:10px;
border-radius:50%;
}

.open-dot{
background:#00c853;
}

.closed-dot{
background:red;
}

.single-store-page{
display:none;
position:fixed;
top:0;
left:0;
right:0;
bottom:0;
background:#f7f7f7;
z-index:999;
overflow-y:auto;
padding-bottom:120px;
}

.store-top-bar{
background:linear-gradient(135deg,#ff8800,#ff5500);
padding:18px;
display:flex;
align-items:center;
gap:12px;
color:white;
position:sticky;
top:0;
z-index:100;
}

.back-btn{
width:42px;
height:42px;
border:none;
border-radius:50%;
background:white;
color:#ff6600;
font-size:18px;
cursor:pointer;
}

.products-container{
padding:15px;
display:flex;
flex-direction:column;
gap:14px;
}

.product-card{
background:white;
padding:12px;
border-radius:22px;
display:flex;
gap:12px;
align-items:center;
box-shadow:0 5px 18px rgba(0,0,0,.06);
}

.product-image{
width:95px;
height:95px;
object-fit:cover;
border-radius:18px;
background:#eee;
}

.product-content{
flex:1;
}

.product-name{
font-size:17px;
font-weight:bold;
margin-bottom:5px;
}

.product-price{
font-size:18px;
font-weight:bold;
color:#ff8800;
margin-bottom:5px;
}

.product-description{
font-size:13px;
color:#666;
margin-bottom:10px;
}

.qty-controller{
display:flex;
align-items:center;
gap:8px;
margin-bottom:10px;
}

.qty-btn{
width:32px;
height:32px;
border:none;
border-radius:10px;
background:#ff8800;
color:white;
font-size:18px;
cursor:pointer;
}

.qty-input{
width:45px;
height:32px;
text-align:center;
border:none;
background:#f2f2f2;
border-radius:10px;
font-weight:bold;
}

.add-btn{
width:100%;
padding:13px;
border:none;
border-radius:14px;
background:#00b894;
color:white;
font-size:15px;
font-weight:bold;
cursor:pointer;
}

.bottom-bar{
position:fixed;
bottom:0;
left:0;
right:0;
height:82px;
background:white;
display:flex;
justify-content:space-around;
align-items:center;
box-shadow:0 -5px 18px rgba(0,0,0,.08);
z-index:9999;
}

.nav-item{
display:flex;
flex-direction:column;
align-items:center;
color:#888;
cursor:pointer;
}

.nav-item.active{
color:#ff8800;
}

.nav-item i{
font-size:22px;
margin-bottom:5px;
}

.empty{
text-align:center;
padding:40px;
color:#777;
}

.closed-store{
opacity:.55;
pointer-events:none;
}

</style>

</head>

<body>

<div id="homePage"
class="page active-page">

<div class="header">

<div class="header-top">

<div>

<h2 id="welcomeText">
اهلاً بك
</h2>

<p>
اطلب كل ما تحتاجه 🚀
</p>

</div>

</div>

<div class="search-box">

<i class="fa-solid fa-magnifying-glass"></i>

<input
type="text"
id="searchInput"
placeholder="ابحث عن متجر">

</div>

</div>

<div class="filters"></div>

<div id="storesContainer"
class="stores-container"></div>

</div>

<div id="singleStorePage"
class="single-store-page">

<div class="store-top-bar">

<button
class="back-btn"
onclick="backHome()">

<i class="fa-solid fa-arrow-right"></i>

</button>

<div>

<h2 id="singleStoreName">
اسم المتجر
</h2>

<p id="singleStoreCategory">
القسم
</p>

</div>

</div>

<div id="singleProductsContainer"
class="products-container"></div>

</div>

<div class="bottom-bar">

<div
class="nav-item active">

<i class="fa-solid fa-house"></i>

<span>
الرئيسية
</span>

</div>

<div
class="nav-item"
onclick="window.location.href='cart.html'">

<i class="fa-solid fa-cart-shopping"></i>

<span>
السلة
</span>

</div>

<div
class="nav-item"
onclick="window.location.href='account.html'">

<i class="fa-solid fa-user"></i>

<span>
الحساب
</span>

</div>

</div>

<script type="module">

import { initializeApp }
from "https://www.gstatic.com/firebasejs/12.13.0/firebase-app.js";

import {
getDatabase,
ref,
get,
onValue
}
from "https://www.gstatic.com/firebasejs/12.13.0/firebase-database.js";

const firebaseConfig = {

apiKey:"AIzaSyC7QzQTYMSGRV_nraJBneBqDqYGhugF0Pw",

authDomain:"fast-937c9.firebaseapp.com",

projectId:"fast-937c9",

databaseURL:
"https://fast-937c9-default-rtdb.europe-west1.firebasedatabase.app"

};

const app =
initializeApp(firebaseConfig);

const database =
getDatabase(app);

const currentUser =
JSON.parse(localStorage.getItem("user"));

if(!currentUser){

window.location.href =
"index.html";

}

document.getElementById("welcomeText")
.innerHTML =
`اهلاً ${currentUser.name || "مستخدم"}`;

let allStores = [];

let userLatitude = null;
let userLongitude = null;

navigator.geolocation.getCurrentPosition(

(position)=>{

userLatitude =
position.coords.latitude;

userLongitude =
position.coords.longitude;

loadStores();

},

()=>{

alert("يرجى تشغيل GPS");

}

);

function calculateDistance(lat1,lon1,lat2,lon2){

const R = 6371;

const dLat =
(lat2-lat1) * Math.PI / 180;

const dLon =
(lon2-lon1) * Math.PI / 180;

const a =

Math.sin(dLat/2) *
Math.sin(dLat/2)

+

Math.cos(lat1 * Math.PI / 180)

*

Math.cos(lat2 * Math.PI / 180)

*

Math.sin(dLon/2)

*

Math.sin(dLon/2);

const c =
2 *
Math.atan2(
Math.sqrt(a),
Math.sqrt(1-a)
);

return R * c;

}

function isStoreOpen(store){

if(!store.workingHours){
return false;
}

const days = [

"الأحد",
"الاثنين",
"الثلاثاء",
"الأربعاء",
"الخميس",
"الجمعة",
"السبت"

];

const now =
new Date();

const currentDay =
days[now.getDay()];

const currentHour =
now.getHours();

let today =
store.workingHours.find(
d => d.day === currentDay
);

if(!today){
return false;
}

if(
today.from === "مغلق" ||
today.to === "مغلق"
){
return false;
}

function convert(time){

if(!time){
return 0;
}

let parts =
time.split(" ");

let hour =
parseInt(parts[0]);

let period =
parts[1];

if(period === "PM" && hour !== 12){
hour += 12;
}

if(period === "AM" && hour === 12){
hour = 0;
}

return hour;

}

const from =
convert(today.from);

const to =
convert(today.to);

return currentHour >= from &&
currentHour < to;

}

function loadStores(){

onValue(

ref(database,"users"),

(snapshot)=>{

allStores = [];

if(snapshot.exists()){

const data =
snapshot.val();

for(let key in data){

let store =
data[key];

if(store.type !== "store")
continue;

if(store.status !== "active")
continue;

const distance =
calculateDistance(

userLatitude,
userLongitude,

Number(store.location.latitude),
Number(store.location.longitude)

);

store.distance =
distance.toFixed(1);

store.id = key;

allStores.push(store);

}

allStores.sort((a,b)=>
a.distance - b.distance
);

generateFilters();

renderStores(allStores);

}

}

);

}

function generateFilters(){

const filters =
document.querySelector(".filters");

filters.innerHTML = "";

filters.innerHTML += `
<button
class="filter-btn active"
data-category="all">
الكل
</button>
`;

let categories = [];

allStores.forEach(store=>{

if(
store.category &&
!categories.includes(store.category)
){

categories.push(store.category);

}

});

categories.forEach(category=>{

filters.innerHTML += `
<button
class="filter-btn"
data-category="${category}">
${category}
</button>
`;

});

document.querySelectorAll(".filter-btn")
.forEach(button=>{

button.onclick = ()=>{

document.querySelectorAll(".filter-btn")
.forEach(btn=>{

btn.classList.remove("active");

});

button.classList.add("active");

let category =
button.dataset.category;

if(category === "all"){

renderStores(allStores);

}else{

renderStores(
allStores.filter(
store =>
store.category === category
)
);

}

};

});

}

function renderStores(stores){

const container =
document.getElementById("storesContainer");

container.innerHTML = "";

if(stores.length === 0){

container.innerHTML = `
<div class="empty">
لا توجد متاجر
</div>
`;

return;

}

stores.forEach(store=>{

const open =
isStoreOpen(store);

container.innerHTML += `

<div
class="
store-card
${!open ? "closed-store" : ""}
"
onclick="openStore('${store.id}')">

<div class="store-header">

<img
src="${store.image || "store.png"}"
class="store-image"
onerror="this.src='store.png'">

<div class="store-info">

<div class="store-name">

<h3>
${store.name || ""}
</h3>

<span class="store-distance">
📍 ${store.distance} كم
</span>

</div>

<div class="store-category">
${store.category || ""}
</div>

<div class="store-status">

<div class="
status-dot
${open ? "open-dot" : "closed-dot"}
"></div>

<span>
${open ? "مفتوح" : "مغلق"}
</span>

</div>

</div>

</div>

</div>

`;

});

}

document.getElementById("searchInput")
.addEventListener("input",function(){

let value =
this.value.toLowerCase();

let filtered =
allStores.filter(store=>

(store.name || "")
.toLowerCase()
.includes(value)

||

(store.category || "")
.toLowerCase()
.includes(value)

);

renderStores(filtered);

});

window.openStore =
async function(storeId){

const store =
allStores.find(
s => s.id === storeId
);

if(!store){
return;
}

document.getElementById("singleStorePage")
.style.display = "block";

document.getElementById("singleStoreName")
.innerHTML =
store.name || "";

document.getElementById("singleStoreCategory")
.innerHTML =
store.category || "";

const container =
document.getElementById("singleProductsContainer");

container.innerHTML = `
<div class="empty">
جاري تحميل المنتجات...
</div>
`;

const snapshot =
await get(
ref(
database,
"products/" + storeId
)
);

container.innerHTML = "";

if(!snapshot.exists()){

container.innerHTML = `
<div class="empty">
لا توجد منتجات
</div>
`;

return;

}

const products =
snapshot.val();

for(let key in products){

let product =
products[key];

product.id = key;

container.innerHTML += `

<div class="product-card">

<img
src="${product.image || "product.png"}"
class="product-image"
onerror="this.src='product.png'">

<div class="product-content">

<div class="product-name">
${product.name || ""}
</div>

<div class="product-price">
${Number(product.price || 0).toLocaleString()} د.ع
</div>

<div class="product-description">
${product.description || ""}
</div>

<div class="qty-controller">

<button
class="qty-btn"
onclick="decreaseQty('${product.id}')">

-

</button>

<input
type="text"
readonly
value="1"
id="qty_${product.id}"
class="qty-input">

<button
class="qty-btn"
onclick="increaseQty('${product.id}')">

+

</button>

</div>

<button
class="add-btn"
onclick='addToCart(${JSON.stringify(product)},${JSON.stringify(store)})'>

اضافة للسلة

</button>

</div>

</div>

`;

}

};

window.backHome =
function(){

document.getElementById("singleStorePage")
.style.display = "none";

};

window.increaseQty =
function(id){

const input =
document.getElementById(`qty_${id}`);

input.value =
Number(input.value) + 1;

};

window.decreaseQty =
function(id){

const input =
document.getElementById(`qty_${id}`);

if(Number(input.value) > 1){

input.value =
Number(input.value) - 1;

}

};

window.addToCart =
function(product,store){

let cart =
JSON.parse(
localStorage.getItem("cart")
) || [];

const qty =
Number(
document.getElementById(
`qty_${product.id}`
).value
);

const exists =
cart.find(item =>
item.id === product.id
);

if(exists){

exists.qty += qty;

}else{

cart.push({

id:product.id,
name:product.name,
price:product.price,
image:product.image || "",
description:product.description || "",

qty:qty,

storeId:store.id,
storeName:store.name

});

}

localStorage.setItem(
"cart",
JSON.stringify(cart)
);

alert("تمت الاضافة للسلة");

};

</script>

</body>

</html>
