<!-- home.html -->

<!DOCTYPE html>
<html lang="ar" dir="rtl">

<head>

    <meta charset="UTF-8">

    <meta name="viewport"
    content="width=device-width, initial-scale=1.0">

    <title>الرئيسية</title>

    <!-- ملف الستايل -->
    <link rel="stylesheet" href="home.css">

    <!-- خطوط -->
    <link rel="preconnect"
    href="https://fonts.googleapis.com">

    <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;700&display=swap"
    rel="stylesheet">

</head>

<body>

<!-- HEADER -->

<header class="header">

    <div class="header-top">

        <div>

            <h2 id="welcomeText">
                اهلاً بك 👋
            </h2>

            <p>
                اطلب كل ما تحتاجه بسهولة
            </p>

        </div>

        <img
        id="userImage"
        class="profile-image"
        src="user.png">

    </div>

</header>

<!-- SEARCH -->

<div class="search-box">

    <input
    type="text"
    placeholder="ابحث عن متجر ...">

</div>

<!-- STORES -->

<section class="stores-section">

    <div class="section-title">

        <h3>
            المتاجر المتاحة
        </h3>

    </div>

    <div
    class="stores-container"
    id="storesContainer">

    </div>

</section>

<!-- BOTTOM NAV -->

<nav class="bottom-nav">

    <a href="home.html"
    class="nav-item active">

        <img
        src="home.png"
        class="nav-icon">

        <span>
            الرئيسية
        </span>

    </a>

    <a href="cart.html"
    class="nav-item">

        <img
        src="cart.png"
        class="nav-icon">

        <span>
            السلة
        </span>

    </a>

    <a href="account.html"
    class="nav-item">

        <img
        src="user.png"
        class="nav-icon">

        <span>
            الحساب
        </span>

    </a>

</nav>

<!-- FIREBASE -->

<script type="module">

import { initializeApp }
from "https://www.gstatic.com/firebasejs/10.12.2/firebase-app.js";

import {

getFirestore,
collection,
getDocs

}
from "https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore.js";

import {

getAuth,
onAuthStateChanged

}
from "https://www.gstatic.com/firebasejs/10.12.2/firebase-auth.js";

/* Firebase Config */

const firebaseConfig = {

  apiKey: "ضع_apiKey",

  authDomain: "ضع_authDomain",

  projectId: "ضع_projectId",

  storageBucket: "ضع_storageBucket",

  messagingSenderId: "ضع_messagingSenderId",

  appId: "ضع_appId"

};

const app = initializeApp(firebaseConfig);

const db = getFirestore(app);

const auth = getAuth(app);

/* التحقق من تسجيل الدخول */

onAuthStateChanged(auth, async(user)=>{

    if(!user){

        window.location.href =
        "index.html";

        return;

    }

    document.getElementById("welcomeText")
    .innerHTML =
    `اهلاً ${user.displayName || ""} 👋`;

    if(user.photoURL){

        document.getElementById("userImage")
        .src = user.photoURL;

    }

    loadStores();

});

/* تحميل المتاجر */

async function loadStores(){

    const storesContainer =
    document.getElementById("storesContainer");

    storesContainer.innerHTML = "";

    const querySnapshot =
    await getDocs(collection(db,"stores"));

    querySnapshot.forEach((doc)=>{

        const store = doc.data();

        storesContainer.innerHTML += `

        <div class="store-card">

            <img
            class="store-image"
            src="${store.image}">

            <div class="store-info">

                <div class="store-name-box">

                    <h3>
                        ${store.name}
                    </h3>

                    <img
                    src="ok.png"
                    class="verified-icon">

                </div>

                <p class="store-status">

                    🟢 متاح حالياً

                </p>

            </div>

        </div>

        `;

    });

}

</script>

</body>

</html>
