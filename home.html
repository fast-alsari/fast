<!-- home.html -->

<!DOCTYPE html>
<html lang="ar" dir="rtl">

<head>

<meta charset="UTF-8">

<meta name="viewport"
content="width=device-width, initial-scale=1.0">

<title>عالسريع</title>

<link rel="stylesheet"
href="style.css">

<link rel="preconnect"
href="https://fonts.googleapis.com">

<link rel="preconnect"
href="https://fonts.gstatic.com"
crossorigin>

<link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;500;600;700&display=swap"
rel="stylesheet">

<link rel="stylesheet"
href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css"/>

</head>

<body>

<!-- الصفحة الرئيسية -->

<div id="homePage"
class="page active-page">

<header class="main-header">

<div class="header-box">

<div class="top-row">

<div class="user-info">

<h2 id="welcomeText">

اهلاً بك 👋

</h2>

<p>

نوصلك طلبك بأقل من ساعة 🚀

</p>

</div>

<img
id="userImage"
src="user.png"
class="profile-image">

</div>

</div>

</header>

<!-- البحث -->

<div class="search-section">

<div class="search-box">

<i class="fa-solid fa-magnifying-glass"></i>

<input
type="text"
id="searchInput"
placeholder="ابحث عن متجر او مطعم">

</div>

</div>

<!-- الفلترة -->

<div class="filters">

<button
class="filter-btn active"
data-category="all">

الكل

</button>

<button
class="filter-btn"
data-category="مطعم">

مطاعم

</button>

<button
class="filter-btn"
data-category="ماركت">

ماركت

</button>

<button
class="filter-btn"
data-category="مخبز">

مخابز

</button>

<button
class="filter-btn"
data-category="صيدلية">

صيدليات

</button>

</div>

<!-- المتاجر -->

<div
id="storesContainer"
class="stores-container">

</div>

</div>

<!-- السلة -->

<div id="cartPage"
class="page">

<div class="cart-container"
id="cartContainer">

<div class="empty-box">

لا توجد طلبات بالسلة

</div>

</div>

<button
class="send-order-btn"
onclick="sendOrder()">

ارسال الطلب

</button>

</div>

<!-- الحساب -->

<div id="accountPage"
class="page">

<div class="account-box">

<img
id="accountImage"
src="user.png"
class="account-image">

<h2 id="accountName">

اسم المستخدم

</h2>

<p id="accountPhone">

رقم الهاتف

</p>

<p id="accountAddress">

العنوان

</p>

<p id="accountType">

نوع الحساب

</p>

<button
class="logout-btn"
onclick="logout()">

تسجيل الخروج

</button>

</div>

</div>

<!-- البار السفلي -->

<div class="bottom-bar">

<div
class="nav-item active"
onclick="showPage('homePage',this)">

<i class="fa-solid fa-house"></i>

<span>

الرئيسية

</span>

</div>

<div
class="nav-item"
onclick="showPage('cartPage',this)">

<i class="fa-solid fa-cart-shopping"></i>

<span>

السلة

</span>

</div>

<div
class="nav-item"
onclick="showPage('accountPage',this)">

<i class="fa-solid fa-user"></i>

<span>

الحساب

</span>

</div>

</div>

<script type="module">

import { initializeApp }
from
"https://www.gstatic.com/firebasejs/12.13.0/firebase-app.js";

import {
getDatabase,
ref,
get,
child,
push,
set
}
from
"https://www.gstatic.com/firebasejs/12.13.0/firebase-database.js";

const firebaseConfig = {

apiKey:
"AIzaSyC7QzQTYMSGRV_nraJBneBqDqYGhugF0Pw",

authDomain:
"fast-937c9.firebaseapp.com",

projectId:
"fast-937c9",

storageBucket:
"fast-937c9.firebasestorage.app",

messagingSenderId:
"221388561840",

appId:
"1:221388561840:web:ec9d75183ddd7d44be0a75",

measurementId:
"G-CEKHEPNR9X",

databaseURL:
"https://fast-937c9-default-rtdb.europe-west1.firebasedatabase.app"

};

const app =
initializeApp(firebaseConfig);

const database =
getDatabase(app);

// =====================
// التحقق من الجلسة
// =====================

const currentUser =
JSON.parse(
localStorage.getItem("user")
);

if(!currentUser){

window.location.href =
"index.html";

}

// =====================
// معلومات الحساب
// =====================

document.getElementById("welcomeText")
.innerHTML =

`اهلاً ${currentUser.name || currentUser.owner}`;

document.getElementById("accountName")
.innerHTML =

currentUser.name ||
currentUser.owner;

document.getElementById("accountPhone")
.innerHTML =

currentUser.phone || "";

document.getElementById("accountAddress")
.innerHTML =

currentUser.address ||
"لا يوجد عنوان";

document.getElementById("accountType")
.innerHTML =

currentUser.type;

if(currentUser.image){

document.getElementById("userImage")
.src = currentUser.image;

document.getElementById("accountImage")
.src = currentUser.image;

}

// =====================
// تغيير الصفحات
// =====================

window.showPage =
function(pageId,element){

document.querySelectorAll(".page")
.forEach(page=>{

page.classList.remove("active-page");

});

document.getElementById(pageId)
.classList.add("active-page");

document.querySelectorAll(".nav-item")
.forEach(item=>{

item.classList.remove("active");

});

element.classList.add("active");

};

// =====================
// تحميل المتاجر
// =====================

const storesContainer =
document.getElementById("storesContainer");

let allStores = [];

async function loadStores(){

storesContainer.innerHTML = "";

try{

const snapshot =
await get(
child(ref(database),"stores")
);

if(snapshot.exists()){

const stores =
snapshot.val();

allStores = [];

for(let key in stores){

const store =
stores[key];

if(store.status === "active"){

allStores.push(store);

}

}

renderStores(allStores);

}else{

storesContainer.innerHTML =

`<div class="empty-box">
لا توجد متاجر
</div>`;

}

}catch(error){

console.log(error);

}

}

loadStores();

// =====================
// عرض المتاجر
// =====================

function renderStores(stores){

storesContainer.innerHTML = "";

if(stores.length === 0){

storesContainer.innerHTML =

`<div class="empty-box">
لا توجد نتائج
</div>`;

return;

}

stores.forEach(store=>{

storesContainer.innerHTML += `

<div class="store-card">

<img
src="${
store.image ||
'store.png'
}"
class="store-image">

<div class="store-content">

<div class="store-name">

<h3>

${store.store_name}

</h3>

<img
src="ok.png"
class="verify-icon">

</div>

<div class="store-category">

${store.category}

</div>

<div class="store-distance">

📍 يبعد عنك تقريباً
${Math.floor(Math.random()*10)+1}
كم

</div>

<button
class="store-btn"
onclick='addToCart(${JSON.stringify(store)})'>

اضافة للسلة

</button>

</div>

</div>

`;

});

}

// =====================
// البحث
// =====================

document.getElementById("searchInput")
.addEventListener("input",function(){

let value =
this.value.toLowerCase();

let filtered =
allStores.filter(store=>

store.store_name
.toLowerCase()
.includes(value)

);

renderStores(filtered);

});

// =====================
// الفلترة
// =====================

document.querySelectorAll(".filter-btn")
.forEach(button=>{

button.addEventListener("click",()=>{

document.querySelectorAll(".filter-btn")
.forEach(btn=>{

btn.classList.remove("active");

});

button.classList.add("active");

const category =
button.dataset.category;

if(category === "all"){

renderStores(allStores);

}else{

const filtered =
allStores.filter(store=>

store.category === category

);

renderStores(filtered);

}

});

});

// =====================
// السلة
// =====================

let cart =

JSON.parse(
localStorage.getItem("cart")
) || [];

window.addToCart =
function(store){

cart.push(store);

localStorage.setItem(
"cart",
JSON.stringify(cart)
);

loadCart();

};

function loadCart(){

const cartContainer =
document.getElementById("cartContainer");

cartContainer.innerHTML = "";

if(cart.length === 0){

cartContainer.innerHTML =

`<div class="empty-box">
لا توجد طلبات بالسلة
</div>`;

return;

}

cart.forEach((item,index)=>{

cartContainer.innerHTML += `

<div class="cart-item">

<img
src="${
item.image ||
'store.png'
}"
class="cart-image">

<div class="cart-info">

<h3>

${item.store_name}

</h3>

<p>

${item.category}

</p>

</div>

<button
class="remove-btn"
onclick="removeCart(${index})">

حذف

</button>

</div>

`;

});

}

loadCart();

window.removeCart =
function(index){

cart.splice(index,1);

localStorage.setItem(
"cart",
JSON.stringify(cart)
);

loadCart();

};

// =====================
// ارسال الطلب
// =====================

window.sendOrder =
async function(){

if(cart.length === 0){

alert("السلة فارغة");

return;

}

const orderId =
"ORDER"+Date.now();

const orderData = {

id:orderId,

customerId:currentUser.id,

customerName:
currentUser.name,

customerPhone:
currentUser.phone,

orders:cart,

status:"pending",

createdAt:Date.now()

};

await set(

ref(database,"orders/"+orderId),

orderData

);

localStorage.removeItem("cart");

cart = [];

loadCart();

alert("تم ارسال الطلب");

};

// =====================
// تسجيل الخروج
// =====================

window.logout = function(){

localStorage.removeItem("user");

window.location.href =
"index.html";

};

</script>

</body>

</html>
