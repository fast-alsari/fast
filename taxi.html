<!DOCTYPE html>
<html lang="ar" dir="rtl">

<head>

<meta charset="UTF-8">

<meta
name="viewport"
content="width=device-width, initial-scale=1.0">

<title>
طلب تكسي
</title>

<link
rel="stylesheet"
href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css"/>

<link
rel="stylesheet"
href="https://unpkg.com/leaflet/dist/leaflet.css"/>

<link
rel="stylesheet"
href="https://unpkg.com/leaflet-routing-machine/dist/leaflet-routing-machine.css"/>

<script src="https://unpkg.com/leaflet/dist/leaflet.js"></script>

<script src="https://unpkg.com/leaflet-routing-machine/dist/leaflet-routing-machine.js"></script>

<link
href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;500;600;700;800&display=swap"
rel="stylesheet">

<style>

*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:'Cairo',sans-serif;
}

body{
background:#f5f6fa;
padding:15px;
padding-bottom:120px;
overflow-x:hidden;
}

.header{
background:
linear-gradient(
135deg,
#ff8800,
#ff5500
);

padding:22px;
border-radius:28px;
color:white;
margin-bottom:20px;
}

.header h2{
font-size:28px;
margin-bottom:6px;
}

.card{
background:white;
padding:18px;
border-radius:26px;
margin-bottom:18px;
box-shadow:
0 5px 18px rgba(0,0,0,.06);
}

.location-box{
background:#f5f5f5;
padding:15px;
border-radius:18px;
margin-bottom:15px;
font-size:14px;
line-height:1.8;
}

#map{
width:100%;
height:420px;
border-radius:24px;
overflow:hidden;
}

.info-row{
display:flex;
justify-content:space-between;
margin-bottom:14px;
font-size:15px;
}

.price-box{
background:#fff4e8;
padding:20px;
border-radius:20px;
text-align:center;
margin-bottom:18px;
}

.price-box h2{
font-size:38px;
color:#ff6600;
margin-top:10px;
}

.input-group{
margin-bottom:15px;
}

.input-group label{
display:block;
margin-bottom:8px;
font-size:14px;
font-weight:bold;
}

.input,
.select{
width:100%;
height:56px;
border:none;
background:#f5f5f5;
border-radius:16px;
padding:0 15px;
outline:none;
font-size:15px;
}

.order-btn{
width:100%;
height:58px;
border:none;
border-radius:18px;
background:
linear-gradient(
135deg,
#00b894,
#00a383
);

color:white;
font-size:17px;
font-weight:bold;
cursor:pointer;
}

</style>

</head>

<body>

<div class="header">

<h2>
طلب تكسي 🚕

</h2>

<p>
حدد الوجهة على الخريطة
</p>

</div>

<div class="card">

<div
class="location-box"
id="currentLocation">

جاري تحديد موقعك...

</div>

<div id="map"></div>

</div>

<div class="card">

<div class="info-row">

<span>
المسافة
</span>

<b id="distanceText">
0 كم
</b>

</div>

<div class="info-row">

<span>
السعر
</span>

<b id="priceText">
0 د.ع
</b>

</div>

<div class="price-box">

<div>
السعر النهائي
</div>

<h2 id="finalPrice">
0
</h2>

</div>

<div class="input-group">

<label>
عدد الأشخاص
</label>

<select
id="personsInput"
class="select">

<option value="1">
1 شخص
</option>

<option value="2">
2 أشخاص
</option>

<option value="3">
3 أشخاص
</option>

<option value="4">
4 أشخاص
</option>

</select>

</div>

<div class="input-group">

<label>
إكرامية السائق
</label>

<input
type="number"
id="tipInput"
class="input"
placeholder="اختياري">

</div>

<button
class="order-btn"
onclick="sendTaxiOrder()">

إرسال الطلب

</button>

</div>

<script type="module">

import { db }
from "./firebase.js";

import {
ref,
set
}
from "https://www.gstatic.com/firebasejs/12.13.0/firebase-database.js";

import {
generateId,
formatPrice,
calculateDistance
}
from "./utils.js";

const currentUser =
JSON.parse(
localStorage.getItem("user")
);

if(!currentUser){

window.location.replace(
"index.html"
);

}

let map;
let routeControl;

let userLat = null;
let userLng = null;

let targetLat = null;
let targetLng = null;

let totalDistance = 0;
let totalPrice = 0;

navigator.geolocation.getCurrentPosition(

(position)=>{

userLat =
position.coords.latitude;

userLng =
position.coords.longitude;

document.getElementById(
"currentLocation"
).innerHTML =

`
📍
${userLat.toFixed(5)}
,
${userLng.toFixed(5)}
`;

startMap();

},

()=>{

alert("يجب تشغيل GPS");

}
);

function startMap(){

map =
L.map("map")
.setView(
[userLat,userLng],
14
);

L.tileLayer(
'https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png',
{
maxZoom:19
}
).addTo(map);

L.marker(
[userLat,userLng]
).addTo(map);

map.on("click",(e)=>{

targetLat =
e.latlng.lat;

targetLng =
e.latlng.lng;

drawRoute();

});

}

function drawRoute(){

if(routeControl){

map.removeControl(
routeControl
);

}

routeControl =
L.Routing.control({

waypoints:[

L.latLng(
userLat,
userLng
),

L.latLng(
targetLat,
targetLng
)

],

addWaypoints:false,

draggableWaypoints:false,

fitSelectedRoutes:true,

show:false,

lineOptions:{
styles:[
{
color:"#ff8800",
weight:7
}
]
}

}).addTo(map);

totalDistance =
calculateDistance(
userLat,
userLng,
targetLat,
targetLng
);

calculatePrice();

}

function calculatePrice(){

const persons =
Number(
document.getElementById(
"personsInput"
).value
);

if(totalDistance <= 2){

totalPrice = 2000;

}

else if(totalDistance <= 5){

totalPrice = 3000;

}

else if(totalDistance <= 8){

totalPrice = 4000;

}

else{

totalPrice =
4000 +
Math.round(
(totalDistance - 8) * 250
);

}

totalPrice +=
persons * 250;

const tip =
Number(
document.getElementById(
"tipInput"
).value || 0
);

const finalPrice =
totalPrice + tip;

document.getElementById(
"distanceText"
).innerHTML =

totalDistance.toFixed(1)
+
" كم";

document.getElementById(
"priceText"
).innerHTML =
formatPrice(totalPrice);

document.getElementById(
"finalPrice"
).innerHTML =
formatPrice(finalPrice);

}

document.getElementById(
"personsInput"
).addEventListener(
"change",
calculatePrice
);

document.getElementById(
"tipInput"
).addEventListener(
"input",
calculatePrice
);

window.sendTaxiOrder =
async function(){

if(!targetLat){

alert("حدد الوجهة");

return;

}

const persons =
Number(
document.getElementById(
"personsInput"
).value
);

const tip =
Number(
document.getElementById(
"tipInput"
).value || 0
);

const orderId =
generateId("TAXI");

const finalPrice =
totalPrice + tip;

const orderData = {

id:orderId,

type:"taxi",

status:"waiting",

customerId:
currentUser.id,

customerName:
currentUser.name || "",

customerPhone:
currentUser.phone || "",

pickupLat:userLat,
pickupLng:userLng,

destinationLat:targetLat,
destinationLng:targetLng,

distance:
Number(
totalDistance.toFixed(1)
),

persons:
persons,

price:
totalPrice,

tip:
tip,

finalPrice:
finalPrice,

createdAt:
Date.now()

};

await set(
ref(
db,
"taxi_orders/" + orderId
),
orderData
);

alert("تم إرسال طلب التكسي");

window.location.replace(
"home.html"
);

};

</script>

</body>

</html>
