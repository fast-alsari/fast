<!-- taxi-history.html -->

<!DOCTYPE html>
<html lang="ar" dir="rtl">

<head>

<meta charset="UTF-8">

<meta
name="viewport"
content="width=device-width, initial-scale=1.0">

<title>
سجل رحلات التكسي
</title>

<link
href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;500;700&display=swap"
rel="stylesheet">

<style>

body{
margin:0;
padding:20px;
font-family:'Cairo',sans-serif;
background:#f5f6fa;
}

.card{
background:white;
padding:18px;
border-radius:24px;
margin-bottom:15px;
box-shadow:0 5px 18px rgba(0,0,0,.06);
}

.title{
font-size:24px;
font-weight:bold;
margin-bottom:20px;
color:#ff6600;
}

.name{
font-size:18px;
font-weight:bold;
margin-bottom:10px;
}

.info{
font-size:14px;
margin-bottom:6px;
color:#666;
}

.price{
font-size:25px;
font-weight:bold;
color:#00b894;
margin-top:10px;
}

.empty{
padding:50px;
text-align:center;
color:#777;
}

</style>

</head>

<body>

<div class="title">
سجل الرحلات 🚖
</div>

<div id="historyContainer"></div>

<script type="module">

import { db }
from "./firebase.js";

import {

ref,
onValue

}

from
"https://www.gstatic.com/firebasejs/12.13.0/firebase-database.js";

const currentUser =
JSON.parse(
localStorage.getItem("user")
);

const historyContainer =
document.getElementById(
"historyContainer"
);

onValue(
ref(db,"taxi_orders"),
(snapshot)=>{

historyContainer.innerHTML = "";

if(!snapshot.exists()){

historyContainer.innerHTML = `
<div class="empty">
لا توجد رحلات
</div>
`;

return;

}

const orders =
Object.values(snapshot.val())
.filter(order =>

order.driverId === currentUser.id

&&

[
"completed",
"cancelled_by_customer"
]
.includes(order.status)

)

.sort((a,b)=>

b.createdAt - a.createdAt

);

if(orders.length === 0){

historyContainer.innerHTML = `
<div class="empty">
لا يوجد سجل رحلات
</div>
`;

return;

}

orders.forEach(order=>{

historyContainer.innerHTML += `

<div class="card">

<div class="name">
${order.customerName || ""}
</div>

<div class="info">
📞 ${order.customerPhone || ""}
</div>

<div class="info">
📍 ${order.distance || 0} كم
</div>

<div class="info">
👥 ${order.personsCount || 1} أشخاص
</div>

<div class="info">
📅 ${new Date(order.createdAt)
.toLocaleString("ar-IQ")}
</div>

<div class="price">
${Number(order.finalPrice || 0)
.toLocaleString()} د.ع
</div>

</div>

`;

});

});

</script>

</body>

</html>
