<!-- taxie.html -->

<!DOCTYPE html>
<html lang="ar" dir="rtl">

<head>

<meta charset="UTF-8">

<meta name="viewport"
content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">

<title>
عالسريع | التكسي
</title>

<link rel="stylesheet"
href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css"/>

<link rel="stylesheet"
href="https://unpkg.com/leaflet/dist/leaflet.css"/>

<link rel="stylesheet"
href="https://unpkg.com/leaflet-routing-machine/dist/leaflet-routing-machine.css"/>

<script src="https://unpkg.com/leaflet/dist/leaflet.js"></script>

<script src="https://unpkg.com/leaflet-routing-machine/dist/leaflet-routing-machine.js"></script>

<link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;500;600;700;800&display=swap"
rel="stylesheet">

<style>

*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:'Cairo',sans-serif;
-webkit-tap-highlight-color:transparent;
}

body{
background:#f7f7f7;
padding-bottom:120px;
overflow-x:hidden;
}

.header{
background:linear-gradient(135deg,#ff8800,#ff5500);
padding:20px;
border-bottom-left-radius:30px;
border-bottom-right-radius:30px;
color:white;
box-shadow:0 8px 25px rgba(0,0,0,.12);
}

.header-top{
display:flex;
align-items:center;
gap:15px;
}

.back-btn{
width:45px;
height:45px;
border:none;
border-radius:50%;
background:white;
color:#ff6600;
font-size:20px;
cursor:pointer;
flex-shrink:0;
}

.user-box{
display:flex;
align-items:center;
gap:12px;
margin-top:18px;
background:rgba(255,255,255,.15);
padding:12px;
border-radius:18px;
backdrop-filter:blur(8px);
}

.user-image{
width:60px;
height:60px;
border-radius:50%;
object-fit:cover;
border:3px solid rgba(255,255,255,.3);
background:white;
}

.user-info h3{
font-size:18px;
margin-bottom:4px;
}

.user-info p{
font-size:13px;
opacity:.9;
}

.map-section{
padding:15px;
}

.map-card{
background:white;
border-radius:26px;
padding:15px;
box-shadow:0 5px 18px rgba(0,0,0,.06);
}

.map-title{
font-size:18px;
font-weight:bold;
margin-bottom:10px;
}

#map{
width:100%;
height:430px;
border-radius:22px;
overflow:hidden;
}

.info-section{
padding:0 15px;
margin-top:15px;
display:flex;
flex-direction:column;
gap:15px;
}

.info-card{
background:white;
border-radius:24px;
padding:18px;
box-shadow:0 5px 18px rgba(0,0,0,.06);
}

.price-box{
display:flex;
justify-content:space-between;
align-items:center;
margin-bottom:15px;
padding:14px;
background:#fff4ea;
border-radius:18px;
}

.price-box:last-child{
margin-bottom:0;
}

.price-title{
font-size:15px;
font-weight:bold;
color:#555;
}

.price-value{
font-size:22px;
font-weight:800;
color:#ff6600;
}

.input-group{
margin-bottom:15px;
}

.input-group:last-child{
margin-bottom:0;
}

.input-group label{
display:block;
margin-bottom:8px;
font-size:14px;
font-weight:bold;
color:#444;
}

.input-group input,
.input-group select{
width:100%;
padding:15px;
border-radius:16px;
border:1px solid #ddd;
outline:none;
font-size:15px;
background:white;
}

.input-group input:focus,
.input-group select:focus{
border-color:#ff8800;
}

.route-info{
background:#f9f9f9;
padding:14px;
border-radius:18px;
line-height:2;
font-size:14px;
color:#444;
}

.order-btn{
width:100%;
padding:17px;
border:none;
border-radius:18px;
background:linear-gradient(135deg,#00c853,#00a844);
color:white;
font-size:17px;
font-weight:800;
cursor:pointer;
transition:.2s;
}

.order-btn:active{
transform:scale(.98);
}

.loading{
position:fixed;
top:0;
left:0;
right:0;
bottom:0;
background:white;
display:flex;
align-items:center;
justify-content:center;
flex-direction:column;
gap:20px;
z-index:999999;
}

.spinner{
width:65px;
height:65px;
border:5px solid #eee;
border-top:5px solid #ff8800;
border-radius:50%;
animation:spin .8s linear infinite;
}

@keyframes spin{
100%{
transform:rotate(360deg);
}
}

.bottom-bar{
position:fixed;
bottom:0;
left:0;
right:0;
height:82px;
background:white;
display:flex;
justify-content:space-around;
align-items:center;
box-shadow:0 -5px 18px rgba(0,0,0,.08);
z-index:1000;
}

.nav-item{
display:flex;
flex-direction:column;
align-items:center;
gap:5px;
color:#888;
cursor:pointer;
font-size:13px;
font-weight:bold;
}

.nav-item.active{
color:#ff8800;
}

.nav-item i{
font-size:22px;
}

.leaflet-routing-container{
display:none !important;
}

</style>

</head>

<body>

<div class="loading" id="loadingScreen">

<div class="spinner"></div>

<h3 style="color:#ff8800;">
جاري تحميل الخريطة...
</h3>

</div>

<div class="header">

<div class="header-top">

<button
class="back-btn"
onclick="goBack()">

<i class="fa-solid fa-arrow-right"></i>

</button>

<div>

<h2>
طلب تكسي 🚖
</h2>

<p>
حدد مكان الوصول على الخريطة
</p>

</div>

</div>

<div class="user-box">

<img
id="userImage"
src="user.png"
class="user-image"
onerror="this.src='user.png'">

<div class="user-info">

<h3 id="userName">
مستخدم
</h3>

<p id="userPhone">
0000000000
</p>

</div>

</div>

</div>

<div class="map-section">

<div class="map-card">

<div class="map-title">
حدد مكان الوصول 📍
</div>

<div id="map"></div>

</div>

</div>

<div class="info-section">

<div class="info-card">

<div class="price-box">

<div class="price-title">
المسافة
</div>

<div class="price-value">

<span id="distanceText">
0
</span>

كم

</div>

</div>

<div class="price-box">

<div class="price-title">
أجرة التوصيل
</div>

<div class="price-value">

<span id="priceText">
0
</span>

د.ع

</div>

</div>

</div>

<div class="info-card">

<div class="input-group">

<label>
عدد الأشخاص
</label>

<select id="personsCount">

<option value="1">1 شخص</option>
<option value="2">2 أشخاص</option>
<option value="3">3 أشخاص</option>
<option value="4">4 أشخاص</option>

</select>

</div>

<div class="input-group">

<label>
اكرامية للسائق
</label>

<input
type="number"
id="tipInput"
placeholder="اختياري">

</div>

<div class="route-info">

📌 اضغط على أي مكان بالخريطة لتحديد الوجهة

<br>

🚕 سيتم إرسال الطلب لأقرب سائق

</div>

</div>

<div class="info-card">

<button
class="order-btn"
onclick="sendTaxiOrder()">

طلب تكسي الآن 🚖

</button>

</div>

</div>

<div class="bottom-bar">

<div
class="nav-item"
onclick="window.location.href='home.html'">

<i class="fa-solid fa-house"></i>

<span>
الرئيسية
</span>

</div>

<div
class="nav-item active">

<i class="fa-solid fa-taxi"></i>

<span>
تكسي
</span>

</div>

<div
class="nav-item"
onclick="window.location.href='asca.html'">

<i class="fa-solid fa-user"></i>

<span>
الحساب
</span>

</div>

</div>

<script type="module">

import { initializeApp }
from "https://www.gstatic.com/firebasejs/12.13.0/firebase-app.js";

import {
getDatabase,
ref,
set,
get,
update
}
from "https://www.gstatic.com/firebasejs/12.13.0/firebase-database.js";

const firebaseConfig = {

apiKey:"AIzaSyC7QzQTYMSGRV_nraJBneBqDqYGhugF0Pw",

authDomain:"fast-937c9.firebaseapp.com",

projectId:"fast-937c9",

databaseURL:
"https://fast-937c9-default-rtdb.europe-west1.firebasedatabase.app"

};

const app =
initializeApp(firebaseConfig);

const database =
getDatabase(app);

const currentUser =
JSON.parse(localStorage.getItem("user"));

if(!currentUser || !currentUser.id){

window.location.href = "index.html";

}

document.getElementById("userName")
.innerHTML =
currentUser.name || "مستخدم";

document.getElementById("userPhone")
.innerHTML =
currentUser.phone || "";

document.getElementById("userImage")
.src =
currentUser.image ||
currentUser.profileImage ||
"user.png";

let map;
let userMarker;
let targetMarker;
let routingControl;

let userLat = null;
let userLng = null;

let targetLat = null;
let targetLng = null;

let totalDistance = 0;
let totalPrice = 0;

navigator.geolocation.getCurrentPosition(

(position)=>{

userLat = position.coords.latitude;
userLng = position.coords.longitude;

startMap();

document.getElementById("loadingScreen")
.style.display = "none";

},

()=>{

alert("يرجى تشغيل GPS");

window.location.href = "home.html";

},

{
enableHighAccuracy:true
}

);

function startMap(){

map = L.map("map")
.setView([userLat,userLng],15);

L.tileLayer(
'https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png',
{
maxZoom:19
}
).addTo(map);

userMarker =
L.marker([userLat,userLng])
.addTo(map)
.bindPopup("موقعك الحالي");

map.on("click",(e)=>{

targetLat = e.latlng.lat;
targetLng = e.latlng.lng;

drawRoute();

});

}

function drawRoute(){

if(targetMarker){

map.removeLayer(targetMarker);

}

targetMarker =
L.marker([targetLat,targetLng])
.addTo(map)
.bindPopup("مكان الوصول");

if(routingControl){

map.removeControl(routingControl);

}

routingControl =
L.Routing.control({

waypoints:[

L.latLng(userLat,userLng),

L.latLng(targetLat,targetLng)

],

routeWhileDragging:false,

addWaypoints:false,

draggableWaypoints:false,

fitSelectedRoutes:true,

show:false,

createMarker:()=>null,

lineOptions:{
styles:[
{
color:'#ff5500',
weight:7,
opacity:1
}
]
}

}).addTo(map);

routingControl.on(
"routesfound",
function(e){

const route =
e.routes[0];

const distanceKm =
(
route.summary.totalDistance / 1000
);

totalDistance =
distanceKm.toFixed(2);

calculatePrice(distanceKm);

}

);

}

function calculatePrice(distanceKm){

let basePrice = 0;

if(distanceKm <= 2){

basePrice = 2000;

}else if(distanceKm <= 5){

basePrice = 3000;

}else if(distanceKm <= 8){

basePrice = 4000;

}else if(distanceKm <= 12){

basePrice = 5000;

}else{

basePrice =
5000 +
Math.round((distanceKm - 12) * 350);

}

const persons =
Number(
document.getElementById("personsCount").value
);

const extra =
(persons - 1) * 500;

totalPrice =
basePrice + extra;

document.getElementById("distanceText")
.innerHTML =
totalDistance;

document.getElementById("priceText")
.innerHTML =
Number(totalPrice).toLocaleString();

}

document.getElementById("personsCount")
.addEventListener("change",()=>{

if(totalDistance > 0){

calculatePrice(Number(totalDistance));

}

});

window.sendTaxiOrder =
async function(){

if(!targetLat || !targetLng){

alert("حدد مكان الوصول");

return;

}

const orderBtn =
document.querySelector(".order-btn");

orderBtn.disabled = true;

orderBtn.innerHTML =
"جاري ارسال الطلب...";

const tip =
Number(
document.getElementById("tipInput").value || 0
);

const orderId =
"TAXI_" + Date.now();

const orderData = {

id:orderId,

type:"taxi",

status:"waiting_taxi",

statusText:"بانتظار قبول سائق",

customerId:
currentUser.id,

customerName:
currentUser.name || "",

customerPhone:
currentUser.phone || "",

customerImage:
currentUser.image || "",

customerLat:userLat,

customerLng:userLng,

targetLat:targetLat,

targetLng:targetLng,

distance:Number(totalDistance),

price:Number(totalPrice),

tip:tip,

finalPrice:
Number(totalPrice) + Number(tip),

persons:
Number(
document.getElementById("personsCount").value
),

driverId:"",
driverName:"",
driverPhone:"",
driverImage:"",

createdAt:Date.now()

};

await set(
ref(database,"taxi_orders/" + orderId),
orderData
);

localStorage.setItem(
"currentTaxiOrder",
orderId
);

alert("تم ارسال طلب التكسي 🚖");

window.location.href =
"taxi-talab.html?orderId=" + orderId;

};

window.goBack = function(){

window.location.href = "home.html";

};

</script>

</body>

</html>
