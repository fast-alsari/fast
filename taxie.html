<!-- taxie.html -->

<!DOCTYPE html>
<html lang="ar" dir="rtl">

<head>

<meta charset="UTF-8">

<meta name="viewport"
content="width=device-width, initial-scale=1.0">

<title>
طلب تكسي
</title>

<link
href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;700&display=swap"
rel="stylesheet">

<link
rel="stylesheet"
href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css"/>

<style>

*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:'Cairo',sans-serif;
}

body{
background:#f4f7fb;
overflow:hidden;
}

#map{
width:100%;
height:100vh;
}

.top-box{
position:absolute;
top:20px;
right:20px;
left:20px;
z-index:999;
background:#fff;
padding:15px;
border-radius:25px;
box-shadow:0 5px 20px rgba(0,0,0,.1);
}

.input-box{
position:relative;
margin-bottom:12px;
}

.input-box i{
position:absolute;
top:17px;
right:15px;
color:#666;
}

.input-box input{
width:100%;
padding:15px 50px 15px 15px;
border:none;
background:#f4f7fb;
border-radius:15px;
outline:none;
font-size:15px;
}

.bottom-sheet{
position:absolute;
bottom:0;
left:0;
width:100%;
background:#fff;
padding:20px;
border-radius:30px 30px 0 0;
z-index:999;
box-shadow:0 -5px 20px rgba(0,0,0,.1);
}

.trip-info{
display:flex;
justify-content:space-between;
margin-bottom:15px;
font-size:16px;
}

.price{
font-size:30px;
font-weight:bold;
color:#0066ff;
text-align:center;
margin:15px 0;
}

.order-btn{
width:100%;
padding:16px;
border:none;
border-radius:18px;
background:linear-gradient(45deg,#ff7b00,#0066ff);
color:#fff;
font-size:18px;
font-weight:bold;
cursor:pointer;
}

.car-types{
display:flex;
gap:10px;
overflow:auto;
margin-bottom:20px;
}

.car{
min-width:110px;
background:#fff;
border:2px solid #eee;
padding:15px;
border-radius:18px;
text-align:center;
cursor:pointer;
transition:.3s;
}

.car.active{
border-color:#0066ff;
background:#eef4ff;
}

.car i{
font-size:30px;
margin-bottom:10px;
color:#0066ff;
}

.car h3{
font-size:14px;
margin-bottom:5px;
}

.car p{
font-size:12px;
color:#666;
}

</style>

</head>

<body>

<div id="map"></div>

<div class="top-box">

<div class="input-box">

<i class="fa-solid fa-location-dot"></i>

<input
type="text"
id="pickup"
placeholder="موقعك الحالي"
readonly>

</div>

<div class="input-box">

<i class="fa-solid fa-flag-checkered"></i>

<input
type="text"
id="destination"
placeholder="حدد الوجهة">

</div>

</div>

<div class="bottom-sheet">

<div class="car-types">

<div
class="car active"
data-price="500"
onclick="selectCar(this)">

<i class="fa-solid fa-car"></i>

<h3>اقتصادي</h3>

<p>500 د.ع / كم</p>

</div>

<div
class="car"
data-price="750"
onclick="selectCar(this)">

<i class="fa-solid fa-car-side"></i>

<h3>مميز</h3>

<p>750 د.ع / كم</p>

</div>

<div
class="car"
data-price="1000"
onclick="selectCar(this)">

<i class="fa-solid fa-crown"></i>

<h3>VIP</h3>

<p>1000 د.ع / كم</p>

</div>

</div>

<div class="trip-info">

<span>
المسافة
</span>

<span id="distance">
0 كم
</span>

</div>

<div class="trip-info">

<span>
الوقت المتوقع
</span>

<span id="duration">
0 دقيقة
</span>

</div>

<div class="price"
id="price">

0 د.ع

</div>

<button
class="order-btn"
onclick="requestTaxi()">

طلب تكسي

</button>

</div>

<script type="module">

import { initializeApp }
from "https://www.gstatic.com/firebasejs/12.13.0/firebase-app.js";

import {
getDatabase,
ref,
push,
set
}
from "https://www.gstatic.com/firebasejs/12.13.0/firebase-database.js";

const firebaseConfig = {

apiKey:"YOUR_API_KEY",

authDomain:"YOUR_AUTH_DOMAIN",

databaseURL:"YOUR_DATABASE_URL",

projectId:"YOUR_PROJECT_ID",

storageBucket:"YOUR_STORAGE_BUCKET",

messagingSenderId:"YOUR_SENDER_ID",

appId:"YOUR_APP_ID"

};

const app =
initializeApp(firebaseConfig);

const database =
getDatabase(app);

let map;

let directionsService;

let directionsRenderer;

let pickupLat = 0;
let pickupLng = 0;

let destinationLat = 0;
let destinationLng = 0;

let tripDistance = 0;
let tripPrice = 0;

let selectedPrice = 500;

function initMap(){

map = new google.maps.Map(
document.getElementById("map"),
{
center:{
lat:33.3152,
lng:44.3661
},
zoom:14,
disableDefaultUI:true
}
);

directionsService =
new google.maps.DirectionsService();

directionsRenderer =
new google.maps.DirectionsRenderer({
polylineOptions:{
strokeColor:"#0066ff",
strokeWeight:6
}
});

directionsRenderer.setMap(map);

// موقع الزبون

navigator.geolocation.getCurrentPosition(
(position)=>{

pickupLat =
position.coords.latitude;

pickupLng =
position.coords.longitude;

const userLocation = {
lat:pickupLat,
lng:pickupLng
};

map.setCenter(userLocation);

new google.maps.Marker({
position:userLocation,
map:map,
title:"موقعك"
});

const geocoder =
new google.maps.Geocoder();

geocoder.geocode({
location:userLocation
},
(results,status)=>{

if(status === "OK"){

document.getElementById("pickup")
.value =
results[0].formatted_address;

}

});

}
);

// autocomplete

const destinationInput =
new google.maps.places.Autocomplete(
document.getElementById("destination")
);

destinationInput.addListener(
"place_changed",
()=>{

const place =
destinationInput.getPlace();

destinationLat =
place.geometry.location.lat();

destinationLng =
place.geometry.location.lng();

calculateRoute();

}
);

}

window.selectCar = function(element){

document.querySelectorAll(".car")
.forEach(car=>{

car.classList.remove("active");

});

element.classList.add("active");

selectedPrice =
parseInt(
element.dataset.price
);

if(destinationLat){
calculateRoute();
}

};

function calculateRoute(){

directionsService.route({

origin:{
lat:pickupLat,
lng:pickupLng
},

destination:{
lat:destinationLat,
lng:destinationLng
},

travelMode:"DRIVING"

},
(result,status)=>{

if(status === "OK"){

directionsRenderer
.setDirections(result);

const route =
result.routes[0].legs[0];

tripDistance =
route.distance.value / 1000;

const duration =
route.duration.text;

tripPrice =
2000 +
(tripDistance * selectedPrice);

document.getElementById("distance")
.innerText =
tripDistance.toFixed(1) + " كم";

document.getElementById("duration")
.innerText =
duration;

document.getElementById("price")
.innerText =
Math.round(tripPrice) + " د.ع";

}

});

}

window.requestTaxi =
async function(){

const user =
JSON.parse(localStorage.getItem("user"));

if(!user){

alert("سجل دخول أولاً");

return;

}

if(!destinationLat){

alert("حدد الوجهة");

return;

}

const tripId =
push(ref(database,"taxi_orders")).key;

await set(
ref(database,"taxi_orders/" + tripId),
{

tripId:tripId,

customerId:user.id,

customerName:user.name,

customerPhone:user.phone,

pickupLat:pickupLat,

pickupLng:pickupLng,

destinationLat:destinationLat,

destinationLng:destinationLng,

distance:tripDistance,

price:Math.round(tripPrice),

status:"pending",

driverId:"",

createdAt:Date.now()

}
);

alert("تم إرسال طلب التكسي");

};

window.initMap = initMap;

</script>

<script
async
defer
src="https://maps.googleapis.com/maps/api/js?key=YOUR_GOOGLE_MAP_KEY&libraries=places&callback=initMap">
</script>

</body>
</html>
