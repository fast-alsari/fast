
<!-- taxie.html -->

<!DOCTYPE html>
<html lang="ar" dir="rtl">

<head>

<meta charset="UTF-8">

<meta name="viewport"
content="width=device-width, initial-scale=1.0">

<title>
طلب تكسي
</title>

<link rel="stylesheet"
href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css"/>

<link rel="stylesheet"
href="https://unpkg.com/leaflet/dist/leaflet.css"/>

<script src="https://unpkg.com/leaflet/dist/leaflet.js"></script>

<style>

*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:'Cairo',sans-serif;
}

body{
background:#f7f7f7;
padding:20px;
padding-bottom:120px;
}

.header{
background:linear-gradient(135deg,#ff8800,#ff5500);
padding:20px;
border-radius:25px;
color:white;
margin-bottom:20px;
display:flex;
align-items:center;
gap:15px;
}

.back-btn{
width:45px;
height:45px;
border:none;
border-radius:50%;
background:white;
color:#ff6600;
font-size:20px;
cursor:pointer;
}

.map-box{
background:white;
padding:15px;
border-radius:25px;
box-shadow:0 5px 18px rgba(0,0,0,.08);
margin-bottom:20px;
}

#map{
width:100%;
height:420px;
border-radius:20px;
margin-top:15px;
}

.info-box{
background:white;
padding:20px;
border-radius:25px;
box-shadow:0 5px 18px rgba(0,0,0,.08);
}

.input-group{
margin-bottom:15px;
}

.input-group label{
display:block;
margin-bottom:8px;
font-weight:bold;
}

.input-group input{
width:100%;
padding:15px;
border-radius:15px;
border:1px solid #ddd;
outline:none;
font-size:15px;
}

.price-box{
background:#fff4e8;
padding:15px;
border-radius:18px;
margin-bottom:15px;
font-size:18px;
font-weight:bold;
color:#ff6600;
text-align:center;
}

.order-btn{
width:100%;
padding:16px;
border:none;
border-radius:18px;
background:#00b894;
color:white;
font-size:17px;
font-weight:bold;
cursor:pointer;
}

</style>

</head>

<body>

<div class="header">

<button
class="back-btn"
onclick="goBack()">

<i class="fa-solid fa-arrow-right"></i>

</button>

<div>

<h2>
طلب تكسي 🚕
</h2>

<p>
حدد المكان الذي تريد الذهاب اليه
</p>

</div>

</div>

<div class="map-box">

<h3>
حدد موقع الوصول
</h3>

<div id="map"></div>

</div>

<div class="info-box">

<div class="price-box">

المسافة:
<span id="distanceText">
0
</span>

كم

<br><br>

السعر:
<span id="priceText">
0
</span>

د.ع

</div>

<div class="input-group">

<label>
عدد الاشخاص معك 
</label>

<select
id="personsCount"
style="
width:100%;
padding:15px;
border-radius:15px;
border:1px solid #ddd;
outline:none;
font-size:15px;
background:white;
">


<option value="1">1 شخص</option>
<option value="2">2 اشخاص</option>
<option value="3">3 اشخاص</option>
<option value="4">4 اشخاص</option>
<option value="5">5 اشخاص</option>
<option value="6">6 اشخاص</option>
<option value="7">7 اشخاص</option>
<option value="8">8 اشخاص</option>
<option value="9">9 اشخاص</option>
<option value="10">10 اشخاص</option>
<option value="11">11 شخص</option>

</select>

</div>

<div class="input-group">

<label>
اكرامية لصاحب التكسي
</label>

<input
type="number"
id="tipInput"
placeholder="اكتب اكرامية للسائق">

</div>

<button
class="order-btn"
onclick="sendTaxiOrder()">

طلب تكسي 🚖

</button>

</div>

<script type="module">

import { initializeApp }
from "https://www.gstatic.com/firebasejs/12.13.0/firebase-app.js";

import {
getDatabase,
ref,
set
}
from "https://www.gstatic.com/firebasejs/12.13.0/firebase-database.js";

const firebaseConfig = {

apiKey:"AIzaSyC7QzQTYMSGRV_nraJBneBqDqYGhugF0Pw",

authDomain:"fast-937c9.firebaseapp.com",

projectId:"fast-937c9",

databaseURL:
"https://fast-937c9-default-rtdb.europe-west1.firebasedatabase.app"

};

const app =
initializeApp(firebaseConfig);

const database =
getDatabase(app);

const currentUser =
JSON.parse(localStorage.getItem("user"));

if(!currentUser){

window.location.href =
"index.html";

}

let map;
let userLat;
let userLng;
let targetLat;
let targetLng;

let routeLine;
let targetMarker;

let totalDistance = 0;
let totalPrice = 0;


function startMap(){

map = L.map('map')
.setView([userLat,userLng],14);

L.tileLayer(
'https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png'
).addTo(map);

L.marker([userLat,userLng])
.addTo(map)
.bindPopup("موقعك الحالي")
.openPopup();

map.on("click",function(e){

targetLat = e.latlng.lat;
targetLng = e.latlng.lng;

drawRoute();

});

}
async function drawRoute(){

if(routeLine){

map.removeLayer(routeLine);

}

const url =
`https://router.project-osrm.org/route/v1/driving/${userLng},${userLat};${targetLng},${targetLat}?overview=full&geometries=geojson`;

const response =
await fetch(url);

const data =
await response.json();

if(data.routes && data.routes.length > 0){

const route =
data.routes[0];

const coordinates =
route.geometry.coordinates.map(coord => [

coord[1],
coord[0]

]);

if(targetMarker){

map.removeLayer(targetMarker);

}

targetMarker = L.marker([targetLat,targetLng])
.addTo(map)
.bindPopup("مكان الوصول");

routeLine = L.polyline(
coordinates,
{
color:"#ff8800",
weight:6
}
).addTo(map);
map.fitBounds(
routeLine.getBounds()
);

totalDistance =
(route.distance / 1000).toFixed(2);

let distanceKm =
Number(totalDistance);

// سعر البداية
let basePrice = 2000;

// سعر كل كيلو
let pricePerKm = 500;

// الحسبة النهائية
totalPrice =
Math.round(
basePrice +
(distanceKm * pricePerKm)
);

// تقريب السعر
totalPrice =
Math.ceil(totalPrice / 250) * 250;

document.getElementById("distanceText")
.innerHTML =
totalDistance;

document.getElementById("priceText")
.innerHTML =
totalPrice;

}

}

window.sendTaxiOrder =
async function(){

if(!targetLat || !targetLng){

alert("حدد موقع الوصول");

return;

}

const tip =
Number(
document.getElementById("tipInput").value || 0
);

const personsCount =
document.getElementById("personsCount").value;

const orderId =
"TAXI"+Date.now();

const targetLocation =
`${targetLat},${targetLng}`;

const orderData = {
targetLocation:targetLocation,

googleMapsLink:
`https://www.google.com/maps?q=${targetLat},${targetLng}`,

id:orderId,

customerId:
currentUser.id,

customerName:
currentUser.name,

customerPhone:
currentUser.phone,

personsCount:personsCount,

customerPhone:
currentUser.phone,

customerLat:userLat,
customerLng:userLng,

targetLat:targetLat,
targetLng:targetLng,

distance:totalDistance,

price:totalPrice,

tip:tip,

finalPrice:
totalPrice + tip,

status:"pending",

createdAt:Date.now()

};

await set(
ref(database,"taxi_orders/"+orderId),
orderData
);

alert("تم ارسال طلب التكسي 🚕");

window.location.href =
"home.html";

};

window.goBack =
function(){

window.location.href =
"home.html";

};

</script>

</body>

</html>
