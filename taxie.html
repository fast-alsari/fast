<!-- taxie.html -->

<!DOCTYPE html>
<html lang="ar" dir="rtl">

<head>

<meta charset="UTF-8">

<meta name="viewport"
content="width=device-width, initial-scale=1.0">

<title>
طلب تكسي
</title>

<link rel="preconnect"
href="https://fonts.googleapis.com">

<link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;500;600;700&display=swap"
rel="stylesheet">

<link rel="stylesheet"
href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css"/>

<link rel="stylesheet"
href="https://unpkg.com/leaflet/dist/leaflet.css"/>

<link rel="stylesheet"
href="https://unpkg.com/leaflet-routing-machine/dist/leaflet-routing-machine.css"/>

<script src="https://unpkg.com/leaflet/dist/leaflet.js"></script>

<script src="https://unpkg.com/leaflet-routing-machine/dist/leaflet-routing-machine.js"></script>

<style>

*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:'Cairo',sans-serif;
-webkit-tap-highlight-color:transparent;
}

body{
background:#f5f6fa;
padding:15px;
overflow-x:hidden;
}

.header{
background:linear-gradient(135deg,#ff8800,#ff5500);
padding:22px;
border-radius:28px;
display:flex;
align-items:center;
gap:15px;
color:white;
margin-bottom:20px;
box-shadow:0 8px 25px rgba(0,0,0,.10);
}

.back-btn{
width:48px;
height:48px;
border:none;
border-radius:50%;
background:white;
color:#ff6600;
font-size:18px;
cursor:pointer;
flex-shrink:0;
}

.header h2{
font-size:24px;
margin-bottom:4px;
}

.header p{
font-size:14px;
opacity:.9;
}

.card{
background:white;
padding:18px;
border-radius:25px;
margin-bottom:18px;
box-shadow:0 5px 18px rgba(0,0,0,.06);
}

.card-title{
font-size:16px;
font-weight:bold;
margin-bottom:12px;
color:#333;
}

.location-box{
background:#f7f7f7;
padding:15px;
border-radius:16px;
font-size:15px;
margin-bottom:15px;
line-height:1.8;
}

#map{
width:100%;
height:430px;
border-radius:22px;
overflow:hidden;
}

.info-row{
display:flex;
justify-content:space-between;
margin-bottom:15px;
font-size:15px;
}

.price-box{
background:#fff4e8;
padding:18px;
border-radius:18px;
text-align:center;
margin-bottom:18px;
}

.price-title{
font-size:15px;
margin-bottom:10px;
color:#555;
}

.price-number{
font-size:36px;
font-weight:bold;
color:#ff6600;
}

.input-group{
margin-bottom:15px;
}

.input-group label{
display:block;
margin-bottom:8px;
font-size:14px;
font-weight:bold;
}

.input-group select,
.input-group input{
width:100%;
padding:15px;
border-radius:16px;
border:1px solid #ddd;
background:#fafafa;
outline:none;
font-size:15px;
}

.order-btn{
width:100%;
padding:17px;
border:none;
border-radius:18px;
font-size:16px;
font-weight:bold;
cursor:pointer;
color:white;
background:linear-gradient(135deg,#00b894,#00a383);
}

</style>

</head>

<body>

<div class="header">

<button
class="back-btn"
onclick="window.location.href='home.html'">

<i class="fa-solid fa-arrow-right"></i>

</button>

<div>

<h2>
طلب تكسي 🚕

</h2>

<p>
حدد الوجهة على الخريطة
</p>

</div>

</div>

<div class="card">

<div class="card-title">
موقعك الحالي
</div>

<div
class="location-box"
id="currentLocation">

جاري تحميل الموقع...

</div>

<div id="map"></div>

</div>

<div class="card">

<div class="info-row">

<span>
المسافة
</span>

<b id="distanceText">
0 كم
</b>

</div>

<div class="info-row">

<span>
السعر
</span>

<b id="priceText">
0 د.ع
</b>

</div>

<div class="price-box">

<div class="price-title">
السعر النهائي
</div>

<div
class="price-number"
id="finalPrice">

0

</div>

</div>

<div class="input-group">

<label>
عدد الأشخاص
</label>

<select id="personsCount">

<option value="1">
1 شخص
</option>

<option value="2">
2 أشخاص
</option>

<option value="3">
3 أشخاص
</option>

<option value="4">
4 أشخاص
</option>

</select>

</div>

<div class="input-group">

<label>
إكرامية للسائق
</label>

<input
type="number"
id="tipInput"
placeholder="اختياري">

</div>

<button
class="order-btn"
onclick="sendTaxiOrder()">

إرسال طلب 🚖

</button>

</div>

<script type="module">

import { initializeApp }
from "https://www.gstatic.com/firebasejs/12.13.0/firebase-app.js";

import {

getDatabase,
ref,
set

}

from "https://www.gstatic.com/firebasejs/12.13.0/firebase-database.js";

const firebaseConfig = {

apiKey:"AIzaSyC7QzQTYMSGRV_nraJBneBqDqYGhugF0Pw",

authDomain:"fast-937c9.firebaseapp.com",

projectId:"fast-937c9",

databaseURL:
"https://fast-937c9-default-rtdb.europe-west1.firebasedatabase.app"

};

const app =
initializeApp(firebaseConfig);

const database =
getDatabase(app);

const currentUser =
JSON.parse(
localStorage.getItem("user")
);

if(
!currentUser ||
!currentUser.id
){

window.location.href =
"index.html";

}

let map;
let routingControl;

let pickupMarker;
let destinationMarker;

let userLat = null;
let userLng = null;

let destinationLat = null;
let destinationLng = null;

let totalDistance = 0;
let totalPrice = 0;

const customerIcon =
L.icon({

iconUrl:
"https://cdn-icons-png.flaticon.com/512/1077/1077114.png",

iconSize:[40,40],
iconAnchor:[20,40]

});

const destinationIcon =
L.icon({

iconUrl:
"https://cdn-icons-png.flaticon.com/512/684/684908.png",

iconSize:[40,40],
iconAnchor:[20,40]

});

// تحميل موقع المستخدم

navigator.geolocation.getCurrentPosition(

(position)=>{

userLat =
position.coords.latitude;

userLng =
position.coords.longitude;

document.getElementById(
"currentLocation"
).innerHTML =

`
خط العرض:
${userLat.toFixed(5)}
<br>
خط الطول:
${userLng.toFixed(5)}
`;

startMap();

},

()=>{

alert("فشل تحميل الموقع");

window.location.href =
"home.html";

}

);

// تشغيل الخريطة

function startMap(){

map =
L.map("map").setView(
[userLat,userLng],
14
);

L.tileLayer(
"https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png",
{
maxZoom:19
}
).addTo(map);

pickupMarker =
L.marker(
[userLat,userLng],
{
icon:customerIcon
}
).addTo(map);

map.on("click",(e)=>{

destinationLat =
e.latlng.lat;

destinationLng =
e.latlng.lng;

drawRoute();

});

}

// رسم المسار

function drawRoute(){

if(destinationMarker){

map.removeLayer(
destinationMarker
);

}

destinationMarker =
L.marker(
[destinationLat,destinationLng],
{
icon:destinationIcon
}
).addTo(map);

if(routingControl){

map.removeControl(
routingControl
);

}

routingControl =
L.Routing.control({

waypoints:[

L.latLng(userLat,userLng),

L.latLng(
destinationLat,
destinationLng
)

],

routeWhileDragging:false,

addWaypoints:false,

draggableWaypoints:false,

fitSelectedRoutes:true,

show:false,

lineOptions:{
styles:[
{
color:"#ff6600",
weight:7
}
]
},

createMarker:()=>null

}).addTo(map);

routingControl.on(
"routesfound",
function(e){

const route =
e.routes[0];

totalDistance =
route.summary.totalDistance / 1000;

calculatePrice();

}
);

}

// تقريب السعر

function roundPrice(price){

const remain =
price % 250;

if(remain === 0){
return price;
}

return price + (250 - remain);

}

// حساب السعر

function calculatePrice(){

const personsCount =
Number(
document.getElementById(
"personsCount"
).value
);

if(totalDistance <= 1){

totalPrice = 1000;

}

else if(totalDistance <= 3){

totalPrice = 2000;

}

else if(totalDistance <= 5){

totalPrice = 3000;

}

else if(totalDistance <= 8){

totalPrice = 4000;

}

else{

totalPrice =
4000 +
Math.round(
(totalDistance - 8) * 250
);

}

// زيادة حسب الأشخاص

if(personsCount > 1){

totalPrice +=
(personsCount - 1) * 500;

}

totalPrice =
roundPrice(totalPrice);

document.getElementById(
"distanceText"
).innerHTML =

totalDistance.toFixed(1)
+
" كم";

document.getElementById(
"priceText"
).innerHTML =

totalPrice.toLocaleString()
+
" د.ع";

const tip =
Number(
document.getElementById(
"tipInput"
).value || 0
);

const finalPrice =
roundPrice(
totalPrice + tip
);

document.getElementById(
"finalPrice"
).innerHTML =

finalPrice.toLocaleString()
+
" د.ع";

}

// تحديث السعر

document
.getElementById("personsCount")
.addEventListener(
"change",
()=>{

if(destinationLat){

calculatePrice();

}

}
);

document
.getElementById("tipInput")
.addEventListener(
"input",
()=>{

if(destinationLat){

calculatePrice();

}

}
);

// إرسال الطلب

window.sendTaxiOrder =
async function(){

if(
!destinationLat ||
!destinationLng
){

alert("حدد الوجهة");

return;

}

const tip =
Number(
document.getElementById(
"tipInput"
).value || 0
);

const finalPrice =
roundPrice(
totalPrice + tip
);

const orderId =
"TAXI_" + Date.now();

const taxiOrder = {

id:orderId,

type:"taxi",

status:"waiting_driver",

createdAt:Date.now(),

customer:{

id:currentUser.id || "",

name:currentUser.name || "",

phone:currentUser.phone || "",

image:currentUser.image || ""

},

pickup:{

latitude:userLat,

longitude:userLng

},

destination:{

latitude:destinationLat,

longitude:destinationLng

},

trip:{

distance:
Number(
totalDistance.toFixed(1)
),

persons:
Number(
document.getElementById(
"personsCount"
).value
),

price:totalPrice,

tip:tip,

finalPrice:finalPrice

}

};

await set(

ref(
database,
"taxi_orders/" + orderId
),

taxiOrder

);

alert("تم إرسال طلب التكسي 🚕");

window.location.href =
"home.html";

};

</script>

</body>

</html>
