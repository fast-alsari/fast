<!DOCTYPE html>
<html lang="ar" dir="rtl">

<head>

<meta charset="UTF-8">

<meta name="viewport"
content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">

طلب تكسي
</title>

<link rel="preconnect"

<link rel="preconnect"
href="https://fonts.gstatic.com"

href="https://unpkg.com/leaflet/dist/leaflet.css"/>

<script src="https://unpkg.com/leaflet/dist/leaflet.js"></script>

<style>

*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:'Cairo',sans-serif;
-webkit-tap-highlight-color:transparent;
}

body{
background:#f5f6fa;
overflow-x:hidden;
padding-bottom:120px;
}

.header{
background:
linear-gradient(
135deg,
#ff8800,
#ff5500
);

padding:25px 20px;

border-bottom-left-radius:30px;
border-bottom-right-radius:30px;

color:white;

box-shadow:0 8px 25px rgba(0,0,0,.12);
}

.header-top{
display:flex;
justify-content:space-between;
align-items:center;
}

.header h1{
font-size:28px;
margin-bottom:6px;
}

.header p{
font-size:14px;
opacity:.9;
}

.back-btn{
width:48px;
height:48px;
border:none;
border-radius:50%;
background:white;
color:#ff6600;
font-size:18px;
cursor:pointer;
}

.main{
padding:15px;
}

.card{
background:white;
padding:18px;
border-radius:26px;
box-shadow:0 5px 18px rgba(0,0,0,.06);
margin-bottom:15px;
}

.card-title{
font-size:16px;
font-weight:bold;
margin-bottom:14px;
color:#333;
}

.location-input{
width:100%;
padding:16px;
border:none;
background:#f5f5f5;
border-radius:16px;
font-size:15px;
margin-bottom:14px;
outline:none;
}

.map-box{
width:100%;
height:340px;
border-radius:26px;
overflow:hidden;
box-shadow:0 5px 18px rgba(0,0,0,.08);
margin-bottom:15px;
}

.summary-row{
display:flex;
justify-content:space-between;
align-items:center;
margin-bottom:16px;
font-size:15px;
}

.summary-price{
font-size:34px;
font-weight:bold;
color:#ff8800;
text-align:center;
margin-top:12px;
}

.tip-box{
margin-top:18px;
}

.tip-input{
width:100%;
padding:15px;
border:none;
background:#f5f5f5;
border-radius:16px;
font-size:15px;
outline:none;
}

.actions{
display:flex;
gap:10px;
margin-top:20px;
}

.actions button{
flex:1;
padding:16px;
border:none;
border-radius:18px;
font-size:15px;
font-weight:bold;
cursor:pointer;
color:white;
}

.request-btn{
background:
linear-gradient(
135deg,
#ff8800,
#ff5500
);
}

.cancel-btn{
background:#e53935;
}

.search-box{
display:none;
background:white;
padding:30px 20px;
border-radius:28px;
text-align:center;
box-shadow:0 5px 18px rgba(0,0,0,.06);
}

.search-box i{
font-size:70px;
color:#ff8800;
margin-bottom:20px;
animation:pulse 1s infinite;
}

@keyframes pulse{

0%{
transform:scale(1);
}

50%{
transform:scale(1.08);
}

100%{
transform:scale(1);
}

}

.status-box{
background:#fff3e0;
padding:16px;
border-radius:18px;
font-weight:bold;
color:#ff6600;
margin-top:18px;
}

.driver-card{
display:none;
background:white;
padding:20px;
border-radius:28px;
box-shadow:0 5px 18px rgba(0,0,0,.06);
margin-top:15px;
}

.driver-top{
display:flex;
align-items:center;
gap:14px;
margin-bottom:18px;
}

.driver-image{
width:80px;
height:80px;
border-radius:50%;
object-fit:cover;
border:3px solid #ff8800;
}

.driver-info h3{
font-size:21px;
margin-bottom:6px;
}

.driver-info p{
font-size:14px;
color:#666;
margin-bottom:4px;
}

.driver-actions{
display:flex;
gap:10px;
margin-top:20px;
}

.driver-actions a,
.driver-actions button{
flex:1;
padding:15px;
border:none;
border-radius:16px;
font-size:14px;
font-weight:bold;
cursor:pointer;
color:white;
text-decoration:none;
text-align:center;
}

.whatsapp-btn{
background:#25D366;
}

.trip-map{
width:100%;
height:280px;
border-radius:22px;
overflow:hidden;
margin-top:15px;
}

.bottom-bar{
position:fixed;
bottom:0;
left:0;
right:0;
height:82px;
background:white;
display:flex;
justify-content:space-around;
align-items:center;
box-shadow:0 -5px 18px rgba(0,0,0,.08);
z-index:1000;
}

.nav-item{
display:flex;
flex-direction:column;
align-items:center;
gap:5px;
cursor:pointer;
color:#888;
font-size:13px;
font-weight:bold;
}

.nav-item.active{
color:#ff8800;
}

.nav-item i{
font-size:22px;
}

</style>

</head>

<body>

<div class="header">

<div class="header-top">

<div>

<h1>
اطلب تكسي 🚕

</h1>

<p>
حدد الوجهة المطلوبة
</p>

</div>

<button
class="back-btn"
onclick="window.location.href='home.html'">

<i class="fa-solid fa-arrow-right"></i>

</button>

</div>

</div>

<div class="main">

<div class="card">

<div class="card-title">
موقعك الحالي
</div>

<input
type="text"
id="pickupInput"
class="location-input"
readonly>

<div class="card-title">
حدد الوجهة
</div>

<input
type="text"
id="destinationInput"
class="location-input"
readonly
placeholder="اضغط على الخريطة">

</div>

<div
id="taxiMap"
class="map-box"></div>

<div
class="card"
id="summaryCard">

<div class="summary-row">

<span>
المسافة
</span>

<span id="distanceText">
0 كم
</span>

</div>

<div class="summary-row">

<span>
سعر التوصيل
</span>

<span id="priceText">
0 د.ع
</span>

</div>

<div
class="summary-price"
id="finalPrice">

0 د.ع

</div>

<div class="tip-box">

<input
type="number"
id="tipInput"
class="tip-input"
placeholder="اكرامية للسائق (اختياري)">

</div>

<div class="actions">

<button
class="request-btn"
onclick="requestTaxi()">

طلب تكسي

</button>

<button
class="cancel-btn"
onclick="cancelCreateOrder()">

الغاء

</button>

</div>

</div>

<div
class="search-box"
id="searchBox">

<i class="fa-solid fa-taxi"></i>

<h2>
جاري البحث عن سائق
</h2>

<p>
يرجى الانتظار حتى قبول الطلب
</p>

<div
class="status-box"
id="statusBox">

بانتظار قبول السائق

</div>

</div>

<div
class="driver-card"
id="driverCard">

<div class="driver-top">

<img
src="user.png"
id="driverImage"
class="driver-image">

<div class="driver-info">

<h3 id="driverName">
السائق
</h3>

<p id="driverPhone">
000000000
</p>

<p id="driverCar">
نوع المركبة
</p>

</div>

</div>

<div
class="status-box"
id="tripStatus">

تم قبول الطلب

</div>

<div class="driver-actions">

<a
id="whatsappBtn"
class="whatsapp-btn"
target="_blank">

واتساب

</a>

<button
class="cancel-btn"
onclick="cancelOrder()">

الغاء الطلب

</button>

</div>

<div
id="tripMap"
class="trip-map"></div>

</div>

</div>

<div class="bottom-bar">

<div
class="nav-item"
onclick="window.location.href='home.html'">

<i class="fa-solid fa-house"></i>

<span>
الرئيسية
</span>

</div>

<div class="nav-item active">

<i class="fa-solid fa-taxi"></i>

<span>
تكسي
</span>

</div>

<div
class="nav-item"
onclick="window.location.href='asca.html'">

<i class="fa-solid fa-user"></i>

<span>
الحساب
</span>

</div>

</div>

<script type="module">

import { initializeApp }
from
"https://www.gstatic.com/firebasejs/12.13.0/firebase-app.js";

import {

getDatabase,
ref,
set,
update,
onValue,
get

}

from
"https://www.gstatic.com/firebasejs/12.13.0/firebase-database.js";

const firebaseConfig = {

apiKey:"AIzaSyC7QzQTYMSGRV_nraJBneBqDqYGhugF0Pw",

authDomain:"fast-937c9.firebaseapp.com",

projectId:"fast-937c9",

databaseURL:
"https://fast-937c9-default-rtdb.europe-west1.firebasedatabase.app"

};

const app =
initializeApp(firebaseConfig);

const database =
getDatabase(app);

const currentUser =
JSON.parse(localStorage.getItem("user"));

if(
!currentUser ||
!currentUser.id
){

window.location.href =
"index.html";

}

let taxiMap;
let tripMap;

let customerLat = null;
let customerLng = null;

let destinationLat = null;
let destinationLng = null;

let tripDistance = 0;
let tripPrice = 0;

let currentOrderId = null;

const customerIcon = L.icon({

iconUrl:
'https://cdn-icons-png.flaticon.com/512/1077/1077114.png',

iconSize:[40,40],
iconAnchor:[20,40]

});

const taxiIcon = L.icon({

iconUrl:
'https://cdn-icons-png.flaticon.com/512/744/744465.png',

iconSize:[45,45],
iconAnchor:[22,45]

});

const destinationIcon = L.icon({

iconUrl:
'https://cdn-icons-png.flaticon.com/512/684/684908.png',

iconSize:[40,40],
iconAnchor:[20,40]

});

// ======================
// جلب موقع الزبون
// ======================

navigator.geolocation.getCurrentPosition(

(position)=>{

customerLat =
position.coords.latitude;

customerLng =
position.coords.longitude;

document.getElementById(
"pickupInput"
).value =

customerLat.toFixed(5)
+
" , "
+
customerLng.toFixed(5);

initMap();

},

()=>{

alert("فعل GPS");

}

);

// ======================
// خريطة
// ======================

function initMap(){

taxiMap = L.map("taxiMap")
.setView(
[
customerLat,
customerLng
],
14
);

L.tileLayer(
'https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png',
{
maxZoom:19
}
).addTo(taxiMap);

L.marker(
[
customerLat,
customerLng
],
{
icon:customerIcon
}
).addTo(taxiMap);

taxiMap.on("click",(e)=>{

destinationLat =
e.latlng.lat;

destinationLng =
e.latlng.lng;

document.getElementById(
"destinationInput"
).value =

destinationLat.toFixed(5)
+
" , "
+
destinationLng.toFixed(5);

taxiMap.eachLayer((layer)=>{

if(layer instanceof L.Marker){

taxiMap.removeLayer(layer);

}

if(layer instanceof L.Polyline){

taxiMap.removeLayer(layer);

}

});

L.tileLayer(
'https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png'
).addTo(taxiMap);

L.marker(
[
customerLat,
customerLng
],
{
icon:customerIcon
}
).addTo(taxiMap);

L.marker(
[
destinationLat,
destinationLng
],
{
icon:destinationIcon
}
).addTo(taxiMap);

L.polyline([
[
customerLat,
customerLng
],
[
destinationLat,
destinationLng
]
],
{
color:"#ff8800",
weight:6
}
).addTo(taxiMap);

calculatePrice();

});

}

// ======================
// السعر
// ======================

function calculatePrice(){

const R = 6371;

const dLat =
(destinationLat-customerLat)
*
Math.PI/180;

const dLng =
(destinationLng-customerLng)
*
Math.PI/180;

const a =

Math.sin(dLat/2)
*
Math.sin(dLat/2)

+

Math.cos(
customerLat*Math.PI/180
)

*

Math.cos(
destinationLat*Math.PI/180
)

*

Math.sin(dLng/2)

*

Math.sin(dLng/2);

const c =
2 *
Math.atan2(
Math.sqrt(a),
Math.sqrt(1-a)
);

tripDistance = R * c;

if(tripDistance <= 1){

tripPrice = 500;

}

else if(tripDistance <= 3){

tripPrice = 1000;

}

else if(tripDistance <= 5){

tripPrice = 1500;

}

else if(tripDistance <= 8){

tripPrice = 2000;

}

else{

tripPrice =
2000 +
Math.round(
(tripDistance - 8) * 250
);

}

document.getElementById(
"distanceText"
).innerHTML =
tripDistance.toFixed(1)
+
" كم";

document.getElementById(
"priceText"
).innerHTML =
tripPrice.toLocaleString()
+
" د.ع";

document.getElementById(
"finalPrice"
).innerHTML =
tripPrice.toLocaleString()
+
" د.ع";

}

// ======================
// ارسال طلب
// ======================

window.requestTaxi =
async function(){

if(destinationLat === null){

alert("حدد الوجهة");

return;

}

const tip =
Number(
document.getElementById(
"tipInput"
).value || 0
);

const finalPrice =
tripPrice + tip;

const orderId =
"TAXI_" + Date.now();

currentOrderId = orderId;

const orderData = {

id:orderId,

type:"taxi",

status:"waiting",

customerId:
currentUser.id,

customerName:
currentUser.name || "",

customerPhone:
currentUser.phone || "",

pickupLat:customerLat,
pickupLng:customerLng,

destinationLat,
destinationLng,

distance:
Number(
tripDistance.toFixed(1)
),

price:finalPrice,

tip:tip,

driverId:"",
driverName:"",
driverPhone:"",
driverImage:"",
vehicleType:"",

createdAt:Date.now()

};

await set(
ref(database,
"taxi_orders/" + orderId
),
orderData
);

localStorage.setItem(
"currentTaxiOrder",
orderId
);

document.getElementById(
"summaryCard"
).style.display = "none";

document.getElementById(
"searchBox"
).style.display = "block";

listenOrder(orderId);

};

// ======================
// متابعة الطلب
// ======================

function listenOrder(orderId){

onValue(
ref(database,
"taxi_orders/" + orderId
),
async(snapshot)=>{

if(!snapshot.exists()){
return;
}

const order =
snapshot.val();

if(order.status === "accepted"){

document.getElementById(
"searchBox"
).style.display = "none";

document.getElementById(
"driverCard"
).style.display = "block";

document.getElementById(
"driverName"
).innerHTML =
order.driverName || "";

document.getElementById(
"driverPhone"
).innerHTML =
order.driverPhone || "";

document.getElementById(
"driverCar"
).innerHTML =
order.vehicleType || "";

document.getElementById(
"driverImage"
).src =
order.driverImage || "user.png";

document.getElementById(
"whatsappBtn"
).href =
"https://wa.me/" +
order.driverPhone;

// خريطة السائق

const driverSnapshot =
await get(
ref(database,
"taxis/" + order.driverId
)
);

if(driverSnapshot.exists()){

const driver =
driverSnapshot.val();

drawTripMap(driver);

}

}

if(order.status === "arrived"){

alert("لقد وصلك السائق 🚕");

document.getElementById(
"tripStatus"
).innerHTML =
"لقد وصلك السائق";

}

if(order.status === "started_trip"){

document.getElementById(
"tripStatus"
).innerHTML =
"بدأت الرحلة";

}

if(order.status === "completed"){

alert("تم التوصيل بنجاح");

document.getElementById(
"tripStatus"
).innerHTML =
"تم التوصيل";

}

if(order.status === "cancelled"){

alert("تم الغاء الطلب");

window.location.reload();

}

});

}

// ======================
// رسم الخريطة
// ======================

function drawTripMap(driver){

if(tripMap){

tripMap.remove();

}

tripMap = L.map("tripMap")
.setView(
[
customerLat,
customerLng
],
13
);

L.tileLayer(
'https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png'
).addTo(tripMap);

// التكسي

L.marker(
[
driver.latitude,
driver.longitude
],
{
icon:taxiIcon
}
).addTo(tripMap);

// الزبون

L.marker(
[
customerLat,
customerLng
],
{
icon:customerIcon
}
).addTo(tripMap);

// الوجهة

L.marker(
[
destinationLat,
destinationLng
],
{
icon:destinationIcon
}
).addTo(tripMap);

// خط السائق للزبون

L.polyline([
[
driver.latitude,
driver.longitude
],
[
customerLat,
customerLng
]
],
{
color:"#2563eb",
weight:6
}
).addTo(tripMap);

// خط الرحلة

L.polyline([
[
customerLat,
customerLng
],
[
destinationLat,
destinationLng
]
],
{
color:"#ff8800",
weight:6
}
).addTo(tripMap);

}

// ======================
// الغاء الطلب
// ======================

window.cancelOrder =
async function(){

if(!currentOrderId){
return;
}

await update(
ref(database,
"taxi_orders/" + currentOrderId
),
{

status:"cancelled",

cancelledBy:"customer"

}
);

localStorage.removeItem(
"currentTaxiOrder"
);

const taxiSnapshot =
await get(
ref(database,
"taxis/" + currentUser.id
)
);

if(taxiSnapshot.exists()){

const taxi =
taxiSnapshot.val();

await update(
ref(database,
"taxis/" + currentUser.id
),
{

cancelledTrips:
Number(
taxi.cancelledTrips || 0
) + 1

}
);

}

window.location.reload();

};

// ======================
// الغاء قبل الارسال
// ======================

window.cancelCreateOrder =
function(){

window.location.href =
"home.html";

};

// ======================
// استرجاع الطلب
// ======================

const savedOrder =
localStorage.getItem(
"currentTaxiOrder"
);

if(savedOrder){

currentOrderId = savedOrder;

document.getElementById(
"summaryCard"
).style.display = "none";

document.getElementById(
"searchBox"
).style.display = "block";

listenOrder(savedOrder);

}

</script>

</body>

</html>
