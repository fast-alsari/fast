
<!-- taxie.html -->

<!DOCTYPE html>
<html lang="ar" dir="rtl">

<head>

<meta charset="UTF-8">

<meta name="viewport"
content="width=device-width, initial-scale=1.0">

<title>
طلب تكسي
</title>

<link rel="stylesheet"
href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css"/>

<link rel="stylesheet"
href="https://unpkg.com/leaflet/dist/leaflet.css"/>

<script src="https://unpkg.com/leaflet/dist/leaflet.js"></script>
<link rel="stylesheet"
href="https://unpkg.com/leaflet-routing-machine/dist/leaflet-routing-machine.css"/>

<script src="https://unpkg.com/leaflet-routing-machine/dist/leaflet-routing-machine.js"></script>

<style>

*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:'Cairo',sans-serif;
}

body{
background:#f7f7f7;
padding:20px;
padding-bottom:120px;
}
.input-group select{
width:100%;
padding:15px;
border-radius:15px;
border:1px solid #ddd;
outline:none;
font-size:15px;
background:white;
}
.header{
background:linear-gradient(135deg,#ff8800,#ff5500);
padding:20px;
border-radius:25px;
color:white;
margin-bottom:20px;
display:flex;
align-items:center;
gap:15px;
}

.back-btn{
width:45px;
height:45px;
border:none;
border-radius:50%;
background:white;
color:#ff6600;
font-size:20px;
cursor:pointer;
}

.map-box{
background:white;
padding:15px;
border-radius:25px;
box-shadow:0 5px 18px rgba(0,0,0,.08);
margin-bottom:20px;
}

#map{
width:100%;
height:420px;
border-radius:20px;
margin-top:15px;
}

.info-box{
background:white;
padding:20px;
border-radius:25px;
box-shadow:0 5px 18px rgba(0,0,0,.08);
}

.input-group{
margin-bottom:15px;
}

.input-group label{
display:block;
margin-bottom:8px;
font-weight:bold;
}

.input-group input{
width:100%;
padding:15px;
border-radius:15px;
border:1px solid #ddd;
outline:none;
font-size:15px;
}

.price-box{
background:#fff4e8;
padding:15px;
border-radius:18px;
margin-bottom:15px;
font-size:18px;
font-weight:bold;
color:#ff6600;
text-align:center;
}

.order-btn{
width:100%;
padding:16px;
border:none;
border-radius:18px;
background:#00b894;
color:white;
font-size:17px;
font-weight:bold;
cursor:pointer;
}

</style>

</head>

<body>

<div class="header">

<button
class="back-btn"
onclick="goBack()">

<i class="fa-solid fa-arrow-right"></i>

</button>

<div>

<h2>
طلب تكسي 🚕
</h2>

<p>
حدد المكان الذي تريد الذهاب اليه
</p>

</div>

</div>

<div class="map-box">

<h3>
حدد موقع الوصول
</h3>

<div id="map"></div>

</div>

<div class="info-box">

<div class="price-box">

المسافة:
<span id="distanceText">
0
</span>

كم

<br><br>

السعر:
<span id="priceText">
0
</span>

د.ع

</div>

<div class="input-group">

<label>
عدد الاشخاص معك 
</label>

<select
id="personsCount"
style="
width:100%;
padding:15px;
border-radius:15px;
border:1px solid #ddd;
outline:none;
font-size:15px;
background:white;
">

<option value="0">0 شخص</option>
<option value="1">1 شخص</option>
<option value="2">2 اشخاص</option>
<option value="3">3 اشخاص</option>
<option value="4">4 اشخاص</option>
<option value="5">5 اشخاص</option>
<option value="6">6 اشخاص</option>
<option value="7">7 اشخاص</option>
<option value="8">8 اشخاص</option>
<option value="9">9 اشخاص</option>
<option value="10">10 اشخاص</option>
<option value="11">11 شخص</option>

</select>

</div>

<div class="input-group">

<label>
اكرامية لصاحب التكسي
</label>

<input
type="number"
id="tipInput"
placeholder="اكتب اكرامية للسائق">

</div>

<button
class="order-btn"
onclick="sendTaxiOrder()">

طلب تكسي 🚖

</button>

</div>

<script type="module">

import { initializeApp }
from "https://www.gstatic.com/firebasejs/12.13.0/firebase-app.js";

import {
getDatabase,
ref,
set
}
from "https://www.gstatic.com/firebasejs/12.13.0/firebase-database.js";

const firebaseConfig = {

apiKey:"AIzaSyC7QzQTYMSGRV_nraJBneBqDqYGhugF0Pw",

authDomain:"fast-937c9.firebaseapp.com",

projectId:"fast-937c9",

databaseURL:
"https://fast-937c9-default-rtdb.europe-west1.firebasedatabase.app"

};

const app =
initializeApp(firebaseConfig);

const database =
getDatabase(app);

const currentUser =
JSON.parse(localStorage.getItem("user"));

if(!currentUser){

window.location.href =
"index.html";

}

let map;
let userLat;
let userLng;
let targetLat;
let targetLng;

let routeLine;
let targetMarker;

let totalDistance = 0;
let totalPrice = 0;
document
.getElementById("personsCount")
.addEventListener(
"change",
function(){

if(targetLat && targetLng){

drawRoute();

}

}
);

// قراءة بيانات اليوزر المحفوظة
const savedUser =
JSON.parse(localStorage.getItem("user")) || {};

// قراءة الموقع
userLat =
savedUser.userLat ||
Number(localStorage.getItem("userLat"));

userLng =
savedUser.userLng ||
Number(localStorage.getItem("userLng"));

// التأكد من وجود الموقع
if(userLat && userLng){

startMap();

}else{

alert("لم يتم العثور على موقعك");

window.location.href =
"home.html";

}

function startMap(){

map = L.map('map')
.setView([userLat,userLng],14);

L.tileLayer(
'https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png'
).addTo(map);

L.marker([userLat,userLng])
.addTo(map)
.bindPopup("موقعك الحالي")
.openPopup();

map.on("click",function(e){

targetLat = e.latlng.lat;
targetLng = e.latlng.lng;

drawRoute();

});

}
let routingControl;

async function drawRoute(){

if(routingControl){

map.removeControl(routingControl);

}

if(targetMarker){

map.removeLayer(targetMarker);

}

targetMarker =
L.marker([targetLat,targetLng])
.addTo(map)
.bindPopup("مكان الوصول");

routingControl =
L.Routing.control({

waypoints:[

L.latLng(userLat,userLng),

L.latLng(targetLat,targetLng)

],

routeWhileDragging:true,

showAlternatives:true,

selectRoute:true,

altLineOptions:{

styles:[

{
color:'#0066ff',
weight:6,
opacity:0.7
},

{
color:'#00aa55',
weight:6,
opacity:0.7
},

{
color:'#999999',
weight:6,
opacity:0.7
}

]

},
lineOptions:{

styles:[

{
color:'#ff5500',
weight:8,
opacity:1
}

]

},

createMarker:function(){

return null;

},

addWaypoints:false,

fitSelectedRoutes:true,

show:false

}).addTo(map);

routingControl.on(
'routesfound',
function(e){

const routes =
e.routes;

if(routes.length > 0){

let selectedRoute =
routes[0];

// اختيار المسار عند الضغط عليه

routingControl.on(
'routeselected',
function(event){

document.querySelectorAll(
'.leaflet-routing-alt'
).forEach(item=>{

item.style.borderRadius = '15px';
item.style.marginBottom = '10px';
item.style.cursor = 'pointer';

});

selectedRoute =
event.route;

const selectedDistance =
(
selectedRoute.summary.totalDistance / 1000
).toFixed(2);

updateTaxiPrice(
Number(selectedDistance)
);

}
);

const route =
selectedRoute;

totalDistance =
(
route.summary.totalDistance / 1000
).toFixed(2);

let distanceKm =
Number(totalDistance);

updateTaxiPrice(distanceKm);

const personsCount =
Number(
document.getElementById("personsCount").value || 0
);

let totalBasePrice = 0;

// من 0 الى 1 كيلو

if(distanceKm <= 1){

totalBasePrice = 500;

}

// من 1 الى 2 كيلو

else if(distanceKm <= 2){

totalBasePrice = 1000;

}

// من 2 الى 3 كيلو

else if(distanceKm <= 3){

totalBasePrice = 1500;

}

// من 3 الى 4 كيلو

else if(distanceKm <= 4){

totalBasePrice = 2000;

}

// من 4 الى 5 كيلو

else if(distanceKm <= 5){

totalBasePrice = 2500;

}

// من 5 الى 7 كيلو

else if(distanceKm <= 7){

totalBasePrice = 3500;

}

// من 7 الى 10 كيلو

else if(distanceKm <= 10){

totalBasePrice = 5000;

}

// من 10 الى 15 كيلو

else if(distanceKm <= 15){

totalBasePrice = 8000;

}

// من 15 الى 20 كيلو

else if(distanceKm <= 20){

totalBasePrice = 12000;

}

// من 20 الى 30 كيلو

else if(distanceKm <= 30){

totalBasePrice = 16000;

}

// من 30 الى 40 كيلو

else if(distanceKm <= 40){

totalBasePrice = 20000;

}

// من 40 الى 50 كيلو

else if(distanceKm <= 50){

totalBasePrice = 24000;

}

// من 50 الى 75 كيلو// من 75 الى 100 كيلو

else if(distanceKm <= 100){

totalBasePrice =

36500 +

(
(distanceKm - 75) * 350
);

}

// من 100 الى 110 كيلو

else if(distanceKm <= 110){

totalBasePrice =

30000 +

(
(distanceKm - 100) * 300
);

}

// من 110 الى 120 كيلو

else if(distanceKm <= 120){

totalBasePrice =

35000 +

(
(distanceKm - 110) * 280
);

}

// من 120 الى 130 كيلو

else if(distanceKm <= 130){

totalBasePrice =

40000 +

(
(distanceKm - 120) * 260
);

}

// من 130 الى 140 كيلو

else if(distanceKm <= 140){

totalBasePrice =

42500 +

(
(distanceKm - 130) * 240
);

}

// من 140 الى 150 كيلو

else if(distanceKm <= 150){

totalBasePrice =

45500 +

(
(distanceKm - 140) * 220
);

}

// من 150 الى 160 كيلو

else if(distanceKm <= 160){

totalBasePrice =

55000 +

(
(distanceKm - 150) * 200
);

}

// من 160 الى 170 كيلو

else if(distanceKm <= 170){

totalBasePrice =

60000 +

(
(distanceKm - 160) * 180
);

}

// من 170 الى 180 كيلو

else if(distanceKm <= 180){

totalBasePrice =

65000 +

(
(distanceKm - 170) * 170
);

}

// من 180 الى 190 كيلو

else if(distanceKm <= 190){

totalBasePrice =

70000 +

(
(distanceKm - 180) * 160
);

}

// من 190 الى 200 كيلو

else if(distanceKm <= 200){

totalBasePrice =

73000 +

(
(distanceKm - 190) * 150
);

}

// اكثر من 200 كيلو

else{

totalBasePrice =

74000 +

(
(distanceKm - 200) * 200
);

}

// زيادة الاشخاص

let extraPersonsPrice = 0;

if(personsCount > 0){

extraPersonsPrice =

totalBasePrice *

(personsCount * 0.10);

}

totalPrice =

Math.round(
totalBasePrice +
extraPersonsPrice
);

totalPrice =
Math.ceil(totalPrice / 250) * 250;

document.getElementById(
"distanceText"
).innerHTML =
totalDistance;

document.getElementById(
"priceText"
).innerHTML =
totalPrice;

}

}
);

}


function updateTaxiPrice(distanceKm){

const personsCount =
Number(
document.getElementById("personsCount").value || 0
);

let totalBasePrice = 0;

// من 0 الى 1 كيلو

if(distanceKm <= 1){

totalBasePrice = 500;

}

// من 1 الى 2 كيلو

else if(distanceKm <= 2){

totalBasePrice = 1000;

}

// من 2 الى 3 كيلو

else if(distanceKm <= 3){

totalBasePrice = 1500;

}

// من 3 الى 4 كيلو

else if(distanceKm <= 4){

totalBasePrice = 2000;

}

// من 4 الى 5 كيلو

else if(distanceKm <= 5){

totalBasePrice = 2500;

}

// من 5 الى 7 كيلو

else if(distanceKm <= 7){

totalBasePrice = 3500;

}

// من 7 الى 10 كيلو

else if(distanceKm <= 10){

totalBasePrice = 5000;

}

// من 10 الى 15 كيلو

else if(distanceKm <= 15){

totalBasePrice = 8000;

}

// من 15 الى 20 كيلو

else if(distanceKm <= 20){

totalBasePrice = 12000;

}

// من 20 الى 30 كيلو

else if(distanceKm <= 30){

totalBasePrice = 16000;

}

// من 30 الى 40 كيلو

else if(distanceKm <= 40){

totalBasePrice = 20000;

}

// من 40 الى 50 كيلو

else if(distanceKm <= 50){

totalBasePrice = 24000;

}

// اكثر من 50 كيلو

else{

totalBasePrice =

24000 +

(
(distanceKm - 50) * 400
);

}

// زيادة الاشخاص

let extraPersonsPrice = 0;

if(personsCount > 0){

extraPersonsPrice =

totalBasePrice *

(personsCount * 0.10);

}

totalPrice =

Math.round(
totalBasePrice +
extraPersonsPrice
);

totalPrice =
Math.ceil(totalPrice / 250) * 250;

document.getElementById(
"distanceText"
).innerHTML =
distanceKm.toFixed(2);

document.getElementById(
"priceText"
).innerHTML =
totalPrice;

}




window.sendTaxiOrder =
async function(){

if(!targetLat || !targetLng){

alert("حدد موقع الوصول");

return;

}

const tip =
Number(
document.getElementById("tipInput").value || 0
);

const personsCount =
Number(
document.getElementById("personsCount").value
);

const orderId =
"TAXI"+Date.now();

const targetLocation =
`${targetLat},${targetLng}`;

const orderData = {

id:orderId,

targetLocation:
targetLocation,

googleMapsLink:
`https://www.google.com/maps?q=${targetLat},${targetLng}`,

customerId:
currentUser.id,

customerName:
currentUser.name,

customerPhone:
currentUser.phone,

personsCount:
personsCount,

customerLat:
userLat,

customerLng:
userLng,

targetLat:
targetLat,

targetLng:
targetLng,

distance:
totalDistance,

price:
totalPrice,

tip:
tip,

finalPrice:
totalPrice + tip,

status:
"pending",

createdAt:
Date.now()

};

await set(
ref(database,"taxi_orders/"+orderId),
orderData
);

alert("تم ارسال طلب التكسي 🚕");

window.location.href =
"home.html";

};

window.goBack =
function(){

window.location.href =
"home.html";

};

</script>

</body>

</html>
