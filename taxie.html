<!DOCTYPE html>
<html lang="ar" dir="rtl">

<head>

<meta charset="UTF-8">

<meta name="viewport"
content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">

<title>
طلب تكسي
</title>

<link rel="preconnect"
href="https://fonts.googleapis.com">

<link rel="preconnect"
href="https://fonts.gstatic.com"
crossorigin>

<link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;500;600;700;800&display=swap"
rel="stylesheet">

<link rel="stylesheet"
href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css"/>

<link rel="stylesheet"
href="https://unpkg.com/leaflet/dist/leaflet.css"/>

<script src="https://unpkg.com/leaflet/dist/leaflet.js"></script>

<style>

*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:'Cairo',sans-serif;
}

body{
background:#f5f6fa;
padding-bottom:120px;
overflow-x:hidden;
}

.header{
background:
linear-gradient(
135deg,
#ff8800,
#ff5500
);

padding:25px 20px;

border-bottom-left-radius:30px;
border-bottom-right-radius:30px;

color:white;

box-shadow:0 8px 25px rgba(0,0,0,.12);
}

.header-top{
display:flex;
justify-content:space-between;
align-items:center;
}

.back-btn{
width:45px;
height:45px;
border:none;
border-radius:50%;
background:white;
color:#ff6600;
font-size:18px;
cursor:pointer;
}

.header h1{
font-size:26px;
margin-bottom:5px;
}

.header p{
font-size:14px;
opacity:.9;
}

.main{
padding:15px;
}

.location-card{
background:white;
padding:18px;
border-radius:24px;
box-shadow:0 5px 18px rgba(0,0,0,.06);
margin-bottom:15px;
}

.location-title{
font-size:15px;
font-weight:bold;
margin-bottom:10px;
color:#444;
}

.location-input{
width:100%;
padding:15px;
border:none;
background:#f5f5f5;
border-radius:16px;
font-size:15px;
margin-bottom:15px;
outline:none;
}

.map-box{
width:100%;
height:320px;
border-radius:24px;
overflow:hidden;
box-shadow:0 5px 18px rgba(0,0,0,.08);
margin-bottom:15px;
}

.summary-card{
background:white;
padding:20px;
border-radius:24px;
box-shadow:0 5px 18px rgba(0,0,0,.06);
}

.summary-row{
display:flex;
justify-content:space-between;
margin-bottom:16px;
font-size:15px;
}

.summary-price{
text-align:center;
font-size:34px;
font-weight:bold;
color:#ff8800;
margin-top:10px;
}

.request-btn{
width:100%;
padding:16px;
border:none;
border-radius:18px;

background:
linear-gradient(
135deg,
#ff8800,
#ff5500
);

color:white;
font-size:16px;
font-weight:bold;
cursor:pointer;
margin-top:20px;
}

.search-driver{
display:none;
background:white;
padding:40px 20px;
border-radius:28px;
text-align:center;
margin-top:20px;
box-shadow:0 5px 18px rgba(0,0,0,.06);
}

.search-driver i{
font-size:70px;
color:#ff8800;
margin-bottom:20px;
animation:pulse 1s infinite;
}

@keyframes pulse{

0%{
transform:scale(1);
}

50%{
transform:scale(1.08);
}

100%{
transform:scale(1);
}

}

.search-driver h2{
margin-bottom:10px;
}

.search-driver p{
color:#777;
font-size:14px;
}

.order-status{
margin-top:25px;
padding:18px;
border-radius:20px;
background:#fff3e0;
font-weight:bold;
color:#ff6600;
display:none;
}

.bottom-bar{
position:fixed;
bottom:0;
left:0;
right:0;
height:85px;
background:white;
display:flex;
justify-content:space-around;
align-items:center;
box-shadow:0 -5px 18px rgba(0,0,0,.08);
z-index:999;
}

.nav-item{
display:flex;
flex-direction:column;
align-items:center;
gap:5px;
cursor:pointer;
color:#888;
font-size:13px;
font-weight:bold;
}

.nav-item.active{
color:#ff8800;
}

.nav-item i{
font-size:22px;
}

</style>

</head>

<body>

<div class="header">

<div class="header-top">

<div>

<h1>
اطلب تكسي 🚕

</h1>

<p>
حدد موقع الانطلاق والوصول
</p>

</div>

<button
class="back-btn"
onclick="window.location.href='home.html'">

<i class="fa-solid fa-arrow-right"></i>

</button>

</div>

</div>

<div class="main">

<div class="location-card">

<div class="location-title">
موقع الانطلاق
</div>

<input
type="text"
id="pickupInput"
class="location-input"
readonly
placeholder="اضغط على الخريطة">

<div class="location-title">
موقع الوصول
</div>

<input
type="text"
id="destinationInput"
class="location-input"
readonly
placeholder="اضغط على الخريطة">

</div>

<div
id="taxiMap"
class="map-box"></div>

<div class="summary-card">

<div class="summary-row">

<span>
المسافة
</span>

<span id="distanceText">
0 كم
</span>

</div>

<div class="summary-row">

<span>
اجرة التوصيل
</span>

<span id="priceText">
0 د.ع
</span>

</div>

<div
class="summary-price"
id="finalPrice">

0 د.ع

</div>

<button
class="request-btn"
onclick="requestTaxi()">

طلب تكسي 🚖

</button>

</div>

<div
class="search-driver"
id="searchDriverBox">

<i class="fa-solid fa-taxi"></i>

<h2>
جاري البحث عن سائق
</h2>

<p>
يرجى الانتظار حتى قبول الطلب
</p>

<div
class="order-status"
id="orderStatus">

بانتظار قبول السائق

</div>

</div>

</div>

<div class="bottom-bar">

<div
class="nav-item"
onclick="window.location.href='home.html'">

<i class="fa-solid fa-house"></i>

<span>
الرئيسية
</span>

</div>

<div
class="nav-item active">

<i class="fa-solid fa-taxi"></i>

<span>
تكسي
</span>

</div>

<div
class="nav-item"
onclick="window.location.href='asca.html'">

<i class="fa-solid fa-user"></i>

<span>
الحساب
</span>

</div>

</div>

<script type="module">

import { initializeApp }
from
"https://www.gstatic.com/firebasejs/12.13.0/firebase-app.js";

import {

getDatabase,
ref,
set,
onValue

}

from
"https://www.gstatic.com/firebasejs/12.13.0/firebase-database.js";

const firebaseConfig = {

apiKey:"AIzaSyC7QzQTYMSGRV_nraJBneBqDqYGhugF0Pw",

authDomain:"fast-937c9.firebaseapp.com",

projectId:"fast-937c9",

databaseURL:
"https://fast-937c9-default-rtdb.europe-west1.firebasedatabase.app"

};

const app =
initializeApp(firebaseConfig);

const database =
getDatabase(app);

const currentUser =
JSON.parse(localStorage.getItem("user"));

if(
!currentUser ||
!currentUser.id
){

window.location.href = "index.html";

}

// =====================
// الخريطة
// =====================

let taxiMap;

let pickupMarker;
let destinationMarker;

let pickupLat = null;
let pickupLng = null;

let destinationLat = null;
let destinationLng = null;

let tripDistance = 0;
let tripPrice = 0;

function initTaxiMap(){

taxiMap = L.map("taxiMap")
.setView([33.3152,44.3661],13);

L.tileLayer(
'https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png',
{
maxZoom:19
}
).addTo(taxiMap);

let selectingPickup = true;

taxiMap.on('click',function(e){

const lat = e.latlng.lat;
const lng = e.latlng.lng;

if(selectingPickup){

pickupLat = lat;
pickupLng = lng;

document.getElementById(
"pickupInput"
).value =
lat.toFixed(5)
+
" , "
+
lng.toFixed(5);

if(pickupMarker){

taxiMap.removeLayer(pickupMarker);

}

pickupMarker =
L.marker([lat,lng])
.addTo(taxiMap);

selectingPickup = false;

alert("حدد موقع الوصول");

}else{

destinationLat = lat;
destinationLng = lng;

document.getElementById(
"destinationInput"
).value =
lat.toFixed(5)
+
" , "
+
lng.toFixed(5);

if(destinationMarker){

taxiMap.removeLayer(destinationMarker);

}

destinationMarker =
L.marker([lat,lng])
.addTo(taxiMap);

calculatePrice();

selectingPickup = true;

}

});

}

// =====================
// حساب المسافة
// =====================

function calculatePrice(){

const R = 6371;

const dLat =
(destinationLat-pickupLat)
* Math.PI/180;

const dLng =
(destinationLng-pickupLng)
* Math.PI/180;

const a =

Math.sin(dLat/2)
*
Math.sin(dLat/2)

+

Math.cos(
pickupLat*Math.PI/180
)

*

Math.cos(
destinationLat*Math.PI/180
)

*

Math.sin(dLng/2)

*

Math.sin(dLng/2);

const c =
2 * Math.atan2(
Math.sqrt(a),
Math.sqrt(1-a)
);

tripDistance = R * c;

document.getElementById(
"distanceText"
).innerHTML =
tripDistance.toFixed(1)
+
" كم";

// التسعيرة

if(tripDistance <= 2){

tripPrice = 3000;

}

else if(tripDistance <= 5){

tripPrice = 5000;

}

else if(tripDistance <= 10){

tripPrice = 7000;

}

else{

tripPrice =
7000 +
Math.round(
(tripDistance - 10) * 500
);

}

document.getElementById(
"priceText"
).innerHTML =
tripPrice.toLocaleString()
+
" د.ع";

document.getElementById(
"finalPrice"
).innerHTML =
tripPrice.toLocaleString()
+
" د.ع";

}

// =====================
// ارسال الطلب
// =====================

window.requestTaxi =
async function(){

if(
pickupLat === null ||
destinationLat === null
){

alert("حدد المواقع");

return;

}

const orderId =
"TAXI_" + Date.now();

const orderData = {

id:orderId,

type:"taxi",

status:"waiting",

customerId:
currentUser.id,

customerName:
currentUser.name || "",

customerPhone:
currentUser.phone || "",

pickupLat,
pickupLng,

destinationLat,
destinationLng,

distance:
Number(
tripDistance.toFixed(1)
),

price:tripPrice,

driverId:"",
driverName:"",
driverPhone:"",

createdAt:Date.now()

};

await set(
ref(database,"taxi_orders/" + orderId),
orderData
);

localStorage.setItem(
"currentTaxiOrder",
orderId
);

document.querySelector(
".summary-card"
).style.display = "none";

document.getElementById(
"searchDriverBox"
).style.display = "block";

document.getElementById(
"orderStatus"
).style.display = "block";

// متابعة حالة الطلب

onValue(
ref(database,"taxi_orders/" + orderId),
(snapshot)=>{

if(snapshot.exists()){

const order =
snapshot.val();

if(order.status === "accepted"){

document.getElementById(
"orderStatus"
).innerHTML =

`
تم قبول الطلب بواسطة
<br><br>
${order.driverName || ""}
`;

}

if(order.status === "arrived"){

document.getElementById(
"orderStatus"
).innerHTML =

"السائق وصل لموقعك";

}

if(order.status === "started_trip"){

document.getElementById(
"orderStatus"
).innerHTML =

"بدأت الرحلة";

}

if(order.status === "completed"){

document.getElementById(
"orderStatus"
).innerHTML =

"تم إنهاء الرحلة";

}

}

});

};

initTaxiMap();

</script>

</body>

</html>
